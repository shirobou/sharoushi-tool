出を受けたとき、その苦情の自主的解決を図るよう努めなければなりません。","e":"派遣社員が「派遣先の正社員と同じ仕事なのに待遇が全然違う」と苦情を申し出た場合、派遣元は自主的に解決を図る努力義務があります。","p":"苦情の自主的解決の努力義務。均等・均衡待遇（法30条の3、法30条の4）に関する事項が対象。","f":"","pg":0},{"r":"派遣法47条の7","t":"派遣労働者の紛争に関する援助","b":"","s":"都道府県労働局長は、派遣労働者と派遣元事業主の紛争について、当事者から援助を求められた場合、助言・指導・勧告を行うことができます。","e":"派遣社員が待遇差について派遣会社と話し合っても解決しない場合、労働局長に助言等を求めることができます。","p":"援助を求めたことを理由とする不利益取扱いは禁止。調停制度（法47条の8）もある。","f":"","pg":0},{"r":"派遣法47条の8","t":"派遣労働者の紛争に関する調停","b":"","s":"都道府県労働局長は、派遣労働者に関する紛争について、当事者から調停の申請があった場合、紛争調整委員会に調停を行わせることができます。","e":"均等・均衡待遇に関する派遣社員と派遣元の紛争について、紛争調整委員会による調停が利用できます。","p":"調停機関は「紛争調整委員会」。均等・均衡待遇等に関する紛争が対象。","f":"","pg":0},{"r":"派遣法49条","t":"派遣元事業主に対する改善命令等","b":"","s":"厚生労働大臣は、派遣元事業主が労働者派遣法に違反している場合、事業の適正な運営のために必要な措置を命じることができます。命令に違反した場合は許可の取消しもあり得ます。","e":"派遣法に違反している派遣会社に対して、厚生労働大臣が「違反を改善しなさい」と命令し、従わない場合は派遣事業の許可を取り消すことがあります。","p":"改善命令→事業停止命令→許可取消しの段階的措置。許可取消しの要件も重要。","f":"","pg":0},{"r":"派遣法49条の2","t":"派遣先に対する勧告・公表","b":"","s":"厚生労働大臣は、派遣先が一定の規定に違反しているときは勧告でき、勧告に従わないときは企業名を公表できます。","e":"派遣期間制限を超えて派遣を受け入れている派遣先に勧告し、従わなければ会社名を公表します。","p":"派遣先に対する段階的措置：指導・助言→勧告→公表。派遣元への措置（法49条の改善命令等）との違い。","f":"","pg":0},{"r":"高齢法10条の2","t":"70歳までの就業確保措置","b":"","s":"65歳以上70歳未満の定年を定めている事業主等は、70歳までの就業確保措置（定年引上げ、継続雇用、業務委託等）を講じるよう努めなければなりません。","e":"65歳定年の会社は、70歳まで働けるように、定年延長、再雇用、業務委託契約などの措置を講じる努力義務があります。","p":"努力義務（65歳までの雇用確保措置は義務）。就業確保措置は5つ：①定年引上げ、②継続雇用制度、③定年廃止、④業務委託契約、⑤社会貢献事業従事。④⑤は「創業支援等措置」。","f":"","pg":0},{"r":"障害者雇用促進法35条","t":"障害者に対する差別の禁止","b":"","s":"事業主は、賃金の決定、教育訓練の実施、福利厚生施設の利用その他の待遇について、障害者であることを理由として不当な差別的取扱いをしてはなりません。","e":"「障害者だから昇給させない」「障害者は社員食堂を使えない」という扱いは禁止されています。","p":"禁止されるのは「不当な差別的取扱い」。障害の特性に応じた合理的配慮の提供義務（法36条の3）とセットで出題。","f":"","pg":0},{"r":"障害者雇用促進法36条の2","t":"障害者の募集・採用における均等機会確保措置","b":"","s":"事業主は、障害者の募集・採用において、障害者と障害者でない者との均等な機会の確保の支障となっている事情を改善するため、必要な措置を講じなければなりません。","e":"車いす利用者が面接を受けられるよう、バリアフリーの面接会場を用意したり、視覚障害者向けに応募書類を点字で提供するなどの対応が必要です。","p":"「合理的配慮」の提供義務（募集・採用の場面）。過重な負担となる場合は除外されるが、その理由を説明する義務がある。","f":"","pg":0},{"r":"障害者雇用促進法36条の3","t":"雇用後の合理的配慮","b":"","s":"事業主は、障害者である労働者について、均等な待遇の確保や能力の有効な発揮の支障となっている事情を改善するため、必要な合理的配慮の措置を講じなければなりません。","e":"聴覚障害のある従業員のために手話通訳者を配置したり、発達障害のある従業員に業務手順を図解で示すなどの配慮が必要です。","p":"「合理的配慮」は義務（努力義務ではない）。「過重な負担」にならない範囲で実施。障害者との「話し合い」で具体的内容を決定。","f":"","pg":0},{"r":"障害者雇用促進法38条","t":"障害者雇用率（国・地方公共団体）","b":"","s":"国及び地方公共団体の任命権者は、常時勤務する職員の採用にあたり、障害者雇用率以上の障害者を雇用しなければなりません。公的機関の雇用率は民間企業より高く設定されています。","e":"国の機関の障害者雇用率は2.8%（令和6年4月〜）で、民間企業の2.5%より高い基準が課されています。","p":"障害者雇用率は法定。公的機関の率は民間より高い。除外職員（警察官・自衛官等）の規定もある。","f":"","pg":0},{"r":"障害者雇用促進法53条","t":"障害者雇用納付金制度","b":"","s":"独立行政法人高齢・障害・求職者雇用支援機構は、障害者雇用調整金及び助成金の支給や業務実施に要する費用に充てるため、障害者雇用納付金を徴収します。","e":"法定雇用率を達成していない企業は、不足1人あたり月5万円の納付金を支払います。逆に達成企業には調整金が支給されます。","p":"納付金は「不足1人あたり月5万円」（100人超の企業）。調整金は「超過1人あたり月29,000円」。「罰金」ではなく経済的調整の仕組み。","f":"","pg":0},{"r":"障害者雇用促進法74条の2","t":"在宅就業障害者特例調整金","b":"","s":"厚生労働大臣は、在宅就業障害者の就業機会の確保を支援するため、一定の要件に該当する事業主に在宅就業障害者特例調整金を支給する業務を行わせます。","e":"自宅でデータ入力等の仕事をしている障害者に業務を発注した企業に、特例調整金が支給されます。","p":"在宅就業障害者への支援制度。通常の雇用率制度とは別の仕組み。「在宅就業支援団体」を通じた発注も対象。","f":"","pg":0},{"r":"障害者雇用促進法82条","t":"報告徴収等","b":"","s":"厚生労働大臣または公共職業安定所長は、障害者雇用促進法の施行に必要な限度で、国・地方公共団体の任命権者に報告を求め、助言・指導・勧告をすることができます。","e":"障害者の雇用状況が悪い市役所に対して、厚生労働大臣が改善を勧告することがあります。","p":"公的機関に対する監督権限。民間企業への報告徴収（法81条）とは別の規定。","f":"","pg":0},{"r":"障害者雇用促進法46条","t":"障害者雇入れ計画の作成命令","b":"","s":"厚生労働大臣は、法定雇用障害者数未満の事業主に対して、障害者の雇入れに関する計画の作成を命じることができます。計画が不十分な場合は変更を命じ、勧告にも従わなければ企業名を公表できます。","e":"法定雇用率を大幅に下回っている大企業に対して、「3年間で何人障害者を雇用するか計画を出しなさい」と命令し、改善しなければ会社名を公表します。","p":"段階：計画作成命令→計画変更命令→適正実施勧告→企業名公表。公表までの流れが頻出。","f":"","pg":0},{"r":"障害者雇用促進法47条","t":"雇入れ計画の勧告不遵守の公表","b":"","s":"厚生労働大臣は、障害者雇入れ計画を作成した事業主が、正当な理由なく勧告に従わないときは、その旨を公表できます。","e":"「障害者を今年中に10人雇用しなさい」という勧告に従わない企業の名前が公表されることがあります。","p":"「正当な理由がなく勧告に従わないとき」に公表。法46条の計画作成命令→勧告→公表の流れの最終段階。","f":"","pg":0},{"r":"障害者雇用促進法77条","t":"障害者雇用の認定（もにす認定）","b":"","s":"厚生労働大臣は、常時雇用する労働者の数が300人以下の事業主からの申請に基づき、障害者の雇用促進及び安定に関する取組が優良であると認定することができます。","e":"従業員200人の中小企業が障害者雇用に積極的に取り組んでいる場合、厚生労働大臣から「もにす認定」を受けることができます。","p":"対象は「常時300人以下」の中小企業。「もにす認定」と呼ばれる。認定マークを使用できる（法77条の2）。","f":"","pg":0},{"r":"障害者雇用促進法77条の2","t":"認定マークの使用","b":"","s":"もにす認定を受けた事業主は、商品や広告、求人票等に認定マークを表示することができます。","e":"もにす認定を受けた会社は、自社のウェブサイトや名刺に認定マークを付けて、障害者雇用に積極的な企業であることをアピールできます。","p":"認定マークは認定事業主のみ使用可能。不正使用には罰則。企業のブランドイメージ向上に寄与。","f":"","pg":0},{"r":"障害者雇用促進法74条の4","t":"障害者の苦情処理","b":"","s":"事業主は、差別禁止や合理的配慮に関して障害者である労働者から苦情の申出を受けたときは、苦情処理機関に処理を委ねる等、自主的解決を図るよう努めなければなりません。","e":"障害のある従業員が「合理的配慮が不十分だ」と苦情を申し出た場合、会社は苦情処理委員会などで話し合い、自主的に解決を図る努力義務があります。","p":"自主的解決の努力義務。解決しない場合は都道府県労働局長の援助（法74条の6）や調停（法74条の7）を利用。","f":"","pg":0},{"r":"障害者雇用促進法74条の6","t":"障害者の紛争に関する援助","b":"","s":"都道府県労働局長は、障害者と事業主の紛争について、当事者から援助を求められた場合、助言・指導・勧告を行うことができます。","e":"障害のある従業員と会社の間で合理的配慮をめぐるトラブルが解決しない場合、労働局長に助言等を求めることができます。","p":"援助を求めたことを理由とする不利益取扱いは禁止。差別禁止・合理的配慮に関する紛争が対象。","f":"","pg":0},{"r":"障害者雇用促進法74条の7","t":"障害者の紛争に関する調停","b":"","s":"都道府県労働局長は、障害者の紛争（募集・採用の紛争を除く）について、調停の申請があった場合、紛争調整委員会に調停を行わせることができます。","e":"合理的配慮をめぐる紛争が解決しない場合、紛争調整委員会による調停が利用できます。ただし、募集・採用に関する紛争は調停の対象外です。","p":"「募集・採用についての紛争を除く」が重要なひっかけ。調停の対象は在職中の差別・合理的配慮の紛争のみ。","f":"","pg":0},{"r":"職業能力開発促進法15条の7","t":"公共職業能力開発施設","b":"","s":"国及び都道府県は、労働者が段階的・体系的に職業に必要な技能・知識を習得できるように、職業能力開発校、職業能力開発短期大学校等の施設を設置して職業訓練を行います。","e":"都道府県が設置する「ポリテクセンター」（職業能力開発センター）で、離職者向けの溶接や介護等の職業訓練が行われています。","p":"公共職業能力開発施設の種類（職業能力開発校、短期大学校、大学校、障害者職業能力開発校）。国が設置するものと都道府県が設置するものの区分。","f":"","pg":0},{"r":"職業能力開発促進法50条","t":"技能士","b":"","s":"技能検定に合格した者は「技能士」と称することができます。技能検定に合格していない者が技能士と称することは禁止されています。","e":"ファイナンシャル・プランニング技能検定に合格した人は「FP技能士」と名乗れます。合格していないのに名乗ると法律違反です。","p":"「名称独占」の資格（業務独占ではない）。合格していない者の名称使用は「30万円以下の罰金」。技能検定の等級（特級、1級〜3級等）も出題される。","f":"","pg":0},{"r":"職業能力開発促進法15条の4","t":"ジョブ・カード制度","b":"","s":"国は、労働者の職業生活設計に即した自発的な職業能力の開発・向上を促進するため、職務経歴、職業能力等を明らかにする書類（ジョブ・カード）の普及に努めます。","e":"ジョブ・カードは職務経歴や取得資格、職業訓練の受講歴などをまとめた「生涯を通じたキャリア・プランニングツール」です。求職活動や職業訓練の際に活用されます。","p":"ジョブ・カードは職業能力開発促進法に基づく制度。職業能力証明、キャリア・プランニング、求職活動の3つの機能。国の努力義務。","f":"","pg":0}],"健康保険法":[{"r":"法1条","t":"健康保険法の目的","b":"健康保険法 は、 労働者 又はその 被扶養者 の業務災害 （労働者災害補償保険法第7条第1項第1 号に規定する業務災害をいう。） 以外の疾病 、負傷 若しくは 死亡 又は 出産 に関して 保険給 付を行い、もって 国民の生活の安定 と福祉の向上 に寄与することを 目的とする。 目的","s":"健康保険法は、会社員やその扶養家族が、仕事中のケガ（労災）以外の病気・ケガ・死亡・出産について、保険給付を行うことを目的とした法律です。つまり、プライベートでの病気やケガをカバーする制度です。","e":"会社員のAさんが休日にスキーで骨折した場合、健康保険から療養の給付（3割負担で治療）を受けられます。一方、仕事中に工場で骨折した場合は労災保険の対象なので、健康保険は使えません。","p":"「業務災害以外」の疾病・負傷・死亡・出産が対象。労災との区別が頻出。「被扶養者」も対象に含まれること、「出産」も保険事故に含まれることを押さえる。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":2},{"r":"法2条","t":"基本理念","b":"健康保険制度 については、これが 医療保険制度 の基本をなすもの であることにかんがみ、 高齢化の進 展、疾病構造の変化 、社会経済情勢の変化 等に対応し、その他の 医療保険制度 及び 後期高齢者 医療 制度並びにこれらに 密接に関連する 制度と併せてその在り方に関して 常に検討 が加えられ、 その結果に基づき、 医療保険 の運営の効率化 、給付の内容 及び 費用の負担 の適正化 並びに国民 が受ける 医療の質の向上 を総合的に図りつつ、実施されなければならない。 基本的理念","s":"健康保険制度は医療保険制度の基本であり、高齢化や社会変化に対応して、運営の効率化、給付の内容・費用負担の適正化を進め、国民の共同連帯の理念に基づいて運営されるべきものです。","e":"高齢者が増えて医療費が膨らむ中、健康保険制度は時代に合わせて見直しを続けています。例えば、70歳以上の窓口負担割合の見直しなどは、この基本理念に基づく改正です。","p":"理念規定であり罰則なし。「医療保険制度の基本をなすもの」「国民の共同連帯の理念」がキーワード。2002年改正で追加された条文。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":10},{"r":"法204条","t":"日本年金機構への事務委任","b":"◯1 所定の 厚生労働大臣 の権限に係る事務 は、 日本年金機構 （以下「機構」という。）に行わせる ものとする。ただし、この 権限の一部 は、 厚生労働大臣 が自ら行うことを妨げない 。","s":"健康保険に関する厚生労働大臣の権限に係る事務の一部は、日本年金機構（機構）に行わせることができます。ただし、厚生労働大臣が自ら行うこともできます。","e":"被保険者の資格取得届の受理や標準報酬月額の決定などの事務は、年金事務所（日本年金機構）が行っています。厚生労働大臣が全部自分でやるのは現実的でないため、機構に委任しています。","p":"機構への事務委任は「行わせるものとする」（義務的委任）だが、厚生労働大臣が自ら行うことを妨げない。健保組合に係る事務は委任されない。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":13},{"r":"法205条の2","t":"機構への事務委任（届出の受理等）","b":"◯1 厚生労働大臣 は、 機構 に、所定の事務を行わせる ものとする。 日本年金機構への厚生労働大臣の権限に係る事務の委任 所定の厚生労働大臣の権限に係る事務 は、日本年金機構 に行わせるものとする。ただし、この 権限の一部 は、厚生労働大臣 が自ら行う ことを妨げない。（法204条1項） 日本年金機構に行わせる厚生労働大臣の権限に係る事務（主なもの） 1. 被保険者の資格の得喪の確認（4号） 2. 標準報酬月額 、標準賞与額の決定（5号） 3. 国税滞納処分の例による処分（16号） 4. R07-02ｳ 被保険者資格 、標準報酬または保険料に関する立入検査など （健康保険組合に係る場合を除く） （19号）","s":"厚生労働大臣は、届出の受理など所定の事務を日本年金機構に行わせるものとされています。","e":"会社が従業員の健康保険の資格取得届を提出する場合、届出先は年金事務所（日本年金機構）です。これは厚生労働大臣の事務が機構に委任されているためです。","p":"届出の受理、届書の送付等の具体的な事務が機構に委任されている。法204条と合わせて出題される。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":13},{"r":"法204条の4","t":"滞納処分等実施規程","b":"◯1 機構は、滞納処分等実施規程 を定め、 厚生労働大臣 の認可 を受けなければならない。これを変 更しようとするときも、同様とする。 日本年金機構が行う滞納処分等 R07-08B 日本年金機構 は、滞納処分等を行う 場合には、 あらかじめ 、厚生労働大臣 の認可を受けるととも に、滞納処分等実施規程 に従い、 徴収職員 に行わせなければならない。（法204条の3第1項） 徴収職員 は、滞納処分等に係る法令に関する知識並びに実務に必要な知識及び能力を有する日本年金機構の 職員のうちから、 厚生労働大臣 の認可を受けて、 日本年金機構 の理事長 が任命する。（法204条の3第2項、厚 生年金保険法100条の6第2項） 日本年金機構 は、滞納処分等 をしたときは、 速やかに 、その 結果を厚生労働大臣 に報告しなければならな い。（法204条の3第2項、厚生年金保険法100条の6第3項） 日本年金機構 は、滞納処分等実施規程 を定め、 厚生労働大臣 の認可を受けなければならない。これを変更し ようとするときも、同様とする。（法204条の4第1項）","s":"日本年金機構が滞納処分等を行う場合には、あらかじめ滞納処分等実施規程を定めて厚生労働大臣の認可を受けなければなりません。変更時も同様です。","e":"保険料を滞納している事業所に対して機構が差押えなどの滞納処分を行う際は、事前に定めた規程に従って実施します。勝手なやり方で処分することはできません。","p":"「あらかじめ」「厚生労働大臣の認可」が必要。変更時も認可が必要。厚生年金保険法の規定が準用される。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":17},{"r":"法204条の2","t":"滞納処分等に係る財務大臣への権限委任","b":"◯1 厚生労働大臣 は、 滞納処分等 その他の処分に係る 納付義務者 が滞納処分等 その他の 処分の執行を免 れる目的 でその 財産について 隠ぺい している おそれ があることその他の政令で定める事情があるため 保険料 そ の他健康保険法の規定による 徴収金の効果的な徴収を行う 上で必要があると認めるときは、 財務大臣 に、当該 納付義務者 に関する情報その他必要な 情報を提供する とともに、当該 納付義務者 に係る 滞納処分 等その他の処分の 権限の全部又は一部 を委任 することが できる 。 財務大臣への権限の委任 厚生労働大臣 は、滞納処分等 その他の処分に係る 納付義務者が滞納処分等その他の処分の執行を免れる目的 でその 財産について隠ぺいしているおそれがある ことその他の政令で定める事情があるため 保険料 その他健康 保険法の規定による 徴収金の効果的な徴収を行う 上で必要があると認めるとき は、財務大臣 に、当該 納付義務 者に関する情報その他必要な 情報を提供する とともに、当該 納付義務者 に係る 滞納処分等その他の処分の権限 の全部または一部を委任することができる 。（法204条の2第1項）","s":"保険料の滞納者が財産を隠すなど処分逃れをしている場合、厚生労働大臣は財務大臣に滞納処分等の権限を委任できます。","e":"悪質な滞納者が財産を隠ぺいしている場合、厚生労働大臣は国税庁のノウハウを持つ財務大臣に滞納処分を任せることができます。国税徴収のプロの力を借りるイメージです。","p":"財務大臣への権限委任は「できる」規定（任意的委任）。対象は「財産の隠ぺい」等の悪質ケース。厚生年金保険法と同様の仕組み。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":19},{"r":"法204条の7","t":"協会による立入検査等","b":"◯1 第198条第1項（ 立入検査等 ）の規定による 厚生労働大臣 の命令並びに質問及び検査 の権限（ 健 康保険組合 に係る場合を 除き、保険給付 に関するものに 限る。）に係る 事務は、 協会 に行わせる ものとする。ただし、当該権限は、厚生労働大臣が自ら行うことを妨げない。","s":"立入検査等に関する厚生労働大臣の権限のうち、健康保険組合に係るものを除き、保険給付に関するものは全国健康保険協会（協会）に行わせることができます。","e":"協会けんぽの被保険者に対する保険給付の調査のために、協会の職員が事業所に立ち入って帳簿を検査することがあります。","p":"「健康保険組合に係る場合を除く」「保険給付に関するもの」が協会に委任される範囲。協会に委任できるのは限定的。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":21},{"r":"法204条の8","t":"協会の立入検査等に係る認可","b":"◯1 協会 は、第204条の7条第1項に規定する権限に係る事務を行う場合には、 あらかじめ 、厚生労働 大臣 の認可 を受けなければならない。 健康保険法・国民年金法、厚生年金保険法により悪質な滞納者の要 件は異なります。（1-8-1参照）（1-9-1参照）","s":"協会が立入検査等の権限に係る事務を行う場合には、あらかじめ厚生労働大臣の認可を受けなければなりません。","e":"協会けんぽが不正受給の疑いがある被保険者を調査するために立入検査を実施する場合、事前に厚生労働大臣の認可が必要です。","p":"「あらかじめ」厚生労働大臣の認可が必要。事後認可ではない点に注意。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":21},{"r":"法205条","t":"権限の委任（地方厚生局長等）","b":"◯1 健康保険法 に規定する 厚生労働大臣 の権限（第204条の2第1項及び同条第2項において準用する厚 生年金保険法第100条の5第2項に規定する財務大臣に委任することができる厚生労働大臣の権限を除く。） は、 地方厚生局長 に委任することができる。 ◯2 前項の規定により 地方厚生局長 に委任された権限は、 地方厚生支局長 に委任することができ る。 地方厚生局長等への権限の委任 健康保険法に規定する 厚生労働大臣 の権限 のうち次に掲げるものは、 地方厚生局長 に委任することができ る。（令32条1項、則159条1項） 厚生労働大臣は 、事業主による不正事案が発生した場合 、立入調査 を行うことができます 。この権限に係る 被保険者資格 、標準報酬 、保 険料についての事務は 「日本年金機構 」に、保険給付 についての事務 は「全国健康保険協会 」に委任されています 。","s":"健康保険法に規定する厚生労働大臣の権限は、一部を地方厚生局長に委任することができ、さらに地方厚生支局長に再委任することもできます。","e":"健康保険組合の設立認可などの権限は、厚生労働大臣から地方厚生局長に委任されており、実際の手続きは管轄の地方厚生局で行います。","p":"委任先は「地方厚生局長」、再委任先は「地方厚生支局長」。財務大臣への委任に係る権限は除かれる。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":23},{"r":"法205条の4","t":"情報の提供等（データヘルス関連）","b":"◯1 保険者 は、第76条第5項（第85条第9項、第85条の2第5項、第86条第4項、第110条第7項及び第149 条において準用する場合を含む。第1号において同じ。）及び第88条第11項（第111条第3項及び第149条に おいて準用する場合を含む。同号において同じ。）に規定する事務のほか、所定の 事務を社会保険診療報 酬支払基金 （「基金」という。）又は 国民健康保険団体連合会 （「国保連合会 」という。）に 委託す ることができる。 基金などへの事務の委託 R03-02E 保険者 は、所定の 事務を社会保険診療報酬支払基金 または 国民健康保険団体連合会 に委託すること ができる。（法205条の4第1項）（1-7-17参照） R03-02E 委託することができる事務には、例えば、療養費、出産 育児一時金、家族出産育児一時金並びに高額療養費及び高額介護合算 療養費の支給などの事務が該当します。（則159条の7） 「社会保険診療報酬支払基金」は、保険医療機関などからの診療に 係る医療費の請求が正しいか審査したうえで、保険者などに診療報酬 を請求し、保険者から支払われた医療費を保険医療機関へ支払いをす る仕事をしています。診療報酬支払基金創設以前においては、審査と 支払事務が別々に行われていたため、支払遅延などが問題となり、審 査・支払を一元的に行うための機関として創設されました。（社会保 険診療報酬支払基金HP） 国民健康保険団体連合会 （国保連 、国保連合会と称することもあり ます）は、各都道府県に1団体 、計47団体 が設立されています 。（1-","s":"保険者は、被保険者の健康の保持増進のために必要な情報を提供したり、事業主に対して被保険者の健康管理に関する情報提供を求めることができます。","e":"健康保険組合が、加入者の健診結果をもとに生活習慣病のリスクが高い人にアドバイスを送ったり、事業主に従業員の健康管理状況のデータ提供を求めることができます。","p":"保険者による「データヘルス」の推進に関する規定。事業主への情報提供の求めは「できる」規定。","f":"01_健康保険法1-総則（目的、権限の委任等）","pg":26},{"r":"法4条","t":"保険者","b":"健康保険 （日雇特例被保険者の保険を除く。）の 保険者 は、 全国健康保険協会 及び 健康保険組合 とする。","s":"健康保険（日雇特例被保険者の保険を除く）の保険者は、「全国健康保険協会（協会けんぽ）」と「健康保険組合」の2種類です。","e":"大企業に勤めるBさんの保険者は会社が設立した健康保険組合、中小企業に勤めるCさんの保険者は協会けんぽです。日雇労働者の保険は別途、協会が行います。","p":"保険者は「全国健康保険協会」と「健康保険組合」の2つ。日雇特例被保険者の保険は除かれる（法123条で別途規定）。国は保険者ではない。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":2},{"r":"法123条","t":"日雇特例被保険者の保険者","b":"◯1 日雇特例被保険者 の保険の 保険者 は、 協会 とする。 保険者の種類","s":"日雇特例被保険者の保険の保険者は、全国健康保険協会（協会）です。","e":"建設現場で日雇いとして働くDさんの健康保険は、協会けんぽが保険者として運営します。健康保険組合ではありません。","p":"日雇特例被保険者の保険者は「協会」のみ。健康保険組合は日雇特例被保険者の保険を行わない。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":2},{"r":"法5条","t":"協会の管掌","b":"◯1 全国健康保険協会 は、健康保険組合の組合員でない被保険者 （日雇特例被保険者を除く 。）の保険 を管掌する。","s":"全国健康保険協会は、健康保険組合の組合員でない被保険者（日雇特例被保険者を除く）の保険を管掌します。","e":"健康保険組合のない中小企業で働くEさんは、自動的に協会けんぽの被保険者になります。大企業の健康保険組合に入っている人や日雇い労働者は除きます。","p":"協会けんぽは「健康保険組合の組合員でない被保険者」が対象。日雇特例被保険者は除く。消去法的に残った被保険者を管掌する。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":4},{"r":"法6条","t":"健康保険組合の管掌","b":"健康保険組合 は、その 組合員である被保険者 の保険を 管掌する。 管掌の区分 全国健康保険協会 は、健康保険組合の組合員でない被保険者 （日雇特例被保険者を除く ）の保険を 管掌す る。（法5条1項） 健康保険組合 は、その 組合員である被保険者 の保険を 管掌する。（法6条） 2以上の事業所に使用される場合①（保険者の選択） 被保険者 は、原則として、 同時に 2以上の事業所 に使用される場合 において、「 保険者 」が2以上ある とき は、その被保険者の保険を管掌する 保険者 を選択しなければならない。（法7条、則1条の3第1項） 全国健康保険協会が管掌する健康保険を 「協会管掌健康保険 （協会 けんぽ ）」と、健康保険組合が管掌する健康保険を 「組合管掌健康保 険」といいます 。 保険者が2以上あるとき は、被保険者が保険を管掌する保険者を選 択する こととなるため 、「選択した保険者の保険料率 」が適用される ことになります 。","s":"健康保険組合は、その組合員である被保険者の保険を管掌します。","e":"トヨタ健康保険組合は、トヨタグループの従業員（組合員）の健康保険を運営します。組合員でない人の保険は管掌しません。","p":"健康保険組合は「その組合員である被保険者」のみを管掌。協会との管掌の区分を明確にする規定。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":4},{"r":"法7条の2","t":"全国健康保険協会の設立","b":"◯1 健康保険組合の組合員でない被保険者 に係る健康保険事業を行うため、 全国健康保険協会 （以下 「協会」という。）を設ける。 全国健康保険協会 健康保険組合の組合員でない被保険者 に係る健康保険事業を行うため、 全国健康保険協会 が設けられてい る。（法7条の2第1項） 全国健康保険協会の業務のうち厚生労働大臣が行う業務 は、「厚生 年金保険と重複する業務 」です。「任意継続被保険者 」は厚生年金保 険には存在しないため 、厚生労働大臣ではなく 、原則通り 、「全国健 康保険協会 」が行います 。 全国健康保険協会の業務（法7条の2第2項・3項） 1. 保険給付 及び日雇特例被保険者に係る保険給付 に関する業務 2. 保健事業 及び福祉事業 に関する業務 3. 全国健康保険協会が管掌する健康保険の事業に関する業務 であって 厚生労働大臣が行う業務以外 のもの 4. 日雇特例被保険者の保険の事業に関する業務 であって 厚生労働大臣が行う業務以外 のもの 5. 法204条の7第1項に規定する権限に係る事務に関する業務（立入検査などに係る業務） 6. 前各号に掲げる業務に附帯する業務 2026改正 全国健康保険協会 は、船員保険法の規定による 船員保険事業に関する業務 （厚生労働大臣が行うも のを除く）並びに 前期高齢者納付金等 並びに 後期高齢者支援金 、後期高齢者関係事務費拠出金 及び出産育児関係 事務費拠出金 （後期高齢者支援金等 ）、介護納付金 、流行初期医療確保拠出金等 並びに 子ども・子育て支援納付 金の納付に関する業務 を行う。","s":"健康保険組合の組合員でない被保険者に係る健康保険事業を行うため、全国健康保険協会を設けます。","e":"以前は政府（社会保険庁）が管掌していた政府管掌健康保険が、2008年10月から全国健康保険協会（協会けんぽ）に移管されました。","p":"協会は2008年（平成20年）10月1日に設立。それ以前は政府管掌健康保険だった。設立の沿革が出題されることがある。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":11},{"r":"法7条の9","t":"協会の役員","b":"協会に、役員として、 理事長 1人 、理事 6人 以内及び 監事 2人 を置く。","s":"全国健康保険協会には、理事長1人、理事6人以内、監事2人の役員を置きます。","e":"協会けんぽのトップは理事長1人で、その下に最大6人の理事がいて、2人の監事が業務を監査します。","p":"理事長「1人」、理事「6人以内」、監事「2人」の数字が頻出。理事の定数は「以内」であることに注意。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":16},{"r":"法7条の11","t":"役員の任命","b":"◯1 理事長 及び 監事 は、 厚生労働大臣 が任命する。 ◯2 厚生労働大臣 は、前項の規定により 理事長を任命 しようとするときは、あらかじめ、第7条の18第1項 に規定する 運営委員会 の意見を聴かなければならない。 ◯3 理事は、 理事長 が任命する。","s":"理事長と監事は厚生労働大臣が任命します。理事長の任命にあたっては、あらかじめ運営委員会の意見を聴かなければなりません。理事は理事長が任命します。","e":"協会けんぽの理事長は厚生労働大臣が選んで任命しますが、その前に運営委員会の意見を聴きます。理事は理事長が自分で選んで任命します。","p":"理事長・監事→厚生労働大臣が任命、理事→理事長が任命。理事長任命時は「あらかじめ運営委員会の意見を聴く」。任命権者の違いが頻出。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":16},{"r":"法7条の23","t":"職員の任命","b":"協会の 職員は、 理事長 が任命する。 役員の任命 理事長 及び監事は、厚生労働大臣 が任命する。（法7条の11第1項） R05-01C 理事長に事故がある とき、または理事長が欠けたとき は、理事のうちから 、あらかじめ 「理事長が指定する者 」がその 職務 を代理し、またはその職務を行います 。（法7条の10第2項） 「理事のうち 、あらかじめ理事長が指定する者 」が職務を代理等し ます。「理事の互選により選ばれた者 」ではありません 。","s":"協会の職員は、理事長が任命します。","e":"協会けんぽの一般職員の採用や人事異動は、すべて理事長の権限で行われます。","p":"職員の任命は「理事長」。役員の任命権者（理事長・監事→厚生労働大臣、理事→理事長）と混同しないこと。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":16},{"r":"法7条の27","t":"事業計画・予算","b":"協会 は、毎事業年度 、事業計画及び予算を作成 し、当該 事業年度開始前 に、厚生労働大臣 の認 可を受けなければならない。これを変更しようとするときも、同様とする。","s":"協会は毎事業年度、事業計画と予算を作成し、当該事業年度の開始前に厚生労働大臣の認可を受けなければなりません。変更時も同様です。","e":"協会けんぽは4月から始まる新年度の予算を、3月末までに厚生労働大臣の認可を受けて確定させます。途中で予算を変更する場合も認可が必要です。","p":"事業計画・予算は「事業年度開始前」に「厚生労働大臣の認可」。健康保険組合の予算は「届出」であるのに対し、協会は「認可」である点の違いが出題される。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":22},{"r":"法7条の28","t":"決算・財務諸表","b":"◯1 協会は、毎事業年度 の決算 を翌事業年度 の5月31日 までに 完結しなければならない。 ◯2 協会は、毎事業年度 、貸借対照表 、損益計算書 、利益の処分又は損失の処理に関する書類その他厚生労 働省令で定める書類及びこれらの附属明細書（以下「 財務諸表 」という。）を 作成し、これに当該事業年度の 事業報告書及び決算報告書を添え、 監事及び会計監査人の意見 を付けて、 決算完結後 2月以内 に厚生労働 大臣に提出 し、その 承認 を受けなければならない。 事業計画、予算、財務諸表 全国健康保険協会 は、毎事業年度 、事業計画及び予算を作成 し、当該 事業年度開始前 に、厚生労働大臣 の認 可を受けなければならない。これを変更しようとするときも、同様とする。（法7条の27） 全国健康保険協会 は、毎事業年度 の決算を翌事業年度 の5月31日までに 完結しなければならない。 全国健康保険協会 は、毎事業年度 、貸借対照表 、損益計算書 、利益の処分または損失の処理に関する書類そ の他厚生労働省令で定める書類及びこれらの附属明細書（ 財務諸表 ）を作成し、これに当該事業年度の 事業報 告書及び決算報告書を添え 、監事及び会計監査人の意見 を付けて、 決算完結後 2か月以内 に厚生労働大臣 に提出 し、その 承認を受けなければならない。（法7条の28第2項） R06-02D 全国健康保険協会 は、財務諸表、事業報告書（会計に関する部分に限る）及び決算報告書につい て、監事の監査 のほか、厚生労働大臣が選任する 会計監査人である 公認会計士または監査法人から監査 を受け なければならない。（法7条の29第1〜3項） 全国健康保険協会 は、別に厚生労働大臣が定めるところにより、 毎月の事業状況 を翌月末日まで に厚生労働 大臣に報告 しなければならない。（則2条の8）","s":"協会は毎事業年度の決算を翌事業年度の5月31日までに完結し、財務諸表を作成して厚生労働大臣の承認を受けなければなりません。","e":"2025年度の決算は、2026年5月31日までに完結させ、貸借対照表や損益計算書などを厚生労働大臣に提出して承認を受けます。","p":"決算完結期限は「翌事業年度の5月31日」。財務諸表は厚生労働大臣の「承認」（認可ではない）。予算は「認可」、決算は「承認」の違いに注意。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":22},{"r":"法7条の30","t":"業績評価","b":"◯1 厚生労働大臣 は、協会の事業年度ごとの業績 について、 評価 を行わなければならない。 ◯2 厚生労働大臣 は、前項の 評価を行ったときは、 遅滞なく 、協会に対し、当該 評価の結果 を通知す るとともに、これを 公表 しなければならない。 業績評価 厚生労働大臣 は、全国健康保険協会の 事業年度ごと の業績について、 評価を行わなければならない。（法7条 の30第1項） R06-01A 厚生労働大臣 は、評価を行ったときは、 遅滞なく 、全国健康保険協会 に対し、当該 評価の結果 を通 知する とともに、これを 公表しなければならない 。（法7条の30第2項） 業績の評価を行い 、公表するのは 、「厚生労働大臣 」です。 「全 国健康保険協会 」や「全国健康保険協会の理事長 」ではありません 。","s":"厚生労働大臣は、協会の事業年度ごとの業績について評価を行い、遅滞なく結果を協会に通知し、公表しなければなりません。","e":"厚生労働大臣が協会けんぽの1年間の運営実績を評価し、「保険料の収納率は目標を達成した」「特定健診の受診率は改善が必要」などの結果を公表します。","p":"業績評価は「遅滞なく」通知・公表。評価を行うのは厚生労働大臣自身であること。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":25},{"r":"法160条の3","t":"準備金の積立て","b":"保険者 は、健康保険事業 に要する 費用の支出 に備えるため、 毎事業年度末 において、 準備金 を積み立 てなければならない。","s":"保険者は、健康保険事業に要する費用の支出に備えるため、毎事業年度末において準備金を積み立てなければなりません。","e":"協会けんぽも健康保険組合も、将来の医療費の支払いに備えて、年度末に一定額の準備金を積み立てておく義務があります。","p":"「毎事業年度末」に準備金を積み立てる義務。準備金の積立ては保険者の義務規定。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":26},{"r":"令46条","t":"準備金の積立基準（協会）","b":"◯1 協会は、毎事業年度末 において、当該 事業年度 及び その直前の二事業年度内 において行った 保険給付に要した費用 の額（ 前期高齢者納付金等 、後期高齢者支援金等 及び日雇拠出金 、介護納付金 並 びに流行初期医療確保拠出金等 の納付に要した費用の額（前期高齢者交付金がある場合には、これを控除した 額）を 含み、出産育児交付金の額 並びに法第153条及び第154条の規定による 国庫補助の額 を除く。）の 一事 業年度当たりの平均額 の12分の1 に相当する額に達するまでは、当該事業年度の 剰余金 の額を 準備 金として 積み立て なければならない。 準備金 保険者 は、健康保険事業 に要する 費用の支出 に備えるため、 毎事業年度末 において、 準備金 を積み立て なけ ればならない。（法160条の3）","s":"協会は毎事業年度末において、当該事業年度とその直前の2事業年度内に行った保険給付に要した費用の額等の合計額の12分の1に相当する額を準備金として積み立てなければなりません。","e":"過去3年間の保険給付費等の平均の1か月分を準備金として確保するイメージです。年間の給付費が1200億円なら、100億円を準備金として積み立てます。","p":"積立基準は「当該事業年度及びその直前の2事業年度」の3年間の費用の「12分の1」。3年間の平均月額相当がポイント。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":26},{"r":"法7条の31","t":"短期借入金","b":"◯1 協会は、その 業務に要する費用に充てる ため必要な場合において、 厚生労働大臣 の認可 を受けて、 短期借入金 をすることができる。 ◯2 前項の規定による 短期借入金 は、 当該事業年度内 に償還しなければならない。ただし、資金の不足 のため 償還することができない ときは、その 償還することができない金額 に限り、厚生労働大臣 の認可 を受けて、これを 借り換える ことができる。 ◯3 前項ただし書の規定により 借り換えた短期借入金 は、 1年以内 に償還しなければならない。 借入金 全国健康保険協会 は、その業務に要する費用に充てるため必要な場合において、 厚生労働大臣 の認可を受け て、短期借入金 をすることができる。（法7条の31第1項） R02-07B 短期借入金 は、当該事業年度内 に償還しなければならない。ただし、資金の不足のため 償還するこ とができない ときは、その 償還することができない金額に限り 、厚生労働大臣 の認可を受けて、これを 借り換 えることができる 。（法7条の31第2項） R02-07B 借り換えた短期借入金 は、1年以内 に償還しなければならない。（法7条の31第3項） 短期借入金をする場合には 、「厚生労働大臣の認可 」が必要であ り、あらかじめ 「厚生労働大臣と協議 」するのではありません 。 短期借入金をする場合において 、「運営委員会の議 」を必要とする 規定はありません 。","s":"協会は、業務に要する費用に充てるため必要な場合、厚生労働大臣の認可を受けて短期借入金をすることができます。短期借入金は当該事業年度内に償還しなければなりません。","e":"協会けんぽが一時的に資金不足になった場合、厚生労働大臣の認可を得て銀行から短期の借入れを行えます。ただし、その年度内に返済しなければなりません。","p":"短期借入金は「厚生労働大臣の認可」が必要。「当該事業年度内に償還」が原則。借換えは可能だが、借換えた短期借入金は1年以内に償還しなければならない。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":30},{"r":"法7条の33","t":"余裕金の運用","b":"協会の業務上の 余裕金の運用 は、事業の目的及び資金の性質 に応じ、 安全 かつ 効率的 にしなけれ ばならない。 余裕金の運用 全国健康保険協会 の業務上の 余裕金の運用 は、事業の目的及び資金の性質に応じ 、安全かつ効率的 にしなけ ればならない。（法7条の33） R03-02D 全国健康保険協会 は、次の方法による場合を除くほか 、業務上の余裕金を運用してはならない 。 （令1条の2） 余裕金の運用 1. 国債、地方債 、政府保証債その他厚生労働大臣の指定する 有価証券の取得 2. 銀行その他厚生労働大臣の指定する 金融機関への預金 3. 信託業務を営む金融機関への 金銭信託 余裕金の運用には 、上記3つの方法が認められています 。「信託業 務を営む金融機関への金銭信託は認められてない 」のではありませ ん。","s":"協会の業務上の余裕金の運用は、事業の目的と資金の性質に応じ、安全かつ効率的にしなければなりません。","e":"協会けんぽの余裕資金を運用する場合、ハイリスクな株式投資などではなく、国債購入など安全性の高い方法で運用しなければなりません。","p":"「安全」かつ「効率的」の2要件。健康保険事業の公共性から、安全性が重視される。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":31},{"r":"法7条の34","t":"重要な財産の処分","b":"協会は、厚生労働省令で定める 重要な財産 を譲渡し、又は 担保に供し ようとするときは、 厚生労働大臣 の 認可 を受けなければならない。 重要な財産の処分 全国健康保険協会 は、厚生労働省令で定める 重要な財産を譲渡し 、または担保に供しようとするとき は、厚 生労働大臣 の認可を受けなければならない。（法7条の34） 役員の報酬など R06-08D 全国健康保険協会 の役員に対する報酬及び退職手当 は、その役員の業績が考慮されるものでなけれ ばならず、全国健康保険協会は、その役員に対する報酬及び退職手当の 支給の基準 を定め、これを 厚生労働大 臣に届け出る とともに、 公表しなければならない。これを変更したときも、同様とする。（法7条の35） 厚生労働大臣の 「認可」を必要とします 。「報告」では足りませ ん。 支給の基準を定め 、厚生労働大臣に届け出ます 。「厚生労働大臣の 承認を受け る」ことまでは要求されません 。","s":"協会は、厚生労働省令で定める重要な財産を譲渡し、又は担保に供しようとするときは、厚生労働大臣の認可を受けなければなりません。","e":"協会けんぽが所有する土地や建物を売却したり、担保に入れたりする場合は、事前に厚生労働大臣の認可が必要です。","p":"「重要な財産」の処分には「厚生労働大臣の認可」が必要。日常的な物品購入などは対象外。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":32},{"r":"法7条の39","t":"監督（協会への是正命令等）","b":"◯1 厚生労働大臣 は、協会の事業若しくは 財産の管理若しくは執行 が法令、定款若しくは厚生労働大臣の 処分に違反している と認めるとき、 確保すべき収入 を不当に確保せず 、不当に経費を支出 し、 若しくは 不当に財産を処分 し、その他協会の 事業若しくは 財産の管理若しくは執行 が著しく適正を欠 くと認めるとき、又は 協会の役員 がその 事業若しくは財産の管理若しくは執行 を明らかに怠っている と認めるときは、期間を定めて、 協会又はその役員 に対し、その 事業若しくは財産の管理若しくは執行 につい て違反の是正 又は 改善のため必要な措置 を採るべき旨を 命ずる ことができる。 監督 国庫負担の割合が高いため 、財務大臣と協議する必要があります 。 協議をする相手は 「財務大臣 」であり 、「運営委員会 」ではありま せん。","s":"厚生労働大臣は、協会の事業・財産の管理が法令等に違反しているとき等には、期限を定めて是正措置を命ずることができます。","e":"協会けんぽが法令に違反した運営をしていた場合、厚生労働大臣は「○月○日までに是正しなさい」と命令を出すことができます。","p":"監督権の発動要件として「法令等への違反」「確保すべき収入の不当な確保」「不当な支出」がある。是正命令は「期限を定めて」行う。","f":"02_健康保険法2-保険者（全国健康保険協会）","pg":34},{"r":"法8条","t":"健康保険組合の組織","b":"健康保険組合 は、適用事業所 の事業主 、その 適用事業所に使用される 被保険者 及び 任意継続被 保険者 をもって 組織する。","s":"健康保険組合は、適用事業所の事業主、その適用事業所に使用される被保険者、及び任意継続被保険者をもって組織します。","e":"A社の健康保険組合は、A社の社長（事業主）、A社で働く従業員（被保険者）、退職後に任意継続している元従業員で構成されています。","p":"組合を構成するのは「事業主」「被保険者」「任意継続被保険者」の3者。日雇特例被保険者は含まれない。事業主も組合の構成員であることに注意。","f":"03_健康保険法3-保険者（健康保険組合）","pg":2},{"r":"法9条","t":"健康保険組合の法人格","b":"◯1 健康保険組合 は、 法人 とする。 組合の構成など","s":"健康保険組合は法人です。","e":"健康保険組合は法人格を持つため、独自に契約を締結したり、財産を所有したり、訴訟の当事者になることができます。","p":"健康保険組合は「法人」。全国健康保険協会も「法人」（法7条の2）。どちらも法人格を有する。","f":"03_健康保険法3-保険者（健康保険組合）","pg":2},{"r":"法12条","t":"健康保険組合の設立（任意設立）","b":"◯1 適用事業所の事業主 は、健康保険組合を設立 しようとするときは、 健康保険組合 を設立しようとする 適 用事業所 に使用される被保険者 の2分の1以上 の同意を得て、 規約を作り、 厚生労働大臣 の認可 を受 けなければならない。 ◯2 2以上 の適用事業所 について 健康保険組合 を設立しようとする場合においては、前項の 同意は、 各適 用事業所 について得なければならない。 組合の任意設立","s":"適用事業所の事業主は、被保険者の2分の1以上の同意を得て規約を作り、厚生労働大臣の認可を受けて健康保険組合を設立できます。単一事業所は常時700人以上、複数事業所は合算で3,000人以上の被保険者が必要です。","e":"従業員800人の会社が健康保険組合を作りたい場合、400人以上の同意を得て規約を作り、厚生労働大臣の認可を受ければ設立できます。","p":"同意要件は被保険者の「2分の1以上」。人数要件は単一で「700人以上」、複数で「3,000人以上」。設立には厚生労働大臣の「認可」が必要。","f":"03_健康保険法3-保険者（健康保険組合）","pg":4},{"r":"法14条","t":"健康保険組合の設立命令（強制設立）","b":"◯1 厚生労働大臣 は、1又は2以上 の適用事業所 について常時 政令で定める数以上の被保険者を使用する 事業 主に対し、 健康保険組合の設立 を命ずる ことができる。 ◯2 前項の規定により 健康保険組合の設立を命ぜられた事業主 は、規約を作り、その 設立について 厚生労働 大臣の認可 を受けなければならない。 強制設立 厚生労働大臣 は、1または2以上 の適用事業所 について 常時政令で定める数以上 の被保険者を使用する 事業主 に対し、 健康保険組合の設立 を命ずる ことができる（ 強制設立 ）。（法14条1項） 健康保険組合の強制設立を命ぜられた事業主 は、規約を作り、その 設立について 厚生労働大臣 の認可を受け なければならない。（法14条2項） R02-07D 健康保険組合の強制設立を命ぜられた事業主 が、正当な理由がなくて厚生労働大臣が指定する期日 までに 設立の認可を申請しなかったとき は、その手続の遅延した期間、その負担すべき 保険料額の2倍に相当す る金額以下 の過料に処せられる。（法218条） 法14条の規定による健康保険組合の強制設立は1件もありません。 現在のところ、法14条1項に係る政令は定められていません。","s":"厚生労働大臣は、常時政令で定める数以上の被保険者を使用する事業主に対し、健康保険組合の設立を命ずることができます。","e":"非常に大きな企業で被保険者数が基準を超えている場合、厚生労働大臣は「健康保険組合を作りなさい」と命令できます。","p":"強制設立の人数要件は政令で定める。設立命令は「できる」規定。命令を受けた事業主は設立義務が生じる。","f":"03_健康保険法3-保険者（健康保険組合）","pg":9},{"r":"法15条","t":"健康保険組合の成立時期","b":"健康保険組合 は、 設立の認可を受けた 時に成立する。 組合の成立 健康保険組合 は、設立の認可 を受けた時に 成立する。（法15条） 理事長の職務の代行 健康保険組合が成立したとき は、理事長が選任されるまでの間 、健康保険組合の 設立の認可の申請をした適 用事業所の事業主 が、理事長の職務 を行う。（令5条） 設立の認可を受けた時に成立します 。「設立の登記が終了したと き」でも「設立の認可を受けた日の属する月の翌月初日 」でもありま せん。 「別に任命された者 」が理事長の職務を行うわけではありません 。","s":"健康保険組合は、設立の認可を受けた時に成立します。","e":"厚生労働大臣から「認可します」という通知を受けた瞬間に、健康保険組合は正式に成立し、活動を開始できます。","p":"成立時期は「設立の認可を受けた時」。届出や登記の時ではなく、認可の時点で成立する。","f":"03_健康保険法3-保険者（健康保険組合）","pg":10},{"r":"法17条","t":"組合員の資格","b":"◯1 健康保険組合が設立された適用事業所 （以下「 設立事業所 」という。）の 事業主 及びその 設立事業 所に使用される 被保険者 は、当該 健康保険組合 の組合員 とする。 ◯2 前項の 被保険者 は、当該 設立事業所に使用されなくなった ときであっても、 任意継続被保険者 であ るときは、なお当該 健康保険組合 の組合員 とする。 組合員 設立事業所の事業主 及びその設立事業所に使用される被保険者 は、当該 健康保険組合の組合員 とする。（法1 7条1項） 規約の変更には 、原則として 、厚生労働大臣の 「認可」が必要です が、事務所の所在地の変更 などに係る場合には 、厚生労働大臣への 「届出」で足ります 。","s":"健康保険組合が設立された適用事業所（設立事業所）の事業主とその被保険者は、当該健康保険組合の組合員となります。","e":"A社が健康保険組合を設立すると、A社の社長も従業員も自動的にその組合の組合員になります。「入りたくない」と言っても強制加入です。","p":"設立事業所の事業主・被保険者は当然に組合員となる（強制加入）。任意継続被保険者も組合員。","f":"03_健康保険法3-保険者（健康保険組合）","pg":12},{"r":"法18条","t":"組合会","b":"◯1 健康保険組合 に、 組合会 を置く。 ◯2 組合会 は、 組合会議員 をもって 組織する。 ◯3 組合会議員 の定数は、 偶数 とし、その 半数は、設立事業所の 事業主 において設立事業所の 事 業主 （その代理人を含む）及び設立事業所に 使用される者 のうちから 選定し、他の半数 は、 被保険 者である組合員 において 互選する。 組合会 R07-01A 健康保険組合 には、 組合会 が置かれる。（法18条1項） 組合会 は、組合会議員 をもって組織する。（法18条2項） R07-01A 組合会議員の定数 は、偶数とし、その 半数は、設立事業所の事業主において 設立事業所の事業主及 び設立事業所に使用される者 のうちから 選定し、他の半数 は、被保険者である組合員 において 互選する。（法1 8条3項） 組合会議員の定数 については、組合会の議決が理事の意向によって影響を受けることのないよう、 理事定数 の2倍を超える数 にするものとし、その上で、組合員（特定健康保険組合にあっては、特例退職被保険者たる組 合員を含む ）の意思が適正に反映されるよう定める。（健保組合事業運営基準） R07-01A 組合会議員の任期 は、3年を超えない範囲内で規約で定める期間 とする。ただし、補欠の組合会議 員の任期は、前任者の残任期間とする。（令6条） 組合会議員の任期は 、「3年を超えない範囲内で規約で定める期 間」です。「5年」ではありません 。","s":"健康保険組合には組合会を置き、組合会議員をもって組織します。議員の定数は偶数とし、半数は事業主の選定、半数は被保険者の互選によります。","e":"組合会議員が20人の健康保険組合では、10人は事業主側が選び、10人は従業員が互選で選びます。労使対等の原則です。","p":"組合会議員の定数は「偶数」。半数は事業主の「選定」、半数は被保険者の「互選」。「選定」と「互選」の用語の違いに注意。","f":"03_健康保険法3-保険者（健康保険組合）","pg":17},{"r":"法21条","t":"健康保険組合の役員","b":"◯1 健康保険組合 に、役員として 理事 及び 監事 を置く。 ◯2 理事の定数 は、 偶数 とし、その 半数は設立事業所の事業主 の選定した組合会議員において、 他 の半数 は被保険者である組合員 の互選した組合会議員において、それぞれ 互選する。 ◯3 理事のうち1人 を理事長 とし、 設立事業所の事業主の選定した組合会議員 である理事のうちか ら、理事が選挙する。 ◯4 監事 は、組合会において、 設立事業所の事業主の選定した組合会議員 及び 被保険者である組 合員の互選した組合会議員 のうちから、それぞれ1人を 選挙する。 ◯5 監事は、理事又は健康保険組合の職員 と兼ねることができない 。 役員 健康保険組合 には、 役員として 理事及び監事を置く。（法21条1項） 理事、理事長 理事の定数 は、偶数とし、その 半数は設立事業所の事業主の選定した組合会議員 において、 他の半数 は被保 険者である組合員の互選した組合会議員 において、それぞれ 互選する。（法21条2項） 理事のうち 1人を理事長 とし、 設立事業所の事業主の選定した組合会議員である理事のうち から、 理事が選挙 する。（法21条3項）","s":"健康保険組合に理事と監事を置きます。理事の定数は偶数とし、半数は事業主の選定した組合会議員、半数は被保険者の互選した組合会議員において互選します。理事長は理事が選挙します。監事は組合会で選挙します。","e":"理事が10人の組合では、事業主側の議員から5人、従業員側の議員から5人が互選で選ばれます。その10人の理事の中から理事長1人を選挙で選びます。","p":"理事の定数も「偶数」。理事長は「理事が選挙」、監事は「組合会において選挙」。協会の役員任命（厚生労働大臣）との違いが頻出。","f":"03_健康保険法3-保険者（健康保険組合）","pg":14},{"r":"令15条","t":"健康保険組合の会計年度","b":"健康保険組合 の会計年度 は、毎年 4月1日 に始まり、 翌年 3月31日 に終わる。ただし、 事業開始の 初年度 にあっては、 事業開始の日 に始まり、翌年（事業開始の日が1月1日以降3月31日以前であるときは、 その年）の 3月31日 に終わる。","s":"健康保険組合の会計年度は、毎年4月1日に始まり翌年3月31日に終わります。ただし、事業開始の初年度は事業開始の日から始まります。","e":"健康保険組合が10月1日に設立された場合、初年度の会計年度は10月1日から翌年3月31日までです。2年目以降は4月1日から3月31日です。","p":"会計年度は「4月1日～3月31日」。初年度の例外規定に注意。協会の事業年度も同じ。","f":"03_健康保険法3-保険者（健康保険組合）","pg":20},{"r":"令16条","t":"健康保険組合の予算","b":"◯1 健康保険組合 は、毎年度 、収入支出の予算を作成 し、 当該年度の開始前 に、厚生労働大臣 に届け 出なければならない。これを変更したときも、同様とする。 ◯2 予算に定めた 各款 の金額 は、相互に流用することができない 。 ◯3 予算に定めた 各項 の金額 は、 組合会 の議決を経て、 相互に流用することができる 。 会計年度 原則として、 健康保険組合の会計年度 は、毎年4月1日に始まり 、翌年3月31日に終わる 。ただし、事業開始 の初年度にあっては、事業開始の日に始まり、翌年の3月31日に終わる。（令15条） 予算 健康保険組合 は、毎年度 、収入支出の 予算を作成 し、当該年度の開始前 に、厚生労働大臣 に届け出なければ ならない。これを変更したときも、同様とする。（令16条1項） 作成し 、厚生労働大臣に届け出る必要があるのは 、「収入支出の予 算」であり 、「事業計画 」ではありません 。","s":"健康保険組合は毎年度、収入支出の予算を作成し、当該年度の開始前に厚生労働大臣に届け出なければなりません。変更時も同様です。","e":"健康保険組合は3月末までに翌年度の予算を作成し、厚生労働大臣に届け出ます。年度途中で予算を変更した場合も届出が必要です。","p":"健康保険組合の予算は「届出」。協会の予算は「認可」。この違いが試験で非常によく狙われる。","f":"03_健康保険法3-保険者（健康保険組合）","pg":20},{"r":"令22条","t":"健康保険組合の組合債","b":"◯1 健康保険組合 は、 組合債 を起こし、又は 起債の方法 、利率若しくは 償還の方法 を変更しようとする ときは、 厚生労働大臣 の認可 を受けなければならない。ただし、厚生労働省令で定める 軽微な変更 をし ようとするときは、この限りでない。 ◯2 健康保険組合 は、前項ただし書の厚生労働省令で定める 軽微な変更 をしたときは、 遅滞なく 、その旨を 厚生労働大臣 に届け出 なければならない。 組合債 2024改正 健康保険組合は、保険給付に要する費用（後期高齢者支 援金等並びに日雇拠出金、介護納付金並びに流行初期医療確保拠出金 等の納付に要する費用を含む）の不足を補う場合を除いては、準備金 を取り崩してはなりません。（令20条） 返還は 「当該会計年度内 」にしなければなりません 。「翌会計年度 内」ではありません 。 R03-07A 健康保険組合 は、組合債 を起こし 、または 起債の方法 、利率若しくは 償還の方法 を変更しようとす るときは、 厚生労働大臣 の認可を受けなければならない。ただし、厚生労働省令で定める 軽微な変更 をしよう とするときは、 この限りでない 。（令22条1項） R03-07A 健康保険組合 は、次に掲げる 軽微な変更 をしたときは、 遅滞なく 、その旨を 厚生労働大臣 に届け出 なければならない。（令22条2項、則11条） 厚生労働大臣への届出で足りる事項 1. 組合債の金額 （減少に係る場合に限る ） 2. 組合債の利息の定率 （低減に係る場合に限る ）","s":"健康保険組合が組合債を起こしたり、起債の方法等を変更しようとするときは、厚生労働大臣の認可を受けなければなりません。","e":"健康保険組合が病院の建設資金を調達するために債券を発行する場合、厚生労働大臣の認可が必要です。","p":"組合債の起債には「厚生労働大臣の認可」が必要。予算は「届出」だが、組合債は「認可」である点に注意。","f":"03_健康保険法3-保険者（健康保険組合）","pg":30},{"r":"法23条","t":"健康保険組合の合併","b":"◯1 健康保険組合 は、合併しようとするときは、 組合会 において 組合会議員の定数 の4分の3以上 の多 数により 議決し、厚生労働大臣 の認可 を受けなければならない。","s":"健康保険組合が合併するには、組合会において組合会議員の定数の4分の3以上の多数で議決し、厚生労働大臣の認可を受けなければなりません。","e":"A健保組合とB健保組合が合併する場合、両方の組合会でそれぞれ議員定数の4分の3以上の賛成が必要で、さらに厚生労働大臣の認可も必要です。","p":"合併の議決要件は「組合会議員の定数の4分の3以上」。「出席者」ではなく「定数」の4分の3以上。分割も同じ要件。","f":"03_健康保険法3-保険者（健康保険組合）","pg":32},{"r":"法24条","t":"健康保険組合の分割","b":"◯1 健康保険組合 は、分割しようとするときは、 組合会 において 組合会議員の定数 の4分の3以上 の多 数により 議決し、厚生労働大臣 の認可 を受けなければならない。 ◯2 健康保険組合 の分割は、設立事業所 の一部 について行うことは できない 。","s":"健康保険組合が分割するには、組合会において組合会議員の定数の4分の3以上の多数で議決し、厚生労働大臣の認可を受けなければなりません。","e":"大規模な健保組合が事業所ごとに2つの組合に分かれる場合、議員定数の4分の3以上の議決と厚生労働大臣の認可が必要です。","p":"分割の議決要件は合併と同じ「定数の4分の3以上」。合併・分割ともに厚生労働大臣の「認可」が必要。","f":"03_健康保険法3-保険者（健康保険組合）","pg":32},{"r":"法25条","t":"設立事業所の増減","b":"◯1 健康保険組合 がその 設立事業所 を増加 させ、又は 減少 させようとするときは、その 増加又は減 少に係る適用事業所 の事業主の全部 及びその適用事業所に使用される 被保険者の2分の1以上の同意 を得なければならない。 合併 健康保険組合 は、合併しようとするとき は、組合会において 組合会議員 の定数の4分の3以上 の多数により議 決し、 厚生労働大臣 の認可を受けなければならない。（法23条1項）","s":"健康保険組合が設立事業所を増加・減少させるには、その事業所の事業主全部と被保険者の2分の1以上の同意、組合会の議決、厚生労働大臣の認可が必要です。","e":"A健保組合にB社の事業所を追加加入させる場合、B社の事業主の同意とB社の被保険者の過半数の同意に加え、組合会の議決と大臣認可が必要です。","p":"同意要件は「事業主の全部」と「被保険者の2分の1以上」。設立時の同意要件と同じ。厚生労働大臣の認可も必要。","f":"03_健康保険法3-保険者（健康保険組合）","pg":32},{"r":"法26条","t":"健康保険組合の解散","b":"◯1 健康保険組合 は、次に掲げる理由により 解散 する。 1. 組合会議員 の定数の 4分の3以上 の多数による 組合会の議決 2. 健康保険組合の事業の 継続の不能 3. 第29条第2項の規定による 厚生労働大臣 による 解散の命令 ◯2 健康保険組合 は、前項第1号又は第2号に掲げる理由により解散 しようとするときは、 厚生労働大 臣の認可 を受けなければならない。 ◯4 協会 は、解散により消滅した健康保険組合 の権利義務 を承継する。 解散 健康保険組合 は、次に掲げる理由により 解散する。（法26条1項） 解散 1. 組合会議員の定数 の4分の3以上 の多数による 組合会の議決 2. 健康保険組合の 事業の継続の不能 3. 法29条2項の規定による 厚生労働大臣 による 解散の命令 健康保険組合 は、1.または2.に掲げる理由により解散 しようとするときは、 厚生労働大臣の認可 を受けなけ ればならない。（法26条2項）","s":"健康保険組合は、(1)組合会議員の定数の4分の3以上の議決、(2)事業の継続の不能、(3)厚生労働大臣による解散命令、のいずれかにより解散します。(1)の場合は厚生労働大臣の認可が必要です。","e":"経営が行き詰まった健保組合が自主的に解散する場合、組合会で議員定数の4分の3以上の賛成を得て、厚生労働大臣の認可を受けます。","p":"解散事由は3つ。議決による解散は「定数の4分の3以上」＋「厚生労働大臣の認可」。事業継続不能の場合は「届出」のみ。解散命令は厚生労働大臣が行う。","f":"03_健康保険法3-保険者（健康保険組合）","pg":35},{"r":"法28条","t":"指定健康保険組合","b":"◯1 健康保険事業 の収支が均衡しない 健康保険組合 であって、政令で定める要件に該当するものとして 厚生労働大臣 の指定 を受けたもの（以下「 指定健康保険組合 」という。）は、その 財政の健全化に 関する計画 （以下「 健全化計画 」という。）を定め、 厚生労働大臣 の承認 を受けなければならな い。これを変更しようとするときも、同様とする。 ◯2 前項の 承認を受けた 指定健康保険組合 は、当該承認に係る 健全化計画 に従い、その 事業を行わ なければならない。 ◯3 厚生労働大臣 は、第1項の 承認を受けた 指定健康保険組合 の事業及び財産の状況 により、その 健全化 計画を変更 する必要があると認めるときは、当該 指定健康保険組合 に対し、 期限を定めて 、当該 健 全化計画の変更 を求める ことができる。 健全化計画 指定健康保険組合 （健康保険事業の収支が均衡しない健康保険組合 であって、政令で定める要件に該当する ものとして厚生労働大臣の指定を受けたもの）は、「 健全化計画 」を定め、 厚生労働大臣 の承認を受けなけれ ばならない。これを変更しようとするときも、同様とする。（法28条1項） 承認を受けた指定健康保険組合 は、当該承認に係る 健全化計画に従い 、その 事業を行わなければならない。 （法28条2項） 厚生労働大臣 は、指定健康保険組合の 事業及び財産の状況 により、その 健全化計画を変更 する必要があると 認めるときは、当該 指定健康保険組合 に対し、 期限を定めて、当該 健全化計画の変更を求める ことができる。 （法28条3項） 指定年度の前3か年度の決算において、経常収支の赤字の状態及び 法定給付費等に要する保険料率（財源率）が95‰（パーミル）（＝ 9.5%）を超える状態が3か年度継続する健康保険組合であって、指 定年度の前年度における積立金の水準が保険給付費の3か月分相当と 前期高齢者納付金等の1か月分相当とを合算した額未満となったもの が、原則として、指定組合とされます。（平成25年6月5日保保発06 05第1号）","s":"健康保険事業の収支が均衡しない健康保険組合で、政令で定める要件に該当するものは、厚生労働大臣の指定を受けて「指定健康保険組合」となり、健全化計画を作成しなければなりません。","e":"赤字が続く健保組合が厚生労働大臣から指定を受けると、3年以内の健全化計画を作成し、財政の立て直しを図らなければなりません。","p":"指定健康保険組合は財政が厳しい組合への特別措置。健全化計画の作成義務がある。指定は厚生労働大臣が行う。","f":"03_健康保険法3-保険者（健康保険組合）","pg":39},{"r":"法29条","t":"健康保険組合への監督","b":"◯1 第7条の38（報告の徴収等）及び第7条の39（監督）の規定は、 健康保険組合 について次のように 準用 する。 1. 厚生労働大臣 は、健康保険組合 について、必要があると認めるときは、その 事業及び財産の状況 に関す る報告 を徴し、又は当該 職員をして 健康保険組合の事務所 に立ち入って 関係者に 質問 さ せ、若しくは実地にその状況を 検査 させることができる。 2. 厚生労働大臣 は、健康保険組合 の事業若しくは財産の管理若しくは執行 が法令、規約若しくは 厚生労働 大臣の処分 に違反している と認めるとき、確保すべき 収入を不当に確保せず 、不当に経費を 支出 し、若しくは 不当に財産を処分 し、その他 健康保険組合 の事業若しくは財産の管理若しくは執 行が著しく適正を欠く と認めるとき、又は 健康保険組合 の役員がその 事業若しくは財産の管理若しく は執行 を明らかに怠っている と認めるときは、 期間を定めて 、健康保険組合 又はその 役員に対し、そ の事業若しくは財産の管理若しくは執行 について違反の 是正又は改善 のため必要な措置を採るべき旨 を命ずる ことができる。 ◯2 健康保険組合 が前項 2.の規定による 命令に違反 したとき、又は第28条第2項（ 健全化計画に従った事業 運営）の規定に 違反した指定健康保険組合 、同条第3項（ 健全化計画の変更 ）の求めに応じない 指定健康保険 組合その他政令で定める指定健康保険組合の 事業若しくは財産の状況 によりその 事業の継続が困難 であると認 めるときは、 厚生労働大臣 は、当該 健康保険組合 の解散 を命ずる ことができる。 報告の徴収など 厚生労働大臣 は、健康保険組合 について、必要があると認めるときは、その 事業及び財産の状況 に関する 報 告を徴し、または当該 職員をして 健康保険組合の事務所 に立ち入って 関係者に 質問させ、若しくは実地にその 状況を 検査させることができる。（法29条1項、法7条の38第1項） 監督","s":"厚生労働大臣は、健康保険組合に対して報告の徴収や監督を行うことができます。協会に対する監督規定が健康保険組合にも準用されます。","e":"厚生労働大臣は健保組合に対して業務の報告を求めたり、法令違反があれば是正措置を命じたりできます。","p":"報告の徴収等（法7条の38）と監督（法7条の39）の規定が健康保険組合に準用される。","f":"03_健康保険法3-保険者（健康保険組合）","pg":41},{"r":"法184条","t":"健康保険組合連合会の設立","b":"◯1 健康保険組合 は、共同してその目的を達成する ため、 健康保険組合連合会 （以下「 連合会 」と いう。）を 設立することができる。 ◯2 連合会 は、 法人 とする。","s":"健康保険組合は、共同してその目的を達成するため、健康保険組合連合会（連合会）を設立することができます。連合会は法人です。","e":"全国の健保組合が集まって「健康保険組合連合会（健保連）」を設立し、共同事業（データ分析、政策提言など）を行います。","p":"連合会は「法人」。設立は任意（「できる」規定）。連合会の設立にも厚生労働大臣の認可が必要。","f":"03_健康保険法3-保険者（健康保険組合）","pg":43},{"r":"法185条","t":"健康保険組合連合会の設立認可","b":"◯1 連合会 を設立しようとするときは、 規約 を作り、 厚生労働大臣 の認可 を受けなければならな い。 ◯2 連合会 は、 設立の認可を受けた 時に成立する。 健康保険組合連合会 健康保険組合 は、共同してその目的を達成する ため、 健康保険組合連合会 を設立することができる。（法18 4条1項） 健康保険組合連合会 は、法人である。（法184条2項） 健康保険組合連合会を設立 しようとするときは、 規約を作り、 厚生労働大臣 の認可を受けなければならな い。（法185条1項） 健康保険組合連合会 は、設立の認可 を受けた時に 成立する。（法185条2項）","s":"連合会を設立するには、規約を作り厚生労働大臣の認可を受けなければなりません。連合会は設立の認可を受けた時に成立します。","e":"健保連を設立する際は、まず規約を作成し、厚生労働大臣の認可を受けます。認可を受けた瞬間に連合会が成立します。","p":"設立時期は「認可を受けた時」。健康保険組合の成立時期（法15条）と同じ考え方。","f":"03_健康保険法3-保険者（健康保険組合）","pg":43},{"r":"法3条","t":"適用事業所の定義","b":"◯3 「 適用事業所 」とは、次の各号のいずれかに該当する事業所をいう。 1. 適用業種 である 事業の事業所 であって、 常時5人以上 の従業員を使用する もの 2. 前号に掲げるもののほか、 国、地方公共団体 又は 法人 の事業所 であって、 常時従業員 を使用する もの 強制適用事業所 「適用事業所 」とは、次のいずれかに該当する事業所をいう。（法3条3項） 強制適用事業所（いずれか） 1. R05-01A 適用業種 である事業の事業所であって、 常時5人以上の従業員を使用する もの 2. 国、地方公共団体 または 法人の事業所であって、 常時従業員を使用する もの","s":"「適用事業所」とは、(1)適用業種の事業所で常時5人以上の従業員を使用するもの、(2)国・地方公共団体・法人の事業所、のいずれかに該当する事業所をいいます。","e":"株式会社は従業員の人数に関係なく適用事業所です（法人だから）。個人経営の飲食店は従業員5人以上でも非適用業種のため強制適用されません。","p":"法人の事業所は業種・人数を問わず強制適用。個人事業は適用業種＋常時5人以上で強制適用。非適用業種（飲食・サービス業等）の個人事業は任意適用。「常時5人以上」の数字が頻出。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":2},{"r":"法31条","t":"任意適用事業所","b":"◯1 適用事業所以外の事業所の事業主 は、厚生労働大臣 の認可 を受けて、当該 事業所 を適用事業所 とす ることができる。 ◯2 前項の 認可 を受けようとするときは、当該 事業所の事業主 は、当該 事業所に使用される者 （被保 険者となるべき者 に限る。）の 2分の1 以上の 同意 を得て、 厚生労働大臣 に申請しなければならな い。 任意適用事業所 ①法定17業種 であって、常時 5人未満 の従業員を使用する 個人経営 の事業所、② 法定17業種以外 の個人経営 の事業所（使用従業員数は問わない）が、 任意適用事業所 となる。（法3条3項） 任意適用の認可 「個人経営 」の「法定17業種以外 の事業所 」は、使用する従業員 の「人数にかかわらず 」、任意適用事業所 となります 。 法定17業種以外 の事業所であっても 、「法人」であれば 強制適用 事業所 となります 。","s":"適用事業所以外の事業所の事業主は、被保険者となるべき者の2分の1以上の同意を得て、厚生労働大臣の認可を受ければ、適用事業所にすることができます。","e":"従業員3人の個人経営の飲食店で、2人以上の同意を得て厚生労働大臣の認可を受ければ、任意に適用事業所になれます。","p":"同意要件は「2分の1以上」。厚生労働大臣の「認可」が必要。事業主の申請による。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":9},{"r":"法32条","t":"適用事業所の擬制（みなし適用）","b":"適用事業所 が、第3条第3項各号（ 強制適用事業所の要件 ）に 該当しなくなった ときは、その 事業所 に ついて第31条第1項（任意適用）の 認可があった ものと みなす 。 擬制 健康保険に加入をすると、事業主に保険料及び事務的負担が生じる こと、労災保険や雇用保険と異なり、国民健康保険という受け皿が存 在することがその理由です。希望があっても加入義務はないため、法 1条では、「必要な保険給付」という表現ではなく、「保険給付」と 表現しています。","s":"強制適用事業所が要件を満たさなくなった場合でも、任意適用の認可があったものとみなされ、引き続き適用事業所のままとなります。","e":"常時5人以上いた従業員が4人に減った場合でも、自動的に適用事業所でなくなるわけではなく、任意適用の認可があったものとみなされます。","p":"強制適用の要件を欠いても自動的に適用除外にならない。取消しには法33条の手続きが必要。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":12},{"r":"法33条","t":"任意適用事業所の取消し","b":"◯1 任意適用事業所の事業主 は、厚生労働大臣 の認可 を受けて、当該 事業所 を適用事業所でなくする こ とができる。 ◯2 前項の 認可 を受けようとするときは、当該 事業所の事業主 は、当該 事業所に使用される者 （被保 険者である者 に限る。）の 4分の3 以上の 同意 を得て、 厚生労働大臣 に申請しなければならない。 任意適用事業所の取消し 例えば、事業内容の変更による非適用業種へ変更となった場合や従 業員が減少した場合などが考えられます。 「自動的に 」、すなわち 、「任意加入の申請を行うことなく 」任意 適用の認可があったものとみなされます 。 強制適用事業所の要件に該当しなくなったときに 、「被保険者はそ の資格を喪失する 」わけではありません 。 任意適用事業所の事業主 は、厚生労働大臣 の認可を受けて、当該 事業所 を適用事業所でなくすることができ る。（法33条1項）","s":"任意適用事業所の事業主は、被保険者の4分の3以上の同意を得て、厚生労働大臣の認可を受ければ、適用事業所でなくすることができます。","e":"任意適用を受けていた個人経営の店が適用をやめたい場合、被保険者の4分の3以上の同意と厚生労働大臣の認可が必要です。","p":"取消しの同意要件は「4分の3以上」（設立時の「2分の1以上」より厳しい）。被保険者保護のため、やめるときのハードルが高い。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":13},{"r":"法34条","t":"二以上の事業所の一括適用","b":"◯1 2以上の適用事業所 の事業主が同一 である場合には、当該 事業主 は、厚生労働大臣 の承認 を受 けて、当該 2以上の事業所 を一の適用事業所 とすることができる。 ◯2 前項の 承認 があったときは、当該 2以上の適用事業所 は、 適用事業所でなくなった ものと みな す。 一括適用の承認 2以上の適用事業所の事業主が同一である場合 には、当該 事業主 は、厚生労働大臣 の承認を受けて、当該 2以 上の事業所 を一の適用事業所 とすることができる。（法34条1項） 当該 承認があったとき は、当該 2以上の適用事業所 は、適用事業所でなくなったものとみなされる 。（法34 条2項）","s":"事業主が同一である2以上の適用事業所は、厚生労働大臣の承認を受けて一の適用事業所とすることができます。","e":"同じ会社が東京と大阪に事業所を持っている場合、厚生労働大臣の承認を受ければ2つの事業所を1つの事業所として扱えます。事務手続きが簡素化されます。","p":"一括適用は「承認」（認可ではない）。「事業主が同一」であることが要件。厚生年金保険法にも同様の規定がある。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":16},{"r":"則19条","t":"新規適用届の届出期限","b":"◯1 初めて法第3条第3項に規定する適用事業所となった事業所の事業主 は、当該 事実があった日 から 5日 以内 に、所定の事項を記載した 届書を厚生労働大臣 （日本年金機構 ）（初めて適用事業所となっ たと同時に当該適用事業所を健康保険組合の設立に係る適用事業所としようとするときは、 健康保険組 合）に提出しなければならない。 新規適用届 初めて適用事業所となった事業所の事業主 は、当該 事実があった日 から5日以内 に、所定の事項を記載した 「新規適用届 」を厚生労働大臣 （日本年金機構 ）（初めて適用事業所となったと同時に当該適用事業所を健康 保険組合の設立に係る適用事業所としようとするときは、 健康保険組合 ）に提出しなければならない。（則19 条1項）","s":"初めて適用事業所となった事業所の事業主は、その事実があった日から5日以内に届書を厚生労働大臣に届け出なければなりません。","e":"新しく会社を設立した場合、設立日から5日以内に適用事業所の届出（新規適用届）を年金事務所に提出します。","p":"届出期限は「5日以内」。届出先は厚生労働大臣（実際は年金事務所）。届出義務者は事業主。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":19},{"r":"則30条","t":"事業所の変更届","b":"事業主 は、その 氏名若しくは 名称若しくは 住所、事業所の名称 若しくは 所在地 、第19条第1項第3号に掲げ る事項又は同項第4号に掲げる事項（法人番号等）に 変更があった ときは、 5日以内 に、次に掲げる事項 を記載した届書を 厚生労働大臣 （日本年金機構 ）又は 健康保険組合 に提出しなければならな い。 1. 事業所 の名称及び所在地 2. 変更前 の事項及び 変更後 の事項並びに 変更の年月日 事業主の氏名などの変更の届出 事業主 は、その 氏名若しくは 名称若しくは 住所、事業所の名称 若しくは 所在地 、法人番号など に変更があっ たときは、 5日以内 に、次に掲げる事項を記載した「 適用事業所所在地 ・名称変更届 」を厚生労働大臣 （日本年 金機構 ）または 健康保険組合 に提出しなければならない。（則30条） 事業主の氏名などの変更の届出 1. 事業所 の名称及び所在地 2. 変更前の事項及び変更後の事項 並びに 変更の年月日","s":"事業主は、氏名・名称・住所、事業所の名称・所在地などに変更があったときは、変更届を届け出なければなりません。","e":"会社が本社を移転した場合や社名を変更した場合、事業主は変更届を年金事務所に提出しなければなりません。","p":"届出事項は「氏名・名称・住所」「事業所の名称・所在地」「法人番号等」。届出期限は変更日から5日以内。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":22},{"r":"則20条","t":"適用事業所の廃止届","b":"◯1 適用事業所の事業主 は、 廃止 、休止 その他の事情により 適用事業所に該当しなくなった ときは、第22条の規定により申請する場合を除き、当該 事実があった日 から 5日以内 に、次に掲げる事 項を記載した届書を 厚生労働大臣 又は 健康保険組合 に提出しなければならない。この場合におい て、協会が管掌する健康保険の被保険者の事業主が同時に厚生年金保険の被保険者の適用事業所であるとき は、当該届書にその旨を付記しなければならない。 1. 事業主 の氏名又は名称及び住所 2. 事業所 の名称及び所在地 3. 適用事業所に該当しなくなった 年月日 及びその 理由 適用事業所に該当しなくなった場合の届出 R06-03ｳ 適用事業所の事業主 は、廃止、休止その他の事情により 適用事業所に該当しなくなったとき は、任 意適用取消の申請をする場合を除き、 5日以内 に、次に掲げる事項を記載した「 適用事業所全喪届 」を厚生労働 大臣（日本年金機構 ）または 健康保険組合 に提出しなければならない。なお、この場合、適用事業所に該当し なくなったことを証する書類を添付しなければならない。（則20条1項・3項） 「あらかじめ （事前の届出 ）」です。社労士の科目において 、代理 人選任において 、「◯◯日以内に選任 」などのように事後の届出 の規 定を設けている法令はありません 。","s":"適用事業所の事業主は、廃止・休止等により適用事業所に該当しなくなったときは、その事実があった日から5日以内に届け出なければなりません。","e":"会社が廃業した場合、廃業日から5日以内に適用事業所全喪届を年金事務所に提出します。","p":"届出期限は「5日以内」。「廃止」「休止」「その他の事情」が届出事由。任意適用の取消し申請とは別の手続き。","f":"04_健康保険法4-適用事業所（強制適用、任意適用、一括適用、届出）","pg":24},{"r":"法200条","t":"共済組合の組合員の特例","b":"◯1 国に使用される被保険者 、地方公共団体 の事務所に使用される被保険者 又は 法人 に使用 される被保険者 であって 共済組合の組合員 であるものに対しては、 健康保険法 による 保険給付 は、 行わない 。 ◯2 共済組合の給付 の種類 及び 程度 は、健康保険法の給付 の種類 及び 程度 以上であるこ とを要する。","s":"国・地方公共団体・法人に使用される被保険者で共済組合の組合員である者には、一定の保険給付は行いません（共済組合から給付を受けるため）。","e":"国家公務員共済組合の組合員は、健康保険の被保険者ですが、療養の給付などは共済組合から受けるため、健康保険からは二重に支給されません。","p":"共済組合の組合員には健康保険の保険給付は行わない（二重給付の防止）。ただし保険料も徴収しない（法202条）。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":50},{"r":"法201条","t":"共済組合に対する監督","b":"厚生労働大臣 は、共済組合 について、必要があると認めるときは、その 事業及び財産 に関する 報 告を徴し、又はその 運営に関する 指示 をすることができる。","s":"厚生労働大臣は、共済組合について必要があると認めるときは、事業・財産に関する報告の徴収や運営に関する指示をすることができます。","e":"厚生労働大臣は、共済組合の運営に問題があると判断した場合、報告を求めたり、改善の指示を出すことができます。","p":"厚生労働大臣の共済組合に対する監督権限は「報告の徴収」と「運営に関する指示」。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":50},{"r":"法202条","t":"共済組合の組合員の保険料免除","b":"第200条第1項の規定により 保険給付を受けない者 に関しては、 保険料を徴収 しない 。 共済組合の組合員の特例 国に使用される被保険者、 地方公共団体 の事務所に使用される被保険者または 法人に使用される被保険者で あって 共済組合の組合員 であるもの に対しては、健康保険法による 保険給付は 、行われない 。（法200条1項）","s":"共済組合の組合員で保険給付を受けない者に関しては、保険料を徴収しません。","e":"共済組合から給付を受ける公務員は、健康保険の保険給付も受けないし保険料も払いません。給付と負担がセットで免除されます。","p":"保険給付を行わない者からは保険料も徴収しない。法200条と法202条はセットで出題される。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":50},{"r":"法48条","t":"届出義務","b":"適用事業所の 事業主 は、被保険者 の資格の取得及び喪失 並びに 報酬月額 及び 賞与額 に関 する事項を 保険者等 （厚生労働大臣又は健康保険組合をいう。）に 届け出 なければならない。","s":"適用事業所の事業主は、被保険者の資格の取得・喪失、報酬月額、賞与額に関する事項を保険者等に届け出なければなりません。","e":"新入社員が入社したら資格取得届、退職したら資格喪失届、給料が大きく変わったら報酬月額変更届を、事業主が届け出ます。","p":"届出義務者は「事業主」。届出先は「保険者等」（厚生労働大臣又は健康保険組合）。届出事項は「資格の取得・喪失」「報酬月額」「賞与額」。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":52},{"r":"法50条","t":"届出に対する確認の拒否","b":"◯1 保険者等 （厚生労働大臣 又は 健康保険組合 をいう。）は、第48条の規定による 届出があ った場合において、その届出に係る 事実がない と認めるときは、その旨をその届出をした事業主に 通知しなけ ればならない。 事業主の届出義務 R06-05E 適用事業所の事業主 は、被保険者の 資格の取得及び喪失 並びに 報酬月額 及び賞与額 に関する事項を 保険者等 （厚生労働大臣または健康保険組合 ）に届け出 なければならない。（法48条） 厚生労働大臣は 、「報告を徴する 」だけでなく 、「運営に関する指 示」もすることができます 。 資格取得届 は、「事業主 」が提出 します 。 保険者等 （厚生労働大臣または健康保険組合 ）は、 届出があった場合 において、その届出に係る 事実がない と認めるときは、その旨をその届出をした 事業主に通知 しなければならない。（法50条1項）","s":"保険者等は、届出があった場合にその事実がないと認めるときは、届出に係る確認を行わないことができます。また、届出のない事実の確認を職権で行うこともできます。","e":"事業主が虚偽の資格取得届を出した場合、保険者はその確認を拒否できます。逆に、届出がなくても実態として被保険者であれば職権で確認できます。","p":"届出の事実がないとき→確認を行わない。届出がない事実→職権で確認できる。届出だけでなく職権による確認もある点が重要。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":52},{"r":"法35条","t":"被保険者の資格取得時期","b":"被保険者 （任意継続被保険者を除く。）は、 適用事業所 に使用されるに至った日 若しくはその 使用さ れる事業所 が適用事業所となった日 又は第3条第1項ただし書の 適用除外の規定に該当しなくなった 日から、 被保険者の資格 を取得 する。 強制被保険者の資格取得 R06-06C 強制被保険者 は、適用事業所 に使用されるに至った日 若しくはその使用される 事業所 が適用事業所 となった日 または法3条1項ただし書の 適用除外の規定に該当しなくなった日 から、 被保険者 の資格を取得 す る。（法35条）","s":"被保険者（任意継続被保険者を除く）は、適用事業所に使用されるに至った日、事業所が適用事業所となった日、又は適用除外に該当しなくなった日に資格を取得します。","e":"4月1日に入社したAさんは、4月1日に被保険者の資格を取得します。「翌日から」ではなく「その日」からです。","p":"資格取得は「当日」。取得日は「使用されるに至った日」「適用事業所となった日」「適用除外に該当しなくなった日」の3パターン。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":54},{"r":"則24条","t":"資格取得届の届出期限","b":"◯1 被保険者 （任意継続被保険者を除く。） の資格の取得に関する届出 は、当該 事実があった日 から 5日 以内 に、健康保険 被保険者資格取得届 を機構又は健康保険組合 に提出することによって行うものとす る。 被保険者資格取得届 2024改正 強制被保険者の資格の取得に関する届出 は、当該 事実があった日 から5日以内 に、「 健康保険被保 険者資格取得届 」を日本年金機構または健康保険組合に提出 することによって行う。（則24条1項） 記載事項 1. 被保険者の 氏名（片仮名で振り仮名を付するものとする） 2. 被保険者の 生年月日 3. 被保険者の 種別（健康保険組合が管掌する健康保険の被保険者にあっては、被保険者の性別） 4. 被保険者資格の 取得区分 5. 被保険者の個人番号 （全国健康保険協会が管掌する健康保険の被保険者が同時に厚生年金保険の被保険者 の資格を取得したときであって、当該被保険者が基礎年金番号を有する者にあっては、個人番号または基礎 年金番号） 6. 資格取得年月日 7. 被扶養者の有無 8. 被保険者の 報酬月額 9. 被保険者の 住所（当該被保険者が全国健康保険協会が管掌する健康保険の被保険者であって、厚生労働大 臣が当該被保険者に係る機構保存本人確認情報の提供を受けることができるときを除く） 10. 事業所 の名称及び所在地 並びに 事業主 の氏名または 名称 11. その他保険者等が必要と認める情報","s":"被保険者（任意継続被保険者を除く）の資格取得届は、その事実があった日から5日以内に届け出なければなりません。","e":"4月1日に新入社員が入社した場合、4月5日までに被保険者資格取得届を届け出ます。届出義務者は事業主です。","p":"届出期限は「5日以内」。届出義務者は事業主。届出先は機構（年金事務所）又は健康保険組合。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":57},{"r":"法36条","t":"被保険者の資格喪失時期","b":"被保険者 （任意継続被保険者を除く。）は、次の各号のいずれかに該当するに至った 日の翌日 （その 事実があった日に 更に被保険者の資格を取得する に至ったときは、 その日 ）から、 被保険者の資格 を 喪失 する。 1. 死亡したとき。 2. その 事業所 に使用されなくなった とき。 3. 適用除外 の規定に 該当する に至ったとき。 4. 任意適用事業所 の取消しの認可 があったとき。 強制被保険者の資格喪失 R05-10E 強制被保険者 は、次のいずれかに該当するに至った 日の翌日 （その事実があった日に更に被保険者 の資格を取得するに至ったときは、 その日 ）から、 被保険者 の資格を喪失 する。（法36条） 強制被保険者の資格喪失 1. 死亡したとき。 2. その 事業所 に使用されなくなった とき。 3. 適用除外 の規定に 該当する に至ったとき。 4. 任意適用事業所の取消しの認可 があったとき。","s":"被保険者（任意継続被保険者を除く）は、死亡、退職、適用除外該当、事業所の廃止等に至った日の「翌日」に資格を喪失します。ただし、同日に別の被保険者資格を取得する場合はその日に喪失します。","e":"3月31日に退職したAさんは、4月1日に被保険者資格を喪失します。ただし、3月31日付で退職して同日にB社に入社した場合は、3月31日に喪失します。","p":"資格喪失は原則「翌日」。例外として同日得喪（同日に他の資格取得）の場合は「当日」。取得は「当日」、喪失は「翌日」の原則が超頻出。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":59},{"r":"則29条","t":"資格喪失届の届出期限","b":"◯1 被保険者 （任意継続被保険者を除く。） の資格の喪失に関する届出 は、当該 事実があった日 から 5日 以内 に、健康保険 被保険者資格喪失届 を機構又は健康保険組合 に提出することによって行うものとす る。 被保険者資格喪失届 強制被保険者の資格の喪失に関する届出 は、当該 事実があった日 から5日以内 に、「 健康保険被保険者資格喪 失届」を日本年金機構または健康保険組合に提出 することによって行う。（則29条1項）","s":"被保険者の資格喪失届は、その事実があった日から5日以内に届け出なければなりません。","e":"従業員が3月31日に退職した場合（資格喪失は4月1日）、4月5日までに資格喪失届を届け出ます。","p":"届出期限は「5日以内」。届出義務者は事業主。取得届・喪失届ともに5日以内。","f":"05_健康保険法5-被保険者等（強制被保険者、適用除外、資格の得喪）","pg":65},{"r":"法37条","t":"任意継続被保険者の申出","b":"◯1 第3条第4項の 申出は、被保険者 の資格を喪失した日 から 20日 以内にしなければならない。ただ し、保険者 は、正当な理由がある と認めるときは、この 期間を経過した後の申出 であっても、 受理する ことが できる。 ◯2 第3条第4項の 申出をした者が、 初めて納付すべき保険料 をその 納付期日までに納付しなかった と きは、同項の規定にかかわらず、その者は、 任意継続被保険者とならなかったもの とみなす 。ただし、 その納付の遅延 について 正当な理由がある と保険者が認めた ときは、この限りでない。 任意継続被保険者","s":"任意継続被保険者になるための申出は、被保険者の資格を喪失した日から20日以内にしなければなりません。ただし、保険者が正当な理由があると認めるときは期限後でも受理できます。","e":"3月31日に退職して4月1日に資格喪失したAさんは、4月20日までに任意継続の申出をしなければなりません。入院中で手続きができなかった等の正当な理由があれば遅れても認められます。","p":"申出期限は「20日以内」。正当な理由があれば期限後も可能。任意継続の要件は「資格喪失日の前日まで継続して2月以上の被保険者期間」。","f":"06_健康保険法6-被保険者等（任意継続被保険者、特例退職被保険者、被扶養者）","pg":2},{"r":"法38条","t":"任意継続被保険者の資格喪失","b":"任意継続被保険者 は、次の各号のいずれかに該当するに至った 日の翌日 （第4号から第6号までのいず れかに該当するに至ったときは、 その日 ）から、その 資格を喪失 する。 1. 任意継続被保険者となった日 から起算して 2年を経過した とき。 2. 死亡したとき。 3. 保険料 （初めて納付すべき保険料 を除く。）を 納付期日までに納付しなかった とき（納付の 遅延について 正当な理由 があると保険者が認めたときを 除く。）。 4. 強制被保険者となった とき。 5. 船員保険 の被保険者 となったとき。 6. 後期高齢者医療 の被保険者等 となったとき。 7. 任意継続被保険者でなくなること を希望 する旨を、 保険者 に申し出た 場合において、その 申出が 受理された日の属する月の末日が到来した とき。 資格の喪失","s":"任意継続被保険者は、(1)資格取得日から2年経過、(2)死亡、(3)保険料未納（納付期日の翌日）、(4)被保険者となったとき、(5)船員保険の被保険者となったとき、(6)申出による喪失、のいずれかで資格を喪失します。","e":"任意継続で加入して2年が経過すると自動的に資格喪失します。また、再就職して新たに被保険者になった場合や、自分から「やめたい」と申し出た場合も喪失します。","p":"資格喪失事由は6つ。期間は「2年」。保険料未納は「納付期日の翌日」に喪失。(1)～(3)は「翌日」喪失、(4)～(6)は「その日」喪失。2022年改正で「申出による喪失」が追加。","f":"06_健康保険法6-被保険者等（任意継続被保険者、特例退職被保険者、被扶養者）","pg":10},{"r":"法51条","t":"確認の請求","b":"◯1 被保険者 又は 被保険者であった者 は、いつでも 、第39条第1項の規定による 確認を請求 するこ とができる。 ◯2 保険者等 は、前項の規定による 請求があった 場合において、その 請求に係る 事実がない と認めると きは、その 請求を却下 しなければならない。 確認の請求 被保険者または被保険者であった者 は、いつでも 、法39条1項の規定による 確認を請求 することができる。 （法51条1項） 保険者等 は、請求があった場合 において、その請求に係る 事実がないと認めるとき は、その 請求を却下 しな ければならない。（法51条2項） 資格取得届との関係 被保険者の資格の取得が確認された場合 には、 資格取得の届出の有無にかかわらず 、資格取得の効果が生じ るため、 保険給付は行われる 。したがって、さかのぼって資格取得の確認が行われた場合、保険事故として、","s":"被保険者又は被保険者であった者は、いつでも、資格の取得・喪失の確認を請求できます。保険者等は速やかに確認しなければなりません。","e":"退職後に「自分はいつ被保険者資格を喪失したのか」を確認したいとき、いつでも保険者に確認請求ができます。","p":"確認請求は「いつでも」可能。時効の制限なし。請求権者は「被保険者又は被保険者であった者」。事業主は含まれない。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":7},{"r":"法49条","t":"任意適用取消しの通知","b":"◯1 厚生労働大臣 は、第33条第1項の規定による 任意適用事業所の取消しの認可 を行ったときは、 その旨を当該 事業主 に通知するものとし、 保険者等 （厚生労働大臣 又は 健康保険組合 ）は、第 39条第1項の規定による 確認 又は 標準報酬 （標準報酬月額及び標準賞与額をいう。以下同じ。）の 決定若しくは改定を行ったときは、その旨を当該 事業主 に通知しなければならない。 ◯2 事業主 は、前項の 通知があったときは、 速やかに 、これを 被保険者 又は 被保険者であった者 に 通知 しなければならない。 通知 厚生労働大臣 は、任意適用事業所の取消しの認可 を行った ときは、その旨を当該「 事業主 」に通知する もの とし、 保険者等 （厚生労働大臣または健康保険組合 ）は、 確認または 標準報酬の決定若しくは改定 を行ったと きは、その旨を当該「 事業主 」に通知 しなければならない。（法49条1項） R07-03D 事業主 は、通知があったときは、 速やかに 、これを「 被保険者または被保険者であった者 」に通知 しなければならない。（法49条2項） 2026改正 正当な理由がなく、被保険者にこれらの事項に関する 通知をしないとき は、6か月以下の拘禁刑ま たは50万円以下の罰金 に処せられる。（法208条2号）","s":"厚生労働大臣は、任意適用事業所の取消しの認可を行ったときは、事業主に通知し、保険者等は被保険者に通知します。","e":"任意適用事業所の取消しが認可されると、厚生労働大臣から事業主に「取消しました」と通知が届き、保険者から被保険者にもその旨の通知がされます。","p":"通知先は事業主（厚生労働大臣から）と被保険者（保険者等から）の2系統。被保険者への通知も忘れずに行われる。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":8},{"r":"則36条","t":"氏名変更の届出","b":"被保険者 は、その 氏名を変更した ときは、 速やかに 、変更後の氏名を 事業主に申し出る とともに、第4 7条第2項に規定する 資格確認書 （書面に限る 。）の交付を受けている被保険者 は、当該 資格確認書 を事業主 に提出 しなければならない。","s":"被保険者は、氏名を変更したときは、速やかに変更後の氏名を事業主に申し出るとともに、資格確認書（書面）を届け出なければなりません。","e":"結婚して姓が変わったAさんは、速やかに会社に新しい名前を届け出て、資格確認書の書き換え手続きを行います。","p":"届出期限は「速やかに」（○日以内ではない）。事業主への申出が必要。マイナンバーカードによる資格確認が進む中でも規定は残っている。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":9},{"r":"則28条","t":"事業主による氏名変更届","b":"事業主 は、第36条の規定による 氏名変更の申出 を受けたときは、 遅滞なく 、健康保険被保険者氏 名変更届 を厚生労働大臣 （日本年金機構 ）又は 健康保険組合 に提出しなければならない。 氏名変更（訂正）届 2025改正 被保険者 は、「 氏名」を変更したとき は、速やかに 、変更後の氏名を 事業主に申し出る とともに、 資格確認書の交付を受けている被保険者は 、資格確認書 を「事業主 」に提出しなければならない。（則36条） 事業主 は、氏名変更の申出を受けたとき は、遅滞なく 、「健康保険被保険者氏名変更 （訂正）届」を厚生労 働大臣 （日本年金機構 ）または健康保険組合 に提出しなければならない。（則28条）","s":"事業主は、被保険者から氏名変更の申出を受けたときは、遅滞なく、健康保険被保険者氏名変更届を届け出なければなりません。","e":"従業員から「結婚して名前が変わりました」と申出があったら、事業主は遅滞なく氏名変更届を年金事務所又は健保組合に届け出ます。","p":"届出期限は「遅滞なく」。届出先は厚生労働大臣（機構）又は健康保険組合。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":9},{"r":"則36条の2","t":"住所変更の届出","b":"被保険者 は、その 住所を変更した ときは、 速やかに 、変更後の住所を 事業主に申し出 なければならな い。ただし、当該被保険者が 協会が管掌する健康保険の被保険者 であって、 厚生労働大臣 が当該被保険者に係 る機構保存本人確認情報 の提供を受けることができるとき及び当該被保険者が 健康保険組合が管掌する健康保 険の被保険者 であって、 当該健康保険組合 が当該被保険者に係る 機構保存本人確認情報の提供を受けることが できる とき（当該健康保険組合が、事業主に対し、当該被保険者の住所に係る情報の提供を求めないときに限 る。）は、 この限りでない 。","s":"被保険者は、住所を変更したときは、速やかに変更後の住所を事業主に申し出なければなりません。ただし、協会管掌の被保険者で機構に届出情報が登録されている場合は不要です。","e":"引っ越しをしたAさんは速やかに会社に新住所を届け出ます。ただし、マイナンバーで住所情報が連携されている協会けんぽの被保険者は届出不要の場合があります。","p":"届出期限は「速やかに」。協会管掌で機構に情報登録済みの場合は届出不要（届出省略の特例）。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":13},{"r":"則28条の2","t":"事業主による住所変更届","b":"◯1 事業主 は、第36条の2の規定による 住所変更の申出を受けた ときは、 遅滞なく 、所定事項を記載し た届書（ 健康保険被保険者住所変更届 ）を 厚生労働大臣 （日本年金機構 ）又は 健康保険組合 に 提出しなければならない。 住所変更届 被保険者 は、その「 住所」を変更したとき は、速やかに 、変更後の住所を 事業主に申し出 なければならな い。（則36条の2） 2024改正 ただし、当該被保険者が 協会が管掌する健康保険の被保険者 であって、 厚生労働大臣 が当該被保険 者に係る 機構保存本人確認情報の提供を受けることができる とき及び当該被保険者が 健康保険組合が管掌する 健康保険の被保険者 であって、当該 健康保険組合 が当該被保険者に係る 機構保存本人確認情報の提供を受ける ことができる とき（当該健康保険組合が、事業主に対し、当該被保険者の住所に係る情報の提供を求めないと きに限る）は、 この限りでない 。（則36条の2ただし書） マイナンバーと基礎年金番号が結びついている被保険者であれば原 則届出は不要です 。 資格確認書の交付を受けている被保険者であっても 、「住所変更届 に資格確認書を添付する 」必要はありません 。","s":"事業主は、被保険者から住所変更の申出を受けたときは、遅滞なく、健康保険被保険者住所変更届を届け出なければなりません。","e":"従業員から「引っ越しました」と申出を受けた事業主は、遅滞なく住所変更届を届け出ます。","p":"届出期限は「遅滞なく」。氏名変更届と同じ流れ（被保険者→事業主→保険者等）。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":13},{"r":"則38条","t":"被扶養者届","b":"◯1 被保険者 は、被扶養者を有する とき、又は 被扶養者を有するに至った ときは、 5日以内 に、所定事 項を記載した 被扶養者届 を事業主 を経由して 厚生労働大臣 （日本年金機構 ）又は 健康保険組 合に提出しなければならない。 ◯2 前項に掲げる事項に 変更があったときは、 その都度 、事業主 を経由して 厚生労働大臣 （日本 年金機構 ）又は 健康保険組合 に届け出 なければならない。ただし、 住所の変更 については、当該被扶 養者が 健康保険組合が管掌する健康保険の被扶養者 であって、当該 健康保険組合 が当該被扶養者に係る 機構保 存本人確認情報の提供を受けることができる とき（当該健康保険組合が、事業主に対し、当該被扶養者の住所 に係る情報の提供を求めないときに限る。）は、 この限りでない 。 被扶養者（異動）届 被保険者 は、被扶養者を有する とき、または 被扶養者を有するに至った ときは、 5日以内 に、所定事項を記載 した「 健康保険被扶養者 （異動）届」を事業主 を経由して厚生労働大臣 （日本年金機構 ）または健康保険組合 に提出しなければならない。（則38条1項） 2024改正 届出事項に変更 があったときは、 その都度 、事業主 を経由 して厚生労働大臣 （日本年金機構 ）また は健康保険組合 に届け出 なければならない。ただし、住所の変更については、当該被扶養者が健康保険組合が 管掌する健康保険の被扶養者であって、当該健康保険組合が当該被扶養者に係る機構保存本人確認情報の提供 を受けることができるとき（当該健康保険組合が、事業主に対し、当該被扶養者の住所に係る情報の提供を求 めないときに限る）は、この限りでない。（則38条2項）","s":"被保険者は、被扶養者を有するとき又は新たに有するに至ったときは、5日以内に被扶養者届を事業主を経由して届け出なければなりません。","e":"子供が生まれて被扶養者が増えた場合、5日以内に被扶養者届を会社経由で届け出ます。","p":"届出期限は「5日以内」。届出は「事業主を経由して」行う。被扶養者の認定・削除ともに届出が必要。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":17},{"r":"則40条","t":"介護保険第2号被保険者に該当しなくなったときの届出","b":"◯1 被保険者 は、被保険者 又はその 被扶養者 が介護保険第2号被保険者 に該当しなくなった ときは、 遅滞なく 、所定の事項を記載した届書を 事業主 を経由して 厚生労働大臣 （日本年金機構 ） 又は 健康保険組合 に届け出 なければならない。ただし、 被保険者 又はその 被扶養者 が65歳 に達した ときは、この限りでない。","s":"被保険者又はその被扶養者が介護保険第2号被保険者に該当しなくなったときは、遅滞なく届け出なければなりません。","e":"被保険者の被扶養者が65歳になり介護保険第1号被保険者に移行した場合（第2号被保険者でなくなった場合）、遅滞なく届出が必要です。","p":"届出期限は「遅滞なく」。介護保険第2号被保険者は40歳以上65歳未満の医療保険加入者。65歳到達で第1号に移行。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":20},{"r":"則41条","t":"介護保険第2号被保険者に該当するに至ったときの届出","b":"◯1 被保険者 は、 介護保険第2号被保険者 に該当しない 被保険者 又はその 被扶養者 が介護保険第2号 被保険者 に該当するに至った ときは、 遅滞なく 、所定の事項を記載した届書を 事業主 を経由して 厚生労働大臣 （日本年金機構 ）又は 健康保険組合 に届け出 なければならない。ただし、被保険 者又はその被扶養者が 40歳 に達した ときは、この限りでない。 介護保険適用除外等該当・非該当届 任意継続被保険者または特例退職被保険者の被扶養者 （異動）届 は、直接「保険者 」に届け出 なければなりません 。「事業主 」に届け 出るのではありません 。 R04-07A 被保険者 は、被保険者またはその被扶養者 が「介護保険第2号被保険者 」に該当しなくなったとき は、遅滞なく 、所定の事項を記載した「 介護保険適用除外等該当 ・非該当届 」を事業主 を経由して厚生労働大 臣（日本年金機構 ）または健康保険組合 に届け出 なければならない。ただし、 被保険者またはその被扶養者が 6 5歳に達した ときは、 その旨を 届け出る必要はない 。（則40条1項）","s":"介護保険第2号被保険者に該当しない被保険者又はその被扶養者が、該当するに至ったときは、遅滞なく届け出なければなりません。","e":"海外居住で介護保険の適用除外だった被扶養者が帰国して40歳以上の場合、介護保険第2号被保険者に該当するので届出が必要です。","p":"届出期限は「遅滞なく」。40歳到達による該当は届出不要（自動的に判定される）。主に適用除外からの復帰時に届出が必要。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":20},{"r":"則50条の2","t":"被保険者情報の登録・資格確認書の交付","b":"◯1 厚生労働大臣 （日本年金機構 ）は、 協会が管掌する健康保険の被保険者 に対し、第24条の4の規定 による 被保険者情報の登録 又はこの省令の規定による 資格確認書の交付 、提供、返付若しくは再交付 （第3項 において「交付等」という。） が行われるまでの間 に当該被保険者を使用する 事業主又は当該被保険者 から 求めがあった 場合において、当該 被保険者又はその被扶養者 が療養を受ける必要がある と認めたと きに限り、被保険者資格証明書 を有効期限を定めて交付する ものとする。 ◯2 被保険者資格証明書 の交付を受けた 被保険者 は、前項に規定する間、第53条の規定にかかわら ず、 被保険者資格証明書 を提出することによって 療養の給付 を受ける資格を明らかにする ことがで きる。 被保険者資格証明書 R03-03D 2025改正 厚生労働大臣 （日本年金機構 ）は、 全国健康保険協会 が管掌する健康保険の被保険者 に 対し、 被保険者情報の登録 または 資格確認書の交付 等が行われるまでの間 に当該被保険者を使用する 事業主ま たは当該被保険者 から求めがあった 場合において、当該 被保険者またはその被扶養者 が療養を受ける必要があ ると認めたときに限り 、「被保険者資格証明書 」を有効期限 を定めて 交付する。（則50条の2第1項） 2025改正 被保険者資格証明書の交付を受けた被保険者 は、則50条の2第1項に規定する間、 被保険者資格証 明書を提出する ことによって 療養の給付を受ける資格を明らかにする ことができる。（則50条の2第2項）","s":"厚生労働大臣（機構）は、協会管掌の被保険者に対し、被保険者情報の登録や資格確認書の交付を行います。","e":"新たに協会けんぽの被保険者になった人に対して、マイナンバーカードでの資格確認に必要な情報の登録や、資格確認書（従来の被保険者証に代わるもの）が交付されます。","p":"2024年12月からマイナ保険証に移行。資格確認書は従来の被保険者証に代わるもの。協会管掌の場合は厚生労働大臣（機構）が交付。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":23},{"r":"則52条","t":"高齢受給者証に関する規定","b":"◯1 保険者 （全国健康保険協会 又は 健康保険組合 ）は、 被保険者 が法第74条第1項第2号若し くは第3号（ 70歳以上の被保険者に係る一部負担割合 ）の規定の適用を受ける 場合、又はその 被扶養者 が法第 110条第2項第1号ハ若しくはニ（ 70歳以上の被扶養者に係る給付割合 ）の規定の適用を受ける 場合であっ て、当該 被保険者又はその被扶養者 が資格確認書 （一部負担金の割合又は100分の100から同号ハ若しくはニ に定める割合を控除して得た割合が記載され、又は記録されていないものに限る。） の交付又は提供を受けて いるときは、当該 被保険者 に高齢受給者証 を有効期限 を定めて 交付しなければならない。 高齢受給者証 被保険者資格証明書は 、事業主または当該被保険者から 「求めがあ った場合において 、当該被保険者またはその被扶養者が療養を受ける 必要があると認めたときに限り 」交付されます 。「必ず」交付される ものではありません 。 被保険者情報の登録が行われたことを確認したなどのときには 、被 保険者資格証明書を 、事業主を経由して厚生労働大臣に 「返納」しな ければなりません 。「事業主が回収し、破棄する 」のではありませ ん。","s":"保険者は、70歳以上の被保険者に対して、一部負担金の割合が記載された高齢受給者証（又は資格確認書等）に関する事務を行います。","e":"70歳になった被保険者には、窓口負担が2割か3割かを示す高齢受給者証が交付されます（現役並み所得者は3割）。","p":"70歳以上75歳未満の被保険者が対象。一部負担割合は原則2割、現役並み所得者は3割。75歳以上は後期高齢者医療制度に移行。","f":"07_健康保険法7-被保険者等（資格の得喪の確認、届出、資格証明書）","pg":25},{"r":"法46条","t":"現物給与の価額","b":"◯1 報酬又は賞与の全部又は一部 が、通貨以外のもので支払われる 場合においては、その 価額は、その 地 方の時価 によって、 厚生労働大臣 が定める 。 ◯2 健康保険組合 は、前項の規定にかかわらず、 規約 で別段の定め をすることができる。 現物給与 報酬または賞与の全部または一部 が、「 通貨以外のもので支払われる 」場合においては、その 価額は、その 地方の時価によって 、厚生労働大臣 が定める 。（法46条1項） 2021改正 通信費・電気料金には 、通話明細書などにより業務のた めの通話に係る料金が確認できる通話料のようなもののみではなく 、 業務に要した費用と生活に要した費用が 「一括」で請求される電気料 金のようなものがあります （電話料金は 、通話明細書などをみれば業 務のための通話に係る料金部分を確認できますが 、電気料金やインタ ーネット代は確認できません ）。 このような 「業務に要した費用と生活に要した費用が一括で請求さ れるもの 」については 、就業規則 、給与規定 、賃金台帳などにおい て、実費弁償分の算出方法が明示され 、「実費弁償に当たるものであ ることが明らかである 」場合には 、当該実費弁償部分については社会 保険料 ・労働保険料などの算定基礎に含める必要はありません 。 現物給与の 価額については 、「厚生労働大臣 」が定めます 。","s":"報酬や賞与の全部又は一部が通貨以外のもので支払われる場合、その価額はその地方の時価によって厚生労働大臣が定めます。","e":"会社が従業員に社宅や食事を現物で提供している場合、その価額は厚生労働省が定める標準価額表に基づいて評価し、報酬に算入します。","p":"現物給与の評価は「その地方の時価」により「厚生労働大臣」が定める。都道府県ごとに異なる価額が設定されている。","f":"08_健康保険法8-報酬、標準報酬月額","pg":17},{"r":"法40条","t":"標準報酬月額の等級区分","b":"◯1 標準報酬月額 は、被保険者 の報酬月額 に基づき、次の 等級区分 （第40条第2項の規定により 等 級区分の改定 が行われたときは、 改定後の等級区分 ）によって定める。 標準報酬月額 「標準報酬月額 」とは、現実に被保険者に支給される報酬とは別個に、 仮定的に設けられた報酬 である。 （解釈と運用361ページ） 等級区分","s":"標準報酬月額は、被保険者の報酬月額に基づき、第1級の58,000円から第50級の1,390,000円までの50等級に区分されています。","e":"月給25万円の人は、標準報酬月額の等級表に当てはめると「260,000円」の等級になります。この金額を基に保険料や傷病手当金が計算されます。","p":"等級数は「50等級」。最低は第1級58,000円、最高は第50級1,390,000円。厚生年金保険は32等級（最高650,000円）との違いが頻出。","f":"08_健康保険法8-報酬、標準報酬月額","pg":29},{"r":"法44条","t":"二以上の事業所で報酬を受ける場合","b":"◯3 同時に2以上の事業所 で報酬を受ける被保険者 について 報酬月額 を算定する場合においては、 各事 業所について、第41条第1項（ 定時決定 ）、第42条第1項（ 資格取得時決定 ）、第43条第1項（ 随時改定 ）、 第43条の2第1項（ 育児休業等終了時改定 ）若しくは第43条の3第1項（ 産前産後休業終了時改定 ）又は第44 条第1項（ 保険者等算定 ）の規定によって算定した額の 合算額 をその者の 報酬月額 とする。 2以上の事業所に使用される場合 同時に2以上の事業所で使用される 場合は、 それぞれの事業所 で受ける 報酬の額 を基礎 として、定時決定など の規定により算定した 報酬月額に相当する額 の合算額 をその者の「 報酬月額 」とする。そして、この報酬月額 によりその者の「 標準報酬月額 」が決定される。（法44条3項）","s":"同時に2以上の事業所で報酬を受ける被保険者の報酬月額は、各事業所の報酬月額を合算して算定します。","e":"A社で月給20万円、B社で月給10万円を受けている人の場合、合計30万円を基に標準報酬月額を決定します。","p":"二以上の事業所の報酬は「合算」して算定。各事業所で個別に算定するのではない。選択した保険者が報酬月額を決定する。","f":"08_健康保険法8-報酬、標準報酬月額","pg":31},{"r":"法41条","t":"定時決定","b":"◯3 第41条第1項（ 定時決定 ）の規定は、 6月1日 から 7月1日 までの間に 被保険者 の資格を取得 した者 及び第43条（ 随時改定 ）、第43条の2（ 育児休業等終了時改定 ）又は第43条の3（ 産前 産後休業終了時改定 ）の規定により 7月 から 9月 までの いずれかの月 から標準報酬月額 を改定さ れ、又は 改定されるべき 被保険者については、その年に限り 適用しない 。 定時決定の対象とされない者①（6月1日から7月1日までに資格を取得した者）","s":"保険者等は、毎年7月1日現在の被保険者について、4月・5月・6月の報酬月額の平均をもって標準報酬月額を決定します。この標準報酬月額はその年の9月から翌年8月まで適用されます。","e":"Aさんの4月の報酬が30万円、5月が28万円、6月が32万円なら、平均30万円を基に標準報酬月額を決定し、9月から翌年8月まで適用します。","p":"基礎となる月は「4月・5月・6月」。適用期間は「9月～翌年8月」。7月1日現在の被保険者が対象。6月1日～7月1日の間に資格取得した者は対象外。","f":"09_健康保険法9-定時決定、資格取得時決定","pg":22},{"r":"則25条","t":"定時決定の届出（算定基礎届）","b":"◯1 毎年 7月1日 現に使用する被保険者 （法第41条第3項に該当する者（定時決定の対象とされない者） を除く。）の 報酬月額 に関する法第48条（適用事業所の届出）の規定による 届出は、 7月10日 までに、 健康保険被保険者 報酬月額算定基礎届 を日本年金機構 又は 健康保険組合 に提出する ことによっ て行うものとする。この場合において、 協会が管掌する健康保険の被保険者が同時に厚生年金保険の被保険者 である ときは、健康保険被保険者 報酬月額算定基礎届 に厚生年金保険の 従前の標準報酬月額 を付記 しなければならない。 「9月1日から翌年8月31日まで 」です。「8月1日から翌年7月31 日まで 」ではありません 。","s":"毎年7月1日現に使用する被保険者の報酬月額について、事業主は届出（算定基礎届）をしなければなりません。届出期限は毎年7月10日までです。","e":"事業主は毎年7月1日～7月10日の間に、全被保険者の4月・5月・6月の報酬を記載した算定基礎届を届け出ます。","p":"届出期限は「7月10日まで」。届出義務者は事業主。定時決定の対象外となる者（6/1～7/1資格取得者、随時改定対象者等）は除かれる。","f":"09_健康保険法9-定時決定、資格取得時決定","pg":36},{"r":"法42条","t":"資格取得時決定","b":"◯1 保険者等 （厚生労働大臣 又は 健康保険組合 ）は、 被保険者 の資格を取得 した者があるときは、 次に掲げる額を 報酬月額 として、 標準報酬月額 を決定する。 1. 月、週その他一定期間によって 報酬が定められる 場合には、被保険者の 資格を取得した日の 現在の報酬の額 をその期間の 総日数 で除して得た額の 30倍 に相当する額 2. 日、時間 、出来高 又は 請負 によって 報酬が定められる 場合には、被保険者の 資格を 取得した 月前1月間 に当該事業所で、 同様の業務 に従事し、かつ、 同様の報酬 を受ける者が 受けた報酬の額 を平均 した額 3. 前2号の規定によって 算定することが困難であるもの については、被保険者の 資格を取得した 月前1 月間 に、その 地方 で、 同様の業務 に従事し、かつ、 同様の報酬 を受ける者が受けた報酬 の額 4. 前3号のうち 2以上に該当する報酬を受ける 場合には、それぞれについて、前3号の規定によって算定し た額の 合算額 資格取得時決定における報酬月額の算定 厚R06-07B 保険者等 （厚生労働大臣または健康保険組合 ）は、 被保険者 の資格を取得した者 があるときは、 次に掲げる額を 報酬月額 として、「 標準報酬月額 」を決定する。（法42条1項） 月、週その他一定期間によって報酬が定められる場合 報酬の額 をその期間の 総日数 （総暦日数 ）で除して得た額の30倍 に相当する額 ただし 、「月給」の場合には 、「月給として定められた額 」をその まま報酬月額 としても差し支えないことになっています 。（解釈と運 用377ページ）","s":"被保険者の資格を取得した者があるときは、保険者等は所定の方法で算定した報酬月額をもって標準報酬月額を決定します。","e":"4月1日に入社して月給30万円のAさんの場合、30万円を基に標準報酬月額を決定します。この標準報酬月額はその年の8月（又は翌年8月）まで適用されます。","p":"資格取得時の報酬月額に基づいて決定。適用期間は取得月によって異なる（1月～5月取得→その年の8月まで、6月～12月取得→翌年の8月まで）。","f":"09_健康保険法9-定時決定、資格取得時決定","pg":38},{"r":"法43条","t":"随時改定","b":"◯2 第43条第1項（ 随時改定 ）の規定によって改定された 標準報酬月額 は、 その年の8月 （7月から1 2月まで のいずれかの月から改定されたものについては、 翌年の8月 ）までの 各月の標準報酬月額 とす る。 有効期間 R03-01C 随時改定における標準報酬月額の有効期間 は次の通りである。（法43条2項） 随時改定における標準報酬月額の有効期間 1. 1月から6月までのいずれかの月から改定された 場合は、「 その年 」の8月まで 2. 7月から12月までのいずれかの月から改定された 場合は、「 翌年」の8月まで","s":"被保険者の報酬が固定的賃金の変動により著しく変わった場合、継続した3月間の報酬月額の平均と現在の標準報酬月額に2等級以上の差があれば、標準報酬月額が改定されます。","e":"基本給が昇給して、その後3か月の平均報酬が現在の標準報酬月額と2等級以上変わった場合、4か月目から新しい標準報酬月額に改定されます。","p":"随時改定の3要件：(1)固定的賃金の変動、(2)3月間の平均で2等級以上の差、(3)3月とも支払基礎日数17日以上。改定後の適用期間は改定月によって異なる。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":34},{"r":"則26条","t":"随時改定の届出（月額変更届）","b":"◯1 法第43条第1項の 随時改定 の要件に該当する場合の被保険者の報酬月額に関する届出 は、 速やか に、健康保険被保険者報酬月額変更届 を日本年金機構 又は 健康保険組合 に提出することによって 行うものとする。この場合において、 協会が管掌する健康保険の被保険者 が同時に 厚生年金保険の被保険者で あるときは、健康保険被保険者報酬月額変更届に 厚生年金保険の従前の標準報酬月額 を付記しなければならな い。 随時改定の届出 事業主 は、随時改定の要件に該当した ときは、「 健康保険被保険者報酬月額変更届 」を、 速やかに 、日本年 金機構また は健康保険組合 に提出しなければならない。（則26条1項）","s":"随時改定の要件に該当する場合、事業主は速やかに被保険者報酬月額変更届を届け出なければなりません。","e":"基本給が大幅に上がって随時改定の要件を満たした場合、事業主は速やかに月額変更届を届け出ます。","p":"届出期限は「速やかに」（○日以内ではない）。定時決定の届出期限（7月10日）とは異なる。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":35},{"r":"法43条の2","t":"育児休業等終了時改定","b":"◯2 第43条の2第1項（ 育児休業等終了時改定 ）の規定によって改定された 標準報酬月額 は、育児休業等終 了日の翌日 から起算して 2月を経過した日 の属する月の 翌月 から その年の8月 （当該翌月が 7 月から12月まで のいずれかの月である場合は、 翌年の8月 ）までの 各月の標準報酬月額 とする。 有効期間 育児休業等終了時改定により改定された標準報酬月額 は、「 育児休業等終了日の翌日 （＝職場復帰の日 ）か ら起算して2か月を経過した日の属する月 」の翌月から適用される。（法43条の2第2項） R07-09ｵ 育児休業等終了時改定における標準報酬月額の有効期間 は次の通りである。（法43条の2第2項） 育児休業等終了時改定における標準報酬月額の有効期間 1. 1月から6月までのいずれかの月から改定された 場合は、「 その年 」の8月まで 2. 7月から12月までのいずれかの月から改定された 場合は、「 翌年」の8月まで 「職場復帰の日から起算して2か月を経過した日の属する月の翌 月」が、1〜6月までならば 、「その年 」の8月まで 、7月〜12月まで ならば 、「翌年」の8月までとなります 。 「2か月を経過した日の属する月の翌月 」からであり 、「2か月を 経過した日の属する月 」からではありません 。 過去厚 H24-09E","s":"育児休業等を終了した被保険者が、休業終了日の翌日が属する月以後3月間の報酬月額の平均に基づき標準報酬月額の改定を申出できます。改定後は、休業終了日の翌日から2月経過した日の属する月の翌月から適用されます。","e":"育休復帰後に時短勤務で給料が下がったAさんは、復帰後3か月の平均報酬で標準報酬月額の改定を申し出ることができます。2等級以上の差がなくても1等級の差で改定可能です。","p":"随時改定と異なり「1等級の差」でも改定可能。「固定的賃金の変動」も要件ではない。申出は被保険者が行う（随時改定は事業主）。支払基礎日数17日未満の月は除く。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":40},{"r":"則26条の2","t":"育児休業等終了時改定の届出","b":"法第43条の2第1項の 育児休業等終了時改定の要件に該当する被保険者の報酬月額に関する届出 は、 速や かに 、育児休業等終了時報酬月額変更届 を日本年金機構 又は 健康保険組合 に提出することによっ て行うものとする。この場合において、 協会が管掌する健康保険の被保険者 が同時に 厚生年金保険の被保険者 である ときは、 厚生年金保険の従前の標準報酬月額 を付記しなければならない。 届出","s":"育児休業等終了時改定の要件に該当する被保険者の報酬月額について、事業主は速やかに届出をしなければなりません。","e":"育休復帰した従業員が改定を希望した場合、事業主は速やかに育児休業等終了時報酬月額変更届を届け出ます。","p":"届出期限は「速やかに」。届出は被保険者の申出に基づき事業主が行う。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":41},{"r":"法43条の3","t":"産前産後休業終了時改定","b":"◯1 保険者等 （厚生労働大臣 又は 健康保険組合 ）は、 産前産後休業を終了した被保険者 が、当該 産 前産後休業 を終了した日 （以下「 産前産後休業 終了日 」という。）において当該 産前産後休業 に係 る子を養育 する場合において、その使用される事業所の 事業主 を経由して厚生労働省令で定めると ころにより 保険者等に申出 をしたとき は、第41条の規定にかかわらず、 産前産後休業 終了日の翌日 が属する月以後 3月間 （産前産後休業 終了日の翌日 において使用される事業所で 継続して使用された 期間に限る ものとし、かつ、 報酬支払の基礎となった日数 が17日 （4分の3基準を満たさない短時間労働 者にあっては、 11日 ）未満 である月 があるときは、その月を 除く。）に受けた 報酬の総額 をその期間の 月数で除して得た額を 報酬月額 として、 標準報酬月額 を改定する。ただし、産前産後休業終了日の 翌日に育児休業等を開始している被保険者は、この限りでない。 産前産後休業終了時改定 「育児休業等終了時報酬月額変更届 」の提出は 、「速やかに 」で す。「5日以内 」ではありません 。","s":"産前産後休業を終了した被保険者が、休業終了日の翌日が属する月以後3月間の報酬月額の平均に基づき標準報酬月額の改定を申し出ることができます。","e":"産休から復帰したBさんが、復帰後の3か月の報酬平均に基づいて標準報酬月額の改定を申し出ることができます。","p":"育児休業等終了時改定と同様の仕組み。1等級の差でも改定可能。産前産後休業終了後に育児休業等を開始した場合は対象外。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":42},{"r":"則26条の3","t":"産前産後休業終了時改定の届出","b":"法第43条の3第1項の 産前産後休業終了時改定の要件に該当する被保険者の報酬月額に関する届出 は、 速 やかに 、産前産後休業終了時報酬月額変更届 を日本年金機構 又は 健康保険組合 に提出することに よって行うものとする。この場合において、 協会が管掌する健康保険の被保険者 が同時に 厚生年金保険の被保 険者である ときは、 厚生年金保険の従前の標準報酬月額 を付記しなければならない。 届出 産前産後休業終了時改定の要件に該当した ときは、「 産前産後休業終了時報酬月額変更届 」を、 速やかに 、 日本年金機構または健康保険組合 に提出しなければならない。（則26条の3）","s":"産前産後休業終了時改定の要件に該当する被保険者の報酬月額について、事業主は速やかに届出をしなければなりません。","e":"産休復帰した従業員が改定を希望した場合、事業主は速やかに産前産後休業終了時報酬月額変更届を届け出ます。","p":"届出期限は「速やかに」。育児休業等終了時改定の届出と同じ流れ。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":48},{"r":"法47条","t":"任意継続被保険者の標準報酬月額","b":"◯1 任意継続被保険者 の標準報酬月額 については、第41条から第44条までの規定にかかわらず、次の各号 に掲げる額のうちいずれか 少ない額 をもって、その者の 標準報酬月額 とする。 1. 当該 任意継続被保険者 が被保険者の資格を喪失した ときの 標準報酬月額 2. 前年 （1月から3月 までの 標準報酬月額 については、 前々年 ）の 9月30日 における当 該任意継続被保険者の属する保険者が管掌する 全被保険者 の同月の 標準報酬月額を平均した額 （健康保険組合 が当該 平均した額の範囲内 においてその 規約で定めた額があるときは、当該 規約で定めた 額）を 標準報酬月額 の基礎となる 報酬月額 とみなしたときの 標準報酬月額 ◯2 保険者 が健康保険組合 である場合においては、前項の規定にかかわらず、 同項第1号に掲げる額 が 同項第2号に掲げる額 を超える任意継続被保険者 について、 規約で定めるところにより、 同項第1号に 掲げる額 （当該 健康保険組合 が同項第2号に掲げる額 を超え同項第1号に掲げる額未満の範囲内 においてそ の規約で定めた額 があるときは、当該 規約で定めた額 を標準報酬月額の基礎 となる 報酬月額 とみなしたときの 標準報酬月額 ）をその者の 標準報酬月額 とすることができる。 任意継続被保険者の標準報酬月額","s":"任意継続被保険者の標準報酬月額は、(1)資格喪失時の標準報酬月額と、(2)全被保険者の標準報酬月額の平均額のいずれか少ない額です。","e":"退職時の標準報酬月額が50万円で、全被保険者の平均が30万円の場合、少ない方の30万円が任意継続の標準報酬月額になります。高額所得者は保険料が下がる仕組みです。","p":"「いずれか少ない額」がポイント。定時決定・随時改定等の規定は適用されない。保険料は全額自己負担。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":49},{"r":"附則3条","t":"特例退職被保険者の標準報酬月額","b":"◯4 特例退職被保険者 の標準報酬月額 については、第41条から第44条までの規定にかかわらず、当該 特 定健康保険組合 が管掌する 前年 （1月から3月 までの標準報酬月額については、 前々年 ）の 9月30日 における 特例退職被保険者以外の全被保険者 の同月の 標準報酬月額を平均した額 の範 囲内においてその 規約で定めた額を 標準報酬月額 の基礎となる 報酬月額 とみなしたときの 標準報酬月額 とする。 特例退職被保険者の標準報酬月額","s":"特例退職被保険者の標準報酬月額は、当該特定健康保険組合が管掌する前年の全被保険者の標準報酬月額の平均額です。","e":"特定健康保険組合の特例退職被保険者の場合、前年の全被保険者の平均的な標準報酬月額が基準になります。","p":"「前年」（1月～3月は前々年）の全被保険者の平均額。特例退職被保険者は特定健康保険組合にのみ存在する制度。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":55},{"r":"則27条","t":"賞与支払届の届出期限","b":"◯1 被保険者 の賞与額に関する法第48条の規定による届出 は、賞与を支払った日 から 5日以内 に、健康 保険被保険者賞与支払届 を日本年金機構 又は 健康保険組合 に提出することによって行うものとす る。 賞与支払届 被保険者の賞与額に関する届出 は、賞与を支払った日 から5日以内 に、「 健康保険被保険者賞与支払届 」を日 本年金機構または健康保険組合 に提出することによって行う。（則27条1項） 2021改正 適用事業所の事業主 が、「 健康保険・厚生年金保険新規適用届 」などを日本年金機構に提出する際 に登録した賞与支払予定月に、いずれの被保険者及び70歳以上被用者に対しても 賞与を支給しなかった 場合 は、当該適用事業所の事業主は、「 健康保険 ・厚生年金保険賞与不支給報告書 」を提出しなければならない。 （令和2年12月18日年管管発1218第2号）","s":"被保険者の賞与額に関する届出は、賞与を支払った日から5日以内に届け出なければなりません。","e":"6月25日にボーナスを支給した場合、6月29日までに被保険者賞与支払届を届け出ます。届出義務者は事業主です。","p":"届出期限は「5日以内」。届出先は機構又は健康保険組合。標準賞与額の上限は年度累計573万円。","f":"10_健康保険法10-随時改定、休業終了時改定、任意継続被保険者の標準報酬月額、 標準賞与額","pg":60},{"r":"法151条","t":"国庫負担","b":"国庫は、毎年度 、予算の範囲内 において、 健康保険事業 の事務（前期高齢者納付金 等、後期高 齢者支援金 等及び第173条の規定による 日雇拠出金 、介護納付金 、流行初期医療確保拠出金 並び に子ども・子育て支援納付金 の納付に関する 事務を含む。）の 執行に要する 費用を負担する。","s":"国庫は毎年度、予算の範囲内で、健康保険事業の事務に要する費用を負担します。","e":"健康保険事業を運営するための人件費やシステム費用などの事務費は、国が負担します。保険給付の費用そのものではなく、運営事務費が対象です。","p":"国庫負担の対象は「事務に要する費用」。「予算の範囲内」で負担。保険給付費そのものの国庫負担は別の規定（法153条等）。","f":"11_健康保険法11-費用の負担（国庫負担、国庫補助、出産育児交付金）","pg":2},{"r":"法152条","t":"健康保険組合への国庫負担金の算定","b":"◯1 健康保険組合 に対して交付する 国庫負担金 は、各健康保険組合 における 被保険者数 を基準として、 厚生労働大臣 が算定する。 ◯2 前項の 国庫負担金 については、 概算払 をすることができる。 事務費の負担","s":"健康保険組合に交付する国庫負担金は、各組合の被保険者数を基準として厚生労働大臣が算定します。","e":"被保険者が1万人の健保組合と5千人の健保組合では、被保険者数に応じて国庫負担金の額が決まります。","p":"算定基準は「被保険者数」。算定するのは「厚生労働大臣」。事務費の国庫負担金の配分方法を定めた規定。","f":"11_健康保険法11-費用の負担（国庫負担、国庫補助、出産育児交付金）","pg":2},{"r":"法154条の2","t":"国庫補助（事業執行費用）","b":"国庫は、第151条（国庫負担）及び第153条及び第154条（国庫補助）に規定する費用のほか、 予算の範 囲内 において、 健康保険事業 の執行に要する費用 のうち、 特定健康診査等 の実施 に要する 費用の 一部を補助することが できる 。 特定健康診査等の費用の国庫補助","s":"国庫は、法定の国庫負担・国庫補助のほか、予算の範囲内で、健康保険事業の執行に要する費用のうち特に必要と認めるものの一部を補助できます。","e":"レセプト点検のシステム構築費用など、通常の事務費とは別に特に必要な事業費用について、国から補助金が出ることがあります。","p":"「予算の範囲内」「特に必要と認めるもの」の一部を補助。任意的な規定。","f":"11_健康保険法11-費用の負担（国庫負担、国庫補助、出産育児交付金）","pg":10},{"r":"法152条の2","t":"出産育児一時金等に対する国庫補助","b":"出産育児一時金及び家族出産育児一時金 （以下「 出産育児一時金等 」という。） の支給に要する費用 （第1 01条の政令で定める金額に係る部分に限る。第152条の4において同じ。） の一部 については、 政令で定める ところにより、高齢者医療確保法第124条の4第1項の規定により 社会保険診療報酬支払基金 が保険者 に 対して交付する 出産育児交付金 をもって 充てる 。 出産育児交付金 2024改正 出産育児一時金及び家族出産育児一時金の支給に要する費用の一部 については、 政令で定めるとこ ろにより、 社会保険診療報酬支払基金 が保険者 に対して交付する 出産育児交付金 をもって 充てる 。（法152条 の2）","s":"出産育児一時金及び家族出産育児一時金の支給に要する費用の一部は国庫が補助します。","e":"出産育児一時金（50万円）の支給に要する費用の一部を国が補助しており、保険者の負担を軽減しています。","p":"出産育児一時金等への国庫補助。補助対象は政令で定める金額に係る部分。2023年4月から出産育児一時金は50万円に引上げ。","f":"11_健康保険法11-費用の負担（国庫負担、国庫補助、出産育児交付金）","pg":11},{"r":"法155条","t":"保険料の徴収","b":"◯1 保険者等 （厚生労働大臣 又は 健康保険組合 ）は、 健康保険事業に要する費用 （前期高齢者納 付金 等及び 後期高齢者支援金 等、介護納付金 、流行初期医療確保拠出金等 並びに 子ども・子育て 支援納付金 並びに 健康保険組合 においては、 日雇拠出金 の納付に要する費用を 含む。）に充てるため、 保険料を徴収 する。 ◯2 前項の規定にかかわらず、 協会が管掌する健康保険 の任意継続被保険者 に関する 保険料 は、協会が 徴収する。 保険料の徴収 2026改正 保険者等 （厚生労働大臣または健康保険組合 ）は、 健康保険事業に要する費用 （前期高齢者納付金 等及び後期高齢者支援金等、介護納付金、流行初期医療確保拠出金等並びに 子ども・子育て支援納付金 並びに 健康保険組合においては、日雇拠出金の納付に要する費用を含む）に充てるため、 保険料 を徴収する。（法15 5条1項） 全国健康保険協会 が管掌する健康保険の「 任意継続被保険者 」に関する 保険料 は、全国健康保険協会 が徴収 する。（法155条2項） R02-04A 厚生労働大臣 が保険料を徴収 する場合において、 適用事業所 の事業主 から保険料 、厚生年金保険料 及び子ども ・子育て拠出金 の一部の 納付があったときは、当該事業主が納付すべき 保険料 、厚生年金保険料 及 び子ども ・子育て拠出金 の額を基準として 按分した額に相当する 保険料の額 が納付されたものとされる。（法1 59条の2）","s":"保険者等は、健康保険事業に要する費用に充てるため、保険料を徴収します。保険料は被保険者と事業主が負担します。","e":"毎月の健康保険料は、被保険者の標準報酬月額に保険料率を掛けて計算され、被保険者と事業主が折半で負担します。","p":"保険料の徴収権者は「保険者等」（厚生労働大臣又は健康保険組合）。保険料は労使折半が原則だが、健保組合は規約で事業主の負担割合を増やせる。","f":"12_健康保険法12-費用の負担（保険料）","pg":2},{"r":"法155条の2","t":"政府から協会への保険料の交付","b":"政府は、 協会 が行う 健康保険事業 に要する費用 に充てるため、 協会 に対し、 厚生労働大臣 が 徴収した保険料 その他健康保険法の規定による 徴収金の額 及び印紙をもってする歳入金納付に関する法律の規 定による 納付金に相当する額 から 厚生労働大臣 が行う 健康保険事業の事務の執行に要する費用 に相当す る額（当該費用に係る国庫負担金の額を除く。）を 控除した額 を交付 する。 保険料等交付金の交付 政府は、全国健康保険協会が行う健康保険事業 に要する費用 に充てるため、 全国健康保険協会 に対し、厚生 労働大臣が徴収した 保険料 その他健康保険法の規定による 徴収金の額 及び印紙をもってする歳入金納付に関す 労働保険料と異なり 、「概算保険料 」や「確定保険料 」といった概 念はでてきません 。 る法律の規定による 納付金に相当する額 から厚生労働大臣が行う健康保険事業の事務の執行に要する費用に相 当する額を控除した額を 交付する。（法155条の2） 政府は、厚生労働大臣が徴収した保険料等が「 年金特別会計の健康勘定 」において 収納されたときは、その 都度遅滞なく 、全国健康保険協会 に対し、当該「 収納された保険料等の額 」から厚生労働大臣が行う健康保険 事業の「事務の執行に要する費用に相当する額（当該費用に係る国庫負担金の額を除く）として厚生労働省令 で定めるところにより算定した額」を 控除した額を「 保険料等交付金 」として 交付する。（令44条の7第1項） R07-04D 政府は、当該年度の健康勘定に前年度の決算上の 剰余金が繰り入れられた ときは、 遅滞なく 、全国 健康保険協会 に対し、当該繰り入れられた額（保険料等に係るもの以外のものとして厚生労働大臣が定めるも のを除く）を「 保険料等交付金 」として 交付する。（令44条の7第2項）","s":"政府は、協会が行う健康保険事業に要する費用に充てるため、厚生労働大臣が徴収した保険料等の額から徴収に要する費用を控除した額を協会に交付します。","e":"協会けんぽの保険料は厚生労働大臣（年金事務所）が徴収し、徴収コストを差し引いた残りを協会に渡します。協会はそのお金で保険給付等を行います。","p":"保険料の徴収は厚生労働大臣が行い、徴収費用を控除して協会に交付する仕組み。健保組合は自ら徴収。","f":"12_健康保険法12-費用の負担（保険料）","pg":3},{"r":"法156条","t":"保険料額の算定","b":"◯1 被保険者 に関する 保険料額 は、 各月 につき、次の各号に掲げる被保険者の区分に応じ、当該各号に 定める額とする。 1. 介護保険法第9条第2号に規定する被保険者 （以下「 介護保険第2号被保険者 」という。）である 被 保険者 …一般保険料等額 （各被保険者の 標準報酬月額 及び標準賞与額 にそれぞれ一般保険料率（基本 保険料率と特定保険料率とを合算した率をいう。）と子ども・子育て支援金率とを合算した率を乗じて得 た額をいう。以下同じ。）と 介護保険料額 （各被保険者の標準報酬月額及び標準賞与額にそれぞれ介 護保険料率を乗じて得た額をいう。以下同じ。）との 合算額 2. 介護保険第2号被保険者である被保険者以外の被保険者 …一般保険料等額 保険料額 2026改正 被保険者に関する保険料額 は、各月につき、次の通りである。（法156条1項） 「健康保険の保険料 」の徴収は 、「厚生年金保険料 」及び「子ど も・子育て拠出金 」の徴収 と一体的に行われます （健康保険料及び厚 生年金保険料は一緒に給与から天引きされるということです 。なお、 子ども・子育て拠出金は事業主負担のため給与からの天引きはありま せん）。 前述した通り 、全国健康保険協会が管掌する 「任意継続被保険者 」 の保険料 は、全国健康保険協会が直接徴収します 。","s":"被保険者の毎月の保険料額は、標準報酬月額に一般保険料率（又は一般保険料率＋介護保険料率）を掛けた額です。介護保険第2号被保険者とそれ以外で計算が異なります。","e":"40歳以上65歳未満のAさん（標準報酬月額30万円、一般保険料率10%、介護保険料率1.6%）の保険料は、30万円×11.6%＝34,800円です（労使折半で各17,400円）。","p":"介護保険第2号被保険者（40歳以上65歳未満）は一般保険料率＋介護保険料率。それ以外は一般保険料率のみ。賞与からも保険料を徴収。","f":"12_健康保険法12-費用の負担（保険料）","pg":5},{"r":"附則7条","t":"特定被保険者の介護保険料","b":"◯1 健康保険組合 は、規約で定めるところにより、 介護保険第2号被保険者である被保険者以外の被保 険者（介護保険第2号被保険者である被扶養者があるもの に限る。以下「 特定被保険者 」という。）に関 する保険料額 を一般保険料等額 と介護保険料額 との合算額 とすることができる。 特定被保険者の保険料額 R07-02ｲ 健康保険組合 は、被保険者本人が介護保険第2号被保険者でない 場合であっても、 介護保険第2号被 保険者である被扶養者がある ときは、 規約により、 当該被保険者 （特定被保険者 ）に介護保険料額の負担を求 めることができる。（附則7条1項）","s":"健康保険組合は、規約で定めるところにより、介護保険第2号被保険者でない被保険者であっても、介護保険第2号被保険者である被扶養者がいる場合に介護保険料を徴収できます（特定被保険者）。","e":"35歳の被保険者でも、45歳の配偶者（被扶養者）がいる場合、健保組合の規約により介護保険料を徴収されることがあります。","p":"「特定被保険者」制度は健保組合のみの仕組み。協会けんぽには適用されない。規約で定める必要がある。","f":"12_健康保険法12-費用の負担（保険料）","pg":7},{"r":"附則8条","t":"承認健康保険組合の介護保険料率の特例","b":"◯1 政令で定める要件に該当するものとして 厚生労働大臣 の承認 を受けた 健康保険組合 （以下「 承認 健康保険組合 」という。）は、 介護保険第2号被保険者 である被保険者（その保険料額を一般保険料等額と 介護保険料額との合算額とされた特定被保険者を含む。）に関する 保険料額 を一般保険料等額 と特別 介護保険料額 との合算額 とすることができる。 ◯2 前項の 特別介護保険料額 の算定方法 は、政令で定める基準に従い、各年度における当該 承認健康保 険組合 の特別介護保険料額の総額 と当該 承認健康保険組合 が納付すべき 介護納付金の額 とが 等し くなるように 規約で定める ものとする。 特別介護保険料額 2026改正 承認健康保険組合 は、「 介護保険第2号被保険者 」である被保険者 （特定被保険者を含む ）に関す る保険料額 を「一般保険料等額 と特別介護保険料額との 合算額 」とすることができる。（附則8条1項）","s":"厚生労働大臣の承認を受けた健康保険組合（承認健康保険組合）は、介護保険第2号被保険者である被保険者以外からも含めて一律の介護保険料率を適用できます。","e":"承認を受けた健保組合では、40歳未満の被保険者にも介護保険料に相当する部分を含めた保険料率を適用することができます。","p":"承認健康保険組合は厚生労働大臣の「承認」が必要。特定被保険者制度と関連するが別の制度。","f":"12_健康保険法12-費用の負担（保険料）","pg":12},{"r":"法160条","t":"一般保険料率の範囲（協会）","b":"◯1 協会 が管掌する健康保険の被保険者に関する一般保険料率 は、 1,000分の30 から 1,000分の 130 までの 範囲内 において、 支部被保険者 を単位として 協会 が決定するものとする。","s":"協会が管掌する健康保険の一般保険料率は、1,000分の30から1,000分の130までの範囲内で、支部被保険者を単位として都道府県ごとに設定します。","e":"東京支部の保険料率は9.98%、北海道支部は10.29%など、都道府県ごとに異なる保険料率が設定されます。保険料率は3%～13%の範囲です。","p":"保険料率の範囲は「1,000分の30～1,000分の130」。「都道府県単位」で設定。保険料率は地域の医療費の実態を反映。","f":"13_健康保険法13-費用の負担（保険料率）","pg":1},{"r":"法162条","t":"健康保険組合の保険料負担割合の特例","b":"健康保険組合 は、第161条第1項の規定にかかわらず、 規約で定めるところにより、 事業主 の負担 すべき 一般保険料等額 又は 介護保険料額 の負担の割合 を増加 することができる。 健康保険組合の特例 R06-07A 2026改正 健康保険組合 は、規約で定めるところにより、「 事業主 」の負担すべき 一般保険料等額 または介護保険料額 の負担の割合 を増加することができる 。（法162条） 一般保険料等額のみならず 、「介護保険料額 」についても 事業主負 担割合を増加することができます 。 「被保険者 」の負担割合を増額することはできません 。 事業主の負担すべき一般保険料等額または介護保険料額の負担の割 合を「増加」することができます 。「増減」ではありません 。","s":"健康保険組合は、規約で定めるところにより、事業主の負担割合を増やすことができます（被保険者の負担を軽くできる）。","e":"ある健保組合では、本来50:50の保険料負担を、規約により事業主60:被保険者40にしています。事業主が多く負担しています。","p":"「事業主の負担割合を増やす」ことはできるが、「被保険者の負担割合を増やす」ことはできない。協会けんぽは折半のみ。健保組合のみの特例。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":3},{"r":"法159条","t":"育児休業等期間中の保険料免除","b":"◯1 育児休業等 をしている 被保険者 （第159条の3（ 産前産後期間中の保険料免除 ）の規定の適用を受けて いる被保険者を 除く。次項において同じ）が使用される 事業所 の事業主 が、厚生労働省令で定めるとこ ろにより 保険者等 に申出 をしたときは、次の各号に掲げる場合の区分に応じ、当該各号に定める月の当 該被保険者に関する 保険料 （その 育児休業等の期間 が1月以下 である者については、 標準報酬月額 に係る 保険料 に限る。）は、 徴収しない 。 1. その育児休業等を 開始した日の属する月 とその育児休業等が 終了する日の翌日が属する月 とが異なる 場 合…その育児休業等を 開始した日の属する月 からその育児休業等が 終了する日の翌日が属する月の前月 ま での月 2. その育児休業等を 開始した日の属する月 とその育児休業等が 終了する日の翌日が属する月 とが同一であ り、かつ、当該月における育児休業等の日数として厚生労働省令で定めるところにより計算した日数が 14日以上 である場合… 当該月 ◯2 被保険者が連続する2以上の育児休業等をしている場合（これに準ずる場合として厚生労働省令で定め る場合を含む。）における前項の規定の適用については、その全部を一の育児休業等とみなす。 育児休業等期間中の保険料免除 R06-10C 3歳未満の子 を養育する被保険者（ 任意継続被保険者及び特例退職被保険者を除く ）が、 育児休業 等をしたときは、 事業主の申出 により、 被保険者の保険料 は、事業主負担分 ・被保険者負担分 とも免除され る。（法159条1項、法158条かっこ書、附則3条の6） この免除の規定における 「育児休業等 」とは、育児・介護休業法 に 規定される育児休業等をいいます 。育児・介護休業法に規定する 「育 児休業 」は原則1歳までですが 、ここでいう 「育児休業等 」には、 「育児休業に関する制度に準ずる措置 」などによる休業なども含まれ るため 、「3歳」までの保険料免除 が認められています 。（法43条の 2第1項、育介法2条・23条・24条）（1-6-7参照） 2023改正 被保険者が 連続する2以上の育児休業等をしている 場合には、その全部が 一の育児休業等 とみなさ れる。（法159条2項） 当該育児休業等の 対象となる子が3歳に達する日以後の休業 について 労使協定により定められている場合であ っても 、本免除制度は 3歳未満の子を養育するための育児休業等に限って適用 される。（平成17年3月29日保保 発0329001号、庁保険発0329002号） R02-10D 法159条（育児休業等期間中の保険料の免除）の規定により保険料の徴収を行わない被保険者を使 用する 事業主 は、当該被保険者が 育児休業等終了予定日を変更 したとき、または 育児休業等終了予定日の前日 までに育児休業等を終了 したときは、 速やかに 、これを 厚生労働大臣 （日本年金機構 ）または健康保険組合 に 届け出 なければならない。ただし、当該被保険者が育児休業等終了予定日の前日までに法159条の3（産前産後 休業期間中の保険料の免除）の規定の適用を受ける産前産後休業を開始したことにより育児休業等を終了した ときは、この限りでない。（則135条2項） 保険者 は、育児休業等終了予定日前 に育児休業等を終了したと確認 したとき は、「育児休業等取得者終了確 認通知書」により 事業主等に通知 するが、 育児休業等期間中 に被保険者資格を喪失 した場合については、終了 に係る 通知は行わない 。（平成17年3月29日保保発0329001号・庁保険発第0329002号） 保険料免除の申出書の提出 は、育児・介護休業法2条1号にいう、「被保険者の養育する子が1歳に達する日 までの育児休業」、「当該子が1歳に達する日から1歳6か月に達する日までの育児休業」、「1歳から3歳に達 する日までの育児休業の制度に準ずる措置による休業」に分け、 その都度 、当該育児休業期間中において行 う。（平成17年3月29日保保発0329001号、庁保険発0329002号） 法159条の3 （産前産後期間中の保険料免除 ）の規定の適用を受け ている被保険者は除かれます 。 「介護休業期間中 」については 、保険料は免除されません 。 任意継続被保険者及び特例退職被保険者 の保険料は 免除されませ ん。","s":"育児休業等をしている被保険者が使用される事業所の事業主が申出をしたときは、育児休業等を開始した日の属する月からその休業が終了する日の翌日が属する月の前月までの保険料が免除されます。","e":"4月15日から育休を開始し、翌年4月14日に終了した場合、4月分から翌年3月分までの保険料が免除されます（被保険者分・事業主分とも）。","p":"免除期間は「開始日の属する月～終了日の翌日の属する月の前月」。被保険者分・事業主分の両方が免除。賞与の保険料も免除されるが、月末を含む育休でないと月の保険料は免除されない（2022年改正）。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":7},{"r":"法159条の3","t":"産前産後休業期間中の保険料免除","b":"産前産後休業 をしている 被保険者 が使用される事業所の 事業主 が、厚生労働省令で定めるところによ り保険者等 に申出 をしたときは、その 産前産後休業 を開始した日の属する月 からその 産前産後休業 が終了する日の翌日が属する月の前月 までの期間、当該被保険者に関する 保険料を徴収しない 。 産前産後休業期間中の保険料免除 2023改正 育児休業等の期間が 「1か月以下 」である者 について は、「標準報酬月額 」に係る保険料に限られます 。「標準賞与額 」に 係る保険料は免除されません （標準賞与額に係る保険料 については 、 1か月を超える 育児休業を取得している場合に限り 、免除されま す）。","s":"産前産後休業をしている被保険者について、事業主が申出をしたときは、産前産後休業を開始した日の属する月から終了する日の翌日が属する月の前月までの保険料が免除されます。","e":"出産予定日の42日前から産前休業を開始し、産後56日まで休業する場合、その期間の属する月の保険料が免除されます。","p":"育児休業等の保険料免除（法159条）とは別の規定。産前産後休業期間中は被保険者分・事業主分とも免除。2014年4月から施行。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":13},{"r":"法167条","t":"保険料の控除（源泉控除）","b":"◯1 事業主 は、被保険者 に対して 通貨 をもって 報酬を支払う 場合においては、 被保険者 の負担すべき 前月 の標準報酬月額 に係る 保険料 （被保険者が その事業所に使用されなくなった 場合においては、 前 月及び その月 の標準報酬月額 に係る 保険料 ）を 報酬 から控除する ことができる。 ◯2 事業主 は、被保険者 に対して 通貨 をもって 賞与を支払う 場合においては、 被保険者 の負担すべき 標 準賞与額 に係る 保険料 に相当する額を当該 賞与 から控除する ことができる。 ◯3 事業主 は、前2項の規定によって 保険料を控除 したときは、 保険料の控除に関する計算書を作成 し、その 控除額 を被保険者 に通知 しなければならない。 保険料の源泉徴収","s":"事業主は、被保険者に報酬を通貨で支払う場合、被保険者が負担すべき前月の保険料を報酬から控除できます。","e":"4月に支払う給与からは、3月分の健康保険料を差し引くことができます。これが毎月の給与明細に表示される「健康保険料」です。","p":"控除できるのは「前月分」の保険料。「前月」がポイントで、当月分ではない。被保険者が資格を喪失した月の保険料は控除できない（原則）。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":20},{"r":"法164条","t":"保険料の過誤納・充当・還付","b":"◯2 保険者等 は、被保険者 に関する 保険料 の納入の告知 をした後に 告知をした保険料額 が当該 納付義務 者の納付すべき保険料額を超えている ことを 知った とき、又は納付した被保険者に関する 保険料額 が当 該納付義務者 の納付すべき保険料額を超えている ことを 知った ときは、その 超えている部分に関する納 入の告知又は納付 を、その告知又は納付の日の翌日から 6月以内 の期日に納付されるべき 保険料 について 納期を繰り上げてしたもの とみなす ことができる。 保険料の繰上充当 R03-07E 保険者等 は、被保険者に関する 保険料の納入の告知をした後 に告知をした保険料額 が当該 納付義務 者の納付すべき保険料額を超えている ことを知ったとき（ 保険者側のミス ）、または納付した被保険者に関す る保険料額が当該 納付義務者 の納付すべき保険料額を超えている ことを知ったとき（ 事業主等側のミス ）は、 その超えている部分に関する納入の告知または納付 を、その 告知または納付の日の翌日から 6か月以内の期日に 納付されるべき保険料 について 納期を繰り上げてしたもの とみなす ことができる 。（法164条2項）","s":"保険者等は、保険料の告知後に告知した額が納付すべき額を超えていることを知ったときは、その超過額を次の保険料等に充当するか、還付しなければなりません。","e":"4月に離職した社員の保険料を余分に納めてしまった場合、超過分を翌月の保険料に充当するか、返金してもらえます。","p":"過誤納保険料は「充当」又は「還付」。還付請求権の時効は2年。充当が優先されることが多い。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":28},{"r":"法166条","t":"口座振替による保険料納付","b":"厚生労働大臣 は、納付義務者 から、預金又は貯金の払出しとその払い出した 金銭による保険料の納付 をその預金口座又は貯金口座のある 金融機関に委託して行う ことを希望 する旨の 申出 があった場合にお いては、その 納付が確実 と認められ、かつ、その 申出を承認 することが 保険料の徴収上有利 と認められ るときに限り、その 申出を承認 することができる。 口座振替による納付 厚生労働大臣 は、納付義務者 から、預金または貯金の払出しとその払い出した金銭による保険料の納付をそ の預金口座または貯金口座のある 金融機関に委託して行うことを希望する 旨の申出があった場合においては、 その納付が確実 と認められ、かつ、その 申出を承認することが保険料の徴収上有利と認められる ときに限り、 その申出を承認する ことができる。（法166条） 前納をした後に、「保険料の引上げ」が行われた場合、引上げ以後 の保険料を前納保険料で順次充当していきます。充当の結果、不足額 が生じた場合には、初めて不足額が生じる月の10日までにその不足 額を納付しなければなりません。（平成9年8月14日保険発106号） 不足の生じる月の 「10日」までに払い込まなければならず 、「初 日」までに払い込まなければならないのではありません 。","s":"厚生労働大臣は、納付義務者からの申出により、預金口座からの口座振替による保険料納付を認めることができます。","e":"事業主が毎月の保険料を銀行口座から自動引落しで納付できるよう、口座振替の手続きを行います。","p":"口座振替は「納付義務者の申出」により認められる。強制ではなく任意の制度。","f":"14_健康保険法14-費用の負担（保険料の負担・免除、保険料の納付）","pg":37},{"r":"附則2条","t":"健康保険組合の調整保険料","b":"◯1 健康保険組合 が管掌する健康保険 の医療に関する給付 、保健事業 及び 福祉事業 の実 施又は 健康保険組合 に係る 前期高齢者納付金 等、後期高齢者支援金 等、日雇拠出金 、介 護納付金 、流行初期医療確保拠出金等 若しくは 子ども・子育て支援納付金 の納付に要する費用 の財源の不 均衡を調整する ため、 健康保険組合連合会 は、政令で定めるところにより、 会員である 健康保険組合 に 対する 交付金の交付 の事業を行うものとする。 ◯2 会員である 健康保険組合 は、前項の 事業に要する費用 に充てるため、 健康保険組合連合会 に対 し、政令で定めるところにより、 拠出金を拠出 するものとする。 ◯3 会員である 健康保険組合 は、前項の規定による 拠出金の拠出に要する費用に充てる ため、 調整保 険料 を徴収する。 健康保険組合連合会による財政調整事業と調整保険料 2026改正 健康保険組合が管掌する健康保険 の医療に関する給付 、保健事業 及び福祉事業 の実施または 健康保 険組合 に係る 前期高齢者納付金等 、後期高齢者支援金等 、日雇拠出金 、介護納付金 、流行初期医療確保拠出金 等 若しくは 子ども ・子育て支援納付金 の納付に要する費用の 財源の不均衡を調整する ため、 健康保険組 合連合会 は、会員である 健康保険組合 に対する「 交付金 」の交付の事業を行うものとする。（附則2条1項） 会員である 健康保険組合 は、事業に要する費用に充てるため、 健康保険組合連合会 に対し、「 拠出金 （財政 調整事業拠出金 ）」を拠出 する。（附則2条2項） 会員である 健康保険組合 は、拠出金の拠出に要する費用に充てる ため、「 調整保険料 」を徴収する。（附則2 条3項）","s":"健康保険組合が管掌する健康保険の医療に関する給付等の実施や前期高齢者納付金等の納付に要する費用の財源の不均衡を調整するため、調整保険料を徴収できます。","e":"高齢者の加入者が多い健保組合は医療費が高く、若い加入者が多い健保組合は低い。この不均衡を調整するために調整保険料が徴収されます。","p":"調整保険料は健保組合間の財政調整のための仕組み。健保組合連合会を通じて行われる。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":2},{"r":"法172条","t":"繰上徴収","b":"保険料 は、次に掲げる場合においては、 納期前 であっても、 すべて徴収する ことができる。 1. 納付義務者 が、次のいずれかに該当する場合 ア. 国税、地方税 その他の 公課の滞納 によって、 滞納処分 を受ける とき。 イ. 強制執行 を受ける とき。 ウ. 破産手続開始の決定 を受けた とき。 エ. 企業担保権の実行手続の開始 があった とき。 オ. 競売の開始 があった とき。 2. 法人である納付義務者 が、 解散 をした場合 3. 被保険者の使用される事業所 が、 廃止 された場合 保険料の繰上徴収 保険料 は、次に掲げる場合においては、 納期前であっても 、すべて 徴収される ことがある。（法172条） 保険料の繰上徴収 1. 納付義務者 が、次のいずれかに該当する場合 ア. R05-04D 国税、地方税その他の 公課の滞納 によって、 滞納処分 を受けるとき。 イ. 強制執行 を受けるとき。 ウ. R05-05E 破産手続開始 の決定 を受けたとき。 エ. 企業担保権の実行手続の開始 があったとき。 オ. 競売の開始 があったとき。 2. 法人である納付義務者 が、解散をした場合 3. 被保険者の使用される事業所 が、廃止された場合","s":"保険料は、納付義務者が国税等の滞納処分を受けたとき、強制執行を受けたとき、破産手続開始の決定を受けたとき等には、納期前であってもすべて徴収することができます。","e":"事業主が税金の滞納で差押えを受けた場合、まだ納期が来ていない保険料もすべて繰り上げて徴収できます。","p":"繰上徴収の事由は「国税等の滞納処分」「強制執行」「破産」「法人の解散」等。「すべて」徴収できる。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":7},{"r":"法180条","t":"督促","b":"◯1 保険料等を滞納する者 （以下「 滞納者 」という。）があるときは、 保険者等 は、期限を指定して、これ を督促 しなければならない。ただし、第172条（ 保険料の繰上徴収 ）の規定により 保険料 を徴収すると きは、 この限りでない 。 ◯2 前項の規定によって 督促をしようとするときは、 保険者等 は、納付義務者 に対して、 督促状 を発す る。 ◯3 前項の 督促状により指定する期限 は、督促状を発する日 から起算して 10日以上を経過した日 でな ければならない。ただし、第172条（保険料の繰上徴収）各号のいずれかに該当する場合は、この限りでな い。 督促 滞納者があるとき は、保険者等 は、期限を指定して、これを 督促しなければならない 。ただし、法172条 （保険料の繰上徴収 ）の規定により保険料を徴収するときは、 この限りでない 。（法180条1項）","s":"保険料等を滞納する者があるときは、保険者等は期限を指定してこれを督促しなければなりません。ただし、繰上徴収の場合は督促不要です。督促状の指定期限は発する日から起算して10日以上後にしなければなりません。","e":"保険料を期限までに納めなかった事業所に対して、「○月○日までに納めてください」という督促状が届きます。この期限は督促状を発する日から10日以上先に設定されます。","p":"督促は「しなければならない」（義務）。指定期限は「10日以上」。繰上徴収の場合は督促不要。督促→延滞金→滞納処分の流れが頻出。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":10},{"r":"法181条","t":"延滞金","b":"◯1 第180条第1項の規定によって 督促をした ときは、 保険者等 は、徴収金額 に、 納期限の翌日 から 徴収金完納又は財産差押えの日の前日 までの 期間の日数 に応じ、 年14.6パーセント （当該 督促が保 険料に係るものであるときは、当該 納期限の翌日 から 3月を経過する日 までの期間については、 年7.3 パーセント ）の割合を乗じて計算した 延滞金 を徴収する。ただし、次の各号のいずれかに該当する場 合又は滞納につきやむを得ない事情があると認められる場合は、この限りでない。 1. 徴収金額 が1,000円未満 であるとき。 2. 納期を繰り上げて徴収 するとき。 3. 納付義務者の住所若しくは居所が国内にないため、又はその住所及び居所がいずれも明らかでないた め、 公示送達 の方法によって督促をした とき。 ◯3 延滞金 を計算するに当たり、 徴収金額 に1,000円未満 の端数があるときは、その 端数は、 切り捨 てる 。 ◯4 督促状に指定した期限 までに 徴収金 を完納 したとき、又は第1項から第3項の規定によって計算し た金額が 100円未満 であるときは、 延滞金は 、徴収しない 。 ◯5 延滞金の金額 に100円未満 の端数があるときは、その 端数は、 切り捨てる 。 延滞金の徴収 保険者等 は、保険料等 の納付を 督促したときは、 延滞金 を徴収する。（法181条1項） 「延滞金 」は、滞納保険料に対する公法上の 「遅延利息 」です。 （解釈と運用1265ページ）","s":"督促をしたときは、徴収金額に、納期限の翌日から完納又は財産差押えの日の前日までの期間の日数に応じて延滞金を徴収します。延滞金の割合は年14.6%（最初の3月間は年7.3%）です。","e":"保険料100万円を3か月滞納した場合、最初の3か月は年7.3%の割合で延滞金がかかります。3か月を超えると年14.6%に上がります。","p":"延滞金の割合は「年14.6%」（最初の3月は「年7.3%」）。計算期間は「納期限の翌日～完納又は差押えの日の前日」。延滞金額が1,000円未満の場合は徴収しない。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":17},{"r":"法181条の3","t":"滞納者情報の共有","b":"◯1 厚生労働大臣 は、 協会 と協議を行い、効果的な保険料の徴収を行うために必要があると認めるとき は、協会に保険料の 滞納者 に関する 情報その他 必要な情報 を提供するとともに、当該 滞納者 に係る 保険 料の徴収 を行わせることができる。 全国健康保険協会による滞納者に係る保険料の徴収 全国健康保険協会 は、保険者として保険料率等を決定するなど 、保 険財政 に関して 責任を担っている ことから 、その財源の確保について もすべて日本年金機構に依存するだけでなく 、一定の責任 を持ってい ます。 このため 、全国健康保険協会 は、適用事業所に対し 、広報・勧奨を 行うとともに 、その他厚生労働大臣の行う保険料の徴収に係る業務に 対する適切な協力を行うことが義務づけられています 。（解釈と運用 1266ページ） 法181条の2は、全国健康保険協会設立に伴い新設された規定で、次の2 点を義務づけています。 1. 事業の意義 ・内容に関する広報の実施 （被保険者や事業主に対し、 健康保険制度の意義や給付内容などについて積極的に情報提供し啓発 活動を行うこと） 2. 保険料納付の勧奨と徴収業務への協力 （保険料の適正な納付を促す 働きかけ（勧奨）を行うとともに、厚生労働大臣（政府）が行う保険 料徴収業務に対して適切に協力すること） 厚生労働大臣 は、全国健康保険協会 と協議を行い、効果的な保険料の徴収を行うために必要があると認める ときは、 全国健康保険協会 に保険料の 滞納者 に関する情報 その他 必要な 情報を提供するとともに、当該滞納者 に係る 保険料の徴収を行わせる ことができる。（法181条の3第1項）","s":"厚生労働大臣は、協会と協議を行い、効果的な保険料徴収のため必要があると認めるときは、協会に保険料の滞納者に関する情報を提供できます。","e":"協会けんぽの保険料を滞納している事業所の情報を、厚生労働大臣が協会に提供して、効果的な徴収を図ります。","p":"情報提供は「協会との協議」を経て行う。あくまで「効果的な保険料の徴収」が目的。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":26},{"r":"法182条","t":"先取特権の順位","b":"保険料等 の先取特権の順位 は、 国税 及び 地方税 に次ぐもの とする。","s":"保険料等の先取特権の順位は、国税及び地方税に次ぐものとされています。","e":"事業主が破産した場合、保険料の回収は国税・地方税の次に優先されます。一般の債権者より先に回収できます。","p":"先取特権の順位は「国税及び地方税に次ぐ」。第2順位であることが重要。労働保険の保険料と同じ順位。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":28},{"r":"法183条","t":"保険料等の徴収方法","b":"保険料等 は、健康保険法に別段の規定があるものを除き、 国税徴収の例 により 徴収する。 先取特権の順位 保険料等の先取特権の順位 は、国税及び地方税に次ぐ ものとする。（法182条） 徴収に関する通則 保険料等 は、健康保険法に別段の規定があるものを除き、 国税徴収の例 により 徴収される。（法183条） 「国税及び地方税
