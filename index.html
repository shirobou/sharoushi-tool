に次ぐ 」ものです 。「国税及び地方税に優先す る」のではありません 。","s":"保険料等は、健康保険法に別段の規定があるものを除き、国税徴収の例により徴収します。","e":"保険料を滞納した事業主の財産を差し押さえる際は、国税を徴収するときと同じ手続き（国税徴収法の規定）に従って行います。","p":"「国税徴収の例により徴収」は、国税と同等の強制徴収力があることを意味する。滞納処分（差押え等）が可能。","f":"15_健康保険法15-費用の負担（調整保険料、滞納に対する措置等）","pg":28},{"r":"法63条","t":"療養の給付の範囲・受給手続","b":"◯3 療養の給付 を受けようとする者 は、次に掲げる 病院若しくは 診療所 又は薬局のうち、 自己の選定 する ものから、 電子資格確認等 により被保険者であることの 確認を受け、 療養の給付を 受ける ものとす る。 1. 厚生労働大臣 の指定 を受けた 病院若しくは診療所 （以下「 保険医療機関 」という。）又 は薬局（以下「 保険薬局 」という。） 2. 特定の保険者 が管掌する被保険者に対して診療又は調剤を行う 病院若しくは診療所又は薬局 であっ て、当該保険者が 指定 したもの 3. 健康保険組合 である保険者が開設する 病院若しくは診療所又は薬局 保険医療機関または保険薬局 療養の給付を受けようとする者 は、次の 保険医療機関等 のうち、 自己の選定するもの から、 電子資格確認等 により被保険者であることの 確認を受け、 療養の給付を受ける ものとされている。（法63条3項） 保険医療機関等 定義 診療対象・性格 保険医療機関 、保険薬局 （法63条3項1号） 厚生労働大臣 の指定を受け た病院若しくは診療所または 薬局 被保険者であればすべての者 に対して療 養の給付を行う大部分の病院、診療所、薬 局（開放的 ） 保険者指定病院等 （事業主医局等 ） （法63条3項2号） 特定の保険者 が管掌する被 保険者 に対して診療または調 剤を行う病院若しくは診療所 または薬局 事業主医局における利用者は 健康保険組 合の組合員である被保険者に限定 され、こ の限定された被保険者のために設置された ものであり、 事業主と利用者である被保険 者との間に、 雇用関係その他特別な関係が 存在している もの（閉鎖的 ） 組合直営病院等 （法63条3項3号） 健康保険組合である保険者 が開設 する病院若しくは診療 所または薬局 健康保険組合 が、療養の給付を自ら行う ために開設されたものであり、利用者は 当 該健康保険組合の組合員である被保険者に 限定されるもの（ 閉鎖的 ）","s":"療養の給付を受けようとする者は、保険医療機関等のうち自己の選定するものから、電子資格確認等により被保険者であることの確認を受けて給付を受けます。療養の給付の範囲は、診察、薬剤の支給、処置・手術等、在宅療養等、入院・看護です。","e":"風邪を引いたAさんは、好きな病院を選んでマイナンバーカード（又は資格確認書）を提示し、3割の自己負担で診察や薬の処方を受けます。","p":"療養の給付の5つの範囲（診察、薬剤の支給、処置・手術等、在宅療養、入院・看護）。「自己の選定する」＝フリーアクセス。食事療養・生活療養は療養の給付に含まれない。","f":"16_健康保険法16-給付担当機関","pg":2},{"r":"法70条","t":"保険医療機関等の責務","b":"◯1 保険医療機関又は保険薬局 は、当該 保険医療機関 において診療に従事する 保険医 又は当該 保険 薬局において調剤に従事する 保険薬剤師 に、診療又は調剤に当たらせる ほか、 療養の給付 を担当し なければならない。 保険医療機関または保険薬局 は、当該保険医療機関において診療に従事する 保険医 または当該保険薬局にお いて調剤に従事する 保険薬剤師 に、診療または調剤に当たらせる ほか、 療養の給付を担当 しなければならな い。（法70条1項） 「保険医療機関 」は、すべての被保険者及び被扶養者の診療を行う ものであり 、「一部の被保険者及び被扶養者に診療を限定する 」こと はできません 。 組合直営病院等や事業主医局等は 、保険医療機関等の指定を受けな くても 、その「組合の組合員 」に対しては療養の給付等を行う ことが できます 。ただし 、その他の被保険者 の療養を行うためには 、保険医 療機関等としての指定を受けなければなりません 。 R03-02A 保険医療機関または保険薬局 は、船員保険法 、国民健康保険法 、国家公務員共済組合法 または 地方 公務員等共済組合法 による 療養の給付 並びに被保険者及び被扶養者の 療養並びに 高齢者医療確保法 による 療養 の給付 、入院時食事療養費に係る 療養、入院時生活療養費に係る 療養及び保険外併用療養費に係る 療養を担当 するものとする。（法70条2項） 保険医療機関 は、療養の給付の担当に関する帳簿及び書類その他の記録 をその完結の日から 3年間保存 しなけ ればならない。ただし、 患者の診療録 にあっては、その完結の日から 5年間 とする。（保険医療機関及び保険医 療養担当規則9条）","s":"保険医療機関・保険薬局は、保険医・保険薬剤師に、厚生労働省令で定めるところにより適切に診療・調剤を担当させなければなりません。","e":"病院は、所属する保険医に健康保険のルールに従った適切な診療を行わせる義務があります。不必要な検査や過剰な投薬は許されません。","p":"保険医療機関と保険医は別の立場（機関と個人）。それぞれに義務が課されている。保険医療機関等の療養担当規則の遵守義務。","f":"16_健康保険法16-給付担当機関","pg":6},{"r":"法65条","t":"保険医療機関・保険薬局の指定","b":"◯1 保険医療機関又は保険薬局 の指定 は、病院若しくは 診療所 又は薬局の開設者の申請 により行 う。","s":"保険医療機関・保険薬局の指定は、病院・診療所又は薬局の開設者の申請により行います。","e":"新しく病院を開設した医師が、健康保険が使えるようにするために厚生労働大臣に「保険医療機関の指定」を申請します。","p":"申請者は「開設者」。指定を行うのは厚生労働大臣。指定は「申請により」行う（強制ではない）。","f":"16_健康保険法16-給付担当機関","pg":8},{"r":"法82条","t":"地方社会保険医療協議会への諮問","b":"◯2 厚生労働大臣 は、保険医療機関若しくは保険薬局 に係る 指定を行おう とするとき、若しくはその 指 定を取り消そう とするとき、又は 保険医若しくは保険薬剤師 に係る 登録を取り消そう とするときは、 地方 社会保険医療協議会 に諮問 するものとする。","s":"厚生労働大臣は、保険医療機関・保険薬局の指定や取消し、保険医・保険薬剤師の登録取消し等を行おうとするときは、地方社会保険医療協議会に諮問しなければなりません。","e":"不正請求を行った病院の保険医療機関の指定を取り消す場合、厚生労働大臣は地方社会保険医療協議会の意見を聴かなければなりません。","p":"諮問先は「地方社会保険医療協議会」。指定、指定拒否、指定取消し、登録取消し等の際に必要。「あらかじめ」ではなく「しなければならない」。","f":"16_健康保険法16-給付担当機関","pg":8},{"r":"法68条","t":"保険医療機関等の指定の有効期間","b":"◯1 保険医療機関又は保険薬局 の指定は、指定の日 から起算して 6年を経過 したときは、その 効力を失 う。 保険医療機関または保険薬局の指定・指定取消 R06-09ｲ 保険医療機関または保険薬局の指定 は、病院若しくは診療所または薬局 の開設者の申請 により行わ れる。（法65条1項）","s":"保険医療機関・保険薬局の指定は、指定の日から起算して6年を経過したときにその効力を失います。","e":"2020年4月1日に指定を受けた病院は、2026年3月31日で指定の効力が切れます。引き続き保険診療を行うには更新が必要です。","p":"有効期間は「6年」。自動更新ではなく、更新手続きが必要。保険医・保険薬剤師の登録には期限がない（無期限）との違いが超頻出。","f":"16_健康保険法16-給付担当機関","pg":8},{"r":"法67条","t":"指定拒否","b":"厚生労働大臣 は、保険医療機関 に係る 指定をしない こととするとき、若しくはその申請に係る 病 床の全部若しくは一部を除いて指定 （指定の変更を含む）を行おうとするとき、又は 保険薬局 に係る 指定をしない こととするときは、 地方社会保険医療協議会の議 を経なければならない。 指定拒否の手続 R06-09ｲ 厚生労働大臣 は、保険医療機関 に係る 指定をしない こととするとき、若しくはその申請に係る 病床 の全部若しくは一部を除いて指定 （指定の変更を含む）を行おうとするとき、または 保険薬局 に係る 指定をし ないこととするときは、 地方社会保険医療協議会の議 を経なければならない。（法67条） 「議を経なければならない 」とは、「議決に従わなければならな い」という意味です 。","s":"厚生労働大臣は、保険医療機関の指定をしないこととするとき等は、地方社会保険医療協議会に諮問しなければなりません。","e":"過去に不正請求で指定を取り消された病院が再度申請してきた場合、厚生労働大臣は指定を拒否できます。その際は地方社会保険医療協議会への諮問が必要です。","p":"指定拒否事由には「取消しから5年を経過しない開設者」等がある。「5年」の数字が頻出。","f":"16_健康保険法16-給付担当機関","pg":18},{"r":"法79条","t":"保険医療機関等の指定の辞退","b":"◯1 保険医療機関又は保険薬局 は、 1月以上 の予告期間 を設けて、その 指定を辞退 することができる。 指定の辞退 保険医療機関 ・保険薬局に係る 「指定の拒否 」においては 、「地方 社会保険医療協議会の議 」と「弁明の機会 」を必要とします 。","s":"保険医療機関・保険薬局は、1月以上の予告期間を設けて、その指定を辞退することができます。","e":"病院が保険診療をやめて自由診療専門にしたい場合、1か月以上前に予告して指定を辞退できます。","p":"予告期間は「1月以上」。保険医・保険薬剤師の登録抹消の予告期間は「30日以上」。「1月」と「30日」の違いがひっかけポイント。","f":"16_健康保険法16-給付担当機関","pg":19},{"r":"法64条","t":"保険医・保険薬剤師","b":"保険医療機関 において 健康保険の診療 に従事する 医師 若しくは 歯科医師 又は保険薬局 において 健 康保険の調剤 に従事する 薬剤師 は、 厚生労働大臣の登録 を受けた 医師若しくは歯科医師 （以下 「保険医 」と総称する。）又は 薬剤師 （以下「 保険薬剤師 」という。）でなければならない。 R06-09ｳ 保険医療機関 において 健康保険の診療 に従事する 医師若しくは歯科医師 または 保険薬局 において 健 康保険の調剤 に従事する 薬剤師 は、厚生労働大臣の登録 を受けた 保険医 または 保険薬剤師 でなければならな い。（法64条） 「1か月以上 」の予告期間です 。「14日以上 」、「 3か月以上 」、 「予告期間は不要 」ではありません 。 「3分の2以上 」や「2分の1以上 」が保険医または保険薬剤師であ ればいいわけではありません 。","s":"保険医療機関で健康保険の診療に従事する医師・歯科医師、保険薬局で調剤に従事する薬剤師は、厚生労働大臣の登録を受けた者でなければなりません。","e":"医師免許を持っているだけでは健康保険の診療はできません。別途「保険医」としての登録が必要です。","p":"保険医・保険薬剤師の「登録」は厚生労働大臣が行う。保険医療機関の「指定」とは別の手続き。登録には有効期限がない。","f":"16_健康保険法16-給付担当機関","pg":20},{"r":"法73条","t":"指導・監査","b":"◯1 保険医療機関及び保険薬局 は療養の給付 に関し、 保険医及び保険薬剤師 は健康保険の診療又は調剤 に関 し、 厚生労働大臣 の指導を受けなければならない。 保険医または保険薬剤師の責務 保険医療機関 において診療に従事する 保険医 または 保険薬局 において調剤に従事する 保険薬剤師 は、保険医 療機関及び保険医療養担当規則に定める保険医の診療方針などまたは保険薬局及び保険薬剤師療養担当規則に 定める調剤の一般的方針などに従って、 健康保険 の診療または調剤に当たらなければならない 。（法72条1 項、保険医療機関及び保険医療養担当規則第2章、保険薬局及び保険薬剤師療養担当規則8条他） 保険医療機関 において診療に従事する 保険医 または 保険薬局 において調剤に従事する 保険薬剤師 は、健康保 険法以外の医療保険各法 または 高齢者医療確保法 による 診療または調剤に当たる ものとする。（法72条2項） 保険医または保険薬剤師 は、健康保険法以外の医療保険各法 （例え ば、船員保険法 、地方公務員等共済組合法 、私立学校教職員共済法な ど）や高齢者医療確保法による診療または調剤にも従事することがで きます 。","s":"保険医療機関等は療養の給付に関し、保険医等は診療・調剤に関し、厚生労働大臣の指導を受けなければなりません。","e":"厚生労働大臣（実際は地方厚生局）は、保険医療機関に対してレセプト（診療報酬明細書）の内容を確認し、適切な診療が行われているか指導します。","p":"指導は「厚生労働大臣」が行う。実際は地方厚生局が実施。指導の結果、不正が疑われれば監査に移行する。","f":"16_健康保険法16-給付担当機関","pg":21},{"r":"法71条","t":"保険医・保険薬剤師の登録","b":"◯1 保険医又は保険薬剤師 の登録 は、医師若しくは歯科医師又は薬剤師 の申請 により行う。 保険医または保険薬剤師の登録 保険医または保険薬剤師の登録 は、医師若しくは歯科医師または薬剤師 の申請により 厚生労働大臣 が行う。 （法71条1項） 登録の効力 R06-09ｳ 保険医及び保険薬剤師の登録 には、 有効期間の定めはない 。したがって、登録の抹消、取消しがな い限り、有効である。（法64条） 「登録」を行う際 には、地方社会保険医療協議会への 「諮問は要求 されていません 」。諮問が要求されるのは 「登録の取消 」の際です。 登録は 「厚生労働大臣 」が行います 。「都道府県医師会 」が行うわ けではありません 。","s":"保険医・保険薬剤師の登録は、医師・歯科医師又は薬剤師の申請により行います。","e":"新しく開業する医師が保険診療を行いたい場合、厚生労働大臣に保険医の登録を申請します。","p":"登録は「申請により」行う。登録に有効期限はない（無期限）。保険医療機関の指定（6年で失効）との違いが頻出。","f":"16_健康保険法16-給付担当機関","pg":23},{"r":"法69条","t":"開設者である医師等のみなし指定","b":"診療所又は薬局 が医師若しくは歯科医師又は薬剤師 の開設したもの であり、かつ、当該 開設者 である 医師若しくは歯科医師又は薬剤師 のみが診療又は調剤に従事している 場合において、当該 医師若しくは 歯科医師又は薬剤師 について 保険医又は保険薬剤師 の登録 があったときは、当該 診療所又は薬局 につい て、保険医療機関又は保険薬局 の指定 があったものと みなす 。 保険医療機関または保険薬局のみなし指定 「1か月以上 」の予告期間です 。「14日以上 」の予告期間ではあり ません 。 診療所または薬局 が医師若しくは歯科医師または薬剤師 の開設したもの であり、かつ、当該 開設者である医 師若しくは歯科医師または薬剤師のみ が診療または調剤に 従事している 場合において、当該 医師若しくは歯科 医師または薬剤師 について 保険医または保険薬剤師の登録があったとき は、当該 診療所または薬局 について、 保険医療機関または保険薬局の指定 があった ものと みなされる 。（法69条）","s":"診療所又は薬局が医師等の開設したものであり、その開設者のみが診療・調剤に従事している場合、保険医療機関・保険薬局の指定があったときは、開設者は保険医・保険薬剤師の登録を受けたものとみなされます。","e":"個人開業の診療所で医師1人だけが診療している場合、保険医療機関の指定を受ければ、自動的にその医師は保険医の登録を受けたものとみなされます。","p":"「みなし登録」の要件は「開設者が医師等」かつ「開設者のみが従事」。勤務医を雇っている場合は適用されない。","f":"16_健康保険法16-給付担当機関","pg":29},{"r":"法90条","t":"指定訪問看護事業者の責務","b":"◯1 指定訪問看護事業者 は、指定訪問看護 の事業の運営 に関する 基準に従い、 訪問看護を受ける者 の 心身の状況等 に応じて 自ら 適切な指定訪問看護 を提供するものとする。 指定訪問看護事業者の責務","s":"指定訪問看護事業者は、運営に関する基準に従い、訪問看護を受ける者の心身の状況等に応じて自ら適切な指定訪問看護を提供しなければなりません。","e":"訪問看護ステーションは、利用者の状態に合わせた適切な看護を、自らの責任で提供しなければなりません。下請けに丸投げすることはできません。","p":"「自ら適切な」訪問看護を提供する義務。「心身の状況等に応じて」がキーワード。","f":"16_健康保険法16-給付担当機関","pg":31},{"r":"法89条","t":"指定訪問看護事業者の指定","b":"◯1 指定訪問看護事業者 の指定 は、訪問看護事業を行う者 の申請 により、 訪問看護事業所ごと に行 う。 指定訪問看護事業者の指定 R06-09ｴ 指定訪問看護事業者 の指定は、訪問看護事業を行う者 の申請により、 訪問看護事業所ごと に行う。 （法89条1項） R03-07C 指定を受けようとする者 は、所定事項を記載した 申請書 及び書類を当該申請に係る訪問看護事業を 行う事業所の所在地を管轄する 地方厚生局長等 に提出しなければならない。（則74条1項）","s":"指定訪問看護事業者の指定は、訪問看護事業を行う者の申請により、訪問看護事業所ごとに行います。","e":"訪問看護ステーションを開設する看護師が、各事業所ごとに厚生労働大臣に指定の申請をします。","p":"指定は「事業所ごと」に行う。指定するのは厚生労働大臣。保険医療機関の指定と同様に申請制。","f":"16_健康保険法16-給付担当機関","pg":32},{"r":"法95条","t":"指定訪問看護事業者の指定取消し","b":"厚生労働大臣 は、所定の事項に該当する場合においては、当該 指定訪問看護事業者 に係る第88条第1 項の指定を取り消す ことができる。 指定の取消 この規定は、健康保険の指定ラインよりも介護保険の指定ラインの 方が高いと捉えると理解しやすくなります。","s":"厚生労働大臣は、所定の事由に該当する場合、指定訪問看護事業者の指定を取り消すことができます。","e":"不正請求を行った訪問看護ステーションは、厚生労働大臣によって指定を取り消されることがあります。","p":"取消事由は保険医療機関の指定取消し事由と類似。「できる」規定（裁量的取消し）。","f":"16_健康保険法16-給付担当機関","pg":34},{"r":"法53条","t":"付加給付","b":"保険者 が健康保険組合 である場合においては、 健康保険法で定める保険給付に併せて 、規約 で定 めるところにより、保険給付として その他の給付 を行うことができる。 健康保険組合における付加給付 保険者 が健康保険組合 である場合においては、 健康保険法で定める保険給付に併せて 、規約で定めるところ により、 付加給付 を行うことができる。（法53条） 付加給付として認められないもの R06-07E 健康保険法の目的を逸脱する もの、または、この制度で定める 医療の内容または医療の給付の範囲 を超える もの、若しくは 保健施設的なもの は廃止する 。（昭和32年2月1日保発3号） 付加給付 は、法定給付の額 、期間などを 「補完しまたは拡張するも の」です。 「全国健康保険協会 」は付加給付を行うことができません 。 R06-07E 付加給付 は、法定給付期間を超えるもの については、 廃止する 。ただし、「 傷病手当金付加金 」に ついては、法定の支給期間満了後も 規約で定める期間において実施することは差し支えない （延長傷病手当金 付加金制度 ）。（昭和32年2月1日保発3号） R06-07E 被保険者期間により差の生ずる給付 および受給の機会均等を害するおそれがあるところの、 特定の 医療機関に受給した場合に限り 家族療養費の付加給付 を認める など医療機関により差の生ずる給付 は廃止す る。（昭和32年2月1日保発3号）","s":"保険者が健康保険組合である場合は、法定の保険給付に加えて、規約で定めるところにより、その他の給付（付加給付）を行うことができます。","e":"大企業の健保組合では、法定の高額療養費に加えて、自己負担が2万円を超えた分を付加給付として支給するなど、手厚い給付を行っているところがあります。","p":"付加給付は「健康保険組合」のみ可能。協会けんぽは不可。「規約で定める」ことが要件。代表的な付加給付に付加金（一部負担還元金等）がある。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":5},{"r":"法75条の2","t":"一部負担金の減額・免除・徴収猶予","b":"◯1 保険者 は、 災害 その他の厚生労働省令で定める 特別の事情がある被保険者 であって、 保険医療機関 又は保険薬局 に一部負担金を支払うことが困難である と認められるものに対し、次の措置を採ることができ る。 1. 一部負担金 を減額 すること。 2. 一部負担金の支払 を免除 すること。 3. 保険医療機関又は保険薬局に対する支払に代えて、 一部負担金 を直接に徴収 することとし、その 徴収を猶予 すること。 一部負担金の額の特例 R07-10A R02-08D 保険者 は、災害その他の厚生労働省令で定める 特別の事情 がある被保険者であって、保 険医療機関または保険薬局に 一部負担金を支払うことが困難である と認められるものに対し、次の措置を採る ことができる。（法75条の2第1項） 一部負担金の額の特例 1. 一部負担金 を減額すること。 2. 一部負担金 の支払を 免除すること。 3. 保険医療機関または保険薬局に対する支払に代えて、 一部負担金 を直接に徴収する こととし、その 徴収を 猶予すること。 R07-10A R02-08D 「厚生労働省令で定める特別の事情 」とは、被 保険者が 、震災、風水害 、火災その他これらに類する災害により 、住 宅、家財またはその他の財産について著しい損害を受けたことをいい ます。（則56条の2）","s":"保険者は、災害等の特別の事情がある被保険者で、一部負担金の支払いが困難な者に対して、一部負担金の減額、免除又は徴収猶予を行うことができます。","e":"大地震で自宅が全壊したAさんは、一時的に生活が苦しくなったため、保険者に申請して窓口負担（一部負担金）の支払いを猶予してもらいました。","p":"「災害その他の特別の事情」が要件。措置は「減額」「免除」「徴収猶予」の3種類。「できる」規定（保険者の裁量）。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":30},{"r":"法76条","t":"療養の給付に関する費用の支払い","b":"◯1 保険者 は、療養の給付に関する費用 を保険医療機関 又は 保険薬局 に支払うものとし、 保険医 療機関 又は 保険薬局 が療養の給付 に関し 保険者に請求することができる費用の額 は、 療養の給付 に要する 費用の額 から、当該 療養の給付 に関し被保険者が当該保険医療機関又は保険薬局に対して支払わなけ ればならない 一部負担金 に相当する額を 控除した額 とする。 ◯5 保険者 は、療養の給付に関する費用 の審査及び支払に関する事務 を社会保険診療報酬支払基金 又は 国民健康保険団体連合会 に委託する ことができる。 診療報酬","s":"保険者は、療養の給付に関する費用を保険医療機関等に支払います。保険医療機関等は、審査支払機関（社会保険診療報酬支払基金等）に療養の給付に関する費用を請求できます。","e":"病院が患者に3割負担で治療を行った後、残りの7割を社会保険診療報酬支払基金を通じて保険者に請求します。","p":"費用の流れ：保険者→審査支払機関→保険医療機関等。保険者は直接支払うことも可能。療養の給付の対価は「療養の給付に要する費用」から「一部負担金」を控除した額。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":33},{"r":"法85条","t":"入院時食事療養費","b":"◯1 被保険者 （特定長期入院被保険者 を除く。）が、 保険医療機関等である病院又は診療所 のうち 自 己の選定 するものから、 電子資格確認等 により、被保険者であることの 確認を受け、 療養の給付 （病 院又は診療所への入院及びその療養に伴う世話その他の看護に限る。）と併せて受けた 食事療養 に要し た費用について、 入院時食事療養費 を支給する。 支給要件 R05-01E 被保険者 （特定長期入院被保険者を除く ）が、 保険医療機関等である病院または診療所 のうち 自己 の選定 するものから、 電子資格確認等 により、被保険者であることの 確認を受け、 療養の給付 （病院または診 療所への入院及びその療養に伴う世話その他の看護に限る ）と併せて受けた 食事療養 に要した費用について、 入院時食事療養費 が支給される。（法85条1項） 「公費負担医療に係る診療報酬請求書の審査及び支払いに関する事 務」は、社会保険診療報酬支払基金が取り扱います 。「健康保険組合 が自ら行う」 ことはできません 。","s":"被保険者（特定長期入院被保険者を除く）が入院した場合、食事療養に要した費用について、入院時食事療養費が支給されます。被保険者は食事療養標準負担額を自己負担します。","e":"入院中のAさんの食事代は1食490円（一般の場合）の自己負担で、残りは入院時食事療養費として保険者が負担します。","p":"食事療養標準負担額は1食490円（一般）。低所得者は減額あり。入院時食事療養費は「現物給付」的に支給される。特定長期入院被保険者は入院時生活療養費の対象。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":35},{"r":"則62条","t":"入院時食事療養費の領収証","b":"保険医療機関等 は、交付しなければならない 領収証 には、 入院時食事療養費 に係る療養について被保 険者から 支払を受けた費用の額 のうち 食事療養標準負担額 とその他の費用の額 とを 区分して記載 し なければならない。 領収書の交付 R07-05C 保険医療機関等である病院または診療所 は、食事療養に要した費用 につき、その 支払を受ける際 、 当該支払をした被保険者に対し、 領収証を交付 しなければならない。（法85条8項） R07-05C 保険医療機関等 は、交付しなければならない 領収証 には、入院時食事療養費に係る療養について被 保険者から 支払を受けた費用の額 のうち「 食事療養標準負担額 」と「その他の費用の額 （特別メニューの食事 などの特別料金 ）」とを区分して記載 しなければならない。（則62条）","s":"保険医療機関等は、入院時食事療養費に係る領収証を交付する際、食事療養標準負担額とその他の費用を区分して記載しなければなりません。","e":"入院中の患者に渡される領収証には、食事の自己負担額（食事療養標準負担額）がいくらかが明確に区分して記載されます。","p":"領収証には「食事療養標準負担額」と「その他の費用」を区分して記載する義務。患者の負担の透明性を確保する規定。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":48},{"r":"法85条の2","t":"入院時生活療養費","b":"◯1 特定長期入院被保険者 が、保険医療機関等である病院又は診療所 のうち 自己の選定する ものか ら、 電子資格確認等 により、被保険者であることの 確認を受け、 療養の給付 （病院又は診療所への入院 及びその療養に伴う世話その他の看護に限る。）と併せて受けた 生活療養 に要した費用について、 入 院時生活療養費 を支給する。 支給要件","s":"特定長期入院被保険者（65歳以上で長期入院する者）が入院した場合、食費と居住費について入院時生活療養費が支給されます。被保険者は生活療養標準負担額を自己負担します。","e":"65歳以上で療養病床に長期入院しているBさんは、食費と居住費（光熱費相当）を生活療養標準負担額として自己負担し、残りは入院時生活療養費として支給されます。","p":"対象は「特定長期入院被保険者」（65歳以上・療養病床入院）。食費＋居住費の負担。入院時食事療養費との違いは「居住費」が含まれること。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":49},{"r":"則62条の5","t":"入院時生活療養費の領収証","b":"保険医療機関等 は、交付しなければならない 領収証 には、 入院時生活療養費 に係る療養について被保 険者から 支払を受けた費用の額 のうち 生活療養標準負担額 とその他の費用の額 とを 区分して記載 し なければならない。 領収証の交付 保険医療機関等である病院または診療所 は、生活療養に要した費用 につき、その 支払を受ける際 、当該支払 をした被保険者に対し、 領収証を交付 しなければならない。（法85条の2第5項、法85条8項） 保険医療機関等 は、交付しなければならない 領収証 には、入院時生活療養費に係る療養について被保険者か ら支払を受けた費用の額 のうち「 生活療養標準負担額 」と「 その他の費用の額 」とを区分して記載 しなければ ならない。（則62条の5）","s":"保険医療機関等は、入院時生活療養費に係る領収証に、生活療養標準負担額とその他の費用を区分して記載しなければなりません。","e":"長期入院中の患者への領収証には、食費と居住費の自己負担額（生活療養標準負担額）が区分して記載されます。","p":"入院時食事療養費の領収証と同様に、自己負担額の区分記載義務がある。","f":"17_健康保険法17-保険給付（医療：療養の給付、入院時食事療養費、 入院時生活療養費）","pg":58},{"r":"法86条","t":"保険外併用療養費","b":"◯1 被保険者 が、保険医療機関等 のうち 自己の選定する ものから、 電子資格確認等 により、被保険 者であることの 確認を受け、 評価療養 、患者申出療養 又は 選定療養 を受けたときは、その 療養 に要した費用 について、 保険外併用療養費 を支給する。 支給要件 被保険者 が、保険医療機関等 のうち 自己の選定するもの から、 電子資格確認等 により、被保険者であること の確認を受け、 評価療養 、患者申出療養 または 選定療養 を受けたときは、その 療養に要した費用 について、 保 険外併用療養費 が支給される。（法86条1項）","s":"被保険者が評価療養、患者申出療養又は選定療養を受けた場合、保険外併用療養費が支給されます。保険が効く部分は保険でカバーし、保険外の部分は自己負担します。","e":"先進医療（評価療養）を受けた場合、通常の診察・検査・入院費用は保険でカバーされ、先進医療の技術料部分だけが全額自己負担になります。","p":"対象は「評価療養」「患者申出療養」「選定療養」の3種類。混合診療の禁止の例外として位置づけられる。評価療養には先進医療等、選定療養には差額ベッド代等が含まれる。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":2},{"r":"則64条","t":"保険外併用療養費の領収証","b":"保険医療機関等 は、交付しなければならない 領収証 には、 保険外併用療養費 に係る療養について被保 険者から 支払を受けた費用の額 のうち保険外併用療養費に係る 一部負担金相当額 とその他の費用の額 と を区分 （当該費用の額に食事療養に係る 食事療養標準負担額 又は生活療養に係る 生活療養標準負担額 が 含まれるときは、当該額についても 区分）して記載 しなければならない。 領収証の交付 保険医療機関等である病院若しくは診療所または薬局 は、評価療養 、患者申出療養または選定療養に要した 費用につき、その 支払を受ける際 、当該支払をした被保険者に対し、 領収証を交付 しなければならない。（法8 6条4項、法85条8項） 保険医療機関等 は、交付しなければならない 領収証 には、保険外併用療養費に係る療養について被保険者か ら支払を受けた費用の額のうち保険外併用療養費に係る「 一部負担金相当額 」と「 その他の費用の額 」とを区 分（当該費用に食事療養に係る 食事療養標準負担額 または生活療養に係る 生活療養標準負担額 が含まれるとき は、当該額についても 区分）して記載 しなければならない。（則64条） 「区分して記載 」です。「合算して記載 」ではありません 。","s":"保険医療機関等は、保険外併用療養費に係る領収証に、保険外併用療養費に係る自己負担額とその他の費用を区分して記載しなければなりません。","e":"先進医療を受けた患者への領収証には、保険適用部分の自己負担額と先進医療の技術料が区分して記載されます。","p":"保険適用部分と保険外部分の費用を明確に区分して記載する義務。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":22},{"r":"法87条","t":"療養費","b":"◯1 保険者 は、 療養の給付 若しくは 入院時食事療養費 、入院時生活療養費 若しくは 保険外 併用療養費 の支給（以下「 療養の給付等 」という。）を 行うことが困難である と認めるとき、又は 被 保険者 が保険医療機関等以外の病院、診療所、薬局 その他の者から 診療、薬剤の支給 若しくは 手当を受 けた場合において、 保険者 がやむを得ない ものと認めるときは、 療養の給付等 に代えて、 療養費 を 支給することができる。 支給要件 保険者 は、次のいずれかに該当するときは、 療養の給付等に代えて 、療養費を支給 することができる。（法8 7条1項） 支給要件 1. 療養の給付等を行うことが困難である と認める とき 2. 被保険者が保険医療機関等以外の病院、診療所、薬局その他の者から診療、薬剤の支給若しくは手当を受 けた場合において、 保険者がやむを得ないもの と認める とき 原則は 、療養の給付等であり 、被保険者が希望した場合などにおい て、「療養の給付等と療養費が被保険者の選択により支給される 」も のではありません 。","s":"保険者は、療養の給付等を行うことが困難な場合ややむを得ない事情がある場合に、療養の給付等に代えて療養費を支給することができます。","e":"旅行先で急病になり保険証を持っていなかったため全額自己負担で治療を受けた場合、後から保険者に療養費として請求できます。柔道整復師の施術も療養費の対象です。","p":"療養費は「現金給付」（償還払い）。対象例：やむを得ず保険証なしで受診、海外での受診、治療用装具の作成、柔道整復師の施術等。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":23},{"r":"法110条","t":"家族療養費","b":"◯1 被保険者 の被扶養者 が保険医療機関等 のうち 自己の選定 するものから 療養を受けた ときは、 被保険者 に対し、その 療養に要した費用 について、 家族療養費 を支給する。 家族療養費 R07-05E 被保険者 の被扶養者 が保険医療機関等 のうち 自己の選定するもの から療養を受けた ときは、 被保険 者に対し、その療養に要した費用について、 家族療養費 が支給される。（法110条1項） 療養費においても 、一部負担金相当額は考慮されます 。 家族療養費として支給される保険給付 は次の通りである。（法110条2項・3項） 家族療養費の範囲 1. 療養の給付 2. 入院時食事療養費 3. 入院時生活療養費 4. 保険外併用療養費 5. 療養費","s":"被保険者の被扶養者が保険医療機関等で療養を受けたときは、被保険者に対し家族療養費が支給されます。給付割合は義務教育就学前は8割、それ以外は7割（70歳以上は8割又は7割）です。","e":"5歳の子供が病院にかかった場合、窓口負担は2割で、残り8割が家族療養費として支給されます。中学生以上は3割負担です。","p":"家族療養費は「被保険者に対し」支給される（被扶養者に対してではない）。義務教育就学前は「8割給付（2割負担）」。70歳以上は原則8割、現役並み所得者は7割。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":31},{"r":"法110条の2","t":"家族療養費に係る一部負担金の減免等","b":"◯1 保険者 は、第75条の2第1項に規定する 被保険者 （災害等の特別の事情がある被保険者 であって 、保険 医療機関又は保険薬局に 一部負担金を支払うことが困難である と認められるもの ）の被扶養者 に係る 家族療養 費の支給 について、第110条第2項第1号イ.からニ.までに定める割合を、それぞれの割合を超え 100分の10 0以下 の範囲内 において 保険者が定めた割合 とする措置を採ることができる。 家族療養費の額の特例 保険者 は、法75条の2第1項に規定する被保険者（ 災害等の特別の事情がある被保険者 であって、保険医療機 関または保険薬局に 一部負担金を支払うことが困難である と認められるもの）の 被扶養者 に係る 家族療養費の 支給について、法110条2項1号イ.からニ.までに定める割合を、それぞれの割合を超え 100分の100以下の範 囲内において 保険者が定めた割合 とする措置を採ることができる。（法110条の2第1項）","s":"保険者は、災害等の特別の事情がある被保険者の被扶養者についても、家族療養費に係る一部負担金の減額等を行うことができます。","e":"災害で被災した被扶養者の医療費負担を軽減するため、保険者が家族療養費に係る一部負担金の支払いを猶予します。","p":"法75条の2（被保険者の一部負担金減免）と同様の仕組みを被扶養者にも適用。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":38},{"r":"法88条","t":"訪問看護療養費","b":"◯1 被保険者 が、 厚生労働大臣 が指定する者（以下「 指定訪問看護事業者 」という。）から当該指 定に係る 訪問看護事業 を行う事業所により行われる 訪問看護 （以下「 指定訪問看護 」とい う。）を受けたときは、その 指定訪問看護 に要した費用について、 訪問看護療養費 を支給する。 ◯2 前項の 訪問看護療養費 は、 保険者 が必要と認める場合 に限り、 支給する ものとする。 訪問看護療養費","s":"被保険者が指定訪問看護事業者から訪問看護を受けたときは、訪問看護療養費が支給されます。被保険者は基本利用料を自己負担します。","e":"自宅療養中のAさんが訪問看護ステーションから看護師の訪問を受けた場合、費用の7割が訪問看護療養費として支給され、3割が自己負担です。","p":"訪問看護の対象は「居宅において継続して療養を受ける状態」の被保険者。主治医の指示が必要。基本利用料の自己負担割合は療養の給付の一部負担割合と同じ。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":40},{"r":"則72条","t":"訪問看護の領収証","b":"指定訪問看護事業者 は、交付しなければならない 領収証 には、 基本利用料 及びその他の利用料 に ついて、個別の費用ごとに 区分して記載 しなければならない。 領収証の交付 R04-03ｵ 指定訪問看護事業者 は、指定訪問看護に要した費用 につき、その 支払を受ける際 、当該支払をした 被保険者に対し、 領収証を交付 しなければならない。（法88条9項） R04-03ｵ 指定訪問看護事業者 は、交付しなければならない 領収証 には、「 基本利用料 」及び「 その他の利用 料」について、個別の費用ごとに 区分して記載 しなければならない。（則72条）","s":"指定訪問看護事業者は、領収証に基本利用料とその他の利用料について、個別の費用ごとに区分して記載しなければなりません。","e":"訪問看護を受けた後に渡される領収証には、基本利用料（保険適用分の自己負担）と交通費等のその他の利用料が区分して記載されます。","p":"「個別の費用ごとに区分して記載」が義務。他の領収証の規定と同様の趣旨。","f":"18_健康保険法18-保険給付（医療：保険外併用療養費、療養費、家族療養費、 訪問看護療養費、家族訪問看護療養費）","pg":52},{"r":"法115条","t":"高額療養費","b":"◯1 療養の給付 について支払われた 一部負担金の額 又は療養（食事療養 及び 生活療養 を除 く。次項において同じ。） に要した費用の額 からその 療養に要した費用 につき 保険外併用療養費 、療 養費 、訪問看護療養費 、家族療養費 若しくは 家族訪問看護療養費 として支給される額に相当 する額を控除した額（以下「 一部負担金 等の額」という。）が 著しく高額である ときは、その 療養の 給付 又はその 保険外併用療養費 、療養費 、訪問看護療養費 、家族療養費 若しくは 家族 訪問看護療養費 の支給を受けた者 に対し、 高額療養費 を支給する。 ◯2 高額療養費 の支給要件、支給額その他高額療養費の支給に関して必要な事項は、療養に必要な 費用の 負担の家計に与える影響 及び療養に要した費用の額 を考慮して、 政令で定める。 高額療養費","s":"一部負担金の額が著しく高額であるとき、高額療養費が支給されます。自己負担限度額は年齢と所得に応じて設定されており、それを超えた分が払い戻されます。","e":"70歳未満で年収500万円のAさんが手術で100万円かかった場合、自己負担は約30万円ですが、高額療養費により実質的な負担は約9万円程度に抑えられます。","p":"自己負担限度額は年齢（70歳未満/70歳以上）と所得区分により異なる。「世帯合算」や「多数回該当」（過去12月に3回以上→4回目から限度額引下げ）も頻出。","f":"19_健康保険法19-保険給付（医療：高額療養費、高額介護合算療養費）","pg":2},{"r":"法115条の2","t":"高額介護合算療養費","b":"◯1 一部負担金等の額 （高額療養費が支給 される場合にあっては、当該 支給額に相当する額 を控除して得た 額）並びに 介護保険法 に規定する 介護サービス利用者負担額 （同法の 高額介護サービス費が支給 さ れる場合にあっては、当該 支給額 を控除して得た額）及び同法に規定する 介護予防サービス利用者負担 額（同法の 高額介護予防サービス費が支給 される場合にあっては、当該 支給額 を控除して得た額）の 合計 額が著しく高額 であるときは、当該 一部負担金等の額 に係る 療養の給付 又は 保険外併用療養費 、 療養費 、訪問看護療養費 、家族療養費 若しくは 家族訪問看護療養費 の支給を受けた者に対 し、高額介護合算療養費 を支給する。 支給要件 前年 8月1日 から7月31日まで の期間（ 計算期間 ）において、 一部負担金等の額 並びに 介護保険法 に規定する 介護サービス利用者負担額 及び同法に規定する 介護予防サービス利用者負担額 の合計額が 著しく高額である と きは、当該一部負担金等の額に係る 療養の給付または保険外併用療養費 、療養費 、訪問看護療養費 、家族療養 費若しくは 家族訪問看護療養費の支給を受けた者 に対し、 高額介護合算療養費 が支給される。（法115条の2第 1項、令41条の2第1項かっこ書、令43条の2第1項）","s":"医療保険の一部負担金等の額と介護保険の利用者負担額の合計が著しく高額である場合、高額介護合算療養費が支給されます。","e":"夫の医療費と妻の介護サービス費が年間で合計100万円を超えた場合、高額介護合算療養費として限度額を超えた分が払い戻されます。","p":"医療保険と介護保険の自己負担を「年間」で合算して判定。計算期間は毎年8月1日～翌年7月31日。高額療養費とは別の制度。","f":"19_健康保険法19-保険給付（医療：高額療養費、高額介護合算療養費）","pg":45},{"r":"法97条","t":"移送費","b":"◯1 被保険者 が療養の給付 （保険外併用療養費 に係る 療養を含む。）を受けるため、 病院又は診療 所に移送された ときは、 移送費 として、厚生労働省令で定めるところにより算定した金額を 支給する。 ◯2 前項の 移送費 は、保険者 が必要であると認める 場合に限り、 支給するものとする。 移送費 R04-03ｲ 被保険者 が療養の給付 （保険外併用療養費に係る療養を含む ）を受けるため、 病院または診療所 に 移送されたときは、 移送費 として、厚生労働省令で定めるところにより算定した金額が支給される。（97条1 項） 移送費 は、保険者が必要であると認める場合 に限り、支給される。（法97条2項）","s":"被保険者が療養の給付を受けるため病院等に移送されたときは、移送費として厚生労働省令で定めるところにより算定した額が支給されます。保険者が必要と認めた場合に限ります。","e":"離島に住むAさんが重篤な病気で本土の病院に緊急搬送された場合、その移送にかかった費用について移送費が支給されます。","p":"支給要件は「保険者が必要と認める場合に限り」。原則として救急車での搬送は移送費の対象外（無料のため）。移送費は「現金給付」。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":2},{"r":"則80条","t":"移送費の算定基準","b":"移送費の金額 は、 最も経済的な通常の経路及び方法 により 移送された場合の費用により算定した金額 とする。ただし、 現に移送に要した費用の金額を超えることができない 。 支給額 R04-03ｲ 移送費の金額 は、最も経済的な通常の経路及び方法 により 移送された場合の費用により算定した金 額とする。ただし、 現に移送に要した費用の金額を超えることができない 。（則80条） 移送費 は、原則としては、患者（被保険者）のみが対象 となるが、移送の途中において、 医師、看護師等の 医学的管理が必要であったと医師が判断する場合 に限り、原則として 1人まで の交通費については 算定の対象 と 移送費の金額は 、「最も経済的な通常の経路及び方法により移送さ れた場合の費用により算定した金額 」です。「実費相当額 」ではあり ません 。 移送費は 、現金給付であり 、「一部負担金等の自己負担 」はありま せん。","s":"移送費の金額は、最も経済的な通常の経路及び方法により移送された場合の費用で算定します。ただし、現に要した費用を超えることはできません。","e":"新幹線で移送できるのにヘリコプターを使った場合、移送費は新幹線の費用で算定されます。ただし、実際の費用が少なければその額が限度です。","p":"算定基準は「最も経済的な通常の経路及び方法」。実費を上限とする。高額な移送手段を使っても、経済的な方法での金額しか支給されない。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":5},{"r":"法112条","t":"家族移送費","b":"◯1 被保険者 の被扶養者 が家族療養費 に係る 療養を受けるため、 病院又は診療所 に移送されたときは、 家族移送費 として、 被保険者 に対し、厚生労働省令で定めるところにより算定した金額を支給す る。 移送費の申請書は 、被保険者が 「事業主 」に提出するわけではあり ません 。","s":"被保険者の被扶養者が家族療養費に係る療養を受けるため移送されたときは、家族移送費として被保険者に支給されます。","e":"被扶養者の子供が急病で遠方の専門病院に搬送された場合、被保険者である親に対して家族移送費が支給されます。","p":"家族移送費も「被保険者に対し」支給される。算定方法は移送費と同じ。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":7},{"r":"法99条","t":"傷病手当金","b":"◯2 傷病手当金の額 は、1日につき 、傷病手当金の支給を始める日の属する月以前の直近 の継続した12月 間の各月の標準報酬月額 （被保険者が現に属する保険者等により定められたものに限る。以下この項 において同じ。）を 平均した額 の30分の1 に相当する額の 3分の2 に相当する金額とする。 傷病手当金の支給額 R03-09C 傷病手当金の額 は、原則として、 1日につき、 傷病手当金の支給を始める日の属する月以前 の直近 の継続した12か月間の各月の標準報酬月額 （被保険者が現に属する保険者等により定められたものに限る ）を 平均した額の30分の1に相当する額 の3分の2 に相当する金額とする。（法99条2項）","s":"被保険者が療養のため労務に服することができないときは、その4日目から傷病手当金が支給されます。1日の金額は、支給開始日以前12月間の各月の標準報酬月額の平均額の30分の1の3分の2です。支給期間は通算して1年6月です。","e":"月給30万円のAさんが病気で会社を休んだ場合、最初の3日間（待期期間）は支給されず、4日目から1日約6,667円（標準報酬日額の3分の2）が支給されます。","p":"待期期間は「3日間」（連続した3日間）。支給額は「標準報酬日額の3分の2」。支給期間は「通算して1年6月」（2022年改正で暦日ベースから通算に変更）。任意継続被保険者には支給されない。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":25},{"r":"法103条","t":"傷病手当金と出産手当金の調整","b":"◯1 出産手当金 を支給する場合 （第108条第3項又は第4項（障害年金又は障害手当金との調整）に該当 するときを除く。）においては、 その期間 、傷病手当金は 、支給しない 。ただし、その受けることができる 出産手当金 の額（同条第2項ただし書（報酬との差額支給）の場合においては、同項ただし書に規定する 報酬の額と同項ただし書の規定により算定される出産手当金の額との合算額）が、 傷病手当金の額より少ない ときは、その 差額を支給する。 ◯2 出産手当金 を支給すべき場合 において 傷病手当金 が支払われた ときは、その支払われた 傷病手当金 （前項ただし書の規定により支払われたものを除く。）は、 出産手当金 の内払とみなす 。 出産手当金との併給調整 R04-02C 出産手当金が支給される 場合（一定の場合を除く）においては、 その期間 、傷病手当金は 、支給さ れない 。（法103条1項）","s":"出産手当金を支給する場合、その期間は傷病手当金を支給しません。ただし、出産手当金の額が傷病手当金の額より少ないときは、その差額を支給します。","e":"産前産後休業中に病気でも休業が必要な状態の場合、出産手当金が優先して支給され、傷病手当金は支給されません。ただし、傷病手当金の方が高額なら差額が支給されます。","p":"出産手当金が優先。差額支給の規定あり。障害年金・障害手当金との調整もある（法108条3項・4項）。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":33},{"r":"法108条","t":"傷病手当金と報酬等との調整","b":"◯1 疾病にかかり、又は 負傷した場合において 報酬 の全部又は一部を受けることができる 者に対して は、これを受けることができる期間 は、傷病手当金を支給しない 。ただし、その受けることができる 報 酬の額が、 傷病手当金の額より少ない とき（第103条第1項又は第3項若しくは第4項に該当するときを除 く。）は、その 差額を支給する。 報酬との調整 R07-09ｳ 疾病にかかり、または負傷した場合において 報酬の全部または一部を受けることができる者 に対し ては、 これを受けることができる期間 は、傷病手当金は支給されない 。（法108条1項） R07-09ｳ ただし、その受けることができる 報酬の額 が、傷病手当金の額より少ないとき は、その 差額が支給 される。（法108条1項ただし書） 内払とみなすことが 「できる 」ではありません 。 「傷病手当金を返還しなければならない 」わけではありません 。 この「傷病手当金と報酬 」のルールは 、「出産手当金 」にも同様に 適用されます （法108条2項）。（1-7-21参照）","s":"報酬の全部又は一部を受けることができる者には、その期間は傷病手当金を支給しません。ただし、報酬の額が傷病手当金の額より少ないときは差額を支給します。また、障害年金等との調整もあります。","e":"病気休職中でも会社から給料が出ている場合、その分は傷病手当金が減額されます。給料が傷病手当金より少なければ差額が支給されます。","p":"報酬との調整（1項）、老齢年金との調整（2項）、障害年金との調整（3項）、障害手当金との調整（4項）がある。いずれも差額支給の規定あり。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":36},{"r":"則84条の3","t":"傷病手当金の支給期間の計算","b":"傷病手当金 は、これを支給した日数の 累計日数 が法第99条第4項に規定する 支給期間の日数に達するまで 支 給する。 支給期間 2022改正 傷病手当金の支給期間 は、同一の疾病または負傷及びこれにより発した疾病 に関しては、その 支給 を始めた日 から通算して1年6か月間 とされている。（法99条4項） 支給を始めた日","s":"傷病手当金は、支給した日数の累計日数が支給期間の日数（通算1年6月分）に達するまで支給します。","e":"傷病手当金を3か月受給した後、復職して6か月働き、再び同じ病気で休職した場合、残りの期間分の傷病手当金を受給できます（通算で1年6月に達するまで）。","p":"2022年改正のポイント。旧制度は「支給開始日から暦日で1年6月」、新制度は「支給日数の通算で1年6月」。途中で復職した期間は支給日数に含まれない。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":50},{"r":"則84条","t":"傷病手当金の申請手続","b":"◯1 傷病手当金の支給を受けようとする者 は、所定の事項を記載した 申請書 を保険者 に提出しなければ ならない。 傷病手当金の受給手続 R04-05E 傷病手当金の支給を受けようとする者 は、所定の事項を記載した 申請書 を保険者 に提出しなければ ならない。（則84条1項） 傷病手当金の受給に係る添付書類 は次の通りである。（則84条2項） 傷病手当金の受給申請は 、事業主の義務ではありません 。 R04-05E 「同一の疾病または負傷及びこれにより発した疾病につ いて、労働者災害補償保険法などの規定により、傷病手当金に相当す る給付を受け、または受けようとする場合は、その旨」などを記載し ます。（則84条1項）","s":"傷病手当金の支給を受けようとする者は、所定事項を記載した申請書を保険者に提出しなければなりません。","e":"傷病手当金を請求するには、申請書に医師の意見書（労務不能の証明）と事業主の証明（出勤状況・報酬支払状況）を添付して保険者に提出します。","p":"申請書には「医師の意見書」と「事業主の証明」が必要。申請は被保険者が行う（事業主ではない）。","f":"20_健康保険法20-保険給付（現金給付：移送費、家族移送費、傷病手当金）","pg":56},{"r":"法100条","t":"埋葬料・埋葬費","b":"◯1 被保険者 が死亡したときは、 その者 により 生計を維持していた者 であって、 埋葬を行うもの に 対し、 埋葬料 として、 政令で定める金額 を支給する。 埋葬料 健康保険法では 、「死亡」に関する 現金給付 として 、「埋葬料 」 「埋葬費 」「家族埋葬料 」があります 。","s":"被保険者が死亡したときは、生計を維持していた者で埋葬を行うものに対し、埋葬料として政令で定める金額（5万円）を支給します。埋葬料を受ける者がいない場合は、実際に埋葬を行った者に埋葬費（5万円の範囲内の実費）を支給します。","e":"Aさんが死亡した場合、Aさんに生計を維持されていた妻が埋葬料5万円を受け取れます。身寄りがなく友人が葬儀を行った場合は、友人に埋葬費（5万円以内の実費）が支給されます。","p":"埋葬料は「5万円」（定額）。埋葬費は「5万円の範囲内の実費」。支給対象は「生計維持＋埋葬を行う者」。生計維持されていなくても実際に埋葬を行った者には埋葬費が支給される。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":3},{"r":"法113条","t":"家族埋葬料","b":"被保険者 の被扶養者 が死亡したときは、 家族埋葬料 として、 被保険者 に対し、第100条第1項の政 令で定める金額を支給する。 家族埋葬料 被保険者の被扶養者 が死亡したときは、 家族埋葬料 として、 被保険者 に対し、法100条1項の政令で定める金 額が支給される。（法113条） R05-06A 別居している兄弟がともに被保険者であり、その 父は弟と同居している が、兄弟からの等分の扶養 により生計を維持している ような場合、父が死亡したときの家族埋葬料は、その父は 弟の被扶養者 として取り 扱い、その家族埋葬料は 弟である被保険者に支給 される。（昭和23年4月28日保発623号） 葬式の際の飲食代 、香典返しなどの費用は含まれません 。 別居している兄弟が共に被保険者であり 、その父は弟と同居してい るが、兄弟が共に父を等分の扶養により生計を維持している場合 、父 が死亡したときの家族埋葬料は 、「兄弟の両方に支給される 」のでは ありません 。","s":"被保険者の被扶養者が死亡したときは、家族埋葬料として被保険者に対し5万円が支給されます。","e":"被保険者の配偶者（被扶養者）が亡くなった場合、被保険者に家族埋葬料5万円が支給されます。","p":"家族埋葬料は「5万円」（定額）。埋葬料と同額。「被保険者に対し」支給される。家族埋葬料には「埋葬費」に相当する規定はない。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":10},{"r":"法101条","t":"出産育児一時金","b":"被保険者 が出産したときは、 出産育児一時金 として、 政令で定める金額 を支給する。 出産育児一時金","s":"被保険者が出産したときは、出産育児一時金として政令で定める金額が支給されます。","e":"出産したAさんには出産育児一時金50万円が支給されます。産科医療補償制度に加入していない医療機関で出産した場合は48.8万円です。","p":"金額は「50万円」（2023年4月改定）。産科医療補償制度加入医療機関での出産が条件。妊娠85日（4月）以上であれば、死産・流産でも支給される。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":13},{"r":"法114条","t":"家族出産育児一時金","b":"被保険者 の被扶養者 が出産したときは、 家族出産育児一時金 として、 被保険者 に対し、第10 1条の政令で定める金額を支給する。 家族出産育児一時金 R05-04E R03-09A 被保険者の被扶養者が出産した ときは、 家族出産育児一時金 として、 被保険者 に対し、 法101条の政令で定める金額が支給される。（法114条） R05-04E 家族出産育児一時金の額 は、出産育児一時金と同額 である。（法114条）","s":"被保険者の被扶養者が出産したときは、家族出産育児一時金として被保険者に対し、出産育児一時金と同額が支給されます。","e":"被保険者の妻（被扶養者）が出産した場合、被保険者に対し家族出産育児一時金50万円が支給されます。","p":"金額は出産育児一時金と同じ「50万円」。「被保険者に対し」支給される。被扶養者本人ではなく被保険者が受給権者。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":25},{"r":"法102条","t":"出産手当金","b":"◯1 被保険者 （任意継続被保険者 及び 特例退職被保険者 を除く。）が 出産したときは、 出産の日 （出産の日が出産の予定日後であるときは、 出産の予定日 ）以前 42日 （多胎妊娠の場合においては、 98 日）から 出産の日後 56日 までの間において 労務に服さなかった期間 、出産手当金 を支給する。","s":"被保険者（任意継続被保険者・特例退職被保険者を除く）が出産したときは、出産の日以前42日（多胎の場合98日）から出産の日後56日までの間で労務に服さなかった期間、出産手当金が支給されます。","e":"予定日通りに出産したAさんの場合、出産日前42日間と出産後56日間の合計98日間、出産手当金（標準報酬日額の3分の2）が支給されます。","p":"産前は「42日」（多胎は「98日」）、産後は「56日」。予定日より遅れた場合は遅れた日数分も支給される。金額は「標準報酬日額の3分の2」。任意継続被保険者には不支給。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":27},{"r":"法107条","t":"船員保険の被保険者となった場合の併給調整","b":"第104条から第106条の規定にかかわらず、 被保険者であった者 が船員保険の被保険者 となったときは、 保険給付は、行わない 。 併給調整 被保険者であった者 が船員保険の被保険者になったとき は、資格喪失後の傷病手当金または出産手当金の継 続給付 、資格喪失後の出産育児一時金及び埋葬料 （埋葬費 ）の支給は行われない 。（法107条） 船員保険法の給付水準が 、基本的に 健康保険法の給付水準よりも高 いためです 。","s":"被保険者であった者が船員保険の被保険者となったときは、資格喪失後の継続給付は行いません。","e":"退職後に傷病手当金の継続給付を受けていた人が、船員として就職して船員保険の被保険者になった場合、健康保険からの継続給付は打ち切られます。","p":"船員保険との併給調整。船員保険の被保険者になると健康保険の継続給付は停止。法104条～106条の継続給付に適用。","f":"21_健康保険法21-保険給付（生死に係る給付：埋葬料、出産育児一時金、 出産手当金、資格喪失後の給付）","pg":56},{"r":"法61条","t":"受給権の保護（譲渡等の禁止）","b":"保険給付を受ける権利 は、 譲り渡し 、担保に供し 、又は 差し押さえる ことが できない 。 譲渡などの禁止 R06-07C 保険給付を受ける権利 は、譲り渡し 、担保に供し 、または差し押さえることができない 。（法61 条）","s":"保険給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができません。","e":"傷病手当金を受ける権利を他人に売ったり、借金の担保にしたり、債権者が差し押さえることはできません。","p":"譲渡・担保・差押えの3つが禁止。ただし、国税滞納処分による差押えは例外的に認められる場合がある。年金との共通論点。","f":"22_健康保険法22-給付通則","pg":4},{"r":"法62条","t":"公課の禁止","b":"租税 その他の 公課 は、保険給付 として支給を受けた 金品を標準 として、 課することができな い。 公課の禁止 ここでいう受給権の中には 、「療養の給付 」を受ける権利は含まれ ません 。療養の給付を受ける権利は 「現物給付 」で、その時々におい て発生し 、時々において消滅していく ものであり 、もともと 譲渡性が 認められない権利 だからです 。 被保険者が死亡した場合 、資格の喪失は 、死亡日の翌日となるた め、保険給付は 、被保険者の死亡日まで支給されることとなります 。 しかし 、健康保険法には 「未支給給付の規定がない 」ため、療養費 、 傷病手当金 、高額療養費などの 「金銭給付 」の請求 権については 、 「相続人 」によって受領されることになります 。（昭和2年2月18日 保理719号） 「相続人は請求することはできない 」ではありません 。","s":"租税その他の公課は、保険給付として支給を受けた金品を標準として課することができません。","e":"傷病手当金や出産手当金を受け取っても、その金額に対して所得税や住民税は課税されません。","p":"保険給付は「非課税」。ただし療養の給付（現物給付）自体は金品の受給ではないため、公課の禁止の対象とはならない。","f":"22_健康保険法22-給付通則","pg":5},{"r":"法55条","t":"他の法令による保険給付との調整","b":"◯1 被保険者 に係る 療養の給付 又は入院時食事療養費 、入院時生活療養費 、保険外併用療養費 、療養費 、訪 問看護療養費 、移送費 、傷病手当金 、埋葬料 、家族療養費 、家族訪問看護療養費 、家族移送費 若しくは 家族埋 葬料の支給は、同一の疾病 、負傷又は死亡 について、 労働者災害補償保険法 、国家公務員災害補償 法又は 地方公務員災害補償法 若しくは同法に基づく条例の規定によりこれらに相当する給付を受ける ことができる場合には、 行わない 。 労災保険法などによる給付との調整 同一の傷病 につき「 健康保険法 」の療養の給付等に相当する給付 を他の法令 （労災保険法 、国家公務員災害 補償法 、地方公務員災害補償法など ）の規定により受けることができる ときは、 健康保険の保険給付は行われ ない。（法55条1項） 2022改正 保険者 は、「 傷病手当金 」の支給 を行うにつき必要があると認めるときは、 労働者災害補償保険 法、国家公務員災害補償法 または 地方公務員災害補償法 若しくは同法に基づく条例の規定により 給付を行う者 に対し、当該給付の 支給状況 につき、 必要な資料の提供を求める ことができる。（法55条2項） 労災保険に未加入の場合 同一の傷病につき健康保険法の療養の給付等に相当する給付を他の 法令の規定により受けることができるとき 、または受けたときは 、健 康保険から 「重ねて給付を行う必要がない 」のは当然です 。 2022改正 なお、 全国健康保険協 会は、「 日雇特例被保険者 に係る 傷病手当金 」の支給を行うにつき必要があると認めるときは、 労働者 災害補償保険法 、国家公務員災害補償法 または 地方公務員災害補償法 若しくは同法に基づく条例の規定により 給付を行う者 に対し、当該給 付の支給状況 につき、 必要な資料の提供を求める ことができることに なっています。（法128条2項）","s":"被保険者に係る療養の給付や各種保険給付は、同一の疾病等について労災保険等の他の法令による給付が行われるべき場合は、その限度で行いません。","e":"通勤途中のケガで労災保険から療養補償給付を受けられる場合、同じケガについて健康保険の療養の給付は行われません。","p":"労災保険等の他法令による給付が優先。「同一の疾病等」が要件。二重給付の防止。介護保険との調整もある。","f":"22_健康保険法22-給付通則","pg":7},{"r":"法118条","t":"給付制限（刑事施設収容等）","b":"◯1 被保険者 又は被保険者であった者 が、次の各号のいずれかに該当する場合には、 疾病、負傷又は出 産につき、 その期間 に係る保険給付 （傷病手当金 及び出産手当金 の支給にあっては、 厚生労働省令で定め る場合 に限る。）は、 行わない 。 1. 少年院 その他これに準ずる 施設に収容されたとき。 2. 刑事施設 、労役場 その他これらに準ずる 施設に拘禁されたとき。 ◯2 保険者 は、被保険者 又は被保険者であった者 が前項各号のいずれかに該当する場合であっても、 被扶 養者に係る保険給付 を行うことを 妨げない 。 被保険者が少年院などに収容などされた場合①（被保険者本人に係る保険給付） R05-06D 被保険者または被保険者であった者 が、次のいずれかに該当する場合には、 疾病、負傷または 出産 につき、 その期間に係る保険給付 （傷病手当金 及び出産手当金 の支給にあっては、 厚生労働省令で定める場合 に限る ）は、 行われない 。（法118条1項） 被保険者が少年院などに収容などされた場合 1. 少年院 その他これに準ずる 施設に収容されたとき。 2. 刑事施設 、労役場 その他これらに準ずる 施設に拘禁されたとき。 障害者総合支援法においては、更生医療、育成医療、精神通院医療 の制度がありますが、いずれも原則として、 10％の自己負担 となり ます（自己負担額には上限があります）。 被保険者 が、少年院などに収容などされた 場合であっても、 死亡に関する保険給付は行われる 。（昭和2年2 月5日保理490号）","s":"被保険者等が刑事施設等に収容されている場合や少年院等に収容されている場合は、その期間に係る保険給付（傷病手当金・出産手当金の支給を含む）は行いません。","e":"刑務所に収容されている被保険者には、その期間中は健康保険の保険給付（傷病手当金等を含む）は行われません。刑務所内の医療は国が負担します。","p":"収容期間中は保険給付を行わない（絶対的給付制限）。ただし、被扶養者に対する給付は被保険者が収容中でも行われる。","f":"22_健康保険法22-給付通則","pg":17},{"r":"法116条","t":"絶対的給付制限（故意の犯罪行為等）","b":"被保険者 又は被保険者であった者 が、 自己の故意の犯罪行為 により、又は 故意 に給付事由を生じ させたときは、当該給付事由に係る 保険給付 は、 行わない 。 絶対的給付制限 R04-07E R03-06C 被保険者または被保険者であった者 が、自己の故意の犯罪行為 により、または 故意に給 付事由を生じさせたときは、当該給付事由に係る 保険給付は 、行われない 。（法116条）","s":"被保険者等が、自己の故意の犯罪行為又は故意に給付事由を生じさせたときは、その保険給付は行いません。","e":"保険金目的で自分を傷つけた場合や、犯罪行為（飲酒運転等）によってケガをした場合は、保険給付は一切行われません。","p":"「故意の犯罪行為」「故意」は絶対的給付制限（全額不支給）。「故意」と「重大な過失」の違いに注意。重大な過失は法117条で一部制限。","f":"22_健康保険法22-給付通則","pg":21},{"r":"法117条","t":"相対的給付制限（闘争・泥酔等）","b":"被保険者 が闘争 、泥酔 又は 著しい不行跡 によって 給付事由を生じさせた ときは、当該給付事 由に係る 保険給付 は、その 全部又は一部 を行わない ことができる。","s":"被保険者が闘争、泥酔又は著しい不行跡によって給付事由を生じさせたときは、保険給付の全部又は一部を行わないことができます。","e":"泥酔して転倒しケガをした場合、保険者の判断により保険給付が制限されることがあります（全部又は一部カット）。","p":"「できる」規定（相対的・裁量的）。「闘争」「泥酔」「著しい不行跡」の3つ。法116条（故意）は「行わない」（絶対的）との違いが頻出。","f":"22_健康保険法22-給付通則","pg":27},{"r":"法121条","t":"給付制限（受診命令等に従わない場合）","b":"保険者 は、保険給付を受ける者 が、正当な理由なし に、第59条の規定による 命令 に従わず、又は 答 弁若しくは 受診 を拒んだ ときは、保険給付の 全部又は一部 を行わない ことができる。 相対的給付制限（全部または一部の給付制限） 被保険者 が闘争、泥酔または著しい不行跡によって給付事由を生じさせたとき は、当該給付事由に係る 保険 給付は、その 全部または一部を行わないことができる 。（法117条）","s":"保険者は、保険給付を受ける者が正当な理由なく命令に従わず又は受診を拒んだときは、保険給付の全部又は一部を行わないことができます。","e":"保険者が「専門医の診察を受けてください」と命令したのに、正当な理由なく拒否した場合、保険給付が制限されることがあります。","p":"「正当な理由なし」が要件。「全部又は一部」を行わない「ことができる」（裁量的）。","f":"22_健康保険法22-給付通則","pg":27},{"r":"法119条","t":"給付制限（療養に関する指示に従わない場合）","b":"保険者 は、被保険者又は被保険者であった者 が、正当な理由なしに 療養に関する指示 に従わない とき は、保険給付 の一部 を行わない ことができる。 相対的給付制限（一部の給付制限） R07-08D R02-06D 保険者 は、被保険者または被保険者であった者 が、正当な理由なしに 療養に関する指示 に従わないとき は、保険給付の 一部を行わないことができる 。（法119条） R07-08D R02-06D 療養に関する指示に従わない者 とは次のような者をいう。（昭和26年5月9日保発37号） 療養に関する指示に従わない者 1. 保険者または療養担当者の 療養の指示に関する明白な意思表示があった にもかかわらず、 これに従わない 者（作為または不作為の場合を含む） 2. 診療担当者より受けた診断書、意見書などにより 一般に療養の指示と認められる事実があった にもかかわ らず、これに従わないために療養上の障害を生じ、 著しく給付費の増嵩 （＝増加）をもたらす と認められる 者 「数日後に不意に危害を加えられたような場合 」には、給付制限は 行われません 。","s":"保険者は、被保険者等が正当な理由なしに療養に関する指示に従わないときは、保険給付の「一部」を行わないことができます。","e":"医師から「禁酒してください」と指示されたのに飲酒を続けて病状が悪化した場合、保険給付の一部がカットされる可能性があります。","p":"「一部」のみ制限可能（「全部」はできない）。法121条（受診拒否等）は「全部又は一部」なので違いに注意。","f":"22_健康保険法22-給付通則","pg":30},{"r":"法120条","t":"給付制限（不正受給者への制裁）","b":"保険者 は、 偽りその他不正の行為 により 保険給付を受け 、又は受けようとした者 に対して、 6月以 内の期間を定め、その者に支給すべき 傷病手当金 又は 出産手当金 の全部又は一部を支給しない 旨 の決定をすることができる。ただし、 偽りその他不正の行為があった日 から 1年を経過 したときは、 この 限りでない 。 不正受給による給付制限 療養に関する指示に従わない者に対する給付制限 は、「全部または 一部」の相対的給付制限 が原則ですが 、健康保険は医療保険であるこ とから 、「全部」を停止することはできません 。 「全部または一部を行わないことができる 」ではありません 。","s":"保険者は、偽りその他不正の行為により保険給付を受け又は受けようとした者に対して、6月以内の期間を定めて傷病手当金又は出産手当金の全部又は一部を支給しない旨を決定できます。","e":"仮病を使って傷病手当金を不正に受給しようとした場合、保険者は最大6か月間、傷病手当金を不支給とする制裁を行えます。","p":"制裁期間は「6月以内」。対象は「傷病手当金又は出産手当金」のみ。「受け、又は受けようとした者」なので未遂も対象。","f":"22_健康保険法22-給付通則","pg":32},{"r":"法58条","t":"不正利得の徴収","b":"◯1 偽りその他不正の行為 によって 保険給付を受けた者 があるときは、 保険者 は、その者からその 給付 の価額 （当該保険給付が 療養の給付 であるときは、当該療養の給付に要する費用の額から当該療養の給付に関 し被保険者が負担しなければならない 一部負担金に相当する額を控除した額 。）の 全部又は一部 を徴収 することができる。 不正受給者からの費用徴収 R06-06E 偽りその他不正の行為 によって 保険給付を受けた者 があるときは、 保険者 は、その者からその 給付 の価額 の全部または一部を徴収 することができる。（法58条1項）","s":"偽りその他不正の行為によって保険給付を受けた者があるときは、保険者はその給付の価額の全部又は一部を徴収し、さらにその価額の2倍以下の額を徴収することができます（いわゆる「3倍返し」）。","e":"不正に療養の給付を受けた人は、不正に受けた給付の価額＋最大2倍の金額（合計3倍まで）を返還させられます。","p":"「3倍返し」（給付の価額＋2倍以下）が最重要ポイント。事業主等が不正に加担した場合は連帯納付義務あり。","f":"22_健康保険法22-給付通則","pg":35},{"r":"法57条","t":"第三者行為による損害賠償との調整","b":"◯1 保険者 は、給付事由 が第三者の行為 によって生じた場合において、 保険給付を行った ときは、その 給付の価額 （当該保険給付が療養の給付であるときは、当該療養の給付に要する費用の額から当該療養 の給付に関し被保険者が負担しなければならない一部負担金に相当する額を控除した額。） の限度 において、 保険給付を受ける権利を有する者 （当該給付事由が被保険者の被扶養者について生じた場合には、当該 被扶養 者を含む。次項において同じ。）が 第三者 に対して有する 損害賠償の請求権 を取得する。 ◯2 前項の場合において、 保険給付を受ける権利を有する者 が第三者 から同一の事由 について 損害賠 償を受けたとき は、保険者は、その 価額の限度 において、 保険給付 を行う 責めを免れる 。 第三者行為災害 R07-06D R04-06A 保険者 は、給付事由 が第三者の行為によって生じた場合 において、 保険給付を行ったと きは、その 給付の価額の限度 において、 保険給付を受ける権利を有する者 が第三者に対して有する損害賠償の 請求権を取得する 。（法57条1項） R04-06A 保険給付を受ける権利を有する者 が第三者 から同一の事由 について 損害賠償を受けたとき は、保険 者は、その 価額の限度 において、 保険給付を行う責めを免れる 。（法57条2項）","s":"保険者は、第三者の行為によって保険給付が生じた場合に保険給付を行ったときは、その給付の価額の限度で第三者に対する損害賠償請求権を取得します（代位取得）。","e":"交通事故（相手が加害者）でケガをして健康保険で治療を受けた場合、保険者は治療費分を加害者に請求できます。被保険者が加害者から賠償を受けた場合は、その限度で保険給付は行われません。","p":"保険者の「代位取得」と「控除」の2つの仕組み。第三者行為の届出義務あり。示談の際は保険者に連絡が必要。","f":"22_健康保険法22-給付通則","pg":41},{"r":"法203条","t":"日雇特例被保険者の事務（市町村長への委任）","b":"◯1 日雇特例被保険者 の保険の 保険者の事務 のうち 厚生労働大臣 が行うものの一部 は、 市町村長 （特別区の区長を含むものとし、指定都市にあっては、区長又は総合区長とする。） が行う こととすることが できる。 ◯2 全国健康保険協会 は、 市町村 （特別区を含む。）に対し、 日雇特例被保険者 の保険の 保険者の 事務のうち全国健康保険協会が行うもの の一部を委託 することができる。 市町村が処理する事務 日雇特例被保険者の保険の保険者の事務 のうち 厚生労働大臣が行うものの一部 は、市町村長 が行うこととす ることができる。（法203条1項） 全国健康保険協会 は、市町村 に対し、 日雇特例被保険者の保険の保険者の事務 のうち全国健康保険協会が行 うものの 一部を委託する ことができる。（法203条2項） R03-04ｳ 「厚生労働大臣が指定する地域 」に居住する日雇特例被保 険者に係る 「日雇特例被保険者手帳の交付及び収受その他日雇特例被 保険者手帳に関する事務 」などは 、当該地域をその区域に含む 「市町 村長（指定市町村長 ）」も行うことができます 。（令61条1項1号、 則114条1項かっこ書） したがって 、年金事務所のみならず 、「一部の市町村 」においても 日雇特例被保険者手帳の交付が行われます 。 日雇特例被保険者手帳の交付及び収受その他日雇特例被保険者手帳 に関する事務は 、「日本年金機構のみが行う 」わけではありません 。","s":"日雇特例被保険者の保険者の事務のうち厚生労働大臣が行うものの一部は、市町村長に行わせることができます。","e":"日雇労働者の健康保険に関する一部の事務は、住所地の市町村で取り扱われることがあります。","p":"市町村長への事務委任は日雇特例被保険者の保険に特有の規定。一般の被保険者にはない。","f":"23_健康保険法23-日雇特例被保険者","pg":4},{"r":"法124条","t":"標準賃金日額","b":"◯1 標準賃金日額 は、日雇特例被保険者 の賃金日額 に基づき、所定の等級区分（等級区分の改定が行わ れたときは、改定後の等級区分）による。 賃金 2026改正 日雇特例被保険者に係る費用のうち 、前期高齢者納付 金、後期高齢者支援 、介護納付金及び子ども・子育て支援納付金 に一 定の割合で 「国庫補助 」が行われています 。","s":"標準賃金日額は、日雇特例被保険者の賃金日額に基づき、所定の等級区分により定められます。","e":"日雇労働者の1日の賃金が1万円の場合、等級表に当てはめて標準賃金日額が決定されます。","p":"日雇特例被保険者には「標準報酬月額」ではなく「標準賃金日額」が適用される。一般の被保険者との違い。","f":"23_健康保険法23-日雇特例被保険者","pg":12},{"r":"法169条","t":"日雇特例被保険者の保険料","b":"◯2 事業主 （日雇特例被保険者が1日において 2以上の事業所に使用される 場合においては、 初めにその者 を使用する事業主 ）は、 日雇特例被保険者 を使用する日 ごとに、その者及び自己の負担すべきその日 の標準賃金日額に係る 保険料を 納付する義務を負う 。 納付義務 賞与には 、0.31の加算はありません 。","s":"事業主は、日雇特例被保険者を使用する日ごとに保険料を納付しなければなりません。1日に2以上の事業所で使用される場合は、初めにその者を使用する事業主が納付します。","e":"日雇い労働者を1日雇った事業主は、その日の分の健康保険料を日雇特例被保険者手帳に印紙を貼ることで納付します。","p":"保険料の納付は「日ごと」。2以上の事業所の場合は「初めに使用する事業主」が負担。保険料の納付方法は「印紙」を貼付する方法。","f":"23_健康保険法23-日雇特例被保険者","pg":18},{"r":"法173条","t":"日雇拠出金","b":"◯1 厚生労働大臣 は、 日雇特例被保険者 に係る 健康保険事業に要する費用 （前期高齢者納付金 等及 び後期高齢者支援金 等、介護納付金 、流行初期医療確保拠出金等 並びに 子ども・子育て支援納付金 の納付に要する費用を含む。第175条において同じ。）に充てるため、第155条の規定により保険料を徴収す るほか、 毎年度 、日雇特例被保険者 を使用する事業主の設立する 健康保険組合 （以下「 日雇関係組合 」 という。）から 日雇拠出金 を徴収する。 雇用保険印紙の場合は 、「所轄公共職業安定所長 」の確認を受けな ければなりません 。（1-5-8参照）","s":"厚生労働大臣は、日雇特例被保険者に係る健康保険事業に要する費用に充てるため、保険者（協会・健保組合）から日雇拠出金を徴収します。","e":"一般の被保険者の保険者（協会けんぽや健保組合）は、日雇労働者の健康保険事業を支えるために日雇拠出金を拠出します。","p":"日雇拠出金は一般の保険者（協会・健保組合）が負担する。日雇特例被保険者の保険財政の一部を一般の被保険者側が支える仕組み。","f":"23_健康保険法23-日雇特例被保険者","pg":23},{"r":"法150条","t":"保健事業・福祉事業","b":"◯1 保険者 は、高齢者医療確保法 の規定による 特定健康診査 （次項において単に「 特定健康診査 」とい う。）及び 特定保健指導 （以下「 特定健康診査等 」という。）を行うものとするほか、 特定健康 診査等 以外の事業 であって、 健康教育 、健康相談 及び 健康診査 並びに 健康管理 及び 疾 病の予防 に係る被保険者及びその被扶養者（以下「 被保険者等 」という。）の 自助努力についての支援 そ の他の 被保険者等 の健康の保持増進 のために必要な事業を行うように 努めなければならない。 保健事業","s":"保険者は、高齢者医療確保法に基づく特定健康診査・特定保健指導を行うとともに、被保険者等の健康の保持増進のための保健事業を行うよう努めなければなりません。","e":"健保組合や協会けんぽは、40歳以上の加入者にメタボ健診（特定健康診査）を実施し、基準に該当する人には特定保健指導を行います。","p":"特定健康診査の対象は40歳以上の加入者。保健事業は「努力義務」。特定健康診査・特定保健指導は高齢者医療確保法に基づく義務。","f":"24_健康保険法24-雑則・罰則（保健福祉事業、不服申立て、時効、罰則）","pg":2},{"r":"法150条の2","t":"匿名診療等関連情報の提供","b":"◯1 厚生労働大臣 は、国民保健の向上に資する ため、 匿名診療等関連情報 （診療等関連情報に係る特定 の被保険者その他の厚生労働省令で定める者（「本人」という。）を識別すること及びその作成に用いる診療 等関連情報を復元することができないようにするために厚生労働省令で定める基準に従い加工した診療等関連 情報をいう。以下同じ。）を 利用し、又は次の各号に掲げる者であって、 匿名診療等関連情報 の提供を 受けて行うことについて 相当の公益性を有すると認められる業務 としてそれぞれ当該各号に定めるものを行う ものに 提供する ことができる。 1. 国の他の行政機関及び地方公共団体 …適正な保健医療サービスの提供に資する施策の企画及び立案に関 する調査 2. 大学その他の研究機関 …疾病の原因並びに疾病の予防、診断及び治療の方法に関する研究その他の公衆 衛生の向上及び増進に関する研究 3. 民間事業者その他の厚生労働省令で定める者 …医療分野の研究開発に資する分析その他の厚生労働省令 で定める業務（特定の商品又は役務の広告又は宣伝に利用するために行うものを除く。） ◯3 厚生労働大臣 は、第1項の規定により 匿名診療等関連情報 を提供しようとする場合には、あらかじ め、 社会保障審議会 の意見を聴かなければならない。 匿名診療等関連情報の利用または提供 2021改正 厚生労働大臣 は、国民保健の向上に資する ため、 匿名診療等関連情報 を利用し、または次の者であ って、 匿名診療等関連情報 の提供を受けて行うことについて相当の公益性を有すると認められる業務としてそ れぞれ定めるものを行うものに 提供する ことができる。（法150条の2第1項） 匿名診療等関連情報の提供を受けて行う者 業務 国の他の行政機関及び地方公共団体 適正な保健医療サービスの提供に資する施策の企画 及び立案に関する調査 大学その他の研究機関 疾病の原因並びに疾病の予防、診断及び治療の方法 に関する研究その他の公衆衛生の向上及び増進に関す る研究 民間事業者その他の厚生労働省令で定める者 医療分野の研究開発に資する分析その他の厚生労働 省令で定める業務（特定の商品または役務の広告また は宣伝に利用するために行うものを除く）","s":"厚生労働大臣は、国民保健の向上に資するため、匿名診療等関連情報を研究者等に提供することができます。","e":"大学の研究者が医療政策の研究のために、個人が特定できないように加工された診療データの提供を厚生労働大臣に申請できます。","p":"個人情報保護の観点から「匿名化」されたデータの提供。提供先は研究者等に限定。NDB（ナショナルデータベース）の利活用に関する規定。","f":"24_健康保険法24-雑則・罰則（保健福祉事業、不服申立て、時効、罰則）","pg":10},{"r":"法189条","t":"審査請求（資格・標準報酬・保険給付）","b":"◯1 被保険者 の資格 、標準報酬 又は 保険給付 に関する処分に不服がある 者は、 社会保険審 査官 に対して 審査請求 をし、 その決定に不服がある 者は、 社会保険審査会 に対して 再審査請求 をする ことができる。 ◯2 審査請求 をした日から 2月以内 に決定がない ときは、 審査請求人 は、社会保険審査官 が審査請求 を 棄却 したものとみなす ことができる。 ◯3 第1項の 審査請求及び再審査請求 は、 時効の完成猶予及び更新 に関しては、 裁判上の請求 とみ なす。 ◯4 被保険者 の資格 又は 標準報酬 に関する 処分が確定した ときは、その処分についての不服を当該 処分に基づく保険給付に関する処分についての 不服の理由とすることができない 。 審査請求及び再審査請求","s":"被保険者の資格、標準報酬又は保険給付に関する処分に不服がある者は、社会保険審査官に審査請求をし、その決定に不服があるときは社会保険審査会に再審査請求ができます。","e":"「自分は被保険者のはずなのに資格喪失された」と不服がある場合、まず社会保険審査官に審査請求し、その決定にも納得できなければ社会保険審査会に再審査請求します。","p":"二審制（審査官→審査会）。対象は「資格」「標準報酬」「保険給付」に関する処分。保険料の処分は法190条で一審制。","f":"24_健康保険法24-雑則・罰則（保健福祉事業、不服申立て、時効、罰則）","pg":14},{"r":"法190条","t":"審査請求（保険料等の賦課・徴収等）","b":"保険料等の賦課若しくは徴収の処分 又は 督促 及び 滞納処分 に不服がある 者は、 社会保険審 査会 に対して 審査請求 をすることができる。 保険料等の賦課若しくは徴収の処分または滞納処分に関する不服申立て R07-03E 保険料等の賦課若しくは徴収の処分または督促及び滞納処分に不服 がある者は、 社会保険審査会 に 対して 審査請求 をすることができる。（法190条）","s":"保険料等の賦課・徴収の処分又は督促・滞納処分に不服がある者は、社会保険審査会に直接審査請求することができます。","e":"保険料の額に不満がある事業主は、社会保険審査官を経由せずに直接社会保険審査会に審査請求できます。","p":"一審制（審査会のみ）。審査官への審査請求は不要。法189条（二審制）との違いが超頻出。保険料の処分は「審査会に直接」がキーポイント。","f":"24_健康保険法24-雑則・罰則（保健福祉事業、不服申立て、時効、罰則）","pg":19},{"r":"法193条","t":"時効","b":"◯1 保険料等 を徴収 し、又はその 還付 を受ける権利 及び 保険給付 を受ける権利 は、これらを 行使することができる時から 2年 を経過したときは、 時効によって消滅する 。 ◯2 保険料等 の納入の告知 又は 督促 は、時効更新の効力を有する 。 時効 R07-01B R06-05C 2020改正 保険料等 を徴収し、またはその 還付を受ける権利 及び保険給付を受ける 権利 は、これらを行使することができる時 から2年を経過したときは、 時効によって消滅する 。（法193条1項） 資格、標準報酬または保険給付に関しては 、直接裁判所に提起する ことはできません 。","s":"保険料等を徴収し又は還付を受ける権利、及び保険給付を受ける権利は、2年を経過したときに時効により消滅します。保険料の納入告知・督促は時効中断の効力があります。","e":"傷病手当金を請求できるのに2年間請求しなかった場合、時効で権利が消滅します。保険料の徴収権も2年で時効になりますが、督促により時効が中断します。","p":"時効期間は「2年」。対象は「保険料等の徴収・還付の権利」と「保険給付を受ける権利」。納入告知・督促は時効中断（更新）の効力あり。厚生年金保険の保険給付は「5年」なので混同注意。","f":"24_健康保険法24-雑則・罰則（保健福祉事業、不服申立て、時効、罰則）","pg":20}],"国民年金法":[{"r":"法1条","t":"国民年金制度の目的","b":"国民年金制度 は、日本国憲法 第25条第2項 に規定する 理念に基き、 老齢 、障害 又は 死亡 によって 国民生活の安定 がそこなわれる ことを 国民の共同連帯 によって 防止し、もって 健全な国 民生活の維持及び向上 に寄与することを 目的とする。 目的","s":"国民年金制度は、日本国憲法第25条第2項（国の社会保障義務）の理念に基づき、老齢・障害・死亡によって国民の生活が不安定になることを、国民みんなで助け合う「共同連帯」の仕組みで防ぐことを目的とした制度です。","e":"たとえば、自営業のAさんが65歳になって働けなくなっても、現役世代が納めた保険料から老齢基礎年金が支給され、生活を支えてくれます。これは「国民の共同連帯」の考え方に基づいています。","p":"「日本国憲法第25条第2項」が根拠であること、保護事由は「老齢・障害・死亡」の3つであること、「共同連帯」というキーワードが頻出。健康保険法の「疾病・負傷・出産・死亡」との違いに注意。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":7},{"r":"法2条","t":"国民年金の給付","b":"国民年金 は、第1条の目的を達成する ため、 国民の老齢 、障害 又は 死亡 に関して 必要な給 付を行うものとする。","s":"国民年金は、法1条の目的を達成するために、国民の老齢・障害・死亡について必要な給付を行う制度です。","e":"60歳まで保険料を納めたBさんには65歳から老齢基礎年金が、事故で障害を負ったCさんには障害基礎年金が、一家の大黒柱が亡くなった家族には遺族基礎年金が支給されます。","p":"給付事由は「老齢・障害・死亡」の3つ。「疾病」や「負傷」は含まれない点に注意。国民年金は「年金給付」のみで、健康保険のような医療給付はない。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":9},{"r":"法3条","t":"管掌・事務の委託","b":"◯1 国民年金事業 は、 政府 が、管掌する。 ◯2 国民年金事業 の事務の一部 は、政令の定めるところにより、法律によって組織された 共済組合 （以下単に「共済組合」という。）、 国家公務員共済組合連合会 、全国市町村職員共済組合連合 会、地方公務員共済組合連合会 又は私立学校教職員共済制度を管掌することとされた 日本私立学校 振興・共済事業団 （以下「 共済組合等 」という。）に 行わせることができる 。 ◯3 国民年金事業 の事務の一部 は、 市町村長 （特別区の区長を含む。以下同じ。）が 行うこととするこ とができる 。 管掌 国民年金事業 は、政府が、管掌する。（法3条1項） R06-01E 国民年金事業 の事務の一部 は、共済組合 、国家公務員共済組合連合会 、全国市町村職員共済組合連 合会、地方公務員共済組合連合会 または 日本私立学校振興 ・共済事業団 （「共済組合等 」）に 行わせることが できる 。（法3条2項） 国民年金事業 の事務の一部 は、市町村長 が行うこととすることができる 。（法3条3項）","s":"国民年金事業は政府が管掌（運営）します。ただし、事務の一部は共済組合や日本年金機構に行わせることができます。","e":"国民年金の保険料徴収や届出の受付などの窓口業務は、日本年金機構が実際に行っています。政府が直接すべてを行うのではなく、実務は機構に委託されています。","p":"管掌は「政府」である点が重要。日本年金機構は「保険者」ではなく事務を行う機関。共済組合等にも事務の一部を行わせることができる。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":10},{"r":"法4条","t":"年金額の改定","b":"国民年金法による年金の額 は、国民の生活水準 その他の諸事情に 著しい変動 が生じた場合には、 変動 後の諸事情 に応ずるため、 速やかに 改定の措置 が講ぜられなければならない。 年金額の改定 3.「当該年度の前年度における男子被保険者の平均的な標準報酬額 に相当する額から当該額に係る公租公課の額を控除して得た額に相当 する額 」は、上記スライド図の （3）に該当する部分です 。 ざっくりいうと 、現役の男子被保険者の手取り収入 （月額）です。 2.同様に 「男子被保険者 」のデータとなっていること 、手取り収入の ため「公租公課 」を控除している 点に注意してください 。","s":"国民年金の年金額は、国民の生活水準やその他の事情に著しい変動があった場合には、速やかに改定の措置を講じなければなりません。","e":"物価が急激に上昇して生活が苦しくなった場合、年金額もそれに合わせて引き上げる措置がとられます。逆に物価が下がれば引き下げもあり得ます。","p":"「著しい変動」が要件であること。毎年自動的に改定されるマクロ経済スライドとは別の規定。「速やかに」改定措置を講じるという努力義務的な規定。","f":"19_国民年金法19-年金額の改定等","pg":23},{"r":"法4条の2","t":"財政の均衡","b":"国民年金事業の財政 は、 長期的に その均衡が保たれた ものでなければならず、 著しくその均衡を失す ると見込まれる場合には、 速やかに 所要の措置 が講ぜられなければならない。","s":"国民年金事業の財政は、長期的にバランスが保たれなければなりません。著しくバランスを崩す見込みがある場合は、速やかに対策を講じる必要があります。","e":"少子高齢化で保険料収入が減り、年金給付が増え続けると財政バランスが崩れます。そのような場合には、保険料率の見直しや給付水準の調整など、速やかに対策が必要です。","p":"「長期的にその均衡が保たれたもの」というキーワード。財政均衡期間は「おおむね100年間」とされている点と関連。","f":"19_国民年金法19-年金額の改定等","pg":2},{"r":"法4条の3","t":"財政の現況及び見通し（財政検証）","b":"◯1 政府は、少なくとも 5年 ごとに、 保険料 及び 国庫負担の額 並びに 国民年金法 による 給付 に要する費用の額 その他の 国民年金事業の財政 に係る 収支 についてその 現況 及び 財政均衡期 間における 見通し （以下「 財政の現況及び見通し 」という。）を 作成しなければならない。 ◯2 前項の 財政均衡期間 は、 財政の現況及び見通し が作成される年以降 おおむね 100年間 とす る。 ◯3 政府は、第1項の規定により 財政の現況及び見通し を作成したときは、 遅滞なく 、これを 公 表しなければならない。 財政の均衡 国民年金事業の財政 は、長期的にその均衡が保たれた ものでなければならず、 著しくその均衡を失すると見 込まれる 場合には、 速やかに 所要の措置が講ぜられなければならない。（法4条の2）","s":"政府は少なくとも5年ごとに、保険料・国庫負担額・給付費用などについて、国民年金事業の財政の現況と見通しを作成しなければなりません。これがいわゆる「財政検証」です。","e":"2019年に行われた財政検証では、経済成長や出生率のシナリオ別に将来の年金財政をシミュレーションし、所得代替率がどの程度維持できるかが公表されました。","p":"「少なくとも5年ごと」が超頻出。厚生年金保険法でも同じ規定がある。財政均衡期間は「おおむね100年間」。「少なくとも」なので5年より短い間隔でも可。","f":"19_国民年金法19-年金額の改定等","pg":2},{"r":"法5条","t":"用語の定義","b":"◯8 国民年金法 において、「 政府及び実施機関 」とは、 厚生年金保険 の実施者 たる政府 及び 実施機関 たる共済組合等 をいう。 ◯9 国民年金法において、「 実施機関たる共済組合等 」とは、 厚生年金保険 の実施機関 たる 国家公務 員共済組合連合会 、地方公務員共済組合連合会 又は 日本私立学校振興・共済事業団 をいう。 政府及び実施機関 「政府及び実施機関 」とは、 厚生年金保険の実施者たる 「政府」及び 実施機関たる 「共済組合等 」をいう。 （法5条8項）","s":"国民年金法で使われる重要な用語を定義しています。「政府及び実施機関」とは厚生年金保険の実施者である政府と共済組合等のことです。「被用者年金各法」の定義なども含まれます。","e":"法律の条文で「政府及び実施機関」と出てきたら、それは厚生年金保険を運営している国（政府）と各共済組合等を指しています。","p":"「政府及び実施機関」の定義を正確に押さえること。実施機関には共済組合等が含まれる。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":28},{"r":"法8条","t":"被保険者の資格取得時期","b":"強制加入被保険者 は、第2号被保険者及び第3号被保険者のいずれにも該当しない者 については第1号から第 3号までのいずれかに該当するに 至った日 に、20歳未満の者又は60歳以上の者については第4号に該当す るに 至った日 に、その他の者については同号又は第5号のいずれかに該当するに 至った日 に、それぞ れ被保険者の 資格を取得 する。 1. 20歳 に達したとき。 2. 日本国内に住所を有する に至ったとき。 3. 厚生年金保険法 に基づく 老齢給付等を受けることができる者 その他国民年金法の適用を除外すべき 特別の理由 がある者として厚生労働省令で定める者でなくなったとき。 4. 厚生年金保険 の被保険者 の資格を取得 したとき。 5. 被扶養配偶者 となったとき。 強制加入被保険者の資格の取得 R02-02B 2020改正 強制加入被保険者の資格取得の要件 は次の通りであり、「 その日 」に資格を取得 する。 （法8条） 種別 資格取得の要件及びその時期 第1号被保険者 1. 20歳に達したとき（ 20歳の誕生日の前日 ）。（1号） 2. R06-04C 日本国内に住所 を有するに至ったとき。（2号） 3. 厚生年金保険法に基づく 老齢給付等を受けることができる者 その他国民年金法 の適用を除外すべき 特別の理由 がある者として厚生労働省令で定める者でなくな ったとき。（3号） 第2号被保険者 1. R07-02ｵ 厚生年金保険の被保険者 の資格を取得したとき。（4号） 第3号被保険者 1. （被扶養配偶者が） 20歳に達したとき。（1号） 2. 被扶養配偶者 となったとき。（5号）","s":"強制加入の被保険者は、要件に該当した日にその資格を取得します。20歳未満の者や60歳以上の者が第2号被保険者に該当する場合は、その日に資格を取得します。","e":"20歳の誕生日を迎えた大学生は、その誕生日に第1号被保険者の資格を取得します。届出をしなくても、法律上は自動的に被保険者になります。","p":"資格取得日は「該当するに至った日」（当日）。届出は資格取得の要件ではない（届出がなくても資格は取得する）。20歳到達は「誕生日の前日」に20歳に達する点に注意。","f":"03_国民年金法3-資格の得喪","pg":2},{"r":"法11条","t":"被保険者期間の計算","b":"◯1 被保険者期間 を計算する場合には、 月によるものとし、被保険者の 資格を取得した日の属する 月からその資格を喪失した日の属する月の前月 までをこれに 算入する。 ◯2 被保険者 がその 資格を取得した日の属する月 にその資格を喪失した ときは、その月を 1箇月 として 被保険者期間に 算入する。ただし、その月に さらに 被保険者の 資格を取得した ときは、 この限りでない 。 ◯3 被保険者の 資格を喪失 した後、 さらに その資格を取得した 者については、 前後の被保険者期間 を合 算する。 被保険者期間の計算（原則） R07-04A 被保険者期間を計算する 場合には、「 月」によるものとし、被保険者の 資格を取得した日の属する 月からその 資格を喪失した日の属する月の前月 までが 被保険者期間 に算入される。（法11条1項）","s":"被保険者期間は月単位で計算します。資格取得日の属する月から、資格喪失日の属する月の前月までを算入します。同じ月に資格の取得と喪失がある場合は1か月として算入します。","e":"4月15日に資格取得し、翌年3月20日に資格喪失した場合、4月から2月までの11か月が被保険者期間です。喪失日（3月20日）の属する月（3月）の前月（2月）まで算入されます。","p":"「取得月から喪失月の前月まで」が基本ルール。同月得喪は「1か月として算入」。ただし同月内に更に他の種別の被保険者になった場合は算入しない。","f":"04_国民年金法4-被保険者期間の計算、届出（被保険者の届出）","pg":2},{"r":"法11条の2","t":"種別ごとの被保険者期間の計算","b":"第1号被保険者 としての被保険者期間、 第2号被保険者 としての被保険者期間又は 第3号被保険者 としての 被保険者期間を計算する場合には、 被保険者 の種別に変更 があった月は、 変更後の種別 の被保険者 であった月とみなす。 同一の月 において、 2回以上 にわたり被保険者の 種別に変更 があったときは、その 月は 最後の種別 の被保険者 であった月とみなす。 種別の変更 R07-04B R05-05D 第1号被保険者としての被保険者期間 、第2号被保険者としての被保険者期間 または 第3 号被保険者としての被保険者期間 を計算する場合には、 被保険者の種別に変更があった月 は、「 変更後 」の種 別の被保険者であった月 とみなされる。（法11条の2）","s":"第1号・第2号・第3号のそれぞれの被保険者期間を計算する場合は、種別の変更があった月は変更後の種別の被保険者期間に算入します。","e":"Aさんが4月に会社を退職して第2号から第1号に変わった場合、その月（4月）は第1号被保険者としての期間に算入されます。","p":"種別変更があった月は「変更後の種別」の被保険者期間に算入される。同一月に2回以上の種別変更があった場合は「最後の種別」の期間とする。","f":"04_国民年金法4-被保険者期間の計算、届出（被保険者の届出）","pg":6},{"r":"法12条","t":"届出","b":"◯1 被保険者 （第3号被保険者を除く 。次項において同じ。）は、その 資格の取得及び喪失 並びに 種別の変 更に関する事項並びに 氏名及び住所の変更 に関する事項を 市町村長 に届け出 なければならない。 ◯2 被保険者 の属する 世帯の世帯主 （以下単に「 世帯主 」という。）は、 被保険者に代って 、前項 の届出をすることができる。 ◯3 住民基本台帳法 の規定による 転入、転居又は転出等 の届出 があったとき（当該届出に係る書面に所 定の事項について付記がされたときに限る。）は、その 届出と同一の事由 に基づく第1項の規定による 届 出があった ものとみなす。 ◯4 市町村長 は、第1項又は第2項の規定による 届出を受理 したとき（氏名及び住所の変更に関する事 項の届出であって厚生労働省令で定めるものを受理したときを除く。）は、 厚生労働大臣 にこれを 報告 しなければならない。","s":"被保険者（第3号被保険者を除く）は、資格の取得・喪失、種別の変更、氏名・住所の変更について届け出なければなりません。第3号被保険者の届出は配偶者の事業主を経由して行います。","e":"自営業の第1号被保険者が引っ越した場合は、市区町村に住所変更を届け出ます。サラリーマンの妻（第3号被保険者）の届出は、夫の勤務先を通じて行います。","p":"第1号被保険者は市町村長に届出。第3号被保険者は「事業主を経由して」届出。届出期限は14日以内。第2号被保険者には届出義務がない（附則7条の4）。","f":"04_国民年金法4-被保険者期間の計算、届出（被保険者の届出）","pg":9},{"r":"法14条","t":"国民年金原簿","b":"厚生労働大臣 は、国民年金原簿 を備え、これに 被保険者 の氏名、資格の取得及び喪失 、種別の 変更 、保険料の納付状況 、基礎年金番号 その他厚生労働省令で定める事項を 記録するものとす る。 国民年金原簿 厚生労働大臣 は、国民年金原簿 を備え、これに 被保険者 の氏名、資格の取得及び喪失 、種別の変更 、保険料 の納付状況 、基礎年金番号 その他厚生労働省令で定める事項を 記録する。（法14条） 国民年金原簿の記載事項（則15条） 1. 被保険者（第2号被保険者にあっては、 第1号厚生年金被保険者に限る ）の基礎年金番号 2. 被保険者（第2号被保険者にあっては、 第1号厚生年金被保険者に限る ）の性別、生年月日 及び住所 3. 給付に関する事項 4. 法定免除、申請免除、学生納付特例または納付猶予の規定により 納付することを要しないものとされた保 険料に関する事項 5. 被保険者が国民年金基金の加入員であるときは当該 基金の加入年月日 4.には、「一部免除 」についても含まれます 。","s":"厚生労働大臣は国民年金原簿を備え、被保険者の氏名、資格の取得・喪失、種別の変更、保険料の納付状況、基礎年金番号などを記録しなければなりません。","e":"年金事務所で「自分の年金記録を確認したい」と言えば、国民年金原簿に記録された保険料納付状況や加入期間を確認できます。ねんきんネットでも閲覧可能です。","p":"「基礎年金番号」が記録事項に含まれることが重要。国民年金原簿は厚生年金保険原簿とは別のもの。","f":"05_国民年金法5-届出（第3号の特例、受給権者の届出）、基礎年金番号通知書等（通知書、原簿）","pg":37},{"r":"法14条の2","t":"国民年金原簿の訂正請求","b":"◯1 被保険者又は被保険者であった者 は、国民年金原簿 に記録された自己に係る 特定国民年金原簿記録 （被保険者の 資格の取得及び喪失 、種別の変更 、保険料の納付状況 その他厚生労働省令で定める事項の内容を いう。）が 事実でない 、又は 国民年金原簿 に自己に係る 特定国民年金原簿記録 が記録されていない と思 料するときは、 厚生労働大臣 に対し、 国民年金原簿 の訂正の請求 をすることができる。 訂正請求 被保険者または被保険者であった者 は、国民年金原簿 に記録された自己に係る 特定国民年金原簿記録 が事実 でない 、または 国民年金原簿 に自己に係る 特定国民年金原簿記録 が記録されていない と思料するときは、 厚生 労働大臣 に対し、 国民年金原簿 の訂正の請求 をすることができる。（法14条の2第1項）","s":"被保険者又は被保険者であった者は、国民年金原簿に記録された自分の記録（特定国民年金原簿記録）が事実と異なると思う場合、厚生労働大臣に訂正の請求をすることができます。","e":"「30年前に確かに保険料を納めたのに未納になっている」という場合、訂正請求を行い、記録の調査・訂正を求めることができます。","p":"訂正請求できるのは「被保険者又は被保険者であった者」。地方厚生局長に委任されている。年金記録問題への対応として設けられた規定。","f":"05_国民年金法5-届出（第3号の特例、受給権者の届出）、基礎年金番号通知書等（通知書、原簿）","pg":40},{"r":"法14条の5","t":"年金個人情報の提供（ねんきん定期便）","b":"厚生労働大臣 は、国民年金制度 に対する 国民の理解を増進 させ、及びその 信頼を向上 させるた め、 被保険者 に対し、当該 被保険者 の保険料納付の実績 及び 将来の給付に関する必要な情報 を 分かりやすい形で 通知するものとする。 被保険者に対する情報の提供（ねんきん定期便）","s":"厚生労働大臣は、国民年金制度への国民の理解を深め信頼を高めるため、被保険者に対して保険料納付の実績や将来の給付に関する情報を通知する措置を講じます。","e":"毎年誕生月に届く「ねんきん定期便」がこの規定に基づくものです。これまでの保険料納付実績や将来受け取れる年金の見込額が記載されています。","p":"いわゆる「ねんきん定期便」の根拠規定。35歳・45歳・59歳の節目には詳細な情報が届く。","f":"05_国民年金法5-届出（第3号の特例、受給権者の届出）、基礎年金番号通知書等（通知書、原簿）","pg":43},{"r":"法15条","t":"給付の種類","b":"国民年金法 による 給付 は、次のとおりとする。 1. 老齢基礎 年金 2. 障害基礎 年金 3. 遺族基礎 年金 4. 付加 年金、寡婦 年金及び 死亡一時金 給付の種類 R02-06E 国民年金法による給付 は、次の通りである。（法15条） 給付の種類 1. 老齢基礎 年金 2. 障害基礎 年金 3. 遺族基礎 年金 4. 付加年金、寡婦年金及び死亡一時金 R02-06E これ以外に 、特別一時金 及び「脱退一時金 」が、「附 則」において規定されています 。（附則9条の3の2第1項、昭和60年 附則94条1項）（特別一時金については、支給実績及び出題実績がほ ぼないため、下記のスライド図には含めていません）","s":"国民年金法による給付は、(1)老齢基礎年金、(2)障害基礎年金、(3)遺族基礎年金、(4)付加年金・寡婦年金・死亡一時金の4種類です。(4)は第1号被保険者の独自給付です。","e":"サラリーマンの妻（第3号被保険者）が受けられるのは老齢基礎年金・障害基礎年金・遺族基礎年金の3つ。付加年金・寡婦年金・死亡一時金は第1号被保険者だけの特別な給付です。","p":"付加年金・寡婦年金・死亡一時金は「第1号被保険者の独自給付」。脱退一時金は給付に含まれない（附則で規定）。給付の種類と対象者を正確に区別すること。","f":"11_国民年金法11-給付の種類等、老齢基礎年金（支給要件、納付済期間、免除期間）","pg":2},{"r":"法16条","t":"裁定","b":"給付 を受ける 権利は、その権利を有する者（以下「 受給権者 」という。）の 請求 に基いて、 厚 生労働大臣 が裁定する。 裁定 R07-01A 給付を受ける権利 は、受給権者の請求 に基づいて、 厚生労働大臣 が裁定する。（法16条）","s":"年金の給付を受ける権利は、その権利を持つ人（受給権者）が請求して初めて、厚生労働大臣が「支給します」と裁定（決定）することで具体的に支給されます。","e":"65歳になったからといって自動的に年金が振り込まれるわけではありません。年金事務所に裁定請求書を提出して、厚生労働大臣の裁定を受ける必要があります。","p":"「請求に基いて」裁定する（請求主義）。裁定は「厚生労働大臣」が行う。裁定は確認行為であり、権利自体は要件を満たした時点で発生している。","f":"11_国民年金法11-給付の種類等、老齢基礎年金（支給要件、納付済期間、免除期間）","pg":4},{"r":"法16条の2","t":"マクロ経済スライド","b":"◯1 政府は、第4条の3第1項（財政の現況及び見通しの作成）の規定により 財政の現況及び見通し を作成す るに当たり、 国民年金事業の財政 が、 財政均衡期間 の終了時 に給付の支給に支障が生じない ようにする ために必要な 積立金 （年金特別会計の国民年金勘定の積立金をいう。）を 保有しつつ当該 財政均衡期 間にわたってその 均衡を保つことができない と見込まれる場合には、 年金たる給付 （付加年金 を除 く。）の額（以下「給付額」という。）を 調整する ものとし、政令で、給付額を調整する期間（以下「 調 整期間 」という。）の 開始年度を定める ものとする。 ◯2 財政の現況及び見通し において、前項の 調整を行う必要がなくなった と認められるときは、政令 で、調整期間 の終了年度を定める ものとする。 ◯3 政府は、 調整期間 において 財政の現況及び見通し を作成するときは、 調整期間 の終了 年度の見通し についても 作成し、併せて、これを 公表しなければならない。 調整期間（マクロ経済スライド）","s":"財政検証で年金財政のバランスが崩れる見込みの場合、給付水準を自動的に調整する仕組みが設けられています。調整期間中は、年金額の伸びを物価・賃金の上昇率より抑えます。","e":"物価が2%上がっても、マクロ経済スライドによる調整率が0.9%の場合、年金額の引上げは1.1%にとどまります。これにより年金財政の安定を図ります。","p":"「調整期間」と「調整率」がポイント。調整率は公的年金被保険者数の減少率と平均余命の伸びを勘案して設定。名目下限措置（年金額を名目で引き下げない）にも注意。","f":"19_国民年金法19-年金額の改定等","pg":10},{"r":"法17条","t":"端数処理","b":"◯1 年金たる給付 （以下「 年金給付 」という。）を受ける 権利を裁定する場合又は 年金給付の額 を改定 する場合において、 年金給付の額 に50銭未満 の端数が生じたときは、これを 切り捨て 、50銭以上 1円未満 の端数が生じたときは、これを 1円に切り上げる ものとする。 年金額の端数処理 年金給付を受ける権利 を裁定する場合または 年金給付の額 を改定する場合においては、原則として、 1円未満 の端数を四捨五入 する。（法17条1項） 年金給付の額を計算 する過程 において生じる 端数については、 1円未満 の端数を四捨五入 する。（法17条2 項、令4条の3） 年金給付の裁定及び額の改定における端数処理 において、「 100円未満 」の端数を四捨五入 するものは次の ものがある。 100円単位の端数処理 具体的計算 老齢基礎年金の満額 （法27条かっこ書） 780,900円 ×（改定率 ） 2級の障害基礎年金の額 （法33条1項かっこ書） 780,900円 ×（改定率 ） 遺族基礎年金の額 （法38条かっこ書） 780,900円 ×（改定率 ） 振替加算の額 （昭和60年附則14条1項かっこ書） 224,700円 ×（改定率 ） 子の加算額 （法33条の2第1項かっこ書） 224,700円 ×（改定率 ）、74,900円 ×（改定率 ） 原則は 、1円未満での四捨五入です 。ただし 、基礎年金額や加算額 などベースとなるものの額は 、100円単位での四捨五入です 。","s":"年金給付の権利を裁定する場合や年金額を改定する場合、年金額に50銭未満の端数があれば切り捨て、50銭以上1円未満の端数があれば1円に切り上げます。","e":"計算の結果、年金額が780,900円50銭になった場合は781,000円ではなく780,901円（50銭以上なので切上げ）になります。","p":"端数処理は「50銭未満切捨て、50銭以上1円未満切上げ」。これは年金額の算定時の端数処理。支払時の端数処理（法18条の2）とは別。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":4},{"r":"法18条","t":"年金の支給期間・支払期月","b":"◯1 年金給付の支給 は、これを 支給すべき事由 が生じた日の属する 月の翌月 から始め、 権利が消滅し た日の属する月 で終るものとする。 ◯2 年金給付 は、その 支給を停止すべき事由 が生じたときは、その事由が生じた日の属する 月の翌月 か らその 事由が消滅した日の属する月 までの分の 支給を停止 する。ただし、これらの日が 同じ月 に属する 場合は、 支給を停止しない 。 支給期間 R06-08ｴ 年金給付の支給 は、これを 支給すべき事由が生じた日の属する月 の「翌月」から 始め、権利が 消滅 した日の属する 「月」で終わる 。（法18条1項）","s":"年金の支給は、支給事由が生じた月の翌月から始まり、権利が消滅した月で終わります。年金は偶数月（2月・4月・6月・8月・10月・12月）に前2か月分ずつ支払われます。","e":"4月5日に65歳になった人の老齢基礎年金は5月分から支給開始。支払いは6月に5月分、8月に6月・7月分というように偶数月に支払われます。","p":"支給開始は「翌月から」、終了は「消滅した月まで」。支払期月は「毎年2月・4月・6月・8月・10月・12月」の年6回。各支払期月に前月までの2か月分を支払う。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":2},{"r":"法18条の2","t":"支払額の端数処理","b":"◯1 第18条第3項（ 支払期月 ）の規定による 支払額 に1円未満 の端数が生じたときは、これを 切り捨 てる ものとする。 ◯2 毎年 3月から翌年2月 までの間において前項の規定により 切り捨てた金額の合計額 （1円未満の端数 が生じたときは、これを切り捨てた額）については、これを当該 2月の支払期月 の年金額 に加算する もの とする。 2月期の支払の年金の加算 R05-09D 年金給付の各支払期月による支払額 は、1円未満切捨て となる。（法18条の2第1項） R05-09D 毎年3月から翌年2月までの間 において 切り捨てた金額の合計額 （1円未満の端数が生じたときは、 これを切り捨てた額）については、当該 2月の支払期月の年金額に加算される 。（法18条の2第2項） 「切り捨て 」です。「切り上げ 」ではありません 。","s":"各支払期月の支払額に1円未満の端数があるときは切り捨てます。また、毎年3月から翌年2月までの間で端数の切捨てによる差額が生じたときは、翌年2月の支払期月の支払額に加算します。","e":"月額65,141.666...円の年金の場合、各月1円未満を切り捨てて65,141円を支払い、年間で生じた端数の合計分を2月支払い分に加算して調整します。","p":"支払額の端数は「1円未満切捨て」。年間の調整期間は「3月から翌年2月まで」で、調整月は「2月の支払期月」。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":9},{"r":"法18条の3","t":"死亡の推定","b":"船舶 が沈没 し、転覆し、滅失し、若しくは 行方不明 となった際 現にその船舶に乗っていた者 若しくは船舶に乗っていてその船舶の航行中に 行方不明となった者 の生死が3箇月間 分らない 場合又はこ れらの者の 死亡が3箇月以内 に明らか となり、かつ、その 死亡の時期が分らない 場合には、死亡を支給事 由とする給付の支給に関する規定の適用については、その 船舶が沈没し、転覆し、滅失し、若しくは行方 不明となった日 又はその者が 行方不明となった日 に、その者は、 死亡したものと 推定 する。 航 空機 が墜落 し、滅失し、若しくは 行方不明 となった際 現にその航空機に乗っていた者 若しくは航 空機に乗っていてその航空機の航行中に 行方不明となった者 の生死が3箇月間 分らない 場合又はこれらの 者の死亡が3箇月以内 に明らか となり、かつ、その 死亡の時期が分らない 場合にも、同様とする。 死亡の推定 船舶または航空機 の転覆、墜落など の事故が生じた場合において、その 生死が3か月間不明である 場合または 3か月以内に死亡が判明したが死亡の時期がわからない 場合は、 死亡を支給事由とする給付の支給 に関する規定 の適用については、それぞれ当該 事故などの発生日 に死亡 したものと 推定される。（法18条の3）","s":"船舶の沈没・転覆・行方不明、航空機の墜落・行方不明の際に乗っていた人が3か月間生死不明の場合、その船舶・航空機の事故があった日に死亡したものと推定します。","e":"漁船が沈没して乗組員の行方がわからない場合、沈没から3か月が経過しても見つからなければ、沈没日に死亡したものとみなされ、遺族基礎年金の支給が始まります。","p":"「3か月間生死不明」で「事故日に死亡推定」。推定なので反証があれば覆る。失踪宣告（7年または1年）とは異なる制度。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":12},{"r":"法20条の2","t":"年金給付の支給停止の申出","b":"◯1 年金給付 （国民年金法の他の規定又は他の法令の規定 によりその 全額につき 支給を停止 されている 年金給付を 除く。）は、その 受給権者 の申出 により、その 全額 の支給を停止する。ただし、 国民年 金法の他の規定又は他の法令の規定 によりその額の 一部 につき 支給を停止されているときは、 停止さ れていない部分の額 の支給を停止する。 ◯2 前項ただし書のその額の 一部 につき 支給を停止 されている 年金給付 について、 国民年金法の他の規 定又は他の法令の規定 による 支給停止が解除 されたときは、前項本文の 年金給付 の全額 の支給を停 止する。 ◯3 第1項の 申出 は、 いつでも 、将来に向かって 撤回することができる。 受給権者の申出による支給停止 年金給付 は、原則として、その 受給権者の申出 により、その 全額の支給が停止 される。（法20条の2第1項） ただし、国民年金法の他の規定または他の法令の規定によりその額の 一部につき支給を停止されている とき は、停止されていない部分の額 の支給が停止 される。（法20条の2第1項ただし書）","s":"年金の受給権者は、自ら申し出ることによって年金の支給を停止してもらうことができます。ただし、全額支給停止されている年金はこの申出の対象外です。","e":"老齢基礎年金を受給しているが、在職中で収入が十分にあるので年金は不要だという場合、自分から支給停止の申出をすることができます。","p":"受給権者の「申出」による支給停止。申出はいつでも撤回できる。全額支給停止中の年金は対象外。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":19},{"r":"法22条","t":"第三者行為による損害賠償との調整","b":"◯1 政府は、障害若しくは 死亡又はこれらの 直接の原因 となった事故が 第三者の行為 によって生じた場 合において、 給付をした ときは、その 給付の価額の限度 で、受給権者 が第三者 に対して有する 損害賠 償の請求権を取得 する。 ◯2 前項の場合において、 受給権者 が第三者 から同一の事由 について 損害賠償を受けた ときは、 政府 は、その 価額の限度 で、給付を行う 責を免かれる 。 損害賠償との調整 政府は、障害若しくは 死亡またはこれらの 直接の原因 となった事故が 第三者の行為 によって生じた場合にお いて、 給付をした ときは、その 給付の価額の限度 で、受給権者 が第三者に対して有する損害賠償の請求権を取 得する。（法22条1項） 障害若しくは 死亡またはこれらの 直接の原因 となった事故が 第三者の行為 によって生じた場合において、受 給権者が 第三者 から同一の事由 について 損害賠償を受けた ときは、 政府は、その 価額の限度 で、給付を行う責 を免かれる 。（法22条2項） 損害賠償との調整の例外（死亡一時金） R05-06D 一時払いである 死亡一時金 については、当該給付の支給の事由となった事故について、 受給権者が 損害賠償を受けた場合であっても、当該 損害賠償額との調整は行われない 。（平成27年9月30日年管管発0930 第6号） 死亡一時金については、保険料の掛け捨て防止の考え方に立った給 付であり、その給付額にも鑑み、損害賠償を受けた場合であっても、 損害賠償額との調整は行われません。（平成27年9月30日年管管発0 930第6号）","s":"障害や死亡の原因が第三者（加害者）の行為による場合、政府が年金給付をしたときは、給付額の範囲で第三者への損害賠償請求権を取得します。逆に、先に第三者から賠償を受けた場合は、その額の範囲で給付を行わないことができます。","e":"交通事故で障害を負い障害基礎年金を受給している場合、政府は加害者に対して年金給付額分の損害賠償を請求できます。先に加害者から賠償金を受け取っていれば、その分は年金給付から控除されます。","p":"「求償」（政府が給付後に第三者に請求）と「控除」（先に賠償を受けた場合に給付を減額）の2つの仕組み。二重補填の防止が趣旨。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":36},{"r":"法23条","t":"不正利得の徴収","b":"偽りその他 不正の手段 により 給付を受けた 者があるときは、 厚生労働大臣 は、受給額 に相当する金額 の全部又は一部 をその者から 徴収する ことができる。 不正利得の徴収","s":"偽りその他不正の手段により給付を受けた者がいるときは、厚生労働大臣は受給額に相当する金額の全部又は一部をその者から徴収することができます。","e":"障害が治ったのに隠して障害基礎年金を受け続けていた場合、不正に受給した分を返還させられます。","p":"「全部又は一部」を徴収「できる」（裁量）。雇用保険の不正受給（3倍返し）とは異なり、国民年金法では受給額相当額の徴収。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":26},{"r":"法24条","t":"受給権の保護（譲渡等の禁止）","b":"給付を受ける権利 は、 譲り渡し 、担保 に供し、又は 差し押える ことができない 。ただし、 老齢基礎年金 又は 付加年金 を受ける権利を 国税滞納処分 （その例による処分を含む。）により 差し押える 場合は、 この限りでない 。 受給権の保護 R05-03E 給付を受ける権利 は、譲り渡し 、担保に供し、または 差し押える ことが できない 。（法24条） R05-03E 2022改正 ただし、老齢基礎年金、付加年金または脱退一時金を受ける権利を 国税滞納処分 により 差し押える 場合には 例外とされる。（法24条ただし書）（附則9条の3の2第7項、令14条の5） 例えば、死亡一時金の支給要件には「 死亡した者が、老齢基礎年金 または障害基礎年金の支給を受けたことがないこと 。」があります。 （1-8-18参照） では、死亡した者が、申出による支給停止で、支給を受けていなか った場合には、この支給要件を満たしているといえるかというと、満 たしていないものとされ、死亡一時金の支給は行われないということ です。 老齢基礎年金を当初から 「受給権者の申出により支給停止 」してい た者が死亡した場合 、「支給を受けていたもの 」とみなされるので 、 死亡一時金は支給されません 。","s":"給付を受ける権利は、譲渡・担保提供・差押えが禁止されています。ただし、老齢基礎年金と付加年金については、国税滞納処分による差押えが例外的に認められます。","e":"「年金を受ける権利を担保にお金を借りる」ことは原則禁止です。ただし、老齢基礎年金については税金の滞納がある場合に差し押さえられることがあります。","p":"例外は「老齢基礎年金」と「付加年金」の国税滞納処分による差押え。障害基礎年金・遺族基礎年金は差押え完全禁止。厚生年金の老齢厚生年金も同様の例外あり。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":23},{"r":"法25条","t":"公課の禁止","b":"租税その他の公課 は、給付として支給を受けた 金銭 を標準として、 課することができない 。ただし、 老齢基礎年金 及び 付加年金 については、 この限りでない 。 公課の禁止","s":"年金として受け取ったお金に対して税金をかけることは原則禁止されています。ただし、老齢基礎年金と付加年金は課税対象です。","e":"障害基礎年金や遺族基礎年金は非課税なので所得税がかかりません。一方、老齢基礎年金は雑所得として所得税の対象になります。","p":"課税されるのは「老齢基礎年金」と「付加年金」のみ。障害基礎年金・遺族基礎年金・寡婦年金・死亡一時金は非課税。法24条の差押禁止の例外と対応している。","f":"20_国民年金法20-給付通則など（支給期間、端数処理、死亡の推定、未支給年金）","pg":25},{"r":"法27条","t":"老齢基礎年金の額","b":"老齢基礎年金の額 は、 780,900円 に改定率 を乗じて得た額（その額に 50円未満 の端数が生じ たときは、これを 切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円に切り上 げる ものとする。）とする。 基本年金額（原則） R04-10D 老齢基礎年金の額 は、780,900円 に改定率 を乗じて得た額である。（法27条） 老齢基礎年金の額 に50円未満の端数 が生じたときは、これを 切り捨て 、50円以上100円未満の端数 が生じた ときは、 これを 100円に切り上げる ものとする。（法27条かっこ書） 老齢基礎年金の額 （老齢基礎年金の額 ）＝（ 780,900円 ）×（ 改定率 ） 2025改正 （参考） 老齢基礎年金の満額の推移 は次の通りである。 令和2年度 令和3年度 令和4年度 令和5年度 令和6年度 令和7年度 令和8年度 781,700円 780,900円 777,800円 795,000円 （新規裁定者）816,000円 （新規裁定者）831,700円 （新規裁定者）― 老齢基礎年金の額は、20歳から60歳までの40年間、その全期間保 険料を納付した場合に、満額である「780,900円×改定率」が支給さ れる、いわゆる「フルペンション（減額）方式」を採っています。","s":"老齢基礎年金の満額は780,900円に改定率を乗じた額です。端数処理は50円未満切捨て、50円以上100円未満は100円に切上げです。保険料免除期間がある場合は、免除の種類に応じて反映率が異なります。","e":"40年間すべて保険料を納めた人は満額の老齢基礎年金を受け取れます。半額免除期間が10年ある場合は、その期間は一定の割合で減額されます。","p":"満額の基本額は「780,900円×改定率」。端数処理は「50円単位」（50円未満切捨て、50円以上100円未満は100円に切上げ）。免除期間の反映率（全額免除=4/8、3/4免除=5/8、半額免除=6/8、1/4免除=7/8）が超頻出。","f":"13_国民年金法13-老齢基礎年金（老齢基礎年金の額、振替加算）","pg":2},{"r":"法28条","t":"老齢基礎年金の繰下げ支給","b":"◯1 老齢基礎年金の受給権 を有する 者であって 66歳に達する前 に当該 老齢基礎年金 を請求していなか ったも のは、 厚生労働大臣 に当該 老齢基礎年金 の支給繰下げ の申出 をすることができる。ただし、 その者が 65歳に達したとき に、 他の年金たる給付 （他の年金給付 （付加年金 を除く。）又は 厚 生年金保険法 による 年金たる保険給付 （老齢 を支給事由とするものを 除く。）をいう。以下同じ。）の 受給権者 であったとき、又は 65歳 に達した日 から 66歳 に達した日までの間 において 他の年金たる 給付 の受給権者 となったときは、 この限りでない 。 支給の繰下げ 「支給の繰下げ 」は、 本則において規定されている。（法28条1項） 支給繰下げの要件","s":"老齢基礎年金の受給権者で、66歳に達する前に請求しなかった者は、厚生労働大臣に繰下げ支給の申出をすることができます。繰り下げた期間に応じて年金額が増額されます。","e":"65歳で受給せずに70歳まで繰り下げると、5年×12か月×0.7%=42%増額された年金を一生涯受け取れます。","p":"繰下げの増額率は「1月あたり0.7%」。最大75歳まで繰下げ可能（最大84%増額）。66歳に達する前に請求していないことが要件。他の年金（遺族・障害）の受給権がある場合の制限に注意。","f":"14_国民年金法14-老齢基礎年金（繰上げ、繰下げ、失権）","pg":18},{"r":"法29条","t":"老齢基礎年金の失権","b":"老齢基礎年金 の受給権 は、受給権者が 死亡 したときは、 消滅する。 老齢基礎年金の失権 R07-03E R07-09D 老齢基礎年金の受給権 は、受給権者が死亡したとき は、消滅する。（法29条） 余談ですが、1年繰下げると繰下げのメリットが生まれるのはだい たい12年後になります。 66歳まで繰下げた場合にはおよそ78歳が損益分岐点となります。 平均余命で考えると繰下げにはメリットがあるといえますが、健康寿 命は超えている点は考慮する必要があるかと思います。 老齢基礎年金の受給権 は、受給権者の 死亡以外の事由 によって 消滅 することはありません 。 受給権者が日本国外に住所を移したことのみを理由として、老齢基 礎年金の受給権が消滅することはありません。","s":"老齢基礎年金の受給権は、受給権者が死亡したときに消滅します。それ以外の失権事由はありません。","e":"老齢基礎年金を受給中のAさんが亡くなると受給権は消滅し、未支給年金があれば遺族が請求できます。再婚しても、犯罪を犯しても、老齢基礎年金の受給権は消滅しません。","p":"老齢基礎年金の失権事由は「死亡のみ」。障害基礎年金や遺族基礎年金と比べて失権事由が極めて限定されている点が出題ポイント。","f":"14_国民年金法14-老齢基礎年金（繰上げ、繰下げ、失権）","pg":41},{"r":"法30条","t":"障害基礎年金の支給要件","b":"◯1 障害基礎年金 は、疾病にかかり、又は 負傷し、かつ、その 疾病又は負傷及びこれらに 起因する疾病（以 下「傷病」という。）について 初めて医師又は歯科医師の診療を受けた日 （以下「 初診日 」という。） において次の各号のいずれかに該当した者が、当該 初診日 から起算して 1年6月 を経過した日 （その 期間内にその傷病が治った場合においては、その 治った日 （その症状が 固定し治療の効果が期待でき ない状態 に至った日を 含む。）とし、以下「 障害認定日 」という。）において、その 傷病により次項 に規定する 障害等級 に該当する程度の 障害の状態 にあるときに、その者に 支給する。ただし、当該 傷病 に係る 初診日の前日 において、当該 初診日の属する月の前々月 までに 被保険者期間 があり、か つ、当該被保険者期間に係る 保険料納付済期間 と保険料免除期間 とを合算した期間が当該 被保険者期間 の3 分の2 に満たないときは、 この限りでない 。 1. 被保険者 であること。 2. 被保険者であった者 であって、 日本国内に住所を有し 、かつ、 60歳以上65歳未満 である こと。 障害基礎年金の支給要件 障害基礎年金 は、次のすべての要件を満たしたときに 支給される。（法30条1項） 支給対象者かどうかは 「障害認定日 」で判断します 。「初診日 」で 判断するのではありません 。","s":"障害基礎年金は、初診日に被保険者であること（又は被保険者であった60歳以上65歳未満の国内居住者）、障害認定日に障害等級1級又は2級に該当すること、保険料納付要件を満たしていることが必要です。","e":"会社員のBさんが病気で初めて病院に行った日（初診日）に国民年金の被保険者であり、1年6か月後の障害認定日に障害等級2級に該当し、初診日の前日時点で保険料納付要件を満たしていれば、障害基礎年金が支給されます。","p":"3つの要件「初診日要件」「障害認定日要件」「保険料納付要件」を正確に。障害認定日は原則「初診日から1年6か月経過日」。保険料納付要件は「直近1年間に滞納なし」又は「3分の2以上納付」。障害等級は1級・2級のみ（3級はない）。","f":"15_国民年金法15-障害基礎年金（支給要件）","pg":2},{"r":"法30条の2","t":"事後重症による障害基礎年金","b":"◯1 疾病にかかり、又は 負傷し、かつ、当該 傷病に係る 初診日 において第30条第1項各号（ 初診日要 件）のいずれかに該当した者であって、 障害認定日 において 障害等級に該当する程度の障害の状態になかった ものが、同日後 65歳に達する日の前日 までの間において、その 傷病により 障害等級に該当する程度の 障害の状態に該当するに至った ときは、その者は、 その期間内 に障害基礎年金 の支給を請求 すること ができる。 ◯2 第30条第1項ただし書（ 保険料納付要件 ）の規定は、前項の場合に 準用する。 ◯3 第1項の 請求 があったときは、その 請求 をした者に 障害基礎年金 を支給する。 事後重症による障害基礎年金 R07-05A R03-10C 障害認定日 に障害等級に該当する程度の障害の状態になかった ものが、65歳に達する日 の前日まで に、その傷病により障害等級（ 1級及び2級 ）に該当する程度の 障害の状態に該当するに至った とき は、その期間内に「 事後重症による障害基礎年金 」の支給を 請求することができる。（法30条の2第1項）","s":"障害認定日には障害等級に該当しなかったが、その後65歳に達する日の前日までに障害が悪化して1級又は2級に該当した場合、本人の請求により障害基礎年金が支給されます。","e":"初診日から1年6か月の障害認定日では軽度だった障害が、50歳の時に悪化して2級に該当した場合、請求すれば障害基礎年金を受給できます。","p":"「65歳に達する日の前日まで」に請求が必要。請求月の翌月から支給（遡及なし）。事後重症は「本人の請求」が要件であり、職権ではない。","f":"15_国民年金法15-障害基礎年金（支給要件）","pg":23},{"r":"法30条の3","t":"基準障害による障害基礎年金","b":"◯1 疾病にかかり、又は 負傷し、かつ、その 傷病（以下「 基準傷病 」という。）に係る 初診日 にお いて第30条第1項各号のいずれかに該当した者であって、 基準傷病以外の傷病 により 障害の状態 にあるもの が、 基準傷病に係る障害認定日 以後 65歳に達する日の前日 までの間において、 初めて 、基準傷病に よる障害 （以下「 基準障害 」という。）と 他の障害 とを併合して障害等級に該当する程度の 障害の 状態に該当するに至ったとき（基準傷病の初診日が、基準傷病以外の傷病（基準傷病以外の傷病が2以上ある 場合は、基準傷病以外のすべての傷病）の 初診日 以降であるときに 限る。）は、その者に 基準障害 と他の障害 とを併合した障害の程度による 障害基礎年金 を支給する。 ◯2 第30条第1項ただし書（保険料納付要件）の規定は、前項の場合に準用する。この場合において、同条 第1項ただし書中「当該傷病」とあるのは、「基準傷病」と読み替えるものとする。 ◯3 第1項の障害基礎年金の 支給は、第18条第1項の規定にかかわらず、当該障害基礎年金の 請求があった 月の翌月 から始める ものとする。 基準障害による障害基礎年金（はじめて2級） R07-03C R06-10D すでに障害の状態 （障害等級1級または2級に該当しない状態 ）にある者 が、新たに発生 した傷病（ 基準傷病 ）に係る障害認定日から 65歳に達する日の前日までの間 に、基準傷病による障害 （基準障 害）とすでに有していた障害 とを併合した障害の程度が、 初めて2級以上に該当 した場合には、基準傷病の初診 日の前日において保険料納付などの要件を満たしていることを条件として、「 基準障害による障害基礎年金 」 が支給される。（法30条の3第1項・2項） R06-10D 基準障害による障害基礎年金 は、当該障害基礎年金の 請求があった月の翌月 から実際に年金の支給 が始められる 。（法30条の3第3項）","s":"先にある障害（先発障害）を持つ人が、新たな傷病（基準傷病）により別の障害を負い、先発障害と基準傷病による障害を併合して初めて2級以上に該当する場合、障害基礎年金が支給されます。","e":"右目の視力低下（単独では2級未満）がある人が、新たに左目も悪くなり、両方合わせて2級に該当する場合、基準障害として障害基礎年金が支給されます。","p":"基準傷病の初診日における被保険者要件と保険料納付要件が問われる。先発障害の保険料納付要件は問わない。65歳に達する日の前日までに併合して2級以上に該当することが必要。","f":"15_国民年金法15-障害基礎年金（支給要件）","pg":31},{"r":"法30条の4","t":"20歳前傷病による障害基礎年金","b":"◯1 疾病にかかり、又は 負傷し、その 初診日 において 20歳未満であった者 が、 障害認定日 以後に 2 0歳に達した ときは 20歳に達した日 において、 障害認定日 が20歳に達した日後である ときはその 障害認定日 において、障害等級に該当する程度の 障害の状態 にある ときは、その者に 障害基礎年金 を支 給する。 20歳前の傷病による障害基礎年金 R05-01D 初診日 において 20歳未満であった者 が20歳に達したとき （障害認定日が20歳に達した日後である ときは 障害認定日 ）において、障害等級に該当する程度の 障害の状態にある ときは、その者に「 20歳前の傷病 による障害基礎年金 」が支給される。（法30条の4第1項） 「請求」は65歳以後でも行うことができます 。 支給は 「請求があった月の翌月 」から始まります 。「請求のあった 月」からでも 、「受給権が発生した月の翌月 」から始まるわけではあ りません 。","s":"初診日に20歳未満だった者が障害認定日以後に20歳に達したときは20歳到達日に、20歳前に障害認定日がある場合はその障害認定日に、1級又は2級に該当していれば障害基礎年金が支給されます。保険料納付要件は不要です。","e":"高校生の時にバイク事故で障害を負った場合、保険料を納めていなくても20歳から障害基礎年金を受給できます。ただし、所得制限があります。","p":"保険料納付要件が不要な点が最大の特徴。代わりに所得制限あり（法36条の3）。20歳到達日は「誕生日の前日」。初診日に被保険者でなくてもよい。","f":"15_国民年金法15-障害基礎年金（支給要件）","pg":37},{"r":"法31条","t":"併合認定","b":"◯1 障害基礎年金の受給権者 に対して 更に障害基礎年金を支給すべき事由が生じた ときは、 前後の障害を 併合 した障害の程度による 障害基礎年金 を支給する。 ◯2 障害基礎年金の受給権者が前項の規定により 前後の障害を併合 した障害の程度による障害基礎年金 の受給権を取得したときは、 従前の障害基礎年金の受給権 は、消滅する。 併合認定 R06-06A R03-09A 障害基礎年金の受給権者 に対して 更に障害基礎年金を支給すべき事由が生じた ときは、 前後の障害を併合 した障害の程度による 障害基礎年金が支給 される。（法31条1項） R03-09A この場合、 従前の障害基礎年金の受給権 は消滅する。（法31条2項）","s":"障害基礎年金の受給権者に対して、さらに障害基礎年金を支給すべき事由が生じたときは、前後の障害を併合した障害の程度による新たな障害基礎年金を支給し、従前の障害基礎年金の受給権は消滅します。","e":"2級の障害基礎年金を受けている人が、別の傷病で新たに障害を負い、併合すると1級に該当する場合、1級の新しい障害基礎年金に切り替わります。","p":"「前後の障害を併合」して新たな年金を支給。従前の受給権は消滅する。併合認定と基準障害（法30条の3）の違いを区別すること。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":2},{"r":"法33条","t":"障害基礎年金の額","b":"◯1 障害基礎年金の額 は、 780,900円 に改定率 を乗じて得た額（その額に 50円未満 の端数が 生じたときは、これを 切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円に切 り上げ るものとする。）とする。 ◯2 障害の程度が 障害等級 の1級 に該当する者に支給する 障害基礎年金の額 は、前項の規定にかかわら ず、同項に定める額の 100分の125 に相当する額とする。 障害基礎年金の額 障害基礎年金の額 は、障害等級に応じ、次の通りである。（法33条） 障害等級 障害基礎年金の額 1級 （780,900円 ）×（ 改定率 ）×1.25 2級 （780,900円 ）×（ 改定率 ）","s":"障害基礎年金の額は、2級が780,900円×改定率（老齢基礎年金の満額と同額）、1級はその1.25倍です。","e":"2級の障害基礎年金が年額約78万円なら、1級は約97.5万円（78万円×1.25）です。","p":"1級は「2級の1.25倍」が超頻出。2級の額は老齢基礎年金の満額と同じ。端数処理は50円単位（法27条と同じ）。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":8},{"r":"法33条の2","t":"障害基礎年金の子の加算","b":"◯1 障害基礎年金の額 は、受給権者 によって 生計を維持 しているその者の 子（18歳に達する日以後 の最初の3月31日までの間にある子 及び 20歳未満であって障害等級に該当する障害の状態にある子 に 限る。）があるときは、第33条の規定にかかわらず、同条に定める額にその子 1人につき それぞれ 74,900 円に改定率 （第27条の3及び第27条の5の規定の適用がないものとして改定した改定率とする。以下この項 において同じ。）を乗じて得た額（そのうち 2人まで については、それぞれ 224,700円に改定率 を乗じて 得た額とし、それらの額に 50円未満 の端数が生じたときは、これを 切り捨て 、50円以上100円未 満の端数が生じたときは、これを 100円に切り上げる ものとする。）を 加算した額 とする。 子の加算額 R04-10D 障害基礎年金の受給権者 によって 生計を維持しているその者の子 であって、次のいずれかに該当す る子があるときは、障害基礎年金の額にその子の数に応じた額（ 子の加算額 ）を加算した額の 障害基礎年金 が 支給される。（法33条の2第1項） 生計を維持しているその者の子 1. 18歳に達する日以後の最初の3月31日まで の間にある 子 2. 20歳未満 であって障害等級に該当する 障害の状態 にある 子","s":"障害基礎年金の受給権者に生計を維持している子がいる場合、子の加算額が加算されます。対象は18歳到達年度末までの子、又は20歳未満で障害等級1・2級の子です。","e":"2級の障害基礎年金を受けている父親に10歳と7歳の子がいる場合、2人分の子の加算（各約22万円）が加算されます。","p":"子の加算額は第1子・第2子が各224,700円×改定率、第3子以降が各74,900円×改定率。子の要件は「18歳到達年度末まで」又は「20歳未満で1・2級の障害」。生計維持要件あり。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":10},{"r":"法34条","t":"障害基礎年金の額の改定請求","b":"◯2 障害基礎年金の受給権者 は、 厚生労働大臣 に対し、 障害の程度 が増進したことによる障害基礎年金 の額の改定 を請求 することができる。 ◯3 前項の 請求は、障害基礎年金の受給権者 の障害の程度 が増進したことが 明らか である場合として厚 生労働省令で定める場合を 除き、当該障害基礎年金の 受給権を取得した日 又は第1項の規定による厚生労 働大臣の 診査を受けた日から起算して1年を経過した日後 でなければ 行うことができない 。 職権改定は 、受給権者が何歳であっても行われます 。「65歳未満 に限られる 」わけではありません 。 職権改定は 、「厚生労働大臣 」が行います 。「日本年金機構 」では ありません 。 職権改定が行われた場合 、「改定が行われた日の属する月の翌月 」 から改定されます 。「改定が行われた日の属する月 」からではありま せん。","s":"障害基礎年金の受給権者は、障害の程度が増進したときに厚生労働大臣に年金額の改定を請求できます。改定請求は、受給権取得日又は審査日から1年を経過した後でなければできません。","e":"2級の障害基礎年金を受けている人の症状が悪化して1級相当になった場合、前回の審査から1年経過後に改定請求をして、1級に変更してもらえます。","p":"改定請求は「1年経過後」が原則（ただし、省令で定める障害は1年未経過でも可）。厚生労働大臣の職権による改定もある。増進のみでなく軽減の場合の改定もある。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":17},{"r":"法35条","t":"障害基礎年金の失権","b":"障害基礎年金 の受給権 は、第31条第2項（ 併合認定 ）の規定によって 消滅するほか、受給権者が次の 各号のいずれかに該当するに至ったときは、 消滅する。 1. 死亡したとき。 2. 厚生年金保険法 第47条第2項に規定する障害等級に該当する程度の 障害の状態にない 者が、 65歳に達した とき。ただし、 65歳に達した 日において、同項に規定する障害等級に該当する程 度の障害の状態に該当しなくなった日 から起算して同項に規定する障害等級に該当する程度の 障害の状態 に該当することなく 3年を経過していない ときを 除く。 3. 厚生年金保険法第47条第2項に規定する障害等級に該当する程度の 障害の状態に該当しなくなった日 か ら起算して同項に規定する障害等級に該当する程度の 障害の状態に該当することなく 3年を経過した とき。ただし、 3年を経過した 日において、当該受給権者が 65歳未満 であるときを 除く。 失権 R07-03E 障害基礎年金の受給権 は、次のいずれかに該当するに至ったときは、 消滅する。（法35条） 失権事由 1. 受給権者が 死亡したとき 2. R07-10B R03-10D 受給権者の障害の程度が軽減し、厚生年金保険法の規定による障害等級3級にも該当 しなくなった場合であって、そのまま 障害等級3級にも該当することなく 65歳に達したとき または 3年を経 過したとき のいずれか 遅い方 が到達したとき 3. 併合認定 により、前後の障害を併合した障害の程度による障害基礎年金の受給権を取得したとき","s":"障害基礎年金の受給権は、(1)死亡、(2)厚生年金の3級にも該当しなくなり3年経過かつ65歳到達、(3)併合認定による消滅のいずれかで消滅します。","e":"障害が大幅に回復して3級にも該当しなくなった場合、3年が経過し65歳に達した時点で受給権が消滅します。ただし、3年経過しても65歳前なら受給権は存続します。","p":"「3級不該当から3年経過」かつ「65歳到達」の両方が必要。どちらか一方だけでは失権しない。65歳未満であれば3級不該当でも支給停止にとどまる。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":45},{"r":"法36条","t":"障害基礎年金と労災の調整","b":"◯1 障害基礎年金 は、その 受給権者 が当該傷病による障害について、 労働基準法 の規定による 障害補 償を受けることができるときは、 6年間 、その 支給を停止 する。 障害補償による支給停止 R06-03B 障害基礎年金 は、その受給権者が当該傷病による障害について、 労働基準法の規定による障害補償 を受けることができるときは、 6年間 、その 支給が停止 される。（法36条1項）","s":"障害基礎年金の受給権者が、同じ傷病について労働基準法の障害補償を受けられる場合、6年間その支給が停止されます。","e":"業務中の事故で障害を負い、会社から労基法に基づく障害補償を受けている間は、6年間障害基礎年金が支給停止になります。","p":"停止期間は「6年間」が頻出。労災保険法の障害補償給付との併給調整（減額調整）とは別の規定。労基法の障害補償は使用者が直接行うもの。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":29},{"r":"法36条の2","t":"20歳前傷病の障害基礎年金の支給停止","b":"◯1 第30条の4の規定による障害基礎年金（ 20歳前の傷病による障害基礎年金 ）は、 受給権者 が次の各号の いずれかに該当するとき（第2号及び第3号に該当する場合にあっては、厚生労働省令で定める場合に限 る。）は、その該当する期間、その 支給を停止 する。 1. 恩給法 に基づく 年金たる給付 、労働者災害補償保険法 の規定による 年金たる給付 その他の 年金たる 給付であって政令で定めるものを受けることができるとき。 2. 刑事施設 、労役場 その他これらに準ずる 施設に拘禁 されているとき。 3. 少年院 その他これに準ずる 施設に収容 されているとき。 4. 日本国内に住所を有しない とき。 20歳前の傷病による障害基礎年金の支給停止① 後述しますが、20歳前の傷病による障害基礎年金の場合において も「厚生年金保険の被保険者となったこと」は支給停止事由ではあり ませんが、その所得によっては支給停止されることがあります。 厚生年金保険の被保険者となったとしても 、障害基礎年金は 、支給 停止されません 。 R07-03D 20歳前の傷病による障害基礎年金 は、次のいずれかに該当するときは、その該当する期間、その 支 給が停止 される。（法36条の2第1項） 20歳前の傷病による障害基礎年金の支給停止① 1. 恩給法 に基づく 年金たる給付 、労働者災害補償保険法 の規定による 年金たる給付 その他の 年金たる給付 で あって政令で定めるものを受けることができるとき。 2. R05-05E 刑事施設 、労役場 その他これらに準ずる 施設に拘禁されている とき。 3. 少年院 その他これに準ずる 施設に収容されている とき。 4. R04-04B 日本国内に住所を有しない とき。","s":"20歳前傷病による障害基礎年金は、受給権者が刑事施設に拘禁されているとき、少年院に収容されているとき、日本国内に住所がないときなどに支給が停止されます。","e":"20歳前の障害で障害基礎年金を受けている人が犯罪を犯して刑務所に入った場合、在監中は年金が支給停止されます。","p":"通常の障害基礎年金にはない支給停止事由。「刑事施設への拘禁」「少年院への収容」「国内に住所なし」が代表的。保険料を納めていない代わりに制約がある。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":35},{"r":"法36条の3","t":"20歳前傷病の障害基礎年金の所得制限","b":"◯1 第30条の4の規定による障害基礎年金（ 20歳前の傷病による障害基礎年金 ）は、 受給権者 の前年の所 得が、その者の所得税法に規定する同一生計配偶者及び扶養親族（以下「 扶養親族等 」という。）の 有無及び数に応じて、 政令で定める額を超える ときは、その年の 10月 から 翌年の9月 まで、その 全部又は2分の1 （第33条の2第1項の規定によりその額が加算された障害基礎年金にあっては、その額か ら同項の規定により加算する額を控除した額の2分の1）に相当する部分の 支給を停止 する。 20歳前の傷病による障害基礎年金の支給停止②（所得による支給停止） R07-03A R06-02ｲ R05-10ｱ 2022改正 20歳前の傷病による障害基礎年金 は、受給権者の前年の所得 が、そ の者の扶養親族等の有無及び数に応じて、 政令で定める額を超える ときは、 その年の10月から翌年の9月ま で、その 全部または2分の1 に相当する部分の 支給が停止される 。（法36条の3第1項） 2026改正 子の加算額が加算された障害基礎年金 について2分の1の支給停止をするときは、「 障害基礎年金の 額から加算額を控除した額 」の2分の1 が支給停止 される。（法36条の3第1項かっこ書） 前年の本人所得額 支給内容 4,794,000円超 全額停止 3,761,000円超〜4,794,000円以下 2分の1の年金額停止 3,761,000円以下 全額支給","s":"20歳前傷病による障害基礎年金は、受給権者の前年の所得が一定額を超えると、年金額の2分の1又は全額が支給停止されます。","e":"20歳前の傷病で障害基礎年金を受けている人の前年所得が基準額（扶養家族なしで約370万円）を超えると半額停止、さらに上の基準（約472万円）を超えると全額停止になります。","p":"所得制限は「前年の所得」で判定。2段階（半額停止・全額停止）。通常の障害基礎年金には所得制限はない。20歳前傷病のみの特別な制限。10月から翌年9月まで適用。","f":"16_国民年金法16-障害基礎年金（併合認定、障害基礎年金の額、支給停止、失権）","pg":40},{"r":"法37条の2","t":"遺族基礎年金の遺族の範囲","b":"◯1 遺族基礎年金 を受けることができる 配偶者又は子 は、被保険者又は被保険者であった者 の配偶者 又は子 であって、 被保険者又は被保険者であった者 の死亡の当時 その者によって 生計を維持 し、 かつ、次に掲げる要件に該当したものとする。 1. 配偶者 については、 被保険者又は被保険者であった者 の死亡の当時 その者によって 生計を 維持 し、かつ、次号に掲げる要件に該当する 子と生計を同じくする こと。 2. 子については、 18歳に達する日以後の最初の3月31日までの間 にあるか又は 20歳未満 で あって障害等級に該当する 障害の状態 にあり、かつ、 現に婚姻をしていない こと。 遺族基礎年金の受給権者（遺族）","s":"遺族基礎年金を受けられるのは、死亡した被保険者等の配偶者又は子であって、死亡当時その者と生計を維持していた者です。子には年齢・障害要件があります。","e":"一家の大黒柱のAさんが亡くなった場合、Aさんと生計を同じくしていた妻と18歳未満の子が遺族基礎年金を受けられます。子のいない妻だけでは受給できません。","p":"遺族は「配偶者又は子」のみ（父母・孫・祖父母は対象外）。配偶者は「子と生計を同じくすること」が必要。子の要件は「18歳到達年度末まで」又は「20歳未満で1・2級の障害」。子のいない配偶者は受給不可。","f":"17_国民年金法17-遺族基礎年金","pg":22},{"r":"法38条","t":"遺族基礎年金の額","b":"遺族基礎年金の額 は、 780,900円 に改定率 を乗じて得た額（その額に 50円未満 の端数が生じ たときは、これを 切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円に切り上 げる ものとする。）とする。","s":"遺族基礎年金の額は、780,900円に改定率を乗じた額です。これは老齢基礎年金の満額と同じ基本額です。","e":"遺族基礎年金の基本額は老齢基礎年金の満額と同じ約78万円です。これに子の加算額が加わります。","p":"基本額は老齢基礎年金の満額と同じ「780,900円×改定率」。障害基礎年金2級の額とも同じ。","f":"17_国民年金法17-遺族基礎年金","pg":34},{"r":"法39条","t":"配偶者に支給する遺族基礎年金の額","b":"◯1 配偶者 に支給する 遺族基礎年金の額 は、第38条の規定にかかわらず、同条に定める額に 配偶者 が遺族 基礎年金の受給権を取得した当時 遺族基礎年金の遺族の範囲に該当し、かつ、その者と 生計を同じくし た子 につきそれぞれ 74,900円 に改定率 を乗じて得た額（そのうち 2人まで については、それぞれ 224,700円 に改定率 を乗じて得た額とし、それらの額に 50円未満 の端数が生じたときは、これ を切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円に切り上げる ものとす る。）を 加算した額とする。","s":"配偶者に支給する遺族基礎年金の額は、基本額に子の加算額を加えた額です。加算対象の子は、受給権取得当時に生計を維持していた子です。","e":"夫が死亡し、妻と子2人が遺族の場合、妻には基本額（約78万円）+子の加算（約22万円×2人分）=約122万円の遺族基礎年金が支給されます。","p":"子の加算額は障害基礎年金の子の加算と同額（第1子・第2子各224,700円×改定率、第3子以降74,900円×改定率）。配偶者が受給している間は子への支給は停止。","f":"17_国民年金法17-遺族基礎年金","pg":34},{"r":"法39条の2","t":"子に支給する遺族基礎年金の額","b":"◯1 子に支給する 遺族基礎年金の額 は、当該 被保険者又は被保険者であった者 の死亡について 遺族基礎年金 の受給権 を取得した 子が2人 以上あるときは、第38条の規定にかかわらず、同条に定める額にその 子の うち 1人 を除いた 子につきそれぞれ 74,900円 に改定率 を乗じて得た額（そのうち 1人 につ いては、 224,700円 に改定率 を乗じて得た額とし、それらの額に 50円未満 の端数が生じたとき は、これを 切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円に切り上げる ものとする。）を 加算した額を、その 子の数で除して 得た額とする。 遺族基礎年金の額 R02-02E 「子のある配偶者 」に対する 遺族基礎年金の額 は、次の通りである。（法38条、法39条1項） 子のある配偶者の場合 基本額 子の加算額 配偶者＋1人の子 780,900円×（改定率） 224,700円×（改定率） 配偶者＋2人の子 780,900円×（改定率） 224,700円×（改定率）×2 配偶者＋3人の子 780,900円×（改定率） 224,700円×（改定率）×2＋74,900円×（改定 率）","s":"子に支給する遺族基礎年金の額は、子が2人以上いる場合、基本額に2人目以降の子の加算額を加えた額を子の人数で割った額です。","e":"配偶者がおらず子3人が遺族の場合、基本額＋2人目・3人目の加算を合計し、3で割った額がそれぞれの子に支給されます。","p":"子が1人の場合は基本額のみ。2人以上の場合は「均等に分割」。配偶者が受給権を有する間は子への支給は停止される。","f":"17_国民年金法17-遺族基礎年金","pg":34},{"r":"法40条","t":"遺族基礎年金の失権","b":"◯1 遺族基礎年金の受給権 は、 受給権者 が次の各号のいずれかに該当するに至ったときは、 消滅する。 1. 死亡したとき。 2. 婚姻 をしたとき。 3. 養子 となったとき（ 直系血族又は直系姻族の養子となったとき を除く。）。 配偶者と子に共通する失権事由 R07-03E R05-06E 遺族基礎年金における配偶者と子に共通する失権事由 は、次の通りである。（法40条1 項）","s":"遺族基礎年金の受給権は、(1)死亡、(2)婚姻、(3)養子縁組（直系血族・直系姻族以外）、(4)離縁による親族関係終了、(5)子の年齢到達・障害回復で消滅します。","e":"遺族基礎年金を受けている妻が再婚すると受給権は消滅します。また、子が18歳到達年度末を過ぎると加算対象から外れます。","p":"「婚姻」には事実婚を含む。養子縁組は「直系血族又は直系姻族以外の者」の養子になった場合に限る。子固有の失権事由として「18歳到達年度末」「障害不該当で20歳到達」がある。","f":"17_国民年金法17-遺族基礎年金","pg":54},{"r":"法41条","t":"遺族基礎年金と労災の調整","b":"◯1 遺族基礎年金 は、当該 被保険者又は被保険者であった者の死亡 について、 労働基準法 の規定による 遺族補償 が行われるべきものであるときは、 死亡日 から 6年間 、その 支給を停止 する。 遺族補償による支給停止（すべての遺族基礎年金に共通） R06-03B 遺族基礎年金 は、当該被保険者または被保険者であった者の死亡について、 労働基準法の規定によ る遺族補償 が行われるべきものであるときは、 死亡日から6年間 、その 支給が停止 される。（法41条1項）","s":"遺族基礎年金は、同じ死亡について労働基準法の遺族補償が行われるべき場合、死亡日から6年間支給が停止されます。","e":"労災事故で亡くなった人の遺族が、使用者から労基法の遺族補償を受ける場合、遺族基礎年金は6年間停止されます。","p":"停止期間は「6年間」。障害基礎年金（法36条）と同じ期間。起算点は「死亡日から」。","f":"17_国民年金法17-遺族基礎年金","pg":43},{"r":"法41条の2","t":"配偶者の所在不明による支給停止","b":"◯1 配偶者に対する遺族基礎年金 は、その者の 所在が1年以上明らかでない ときは、 遺族基礎年金 の受 給権を有する 子の申請 によって、その 所在が明らかでなくなった時に遡って 、その 支給を停止 す る。 ◯2 配偶者 は、 いつでも 、前項の規定による 支給の停止 の解除を申請 することができる。 所在不明による支給停止 配偶者に対する遺族基礎年金 は、配偶者の 所在が1年以上明らかでない ときは、遺族基礎年金の受給権を有す る子の申請 によって、その 所在が明らかでなくなった時にさかのぼって 、その 支給が停止 される。（法41条の 2第1項） 配偶者 は、いつでも 、支給の停止の解除を申請 することができる。（法41条の2第2項）","s":"配偶者に対する遺族基礎年金は、その者の所在が1年以上明らかでないときは、子の申請により支給停止されます。停止された分は子に支給されます。","e":"母親が遺族基礎年金を受給しているが1年以上行方不明の場合、子が申請することで母親の年金を停止し、子自身が遺族基礎年金を受給できます。","p":"「1年以上所在不明」で「子の申請」が要件。所在が明らかになれば停止解除。","f":"17_国民年金法17-遺族基礎年金","pg":51},{"r":"法43条","t":"付加年金の支給要件","b":"付加年金 は、第87条の2第1項の規定による 付加保険料 に係る 保険料納付済期間 を有する者が 老齢基 礎年金の受給権を取得した ときに、その者に 支給する。 支給要件 R05-01B 付加年金 は、次の要件を満たしたときに、 老齢基礎年金 にあわせて 支給される。（法43条） 支給要件 1. 付加保険料 に係る 保険料納付済期間 を有する こと 2. 老齢基礎年金 の受給権を 取得したこと","s":"付加年金は、付加保険料を納めた期間を持つ人が老齢基礎年金の受給権を取得したときに支給されます。老齢基礎年金に上乗せして支給されます。","e":"第1号被保険者として月額400円の付加保険料を20年間納めたAさんは、65歳から老齢基礎年金に付加年金が上乗せされます。","p":"付加保険料を納付できるのは「第1号被保険者」と「任意加入被保険者」のみ。老齢基礎年金の受給権取得が要件なので、老齢基礎年金が全額支給停止されると付加年金も停止。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":2},{"r":"法44条","t":"付加年金の額","b":"付加年金の額は 、200円 に第87条の2第1項の規定による 付加保険料 に係る 保険料納付済期間 の月数を乗じて得た額とする。 付加年金の額","s":"付加年金の額は、200円に付加保険料を納めた月数を乗じた額です。","e":"付加保険料（月400円）を20年（240月）納めた場合、付加年金額は200円×240月＝48,000円（年額）です。2年間受給すれば元が取れる計算になります。","p":"「200円×納付月数」が超頻出。付加保険料は月額400円なので、2年で元が取れる。付加年金は物価スライドの対象外（定額のまま）。マクロ経済スライドの対象にもならない。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":4},{"r":"法49条","t":"寡婦年金の支給期間","b":"◯3 60歳未満の妻 に支給する 寡婦年金 は、第18条第1項の規定にかかわらず、妻が 60歳に達した日 の属する月の翌月 から、その 支給を始める 。 支給期間","s":"60歳未満の妻に支給する寡婦年金は、妻が60歳に達した日の属する月の翌月から支給が始まり、65歳に達するまで支給されます。","e":"55歳の妻が寡婦年金の受給権を取得しても、実際に支給が始まるのは60歳からです。65歳になると老齢基礎年金に切り替わるため、寡婦年金は65歳で終了します。","p":"支給期間は「60歳から65歳まで」。寡婦年金の受給要件は「夫が第1号被保険者として10年以上保険料を納付」「婚姻期間10年以上」「夫が年金を受けずに死亡」。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":19},{"r":"法50条","t":"寡婦年金の額","b":"寡婦年金の額 は、 死亡日の属する月の前月 までの 第1号被保険者 としての 被保険者期間 に係る 死 亡日の前日 における 保険料納付済期間 及び 保険料免除期間 につき、第27条（ 老齢基礎年金 の 基本年金額）の 規定の例 によって計算した額の 4分の3 に相当する額とする。 寡婦年金の額","s":"寡婦年金の額は、死亡した夫の第1号被保険者期間に基づいて計算した老齢基礎年金額の4分の3に相当する額です。","e":"夫が第1号被保険者として25年間保険料を納めていた場合、その期間で計算される老齢基礎年金相当額の75%が寡婦年金として妻に支給されます。","p":"「4分の3（75%）」が頻出。計算の基礎は「第1号被保険者としての期間」のみ（第2号・第3号の期間は含まない）。付加年金は含まない。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":20},{"r":"法51条","t":"寡婦年金の失権","b":"寡婦年金の受給権 は、受給権者 が65歳に達した とき、又は第40条第1項各号（ 遺族基礎年金の失権事 由）のいずれかに該当するに至ったときは、 消滅する。 失権 R07-03E 寡婦年金の受給権 は、受給権者が次のいずれかに該当するときに至ったときは、 消滅する。（法51 条、法40条1項） 失権 1. 65歳に達したとき 2. 死亡したとき 3. 婚姻をしたとき 4. 養子となったとき（ 直系血族または直系姻族の養子となった ときを 除く） 5. R04-07E 繰上げ支給の老齢基礎年金の受給権を取得した とき（附則9条の2第5項） 「老齢基礎年金の受給資格の有無を問わず 」65歳に達したときに 受給権は消滅します 。 寡婦年金の支給を受けているときに 「老齢基礎年金の繰上げ請求 」 をすると 、老齢基礎年金の受給権の発生とともに 、寡婦年金の受給権 は失権します 。","s":"寡婦年金の受給権は、受給権者が65歳に達したとき、又は遺族基礎年金の失権事由（死亡・婚姻・養子縁組等）に該当したときに消滅します。","e":"寡婦年金を受給中の妻が再婚すると受給権は消滅します。また、65歳になると自動的に消滅し、老齢基礎年金に切り替わります。","p":"「65歳到達」で必ず失権する点が重要。遺族基礎年金の失権事由（法40条1項各号）がそのまま準用される。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":27},{"r":"法52条","t":"寡婦年金と労災の調整","b":"寡婦年金 は、当該 夫の死亡 について 労働基準法 の規定による 遺族補償 が行われるべきものである ときは、 死亡日から6年間 、その 支給を停止 する。 支給停止 R06-03B 寡婦年金 は、当該夫の死亡について 労働基準法の規定による遺族補償 が行われるべきものであると きは、 死亡日から6年間 、その 支給を停止 される。（法52条） 死亡した夫が 「付加保険料を3年以上納付 」している場合であって も、寡婦年金の額に8,500円の加算はありません 。 障害基礎年金や遺族基礎年金の場合と同様です 。（1-8-16、1-8-1 7参照） 「6年間 」です。「5年間 」ではありません 。","s":"寡婦年金は、夫の死亡について労働基準法の遺族補償が行われるべき場合、死亡日から6年間支給が停止されます。","e":"労災事故で死亡した夫の妻が寡婦年金を受けている場合、労基法の遺族補償との調整で6年間停止されます。","p":"停止期間は「6年間」。障害基礎年金・遺族基礎年金と同じ期間。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":23},{"r":"法52条の2","t":"死亡一時金の支給要件","b":"◯1 死亡一時金 は、 死亡日の前日 において 死亡日の属する月の前月 までの 第1号被保険者 とし ての被保険者期間に係る 保険料納付済期間 の月数、 保険料4分の1免除期間の月数の4分の3 に相当す る月数、 保険料半額免除期間の月数の2分の1 に相当する月数及び 保険料4分の3免除期間の月数の4分 の1 に相当する月数を合算した月数が 36月以上 である者が 死亡した場合において、その者に 遺族があ るときに、その 遺族に支給する。ただし、 老齢基礎年金 又は 障害基礎年金 の支給を受けたことがあ る者が死亡したときは、 この限りでない 。 支給要件（死亡者）","s":"死亡一時金は、死亡日の前日において第1号被保険者としての保険料納付済期間の月数等が合計36月以上ある者が死亡した場合に、遺族に支給されます。ただし、その者が老齢基礎年金又は障害基礎年金を受けたことがある場合は支給されません。","e":"自営業のAさんが10年間保険料を納めた後に亡くなり、遺族基礎年金が支給されない場合（子のいない配偶者など）、遺族に死亡一時金が支給されます。","p":"「36月以上」の納付期間が要件。老齢基礎年金又は障害基礎年金の受給歴があると不支給。遺族基礎年金が支給される場合も不支給。第1号被保険者の独自給付。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":29},{"r":"法52条の3","t":"死亡一時金の遺族の範囲と順位","b":"◯1 死亡一時金を受けることができる遺族 は、死亡した者 の配偶者 、子、父母 、孫、 祖父母 又は 兄弟姉妹 であって、その者の 死亡の当時 その者と 生計を同じく していたものと する。ただし、第52条の2第3項の規定に該当する場合において支給する死亡一時金を受けることができる遺 族は、死亡した者の配偶者であって、その者の死亡の当時その者と生計を同じくしていたものとする。 ◯2 死亡一時金（前項ただし書に規定するものを除く。次項において同じ。）を受けるべき者の 順位は、前 項に規定する 順序による。 ◯3 死亡一時金 を受けるべき 同順位の遺族 が2人以上 あるときは、その 1人のした請求 は、 全員のた めその全額につきした ものとみなし、その 1人 に対してした支給は、 全員 に対してしたものと みな す。 遺族の範囲","s":"死亡一時金を受けられる遺族は、配偶者・子・父母・孫・祖父母・兄弟姉妹で、死亡当時その者と生計を同じくしていた者です。受給順位もこの順番です。","e":"Aさんが亡くなり、妻と母親がともに生計を同じくしていた場合、順位の高い妻が死亡一時金を受け取ります。","p":"順位は「配偶者→子→父母→孫→祖父母→兄弟姉妹」。遺族基礎年金の遺族（配偶者・子のみ）より広い範囲。「生計を同じくしていた」が要件（生計維持ではない）。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":36},{"r":"法52条の4","t":"死亡一時金の額","b":"◯1 死亡一時金の額 は、 死亡日の属する月の前月 までの 第1号被保険者 としての被保険者期間に係 る死亡日の前日 における 保険料納付済期間 の月数、 保険料4分の1免除期間の月数の4分の3 に相 当する月数、 保険料半額免除期間の月数の2分の1 に相当する月数及び 保険料4分の3免除期間の月数の 4分の1 に相当する月数を合算した月数に応じて、それぞれ下表に定める額とする。 ◯2 死亡日の属する月の前月 までの 第1号被保険者 としての被保険者期間に係る 死亡日の前日 における第87条の2第1項の規定による 付加保険料 に係る 保険料納付済期間 が3年以上 である者の遺 族に支給する 死亡一時金の額 は、前項の規定にかかわらず、同項に定める額に 8,500円 を加算した額とす る。 死亡一時金の額 R03-08D R02-02A 死亡一時金の額 は、死亡日の属する月の前月までの第1号被保険者としての保険料納付済 期間等に応じて、次表の金額が支給される。（法52条の4第1項） 合算した月数 死亡一時金の額 36か月以上180か月未満 120,000円 180か月以上240か月未満 145,000円 240か月以上300か月未満 170,000円 300か月以上360か月未満 220,000円 360か月以上420か月未満 270,000円 420か月以上 320,000円","s":"死亡一時金の額は、保険料納付済期間の月数等に応じて12万円から32万円の範囲で定められています。付加保険料を36月以上納めた場合は8,500円が加算されます。","e":"35年間（420月）保険料を納めた人が亡くなった場合、死亡一時金は32万円＋付加保険料の加算（該当する場合8,500円）が遺族に支給されます。","p":"金額は納付月数に応じて段階的（36月以上180月未満=12万円、…、360月以上=32万円）。付加保険料の加算は「36月以上」納付した場合に「8,500円」。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":41},{"r":"法52条の6","t":"死亡一時金と寡婦年金の選択","b":"第52条の3の規定により 死亡一時金 の支給を受ける者が、第52条の2第1項に規定する者の死亡により 寡 婦年金 を受けることができるときは、その者の 選択により、 死亡一時金 と寡婦年金 とのうち、 その 一を支給し、他は支給しない 。 支給の調整 死亡一時金の支給を受けることができる者 が、同一人の死亡により 寡婦年金 を受けとることができるとき は、死亡一時金か寡婦年金の どちらか一つをその者の 選択により支給を受ける ことができる。（法52条の6）","s":"死亡一時金と寡婦年金の両方を受けられる場合は、受給権者がどちらか一方を選択しなければなりません。両方を同時に受けることはできません。","e":"夫が亡くなり、妻が死亡一時金と寡婦年金の両方の受給要件を満たす場合、どちらかを選ぶ必
