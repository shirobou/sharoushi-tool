。 2. 対象期間内 にした 出生後休業の日数 が通算して14日以上 である とき。 3. 当該 被保険者の配偶者 が当該 出生後休業に係る子 について 出生後休業をした とき（当該配偶者が当 該子の 出生の日 から起算して 8週間を経過する日の翌日 までの期間内にした 出生後休業の日数 が通 算して14日以上 である ときに 限る。）。","s":"被保険者が対象期間内にその子を養育するための休業を取得した場合に支給される給付金です。育児休業給付金と合わせて賃金の実質100%（手取りベース）を保障することを目的としています。","e":"育休を取得したEさんには育児休業給付金67%に加えて、出生後休業支援給付金13%が上乗せされ、合計で賃金の80%（社会保険料免除で手取り実質100%）になります。","p":"令和7年4月施行の新制度。支給率は「13%」（67%＋13%＝80%）。対象期間は子の出生後一定期間。両親ともに14日以上の育休取得が支給要件。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":60},{"r":"法61条の12","t":"育児時短就業給付金","b":"◯1 育児時短就業給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。） が、その 2歳 に満たない子 を養育するための所定労働時間を短縮することによる就業 （以下この節におい て「育児時短就業 」という。）をした場合において、当該 育児時短就業 （当該子について2回以上の育児時短 就業をした場合にあっては、 初回の育児時短就業 とする。） を開始した日前 2年間 にみなし被保険者期 間が通算して12箇月以上 であったとき 、又は当該 被保険者 が育児時短就業に係る子について、 育児休 業給付金の支給を受けていた 場合であって当該 育児休業給付金に係る育児休業終了後引き続き育児時短就業を したとき、若しくは 出生時育児休業給付金の支給を受けていた場合であって当該出生時育児休業給付金に係る 出生時育児休業終了後引き続き育児時短就業をしたとき に、 支給対象月 について支給する。 支給対象者 2025改正 短期雇用特例被保険者 及び日雇労働被保険者 には、 育児時短就業給付金 は支給されない 。（法61条 の12第1項かっこ書） 支給要件 2025改正 育児時短就業給付金 は、次の要件に該当するときに支給される。（法61条の12第1項） 支給要件 次のいずれかに該当するとき 当該 育児時短就業を開始した日前 2年間 に、原則として、 みなし被保険者期間 が通算して12か月以上 であ ったとき 育児休業給付金の支給を受けていた 場合、当該育児休業給付金に係る育児休業終了後 引き続き 育児時短就 業をした とき 出生時育児休業給付金の支給を受けていた 場合、当該出生時育児休業給付金に係る出生時育児休業終了後 引き続き育児時短就業をした とき。 2歳に満たない子を養育するための所定労働時間を短縮する ことによる 育児時短就業 をした被保険者であるこ と。","s":"被保険者が2歳未満の子を養育するために所定労働時間を短縮して就業した場合に支給されます。賃金の10%が支給されます。","e":"1歳の子を育てるために時短勤務（6時間勤務）をしているFさんには、時短勤務中の賃金の10%が育児時短就業給付金として支給されます。","p":"令和7年4月施行の新制度。対象は「2歳未満」の子を養育。支給率は「10%」。時短勤務で賃金が下がった分を一部補填する制度。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":72},{"r":"法11条","t":"失業等給付の譲渡等の禁止","b":"失業等給付を受ける権利 は、 譲り渡し 、担保に供し 、又は 差し押える ことができない。 譲渡などの禁止 失業等給付を受ける権利 は、譲り渡し 、担保に供し 、または 差し押える ことが できない 。（法11条） 助成金などの場合 雇用保険二事業 による助成金など は、譲り渡し 、担保に供し 、または差し押さえる ことが できる 。（法11 条） 2025改正 育児休業等給付 は、失業等給付ではありません が、これ を受ける権利を、譲り渡し、担保に供し、または差し押えることはで きません。（法61条の6第5項） 二事業として支給される助成金等は 、「失業等給付 」ではないた め、法11条の適用はありません。","s":"失業等給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができません。","e":"「来月の基本手当をもらう権利を3万円で売るよ」とか「基本手当を担保にお金を借りる」ということはできません。借金の取立てで差し押さえることもできません。","p":"3つの禁止：①譲渡、②担保、③差押え。「失業等給付」だけでなく「育児休業等給付」にも準用される。受給後の金銭は保護の対象外。","f":"19_雇用保険法19-給付通則、給付制限","pg":2},{"r":"法12条","t":"公課の禁止","b":"租税 その他の 公課 は、 失業等給付 として支給を受けた 金銭 を標準として 課することがで きない 。 公課の禁止 租税その他の公課 は、失業等給付 として支給を受けた 金銭を標準として課することができない 。（法12条） 助成金などの場合 雇用保険二事業 による助成金など は、失業等給付ではないため 、法12条は適用されず 、課税対象となる 。 （法12条） 受給資格者 が失業の認定に係る期間中に 自己の労働によって収入を 得た場合であっても 、基本手当として支給された金銭を標準として租 税を課することはできません 。 2025改正 育児休業等給付として支給を受けたものについても同様 です。（法61条の6第2項）","s":"失業等給付として支給を受けた金銭を標準として、租税その他の公課を課することはできません。つまり、失業等給付には税金がかかりません。","e":"基本手当を年間100万円受け取っても、所得税や住民税はかかりません。確定申告で申告する必要もありません。","p":"「租税その他の公課」が非課税。所得税・住民税がかからない。ただし、受給後に預金した場合の利子には課税される。","f":"19_雇用保険法19-給付通則、給付制限","pg":3},{"r":"法10条の3","t":"未支給の失業等給付","b":"◯1 失業等給付の支給を受けることができる者が死亡した 場合において、その者に支給されるべき 失業等 給付 でまだ 支給されていないもの があるときは、その者の 配偶者 （婚姻の届出をしていないが、事実 上婚姻関係と同様の事情にあった者を含む。）、 子、父母 、孫、祖父母 又は 兄弟姉妹 であって、その者の死亡の当時その者と 生計を同じくしていたもの は、 自己の名 で、その 未支給 の失業等給付 の支給を請求することができる 。 ◯2 前項の規定による 未支給の失業等給付 の支給を受けるべき者の 順位は、同項に規定する順序 によ る。 ◯3 第1項の規定による 未支給の失業等給付 の支給を受けるべき 同順位者 が2人以上ある ときは、 その1人のした請求 は、 全員 のため その 全額 につきしたものとみな し、その 1人に対してした支給 は、 全員 に対してしたものとみなす 。 未支給の失業等給付","s":"失業等給付の受給権者が死亡した場合、まだ支給されていない給付は、一定の遺族が請求して受け取ることができます。遺族の範囲は配偶者、子、父母、孫、祖父母、兄弟姉妹で、この順序が優先順位です。","e":"基本手当の受給中にGさんが亡くなった場合、まだ受け取っていなかった分は、Gさんの配偶者→子→父母の順で請求できます。","p":"請求権者の順位：配偶者→子→父母→孫→祖父母→兄弟姉妹。「生計を同じくしていた」者に限る。請求期限は死亡日の翌日から6か月。労基法の遺族補償と順位が異なる。","f":"19_雇用保険法19-給付通則、給付制限","pg":5},{"r":"法31条","t":"死亡した受給資格者の失業認定","b":"◯1 第10条の3第1項（未支給の失業等給付）の規定により、 受給資格者が死亡 したため 失業の認定 を 受けることができなかった期間 に係る 基本手当 の支給を請求する者 は、当該 受給資格者 について 失業 の認定 を受けなければならない。 未支給の基本手当の請求手続","s":"受給資格者が死亡したために失業の認定を受けられなかった期間の基本手当は、未支給の失業等給付として遺族が請求できます。その際の失業の認定は死亡者について行われます。","e":"認定日の前日にGさんが亡くなった場合、認定を受けていない期間の基本手当は、遺族がハローワークに請求して受け取れます。","p":"死亡した受給資格者に対して「失業の認定」が行われる（遺族に対してではない）。遺族は「未支給給付請求者」として手続きする。","f":"19_雇用保険法19-給付通則、給付制限","pg":9},{"r":"法10条の4","t":"不正受給の返還命令・納付命令","b":"◯1 偽り その他 不正の行為 により失業等給付の支給を受けた者がある 場合には、 政府は、その者に 対して、支給した 失業等給付 の全部又は一部 を返還すること を命ずる ことができ、また、厚生労働 大臣の定める基準により、当該 偽り その他 不正の行為 により 支給を受けた失業等給付 の額の2倍に 相当する額以下の金額 を納付することを命ずる ことができる。 ◯2 前項の場合において、 事業主 、職業紹介事業者等 、募集情報等提供事業 を行う者 又は 指定教育訓練実施者 が偽り の届出、報告又は証明をしたためその 失業等給付が支給された ものであ るときは、 政府は、その 事業主 、職業紹介事業者等 、募集情報等提供事業 を行う者 又は 指定 教育訓練実施者 に対し、その 失業等給付の支給を受けた者 と連帯 して、前項の規定による失業等給付 の返還又は納付を命ぜられた金額の 納付をすることを 命ずる ことができる。 不正利得の返還命令など","s":"偽りその他不正の行為により失業等給付を受けた者に対し、政府は支給した給付の全部又は一部の返還を命じることができます。さらに、不正に受給した額の最大2倍の額の納付を命じることもできます（いわゆる3倍返し）。","e":"アルバイトで収入を得ているのに申告せず基本手当を不正受給した場合、受け取った金額の返還＋その2倍の罰金（合計3倍）を命じられることがあります。","p":"返還命令（受給額）＋納付命令（受給額の2倍以下）＝最大3倍。「3倍返し」と呼ばれる。事業主が虚偽の届出等で不正受給に関与した場合、連帯して返還・納付を命じられる。","f":"19_雇用保険法19-給付通則、給付制限","pg":11},{"r":"法34条","t":"求職者給付・就職促進給付の不正受給による給付制限","b":"◯1 偽り その他 不正の行為 により 求職者給付 又は就職促進給付 の支給を 受け、又は 受けよう とした 者には、これらの給付の支給を 受け、又は 受けようとした 日以後、 基本手当 を支給しない 。ただし、 や むを得ない理由がある 場合には、 基本手当 の全部又は一部 を支給する ことができる。 基本手当などの給付制限","s":"偽りその他不正の行為により求職者給付又は就職促進給付を受けた者は、不正のあった日以後、これらの給付が支給されなくなります。やむを得ない理由がある場合は、全部又は一部の給付制限にとどまることもあります。","e":"嘘の求職活動実績を申告して基本手当を不正受給した場合、その後の基本手当は一切支給されなくなります。","p":"給付制限の範囲は「求職者給付」と「就職促進給付」。不正のあった日「以後」の給付が制限される。「やむを得ない理由」がある場合の緩和措置がある。","f":"19_雇用保険法19-給付通則、給付制限","pg":18},{"r":"法52条","t":"日雇労働求職者給付金の不正受給による給付制限","b":"◯3 日雇労働求職者給付金 の支給を受けることができる者が、 偽り その他 不正の行為 により 求職 者給付 又は 就職促進給付 の支給を 受け、又は 受けようとした ときは、 その支給を受け 、又は受けよう とした 月及びその月の翌月から 3箇月間 は、 日雇労働求職者給付金 を支給しない 。ただし、 や むを得ない理由がある 場合には、 日雇労働求職者給付金 の全部又は一部 を支給する ことができる。 日雇労働求職者給付金の給付制限 日雇労働求職者給付金 の支給を受けることができる者が、 偽りその他不正の行為 により 求職者給付 または 就 職促進給付 の支給を受け、または受けようとしたときは、その支給を 受け、または 受けようとした 月及びその 月の翌月から3か月間 は、日雇労働求職者給付金 は支給されない 。ただし、 やむを得ない理由がある 場合には、 日雇労働求職者給付金の 全部または一部 が支給される ことがある。（法52条3項）","s":"日雇労働求職者給付金の受給者が不正の行為により求職者給付又は就職促進給付を受けた場合、その後の日雇労働求職者給付金の支給が制限されます。","e":"日雇いのHさんが失業していないのに給付金を不正に受け取った場合、それ以降の給付金がもらえなくなります。","p":"日雇労働者に特有の給付制限規定。不正受給に対する制裁は一般の受給資格者と同様の仕組み。","f":"19_雇用保険法19-給付通則、給付制限","pg":21},{"r":"法60条","t":"就職促進給付の不正受給による給付制限","b":"◯1 偽り その他 不正の行為 により 求職者給付 又は就職促進給付 の支給を 受け、又は 受けようとした 者には、これらの給付の支給を 受け、又は 受けようとした 日以後、 就職促進給付 を支給しない 。ただ し、やむを得ない理由がある 場合には、 就職促進給付 の全部又は一部 を支給する ことができる。 就職促進給付の給付制限 日雇労働求職者給付金 の場合には 、「不正のあった月 ＋3か月 （よ うするに約4か月 ）」が不支給 となります 。 例えば 、4月10日に不正の行為があったときは 、7月31日まで給付 制限を受けることになります 。 月の翌月から 「3か月 」間です。「1か月 」や「6か月 」ではありま せん。 その支給を受け 、または受けようとした 「月」及びその 「月の翌月 から3か月間 」です。「支給を受け 、または受けようとした 日から起 算して3か月間 ではありません 。","s":"偽りその他不正の行為により求職者給付又は就職促進給付を受けた者は、不正のあった日以後、就職促進給付も支給されなくなります。","e":"再就職手当を不正に受給した場合、その後の就職促進給付（移転費や求職活動支援費など）も支給されなくなります。","p":"法34条と対になる規定。法34条は求職者給付側の給付制限、法60条は就職促進給付側の給付制限。","f":"19_雇用保険法19-給付通則、給付制限","pg":22},{"r":"法60条の5","t":"教育訓練給付の不正受給による給付制限","b":"◯1 偽り その他 不正の行為 により 教育訓練給付 の支給を 受け、又は 受けようとした 者には、当該給 付の支給を 受け、又は 受けようとした 日以後、 教育訓練給付 を支給しない 。ただし、 やむを得ない理由 がある 場合には、 教育訓練給付 の全部又は一部 を支給する ことができる。 教育訓練給付の給付制限 2026改正 偽りその他不正の行為 により 教育訓練給付 の支給を 受け、または 受けようとした 者には、当該給付 の支給を 受け、または 受けようとした 日以後、 教育訓練給付 は支給されない 。ただし、 やむを得ない理由があ る場合には、教育訓練給付の 全部または一部 を支給される ことがある。（法60条の5第1項） R03-06C 2026改正 偽りその他不正の行為 により教育訓練給付の支給を受けることができない者とされたも のが、その後 新たに教育訓練給付の支給を受けることができる者となった 場合には、 教育訓練給付が支給され る。（法60条の5第2項）","s":"偽りその他不正の行為により教育訓練給付を受けた者は、不正のあった日以後、教育訓練給付が支給されなくなります。","e":"実際には講座を受講していないのに修了証を偽造して教育訓練給付金を受け取った場合、以後の教育訓練給付は一切受けられなくなります。","p":"教育訓練給付に特有の給付制限規定。教育訓練施設が虚偽の証明をした場合、連帯して返還・納付を命じられる。","f":"19_雇用保険法19-給付通則、給付制限","pg":24},{"r":"法61条の3","t":"雇用継続給付の不正受給による給付制限","b":"偽り その他 不正の行為 により 次の各号に掲げる失業等給付 の支給を 受け、又は 受けようとした 者 には、当該給付の支給を 受け、又は 受けようとした 日以後、当該各号に定める 高年齢雇用継続給付 を支 給しない 。ただし、 やむを得ない理由がある 場合には、当該 高年齢雇用継続給付 の全部又は一部 を支給 することができる。 1. 高年齢雇用継続基本給付金 …高年齢雇用継続基本給付金 2. 高年齢再就職給付金又は当該給付金に係る受給資格に基づく求職者給付若しくは就職促進給付 …高年 齢再就職給付金 高年齢雇用継続給付の給付制限 R02-05E 偽りその他不正の行為 により 高年齢雇用継続基本給付金 の支給を 受け、または 受けようとした 者に は、その支給を 受け、または 受けようとした 日以後、 高年齢雇用継続基本給付金 は支給されない 。（法61条の 3第1号） 高年齢雇用継続基本給付金の不正受給があった場合には 、その後当 該高年齢雇用継続基本給付金は支給されなくなりますが 、その後離職 した場合に受けることができる 「基本手当 」については制限されるこ とはありません 。 高年齢雇用継続基本給付金を不正受給しても 、「基本手当が支給さ れなくなる 」わけではありません 。","s":"偽りその他不正の行為により高年齢雇用継続給付や介護休業給付金を受けた者は、不正のあった日以後、当該給付が支給されなくなります。","e":"実際には賃金が下がっていないのに嘘の書類で高年齢雇用継続基本給付金を受けた場合、以後の給付が停止されます。","p":"雇用継続給付（高年齢雇用継続給付・介護休業給付金）に対する給付制限規定。各給付類型ごとに不正受給の制裁規定が設けられている。","f":"19_雇用保険法19-給付通則、給付制限","pg":25},{"r":"法61条の5","t":"介護休業給付金の不正受給による給付制限","b":"◯1 偽り その他 不正の行為 により 介護休業給付金 の支給を 受け、又は 受けようとした 者には、当該 給付金の支給を 受け、又は 受けようとした 日以後、 介護休業給付金 を支給しない 。ただし、 やむを得な い理由がある 場合には、介護休業給付金の 全部又は一部 を支給する ことができる。 介護休業給付の給付制限 偽りその他不正の行為 により 介護休業給付金 の支給を 受け、または 受けようとした 者には、当該給付金の支 給を受け、または 受けようとした 日以後、 介護休業給付金は支給されない 。ただし、 やむを得ない理由がある 場合には、介護休業給付金の 全部または一部 が支給される ことがある。（法61条の5第1項） 偽りその他不正の行為 により介護休業給付金の支給を受けることができない者とされたものが、その後、 新 たに介護休業を開始し 、介護休業給付金の支給を受けることができる者となった 場合には、 介護休業給付金が 支給される 。（法61条の5第2項）","s":"偽りその他不正の行為により介護休業給付金を受けた者は、不正のあった日以後、介護休業給付金が支給されなくなります。","e":"実際には介護休業を取得していないのに、虚偽の申請で介護休業給付金を受け取った場合、以後の給付が停止されます。","p":"介護休業給付金に特有の不正受給制裁規定。事業主が虚偽の届出で関与した場合は連帯して返還・納付義務を負う。","f":"19_雇用保険法19-給付通則、給付制限","pg":28},{"r":"法61条の9","t":"育児休業給付の不正受給による給付制限","b":"◯1 偽り その他 不正の行為 により 育児休業給付 の支給を 受け、又は 受けようとした 者には、当該給 付の支給を 受け、又は 受けようとした 日以後、 育児休業給付 を支給しない 。ただし、 やむを得ない理由 がある 場合には、 育児休業給付 の全部又は一部 を支給する ことができる。 育児休業給付の給付制限 2023改正 偽りその他不正の行為 により 育児休業給付 の支給を 受け、または 受けようとした 者には、当該給付 の支給を 受け、または 受けようとした 日以後、 育児休業給付 は支給されない 。ただし、 やむを得ない理由があ る場合には、育児休業給付の 全部または一部 が支給される ことがある。（法61条の9第1項）","s":"偽りその他不正の行為により育児休業給付を受けた者は、不正のあった日以後、育児休業給付が支給されなくなります。","e":"実際には復職しているのに育児休業中と偽って育児休業給付金を受け取った場合、以後の育児休業給付は一切受けられなくなります。","p":"育児休業給付に特有の不正受給制裁規定。育児休業等給付は失業等給付とは別体系だが、不正受給に対する制裁の仕組みは同様。","f":"19_雇用保険法19-給付通則、給付制限","pg":29},{"r":"法33条","t":"給付制限（自己都合退職・懲戒解雇）","b":"◯1 被保険者 が自己の責めに帰すべき重大な理由 によって 解雇され、又は 正当な理由がなく自己の都 合によって 退職した場合には、第21条の規定による 待期期間の満了 後1箇月以上3箇月以内 の間で 公共職業安定所長 の定める期間は、 基本手当を支給しない 。ただし、 次に掲げる受給資格者 （第1号に掲げる 者にあっては公共職業安定所長の指示した 公共職業訓練等を受ける期間 及び当該 公共職業訓練等を受け終わっ た日後の期間 に限り、第3号に掲げる者にあっては第2号に規定する 訓練を受ける期間 及び当該 訓練を受け終 わった日後の期間 に限る。）については、 この限りでない 。 1. 公共職業安定所長 の指示 した 公共職業訓練等 を受ける受給資格者 （次号に該当する者を除く。） 2. 第60条の2第1項に規定する 教育訓練 その他の厚生労働省令で定める訓練を 基準日前 1年以内 に受けたことがある受給資格者 （正当な理由がなく自己の都合によって退職した者に限る。次号において 同じ。） 3. 前号に規定する 訓練を 基準日以後に受ける受給資格者 （同号に該当する者を除く。） 離職理由による給付制限 2025改正 被保険者 が自己の責めに帰すべき重大な理由によって解雇 され、または 正当な理由がなく自己の都 合によって退職 した場合には、 待期期間の満了後 1か月以上3か月以内の間 で公共職業安定所長の定める期間 は、基本手当 （技能習得手当 、寄宿手当 、傷病手当 、高年齢求職者給付金 、特例一時金 （一部を除く ）にも準 用）は支給されない 。ただし、次に掲げる受給資格者（ 1.にあっては公共職業安定所長の指示した 公共職業訓 練等を受ける期間 及び当該 公共職業訓練等を受け終わった日後の期間 に限り、3.に掲げる者にあっては 2.に規 定する 訓練を受ける期間 及び当該 訓練を受け終わった日後の期間 に限る）については、 この限りでない 。（法3 3条1項、法36条3項、法37条5項、法37条の4第6項、法40条4項、法41条1項かっこ書）","s":"自己の責めに帰すべき重大な理由で解雇された者、又は正当な理由なく自己都合で退職した者は、待期期間7日に加えて1か月以上3か月以内の間、基本手当が支給されません。","e":"「なんとなく辞めたい」で退職した場合、ハローワークに行ってから7日＋最大3か月間は基本手当がもらえません。ただし、ハローワークの紹介で就職した場合は1か月に短縮されます。","p":"給付制限期間は「1か月以上3か月以内」（公共職業安定所長が決定）。5年間に2回以下の自己都合退職は2か月、3回以上は3か月が目安。正当な理由のある自己都合退職は給付制限なし。","f":"19_雇用保険法19-給付通則、給付制限","pg":40},{"r":"法65条","t":"二事業の施設の利用","b":"第62条（ 雇用安定事業 ）及び第63条（ 就職支援法事業以外の能力開発事業 ）の規定による 事業又は当該 事 業に係る 施設は、被保険者等の 利用に支障がなく 、かつ、その 利益を害しない 限り、 被保険者等 以外の者 に利用させることができる 。 事業などの利用","s":"雇用安定事業・能力開発事業の施設は、被保険者等の利用に支障がなく、かつ利用させることが適当と認められるときは、被保険者等以外の者にも利用させることができます。","e":"雇用保険の職業訓練施設は、原則として被保険者が利用しますが、空きがあれば被保険者以外の求職者にも利用を認めることができます。","p":"被保険者等以外の利用は「支障がない」＋「適当と認められる」の2要件。無条件に誰でも利用できるわけではない。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":3},{"r":"法62条","t":"雇用安定事業","b":"◯1 政府は、被保険者等 に関し、 失業の予防 、雇用状態の是正 、雇用機会の増大 その他 雇 用の安定 を図るため、 雇用安定事業 を行うことができる。 ◯3 政府は、独立行政法人 高齢・障害・求職者雇用支援機構法 及びこれに基づく命令で定めるところに より、第1項に掲げる 雇用安定事業の一部 を独立行政法人 高齢・障害・求職者雇用支援機構 に行わせる も のとする。 雇用安定事業","s":"政府は、被保険者等に関し、失業の予防、雇用状態の是正、雇用機会の増大その他雇用の安定を図るため、雇用安定事業を行うことができます。具体的には雇用調整助成金やキャリアアップ助成金などがあります。","e":"景気が悪くなって従業員を一時的に休業させる会社に対し、休業手当の一部を助成する雇用調整助成金は、雇用安定事業の代表例です。","p":"「行うことができる」（任意的事業）。事業の費用は事業主負担の保険料から支出される。雇用保険二事業の一つ。労働者負担の保険料は充てられない。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":4},{"r":"法63条","t":"能力開発事業","b":"◯1 政府は、被保険者等 に関し、 職業生活の全期間 を通じて、これらの者の 能力を開発 し、及び 向上 させることを 促進する ため、 能力開発事業 を行う ことができる 。 能力開発事業 政府は、被保険者等 に関し、 職業生活の全期間 を通じて、これらの者の 能力を開発 し、及び 向上させること を促進するため、 能力開発事業 を行うことができる。（法63条1項） 能力開発事業の内容 能力開発事業の事業内容 は、次の通りである。（法63条1項） 能力開発事業 事業内容 1. 事業主等の行う職業訓練 に対する助成及び援助（1号） 職業能力開発促進法に規定する事業主等及び職業訓練の推進のための活動 を行う者に対して、 認定職業訓練その他当該事業主等の行う職業訓練を振興 するために必要な助成及び援助を行うこと 並びに当該職業訓練を振興するた めに必要な助成及び援助を行う都道府県に対して、これらに要する経費の全 部または一部の補助を行うこと。 【主な内容】 広域団体認定訓練助成金 （則121条、則122条） 認定訓練助成事業費補助金 （則121条、則123条） 人材開発支援助成金 （則124条、則125条） 2. 公共職業能力開発施設等 の設置 ・運営（2号） 公共職業能力開発施設または職業能力開発総合大学校を設置し 、または運 営すること 、職業能力開発促進法に規定する職業訓練を行うこと及び公共職 業能力開発施設を設置し、または運営する都道府県に対して、これらに要す る経費の全部または一部の補助を行うこと。 【主な内容】 公共職業能力開発施設 及び職業能力開発総合大学校 の設置及び運営 （則126条、則127条、則128条） 3. 職業講習等の実施（3号） 求職者及び退職を予定する者に対して、再就職を容易にするために必要な 知識及び技能を習得させるための 職業講習 並びに作業環境に適応させるため の訓練を実施 すること。 【主な内容】 職場適応訓練 及び介護労働講習 （則129条、則130条、則131条） 4. 有給教育訓練休暇を与え る事業主に対する助成及び援 助（4号） 職業能力開発促進法に規定する 有給教育訓練休暇を与える事業主に対し て、必要な助成及び援助 を行う こと。 【主な内容 】 人材開発支援助成金 （則124条、則125条） 能力開発事業 事業内容 5. 職業訓練等を受ける労働 者に対する援助及び職業訓練 を受けさせる事業主に対する 助成（5号） 職業訓練または職業講習を受ける労働者に対して、当該 職業訓練または職 業講習を受けることを容易にし 、または促進するために必要な交付金を支給 すること及びその雇用する労働者に職業能力開発促進法に規定する計画に基 づく職業訓練、認定職業訓練その他の職業訓練を受けさせる事業に対して、 必要な助成を行うこと。 【主な内容】 人材開発支援助成金 （則124条、則125条） 6. キャリアコンサルティン グの機会を確保する事業主に 対する援助及び労働者に対す るキャリアコンサルティング の機会の確保（6号） 職業能力開発促進法の規定により キャリアコンサルティング の機会を確保 する事業主に対して必要な援助を行う こと及び労働者に対して キャリアコン サルティングの機会の確保を行う こと。 7. 技能検定の実施に係る助 成（7号） 技能検定の実施に要する経費を負担する こと、技能検定を行う法人その他 の団体に対して、技能検定を促進するために必要な助成を行うこと及び技能 検定を促進するために必要な助成を行う都道府県に対して、これに要する経 費の全部または一部の補助を行うこと。 【主な内容】 中央職業能力開発協会費補助金 及び都道府県職業能力開発協会費補助 金（則134条、則135条、則136条） 指定試験機関費補助金 （則137条、則137条の2） 8. 同意地域高年齢者就業機 会確保計画に対する事業（8 号） 同意地域高年齢者就業機会確保計画に係る高年齢者等雇用安定法に規定す る事業のうち労働者の能力の開発及び向上に係るものを行う こと。 9. その他の能力開発事業（9 号） 労働者の能力の開発及び向上のために必要な事業であって、厚生労働省令 で定めるものを行うこと。 【主な内容】 人材開発支援助成金 （則124条、則125条）","s":"政府は、被保険者等に関し、職業生活の全期間を通じて能力を開発・向上させるため、能力開発事業を行うことができます。","e":"公共職業訓練の実施や、事業主が従業員に教育訓練を受けさせる際の助成金（人材開発支援助成金）などが能力開発事業です。","p":"「職業生活の全期間」がキーワード。雇用安定事業と合わせて「雇用保険二事業」。費用は事業主負担の保険料から。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":26},{"r":"法64条","t":"求職者支援法に基づく能力開発事業","b":"政府は、 被保険者であった者 及び 被保険者になろうとする者 の就職に必要な 能力を開発 し、 及び 向上 させるため、 能力開発事業 として、求職者支援法に規定する 認定職業訓練 を行う者 に対し て、助成を行う こと及び 特定求職者 に対して、 職業訓練受講給付金 を支給する ことができる。 職業訓練受講給付金","s":"政府は、被保険者であった者や被保険者になろうとする者の就職に必要な能力を開発・向上させるため、能力開発事業として求職者支援法に基づく職業訓練の実施等を行います。","e":"雇用保険に入っていない求職者（非正規で保険未加入だった人など）が職業訓練を受けて就職できるよう支援する「求職者支援制度」は、この規定に基づいています。","p":"対象は「被保険者であった者」＋「被保険者になろうとする者」。求職者支援法との連携規定。第2のセーフティネットとしての位置づけ。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":33},{"r":"法66条","t":"国庫負担","b":"◯1 国庫は、次に掲げる区分によって、 求職者給付 （高年齢求職者給付金 を除く。第1号において同 じ。）、 教育訓練給付 （教育訓練休暇給付金 に限る。第3号において同じ。）及び 雇用継続給付 （介護 休業給付金 に限る。第4号において同じ。）、 育児休業給付 並びに第64条に規定する 職業訓練受講 給付金 の支給に要する 費用の一部を負担 する。 1. 日雇労働求職者給付金以外の求職者給付 については、次の イ.又はロ.に掲げる場合の区分に応じ、当該 イ.又はロ.に定める割合 イ. 毎会計年度 の前々会計年度 における 労働保険特別会計 の雇用勘定の財政状況 及び 求職者 給付の支給を受けた受給資格者の数 の状況が、当該会計年度における 求職者給付 の支給に支障が生じる おそれがある ものとして政令で定める基準に該当する場合…当該日雇労働求職者給付金以外の求職者給付 に要する費用の 4分の1 ロ. イ.に掲げる場合以外の場合 …当該日雇労働求職者給付金以外の求職者給付に要する費用の 40分の 1 2. 日雇労働求職者給付金 については､次の イ.又はロ.に掲げる場合の区分に応じ､当該 イ.又はロ.に定める 割合 イ. 前号 イ.に掲げる場合…当該日雇労働求職者給付金に要する費用の 3分の1 ロ. 前号 ロ.に掲げる場合…当該日雇労働求職者給付金に要する費用の 30分の1 3. 教育訓練給付 については､次の イ.又はロ.に掲げる場合の区分に応じ､当該 イ.又はロ.に定める割合 イ. 第1号 イ.に掲げる場合…当該教育訓練給付に要する費用の 4分の1 ロ. 第1号 ロ.に掲げる場合…当該教育訓練給付に要する費用の 40分の1 4. 雇用継続給付 については､当該雇用継続給付に要する費用の 8分の1 5. 育児休業給付 については､当該育児休業給付に要する費用の 8分の1 6. 第64条に規定する 職業訓練受講給付金 の支給については､当該職業訓練受講給付金に要する費用の 2 分の1 給付費に対する国庫負担","s":"国庫は、求職者給付（高年齢求職者給付金を除く）、教育訓練休暇給付金、育児休業等給付等について、それぞれの区分に応じて費用の一部を負担します。","e":"基本手当の財源は保険料だけでなく、国の税金（国庫）からも一部負担されています。失業は社会全体の問題だからです。","p":"高年齢求職者給付金は国庫負担なし。日雇労働求職者給付金は1/3の国庫負担。本来の負担率と暫定措置（本来の1/4等）の違いが出題される。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":36},{"r":"法67条の2","t":"国庫の負担の特例","b":"国庫は、毎会計年度 において、 労働保険特別会計 の雇用勘定の財政状況 を踏まえ、 必要がある 場合 （徴収法第12条第4項第1号に規定する 失業等給付費等充当徴収保険率 が1,000分の8以上 である場合そ の他の政令で定める場合に 限る。）には、当該会計年度における 失業等給付 及び第64条に規定する 職 業訓練受講給付金 の支給に要する 費用の一部に充てる ため、 予算で定める ところにより、第66条第1項、第 2項及び第4項並びに前条の規定により 負担する額を超えて 、その 費用の一部を負担する ことができる。 国庫負担の特例 2025改正 2022改正 国庫は、毎会計年度 において、 労働保険特別会計の雇用勘定の 財政状況 を踏まえ、必要 がある場合（ 失業等給付費等充当徴収保険率 が1,000分の8以上 である場合その他の政令で定める場合に 限る） には、当該会計年度における 失業等給付 及び職業訓練受講給付金 の支給に要する費用の一部に充てるため、予","s":"国庫は、毎会計年度において労働保険特別会計の雇用勘定の財政状況を踏まえ、必要がある場合には負担金を繰り入れることができます。","e":"コロナ禍のように失業者が急増して雇用保険財政が厳しくなった場合、国が追加的に財政支援（国庫繰入）を行うことができます。","p":"「必要がある場合」に国庫から繰入れができる弾力条項。雇用保険財政の安定化を図るための規定。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":39},{"r":"法68条","t":"保険料","b":"◯1 雇用保険事業 に要する 費用に充てるため 政府が徴収する 保険料 については、 徴収法 の定めるところ による。 ◯2 前項の 保険料 のうち、 一般保険料徴収額 から当該 一般保険料徴収額 に育児休業給付率 を乗じて得た 額及び当該 一般保険料徴収額 に二事業率 を乗じて得た額 の合計額を 減じた額 並びに 印紙保険料 の額 に相当する額の合計額は、 失業等給付 及び 就職支援法事業 に要する費用に充てる ものとし、 一般保 険料徴収額 に育児休業給付率 を乗じて得た額 は、 育児休業給付 に要する費用に充てる ものとし、 一 般保険料徴収額 に二事業率 を乗じて得た額は、 雇用安定事業 及び 能力開発事業 （第63条に規定 するものに限る。） に要する費用に充てる ものとする。","s":"雇用保険事業に要する費用に充てるための保険料は、徴収法の定めるところにより徴収されます。失業等給付・育児休業等給付の保険料は労使折半ですが、二事業の保険料は事業主のみが負担します。","e":"給与明細に記載されている「雇用保険料」は、失業等給付と育児休業等給付の部分について労働者も負担しています。一方、雇用安定事業や能力開発事業の費用は全額事業主負担です。","p":"失業等給付等の保険料＝労使折半（正確には料率が異なるので完全折半ではない）。二事業の保険料＝事業主のみ。「二事業は労働者負担なし」が超頻出。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":43},{"r":"法69条","t":"審査請求（不服申立て）","b":"◯1 第9条（被保険者の資格の取得又は喪失の確認）の規定による 確認 、失業等給付 及び 育児休 業等給付 （以下「失業等給付等」という。） に関する処分 又は第10条の4第1項若しくは第2項（ 不正受 給による失業等給付等の返還命令又は納付命令 ）の規定による処分 に不服のある者は、 雇用保険審査 官に対して 審査請求 をし、その 決定に不服のある者は、 労働保険審査会 に対して 再審査請求 をすることができる。 ◯2 前項の 審査請求 をしている者 は、審査請求 をした日の翌日 から起算して 3箇月 を経過 しても 審査請 求についての決定がない ときは、 雇用保険審査官 が審査請求 を棄却したものとみなす ことができる。 ◯3 第1項の 審査請求 及び再審査請求 は、時効の完成猶予及び更新 に関しては、 裁判上の請求 とみな す。 審査請求及び再審査請求","s":"被保険者の資格の確認、失業等給付・育児休業等給付に関する処分に不服がある者は、雇用保険審査官に審査請求をし、さらに不服があれば労働保険審査会に再審査請求ができます。","e":"ハローワークで「あなたには基本手当の受給資格がありません」と言われて納得できない場合、まず雇用保険審査官に審査請求し、それでもダメなら労働保険審査会に再審査請求できます。","p":"二審制：①雇用保険審査官（審査請求）→②労働保険審査会（再審査請求）。審査請求の期限は処分があったことを知った日の翌日から3か月以内。労災保険と同じ仕組み。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":46},{"r":"法70条","t":"確認処分の確定と不服の理由","b":"第9条の規定による 確認 に関する 処分が確定した ときは、当該 処分についての不服 を当該処分に基 づく 失業等給付等 に関する処分についての 不服の理由とすることができない 。 不服理由の制限","s":"被保険者資格の確認に関する処分が確定した場合、その処分についての不服を、それに基づく失業等給付等の処分の不服の理由とすることはできません。","e":"「被保険者であったことの確認」の処分が確定した後に、「そもそも自分は被保険者ではなかったのだから基本手当の計算がおかしい」と主張することはできません。","p":"確認処分と給付処分は別々の処分であり、確認処分が確定したら蒸し返せない。処分の確定の効力に関する重要な原則。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":51},{"r":"法71条","t":"訴訟の前置主義","b":"第69条第1項に規定する 処分の取消しの訴え は、当該処分についての 審査請求 に対する 雇用保険審 査官 の決定を経た後 でなければ、 提起 することができない 。 法69条1項に規定する 処分の 取消しの訴え は、当該処分についての 審査請求 に対する 雇用保険審査官 の決定 を経た後でなければ 、提起することができない 。（法71条）","s":"処分の取消しの訴え（裁判）は、審査請求に対する雇用保険審査官の決定を経た後でなければ提起できません（審査請求前置主義）。","e":"ハローワークの処分に不満があってもいきなり裁判所に訴えることはできず、まず雇用保険審査官に審査請求をしなければなりません。","p":"「審査請求前置主義」だが「再審査請求」は前置されていない（審査官の決定後に直接裁判できる）。審査請求から3か月経過しても決定がないときも訴訟提起可能。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":52},{"r":"法74条","t":"時効","b":"◯1 失業等給付等 の支給を受け 、又は その返還を受ける権利 及び第10条の4第1項又は第2項（ 不正受給 による失業等給付等の返還命令又は納付命令 ）の規定により 納付をすべきことを命ぜられた金額を 徴収す る権利 は、これらを行使することができる時 から 2年 を経過 したときは、 時効によって消滅 する。 ◯2 年度の平均給与額が修正された ことにより、厚生労働大臣が第18条第4項に規定する 自動変更対象額 、 第19条第1項第1号に規定する 控除額 又は第61条第1項第2号に規定する 支給限度額 を変更した場合において、 当該変更に伴い その額が再び算定された失業等給付等がある ときは、当該失業等給付等に係る第10条の3（第 61条の6第2項において準用する場合を含む。）の規定による 未支給の失業等給付等の支給を受ける権利 については、 会計法第31条第1項の規定を適用しない 。 時効 R04-07B R02-06C 2020改正 失業等給付等の支給を受け 、またはその返還を受ける権利 及び不正受給による 失業等給付等の返還命令 または納付命令 の規定により納付をすべきことを命ぜられた金額を徴収する権利 は、 これらを行使することができる時 から2年を経過したときは、 時効によって消滅 する。（法74条1項）","s":"失業等給付等を受ける権利や返還を受ける権利、不正受給による納付金を徴収する権利は、これらを行使できる時から2年で時効消滅します。ただし、不正受給の納付命令による徴収金は2年です。","e":"基本手当を受ける権利を2年間行使しないと時効で消滅します。逆に、政府が不正受給者にお金を返してもらう権利も2年で時効になります。","p":"時効は「2年」。起算点は「行使できる時から」。失業等給付を受ける権利も、返還命令・納付命令の権利も同じ2年。労基法の賃金請求権（5年、当面3年）とは異なる。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":54},{"r":"法73条","t":"不利益取扱いの禁止","b":"事業主 は、労働者が第8条の規定による 被保険者の資格の取得又は喪失 の確認 の請求 又は第37条の5第 1項（ 高年齢被保険者の特例 ）の規定による申出をしたことを 理由として、 労働者 に対して 解雇 その他 不利益な取扱い をしてはならない。 不利益取扱いの禁止 2020改正 年度の平均給与額などが修正された ことにより、自動変 更対象額などが変更され、広範囲の受給者に 追加給付 が必要となる場 合があります。このような場合において、対象となる当時の受給者が 死亡した場合には、法10条の3に規定する未支給の失業等給付等とし て、新たな請求が必要 となり、その遺族に給付を実施するためには、 連絡及び手続に時間を必要 とします。一方で 時効も規定されている た め、時効をすぎると未支給の失業等給付等の支給を受けられないケー スも想定されます 。 そこで、こうした場合の未支給の失業等給付等の支給を受ける権利 については、会計法31条1項の規定を適用しないこととされていま す。","s":"事業主は、労働者が被保険者の資格確認の請求や高年齢被保険者の特例の申出をしたことを理由に、その労働者に不利益な取扱いをしてはなりません。","e":"従業員が「自分は雇用保険に入っているか確認してほしい」とハローワークに請求したことを理由に、会社がその従業員を解雇したり降格したりすることは禁止されています。","p":"保護される行為は「資格確認の請求」と「高年齢被保険者の特例の申出」。不利益取扱いの例：解雇・降格・減給など。罰則はないが、不利益取扱い自体は無効と解される。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":56},{"r":"則143条","t":"書類の保管義務","b":"事業主 及び 労働保険事務組合 は、雇用保険に関する書類 （雇用安定事業又は能力開発事業に関する書 類及び徴収法又は労働保険の保険料の徴収等に関する法律施行規則による書類を除く。）をその 完結の日 から 2年間 （被保険者に関する書類 にあっては、 4年間 ）保管しなければならない 。 2022改正 事業主は 、「高年齢被保険者の特例 」の申出をしたこと を理由として 、労働者に対して不利益な取扱いをすることはできませ ん。 2026改正 雇用保険法では 「6か月以下の拘禁刑または30万円以下 の罰金 」が「最も重い罰則 」です。 「6か月以下の拘禁刑または30万円以下の罰金 」です。 「 1年以下 の拘禁刑または50万円以下の罰金 」ではありません 。","s":"事業主及び労働保険事務組合は、雇用保険に関する書類を、その完結の日から2年間（被保険者に関する書類は4年間）保管しなければなりません。","e":"従業員の資格取得届の控えは、その届出が完結してから4年間保管しなければなりません。一般的な雇用保険関連の書類は2年間の保管義務があります。","p":"原則「2年間」、被保険者に関する書類は「4年間」。労基法の記録保存義務（5年、当面3年）とは異なる。保管義務違反には罰則がある。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":57},{"r":"法76条","t":"報告等の命令（事業主等に対するもの）","b":"◯1 行政庁 は、被保険者 若しくは 受給資格者 、高年齢受給資格者 、特例受給資格者 若しくは 日雇受給資格者 （以下「 受給資格者等 」という。）若しくは 教育訓練給付金支給対象者 を雇用し 、若しくは 雇用し ていた と認められる 事業主 又は 労働保険事務組合 若しくは 労働保険事務組合であった団体 に対 して、雇用保険法の施行に関して必要な 報告、文書の提出 又は出頭を命ずる ことができる。 ◯2 行政庁 は、受給資格者等を雇用しようとする 事業主 、受給資格者等 に対し 職業紹介若しくは職業指 導を行う 職業紹介事業者等 、募集情報等提供事業 を行う者 又は教育訓練給付金支給対象者 に対し教 育訓練を行う 指定教育訓練実施者 に対して 、雇用保険法の施行に関して必要な 報告又は文書の提出 を命 ずることができる。 報告などの命令 2026改正 行政庁 は、受給資格者等 若しくは 教育訓練給付金支給対象者 を雇用し 、若しくは雇用していたと認 められる 事業主 または 労働保険事務組合 若しくは 労働保険事務組合であった団体 に対して、雇用保険法の施行 に関して必要な 報告、文書の提出 または 出頭を命ずる ことができる。（法76条1項） 2026改正 行政庁 は、受給資格者等 を雇用しようとする 事業主 、受給資格者等 に対し 職業紹介若しくは職業指 導を行う 職業紹介事業者等 、募集情報等提供事業を行う者 または 教育訓練給付金支給対象者 に対し 教育訓練を 行う指定教育訓練実施者 に対して、雇用保険法の施行に関して必要な 報告または 文書の提出 を命ずる ことがで きる。（法76条2項） 「有料の職業紹介事業者 」だけでなく 、「無料の職業紹介事業者 」 に対しても報告や提出を命ずることができます 。 法76条1項には 「出頭」が含まれていますが 、法76条2項には含ま れていません 。","s":"行政庁は、被保険者や受給資格者等、事業主等に対し、雇用保険法の施行に必要な報告、届出、文書の提出等を命じることができます。","e":"ハローワークが事業主に対し「この従業員の賃金台帳を出してください」と命じたり、受給資格者に「求職活動の状況を報告してください」と求めることができます。","p":"命令の対象は広く、被保険者・受給資格者等・事業主・労働保険事務組合等。正当な理由なく命令に従わない場合は罰則の対象。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":59},{"r":"法77条","t":"報告命令（被保険者等に対するもの）","b":"行政庁 は、 被保険者 、受給資格者等 、教育訓練給付金支給対象者 又は 未支給の失業等給付 等の支給を請求する者 に対して、雇用保険法の施行に関して必要な 報告、文書の提出 又は出頭を命ずる こ とができる。 被保険者等に対する報告などの命令 2026改正 行政庁 は、被保険者 、受給資格者等 、教育訓練給付金支給対象者 または 未支給の失業等給付等の支 給を請求する者 に対して、雇用保険法の施行に関して必要な 報告、文書の提出 または 出頭を命ずる ことができ る。（法77条）","s":"行政庁は、被保険者、受給資格者等、教育訓練給付金支給対象者又は未支給給付請求者に対して、施行に必要な報告、届出、文書の提出を命じることができます。","e":"ハローワークが受給資格者に対し「アルバイトをしていませんか、収入状況を報告してください」と命じることができます。","p":"法76条との違いを整理する。法76条は事業主等も対象、法77条は被保険者等に限定した報告命令。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":60},{"r":"法75条","t":"市町村長の協力","b":"市町村長 （特別区の区長を含むものとし、指定都市においては、区長又は総合区長とする。）は、 行 政庁又は求職者給付若しくは就職促進給付の支給を受ける者 に対して、当該市（特別区を含む。）町村の 条例 の定めるところにより、 求職者給付又は就職促進給付の支給を受ける者 の戸籍 に関し、 無料 で証明 を行うことができる。 戸籍事項の無料証明 出頭などを求める際に 、「被保険者などの承諾を得る 」必要はあり ません 。","s":"市町村長（特別区の区長を含む）は、行政庁又は求職者給付・就職促進給付の受給者に対して、戸籍に関する事項の証明等の事務について無償で協力しなければなりません。","e":"受給資格者が住民票の写しを取得するとき、市区町村は無料で協力する義務があります。","p":"市町村長の「無償」協力義務。対象は「戸籍に関する事項」の証明等。指定都市では区長・総合区長が行う。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":60},{"r":"法77条の2","t":"関係機関への資料提供の求め","b":"◯1 行政庁 は、 関係行政機関又は公私の団体 に対して、雇用保険法の施行に関して 必要な資料の提供 そ の他の 協力を求める ことができる。 ◯2 前項の規定による協力を求められた 関係行政機関又は公私の団体 は、できるだけその求めに応じな ければならない 。 資料の提供など R04-07D 行政庁 は、関係行政機関または公私の団体 に対して、雇用保険法の施行に関して 必要な資料の提供 その他の 協力を求める ことができる。（法77条の2第1項） R04-07D 協力を求められた 関係行政機関または公私の団体 は、できるだけその求めに応じなければならな い。（法77条の2第2項）","s":"行政庁は、関係行政機関や公私の団体に対して、雇用保険法の施行に必要な資料の提供その他の協力を求めることができます。","e":"ハローワークが税務署に受給資格者の収入状況について情報提供を求めたり、医療機関に傷病の状況を確認することができます。","p":"協力を「求めることができる」（義務ではない）。「関係行政機関」だけでなく「公私の団体」も対象。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":61},{"r":"法78条","t":"診断命令","b":"行政庁 は、求職者給付の支給を行うため必要があると認めるときは、第15条第4項第1号の規定により同条 第2項（ 証明書による失業の認定 ）に規定する 失業の認定 を受け、若しくは 受けよう とする 者、第20条第1項 の規定（ 職業に就けない場合の受給期間の特例 ）による 申出をした者又は 傷病手当の支給 を受け、若しくは 受 けよう とする 者に対して、その指定する 医師の診断 を受けるべきことを 命ずる ことができる。 診断","s":"行政庁は、求職者給付の支給のために必要があると認めるときは、傷病のために失業の認定を受けようとする受給資格者に対し、医師の診断を受けるよう命じることができます。","e":"傷病手当の申請をしたIさんに対して、ハローワークが「本当に働けない状態か医師に診てもらってください」と指示することができます。","p":"証明書による失業の認定（法15条4項1号）に関連する規定。傷病の真偽を確認するための制度。命令に従わない場合は給付が受けられない可能性。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":61},{"r":"法79条","t":"立入検査","b":"◯1 行政庁 は、雇用保険法の施行のため 必要があると認める ときは、当該 職員に、被保険者 、受給資格者等 若しくは 教育訓練給付金支給対象者 を雇用し 、若しくは 雇用していた と認められる 事業主 の事業所 又は 労働保険事務組合 若しくは 労働保険事務組合であった団体 の事務所 に立ち入り 、関係者に対して 質問 させ、又は 帳簿書類 の検査 をさせることができる。 立入検査 R02-06B 2026改正 行政庁 は、雇用保険法の施行のため 必要があると認めるとき は、当該 職員に、被保険 者、受給資格者等 若しくは 教育訓練給付金支給対象者 を雇用し、若しくは 雇用していた と認められる 事業主 の 事業所 または 労働保険事務組合 若しくは 労働保険事務組合であった団体 の事務所 に立ち入り 、関係者に対して 質問させ、または帳簿書類の 検査をさせることができる。（法79条1項） 罰則の規定はありません。 「拘禁刑刑または罰金刑による罰則を設けている 」わけではありま せん。","s":"行政庁は、雇用保険法の施行のため必要があると認めるときは、職員に事業所等に立ち入り、関係者への質問や帳簿書類の検査をさせることができます。","e":"不正受給の疑いがある事業所に対し、ハローワークの職員が立入検査を行い、賃金台帳や出勤簿を確認することができます。","p":"立入検査には「必要があると認めるとき」という要件がある。検査を拒否・妨害した者には罰則あり。犯罪捜査のために認められたものではない（行政調査）。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":62},{"r":"法83条","t":"事業主に対する罰則","b":"事業主 が次の各号のいずれかに該当するときは、 6箇月以下の拘禁刑又は30万円以下の罰金 に処す る。 1. 第7条（ 被保険者に関する届出 ）の規定に違反して 届出をせず 、又は 偽りの届出 をした場合 2. 第73条（ 確認請求に対する不利益取扱いの禁止 ）の規定に違反した場合 3. 第76条第1項（ 報告等）の規定による命令に違反して 報告をせず 、若しくは 偽りの報告 をし、又は 文書 を提出せず 、若しくは 偽りの記載 をした文書を提出した場合 4. 第76条第3項又は第4項（ 証明書の交付 ）の規定に違反して 証明書の交付を拒んだ 場合 5. 第79条第1項（ 立入検査 ）の規定による当該職員の質問に対して 答弁をせず 、若しくは 偽りの陳述 を し、又は同項の規定による 検査を拒み、妨げ、若しくは忌避 した場合 事業主に対する罰則 2026改正 事業主 が次のいずれかに該当するときは、 6か月以下の拘禁刑または30万円以下の罰金 に処せられ る。（法83条1項） 6か月以下の拘禁刑または30万円以下の罰金 1. 法7条（ 被保険者に関する届出 ）の規定に違反して 届出をせず 、または 偽りの届出 をした場合 2. 法73条（ 確認請求に対する不利益取扱いの禁止 ）の規定に違反した場合 3. 法76条1項（報告等）の規定による命令に違反して 報告をせず 、若しくは 偽りの報告 をし、または 文書を 提出せず 、若しくは 偽りの記載 をした文書を提出した場合 4. 法76条3項または4項（証明書の交付）の規定に違反して 証明書の交付を拒んだ 場合 5. 法79条1項（立入検査）の規定による当該職員の質問に対して 答弁をせず 、若しくは 偽りの陳述 をし、ま たは同項の規定による 検査を拒み 、妨げ、若しくは忌避した 場合","s":"事業主が被保険者に関する届出をしなかったり、虚偽の届出をした場合等は、6か月以下の拘禁刑又は30万円以下の罰金に処せられます。","e":"従業員の資格取得届を出さなかったり、賃金額を偽った届出をした事業主は、6か月以下の拘禁刑又は30万円以下の罰金の対象です。","p":"対象行為：①届出違反（法7条）、②報告命令違反（法76条）。「6か月以下の拘禁刑又は30万円以下の罰金」。最も重い罰則ではない。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":64},{"r":"法85条","t":"被保険者等に対する罰則","b":"被保険者 、受給資格者等 、教育訓練給付金支給対象者 又は 未支給の失業等給付等の支給を 請求する者 その他の関係者が次の各号のいずれかに該当するときは、 6箇月以下の拘禁刑又は20万円以下 の罰金 に処する。 1. 第44条（日雇労働被保険者手帳の交付）の規定に違反して 偽りその他不正の行為 によって 日雇労働被保 険者手帳の交付を受けた 場合 2. 第77条の規定による命令に違反して 報告をせず 、若しくは 偽りの報告 をし、 文書を提出せず 、若しくは 偽りの記載 をした文書を提出し、又は 出頭しなかった 場合 3. 第79条第1項の規定による当該職員の質問に対して 答弁をせず 、若しくは 偽りの陳述 をし、又は同項の 規定による 検査を拒み 、妨げ、若しくは忌避した 場合 被保険者等に対する罰則 2026改正 被保険者 、受給資格者等 、教育訓練給付金支給対象者 または 未支給の失業等給付等の支給を請求す る者その他の関係者が次の各号のいずれかに該当するときは、 6か月以下の拘禁刑または20万円以下の罰金 に 処せられる。（法85条）","s":"被保険者、受給資格者等、教育訓練給付金支給対象者等が報告命令に違反したり虚偽の報告をした場合は、6か月以下の拘禁刑又は30万円以下の罰金に処せられます。","e":"受給資格者がハローワークからの報告命令に応じなかったり、嘘の報告をした場合は罰則の対象です。","p":"事業主だけでなく、被保険者や受給資格者も罰則の対象となる。不正受給の場合は別途法10条の4の返還命令・納付命令もある。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":65},{"r":"法86条","t":"両罰規定","b":"◯1 法人（法人でない労働保険事務組合を含む。以下同じ。）の 代表者 又は法人若しくは 人の代理 人、使用人 その他の 従業者 が、その 法人又は人の業務 に関して、第83条、第84条又は第85条の 違反行為 をしたときは、 行為者 を罰するほか、その 法人 又は 人に対しても各本条の 罰金刑 を科する。 両罰規定 R02-01A 法人の代表者 または 法人若しくは人の 代理人 、使用人 その他の 従業者 が、その 法人または人の業務 に関して、法83条、法84条または法85条の 違反行為 をしたときは、 行為者 を罰するほか、その 法人または人 に 対しても各本条の 罰金刑 を科する。（法86条1項） 事業主 に対する罰則だけでなく 、「被保険者等 」に対しても罰則の 規定が設けられています 。","s":"法人の代表者や従業者が業務に関して違反行為をした場合、行為者だけでなく法人（又は事業主）にも罰金刑が科せられます。","e":"会社の人事担当者が虚偽の届出をした場合、その担当者本人に罰則が科されるだけでなく、会社（法人）にも罰金が科される可能性があります。","p":"「両罰規定」＝行為者＋法人の両方を罰する。法人でない労働保険事務組合も「法人」に含まれる。事業主が違反防止の注意義務を尽くしたことを証明すれば免責される場合がある。","f":"20_雇用保険法20-雇用保険二事業、費用の負担、不服申立て、雑則、罰則","pg":66}],"労働保険徴収法":[{"r":"法1条","t":"徴収法の目的","b":"徴収法 は、労働保険の事業 の効率的な運営 を図る ため、 労働保険の保険関係 の成立 及び 消 滅、労働保険料 の納付 の手続 、労働保険事務組合 等に関し必要な事項を 定める ものとする。 趣旨 R02-雇08D 徴収法 は、労働保険の事業の効率的な運営を図る ため、 労働保険の保険関係の成立及び消滅 、労 働保険料の納付の手続 、労働保険事務組合など に関し必要な事項を 定める 。（法1条）","s":"労働保険徴収法は、労災保険と雇用保険をまとめて「労働保険」として効率的に運営するための法律です。保険関係の成立・消滅、保険料の納付手続き、労働保険事務組合などについて定めています。","e":"会社が従業員を雇うと労災保険と雇用保険の両方に加入しますが、保険料の申告・納付は「労働保険料」としてまとめて行います。これを可能にしているのが徴収法です。","p":"徴収法は「労災保険」と「雇用保険」に共通する手続法。保険給付の内容は各法律で規定し、保険料の徴収手続きを徴収法で一本化している点が重要。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":2},{"r":"法2条","t":"労働保険の定義","b":"◯1 徴収法において「 労働保険 」とは、 労働者災害補償保険法 による 労働者災害補償保険 （以下「 労災 保険」という。）及び 雇用保険法 による 雇用保険 （以下「 雇用保険 」という。）を 総称する。 労働保険 「労働保険 」とは、労働者災害補償保険法による 労災保険 及び雇用保険法による 雇用保険 を総称する。（法2 条1項）","s":"「労働保険」とは、労災保険と雇用保険の総称です。また「賃金」とは、労基法11条の賃金と同じ意味で、名称を問わず労働の対償として支払われるすべてのものを指します。","e":"基本給、残業手当、通勤手当、賞与など名前に関係なく、労働の対価として支払われるものはすべて「賃金」に含まれ、保険料計算の基礎になります。","p":"「労働保険＝労災保険＋雇用保険」の定義は基本中の基本。「賃金」の定義が労基法11条と同じであることも頻出。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":4},{"r":"法39条","t":"一元適用事業と二元適用事業","b":"◯1 都道府県 及び 市町村 の行う事業 その他厚生労働省令で定める 事業については、当該 事業を労災 保険に係る 保険関係 及び雇用保険 に係る 保険関係 ごとに 別個の事業 とみなして徴収法を適用する 。","s":"原則として労災保険と雇用保険は一つの保険関係（一元適用事業）として扱いますが、都道府県・市町村の行う事業など一定の事業は、労災と雇用を別々の保険関係（二元適用事業）として扱います。","e":"普通の会社は一元適用事業なので、労災と雇用の保険料をまとめて申告・納付します。一方、建設業や市役所は二元適用事業なので、労災と雇用を別々に手続きします。","p":"二元適用事業の具体例（都道府県・市町村、港湾労働、建設業、農林水産業等）が出題される。一元適用が原則で二元適用が例外。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":10},{"r":"則70条","t":"二元適用事業の範囲","b":"法第39条第1項の厚生労働省令で定める 事業（二元適用事業 ）は、次のとおりとする。 1. 都道府県に準ずるもの 及び 市町村に準ずるもの の行う事業 2. 港湾労働法に規定する 港湾運送の行為 の事業 3. 雇用保険法附則第2条第1項各号（ 農林 の事業 、畜産 、養蚕 又は 水産 の事業 ）に掲げ る事業 4. 建設 の事業 一元適用事業 例えば 、建築工事 やダム工事 などの建設の事業 、立木の伐採 の事 業といった事業が 、有期事業となります 。","s":"二元適用事業として扱われるのは、都道府県・市町村に準ずるものの行う事業、港湾労働法の適用事業、農林・水産の事業、建設の事業です。","e":"ビル建設の現場では、下請け業者の労働者も含めて元請が労災保険をまとめて負担しますが、雇用保険は各事業主が個別に手続きします。このため二元適用になります。","p":"二元適用事業は「都道府県・市町村に準ずるもの」「港湾労働」「農林・水産」「建設」の4類型。特に建設業は請負事業の一括との関係で頻出。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":10},{"r":"則73条","t":"代理人の選任","b":"◯1 事業主 は、 あらかじめ 代理人 を選任した 場合には、徴収法施行規則によって 事業主が行なわなけれ ばならない事項 を、その 代理人に行なわせる ことができる。 ◯2 事業主 は、前項の 代理人 を選任し 、又は 解任した ときは、「 代理人選任 ・解任届 」により、その旨を 所轄労働基準監督署長 又は 所轄公共職業安定所長 に届け出 なければならない。代理人選任・解任届 に記載された事項であって代理人の選任に係るものに変更を生じたときも、同様とする。 代理人選任・解任届 R06-災10A 事業主 は、あらかじめ 代理人を選任した場合 には、徴収法施行規則によって 事業主が行なわなけ ればならない事項 を、その 代理人に行なわせる ことができる。（則73条1項） 「変更が生じた日の翌日 」から起算します 。変更が生じた日の 「当 日」から起算するわけではありません 。 法人の 代表取締役に異動があった場合であっても 、「名称、所在地 等変更届 」を提出する必要はありません 。","s":"事業主はあらかじめ代理人を選任して、徴収法施行規則で事業主が行わなければならない事項を代理人に行わせることができます。","e":"社長が多忙で労働保険の手続きに対応できない場合、総務部長を代理人に選任して、保険料の申告・納付手続きを行わせることができます。","p":"「あらかじめ」選任が必要。届出が必要。雇用保険法の代理人規定（則145条）と同様の制度。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":41},{"r":"法5条","t":"保険関係の消滅","b":"保険関係が成立している事業 が廃止 され、又は 終了 したときは、その 事業についての 保険関係 は、その 翌日 に消滅する 。 保険関係の消滅 「◯◯日以内 」といった届出期限は 、定められていません 。 代理人選任 ・解任届は 、「所轄労働基準監督署長または所轄公共職 業安定所長 」に届け出なければなりません 。「都道府県労働局長また は所轄都道府県知事 」ではありません 。 R06-雇08E 保険関係が成立している 事業が廃止され 、または終了したとき は、その 事業についての 保険関係 は、その翌日に消滅する 。（法5条） 単に営業廃止の法律上の手続が完了したときとか、請負契約期間の満了したときをもって直ちに事業の廃止 または終了とみるべきでなく、 現実にその事業の活動が停止 され、その事業における 労働関係が消滅した とき をもって 事業の廃止または終了があった と解す 。したがって、例えば法人が解散したからといって、直ちにそ の事業が廃止されたことにはならず、特別の事情がない限りその 清算結了の日の翌日に保険関係が消滅する 。 （適用手引1編2章3ハ） 事業の 一時的休止 （すなわち休業 ）は、ここにいう廃止ではないから 保険関係は消滅しない 。（適用手引1編 2章イ）","s":"保険関係が成立している事業が廃止または終了したときは、その翌日に保険関係が消滅します。","e":"3月31日に会社が解散した場合、保険関係は4月1日に消滅します。「届出の日」ではなく「廃止・終了の翌日」に自動的に消滅する点がポイントです。","p":"消滅は「翌日」。届出は消滅の「日の翌日から起算して10日以内」。保険関係の成立（法3条・法4条）が「その日」であるのに対し、消滅は「翌日」である点のひっかけに注意。","f":"01_労働保険徴収法1-総則（趣旨、定義）、保険関係の成立及び消滅","pg":42},{"r":"則34条","t":"一括有期事業の報告書","b":"一括有期事業についての事業主 は、 次の保険年度の6月1日 から起算して 40日以内 又は保険関係が 消滅した日 から起算して 50日以内 に、一括有期事業報告書 を所轄都道府県労働局歳入徴収官 に提出 しなければならない。 一括有期事業報告書 R07-災08B R06-雇10C R04-災08C 一括有期事業についての事業主 は、次の保険年度の 6月1日から 起算し て40日以内 または 保険関係が消滅した日 から起算して 50日以内 に、「 一括有期事業報告書 」を所轄都道府県労 働局歳入徴収官 に提出しなければならない。（則34条）","s":"一括有期事業の事業主は、次の保険年度の6月1日から40日以内、または保険関係が消滅した日から50日以内に、一括有期事業報告書を提出しなければなりません。","e":"建設業で複数の小規模工事を一括している場合、確定保険料の申告と一緒に、各工事の内容を記載した報告書を7月10日までに提出します。","p":"「40日以内」と「50日以内」の2つの期限。確定保険料申告書と同時に提出する。一括有期事業の要件（建設：請負金額1億8千万円未満、立木伐採：素材見込生産量1,000㎥未満）も要確認。","f":"02_労働保険徴収法2-保険関係の一括","pg":16},{"r":"法10条","t":"労働保険料の種類","b":"◯1 政府は、労働保険の事業に要する費用 にあてるため 保険料 を徴収する 。 ◯2 前項の規定により徴収する保険料（以下「 労働保険料 」という。）は、次のとおりとする。 1. 一般 保険料 2. 第1種特別加入 保険料 3. 第2種特別加入 保険料 4. 第3種特別加入 保険料 5. 印紙 保険料 6. 特例納付 保険料 労働保険料の種類 R04-雇10D 政府は、労働保険の事業に要する費用 にあてるため 労働保険料 を徴収する。（法10条1項） 労働保険料 には、次のものがある。（法10条2項） R04-雇10D 「労働保険の事業に要する費用」とは、保険給付に要 する費用、社会復帰促進等事業及び雇用安定等の事業に要する費用、 事務の執行に要する費用（人件費、旅費、庁費などの事務費）、その 他保険事業の運営のために要する「一切の費用」をいいます。（コン メンタール10条） 労働保険料の種類 1. 一般保険料 （事業主が労働者に支払う賃金の総額を算定の基礎とする保険料 ） 2. 第1種特別加入保険料 （中小事業主等の特別加入者 に係る保険料 ） 3. 第2種特別加入保険料 （一人親方等の特別加入者 に係る保険料 ） 4. 第3種特別加入保険料 （海外派遣者の特別加入者 に係る保険料 ） 5. 印紙保険料 （日雇労働被保険者 について一般保険料のほかに事業主が納付する保険料 ） 6. 特例納付保険料 （雇用保険の保険料の徴収時効である2年経過後 であっても、特例的に納付することがで きる保険料 ）","s":"政府は労働保険の事業に要する費用にあてるため保険料を徴収します。労働保険料には、一般保険料、第1種・第2種・第3種特別加入保険料、印紙保険料、特例納付保険料があります。","e":"普通の会社が毎年納める保険料は「一般保険料」。中小事業主が労災に特別加入する場合は「第1種特別加入保険料」。一人親方は「第2種」、海外派遣者は「第3種」です。","p":"労働保険料の6種類（一般保険料、第1種〜第3種特別加入保険料、印紙保険料、特例納付保険料）は暗記必須。","f":"03_労働保険徴収法3-労働保険料の額（賃金総額、賃金総額の特例、一般保険料率）","pg":2},{"r":"法11条","t":"一般保険料の額","b":"◯1 一般保険料の額 は、 賃金総額 に第12条の規定による 一般保険料 に係る 保険料率 を乗じて得た 額とする。 一般保険料の額 一般保険料の額 は、原則として、次の算式によって算出される。（法11条1項） 一般保険料の額 （ 一般保険料の額 ）＝（ 賃金総額 ）×（ 一般保険料率 ）","s":"一般保険料の額は、原則として賃金総額に一般保険料率を掛けて算出します。賃金総額を正確に把握できない場合は、厚生労働大臣が定める平均賃金の額を使って算出できます。","e":"年間の賃金総額が1億円で一般保険料率が15/1000の場合、一般保険料は150万円です。請負による建設事業で賃金総額が不明な場合は、請負金額に労務費率を掛けて賃金総額を算出します。","p":"「賃金総額×一般保険料率」が原則。賃金総額の特例（請負金額×労務費率）は建設業・立木の伐採で頻出。","f":"03_労働保険徴収法3-労働保険料の額（賃金総額、賃金総額の特例、一般保険料率）","pg":5},{"r":"則12条","t":"賃金総額の特例が適用される事業","b":"法第11条第3項の 厚生労働省令で定める事業 は、 労災保険 に係る保険関係が成立している事業 のうち 次の各号に掲げる事業であって、同条第1項の 賃金総額を正確に算定することが困難なもの とする。 1. 請負による建設 の事業 2. 立木の伐採 の事業 3. 造林 の事業 、木炭又は薪 を生産する事業 その他の 林業 の事業 （立木の伐採の事業を除 く。） 4. 水産動植物の採捕又は養殖 の事業 賃金総額の特例 労災保険 に係る保険関係が成立している事業 のうち、① 請負による建設 の事業、② 立木の伐採 の事業、③ 林 業の事業（②を除く）、④ 水産動植物 の採捕または養殖 の事業であって、 かつ、賃金総額を正確に算定するこ とが困難な事業 については、「 賃金総額の特例 」が認められている。（則12条） 賃金総額の特例（賃金総額を正確に算定することが困難な場合） 1. 請負による建設 の事業 2. 立木の伐採 の事業 3. 林業の事業（ 2.を除く） 4. 水産動植物の採捕または養殖 の事業","s":"労災保険に係る保険関係が成立している事業のうち、賃金総額を正確に算定することが困難な事業（請負による建設の事業、立木の伐採の事業等）では、請負金額等に所定の率を掛けて賃金総額を算出します。","e":"建設業で請負金額5,000万円、労務費率23%の場合、賃金総額は5,000万円×23%＝1,150万円として計算します。","p":"賃金総額の特例が認められる事業の種類と、「労務費率」は厚生労働大臣が定めること。「労災保険に係る保険関係が成立している事業」に限定される点に注意。","f":"03_労働保険徴収法3-労働保険料の額（賃金総額、賃金総額の特例、一般保険料率）","pg":21},{"r":"法12条","t":"一般保険料率","b":"◯1 一般保険料に係る保険料率（以下「 一般保険料率 」という。）は、次のとおりとする。 1. 労災保険及び雇用保険に係る保険関係が成立している事業 にあっては、 労災保険率と雇用保険率とを 加えた率 2. 労災保険に係る保険関係のみが成立している事業 にあっては、 労災保険率 3. 雇用保険に係る保険関係のみが成立している事業 にあっては、 雇用保険率 一般保険料率 一般保険料率 は、次の通りである。（法12条1項）","s":"一般保険料率は、労災保険率と雇用保険率を合算した率です。労災保険のみの事業は労災保険率、雇用保険のみの事業は雇用保険率がそのまま一般保険料率になります。","e":"労災保険率が3/1000、雇用保険率が15.5/1000の事業なら、一般保険料率は18.5/1000です。","p":"一般保険料率＝労災保険率＋雇用保険率（一元適用事業）。労災保険率は業種ごとに異なる（メリット制あり）。雇用保険率は「失業等給付・育休給付の率＋雇用保険二事業の率」で構成される。","f":"03_労働保険徴収法3-労働保険料の額（賃金総額、賃金総額の特例、一般保険料率）","pg":29},{"r":"法22条","t":"印紙保険料の額","b":"◯1 印紙保険料の額 は、日雇労働被保険者 1人につき、 1日当たり 、次に掲げる額とする。 1. 賃金の日額 が11,300円以上の者 については、 176円 2. 賃金の日額 が8,200円以上1万1,300円未満の者 については、 146円 3. 賃金の日額 が8,200円未満の者 については、 96円 印紙保険料の額 等級 賃金日額 額 第1級印紙保険料日額 11,300円以上 176円 第2級印紙保険料日額 8,200円以上11,300円未満 146円 第3級印紙保険料日額 8,200円未満 96円","s":"印紙保険料は日雇労働被保険者1人につき1日当たりの額で、賃金日額に応じて3段階に分かれています。11,300円以上は176円、8,200円以上11,300円未満は146円、8,200円未満は96円です。","e":"日雇い労働者の1日の賃金が12,000円なら、その日の印紙保険料は176円（事業主と労働者で折半なので各88円）です。","p":"3段階の賃金日額と保険料額（176円・146円・96円）は暗記必須。事業主と被保険者が折半負担。雇用保険印紙を貼付・消印する方法で納付する。","f":"04_労働保険徴収法4-労働保険料の額（特別加入保険料、印紙保険料）","pg":18},{"r":"法15条","t":"概算保険料の申告・納付","b":"◯1 事業主 は、保険年度ごと に、労働保険料 を、その 労働保険料の額 その他厚生労働省令で定める事項を記 載した 概算保険料申告書 に添えて、その 保険年度 の6月1日から40日以内 （保険年度 の中途に保険関 係が成立した ものについては、当該 保険関係が成立した日 （保険年度 の中途に労災保険法第34条第1項 （中小事業主等の特別加入 ）の承認があった事業に係る 第1種特別加入保険料 及び保険年度の中途に労災保険 法第36条第1項（ 海外派遣者の特別加入 ）の承認があった事業に係る 第3種特別加入保険料 に関しては、それ ぞれ当該 承認があった日 ）から 50日以内 ）に納付しなければならない 。 概算保険料の納期限（原則） R07-災09C 継続事業 （一括有期事業を含む ）の概算保険料 は、保険年度ごと に、「 概算保険料申告書 」に添 えて、その 保険年度 の6月1日から起算して40日以内 （原則7月10日まで ）に納付 しなければならない。（法1 5条1項）","s":"事業主は保険年度ごとに、その年度の保険料の見込額（概算保険料）を申告書に記載して、保険年度の初日（成立が年度途中なら成立日）から50日以内に納付しなければなりません。","e":"4月1日から始まる保険年度の概算保険料は、5月20日（50日以内）までに申告・納付します。6月15日に事業を開始した場合は、8月4日までです。","p":"期限は「50日以内」。継続事業の場合は確定保険料と同時に「年度更新」として6月1日〜7月10日に行う。有期事業は成立日から20日以内に保険関係成立届、成立日から50日以内に概算保険料申告・納付。","f":"05_労働保険徴収法5-概算保険料（申告、納付）","pg":6},{"r":"則38条","t":"概算保険料申告書の提出先","b":"◯1 概算保険料申告書 は、 所轄都道府県労働局歳入徴収官 に提出しなければならない 。 概算保険料の申告先 「概算保険料申告書 」は、 所轄都道府県労働局 歳入徴収官 に提出しなければならない。（則38条1項）","s":"概算保険料申告書は、所轄都道府県労働局歳入徴収官に提出しなければなりません。","e":"東京都にある会社の概算保険料申告書は、東京労働局の歳入徴収官に提出します。ただし、口座振替や電子申請も利用可能です。","p":"提出先は「所轄都道府県労働局歳入徴収官」。労働基準監督署長や公共職業安定所長ではない点に注意。ただし納付は日本銀行（代理店・歳入代理店）にも可能。","f":"05_労働保険徴収法5-概算保険料（申告、納付）","pg":13},{"r":"法18条","t":"概算保険料の延納（分割納付）","b":"政府は、 事業主の申請 に基づき 、その者が第15条（ 概算保険料 ）、第16条（ 増加概算保険料 ）及び第 17条（ 概算保険料の追加徴収 ）の規定により納付すべき 労働保険料 を延納 させることができる 。 概算保険料の延納 R07-災09D 政府は、事業主の申請 に基づき、その者が 概算保険料 、増加概算保険料 及び概算保険料の追加徴 収の規定により納付すべき 労働保険料 を延納させることができる。（法18条）","s":"事業主の申請に基づき、概算保険料を分割して納付することが認められます。延納の要件を満たす場合、年3回（4〜7月、8〜11月、12〜3月）に分けて納付できます。","e":"年間の概算保険料が120万円の場合、申請すれば40万円ずつ3回に分けて納付できます。各期の納期限は7月10日、10月31日、翌年1月31日です。","p":"延納の要件（継続事業：概算保険料40万円以上または事務組合委託。有期事業：概算保険料75万円以上）。各期の納期限の数字は頻出。労働保険事務組合に委託している場合は金額要件なし。","f":"06_労働保険徴収法6-概算保険料（延納、増加概算保険料、追加徴収、認定決定）","pg":2},{"r":"則27条","t":"継続事業の延納の要件","b":"◯1 有期事業以外の事業 であって納付すべき 概算保険料の額 が40万円 （労災保険に係る保険関係 又は 雇用保険に係る保険関係 のみが成立している 事業については、 20万円 ）以上のもの 又は当該 事業に係る 労働保険事務の処理 が労働保険事務組合に委託されている もの（当該 保険年度 において 10月1日以 降に保険関係が成立したもの を除く。）についての 事業主 は、概算保険料申告書を提出する際 に延納の 申 請をした場合には、その 概算保険料 を延納することができる。 延納の要件 申告書には 、「延納」の回数を記載する箇所が設けられています 。 この「延納の申請 」欄の「納付回数 」の項に数字を入れることによっ て延納の申請をすることになっています 。","s":"有期事業以外の事業（継続事業）で概算保険料の延納ができるのは、概算保険料の額が40万円以上の場合、または労災保険か雇用保険の一方のみの場合は20万円以上の場合です。労働保険事務組合に委託している場合は金額要件なしです。","e":"概算保険料が35万円の会社は原則延納できませんが、労働保険事務組合に事務処理を委託していれば金額に関係なく延納が可能です。","p":"継続事業の延納要件：「40万円以上」（一方のみは20万円以上）または「事務組合委託」。有期事業は「75万円以上」。事務組合委託の場合は金額要件なしという特例が重要。","f":"06_労働保険徴収法6-概算保険料（延納、増加概算保険料、追加徴収、認定決定）","pg":5},{"r":"則28条","t":"有期事業の延納の要件","b":"◯1 有期事業 であって納付すべき 概算保険料の額 が75万円 以上のもの 又は当該 事業に係る 労働保険事 務の処理 が労働保険事務組合に委託されている もの（事業の 全期間 が6月以内のもの を除く。）につ いての 事業主 は、概算保険料申告書を提出する際 に延納の 申請をした場合には、その 概算保険料 を延納するこ とができる。 延納の要件 R05-雇08E R03-災09B 有期事業 （一括有期事業を除く ）の場合、次の いずれかの要件 に該当するときに は、事業主 が、概算保険料申告書を提出する際に 延納の申請 を行うことにより、 概算保険料 を延納することが できる。ただし、 事業の全期間 が6か月を超える ものでなければならない。（則28条1項） 有期事業の延納の要件（いずれか） 1. 納付すべき 概算保険料の額 が75万円以上 であるとき 2. 労働保険事務の処理 を労働保険事務組合に委託 しているとき","s":"有期事業で概算保険料の延納ができるのは、概算保険料の額が75万円以上の場合、または労働保険事務組合に委託している場合です。事業の全期間が6か月以内の場合は延納できません。","e":"2年間の建設工事で概算保険料が100万円の場合は延納可能ですが、3か月の短期工事で概算保険料が80万円の場合は延納できません（全期間が6か月以内のため）。","p":"有期事業は「75万円以上」（継続事業の40万円と混同注意）。「事業の全期間が6か月以内」は延納不可。事務組合委託なら金額要件なし。","f":"06_労働保険徴収法6-概算保険料（延納、増加概算保険料、追加徴収、認定決定）","pg":18},{"r":"法17条","t":"概算保険料の追加徴収","b":"◯1 政府は、一般保険料率 、第1種特別加入保険料率 、第2種特別加入保険料率 又は第3種特別加入保険料率 の引上げ を行った ときは、 労働保険料 を追加徴収 する。 概算保険料の追加徴収 R04-雇09D 政府が、法改正 または 雇用保険率の弾力的変更 により、 保険年度の中途 に、一般保険料率 、第1 種特別加入保険料率 、第2種特別加入保険料率 または 第3種特別加入保険料率 の引上げ を行ったときは、法律 上、当該保険料の額について 追加徴収 が行われる。これを「 概算保険料の追加徴収 」という。（コンメンター ル17条） 増加概算保険料 →「 事業主 」側の事情 追加徴収 →「 政府」側の事情 概算保険料の追加徴収の規定は 、「特別加入保険料 」の引き上げに おいても適用されます 。","s":"保険料率の引上げがあった場合、政府は増加分の労働保険料を追加徴収することができます。事業主は通知を受けた日の翌日から30日以内に納付します。","e":"年度途中で雇用保険料率が引き上げられた場合、引上げ分に対応する保険料が追加で徴収されます。","p":"追加徴収の原因は「保険料率の引上げ」。納期限は「通知を受けた日の翌日から30日以内」。増加概算保険料（法16条）との違いに注意（増加概算保険料は賃金総額の増加が原因）。","f":"06_労働保険徴収法6-概算保険料（延納、増加概算保険料、追加徴収、認定決定）","pg":37},{"r":"法19条","t":"確定保険料の申告・納付","b":"◯1 事業主 は、保険年度ごと に、労働保険料の額 その他厚生労働省令で定める事項を記載した申告書を、 次 の保険年度 の6月1日から40日以内 （保険年度の中途に 保険関係が消滅した ものについては、当該 保険 関係が消滅した日 （保険年度 の中途に労災保険法第34条第1項の 承認が取り消された事業 に係る 第1種特別 加入保険料 及び保険年度 の中途に労災保険法第36条第1項の 承認が取り消された事業 に係る 第3種特別加入保 険料に関しては、それぞれ当該 承認が取り消された日 。）から 50日以内 ）に提出しなければならな い。 確定保険料の申告（原則） R06-雇10A R05-雇08A 事業主 は、保険年度ごと に、労働保険料の額その他厚生労働省令で定める事項を記 載した「 確定保険料申告書 」を、次の保険年度の 6月1日 から起算して 40日以内 （原則7月10日まで ）に提出し なければならない。（法19条1項）","s":"事業主は保険年度ごとに、実際に支払った賃金総額に基づく確定保険料を、次の保険年度の6月1日から40日以内（年度途中の場合は保険関係消滅日から50日以内）に申告・納付します。","e":"2025年度の確定保険料は、2026年6月1日〜7月10日の間に申告・納付します（年度更新）。概算保険料との差額を精算し、不足があれば追加納付、超過があれば還付または充当されます。","p":"確定保険料の期限「6月1日から40日以内（7月10日）」は超重要。概算との「50日以内」との違い。不足→納付、超過→還付又は充当。","f":"07_労働保険徴収法7-確定保険料（申告、納付、還付、充当、認定決定）、 口座振替納付","pg":3},{"r":"法21条の2","t":"口座振替による納付","b":"◯1 政府は、事業主 から、 預金又は貯金の払出し とその払い出した金銭による 印紙保険料以外 の労働保 険料（以下単に「 労働保険料 」という。） の納付 （厚生労働省令で定めるものに限る。）をその 預金口座 又は 貯金口座 のある 金融機関に委託 して行うことを 希望する旨の 申出があった場合には、 その納付が確実 と認められ 、かつ、その 申出を承認 することが 労働保険料の徴収上有利と認められる ときに 限り、そ の申出を承認することができる。 口座振替による納付 R06-災09B 政府は、事業主 から、 預金または貯金の払出し とその払い出した金銭による 労働保険料の納付 （厚生労働省令で定めるものに限る）をその預金口座または貯金口座のある 金融機関に委託して行う ことを希 望する旨の 申出があった場合には、 その納付が確実と認められ 、かつ、 その申出を承認することが労働保険料 の徴収上有利と認められる ときに限り、その 申出を承認することができる。（法21条の2第1項） R06-災09A 単独有期事業の事業主も含め 、口座振替制度は 「全事 業主」が対象です 。（コンメンタール21条の2） 「口座振替による納付の主なメリット」には、保険料納付のための 金融機関へ行く手間や待ち時間の解消、納付の「忘れ」や「遅れ」の 防止、延滞金を課される心配がないこと、手数料もかからないこと、 保険料の引き落としに最大約2か月間の余裕があることなどが挙げら れます。（厚生労働省HP） 社会保険労務士試験におけるすべての法律における 「口座振替によ る納付 」は、申出を 「承認」と表現していま す。「許可」や「認可」 ではありません 。","s":"政府は、事業主から預金または貯金の払出しによる労働保険料（印紙保険料以外）の納付を申し出があった場合、その納付が確実と認められるときは口座振替を認めることができます。","e":"事業主が銀行口座からの自動引落しで労働保険料を納付したい場合、申出をすれば口座振替が認められます。納期限も通常より猶予されます。","p":"口座振替の対象は「印紙保険料以外」の労働保険料。口座振替の場合、延納の各期の納期限が約2週間延長される特例がある。","f":"07_労働保険徴収法7-確定保険料（申告、納付、還付、充当、認定決定）、 口座振替納付","pg":31},{"r":"法23条","t":"印紙保険料の納付方法","b":"◯1 事業主 （請負事業の一括の規定により 元請負人が事業主とされる 場合にあっては、当該事業に係る 労働 者のうち 元請負人 が使用する労働者以外の日雇労働被保険者 に係る 印紙保険料 については、当該 日雇労働被保 険者を使用 する下請負人 ）は、 日雇労働被保険者 に賃金を支払う都度 その者に係る 印紙保険料を納付 し なければならない。 印紙保険料の納付 事業主 は、日雇労働被保険者 に賃金を支払う都度 その者に係る 印紙保険料 を納付しなければならない。（法2 3条1項） 事業主 は、日雇労働被保険者 については、 一般保険料に加えて 「印紙保険料 」を納付することになる 。（コ ンメンタール23条）","s":"事業主は、日雇労働被保険者に賃金を支払うつど、その者の日雇労働被保険者手帳に雇用保険印紙を貼り、消印することで印紙保険料を納付します。","e":"日雇い労働者を使った日に、賃金の日額に応じた雇用保険印紙を手帳に貼って消印します。これが印紙保険料の納付になります。","p":"印紙保険料の納付方法は「雇用保険印紙の貼付＋消印」。請負事業の一括で元請が事業主とされる場合は、元請が使用する日雇労働者以外の者については下請事業主が納付。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":2},{"r":"則42条","t":"雇用保険印紙の購入手続き","b":"◯1 事業主 は、雇用保険印紙を購入 しようとするときは、 あらかじめ 、雇用保険印紙購入通帳交付申請書 を 所轄公共職業安定所長 に提出して、 雇用保険印紙購入通帳 の交付 を受けなければならない。 雇用保険印紙購入通帳 事業主 は、雇用保険印紙を購入 しようとするときは、 あらかじめ 、「雇用保険印紙購入通帳交付申請書 」を 所轄公共職業安定所長 に提出して、 雇用保険印紙購入通帳 の交付を受けなければならない。（則42条1項）","s":"事業主は雇用保険印紙を購入しようとするときは、あらかじめ所轄公共職業安定所長に申請書を提出して、雇用保険印紙購入通帳の交付を受けなければなりません。","e":"初めて日雇い労働者を雇う事業主は、まずハローワークで雇用保険印紙購入通帳をもらい、その後郵便局等で印紙を購入します。","p":"購入通帳の交付申請先は「所轄公共職業安定所長」。印紙の購入先は日本郵便株式会社（郵便局）。通帳なしでは購入できない。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":10},{"r":"則43条","t":"雇用保険印紙の購入","b":"◯1 事業主 は、 雇用保険印紙 を購入しよう とするときは、 雇用保険印紙購入申込書 に購入しようとする 雇用保険印紙の種類別枚数、購入年月日、労働保険番号並びに事業主の氏名又は名称及び住所又は所在地を記 入し、 雇用保険印紙 を販売する 日本郵便株式会社 の営業所 （郵便の業務を行うものに限る 。）に 提 出しなければならない。 雇用保険印紙の購入 事業主 は、雇用保険印紙を購入しようとするとき は、「 雇用保険印紙購入申込書 」に購入しようとする雇用 保険印紙の種類別枚数、購入年月日、労働保険番号並びに事業主の氏名または名称及び住所または所在地を記 入し、雇用保険印紙を販売する 日本郵便株式会社 の営業所 （郵便の業務 を行うものに 限る）に提出しなければ ならない。（則43条1項）雇用保険印紙購入通帳の雇用保険印紙購入申込書がなくなった場合 （つまり 、雇用保険印紙購入通帳を使い切った場合 ）における 、再交 付を申し出る申出期限は特に定められていません 。","s":"事業主は雇用保険印紙を購入するときは、購入申込書に必要事項を記載し、雇用保険印紙購入通帳を添えて、日本郵便株式会社の営業所に提出します。","e":"日雇い労働者を雇う建設業の事業主が、翌月分の雇用保険印紙をまとめて郵便局で購入する場合、購入申込書と通帳を提示します。","p":"購入先は「日本郵便株式会社の営業所」。通帳を添えて提出する。公共職業安定所では購入できない点に注意。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":13},{"r":"法24条","t":"印紙保険料納付状況の報告","b":"事業主 は、日雇労働被保険者を使用した 場合には、 印紙保険料の納付に関する帳簿 を備えて 、毎月における その 納付状況 を記載し、かつ、 翌月末日 までに当該 納付状況 を政府に報告 しなければならな い。 帳簿の調製及び報告 雇用保険印紙購入通帳の交付を受けている事業主 は、印紙保険料納付状況報告書 によって、 毎月における 雇 用保険印紙の受払状況 を翌月末日まで に、所轄公共職業安定所長 を経由して、 所轄都道府県労働局歳入徴収官 に報告しなければならない。（則54条、則78条1項2号） 印紙保険料納付計器の使用状況の報告 毎月における受払状況を 「翌月末日 」までに報告します 。「四半期 に1回ごとに 」報告するわけではありません 。 雇用保険印紙購入通帳の交付を受けている事業主は 、日雇労働被保 険者を 、「1人も使用せず 、印紙の受払いのない月 」であっても 、そ の旨を備考欄に記入して印紙保険料納付状況報告書による 報告をする 必要があります 。","s":"事業主は日雇労働被保険者を使用した場合、印紙保険料の納付に関する帳簿を備え、毎月の納付状況を記載し、翌月末日までに所轄都道府県労働局歳入徴収官に報告しなければなりません。","e":"4月中に日雇い労働者を使った事業主は、4月分の印紙保険料の納付状況を5月31日までに労働局に報告します。","p":"報告期限は「翌月末日」まで。報告先は「所轄都道府県労働局歳入徴収官」。帳簿の備付け義務もセット。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":18},{"r":"法25条","t":"印紙保険料の認定決定","b":"◯1 事業主 が印紙保険料 の納付を怠った 場合には、 政府は、その納付すべき 印紙保険料 の額を決定 し、これを 事業主に通知 する。 印紙保険料の認定決定 R06-09D 雇用保険印紙と納付計器を 「併用」して印紙保険料を納 付する場合には 、「印紙保険料納付状況報告書 」と併せて 「印紙保険 料納付計器使用状況報告書 」を提出しなければならないことになりま す。（コンメンタール24条） 雇用保険印紙と納付計器を併用して納付する場合に 、「印紙保険料 納付状況報告書 」によって報告するのではありません 。","s":"事業主が印紙保険料の納付を怠った場合、政府はその納付すべき印紙保険料の額を決定し、事業主に通知します。この場合、納付すべき額の25%の追徴金が課されます。","e":"印紙を貼り忘れた日がある場合、政府が未納分の額を決定して通知し、その額の25%が追徴金として上乗せされます。","p":"認定決定＋追徴金「100分の25」。一般保険料の認定決定（法19条4項）の追徴金「100分の10」との違いに注意。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":19},{"r":"法26条","t":"特例納付保険料","b":"◯1 雇用保険法第22条第5項（ 雇用保険遡及適用の特例 ）に規定する者（以下「 特例対象者 」とい う。）を雇用していた 事業主 が、第4条の規定により雇用保険に係る 保険関係が成立 していたにもかかわ らず、第4条の2第1項の規定による 届出をしていなかった 場合には、当該事業主（当該事業主の事業を 承継する者を含む。以下「 対象事業主 」という。）は、 特例納付保険料 として、対象事業主が第15条第 1項の規定による 納付する義務を履行していない一般保険料 （同法第14条第2項第2号に規定する厚生労 働省令で定める日から当該 特例対象者の離職の日までの期間に係るもの であって、その 徴収する権利が 時 効によって消滅している ものに限る 。）の額（雇用保険率 に応ずる部分の額に 限る。）のうち当該 特 例対象者 に係る額に相当する額として厚生労働省令で定めるところにより算定した額 に厚生労働省令で定める 額を加算した額 を納付することができる 。 特例納付保険料制度 事業主 が雇用保険の 被保険者資格の届出を行わなかった ことにより、 雇用保険が適用されていなかった者 に ついて、被保険者資格の 確認を行う日の2年前の日よりも前 の時期 に、賃金から雇用保険料の被保険者負担額を 控除されていた ことが確認された 場合には、事業主が届出を行わなかったことにより所定給付日数が短くなる などの不利益が生じないようにするため、 保険料の天引きがあったことが確認できる最も古い時期まで 被保険 者期間や所定給付日数を決定する 算定基礎期間などに 算入することができる 。（コンメンタール26条）","s":"雇用保険の届出を怠っていた事業主が遡って保険関係を成立させた場合、特例対象者に係る過去の雇用保険料を特例納付保険料として納付しなければなりません。","e":"2年以上前から雇用保険の届出をしていなかった事業主が、遡及適用を受ける場合、その期間分の保険料を特例納付保険料として納付します。","p":"「特例対象者」は雇用保険法22条5項の遡及適用の対象者。通常の時効（2年）を超える期間分も徴収できる特例制度。","f":"08_労働保険徴収法8-印紙保険料　特例納付保険料","pg":24},{"r":"法27条","t":"督促と滞納処分","b":"◯1 労働保険料 その他徴収法の規定による 徴収金 を納付しない者 があるときは、 政府は、期限を指定 し て督促 しなければならない。 ◯2 前項の規定によって 督促するときは、 政府は、納付義務者 に対して 督促状 を発する。この場合にお いて、 督促状 により 指定すべき 期限は、 督促状 を発する日から起算して 10日以上 経過した日 で なければならない。 督促 R05-雇08A R04-雇10E 労働保険料その他徴収法の規定による徴収金を納付しない者がある ときは、 政府 は、期限を指定して 督促しなければならない。（法27条1項）","s":"労働保険料を納付しない者がいる場合、政府は期限を指定して督促しなければなりません。督促を受けてもなお納付しない場合は、国税滞納処分の例により処分できます。","e":"保険料を滞納している会社に督促状が届き、それでも払わない場合は、会社の財産を差し押さえられることがあります。","p":"督促は「期限を指定して」行う。督促状の指定期限は「督促状を発する日から起算して10日以上経過した日」。滞納処分は「国税滞納処分の例による」。","f":"09_労働保険徴収法9-滞納に対する措置（督促、滞納処分、延滞金）","pg":2},{"r":"法29条","t":"先取特権の順位","b":"労働保険料その他徴収法の規定による徴収金 の先取特権の順位 は、 国税 及び 地方税 に次ぐもの と する。 先取特権の順位 労働保険料その他徴収法の規定による徴収金の 先取特権の順位 は、国税及び地方税 に次ぐものとする。（法2 9条） 徴収金につき差押え をしている場合に、 国税、地方税の交付要求 があったときは、 差押えに係る徴収金に優 先して配当しなければならない が、納付義務者が「 任意に 」国税に先んじて徴収金を納付してきた 場合にま で、先取特権の効力は及ばない 。（昭和56年9月25日労徴発68号）","s":"労働保険料その他徴収法の規定による徴収金の先取特権の順位は、国税及び地方税に次ぐものとされています。","e":"会社が倒産した場合、残った財産から支払う順番は、まず国税・地方税、その次が労働保険料です。一般の債権者よりは優先されます。","p":"順位は「国税及び地方税に次ぐ」。健康保険料や厚生年金保険料の先取特権（国税と同順位）との違いに注意。","f":"09_労働保険徴収法9-滞納に対する措置（督促、滞納処分、延滞金）","pg":10},{"r":"法28条","t":"延滞金","b":"◯1 政府は、第27条第1項の規定により 労働保険料 の納付を 督促 したとき は、労働保険料の額 に、 納期限の翌日 から その完納又は財産差押えの日の前日 までの期間の日数 に応じ、 年14.6 パーセ ント（当該 納期限の翌日 から 2月を経過する日 までの期間については、 年7.3 パーセント ）の割合を 乗じて計算した 延滞金 を徴収する 。ただし、 労働保険料の額 が1,000円未満 であるときは、 延滞 金を徴収しない 。 延滞金の徴収 政府は、労働保険料の納付 を督促したときは、 延滞金 を徴収する。（法28条1項）","s":"督促した労働保険料を完納しない場合、納期限の翌日からその完納または財産差押えの日の前日までの日数に応じて、年14.6%（最初の2か月は年7.3%）の割合で延滞金が徴収されます。","e":"7月10日の納期限を過ぎて9月10日に完納した場合、7月11日から9月9日までの延滞金がかかります。最初の2か月は低率、その後は高率です。","p":"延滞金の率「年14.6%」「最初の2か月は年7.3%」（特例基準割合による軽減あり）。督促状の指定期限までに完納した場合は延滞金不徴収。1,000円未満切捨て。","f":"09_労働保険徴収法9-滞納に対する措置（督促、滞納処分、延滞金）","pg":11},{"r":"法33条","t":"労働保険事務組合","b":"◯1 中小企業等協同組合法第3条の 事業協同組合 又は協同組合連合会 その他の 事業主の団体 又は その 連合団体 （法人でない団体又は連合団体であって 代表者の定めがないものを除く 。）は、団体の構成員又 は連合団体を構成する団体の構成員である事業主その他厚生労働省令で定める 事業主 （厚生労働省令で定める 数を超える数の労働者を使用する事業主を除く。） の委託 を受けて、これらの者が行うべき 労働保険料の納付 その他の 労働保険に関する事項 （印紙保険料 に関する事項を 除く。以下「 労働保険事務 」という。） を 処理することができる。 労働保険事務組合 R07-災10B 事業主の団体またはその連合団体 （法人でない団体または連合団体 であって 代表者の定めのない ものを除く ）は、 団体の構成員である事業主 または それ以外の事業主 であって厚生労働省令で定める数を超え ない数の労働者を使用するものの 委託を受けて 労働保険事務を処理 することができる。当該団体を「 労働保険 事務組合 」と呼称する。（法33条1項）","s":"事業主の団体やその連合団体が厚生労働大臣の認可を受けて、中小事業主に代わって労働保険事務を処理する団体が労働保険事務組合です。委託できるのは中小企業の事業主に限られます。","e":"商工会や事業協同組合が労働保険事務組合の認可を受けて、加入する中小企業の保険料申告・納付をまとめて代行します。","p":"認可は「厚生労働大臣」。委託できるのは中小事業主（金融・保険・不動産・小売：50人以下、卸売・サービス：100人以下、その他：300人以下）。事務組合は保険料自体を負担するわけではない。","f":"11_労働保険徴収法11-労働保険事務組合","pg":3},{"r":"法34条","t":"事務組合委託事業主への通知等","b":"政府は、労働保険事務組合 に労働保険事務の処理を委託した事業主 に対してすべき労働保険関係法令の規定 による 労働保険料の 納入の告知 その他の通知 及び 還付金の還付 については、これを 労働保険事務組 合に対してすることができる。この場合において、 労働保険事務組合 に対してした 労働保険料の 納入の告 知その他の通知及び 還付金の還付 は、当該 事業主 に対してした ものと みなす 。 労働保険事務組合は 、事業主の委託を受けて 、一般拠出金の納付 そ の他一般拠出金に関する事項 （一般拠出金事務 ）を処理することもで きます 。（石綿による健康被害の救済に関する法律38条2項）","s":"労働保険事務組合に事務処理を委託した事業主に対する労働保険料の納入告知やその他の通知・還付金の還付は、事務組合に対して行えば足ります。","e":"事務組合に委託している会社への保険料の通知は、会社に直接ではなく事務組合に送れば有効です。事務組合が窓口になります。","p":"通知・還付は事務組合に対して行えばOK。事務組合が事業主に代わって一括処理する制度趣旨を理解する。","f":"11_労働保険徴収法11-労働保険事務組合","pg":13},{"r":"法35条","t":"事務組合に交付した金銭の効果","b":"◯1 第33条第1項の 委託に基づき、 事業主 が労働保険関係法令 の規定による 労働保険料その他の徴収金 の納付 のため、 金銭を 労働保険事務組合に交付した ときは、その 金額の限度 で、労働保険事務組合 は、 政府に対して当該 徴収金 の納付の責めに任ずる ものとする。 徴収金の納付責任 労働保険事務組合 は、事業主から労働保険関係法令の規定による労働保険料その他の徴収金の納付のため、 金銭の交付を受けたとき は、その金額の限度 で、政府に対して当該 徴収金 の納付の責めを負う 。（法35条1 項）","s":"事業主が労働保険料納付のために労働保険事務組合に金銭を交付した場合、その金額の限度で保険料を政府に納付したものとみなされます。事務組合がその後納付を怠っても、事業主は責任を問われません。","e":"中小企業の社長が事務組合に保険料30万円を渡した時点で、政府に対しては30万円を納付したのと同じ扱いになります。事務組合が着服しても社長に責任はありません。","p":"事業主にとって「交付した時点で納付したとみなされる」保護規定。事務組合は政府に対して連帯納付義務を負う点も重要。","f":"11_労働保険徴収法11-労働保険事務組合","pg":16},{"r":"法36条","t":"事務組合の帳簿備付け","b":"労働保険事務組合 は、その処理する 労働保険事務 に関する事項を記載した 帳簿 を事務所に備えて おかなければならない 。 帳簿の備付け 労働保険事務組合 は、その処理する 労働保険事務 に関する事項を記載した 帳簿を事務所に備えておかなけれ ばならない 。（法36条） 備えておかなければならない帳簿 は、次の通りである。（則68条） 帳簿の備付け 1. 労働保険事務等処理 委託事業主名簿 2. 労働保険料等 徴収及び納付簿 3. R03-雇09A 雇用保険被保険者関係届出事務等処理簿","s":"労働保険事務組合は、その処理する労働保険事務に関する事項を記載した帳簿を事務所に備えておかなければなりません。","e":"事務組合は、委託事業主の保険料の申告・納付状況などを記載した帳簿を事務所に常備する必要があります。","p":"帳簿の保存期間は「3年間」（則69条）。帳簿に記載すべき事項は省令で規定。","f":"11_労働保険徴収法11-労働保険事務組合","pg":22},{"r":"整備法23条","t":"事務組合への報奨金","b":"政府は、当分の間 、事業主の委託に基づき、 労働保険事務組合が納付すべき労働保険料 が督促すること なく完納された とき、その他その 納付の状況 が著しく良好 であると認めるとき は、当該 労働保険事務 組合に対して、 予算の範囲内 で、 報奨金 を交付する ことができる。 報奨金 政府は、当分の間 、労働保険事務組合が納付すべき 労働保険料 が督促することなく 完納された とき、その他 その納付の状況が著しく良好 であると認めるとき は、当該 労働保険事務組合 に対して、 予算の範囲内 で、報奨 金を交付する ことができる。（整備法23条）","s":"当分の間、事業主の委託に基づき労働保険事務組合が納付すべき労働保険料が督促なく完納された場合等に、政府は事務組合に報奨金を交付することができます。","e":"事務組合が委託事業主の保険料をきちんと期限内に納付した場合、政府から報奨金が支給されます。これは事務組合の活動を促進するためのインセンティブです。","p":"報奨金の額は納付した保険料の額等に応じて算定。「当分の間」の暫定措置。「督促なく完納」等の要件がある。","f":"11_労働保険徴収法11-労働保険事務組合","pg":29},{"r":"法31条","t":"被保険者の保険料負担","b":"◯1 次の各号に掲げる 雇用保険の 被保険者 は、当該各号に掲げる額を 負担する ものとする。 1. 労災保険 及び 雇用保険 に係る 保険関係が成立している事業 に係る 被保険者 …イ.に掲げる額か らロ.に掲げる額を減じた額の 2分の1 の額 イ. 当該事業に係る 一般保険料の額 のうち 雇用保険率 に応ずる部分の額 ロ. イ.の額に相当する額に 二事業率 を乗じて得た額 2. 雇用保険に係る保険関係のみが成立している事業 に係る 被保険者 …イ.に掲げる額からロ.に掲げる額を 減じた額の 2分の1 の額 イ. 当該事業に係る 一般保険料 の額 ロ. イ.の額に相当する額に 二事業率 を乗じて得た額 労働保険料の納付義務 R07-災09B 労働保険料 の申告・納付義務 は事業主 が負う。（法15条）","s":"雇用保険の被保険者は、一般保険料のうち雇用保険率に応ずる部分の額の一部（被保険者負担分）を負担します。労災保険料は全額事業主負担で、被保険者の負担はありません。","e":"雇用保険料率が15.5/1000の場合、そのうち被保険者負担は6/1000（事業の種類による）で、残りは事業主が負担します。労災保険料は全額会社負担です。","p":"「労災保険料＝全額事業主負担」「雇用保険料＝事業主＋被保険者で分担」の区分が超重要。雇用保険二事業の保険料は全額事業主負担。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":2},{"r":"法32条","t":"被保険者負担額の控除","b":"◯1 事業主 は、 被保険者の負担すべき額に相当する額 を当該 被保険者 に支払う 賃金から控除 するこ とができる。この場合において、事業主は、 労働保険料控除 に関する 計算書 を作成 し、その 控除額 を当 該被保険者に知らせなければならない 。 賃金からの控除 事業主 は、被保険者の負担すべき額に相当する額 を当該 被保険者 に支払う 賃金から控除することができる 。 この場合において、 事業主 は、労働保険料控除 に関する 計算書 を作成し、その 控除額 を当該 被保険者 に知らせ なければならない 。（法32条1項） 日雇労働被保険者は 、一般保険料の被保険者負担分 のほか 、印紙保 険料の被保険者負担分 を負担しなければなりません 。 日雇労働被保険者を使用する事業主は 、一般保険料の事業主負担分 のほか 、印紙保険料の事業主負担分 を負担しなければなりません 。 賃金からの控除は 、被保険者に賃金を支払う都度 、「当該賃金に応 ずる額 」についてのみ行うことができます 。（則60条1項）","s":"事業主は、被保険者の負担すべき額に相当する額を、被保険者に支払う賃金から控除することができます。その場合、労働保険料控除に関する計算書を作成して、その控除額を被保険者に知らせなければなりません。","e":"毎月の給与明細で「雇用保険料」として天引きされている額が、この規定に基づく控除です。事業主は控除の計算書を作って従業員に知らせる義務があります。","p":"「賃金から控除できる」規定。「計算書の作成」と「被保険者への通知」が義務。日雇労働被保険者の場合は賃金を支払う都度控除。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":7},{"r":"法41条","t":"時効","b":"◯1 労働保険料 その他徴収法の規定による 徴収金を徴収 し、又はその 還付を受ける権利 は、これらを行使す ることができる時 から 2年 を経過したとき は、時効によって消滅 する。 ◯2 政府が行う 労働保険料 その他徴収法の規定による 徴収金の徴収の告知 又は督促は、 時効更新の効力 を生ずる。 平成28年4月1日以後 、それまでの規定 （労働保険料その他この法 律の規定による徴収金に関する処分の取消しの訴えは 、当該処分につ いての審査請求に対する厚生労働大臣の裁決または当該処分について の異議申立てに対する厚生労働大臣の決定を経た後でなければ 、提起 することができない ）が廃止されたことにより 、直ちにその取消の訴 えを提起することができるようになりました 。","s":"労働保険料その他徴収法の規定による徴収金を徴収し、またはその還付を受ける権利は、行使できる時から2年で時効消滅します。","e":"2024年7月10日が納期限の保険料について、政府が何もしないまま2026年7月10日を過ぎると、時効で徴収できなくなります。","p":"時効は「2年」。労災保険の保険給付を受ける権利（2年または5年）や雇用保険の失業等給付を受ける権利（2年）との比較が出る。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":13},{"r":"法42条","t":"報告・届出等","b":"行政庁 は、保険関係が成立 し、若しくは 成立していた 事業の 事業主 又は労働保険事務組合 若しくは 労働保険 事務組合であった団体 に対して、徴収法の施行に関し 必要な報告 、文書の提出 又は 出頭 を命ず ることができる。 報告・出頭など R06-災10B 行政庁 は、保険関係が成立 し、若しくは 成立していた 事業の 事業主 または 労働保険事務組合 若し くは労働保険事務組合であった団体 に対して、徴収法の施行に関し 必要な報告 、文書の提出 または 出頭を文書 によって 命ずる ことができる。（法42条、則74条） 「過去に労働保険事務組合であった団体 」に対しても命ずることが できます 。","s":"行政庁は、保険関係が成立している事業の事業主や労働保険事務組合等に対して、徴収法の施行に必要な報告・届出・文書の提出を命じることができます。","e":"労働局が会社に対して「賃金台帳と出勤簿を提出してください」と求めることができます。","p":"対象は「事業主」と「労働保険事務組合」。保険関係が「成立していた」（過去形）事業も含まれる。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":19},{"r":"法43条","t":"立入検査","b":"◯1 行政庁 は、徴収法の施行のため必要があると認めるときは、当該 職員に、保険関係が成立 し、若しくは 成立していた 事業の 事業主 又は労働保険事務組合 若しくは 労働保険事務組合であった団体 の事務所に 立ち 入り 、関係者に対して 質問 させ、又は 帳簿書類の検査 をさせる ことができる。 立入検査 行政庁 は、徴収法の施行のため必要があると認めるときは、当該 職員に、保険関係が成立 し、若しくは 成立 していた 事業の 事業主 または 労働保険事務組合 若しくは 労働保険事務組合であった団体 の事務所 に立ち入り 、 関係者 に対して 質問させ、または 帳簿書類の検査 をさせることができる。（法43条1項）","s":"行政庁は、徴収法の施行のため必要があるときは、職員に事業主の事業場や労働保険事務組合の事務所に立ち入り、関係者への質問や帳簿書類の検査をさせることができます。","e":"労働局の職員が予告なく会社を訪れ、賃金台帳や保険料の申告書類を検査し、担当者に質問することができます。","p":"「立入検査」「質問」「帳簿書類の検査」の権限。職員は「その身分を示す証票を携帯」しなければならない。犯罪捜査のための権限ではない。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":20},{"r":"法46条","t":"罰則","b":"事業主 が次の各号のいずれかに該当するときは、 6月以下の拘禁刑又は30万円以下の罰金 に処す る。労災保険法第35条第1項に規定する団体が第5号又は第6号に該当する場合におけるその違反行為をした 当該団体の代表者又は代理人、使用人その他の従業者も、同様とする。 1. 第23条第2項の規定に違反して 雇用保険印紙を貼らず 、又は 消印しなかった 場合 2. 第24条の規定に違反して 帳簿を備えて置かず 、帳簿に記載せず 、若しくは 虚偽の記載 をし、又は 報告を せず、若しくは 虚偽の報告 をした場合 3. 第42条の規定による命令に違反して 報告をせず 、若しくは 虚偽の報告 をし、又は 文書を提出せず 、若し くは虚偽の記載をした文書を提出 した場合 4. 第43条第1項の規定による当該職員の質問に対して 答弁をせず 、若しくは 虚偽の答弁 をし、又は 検査を 拒み、妨げ、若しくは 忌避した場合 事業主に対する罰則 2026改正 事業主 が次のいずれかに該当するときは、 6か月以下の拘禁刑または30万円以下の罰金 に処する。 事業主に対する罰則 1. 法23条2項（印紙保険料の納付）の規定に違反して 雇用保険印紙を貼らず 、または 消印しなかった 場合 2. 法24条（印紙保険料の納付に関する帳簿の調製及び報告）の規定に違反して 帳簿を備えて置かず 、帳簿に 記載せず 、若しくは 虚偽の記載 をし、または 報告をせず 、若しくは 虚偽の報告 をした場合 3. 法42条（報告・出頭など）の規定による命令に違反して 報告をせず 、若しくは 虚偽の報告 をし、または 文 書を提出せず 、若しくは 虚偽の記載をした文書を提出 した場合 4. 法43条1項（立入検査）の規定による当該職員の質問に対して 答弁をせず 、若しくは 虚偽の答弁 をし、ま たは検査を拒み 、妨げ、若しくは 忌避した場合","s":"保険料の申告書を提出しない、虚偽の報告をする等の違反を行った事業主には、6月以下の拘禁刑または30万円以下の罰金が科されます。","e":"概算保険料の申告書を提出しなかったり、賃金総額を低く偽って申告したりした事業主は、罰則の対象になります。","p":"「6月以下の拘禁刑または30万円以下の罰金」。申告書不提出、虚偽申告、印紙の不正使用、帳簿不備等が対象。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":21},{"r":"法48条","t":"両罰規定","b":"◯1 法人（法人でない労働保険事務組合及び労災保険法第35条第1項に規定する団体を含む。以下同じ。） の代表者 又は法人若しくは人の 代理人 、使用人その他の 従業者 が、その法人又は人の業務に関して、第46条 及び第47条の 違反行為をした ときは、 行為者 を罰する ほか、その 法人又は人に対しても 、各本条の 罰 金刑 を科する 。 両罰規定 法人の代表者 または法人若しくは人の代理人、使用人その他の 従業者 が、その法人または人の業務に関し て、法46条及び法47条（罰則）の 違反行為をした ときは、行為者を罰する ほか、その 法人または人に対して も、各本条の 罰金刑 を科する。（法48条1項） 「立入検査 」の規定に違反した場合には 、「6か月以下の拘禁刑 」 に処せられる場合があります 。 いわゆる 「両罰規定 」の規定です 。","s":"法人の代表者や従業者が業務に関して違反行為をした場合、行為者本人だけでなく法人にも罰金刑が科されます。","e":"経理担当者が保険料の申告で虚偽記載をした場合、その担当者だけでなく会社（法人）も罰金を科されます。","p":"両罰規定＝「行為者」＋「法人（事業主）」の両方を罰する。法人でない労働保険事務組合も対象に含まれる。","f":"12_労働保険徴収法12-労働保険料の負担、不服申立て、雑則、罰則","pg":22}],"労働一般常識":[{"r":"労組法1条","t":"労働組合法の目的","b":"","s":"労働組合法は、労働者が使用者と対等の立場で交渉できるようにし、労働者の地位を向上させることを目的としています。団結権・団体交渉権・団体行動権（争議権）を保障します。","e":"従業員が一人で社長と賃上げ交渉しても対等になれないので、労働組合を作って団体で交渉する権利を法律で保障しています。","p":"憲法28条の労働三権（団結権・団体交渉権・団体行動権）を具体化した法律。「対等の立場」「地位の向上」がキーワード。","f":"","pg":0},{"r":"労組法2条","t":"労働組合の定義","b":"","s":"労働組合とは、労働者が主体となって自主的に、労働条件の維持改善その他経済的地位の向上を主たる目的として組織する団体です。使用者の利益代表者が参加するものや、使用者から経費援助を受けるものは該当しません。","e":"会社の従業員が自分たちで集まって「給料を上げてほしい」と活動する団体は労働組合ですが、社長が組合の運営費を出している団体は自主性がないため労働組合とは認められません。","p":"労働組合の4要件：①労働者が主体、②自主的、③労働条件の維持改善等が主目的、④団体又はその連合団体。使用者の「利益代表者」の範囲と「経費援助」の例外（最小限の事務所供与等）が出題される。","f":"","pg":0},{"r":"労組法3条","t":"労働組合法上の労働者","b":"","s":"労働組合法上の「労働者」とは、職業の種類を問わず、賃金・給料その他これに準ずる収入によって生活する者をいいます。労基法の労働者より広い概念です。","e":"現在失業中の人やフリーランスでも、賃金等に類する収入で生活していれば労働組合法の「労働者」に該当し得ます。労基法の労働者は「使用される者」ですが、労組法はそれより広いです。","p":"労基法の労働者（法9条）との比較が超頻出。労組法は「使用される」の要件がなく「収入によって生活する者」と広い。失業者も含まれる。","f":"","pg":0},{"r":"労組法6条","t":"団体交渉の権限","b":"","s":"労働組合の代表者または組合から委任を受けた者は、組合または組合員のために使用者と団体交渉をし、労働協約を締結する権限を持っています。","e":"組合の委員長だけでなく、組合が「この人に任せます」と委任した弁護士なども、会社との交渉に参加して労働協約を結ぶことができます。","p":"交渉権限を持つのは「代表者」又は「委任を受けた者」。上部団体の役員も委任があれば交渉に参加可能。使用者は正当な理由なく団体交渉を拒否できない（不当労働行為）。","f":"","pg":0},{"r":"労組法8条","t":"損害賠償請求の制限","b":"","s":"使用者は、正当な争議行為（ストライキ等）によって損害を受けたとしても、労働組合やその組合員に損害賠償を請求することはできません。","e":"正当なストライキで工場が1週間止まって売上が減っても、会社は組合に損害賠償を請求できません。ただし、暴力を伴う違法なストライキは別です。","p":"「正当なもの」であることが条件。違法な争議行為（暴力行為等）には適用されない。民事免責の規定（刑事免責は労組法1条2項）。","f":"","pg":0},{"r":"労組法7条","t":"不当労働行為","b":"","s":"使用者は以下の行為（不当労働行為）をしてはいけません。①組合員であること等を理由とする不利益取扱い、②正当な理由のない団体交渉拒否、③組合の運営への支配介入・経費援助、④労働委員会への申立て等を理由とする不利益取扱い。","e":"「組合に入ったらクビにするぞ」（不利益取扱い）、「組合とは話し合わない」（団交拒否）、「御用組合を作らせる」（支配介入）はすべて不当労働行為です。","p":"4類型の正確な区分が頻出。「黄犬契約」（組合に入らないことを雇用条件にする）も不利益取扱い。経費援助の例外（最小限の事務所供与、福利その他の基金への寄付、勤務時間中の協議・交渉の賃金保障）も要チェック。","f":"","pg":0},{"r":"労組法14条","t":"労働協約の効力発生要件","b":"","s":"労働協約は、書面に作成し、両当事者が署名または記名押印することによって効力を生じます。口頭の合意だけでは労働協約としての効力はありません。","e":"組合と会社が賃上げについて合意しても、書面にして双方が署名しなければ労働協約にはなりません。","p":"「書面作成」＋「署名又は記名押印」の2要件。「署名」と「記名押印」は選択的（どちらでもOK）。口頭合意には労働協約としての効力なし。","f":"","pg":0},{"r":"労組法15条","t":"労働協約の有効期間","b":"","s":"労働協約には3年を超える有効期間を定めることができません。3年を超える期間を定めた場合は、3年の有効期間を定めたものとみなされます。期間の定めがない場合は、90日前の予告で解約できます。","e":"「5年間有効」と定めた労働協約は、自動的に「3年間有効」として扱われます。期間を定めない場合は、90日前に予告すればいつでも解約可能です。","p":"「3年」が上限。超えた場合は「3年に短縮」（無効ではない）。期間の定めがない場合の解約予告は「90日前」。","f":"","pg":0},{"r":"労組法16条","t":"労働協約の規範的効力","b":"","s":"労働協約に定める労働条件等の基準に違反する労働契約の部分は無効となり、無効となった部分は協約の基準によります。労働契約に定めがない部分も同様です。","e":"労働協約で「基本給は月25万円以上」と定めているのに、個別の労働契約で「月20万円」としても、20万円の部分は無効となり自動的に25万円になります。","p":"「規範的効力」＝協約の基準が個別の労働契約に直接適用される効力。労基法13条（法律の基準への補充）と同じ構造。「有利原則」（協約より有利な契約は有効か）の論点も出題される。","f":"","pg":0},{"r":"労組法17条","t":"労働協約の一般的拘束力（事業場単位）","b":"","s":"一つの工場・事業場で常時使用される同種の労働者の4分の3以上が一つの労働協約の適用を受けるようになったとき、その事業場の他の同種の労働者にも自動的にその協約が適用されます。","e":"工場の従業員100人中80人が組合員で労働協約の適用を受けている場合、残り20人の非組合員にも同じ労働協約が適用されます。","p":"「4分の3以上」が要件。適用されるのは「他の同種の労働者」。事業場単位の拡張適用。地域的拡張適用（法18条）との違いを整理。","f":"","pg":0},{"r":"労組法18条","t":"労働協約の地域的拘束力","b":"","s":"一つの地域で同種の労働者の大部分が一つの労働協約の適用を受けるとき、当事者の申立てに基づき、厚生労働大臣または都道府県知事が決定すれば、その地域の他の同種の労働者にも適用を拡張できます。","e":"ある県の金属加工業の労働者の大部分が同じ労働協約の適用を受けている場合、厚生労働大臣等の決定により、その県の他の金属加工業の労働者にも適用が拡張されます。","p":"要件は「大部分」（具体的な割合は法定されていない）。「当事者の双方又は一方の申立て」が必要。決定権者は「厚生労働大臣又は都道府県知事」。労働委員会の意見を聴く必要がある。","f":"","pg":0},{"r":"労組法19条","t":"労働委員会の組織","b":"","s":"労働委員会は、使用者委員・労働者委員・公益委員の三者で構成されます。中央労働委員会と都道府県労働委員会があります。各委員の数は同数です。","e":"都道府県労働委員会は、経営者側・労働者側・学識経験者等の公益委員が同じ人数で構成されます。中立性を保つため三者構成になっています。","p":"三者構成（使用者委員・労働者委員・公益委員）で各同数。公益委員の任命には使用者委員・労働者委員の同意が必要。中央労働委員会の委員は「15人」ずつ。","f":"","pg":0},{"r":"労組法20条","t":"労働委員会の権限","b":"","s":"労働委員会は、不当労働行為事件の審査等のほか、労働争議のあっせん・調停・仲裁を行う権限を持っています。","e":"会社が組合員を不当に解雇した場合の不当労働行為の審査や、労使の対立が激しくなった場合の調停を行うのが労働委員会の仕事です。","p":"権限は大きく2つ：①不当労働行為の審査、②労働争議の調整（あっせん・調停・仲裁）。労働組合の資格審査も行う。","f":"","pg":0},{"r":"労組法27条","t":"不当労働行為の審査手続き","b":"","s":"労働委員会は、不当労働行為の申立てを受けたときは、遅滞なく調査を行い、必要があれば審問を行います。審問では当事者に証拠の提出と証人への反対尋問の機会を与えなければなりません。","e":"「不当に解雇された」と組合員が労働委員会に申し立てると、委員会は調査を開始し、両者の言い分を聞く審問を行います。","p":"手続きの流れ：申立て→調査→審問→命令。申立期間は「行為の日から1年以内」。審問は公開で行われる。","f":"","pg":0},{"r":"労組法27条の12","t":"不当労働行為の命令","b":"","s":"労働委員会は、事件が命令を発するのに熟したときは、事実認定を行い、申立人の請求を全部もしくは一部認容するか、棄却する命令を出します。命令書には理由を付けなければなりません。","e":"不当解雇の審査で組合側の主張が認められれば、「解雇を撤回して職場に戻しなさい」「バックペイ（遡及賃金）を支払いなさい」という救済命令が出されます。","p":"命令の種類は「認容」と「棄却」。「却下」は別。命令書の写しは当事者に交付する。命令は交付の日から効力を生じる。","f":"","pg":0},{"r":"労組法27条の15","t":"都道府県労働委員会の命令に対する再審査","b":"","s":"都道府県労働委員会の救済命令等の交付を受けた使用者は、15日以内に中央労働委員会に再審査を申し立てることができます。","e":"都道府県労働委員会から「解雇撤回」の命令を受けた会社は、不服があれば15日以内に中央労働委員会に再審査を申し立てられます。","p":"再審査の申立期間は「15日以内」。使用者側からの申立て。再審査中も都道府県労働委員会の命令は効力を有する（緊急命令制度あり）。","f":"","pg":0},{"r":"労組法27条の19","t":"救済命令の確定","b":"","s":"使用者が都道府県労働委員会の命令について中央労働委員会に再審査を申し立てないとき、または中央労働委員会が命令を発したときは、確定した命令に違反した場合に過料が科されます。","e":"「解雇を撤回しなさい」という確定した命令に従わない会社には、50万円以下の過料が科されます。","p":"確定した命令への違反は「50万円以下の過料」。取消訴訟との関係（裁判所への出訴は命令交付から30日以内）も重要。","f":"","pg":0},{"r":"労調法9条","t":"争議行為の届出義務","b":"","s":"争議行為が発生したときは、その当事者は直ちに労働委員会または都道府県知事に届け出なければなりません。","e":"組合がストライキを実施したら、直ちに労働委員会か都道府県知事に「ストライキを行いました」と届け出る義務があります。","p":"届出は「直ちに」。届出先は「労働委員会又は都道府県知事」。届出を怠っても争議行為自体が違法になるわけではない（届出は事後的）。公益事業の争議行為の予告（労調法37条）とは別。","f":"","pg":0},{"r":"労調法37条","t":"公益事業の争議行為の予告","b":"","s":"公益事業に関する争議行為を行う場合、少なくとも10日前までに労働委員会及び厚生労働大臣（都道府県知事）に通知しなければなりません。","e":"電力会社の組合がストライキを計画する場合、実施日の10日前までに労働委員会と厚生労働大臣に通知する必要があります。","p":"「10日前」までに通知。公益事業は「運輸」「郵便・信書便・電気通信」「水道・電気・ガス」「医療・公衆衛生」の4業種。予告なしの争議行為には罰則あり。","f":"","pg":0},{"r":"労調法36条","t":"安全保持施設の維持","b":"","s":"工場や事業場の安全保持施設の正常な維持・運行を停止したり妨げたりする行為は、争議行為としても行うことができません。","e":"ストライキ中であっても、工場のボイラーの安全弁を止めたり、病院の救急設備を停止させたりすることは禁止されています。","p":"争議行為であっても「安全保持施設」の停廃は絶対禁止。これに違反した争議行為は正当性を失う。","f":"","pg":0},{"r":"労調法12条","t":"あっせん","b":"","s":"労働争議が発生したとき、労働委員会の会長は、関係当事者の申請または職権で、あっせん員名簿から指名したあっせん員にあっせんを行わせます。","e":"労使交渉が行き詰まった場合、労働委員会の会長が中立の立場のあっせん員を指名して、双方の間に入って解決を図ります。","p":"あっせんの開始：「当事者の双方もしくは一方の申請」又は「職権」。あっせん員は「あっせん員名簿」から指名。あっせん案に法的拘束力はない。","f":"","pg":0},{"r":"労調法30条","t":"仲裁","b":"","s":"労働委員会は、関係当事者の双方からの申請があった場合、労働協約に定めがある場合、または公益事業で特別調整が必要な場合に仲裁を行います。","e":"労使双方が「第三者に判断を委ねよう」と合意した場合、労働委員会の仲裁委員会が判断を下します。","p":"仲裁の開始要件3つ：①双方からの申請、②協約の定め、③公益事業等の特別調整。あっせん・調停と異なり「一方からの申請」では原則開始しない。","f":"","pg":0},{"r":"労調法34条","t":"仲裁裁定の効力","b":"","s":"仲裁裁定は労働協約と同一の効力を持ちます。つまり、仲裁裁定の内容は当事者を法的に拘束します。","e":"仲裁委員会が「賃金を5%引き上げること」と裁定したら、それは労働協約と同じ効力があり、会社は従わなければなりません。","p":"仲裁裁定＝労働協約と同一の効力。あっせん案や調停案とは異なり法的拘束力がある。調停案は「受諾勧告」に過ぎない点との対比が重要。","f":"","pg":0},{"r":"労契法4条","t":"労働契約の内容の理解促進","b":"","s":"使用者は労働条件や契約内容について労働者の理解を深めるようにし、労使双方は労働契約の内容をできる限り書面で確認するものとされています。","e":"会社は入社時に労働条件を丁寧に説明し、労働契約書を書面で交わすよう努めるべきです。「聞いていなかった」というトラブルを防ぎます。","p":"努力義務規定（「するものとする」）。罰則なし。労基法15条の労働条件明示義務（義務規定）との違いに注意。","f":"","pg":0},{"r":"労契法5条","t":"安全配慮義務","b":"","s":"使用者は、労働契約に伴い、労働者がその生命・身体等の安全を確保しつつ労働できるよう、必要な配慮をしなければなりません。","e":"会社は従業員が安全に働けるように、機械の安全装置を設置したり、長時間労働による健康被害を防いだりする義務があります。メンタルヘルス対策も含まれます。","p":"判例法理を明文化した規定。「必要な配慮」は一律ではなく状況に応じて判断。違反すれば債務不履行として損害賠償責任。労安衛法の義務とは別。","f":"","pg":0},{"r":"労契法10条","t":"就業規則変更による労働条件の変更","b":"","s":"使用者が就業規則の変更により労働条件を不利益に変更する場合、変更後の規則を周知させ、かつ変更が合理的であれば、変更後の就業規則が労働契約の内容となります。","e":"会社が退職金制度を変更して支給額を減らす場合、従業員に周知させ、かつ変更に合理性（会社の経営状況や代償措置等）があれば有効です。","p":"合理性の判断要素：①不利益の程度、②変更の必要性、③変更後の内容の相当性、④労働組合等との交渉状況、⑤その他の事情。「周知」＋「合理性」の両方が必要。","f":"","pg":0},{"r":"労契法11条","t":"就業規則の変更手続き","b":"","s":"就業規則の変更手続きは、労働基準法89条（届出義務）及び90条（意見聴取義務）に従います。","e":"就業規則を変更する場合は、過半数代表者の意見を聴いた上で、労基署に届け出る必要があります。","p":"労契法10条の「合理性」の判断と、労基法の手続き要件は別問題。手続きを経ていなくても合理性があれば変更は有効となり得る（判例）。","f":"","pg":0},{"r":"労契法13条","t":"法令・労働協約との関係","b":"","s":"就業規則が法令または労働協約に反する場合、その反する部分については就業規則による労働契約の内容の変更等の規定は適用されず、法令または労働協約が適用されます。","e":"就業規則で「残業手当は20%増し」と定めても、労基法の「25%以上」に違反するので、法律の基準が適用されます。","p":"効力の優先順位：法令＞労働協約＞就業規則＞労働契約。この序列は頻出。","f":"","pg":0},{"r":"労契法21条","t":"労働契約法の適用除外","b":"","s":"労働契約法は、国家公務員及び地方公務員には適用されません。また、使用者が同居の親族のみを使用する場合の労働契約にも適用されません。","e":"市役所の公務員には労働契約法は適用されません。また、家族だけで経営する商店にも適用されません。","p":"適用除外は「国家公務員」「地方公務員」「同居の親族のみを使用する場合」。労基法の適用除外との比較が出題される。船員には一部適用。","f":"","pg":0},{"r":"労働時間等設定改善法1条の2","t":"労働時間等の定義","b":"","s":"「労働時間等」とは労働時間・休日・年次有給休暇その他の休暇を指し、「労働時間等の設定」とはこれらの決定や変更を意味します。","e":"会社が「週休2日制にする」「有休を取りやすくする」といった取り組みは、労働時間等の設定の改善にあたります。","p":"「労働時間等の設定改善」は事業主の努力義務。労働時間等設定改善委員会を設置して労使で話し合うことが求められる。","f":"","pg":0},{"r":"個別労働紛争解決促進法22条","t":"個別労働紛争解決促進法の適用除外","b":"","s":"個別労働関係紛争解決促進法は、国家公務員及び地方公務員には原則として適用されません。ただし、行政執行法人の職員や地方公営企業の職員等には適用されます。","e":"一般的な公務員の紛争はこの法律の対象外ですが、国立印刷局の職員や市営バスの運転手などには適用されます。","p":"適用除外の範囲と例外をセットで覚える。この法律の制度は①総合労働相談、②助言・指導、③あっせんの3つ。","f":"","pg":0},{"r":"パート有期法2条の2","t":"短時間・有期雇用労働者の就業機会","b":"","s":"短時間・有期雇用労働者やそうなろうとする者は、生活との調和を保ちつつ、その意欲と能力に応じて就業できる機会が確保されるよう努力すべきとされています。","e":"パートタイマーや契約社員も、家庭と両立しながらスキルアップして正社員を目指せるような環境づくりが求められています。","p":"労働者自身の努力義務規定。パート有期法の目的（通常の労働者との均等・均衡待遇）と関連。","f":"","pg":0},{"r":"パート有期法24条","t":"紛争解決の援助","b":"","s":"都道府県労働局長は、短時間・有期雇用労働者と事業主の紛争について、当事者から援助を求められた場合に、助言・指導・勧告を行うことができます。","e":"パートタイマーが「正社員と同じ仕事をしているのに待遇が違いすぎる」と紛争になった場合、労働局長に助言等を求めることができます。","p":"援助を求めたことを理由とする不利益取扱いは禁止。調停制度（法25条）もある。","f":"","pg":0},{"r":"パート有期法25条","t":"調停","b":"","s":"都道府県労働局長は、短時間・有期雇用労働者に関する紛争について、当事者から調停の申請があった場合、紛争調整委員会に調停を行わせることができます。","e":"パートの待遇差について話し合いがつかない場合、労働局長に申請すると、紛争調整委員会による調停が行われます。","p":"調停機関は「紛争調整委員会」。均衡・均等待遇に関する紛争が対象。募集・採用に関するものは対象外。","f":"","pg":0},{"r":"パート有期法則4条","t":"退職金制度の適用に関する措置","b":"","s":"中小企業退職金共済法の退職金共済契約等は、短時間・有期雇用労働者の福祉の増進を図るための措置として位置づけられています。","e":"パートタイマーにも中退共（中小企業退職金共済）に加入させることで、退職金制度の恩恵を受けられるようにすることが推奨されています。","p":"パート有期法に基づく福祉増進措置の一つ。中退共の仕組み（掛金は事業主負担）も合わせて理解。","f":"","pg":0},{"r":"均等法11条の2","t":"セクシュアルハラスメントに関する国の責務","b":"","s":"国は、セクシュアルハラスメントを行ってはならないこと等について、広報活動・啓発活動その他の措置を講じるよう努めなければなりません。","e":"厚生労働省がセクハラ防止のポスターを作成・配布したり、セミナーを開催したりする活動がこれにあたります。","p":"事業主の措置義務（均等法11条1項）とは別に、国自身の責務を定めた規定。国は相談体制の整備等も行う。","f":"","pg":0},{"r":"均等法11条の3","t":"マタニティハラスメントの防止措置","b":"","s":"事業主は、職場で妊娠・出産・産前産後休業の取得等を理由とするハラスメントにより女性労働者の就業環境が害されることのないよう、相談体制の整備等の必要な措置を講じなければなりません。","e":"妊娠を報告した女性社員に「迷惑だ」「辞めたら？」と言うことはマタハラにあたります。会社は相談窓口の設置や研修の実施等の対策が必要です。","p":"事業主の「措置義務」（努力義務ではない）。不利益取扱いの禁止（均等法9条）とは別の規定。相談したこと等を理由とする不利益取扱いも禁止。","f":"","pg":0},{"r":"均等法11条の4","t":"マタニティハラスメントに関する国の責務","b":"","s":"国は、妊娠・出産等に関するハラスメントを行ってはならないこと等について、広報・啓発活動その他の措置を講じるよう努めなければなりません。","e":"国がマタハラ防止のガイドラインを作成・公表したり、事業主向けの説明会を開催する活動です。","p":"セクハラに関する国の責務（法11条の2）と同様の構造。事業主の措置義務とは別の規定。","f":"","pg":0},{"r":"均等法29条","t":"報告徴収・助言・指導・勧告","b":"","s":"厚生労働大臣は、男女雇用機会均等法の施行に必要があれば、事業主に対して報告を求め、助言・指導・勧告をすることができます。勧告に従わない場合は企業名を公表できます。","e":"セクハラ対策を全くしていない会社に対して、厚生労働大臣が「改善しなさい」と勧告し、従わなければ会社名を公表する場合があります。","p":"段階：報告徴収→助言→指導→勧告→企業名公表。「勧告に従わなかったときの公表」は均等法33条。虚偽報告には「20万円以下の過料」。","f":"","pg":0},{"r":"育介法9条の6","t":"パパ・ママ育休プラス","b":"","s":"配偶者が子の1歳到達日以前に育児休業をしている場合、本人は子が1歳2か月に達するまで育児休業を取得できます（パパ・ママ育休プラス）。ただし、取得できる期間は1年間が限度です。","e":"妻が産後休業後に育休を取り、夫が子の10か月のときから育休を取る場合、夫は子が1歳2か月になるまで育休を取得できます。ただし夫の育休期間は最長1年間です。","p":"「1歳2か月」まで延長可能。ただし取得期間の上限は「1年間」（産後休業期間を含む場合は、産後休業＋育児休業で1年間）。両親ともに育児休業を取得することが条件。","f":"","pg":0},{"r":"育介法9条の2","t":"出生時育児休業（産後パパ育休）の申出","b":"","s":"労働者は、養育する子について事業主に申し出ることにより、子の出生後8週間以内に4週間まで出生時育児休業を取得できます。2回まで分割取得が可能です。","e":"妻の出産後、夫が生後2週間と生後6週間にそれぞれ2週間ずつ、合計4週間の出生時育児休業を取得できます。","p":"期間：「子の出生後8週間以内に4週間まで」。分割：「2回まで」。申出期限は原則「2週間前まで」（労使協定で1か月前まで可能）。休業中の就業も労使協定で可能。","f":"","pg":0},{"r":"育介法9条の3","t":"出生時育児休業の申出の拒否制限","b":"","s":"事業主は、労働者からの出生時育児休業の申出を原則として拒むことができません。ただし、労使協定により一定の労働者を対象外とすることは可能です。","e":"男性社員が「産後パパ育休を取りたい」と申し出た場合、会社は原則として拒否できません。ただし、入社1年未満の従業員を除外する労使協定がある場合は除きます。","p":"原則拒否不可。労使協定で除外できるのは：①入社1年未満、②申出の日から8週間以内に雇用関係が終了する者、③週の所定労働日数が2日以下。","f":"","pg":0},{"r":"育介法9条の5","t":"出生時育児休業期間","b":"","s":"出生時育児休業期間は、休業開始予定日から休業終了予定日までの間で、子の出生日から8週間を経過する日の翌日までの期間内における4週間（28日）以内です。","e":"4月1日に子が生まれた場合、5月27日までの間で合計4週間（28日）以内の出生時育児休業が取得できます。","p":"「出生日から8週間を経過する日の翌日まで」の期間内で「4週間（28日）以内」。出産予定日前に子が生まれた場合は、出生日から起算。","f":"","pg":0},{"r":"育介法23条の3","t":"3歳以上小学校就学前の子の措置","b":"","s":"事業主は、3歳から小学校就学の始期に達するまでの子を養育する労働者に関して、労働者の申出に基づく始業時刻等の変更、テレワーク、短時間勤務、時間外労働の制限等の措置のうち、2つ以上を講じなければなりません。","e":"4歳の子を持つ従業員が「時差出勤とテレワークを利用したい」と申し出た場合、会社は制度として整備しておく必要があります。","p":"対象は「3歳から小学校就学前」。事業主は「2以上の措置」を講じる義務。3歳未満は短時間勤務措置（法23条）が義務。","f":"","pg":0},{"r":"育介法25条の2","t":"育児休業等に関するハラスメント防止の国の責務","b":"","s":"国は、育児休業等に関するハラスメントを行ってはならないこと等について、広報・啓発活動その他の措置を講じるよう努めなければなりません。","e":"国が「パタハラ（パタニティハラスメント）」防止のパンフレットを作成したり、企業向けの研修会を開催する活動です。","p":"事業主の措置義務（法25条）とは別に、国自身の責務を定めた規定。育児休業の取得を理由とする嫌がらせの防止が目的。","f":"","pg":0},{"r":"育介法22条の2","t":"育児休業取得率の公表","b":"","s":"常時雇用する労働者の数が300人を超える事業主は、毎年少なくとも1回、育児休業の取得状況を公表しなければなりません。","e":"従業員500人の会社は、毎年、男性の育児休業取得率などを自社のウェブサイト等で公表する必要があります。","p":"対象は「常時300人超」の事業主。公表義務（努力義務ではない）。公表すべき事項は厚生労働省令で定める。","f":"","pg":0},{"r":"育介法56条","t":"報告徴収・助言・指導・勧告","b":"","s":"厚生労働大臣は、育児・介護休業法の施行に必要があれば、事業主に対して報告を求め、助言・指導・勧告をすることができます。","e":"育児休業制度を整備していない会社に対して、厚生労働大臣が改善を指導し、改善しなければ勧告する場合があります。","p":"段階：報告→助言→指導→勧告。権限は「厚生労働大臣」（都道府県労働局長に委任可能）。虚偽報告等には過料。","f":"","pg":0},{"r":"育介法56条の2","t":"勧告に従わない場合の企業名公表","b":"","s":"厚生労働大臣は、育児・介護休業法に違反している事業主に勧告をした場合に、その勧告に従わなかったときは、その旨を公表することができます。","e":"育児休業の申出を不当に拒否している会社に勧告しても改善しない場合、「A社は勧告に従いません」と企業名を公表できます。","p":"「勧告→不遵守→公表」の流れ。公表は社会的制裁として機能。均等法33条と同様の仕組み。","f":"","pg":0},{"r":"若者雇用促進法則1条の3","t":"年齢制限の禁止の例外","b":"","s":"事業主は労働者の募集・採用にあたり、年齢にかかわりなく均等な機会を与えなければなりませんが、例外的に年齢制限が認められる場合があります。","e":"「長期キャリア形成のため35歳以下の方を募集」は例外として認められる場合があります。ただし、職務に必要な能力と関係のない年齢制限は禁止です。","p":"年齢制限禁止の原則と例外事由（定年年齢を上限とする場合、法令で年齢制限がある場合、長期キャリア形成目的の場合等）。雇用対策法（現・労働施策総合推進法）10条が根拠。","f":"","pg":0},{"r":"若者雇用促進法27条の2","t":"職場情報の提供","b":"","s":"常時雇用する労働者の数が300人を超える事業主は、労働者の職業選択に資するよう、採用した通常の労働者等の定着状況等の情報を公表しなければなりません。","e":"大企業は新卒者向けに、「3年以内離職率」「平均残業時間」「有休取得率」などの情報をホームページ等で公表する義務があります。","p":"対象は「常時300人超」。公表する情報は厚生労働省令で定める。若者の職業選択を支援する目的。","f":"","pg":0},{"r":"若者雇用促進法27条の3","t":"治療と就業の両立支援","b":"","s":"事業主は、治療を受ける労働者について、就業により症状が増悪すること等を防止し、治療と就業の両立ができるよう必要な措置を講じるよう努めなければなりません。","e":"がん治療中の従業員が通院しやすいように時差出勤や短時間勤務を認めたり、治療スケジュールに配慮した業務配分をすることが求められます。","p":"努力義務規定。がんや難病等の治療を受けながら働く人への配慮。労働施策総合推進法にも関連規定あり。","f":"","pg":0},{"r":"労施総推法28条","t":"外国人雇用状況の届出","b":"","s":"事業主は、新たに外国人を雇い入れた場合や外国人が離職した場合には、その者の氏名・在留資格・在留期間等を厚生労働大臣に届け出なければなりません。","e":"レストランで外国人のアルバイトを雇ったら、その人の名前・在留資格・在留期間等をハローワークに届け出る必要があります。","p":"届出先はハローワーク（公共職業安定所）。届出義務は全ての事業主（国・地方公共団体を除く）。雇用保険被保険者は雇用保険の届出と兼ねる。","f":"","pg":0},{"r":"労施総推法則10条","t":"外国人雇用状況届出と雇用保険の届出の一本化","b":"","s":"新たに雇い入れた外国人や離職した外国人が雇用保険の被保険者である場合、雇用保険の資格取得届・喪失届が外国人雇用状況届出を兼ねます。","e":"雇用保険に加入している外国人が退職した場合、雇用保険の資格喪失届を出せば、別途の外国人雇用状況届出は不要です。","p":"雇用保険被保険者の場合は届出の一本化が可能。被保険者でない外国人（週20時間未満のアルバイト等）は別途届出が必要。","f":"","pg":0},{"r":"労施総推法則12条","t":"外国人雇用状況届出の期限","b":"","s":"外国人雇用状況届出は、雇入れの場合は事実のあった日の属する月の翌月10日までに、離職の場合も翌月10日までに届け出なければなりません。","e":"4月15日に外国人を雇い入れた場合、5月10日までにハローワークに届け出ます。","p":"届出期限は「翌月10日」まで。雇用保険被保険者の場合は雇用保険の届出期限に従う（取得は翌月10日、喪失は10日以内）。","f":"","pg":0},{"r":"労施総推法30条の2","t":"パワーハラスメントの防止措置","b":"","s":"事業主は、職場における優越的な関係を背景とした言動であって、業務上必要かつ相当な範囲を超えたものにより労働者の就業環境が害されることのないよう、相談体制の整備等必要な措置を講じなければなりません。","e":"上司が部下に対して人格を否定する暴言を吐いたり、業務上不要な長時間の叱責を繰り返すのはパワハラです。会社は相談窓口の設置や研修実施等の防止措置が義務です。","p":"パワハラの3要素：①優越的な関係を背景とした言動、②業務上必要かつ相当な範囲を超えたもの、③労働者の就業環境が害される。事業主の「措置義務」。","f":"","pg":0},{"r":"労施総推法30条の3","t":"パワーハラスメントに関する国の責務等","b":"","s":"国は、パワーハラスメントを行ってはならないこと等について広報・啓発活動を行い、事業主・労働者もパワハラ問題への関心と理解を深めるよう努めなければなりません。","e":"国がパワハラ防止のガイドラインを策定し、事業主向けのセミナーを開催したり、労働者にも「パワハラを見かけたら相談窓口へ」と啓発する活動です。","p":"国・事業主・労働者のそれぞれの責務を規定。事業主は「他の労働者に対する言動に必要な注意を払うよう努める」。労働者は「自らも注意を払うよう努める」。","f":"","pg":0},{"r":"労施総推法31条","t":"国と地方公共団体の連携","b":"","s":"国及び地方公共団体は、職業紹介事業等と地方の雇用施策について、相互に連携・協力するための協定を締結する等の措置を講じます。","e":"厚生労働省とA県が「雇用対策に関する連携協定」を結び、ハローワークと県の就職支援センターが一体となって就職支援を行います。","p":"国と地方公共団体の連携の仕組み。労働施策総合推進法に基づく雇用対策の基本的枠組み。","f":"","pg":0},{"r":"労施総推法33条","t":"労働施策総合推進法の助言・指導・勧告・公表","b":"","s":"厚生労働大臣は、必要があれば事業主に対して助言・指導・勧告をすることができ、パワハラ防止措置に関する勧告に従わない場合は企業名を公表できます。","e":"パワハラ対策を全く講じていない会社に勧告しても改善しない場合、会社名が公表されます。","p":"パワハラ防止措置に関する勧告違反の場合に「公表」。虚偽報告等には「20万円以下の過料」。","f":"","pg":0},{"r":"職安法5条の3","t":"労働条件等の明示","b":"","s":"公共職業安定所、職業紹介事業者、労働者の募集を行う者等は、求職者等に対して、賃金・労働時間等の労働条件を明示しなければなりません。","e":"ハローワークの求人票には、給与・勤務時間・休日等の労働条件が明示されなければなりません。虚偽の条件を記載することは禁止です。","p":"明示義務の対象者は「職業紹介事業者」「募集を行う者」「労働者供給事業者」等。虚偽の条件の表示は罰則あり。求人広告における労働条件の明示も重要。","f":"","pg":0},{"r":"職安法5条の4","t":"求職者等の個人情報の取扱い","b":"","s":"公共職業安定所、職業紹介事業者等は、求職者等の個人情報について、業務の目的の達成に必要な範囲内で適正に管理しなければなりません。","e":"ハローワークが求職者の履歴書を保管する場合、就職支援に必要な範囲で管理し、無関係な目的に使用してはいけません。","p":"個人情報の収集・保管・使用の適正管理義務。正当な理由なく第三者に提供することの禁止。","f":"","pg":0},{"r":"職安法5条の5","t":"個人情報の収集等の制限","b":"","s":"公共職業安定所等は、求職者等の個人情報を収集・保管・使用するにあたり、業務目的の達成に必要な範囲内で行い、本人の同意なく目的外利用をしてはいけません。","e":"面接で知った求職者の病歴を、採用選考以外の目的で利用することは禁止されます。","p":"「業務の目的の達成に必要な範囲内」で収集。人種・民族・思想信条・門地等の個人情報は原則収集禁止（指針）。","f":"","pg":0},{"r":"職安法5条の6","t":"求人の全件受理の原則","b":"","s":"公共職業安定所、特定地方公共団体及び職業紹介事業者は、求人の申込みは原則としてすべて受理しなければなりません。ただし、法令違反の求人等は拒否できます。","e":"ハローワークは基本的にすべての求人を受け付けますが、「最低賃金以下の時給」の求人や「労基法違反を繰り返す企業」の求人は受理しないことができます。","p":"「全件受理」が原則。不受理の例外：①法令違反の内容、②賃金・労働時間等が通常と比べ著しく不適当、③労働条件を明示しない、④一定の労基法違反で送検された事業主の求人等。","f":"","pg":0},{"r":"職安法5条の7","t":"求職の全件受理の原則","b":"","s":"公共職業安定所等は、求職の申込みも原則としてすべて受理しなければなりません。ただし、申込みの内容が法令に違反する場合は受理しないことができます。","e":"「違法な仕事を探している」という求職は受理できませんが、それ以外の求職は原則すべて受け付けます。","p":"「全件受理」が原則。法令違反の内容の場合のみ例外。求人の不受理（法5条の6）と比べて例外が少ない。","f":"","pg":0},{"r":"職安法26条","t":"学校との連携","b":"","s":"公共職業安定所は、学校の学生・生徒や卒業者に対する職業紹介について、学校と協力して行います。学校の長の同意を得て、その学校で職業指導を行うこともできます。","e":"ハローワークが高校と連携して、在校生向けの就職ガイダンスを学校内で開催することがあります。","p":"学校教育法の「学校」が対象。学校との協力体制が法定されている。新卒者の就職支援に関する制度。","f":"","pg":0},{"r":"職安法29条の5","t":"特定地方公共団体への情報提供","b":"","s":"公共職業安定所は、特定地方公共団体が求人・求職に関する情報の提供を希望するときは、その情報を提供します。","e":"県が運営する就職支援センターが「県内の求人情報を共有してほしい」と要望した場合、ハローワークは情報を提供します。","p":"特定地方公共団体＝無料の職業紹介事業を行う地方公共団体。ハローワークとの情報共有の仕組み。","f":"","pg":0},{"r":"職安法29条の6","t":"特定地方公共団体への援助","b":"","s":"公共職業安定所は、特定地方公共団体に対して、雇用情報や職業に関する調査研究の成果の提供その他、無料の職業紹介事業の運営についての援助を与えることができます。","e":"ハローワークが、地方公共団体の就職支援センターに対して、地域の雇用動向データや就職支援のノウハウを提供します。","p":"特定地方公共団体の無料職業紹介事業を支援する規定。国と地方の連携の一環。","f":"","pg":0},{"r":"職安法29条の7","t":"特定地方公共団体の努力義務","b":"","s":"特定地方公共団体は、無料の職業紹介事業の運営にあたっては、職業安定機関との連携の下に、改善向上を図るために必要な措置を講じるよう努めなければなりません。","e":"県の就職支援センターは、ハローワークと連携しながら、サービスの質を向上させるよう努力します。","p":"努力義務規定。「職業安定機関との連携」がキーワード。","f":"","pg":0},{"r":"職安法32条の3","t":"有料職業紹介事業の手数料","b":"","s":"有料職業紹介事業者は、厚生労働大臣に届け出た手数料表に基づく手数料か、法定の受付手数料・上限制手数料以外は受け取ることができません。","e":"転職エージェントは、届出をした手数料表に基づく紹介手数料を求人企業から受け取ります。求職者からは原則として手数料を取れません（芸能家等の例外あり）。","p":"手数料の2方式：①届出制手数料、②上限制手数料（紹介した労働者の6か月分賃金の10.8%以内等）。求職者からの手数料徴収は原則禁止。","f":"","pg":0},{"r":"職安法32条の11","t":"有料職業紹介事業の取扱職業の制限","b":"","s":"有料職業紹介事業者は、港湾運送業務に就く職業、建設業務に就く職業等については、紹介を行うことができません。","e":"転職エージェントは、港湾で荷物を積み下ろしする仕事や、建設現場で実際に作業する仕事の紹介はできません。","p":"有料職業紹介の取扱制限職業は「港湾運送業務」「建設業務」。労働者派遣も同じ業務が禁止されている点と共通。","f":"","pg":0},{"r":"職安法33条の2","t":"特別の法人の届出による無料職業紹介","b":"","s":"学校等の施設の長は、厚生労働大臣に届け出て、その施設の学生等について無料の職業紹介事業を行うことができます。","e":"大学のキャリアセンターが、卒業予定の学生に対して企業を紹介する活動は、この規定に基づいて行われています。","p":"届出制（許可ではない）。対象施設は学校、専修学校、職業訓練施設等。「その施設の学生・生徒等」が対象。","f":"","pg":0},{"r":"職安法33条の3","t":"特別の法律による法人の届出による無料職業紹介","b":"","s":"特別の法律により設立された法人（商工会議所等）は、厚生労働大臣に届け出て、その構成員等を対象とする無料の職業紹介事業を行うことができます。","e":"商工会議所が会員企業の求人を取りまとめて求職者に紹介する事業は、届出をすれば行えます。","p":"届出制。「直接若しくは間接の構成員」又は「構成員に雇用されている者」が対象。","f":"","pg":0},{"r":"職安法39条","t":"募集に応じた労働者からの報酬受領禁止","b":"","s":"労働者の募集を行う者や募集受託者は、募集に応じた労働者から報酬を受け取ってはいけません。","e":"「就職させてあげるから10万円払え」と求職者からお金を取ることは禁止です。","p":"求職者（募集に応じた労働者）からの報酬受領は全面禁止。職安法6条の中間搾取排除と同趣旨。","f":"","pg":0},{"r":"職安法40条","t":"募集に従事する者への報酬","b":"","s":"労働者の募集を行う者がその被用者や募集受託者に報酬を支払う場合は、賃金・給料等に限られ、厚生労働大臣の許可がなければそれ以外の報酬は与えられません。","e":"会社が従業員に「知人を紹介してくれたらボーナスを出す」制度（リファラル採用報酬）を設ける場合、通常の給与体系で支払う必要があります。","p":"報酬の支払いは「賃金・給料等」又は「厚生労働大臣の許可を受けた報酬」に限定。就職お祝い金等の制限と関連。","f":"","pg":0},{"r":"職安法43条の2","t":"特定募集情報等提供事業の届出","b":"","s":"特定募集情報等提供事業を行おうとする者は、厚生労働大臣に届け出なければなりません。","e":"求人情報をインターネットで提供する「求人サイト」を運営する事業者は、厚生労働大臣への届出が必要です。","p":"2023年改正で新設。「特定募集情報等提供事業」は求人・求職情報を加工して提供する事業。届出制。","f":"","pg":0},{"r":"職安法44条","t":"労働者供給事業の禁止","b":"","s":"法45条に規定する場合を除き、何人も労働者供給事業を行い、またはその供給を受けて労働者を使用してはいけません。","e":"許可なく「うちの社員を御社で働かせますよ」と他社に労働者を提供する事業は違法です。これは中間搾取を防ぐための規制です。","p":"労働者供給事業は原則禁止。例外は法45条（労働組合等の許可による無料供給事業）のみ。労働者派遣とは区別される。","f":"","pg":0},{"r":"職安法45条","t":"労働組合等の無料労働者供給事業","b":"","s":"労働組合等が厚生労働大臣の許可を受けた場合に限り、無料の労働者供給事業を行うことができます。","e":"建設業の労働組合が、厚生労働大臣の許可を受けて、組合員を必要とする建設現場に無料で供給する事業を行えます。","p":"「労働組合等」＋「厚生労働大臣の許可」＋「無料」の3要件。有料は認められない。","f":"","pg":0},{"r":"派遣法29条の2","t":"派遣契約解除時の措置","b":"","s":"派遣先は、自己の都合による労働者派遣契約の解除にあたっては、派遣労働者の新たな就業機会の確保、休業手当等に要する費用の負担その他の措置を講じなければなりません。","e":"派遣先の都合で契約を途中解除する場合、「別の派遣先を探す」「休業手当分の費用を派遣元に支払う」等の措置が必要です。","p":"派遣先の「自己の都合」による解除に限定。新たな就業機会の確保と費用負担の義務。派遣元への事前通知（30日前）も必要。","f":"","pg":0},{"r":"派遣法40条の2","t":"派遣受入期間の制限（事業所単位）","b":"","s":"派遣先は、事業所ごとの業務について、3年を超える期間継続して労働者派遣の役務の提供を受けてはなりません。ただし、過半数労働組合等の意見を聴いて期間を延長できます。","e":"A事業所で3年間派遣を受け入れた場合、労働組合の意見を聴けばさらに3年延長できます。意見聴取をしなければ3年で終了です。","p":"「事業所単位」で「3年」。延長は「過半数労働組合等への意見聴取」で可能（同意は不要、聴くだけでOK）。派遣元の無期雇用派遣労働者等は対象外。","f":"","pg":0},{"r":"派遣法35条の3","t":"個人単位の派遣期間制限","b":"","s":"派遣元事業主は、派遣先の同一の組織単位ごとの業務について、3年を超えて同一の派遣労働者を派遣してはなりません。","e":"Bさんを派遣先の経理課に3年間派遣したら、それ以上経理課にBさんを派遣することはできません。ただし、同じ派遣先の別の課（営業課）への派遣は可能です。","p":"「個人単位」で「3年」。「組織単位」（課・グループ等）ごとに判断。事業所単位の制限（法40条の2）とのダブル規制。無期雇用の派遣労働者は対象外。","f":"","pg":0},{"r":"派遣法40条の3","t":"組織単位の業務に関する派遣労働者の雇入れ努力義務","b":"","s":"派遣先は、事業所単位の派遣可能期間が延長された場合に、組織単位ごとの業務について3年間継続して同一の派遣労働者を受け入れていた場合、その業務に労働者を雇い入れるときは、当該派遣労働者に対して雇用契約の申込みをするよう努めなければなりません。","e":"経理課に3年間Bさんを派遣で受け入れた後、経理課で正社員を募集する場合は、まずBさんに「うちで直接雇いませんか」と声をかけるよう努める必要があります。","p":"「努力義務」（義務ではない）。組織単位ごとに3年間同一の派遣労働者を受け入れた場合。特定有期雇用派遣労働者に対する法40条の4の規定との対比。","f":"","pg":0},{"r":"派遣法30条の5","t":"派遣労働者の待遇確保（均衡方式）","b":"","s":"派遣元事業主は、派遣先に雇用される通常の労働者との均衡を考慮しつつ、派遣労働者の賃金決定、教育訓練の実施、福利厚生施設の利用等について配慮しなければなりません。","e":"派遣先の正社員と同等の業務をしている派遣社員には、可能な限り同等の待遇を確保するよう配慮が求められます。","p":"「均等待遇」（法30条の3）「労使協定方式」（法30条の4）以外の派遣労働者に適用される「均衡待遇」規定。「配慮義務」。","f":"","pg":0},{"r":"派遣法30条の6","t":"派遣労働者に関する就業規則の意見聴取","b":"","s":"派遣元事業主は、派遣労働者に係る就業規則を作成・変更するときは、あらかじめ派遣労働者の過半数を代表する者の意見を聴くよう努めなければなりません。","e":"派遣会社が派遣社員の賃金体系を変更する就業規則を作る場合、派遣社員の代表者の意見を聴く努力義務があります。","p":"「努力義務」（労基法90条の意見聴取は義務）。派遣労働者は派遣元の就業規則が適用される。","f":"","pg":0},{"r":"派遣法31条の2","t":"派遣労働者の待遇に関する説明","b":"","s":"派遣元事業主は、派遣労働者として雇用しようとする労働者に対し、賃金の額の見込み等の待遇について説明しなければなりません。","e":"派遣会社が新しい人を派遣社員として雇う際、「時給はいくら」「どんな福利厚生があるか」等を事前に説明する義務があります。","p":"雇入れ時・派遣時・求めがあった時の3つの場面で説明義務。均等・均衡待遇の確保に必要な事項も説明対象。","f":"","pg":0},{"r":"派遣法32条","t":"派遣労働者であることの明示","b":"","s":"派遣元事業主は、労働者を派遣労働者として雇い入れようとするときは、あらかじめ「派遣労働者として雇用する」旨を明示しなければなりません。","e":"「あなたは派遣社員として雇います。他の会社に派遣される形で働くことになります」と事前に伝える必要があります。","p":"「あらかじめ」明示が必要。紹介予定派遣の場合はその旨も明示。労働者の同意なく派遣契約にすることはできない。","f":"","pg":0},{"r":"派遣法34条の2","t":"派遣料金の明示","b":"","s":"派遣元事業主は、派遣労働者に対して、その労働者に係る労働者派遣に関する料金の額を明示しなければなりません。","e":"派遣会社は「あなたの派遣料金は時給2,500円です（うちあなたの時給は1,500円）」のように、派遣先から受け取る料金額を派遣社員に教える義務があります。","p":"料金の「額」の明示義務。マージン率を直接明示する義務はないが、事業所ごとの平均マージン率は情報提供義務あり（法23条5項）。","f":"","pg":0},{"r":"派遣法35条の4","t":"日雇派遣の原則禁止","b":"","s":"派遣元事業主は、原則として日雇労働者（30日以内の雇用契約）を派遣してはなりません。ただし、専門的な業務や一定の者（60歳以上等）は例外として認められます。","e":"「明日だけ来てほしい」という日雇い形態の派遣は原則禁止。ただし、通訳やソフトウェア開発等の専門業務や、60歳以上の人、学生等は例外です。","p":"「30日以内」の日雇派遣が原則禁止。例外：①政令で定める専門業務、②60歳以上、③学生、④年収500万円以上の副業者、⑤主たる生計者でない者（世帯年収500万円以上）。","f":"","pg":0},{"r":"派遣法23条の2","t":"関係派遣先への派遣割合の制限","b":"","s":"派遣元事業主は、関係派遣先（グループ会社等）への派遣割合が80%以下になるようにしなければなりません。","e":"A社の子会社である派遣会社が、グループ会社への派遣を全体の80%以下に抑える必要があります。グループ内だけに派遣していると「専ら派遣」として問題になります。","p":"「100分の80以下」。「関係派遣先」はグループ企業。違反すると勧告・公表の対象。これは専ら派遣の規制。","f":"","pg":0},{"r":"派遣法23条","t":"関係派遣先への派遣割合の報告","b":"","s":"派遣元事業主は、関係派遣先への派遣割合を厚生労働大臣に報告しなければなりません。","e":"派遣会社は毎年度、グループ企業への派遣が全体の何割かを厚生労働大臣に報告する義務があります。","p":"報告義務。法23条の2の80%制限との関連。報告しない場合や虚偽報告は罰則の対象。","f":"","pg":0},{"r":"派遣法48条","t":"派遣元事業主への勧告・公表","b":"","s":"厚生労働大臣は、関係派遣先への派遣割合制限や報告義務に違反した派遣元事業主に対し、指導・助言をした上で勧告し、なお従わない場合は企業名を公表できます。","e":"グループ会社への派遣割合が80%を超えている派遣会社に指導しても改善しない場合、勧告→公表の措置が取られます。","p":"段階：指導・助言→勧告→公表。法23条3項・法23条の2の違反が対象。","f":"","pg":0},{"r":"派遣法24条の3","t":"派遣労働者の個人情報管理","b":"","s":"派遣元事業主は、労働者派遣に関して労働者の個人情報を収集・保管・使用するにあたり、業務の目的の達成に必要な範囲内で行わなければなりません。","e":"派遣会社が派遣社員の履歴書を保管する場合、派遣業務に必要な範囲で管理し、目的外に使用してはいけません。","p":"「業務の目的の達成に必要な範囲内」で収集・管理。紹介予定派遣の場合は職業紹介に必要な範囲も含む。","f":"","pg":0},{"r":"派遣法35条の5","t":"離職後1年以内の元従業員の派遣の禁止","b":"","s":"派遣元事業主は、派遣先が派遣を受けたら離職後1年以内の元従業員の受入れに抵触することとなる場合は、その派遣をしてはなりません。","e":"A社を辞めたBさんを1年以内にA社に派遣することは禁止されています。直接雇用を避けるための脱法行為を防ぐためです。","p":"「離職後1年以内」の受入れ禁止は派遣先の義務（法40条の9）。派遣元にはその派遣をしてはならない義務。60歳以上の定年退職者は例外。","f":"","pg":0},{"r":"派遣法40条の9","t":"離職者の派遣受入れの制限","b":"","s":"派遣先は、離職した者を離職後1年以内に派遣労働者として受け入れてはなりません。ただし、60歳以上の定年退職者は例外です。","e":"A社を3月に退職したCさんを、A社が8月に派遣社員として受け入れることは禁止。ただし定年退職で60歳以上ならOKです。","p":"「離職後1年以内」の禁止。60歳以上の定年退職者は例外。派遣元にもこの派遣をしない義務（法35条の5）がある。","f":"","pg":0},{"r":"派遣法41条","t":"派遣先責任者の選任","b":"","s":"派遣先は、派遣就業に関し所定の事項を行わせるため、派遣先責任者を選任しなければなりません。","e":"派遣社員を受け入れている部署で、派遣社員の就業管理や苦情対応を担当する「派遣先責任者」を選任します。","p":"派遣先責任者の職務：派遣元との連絡調整、派遣労働者の苦情処理、派遣先管理台帳の作成等。派遣元責任者（法36条）との対比。","f":"","pg":0},{"r":"派遣法42条","t":"派遣先管理台帳","b":"","s":"派遣先は、派遣先管理台帳を作成し、派遣労働者ごとに所定の事項を記載しなければなりません。台帳の記載事項の一部を派遣元に通知する義務もあります。","e":"派遣社員の氏名、派遣元の名称、就業日・時間、業務内容等を記録した管理台帳を作成し、3年間保存します。","p":"派遣先管理台帳の保存期間は「3年間」。記載事項の一部は「1か月に1回以上、一定期日を定めて」派遣元に通知。派遣元管理台帳（法37条）との対比。","f":"","pg":0},{"r":"派遣法40条の4","t":"特定有期雇用派遣労働者の雇入れ努力義務","b":"","s":"派遣先は、組織単位ごとの同一業務について1年以上継続して特定有期雇用派遣労働者を受け入れている場合、その業務に労働者を雇い入れるときは、その派遣労働者に雇用契約を申し込むよう努めなければなりません。","e":"1年以上同じ課に同じ派遣社員を受け入れている場合に、その課で正社員を募集するときは、まずその派遣社員に「直接雇用しませんか」と声をかけるよう努力します。","p":"「1年以上」同一の組織単位で「特定有期雇用派遣労働者」を受入れ。「努力義務」。法40条の3（3年の場合）との違い。","f":"","pg":0},{"r":"派遣法40条の5","t":"派遣先の正社員募集情報の周知","b":"","s":"派遣先は、同一の事業所で1年以上継続して同一の派遣労働者を受け入れている場合、正社員の募集情報をその派遣労働者に周知しなければなりません。","e":"派遣先で1年以上働いている派遣社員がいる場合、「正社員を募集していますよ」という情報をその派遣社員にも提供する義務があります。","p":"「1年以上」の受入れ。正社員の「募集情報の周知」義務。雇入れの努力義務（法40条の4）とは別の規定。","f":"","pg":0},{"r":"派遣法40条の6","t":"労働契約申込みみなし制度","b":"","s":"派遣先が違法行為（禁止業務への派遣受入れ、無許可事業主からの受入れ、期間制限違反、偽装請負等）を行った場合、派遣先がその派遣労働者に対して労働契約の申込みをしたものとみなされます。","e":"建設現場への違法派遣を受け入れた場合、派遣先は自動的にその派遣労働者に「直接雇用します」と申し込んだことになります。派遣労働者が承諾すれば労働契約が成立します。","p":"「みなし」規定。対象行為：①禁止業務派遣、②無許可事業主からの受入れ、③期間制限違反、④偽装請負。「善意無過失」の場合は適用されない。申込みの効力は「1年間」。","f":"","pg":0},{"r":"派遣法47条の5","t":"派遣労働者の苦情処理","b":"","s":"派遣元事業主は、均等・均衡待遇等に関して派遣労働者から苦情の申
