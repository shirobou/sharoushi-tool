せん。","e":"トンネル工事で爆発が起きた場合に備えて、救護技術管理者を選任し、定期的に救護訓練を行います。","p":"「建設業その他政令で定める業種」に限定。救護技術管理者の選任が必要。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":40},{"r":"法29条","t":"元方事業者の指導・指示","b":"◯1 元方事業者 は、 関係請負人 及び 関係請負人に係る作業従事者 が、当該 仕事に関し、労働 安全衛生法又はこれに基づく命令の規定に 違反しないよう 必要な 指導 を行わなければならない。 ◯2 元方事業者 は、 関係請負人 又は関係請負人に係る作業従事者 が、当該 仕事に関し、労働安全衛 生法又はこれに基づく命令の規定に 違反していると認める ときは、 是正のため必要な 指示 を行わなけれ ばならない。 元方事業者の講ずべき措置","s":"元方事業者は、関係請負人やその作業従事者が法令に違反しないよう指導し、違反しているときは是正の指示をしなければなりません。","e":"建設現場の元請会社が、下請会社の作業員がヘルメットを被っていないのを発見したら、是正を指示する義務があります。","p":"元方事業者＝最先次の注文者。「指導」義務と「是正の指示」義務の2つ。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":43},{"r":"法29条の2","t":"建設業の元方事業者の措置","b":"建設業 に属する事業の 元方事業者 は、 土砂等が崩壊するおそれのある 場所、機械等が転倒する おそれのある 場所その他の厚生労働省令で定める場所において 関係請負人に係る作業従事者 が当該事業の 仕事の 作業を行う ときは、当該 関係請負人 が講ずべき当該場所に係る 危険を防止 するための措置 が適正 に講ぜられるように、 技術上の指導 その他の必要な措置を講じなければならない 。 建設業の元方事業者の講ずべき措置 2026改正 「建設業 」に属する事業の元方事業者 は、土砂などが崩壊するおそれのある場所 、機械などが転倒 するおそれのある場所 その他の厚生労働省令で定める場所において 関係請負人に係る作業従事者が当該事業の 仕事の作業を行う ときは、当該関係請負人が講ずべき当該場所に係る 危険を防止するための措置 が適正に講ぜ られるように、 技術上の指導 その他の必要な措置を講じなければならない。（法29条の2） 関係請負人労働者に危険が及ぶおそれのある場所（則634条の2） 1. 土砂などが崩壊するおそれのある場所 （関係請負人の労働者に危険が及ぶおそれのある場所に限る）（1 号） 2. 土石流が発生するおそれのある場所 （河川内にある場所であって、関係請負人の労働者に危険が及ぶおそ れのある場所に限る）（1号の2） 3. 機械などが転倒するおそれのある場所 （関係請負人の労働者が用いる車両系建設機械のうち令別表第7第3 号に掲げるもの又は移動式クレーンが転倒するおそれのある場所に限る）（2号） 4. 架空電線の充電電路に近接する場所 であって、当該充電電路に労働者の身体などが接触し、又は接近する ことにより感電の危険が生ずるおそれのあるもの（関係請負人の労働者により工作物の建設、解体、点検、 修理、塗装などの作業若しくはこれらに付帯する作業又はくい打機、くい抜機、移動式クレーンなどを使用 する作業が行われる場所に限る）（3号） 5. 埋設物など又はれんが壁 、コンクリートブロック塀 、擁壁などの建設物が損壊するなどのおそれのある場 所（関係請負人の労働者により当該埋設物など又は建設物に近接する場所において明かり掘削の作業が行わ れる場所に限る）（4号）","s":"建設業の元方事業者は、土砂崩壊や機械転倒のおそれがある場所で下請の作業従事者が作業するときは、技術上の指導等の措置を講じなければなりません。","e":"地盤が弱い場所でクレーン作業を行う下請業者に対して、元請が安全な作業方法を指導します。","p":"「建設業に属する事業の元方事業者」に限定。危険な場所での技術的指導。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":46},{"r":"法30条の2","t":"製造業等の元方事業者の措置","b":"◯1 製造業 その他政令で定める業種に属する事業（ 特定事業 を除く。）の 元方事業者 は、その 労 働者である作業従事者 （当該労働者である作業従事者のほか、労働者以外の当該元方事業者に係る作業従 事者がある場合には、当該者を含む。）及び 関係請負人に係る作業従事者 の作業が 同一の場所 において 行われることによって生ずる 労働災害を防止する ため、 作業間の連絡及び調整 を行うことに関する措置 その他 必要な措置を講じなければならない 。 製造業の元方事業者の講ずべき措置 2026改正 製造業その他政令で定める業種に属する事業 （特定事業を除く ）の元方事業者 は、その 労働者であ る作業従事者 及び関係請負人に係る作業従事者 の作業が 同一の場所 において行われることによって生ずる 労働 災害を防止 するため、 作業間の連絡及び調整を行うことに関する措置 その他必要な措置を講じなければならな い。（法30条の2第1項）","s":"製造業等の元方事業者は、作業間の連絡調整や合図の統一等、関係請負人との混在作業による労働災害を防止するための措置を講じなければなりません。","e":"工場内で元請と下請が同時に作業する場合、クレーンの合図方法を統一したり、作業スケジュールを調整したりします。","p":"「製造業その他政令で定める業種（特定事業を除く）」が対象。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":54},{"r":"法31条","t":"注文者の措置","b":"◯1 特定事業 の仕事を自ら行う 注文者 は、建設物 、設備 又は 原材料 （以下「建設物等」 という。）を、当該 仕事を行う場所 においてその 請負人 （当該仕事が数次の請負契約によって行われるとき は、当該請負人の請負契約の後次の全ての請負契約の当事者である請負人を含む。） に係る作業従事者 （労働 者及び労働者と同一の場所において仕事の作業に従事する労働者以外の作業従事者に限る。）に 使用させる と きは、当該 建設物等 について、 労働災害を防止する ため必要な措置を講じなければならない 。 注文者の講ずべき措置 2026改正 特定事業 （建設業及び造船業 ）の仕事を自ら行う注文者 は、建設物など を、当該仕事を行う場所に おいてその 請負人に係る作業従事者 に使用させる ときは、当該建設物等について、 労働災害を防止する ため必 要な措置を講じなければならない 。（法31条1項）","s":"特定事業（建設業・造船業）の仕事を自ら行う注文者は、建設物・設備・原材料を請負人の労働者に使用させる場合、労働災害防止のための措置を講じなければなりません。","e":"元請が足場を設置して下請に使わせる場合、その足場の安全性を確保する責任は元請にあります。","p":"「特定事業の仕事を自ら行う注文者」が対象。請負人の労働者が使用する建設物等が対象。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":57},{"r":"法34条","t":"建築物貸与者の措置","b":"建築物で 、政令で定めるものを事業を行う者に 貸与する 者（以下「 建築物貸与者 」という。）は、当 該建築物の貸与 を受けた者の事業に係る当該建築物による 労働災害を防止する ため必要な措置を講じなければ ならない 。ただし、当該 建築物の全部 を一の事業者若しくは個人事業者 に貸与するとき、又は 2以 上の個人事業者のみ に貸与するときは、この限りでない。 建築物貸与者などの講ずべき措置 2026改正 建築物貸与者 は、当該 建築物の貸与を受けた者 の事業に係る当該建築物による 労働災害を防止する ため必要な措置を講じなければならない 。（法34条） 2026改正 ただし、当該 建築物の全部 を1の事業者若しくは個人事業者 に貸与する とき、又は 2以上の個人事 業者のみに貸与する ときは、 この限りでない 。（法34条ただし書） 建築物貸与者などの講ずべき措置の例外 1. 当該建築物の 全部を 一の事業者に貸与する とき 2. 当該建築物の 全部を 個人事業者に貸与する とき 3. 当該建築物の 全部を2以上の個人事業者のみに貸与する とき 法34条でいう建築物は、事務所又は工場の用に供される建築物で す。（令11条）","s":"事務所ビル等を事業者に貸す建築物貸与者は、その建築物による労働災害を防止するための措置を講じなければなりません。","e":"テナントビルのオーナーは、共用部分の避難経路の確保やエレベーターの安全管理を行う義務があります。","p":"「政令で定める建築物」の貸与者。テナントが複数の場合に特に重要。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":65},{"r":"法35条","t":"重量表示","b":"一の貨物 で、重量が 1トン以上 のものを発送しようとする者 は、 見やすく 、かつ、 容易に消滅し ない 方法で、当該 貨物にその 重量を表示 しなければならない 。ただし、 包装されていない 貨物 で、その 重量が一見して明らかであるもの を発送しようとするときは、この限りでない。 重量表示","s":"1トン以上の貨物を発送するときは、見やすく消えない方法でその重量を表示しなければなりません。","e":"工場から1.5トンの鉄材を出荷する際、荷物に「1,500kg」と見やすく表示します。クレーンで吊り上げる際の過負荷防止に役立ちます。","p":"「1トン以上」。「見やすく」かつ「容易に消滅しない方法」。包装されていない貨物で重量が明らかなものは除く。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":66},{"r":"法37条","t":"特定機械等","b":"◯1 特に危険な作業 を必要とする機械等 として 別表第1 に掲げるもので、 政令で定めるものを「 特定 機械等 」という。 特定機械等 R05-08A〜E 「特定機械等 」とは、 本邦の地域内で使用されないことが明らかなものを除いた 、次のものを いう。（令12条） 特定機械等 1. ボイラー （小型ボイラーなどを除く） 2. 第1種圧力容器 （小型圧力容器などを除く） 3. R06-10D つり上げ荷重が3トン以上 （スタッカー式クレーンは 1トン以上 ）のクレーン 4. つり上げ荷重が3トン以上の移動式クレーン 5. つり上げ荷重が2トン以上のデリック 6. 積載荷重が1トン以上のエレベーター （簡易リフト・建設用リフトを除く） 7. ガイドレールの高さが18メートル以上の建設用リフト （積載荷重が0.25トン未満のものを除く） 8. ゴンドラ","s":"ボイラー・クレーン・エレベーター等、特に危険な作業に使う機械で政令で定めるものを「特定機械等」といい、製造許可や検査が必要です。","e":"つり上げ荷重3トン以上のクレーン、ゴンドラ、ボイラーなどは特定機械等として、厳しい検査を受けなければ使えません。","p":"別表第1に列挙。ボイラー、第一種圧力容器、クレーン、移動式クレーン、デリック、エレベーター、建設用リフト、ゴンドラの8種類。","f":"06_労働安全衛生法6-機械等に関する規制","pg":2},{"r":"法38条","t":"製造時等検査","b":"◯1 特定機械等 （別表第1第1号、第2号、第4号及び第8号に掲げる機械等に係るものに限る。以下この項及 び次項並びに次条第1項において同じ。）を 製造 し、若しくは 輸入 した者 、特定機械等で厚生労働省 令で定める期間 設置 されなかったものを 設置 しようとする者 又は特定機械等 で使用を廃止したもの を再び設置 し、若しくは 使用 しようとする者 は、当該特定機械等及びこれに係る厚生労働省令で定 める事項について、 登録設計審査等機関 の検査を受けなければならない。ただし、 輸入された 特定機械 等及びこれに係る厚生労働省令で定める事項（第38条第2項において「 輸入時等検査対象機械等 」という。） について当該 特定機械等 を外国において 製造した者が同項の規定による 検査を受けた場合は、 この限りでな い。","s":"特定機械等を製造・輸入した者等は、登録設計審査等機関等の検査を受けなければなりません。","e":"ボイラーを製造した業者は、出荷前に登録機関の検査に合格しなければ販売できません。","p":"製造時等検査は「登録設計審査等機関」等が実施（2026年改正）。","f":"06_労働安全衛生法6-機械等に関する規制","pg":9},{"r":"法39条","t":"検査証","b":"◯1 登録設計審査等機関 は、第38条第1項又は第2項の検査（以下「 製造時等検査 」という。）に 合格した移動式の特定機械等 について、 検査証 を交付する。 製造時等検査 2026改正 特定機械等 （ボイラー 、第1種圧力容器 、移動式クレーン 及びゴンドラ に掲げる機械等に係るもの に限る）を製造し、若しくは 輸入した者、特定機械等で厚生労働省令で定める期間 設置されなかったものを設 置しようとする 者または特定機械等で使用を 廃止したものを再び設置し 、若しくは 使用しよう とする者は、当 該特定機械等及びこれに係る厚生労働省令で定める事項について、 登録設計審査等機関 の検査を受けなければ ならない。（法38条1項、別表第1） 2026改正 輸入時等検査対象機械等 （輸入された特定機械等及びこれに係る厚生労働省令で定める事項）につ いて当該特定機械等を 外国において製造した者 が法38条2項の規定による検査をすでに受けている 場合は、 製 造時等検査を受ける必要がない 。（法38条1項ただし書） 2026改正 ここでいう特定機械等 （ボイラー 、第1種圧力容器 、移 動式クレーン及びゴンドラ ）を「輸入」する場合 、通常は 、法38条1 項の規定により 、「輸入した者 」が登録設計審査等機関の製造時等検 査を受けます が、製造した者が自ら検査を希望することも考えられま す。そのときは 、2項の規定により 、「輸入者 」ではなく 「製造者自 身」が検査を受けられます 。","s":"製造時等検査に合格した特定機械等には検査証が交付されます。","e":"検査に合格したクレーンには検査証が発行され、それがないと使用できません。","p":"検査証は登録設計審査等機関等が交付。検査証には有効期間あり。","f":"06_労働安全衛生法6-機械等に関する規制","pg":9},{"r":"法40条","t":"検査証のない特定機械等の使用禁止","b":"◯1 検査証を受けていない 特定機械等 （第38条第3項の規定により部分の変更又は再使用に係る検査を受け なければならない特定機械等で、第39条第3項の裏書を受けていないものを含む。）は、 使用 してはな らない 。 ◯2 検査証を受けた特定機械等 は、 検査証 とともにするのでなければ、 譲渡 し、又は 貸与 し てはならない。 使用などの制限 検査証を受けていない 特定機械等 は、使用してはならない 。検査証を受けた特定機械等は、 検査証とともに するのでなければ 、譲渡し、または貸与しては ならない 。（法40条） 事業者 は、特定機械等 については、 厚生労働大臣の定める基準 （特定機械等の構造に係る部分に限る）に適 合するものでなければ 使用してはならない 。（ボイラー則26条、クレーン則17条、64条、ゴンドラ則11条な ど）","s":"検査証を受けていない特定機械等は使用してはいけません。検査証の有効期間が過ぎたものも同様です。","e":"有効期限切れのボイラー検査証のまま運転を続けることは違法です。","p":"検査証なし＝使用禁止。有効期間満了後も同様。","f":"06_労働安全衛生法6-機械等に関する規制","pg":16},{"r":"法41条","t":"検査証の有効期間と更新","b":"◯1 検査証 の有効期間 （次項の規定により検査証の 有効期間 が更新されたときにあっては、当該 更新された 検査証の 有効期間 ）は、特定機械等の種類に応じて、厚生労働省令で定める期間とする。 ◯2 検査証 の有効期間 の更新 を受けようとする者 は、当該特定機械等及びこれに係る厚生労働省令 で定める事項について、 厚生労働大臣の登録を受けた者 （以下「 登録性能検査機関 」という。）が行う 性能検査 を受けなければならない 。 検査証の有効期間","s":"特定機械等の検査証には有効期間があり、更新するには性能検査を受けなければなりません。","e":"クレーンの検査証の有効期間が切れる前に、登録性能検査機関の検査を受けて更新します。","p":"有効期間は機械等の種類ごとに厚生労働省令で定める。更新には「性能検査」が必要。","f":"06_労働安全衛生法6-機械等に関する規制","pg":16},{"r":"法42条","t":"譲渡等の制限（規格・安全装置）","b":"特定機械等以外の機械等 で、別表第2に掲げるものその他 危険若しくは有害な作業 を必要とするもの 、 危険な場所 において使用するもの 又は 危険若しくは健康障害を防止 するため使用するもの のうち、 政令で定めるものは、厚生労働大臣が定める 規格 又は 安全装置 を具備しなければ、 譲渡 し、 貸与 し、又は 設置 してはならない。 構造規格などの具備を要する機械等の譲渡制限など 特定機械等だけに規制が設けられているのではなく 、それ以外の機 械等にも規制はあります 。","s":"特定機械等以外の危険な機械等で政令で定めるものは、厚生労働大臣が定める規格または安全装置を備えなければ、譲渡・貸与・設置できません。","e":"防じんマスクやプレス機械の安全装置は、国の定めた規格に合格したものでなければ販売・使用できません。","p":"「特定機械等以外」の機械等が対象。規格または安全装置の具備が要件。","f":"06_労働安全衛生法6-機械等に関する規制","pg":19},{"r":"法43条","t":"防護措置のない機械等の譲渡等の禁止","b":"動力により駆動される 機械等 で、作動部分上の 突起物 又は 動力伝導部分 若しくは 調速部 分に厚生労働省令で定める 防護 のための措置 が施されていないものは、 譲渡 し、 貸与 し、又 は譲渡 若しくは 貸与 の目的で展示 してはならない 。 局所防護措置","s":"動力で動く機械で、突起物や動力伝導部分に定められた防護措置が施されていないものは、譲渡・貸与・展示してはいけません。","e":"回転する歯車がむき出しのままの機械は、カバーをつけないと売ることも貸すこともできません。","p":"「動力により駆動される機械等」が対象。防護のための措置が施されていないものの譲渡等を禁止。","f":"06_労働安全衛生法6-機械等に関する規制","pg":23},{"r":"法44条","t":"個別検定","b":"◯1 第42条の機械等（特定機械等以外の機械等（型式検定を受けるべき機械等を除く。））のうち、別表第 3に掲げる機械等で政令で定めるものを 製造 し、又は 輸入 した者は、 厚生労働大臣 の登録を受 けた者 （以下「 登録個別検定機関 」という。）が 個々に行う 当該機械等についての 検定（以下 「個別検定 」という。） を受けなければならない 。 ◯4 個別検定 を受けた者は、 当該個別検定に合格した機械等 に、当該 個別検定 に合格した旨の表示 を付 さなければならない。 個別検定 特定機械等以外 の一定の機械等については、 厚生労働大臣の登録を受けた者 （登録個別検定機関 ）が個々に 行う当該機械等についての検定（ 個別検定 ）を受けなければならない。（法44条1項） 具体的には、作業部分上の突起物については、埋頭型（外部に出っ 張らない構造）または覆いを設ける、動力伝導部分（モーター、エン ジンなどの原動機の回転力を、機械に伝える部分）または調速部分 （機械の回転速度を一定に保つための部分）については、覆いまたは 囲いを設けることになります。（則25条） 「譲渡若しくは貸与の目的での展示 」には、店頭における陳列 のほ か、機械展における展示 等も含まれます 。（昭和47年9月18日基発6 02号）","s":"一定の機械等は、製造・輸入した者が登録個別検定機関の個別検定を受け、合格したもの以外は譲渡・貸与・設置できません。","e":"フォークリフト用の安全帯など、一つ一つ検定を受けて合格マークがついたものだけが使えます。","p":"「個別検定」＝1個ずつ検査。合格→刻印等。不合格品は譲渡等禁止。","f":"06_労働安全衛生法6-機械等に関する規制","pg":24},{"r":"法44条の2","t":"型式検定","b":"◯1 第42条の機械等（ 特定機械等以外の機械等 ）のうち、別表第4に掲げる機械等で政令で定めるものを 製造 し、又は 輸入 した者は、 厚生労働大臣 の登録を受けた者 （以下「 登録型式検定機関 」 という。）が行う当該機械等の 型式 についての 検定（以下「 型式検定 」という。） を受けなければ ならない 。 ◯4 登録型式検定機関 は、型式検定に合格した型式 について、 型式検定合格証 を申請者に 交付す る。 ◯5 型式検定 を受けた者は、 当該型式検定に合格した型式の機械等 を本邦 において 製造 し、 又は 本邦 に輸入 したときは、当該機械等に、 型式検定に合格した型式の機械等である旨 の表示 を付さなければならない。","s":"一定の機械等は、その型式について登録型式検定機関の型式検定を受け、合格した型式のもの以外は譲渡・貸与・設置できません。","e":"防じんマスクのように大量生産されるものは、型式（モデル）単位で検定を受け、合格したモデルだけが販売できます。","p":"「型式検定」＝型式（モデル）単位で検査。合格→型式検定合格証。個別検定との違いが出題される。","f":"06_労働安全衛生法6-機械等に関する規制","pg":28},{"r":"法43条の2","t":"機械等の回収・改善命令","b":"厚生労働大臣 又は 都道府県労働局長 は、第42条の機械等（ 特定機械等以外の機械等 ）を製造し、 又は輸入した者が、当該 機械等 で、次の各号のいずれかに該当するものを 譲渡し、又は 貸与した場合には、そ の者に対し、当該 機械等 の回収 又は 改善 を図ること、当該 機械等 を使用している者へ厚生労働省令 で定める事項を 通知 することその他当該 機械等 が使用されることによる 労働災害を防止 するため必要な 措置を講ずることを 命ずる ことができる。 1. 個別検定に合格した機械等 以外の機械等 で、個別検定 に合格した旨の表示 が付され、又はこれと 紛らわしい表示 が付された 機械等 2. 型式検定に合格した型式の機械等 で、厚生労働大臣が定める 規格 又は 安全装置 （第4号及び別 表第4第14号において「規格等」という。）を 具備 していないもの 3. 型式検定に合格した型式の機械等 以外の機械等 で、型式検定 に合格した型式の機械等である旨の表 示が付され、又はこれと 紛らわしい表示 が付された 機械等 4. 型式検定の対象となる機械等 以外の機械等で 、規格等を具備していない もの 回収などの命令 厚生労働大臣 または 都道府県労働局長 は、特定機械等以外の機械等 を製造し、または輸入した者が、当該機 械等で、 個別検定に合格した機械等以外の機械等で 、個別検定に合格した旨の表示が付され 、またはこれと紛 らわしい表示が付された機械等 に該当するものを 譲渡し、または 貸与した場合には、その者に対し、当該 機械 等の回収または 改善を図ること、当該 機械等 を使用している者 へ厚生労働省令で定める事項を 通知することそ の他当該機械等が使用されることによる 労働災害を防止するため必要な措置を講ずる ことを 命ずる ことができ る。（法43条の2） 構造規格を具備しない機械等が使用段階に置かれ、使用する者が構 造規格等を具備していないことを確認することができないような機械 等について、「厚生労働大臣または都道府県労働局長」は、回収など の命令をすることができます。","s":"規格不適合や安全装置のない機械等を譲渡・貸与した者に対し、厚生労働大臣等は回収や改善を命じることができます。","e":"安全基準を満たさない防護メガネが流通した場合、製造者に回収命令が出されます。","p":"厚生労働大臣又は都道府県労働局長が命令。","f":"06_労働安全衛生法6-機械等に関する規制","pg":33},{"r":"法45条","t":"定期自主検査","b":"◯1 事業者 は、 ボイラー その他の機械等 で、政令で定めるもの について、 定期に 自主検査 を行い、 及びその 結果を記録 しておかなければならない。 ◯2 事業者 は、前項の 機械等 で政令で定めるもの について同項の規定による 自主検査のうち厚生労働省令で 定める自主検査 （以下「 特定自主検査 」という。）を行うときは、当該 事業者 （事業者が法人である場 合には 、その代表者又は役員 ）で厚生労働省令で定める資格を有するもの が自ら実施し、又はその 使用する労 働者で当該厚生労働省令で定める資格を有するもの 若しくは第54条の3第1項に規定する登録を受け、他人の 求めに応じて当該機械等について特定自主検査を行う者（以下「 検査業者 」という。） に実施させなければな らない 。 定期自主検査 事業者 は、ボイラーその他の機械等で 、政令で定めるもの について、 定期に自主検査 を行わなければならな い。（法45条1項）","s":"ボイラー等の政令で定める機械等について、事業者は定期に自主検査を行い、結果を記録しておかなければなりません。一定のものは登録検査業者等に検査させます。","e":"クレーンは毎月1回の定期自主検査と、年1回の特定自主検査が必要です。結果を記録して保存します。","p":"「定期自主検査」と「特定自主検査」の区別。特定自主検査は有資格者または登録検査業者が実施。記録の保存義務。","f":"06_労働安全衛生法6-機械等に関する規制","pg":34},{"r":"法55条","t":"製造等の禁止","b":"黄りんマツチ 、ベンジジン 、ベンジジン を含有する製剤 その他の労働者に 重度の健康障 害を生ずる物 で、政令で定めるものは、 製造 し、 輸入 し、 譲渡 し、 提供 し、又は 使 用してはならない。ただし、 試験研究 のため 製造 し、 輸入 し、又は 使用 する場合で、政 令で定める要件に該当するときは、この限りでない。 製造等禁止物質 黄りんマッチ 、ベンジジン 、ベンジジンを含有する製剤その他の労働者に重度の健康障害を生ずる物 で、政 令で定めるものは、 製造し、輸入し、譲渡し、提供し、または 使用してはならない 。（法55条）","s":"黄りんマッチ、ベンジジン等、労働者に重度の健康障害を生じる物質は、製造・輸入・譲渡・提供・使用が全面禁止です。ただし試験研究目的で許可を受けた場合は除きます。","e":"発がん性が極めて高いベンジジンは、工業用として使うことが全面的に禁止されています。","p":"「全面禁止」が原則。例外は「試験研究のための製造・輸入」で「厚生労働大臣の許可」が必要。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":3},{"r":"法56条","t":"製造の許可","b":"◯1 ジクロルベンジジン 、ジクロルベンジジン を含有する製剤その他の 労働者 に重度の健康障 害を生ずる おそれ のある物で、政令で定めるものを 製造 しようとする者は、 あらかじめ 、厚生労働 大臣 の許可 を受けなければならない。 ◯2 厚生労働大臣 は、前項の 許可の申請 があった場合には、その 申請を審査し、製造設備 、作業方 法等が厚生労働大臣の定める 基準に適合 していると認めるときでなければ、同項の 許可 をしてはな らない。 製造許可物質 ジクロルベンジジン 、ジクロルベンジジンを含有する製剤 その他の 労働者 に重度の健康障害を生ずるおそれ のある物で、 政令で定めるものを 製造しようとする者は、 あらかじめ 、厚生労働大臣の許可 を受けなければな らない。（法56条1項） 製造許可物質 には、 第1類物質 及び石綿分析用試料等 が該当する。（令17条、令別表第3第1号） 第1類物質 とは、次の通りである。（令別表第3第1号） 第1類物質 1. ジクロルベンジジン及びその塩 （平成11年、平成5年、平成元年、昭和62年、昭和60年、昭和59年） 2. アルファーナフチルアミン及びその塩 3. 塩素化ビフェニル （別名 PCB） 4. オルトートリジン及びその塩 5. ジアニシジン及びその塩 6. ベリリウム及びその化合物 7. ベンゾトリクロリド 8. 1.から6.までに掲げる物をその重量の1パーセントを超えて含有し、または7.に掲げる物をその重量の0.5 パーセントを超えて含有する製剤その他の物（合金にあっては、ベリリウムをその重量の3パーセントを超 えて含有するものに限る）","s":"ジクロルベンジジン等、重度の健康障害を生じるおそれのある物質を製造するには、あらかじめ厚生労働大臣の許可を受けなければなりません。","e":"特定の発がん性物質を製造する工場は、事前に厚生労働大臣の許可を得なければなりません。","p":"法55条（全面禁止）と法56条（許可制）の違い。法56条は「製造」のみ許可制（輸入・使用は制限なし）。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":8},{"r":"法57条","t":"表示義務","b":"◯1 爆発性 の物、発火性 の物、引火性 の物その他の 労働者 に危険を生ずるおそれ のある 物若しくは ベンゼン 、ベンゼン を含有する製剤 その他の 労働者 に健康障害を生ずるおそれ のあ る物で政令で定めるもの又は第56条第1項の物（ 製造許可物質 ）を 容器 に入れ、又は 包装 して、 譲 渡し、又は 提供する者は、その 容器 又は 包装 （容器に入れ、かつ、 包装して、 譲渡し、又は 提供す るときにあっては、その 容器 ）に所定の事項を 表示 しなければならない。ただし、その 容器又は包 装のうち、主として 一般消費者の生活の用に供するためのもの については、この限りでない。 ◯2 前項の政令で定める物又は第56条第1項の物を 前項に規定する方法以外の方法 により 譲渡し、又は 提供 する者は、同項に定める所定の事項を記載した 文書 を、 譲渡 し、又は 提供 する相手方に 交 付しなければならない。 表示対象物 爆発性 の物、発火性 の物、引火性 の物その他の 労働者に危険を生ずるおそれのある物 若しくは ベンゼン 、ベ ンゼンを含有する製剤 その他の 労働者に健康障害を生ずるおそれのある物 で政令で定めるものまたは 製造許可 物質を容器に入れ、または 包装して、 譲渡し、または 提供する者は、その 容器または包装 （容器に入れ、か つ、包装して、譲渡し、または提供するときにあっては、その 容器）に① 名称、②人体に及ぼす作用 、③貯蔵 または取扱い上の注意 などを、原則として 表示しなければならない。（法57条1項） 表示対象物 は、次の通りである。（法57条1項） 表示対象物 1. 爆発性の物 、発火性の物 、引火性の物 その他の 労働者に危険を生ずるおそれのある物 で政令で定めるもの 2. ベンゼン 、ベンゼンを含有する製剤 その他の 労働者に健康障害を生ずるおそれのある物 で政令で定めるも の（平成11年、昭和62年、昭和60年、昭和56年、昭和49年） 3. 製造許可物質 （ジクロルベンジジン及びその塩、石綿分析用試料等など） など","s":"爆発性・有害性のある物質で政令で定めるものを容器に入れて譲渡・提供する場合、名称・成分・取扱い上の注意等を表示しなければなりません。","e":"化学薬品のボトルに「ベンゼン含有」「火気厳禁」「皮膚に触れないこと」等のラベルを貼ります。","p":"「容器又は包装」に表示。表示事項は名称・成分・人体への影響・貯蔵取扱い上の注意等。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":13},{"r":"法57条の2","t":"通知義務（SDS）","b":"◯1 労働者 に危険若しくは健康障害を生ずるおそれのある物 で政令で定めるもの又は第56条第1項 （製造許可物質 ）の物（以下「 通知対象物 」という。）を 譲渡 し、又は 提供 する者（次項、第 3項及び第9項並びに第100条第1項において「 通知対象物譲渡者等 」という。）は、 文書の交付 その他厚 生労働省令で定める方法により 通知対象物 に関する次の事項（前条第2項に規定する者にあっては、同項に規 定する事項を除く。）を、 譲渡 し、又は 提供 する相手方に 通知 しなければならない。ただし、 主として 一般消費者の生活の用に供される製品 として 通知対象物 を譲渡し、又は 提供する場合について は、この限りでない。 ◯2 通知対象物譲渡者等 は、前項の規定により通知した事項に 変更を行う必要が生じたときは、 文書の交 付その他厚生労働省令で定める方法により、変更後の同項各号の事項を、 速やかに 、譲渡し、又は 提供し た相手方に 通知 するよう 努め なければならない。 通知対象物","s":"通知対象物を譲渡・提供する場合、その物質の名称・成分・取扱い上の注意等を相手方に通知（安全データシート＝SDS）しなければなりません。","e":"化学物質を他の会社に販売する際、SDSを渡して危険性や取扱い方法を伝えます。","p":"「通知対象物」が対象。文書またはSDSの交付。表示義務（法57条）と通知義務（法57条の2）の違いが出題。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":19},{"r":"法57条の3","t":"リスクアセスメント","b":"◯1 事業者 は、第57条第1項の政令で定める物（ 表示対象物 ）及び 通知対象物 による 危険性又は 有害性等 を調査しなければならない 。 ◯2 事業者 は、前項の 調査の結果 に基づいて、 労働安全衛生法又はこれに基づく命令の規定による 措置を講 ずるほか、 労働者の危険又は健康障害を防止するため必要な措置を講ずる ように 努め なければならな い。 ◯3 厚生労働大臣 は、第28条第1項及び第3項に定めるもののほか、前2項の措置に関して、その 適切かつ有 効な実施を図るため必要な 指針 を公表する ものとする。 ◯4 厚生労働大臣 は、前項の 指針に従い、 事業者又はその団体 に対し、必要な 指導 、援助 等を行う ことができる。","s":"事業者は、表示対象物・通知対象物について、危険性・有害性等を調査し、その結果に基づいて必要な措置を講じなければなりません。","e":"新しい化学物質を使い始める前に、その物質のリスクを評価し、換気装置の設置や保護具の着用など必要な対策を決めます。","p":"「リスクアセスメント」の義務化。表示対象物・通知対象物が対象。調査結果に基づく措置も義務。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":25},{"r":"法57条の4","t":"新規化学物質の届出","b":"◯1 化学物質 による 労働者の健康障害 を防止するため、 既存の化学物質として政令で定める化学物質 （第3 項の規定によりその名称が公表された化学物質を含む。） 以外の化学物質 （以下この条において「 新規化学物 質」という。）を 製造 し、又は 輸入 しようとする 事業者 は、 あらかじめ 、厚生労働大臣の定め る基準 に従って 有害性の調査 （当該 新規化学物質 が労働者の健康に与える影響についての調査 をい う。） を行い 、当該 新規化学物質 の名称、有害性の調査の結果 その他の事項を 厚生労働大臣 に届け 出なければならない。 ◯3 厚生労働大臣 は、第1項の規定による 届出があった場合（当該新規化学物質に関し、既に得られて いる知見等に基づき厚生労働省令で定める有害性がない旨の確認をした場合を含む。）には、当該 新規化学物 質の名称を公表 するものとする。 ◯4 厚生労働大臣 は、第1項の規定による 届出があった場合には、 有害性の調査の結果 について 学識経験 者の意見を聴き 、当該 届出に係る化学物質による 労働者の健康障害を防止 するため必要があると認めると きは、 届出をした 事業者 に対し、 施設又は設備 の設置 又は 整備 、保護具の備付け その他の措置 を講ずべきことを 勧告 することができる。 ◯5 前項の規定により 有害性の調査の結果 について 意見を求められた 学識経験者 は、当該 有害性の調査 の結果 に関して知り得た 秘密を漏らして はならない 。ただし、 労働者の健康障害を防止 するためやむを 得ないときは、この限りでない。 新規化学物質の有害性の調査 R03-08D 化学物質による労働者の健康障害を防止 するため、 新規化学物質 を製造し、または 輸入しようとす る事業者 は、原則として、 あらかじめ 、厚生労働大臣の定める基準に従って 有害性の調査 を行い、当該 新規化 学物質 の名称、有害性の 調査の結果 その他の事項を 厚生労働大臣に届け出 なければならない。（法57条の4第1 項）","s":"既存の化学物質以外の新規化学物質を製造・輸入する場合、有害性の調査を行い、厚生労働大臣に届け出なければなりません。","e":"新しく開発した化学物質を工場で使い始める前に、動物実験等で有害性を調べて届出をします。","p":"「新規化学物質」が対象。「あらかじめ」届出。有害性調査の実施義務。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":40},{"r":"法57条の5","t":"化学物質の有害性調査指示","b":"◯1 厚生労働大臣 は、化学物質 で、 がん その他の 重度の健康障害を労働者に生ずるおそれ のあるも のについて、当該 化学物質 による 労働者の 健康障害を防止するため必要がある と認めるときは、当該 化学物質 を製造し、輸入し、又は 使用している事業者その他厚生労働省令で定める 事業者 に対し、政令で定める 有 害性の調査 （当該化学物質が労働者の健康障害に及ぼす影響についての調査をいう。） を行い 、その 結 果を報告 すべきことを 指示することができる。 ◯3 厚生労働大臣 は、第1項の規定による 指示を行おうとするときは、 あらかじめ 、学識経験者 の意見 を聴かなければならない 。 ◯4 第1項の規定による 有害性の調査を行った事業者 は、その結果に基づいて、当該 化学物質 による 労働者 の健康障害を防止する ため必要な措置を 速やかに 講じなければならない 。 有害性の調査の指示","s":"厚生労働大臣は、がん等の重度の健康障害を生じるおそれのある化学物質について、事業者に有害性の調査を指示できます。","e":"ある化学物質に発がん性の疑いが出た場合、厚生労働大臣がその物質を使う事業者に調査を命じます。","p":"厚生労働大臣の指示権限。「がんその他の重度の健康障害」が要件。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":50},{"r":"法61条","t":"就業制限","b":"◯1 事業者 は、 クレーンの運転 その他の 業務で、政令で定めるものについては、 都道府県労働局長 の当該 業務に係る 免許 を受けた者 又は 都道府県労働局長 の登録 を受けた者 が行う当該 業務に係 る技能講習 を修了した者 その他厚生労働省令で定める 資格を有する者でなければ、 当該業務に就かせて はならない 。 ◯2 前項の規定により当該 業務につくことができる者以外の者は、 当該業務を行なってはならない 。 ◯3 第1項の規定により当該 業務につくことができる者は、 当該業務に従事するとき は、これに係る 免許 証その他その 資格を証する 書面を携帯 していなければならない。 ◯4 職業能力開発促進法第24条第1項の認定に係る 職業訓練 を受ける 労働者 について必要がある場合に おいては、その必要の限度で、前3項の規定について、厚生労働省令で 別段の定め をすることができる 。 就業制限業務に就くことができる者 事業者 は、クレーンの運転 その他の業務で、政令で定めるものについては、 都道府県労働局長 の当該業務に 係る免許を受けた者 または 登録教習機関 が行う当該業務に係る 技能講習 を修了した者 その他厚生労働省令で定 める資格を有する者 でなければ、当該 業務に就かせてはならない 。（法61条1項） 事業者 は、就業制限業務には、 都道府県労働局長の免許を受けた者など でなければ、 当該業務に就かせては ならず 、また、 当該業務につくことができる者以外の者 は、当該業務を行ってはならない 。当該者のなかに は、労働者 のみならず、 個人事業主 である 事業者 や一人親方等 も含まれる 。（法61条1項・2項、昭和49年6月 25日基収1367号） 当該業務につくことができる者は、 当該業務に従事するとき は、これに係る 免許証 その他その資格を証する 書面を携帯 していなければならない。（法61条3項） 法61条1項の資格者以外の者は 、何人も 、政令で定める業務に就く ことはできません 。（安衛コンメンタール61条）","s":"クレーンの運転など危険な業務は、免許を受けた者や技能講習を修了した者でなければ就かせてはいけません。","e":"フォークリフトの運転は、フォークリフト運転技能講習を修了した人しかできません。無資格者に運転させたら事業者が処罰されます。","p":"「免許」「技能講習修了」「その他厚生労働省令で定める資格」のいずれか。事業者と労働者の両方に義務。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":52},{"r":"法75条","t":"免許試験","b":"◯1 免許試験 は、厚生労働省令で定める区分ごとに、 都道府県労働局長 が行う。 ◯2 前項の 免許試験 は、 学科試験 及び 実技試験 またはこれらのいずれか によって行う。 ◯3 都道府県労働局長 は、都道府県労働局長の登録を受けた者が行う教習を修了した者 でその修了した日か ら起算して 1年を経過しないもの その他厚生労働省令で定める資格を有する者に対し、前項の 学科試 験または 実技試験 の全部または一部 を免除 することができる。","s":"免許試験は都道府県労働局長が行い、学科試験・実技試験またはそのいずれかで実施します。","e":"クレーン運転士の免許試験は、学科試験と実技試験の両方に合格する必要があります。","p":"実施者は「都道府県労働局長」。登録試験機関に行わせることもできる。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":59},{"r":"法72条","t":"免許の交付","b":"◯1 第12条第1項（ 衛生管理者 ）、第14条（ 作業主任者 ）または第61条第1項（ 就業制限業務 ）の免許（以 下「免許」という。）は、第75条第1項の 免許試験に合格した者 その他厚生労働省令で定める 資格を有する者 に対し、 免許証を交付 して行う。 免許試験 免許試験 は、厚生労働省令で定める区分ごとに、 都道府県労働局長 が行う。（法75条1項） 免許試験 は、学科試験 及び実技試験 またはこれらのいずれかによって行う。（法75条2項） 都道府県労働局長 は、都道府県労働局長の登録を受けた者が行う教習を修了した者でその修了した日から起 算して1年を経過しないものその他厚生労働省令で定める資格を有する者に対し、 学科試験または実技試験の全 部または一部を免除する ことができる。（法75条3項） 免許の欠格事由 衛生管理者 、作業主任者または就業制限業務の免許 は、免許試験に合格した者 その他厚生労働省令で定める 資格を有する者 に対し、 免許証を交付 して行う。（法72条1項） 次のいずれかに該当する者には、 免許は与えられない 。（法72条2項）","s":"免許は、免許試験に合格した者等に対し、免許証を交付して行います。","e":"ボイラー技士の免許試験に合格すると、都道府県労働局長から免許証が交付されます。","p":"免許証の交付は「都道府県労働局長」。欠格事由あり（取消から1年以内等）。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":59},{"r":"法76条","t":"技能講習","b":"◯1 技能講習 は、別表第18に掲げる区分ごとに、 学科講習 又は 実技講習 によって行う。 ◯2 技能講習を行なった者（ 登録教習機関 ）は、当該 技能講習を修了した者 に対し、 技能講習修了 証を交付しなければならない 。 技能講習 技能講習 は、学科講習または実技講習 によって行われる。（法76条1項） 「技能講習 」を受けようとする者 は、技能講習受講申込書 を当該技能講習を行う 登録教習機関 に提出しなけ ればならない。（則80条） ボイラー溶接士免許には、高圧・高温設備における極めて高度な溶 接技能の継続的な維持と最新知識の習得による重大事故防止の必要性 から、有効期間が定められています。 「学科講習 及び実技講習 」によって行われる技能講習もあります 。 具体的には 、酸素欠乏危険作業主任者技能講習 、フォークリフト運転 技能講習 、玉掛け技能講習 などがあります 。（則別表第6、クレーン 則246条1項、酸欠則26条1項、昭和49年労告119号）","s":"技能講習は学科講習と実技講習で行い、修了者には技能講習修了証が交付されます。","e":"玉掛け技能講習では、学科と実技を受講して修了すると修了証がもらえ、玉掛け作業に従事できるようになります。","p":"登録教習機関が実施。修了証の交付。免許と技能講習の違い（免許の方が上位）が出題される。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":61},{"r":"法62条","t":"中高年齢者等への配慮","b":"事業者 は、 中高年齢者 その他 労働災害の防止 上その 就業に当たって 特に配慮を必要とする者 について は、これらの者の 心身の条件 に応じて 適正な配置 を行うように 努め なければならない。","s":"事業者は、中高年齢者等、就業にあたって特に配慮が必要な者について、心身の条件に応じた適正な配置を行うよう努めなければなりません。","e":"高齢の労働者には、体力的に負担の少ない業務に配置するよう配慮します。","p":"努力義務。「中高年齢者その他労働災害の防止上特に配慮を必要とする者」が対象。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":62},{"r":"法62条の2","t":"高年齢者への配慮","b":"◯1 事業者 は、 高年齢者 の労働災害の防止 を図るため、 高年齢者の特性 に配慮した 作業環境の改善 、作 業の管理 その他の必要な措置を講ずるように 努め なければならない。 中高年齢者などについての配慮 技能講習は 、「学科講習 」によって行われるのが一般的ですが 、学 科講習と実技講習の両方 によって行われるものもあります 。 出題されたものに 「フォークリフト運転技能講習 （学科講習及び実 技講習 ）」（ 平成4年 ）があります 。 技能講習 を実施するのは 登録教習機関 であるため 、受講申込は当該 「登録教習機関 」に対して提出 します 。「所轄労働基準監督署長 」へ 提出するわけではありません 。","s":"事業者は、高年齢者の労働災害防止のため、特性に配慮した作業環境の改善、作業の管理等の措置を講じるよう努めなければなりません。","e":"60歳以上の労働者が多い職場では、段差の解消や照明の改善など、転倒防止措置を講じます。","p":"努力義務。法62条の「中高年齢者等への配慮」をさらに具体化した規定。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":62},{"r":"法59条","t":"雇入れ時・作業内容変更時の教育","b":"◯1 事業者 は、労働者 を雇い入れた ときは、当該 労働者 に対し、その従事する 業務に関する 安全又は衛生 のための教育 を行なわなければならない 。 ◯2 前項の規定は、 労働者 の作業内容 を変更 したときについて 準用する 。 雇入れ時・作業内容変更時の教育","s":"事業者は、労働者を雇い入れたとき、または作業内容を変更したときは、安全衛生に関する教育を行わなければなりません。","e":"新入社員には初日に安全教育（機械の危険性、保護具の使い方、緊急時の対応等）を行います。部署異動の際も同様です。","p":"「雇入れ時」と「作業内容変更時」の2つ。すべての業種・規模で義務。省略できる項目もある。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":67},{"r":"法60条","t":"職長等の教育","b":"事業者 は、その 事業場の業種 が政令で定めるものに該当するときは、 新たに職務 につくこととなった 職長 その他の 作業中の労働者 を直接指導又は監督する者 （作業主任者 を除く。）に対し、次の事項 について、 安全又は衛生のための教育 を行なわなければならない。 1. 作業方法 の決定及び労働者 の配置 に関すること。 2. 労働者 に対する 指導 又は 監督 の方法に関すること。 3. 1.及び2.に掲げるもののほか、 労働災害を防止 するため必要な事項で、厚生労働省令で定めるもの 職長教育 R02-10E 事業者 は、その事業場の 業種が政令で定めるもの に該当するときは、 新たに職務につく こととなっ た職長その他の 作業中の労働者を直接指導または監督する者 （作業主任者を除く ）に対し、「 職長教育 」を行 なわなければならない。（法60条）","s":"一定の業種の事業場では、新たに職長等になった者に対し、作業方法の決定や労働者の配置等について安全衛生教育を行わなければなりません。","e":"製造業の工場で新しくラインリーダーになった人に対し、作業手順の決め方や部下への安全指導の方法を教育します。","p":"「政令で定める業種」に限定（建設業、製造業等）。「作業主任者を除く」。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":79},{"r":"法60条の2","t":"危険有害業務従事者への教育","b":"◯1 事業者 は、第59条及び第60条に定めるもののほか、その 事業場 における 安全衛生の水準の向上 を 図るため、 危険又は有害な業務 に現に就いている者 に対し、その従事する 業務に関する 安全又は衛 生のための教育を行う ように 努め なければならない。 ◯2 厚生労働大臣 は、前項の 教育の適切かつ有効 な実施を図るため必要な 指針 を公表する ものとす る。 ◯3 厚生労働大臣 は、前項の 指針に従い、 事業者又はその団体 に対し、必要な 指導等 を行う ことができ る。 教育の努力義務 事業者 は、その 事業場 における 安全衛生の水準の向上を図る ため、 危険または有害な業務に現に就いている 者に対し 、その従事する 業務に関する 安全または衛生のための教育を行う ように 努めなければならない。（法6 0条の2第1項） 厚生労働大臣 は、教育の適切かつ有効な実施を図るため 必要な指針を公表 する。（法60条の2第2項） 厚生労働大臣 は、指針に従い、事業者またはその団体に対し、 必要な指導などを行う ことができる。（法60 条の2第3項） 特別教育に限らず 、安全衛生水準の向上 のため、事業者の 努力義務 として、危険または有害な業務に 現に就いている者 に対し、その従事 する業務に関する安全または衛生のための能力向上の教育について規 定されています。","s":"事業者は、危険有害業務に現に就いている者に対し、安全衛生のための教育を行うよう努めなければなりません。","e":"化学物質を扱う業務に5年間従事している労働者に対し、最新の安全知識や新たなリスク情報についての教育を行います。","p":"努力義務。法59条・60条に加えた「追加教育」の位置づけ。","f":"07_労働安全衛生法7-危険物・有害物規制、就業管理","pg":86},{"r":"法65条","t":"作業環境測定","b":"◯1 事業者 は、有害な業務 を行う 屋内作業場 その他の 作業場 で、政令で定めるものについて、必要な 作業環境測定 を行い、及びその 結果を記録 しておかなければならない。 ◯2 前項の規定による 作業環境測定 は、 厚生労働大臣 の定める 作業環境測定基準 に従って行わなければ ならない。 ◯3 厚生労働大臣 は、第1項の規定による 作業環境測定 の適切かつ有効な実施 を図るため必要な 作業環境 測定指針 を公表する ものとする。 ◯5 都道府県労働局長 は、作業環境の改善 により 労働者の 健康を保持する必要がある と認めるときは、 労働衛生指導医 の意見に基づき 、事業者 に対し、 作業環境測定の実施 その他必要な事項を 指示 することができる。 作業環境測定 事業者 は、有害な業務を行う屋内作業場 その他の作業場で、政令で定めるものについて、必要な 作業環境測 定を行い、及びその 結果を記録 しておかなければならず、当該 作業環境測定 は、厚生労働大臣 の定める 作業環 境測定基準 に従って行わなければならない。（法65条1項・2項） 厚生労働大臣 は、作業環境測定 の適切かつ有効な実施 を図るため必要な 作業環境測定指針 を公表するものと する。（法65条3項） 作業環境測定 は次の手順で行う。（厚生労働省資料） 作業環境測定 1. デザイン （測定計画 ） 2. サンプリング （測定対象の試料採取 ） 3. 分析 （サンプリングした試料の分離 、定量、解析）","s":"事業者は、有害業務を行う作業場等で政令で定めるものについて、作業環境測定を行い、結果を記録しなければなりません。","e":"有機溶剤を使う塗装作業場では、定期的に空気中の有機溶剤濃度を測定し、記録を保存します。","p":"「屋内作業場その他の作業場で政令で定めるもの」が対象。作業環境測定士等が実施。記録の保存義務。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":2},{"r":"法65条の2","t":"作業環境測定結果の評価と措置","b":"◯1 事業者 は、前条第1項又は第5項の規定による 作業環境測定 の結果の評価 に基づいて、 労働者 の健 康を保持するため必要がある と認められるときは、 施設又は設備の 設置 又は 整備 、健康診断 の 実施その他の 適切な措置を講じなければならない 。 ◯2 事業者 は、前項の 評価 を行うに当たっては、 厚生労働大臣 の定める 作業環境評価基準 に従って 行わなければならない 。 ◯3 事業者 は、前項の規定による 作業環境測定の 結果の評価 を行ったときは、その 結果を記録 して おかなければならない。 事後措置 事業者 は、作業環境測定の 結果の評価 に基づいて、 労働者の健康を保持 するため必要があると認められると きは、 施設または設備の設置 または 整備、健康診断の実施 その他の 適切な措置を講じなければならない 。（法6 5条の2第1項）","s":"事業者は、作業環境測定の結果を評価し、労働者の健康保持に必要な場合は施設の整備や健康診断の実施等の措置を講じなければなりません。","e":"測定の結果、粉じん濃度が基準を超えていたら、換気装置を増設したり防じんマスクの着用を徹底したりします。","p":"「評価に基づく措置」が義務。評価の方法は厚生労働大臣が定める。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":10},{"r":"法66条","t":"健康診断","b":"◯1 事業者 は、労働者 に対し、 医師 による 健康診断 （第66条の10第1項に規定する検査を除く。以下 同じ。）を行わなければならない。 健康診断の種類 健康診断の種類 は次の通りである。（則43条〜則48条、則50条の2他）","s":"事業者は、労働者に対し、医師による健康診断を行わなければなりません。一般健康診断と特殊健康診断があります。","e":"全従業員に年1回の定期健康診断を実施するほか、有害物質を扱う労働者には特殊健康診断も実施します。","p":"一般健康診断（雇入時・定期・特定業務・海外派遣・給食従業員）と特殊健康診断の区別が重要。費用は事業者負担。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":14},{"r":"則43条","t":"雇入時の健康診断","b":"事業者 は、 常時使用する 労働者 を雇い入れる ときは、当該 労働者 に対し、所定の項目について 医師 による 健康診断 を行わなければならない。ただし、 医師 による健康診断 を受けた後、 3月 を経過しない者 を雇い入れる場合において、その者が当該 健康診断 の結果を証明する書面 を提出した ときは、 当該健康診断 の項目に相当する項目については、この限りでない。 雇入れ時の健康診断","s":"常時使用する労働者を雇い入れるときは、所定の項目について医師による健康診断を行わなければなりません。ただし、3か月以内に受けた健康診断の結果を提出すれば省略可能です。","e":"新入社員の入社時に健康診断を実施します。ただし、入社前3か月以内に受けた健診結果を提出すれば改めて受けなくても大丈夫です。","p":"「常時使用する労働者」が対象。「3月以内」の省略規定。項目の省略は不可（定期と異なる）。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":21},{"r":"則44条","t":"定期健康診断","b":"◯1 事業者 は、 常時使用する 労働者 （特定業務従事者 を除く。）に対し、 1年以内 ごとに1 回、定期 に、所定の項目について 医師 による健康診断 を行わなければならない。 定期健康診断 事業者 は、常時使用する労働者 （特定業務従事者を除く ）に対し、 1年以内ごとに1回 、定期に、所定の項目 について 医師による健康診断（ 定期健康診断 ）を行わなければならない。（則44条1項）","s":"常時使用する労働者に対し、1年以内ごとに1回、定期に健康診断を行わなければなりません。","e":"毎年秋に全従業員を対象とした定期健康診断を実施します。","p":"「1年以内ごとに1回」。特定業務従事者は除く（別途6か月ごと）。一部項目は医師の判断で省略可。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":24},{"r":"則45条","t":"特定業務従事者の健康診断","b":"◯1 事業者 は、第13条第1項第3号に掲げる 特定業務 に常時従事する 労働者 に対し、当該 業務への 配 置替えの際 及び 6月以内 ごとに1回 、定期 に、定期健康診断の検査項目 について 医師 による健 康診断 を行わなければならない。この場合において、 胸部エックス線検査 及び喀痰検査 については、 1年以 内ごとに1回、 定期 に、行えば 足りる ものとする。 特定業務従事者の健康診断","s":"深夜業等の特定業務に従事する労働者には、配置替え時と6か月以内ごとに1回、健康診断を行わなければなりません。","e":"夜勤のある看護師には、通常の年1回ではなく6か月ごとに健康診断を実施します。","p":"「6月以内ごとに1回」。対象は深夜業、有害物質取扱い等の特定業務従事者。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":31},{"r":"則45条の2","t":"海外派遣労働者の健康診断","b":"◯1 事業者 は、労働者 を本邦外の地域 に6月以上 派遣しよう とするときは、 あらかじめ 、当該 労働 者に対し、 定期健康診断の検査項目 及び 厚生労働大臣 が定める項目 のうち 医師が必要であると認め る項目について、 医師 による健康診断 を行わなければならない。 ◯2 事業者 は、本邦外の地域 に6月以上 派遣した労働者 を本邦の地域内における業務に就かせる とき （一時的 に就かせるときを 除く。）は、当該 労働者 に対し、 定期健康診断の検査項目 及び 厚生労働大臣 が定める項目 のうち 医師が必要であると認める 項目について、 医師 による健康診断 を行わなければ ならない。 海外派遣労働者の健康診断","s":"6か月以上海外に派遣する労働者には、派遣前と帰国後に健康診断を行わなければなりません。","e":"アメリカに1年間出向する社員に対し、出発前と帰国後にそれぞれ健康診断を実施します。","p":"「6月以上」の海外派遣が要件。「派遣前」と「帰国後」の2回。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":37},{"r":"則47条","t":"給食従業員の検便","b":"事業者 は、事業に附属 する食堂又は炊事場 における 給食 の業務に従事する労働者 に対し、その 雇入 れの際 又は当該業務への 配置替えの際 、検便 による健康診断 を行なわなければならない 。 給食従業員の健康診断（検便） 事業者 は、事業に附属する 食堂または炊事場 における 給食の業務 に従事する 労働者 に対し、その 雇入れの際 または 当該業務への配置替えの際 、給食従業員の健康診断 （検便）を行なわなければならない。（則47条） 給食従業員の健康診断（検便） 1. 雇入れの際 の給食従業員の健康診断 2. 配置替えの際 の給食従業員の健康診断","s":"事業場の食堂・炊事場で給食業務に従事する労働者には、雇入時と配置替え時に検便を行わなければなりません。","e":"社員食堂の調理スタッフには、採用時と配置転換時に検便（腸内細菌検査）を実施します。","p":"「雇入時」と「配置替え時」。定期的な実施義務はない（他の法令で義務づけられる場合あり）。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":42},{"r":"法66条の2","t":"自発的健康診断","b":"深夜業 に従事する労働者 であって、その 深夜業の回数 その他の事項が 深夜業 に従事する 労働者 の 健康の保持 を考慮して厚生労働省令で定める要件に該当するものは、 自ら受けた健康診断 （労働者 指定医師による健康診断を除く。）の 結果を証明する書面 を事業者に 提出することができる。 自発的健康診断 労働安全衛生法は、労働者に 健康診断の受診義務 を課しています。 その上で、労働者に「 医師選択の自由 」を与えています。これは事業 者に指定された医師が事業者の意を受けて恣意をもって診断するおそ れがないとはいえないとした裁判例があり、これを排除する趣旨によ ります。（電電公社帯広局事件（地裁判決）、コンメンタール66 条） 「他の医師などの行う健康診断を受け 、その結果を証明する書面を 事業者に提出したとき 」です。「希望しない旨を明らかにする書面を 事業者に提出したとき 」ではありません 。","s":"深夜業に従事する労働者で一定の要件に該当する者は、自ら受けた健康診断の結果を事業者に提出でき、事業者はそれを受け取って対応しなければなりません。","e":"月4回以上深夜勤務をしている労働者が、自費で受けた健康診断の結果を会社に提出し、会社はその結果に基づき必要な措置をとります。","p":"労働者側の権利。「深夜業に従事する労働者」で「一定の要件（6か月間で4回以上）」に該当する者が対象。","f":"08_労働安全衛生法8-作業環境測定、健康診断等（作業環境測定、一般健康診断、特殊健康診断、その他の健康診断）","pg":52},{"r":"則51条","t":"健康診断個人票の作成・保存","b":"事業者 は、安全衛生法の規定による 健康診断の結果 に基づき、 健康診断個人票 を作成して、これを 5年 間保存しなければならない。 記録の作成・保存 事業者 は、法66条1項から4項まで及び5項ただし書並びに法66条の2の規定による 健康診断の結果を記録 し ておかなければならない。（法66条の3） 事業者 は、法定の 健康診断の結果に基づき 、「健康診断個人票 」を作成して、これを 5年間保存 しなければな らない。（則51条） すべての健康診断の結果 を記録しておく必要があります 。「労働者 指定医師による健康診断」や「自発的健康診断」なども例外ではあり ません。 「健康診断個人票 」の作成及び保存は 事業場の規模に関わらず 行わ なければなりません 。 診療録 （カルテ ）の保存期間が5年間 であることと結びつけて記憶 しておくと効果的です 。（医師法24条2項）","s":"事業者は、健康診断の結果に基づき健康診断個人票を作成し、5年間保存しなければなりません。","e":"従業員一人ひとりの健康診断結果を個人票にまとめ、5年間会社で保管します。","p":"「5年間」保存。特殊健康診断の一部は30年間や40年間の保存が必要。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":3},{"r":"則52条","t":"定期健康診断結果の報告","b":"◯1 常時50人以上の労働者 を使用する事業者 は、健康診断 （第44条（ 定期健康診断 ）又は第45条（ 特 定業務従事者の健康診断 ）の健康診断であって 定期のもの に限る。以下この項において同じ。）を行っ たときは、 遅滞なく 、電子情報処理組織を使用して、所定の事項を 所轄労働基準監督署長 に報告し なければならない。 ◯2 事業者 は、歯科医師による健康診断 （定期のもの に限る。）を行ったときは、 遅滞なく 、電子 情報処理組織を使用して、所定の事項を 所轄労働基準監督署長 に報告しなければならない。 定期健康診断結果報告","s":"常時50人以上の労働者を使用する事業者は、定期健康診断を行ったとき、遅滞なく所轄労基署長に報告しなければなりません。","e":"従業員80人の会社が定期健康診断を実施したら、結果の概要を労基署に報告します。","p":"「常時50人以上」。報告対象は定期健康診断と特定業務従事者の健康診断の「定期のもの」。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":7},{"r":"法66条の4","t":"健康診断結果の医師等の意見聴取","b":"事業者 は、労働安全衛生法の規定による 健康診断の結果 （当該健康診断の項目に 異常の所見 があると 診断された労働者 に係るものに 限る。）に基づき、当該 労働者の健康を保持する ために 必要な措置について、 医師又は歯科医師 の意見 を聴かなければならない 。","s":"事業者は、異常の所見がある労働者について、健康を保持するための措置について医師等の意見を聴かなければなりません。","e":"健康診断で「要精密検査」と判定された社員について、産業医に「残業制限が必要か」「配置転換すべきか」等の意見を聴きます。","p":"「異常の所見がある」労働者に限定。意見聴取の期限は「3月以内」。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":12},{"r":"法66条の5","t":"健康診断実施後の措置","b":"◯1 事業者 は、前条の規定による 医師又は歯科医師 の意見 を勘案 し、その必要があると認めるとき は、当該労働者の実情を考慮 して、 就業場所の変更 、作業の転換 、労働時間の短縮 、深夜業 の回数の減少 等の措置を講ずる ほか、 作業環境測定 の実施、施設又は設備 の設置 又は 整備 、 当該医師又は歯科医師の意見 の衛生委員会 若しくは 安全衛生委員会 又は 労働時間等設定改善委員 会への 報告 その他の適切な措置を講じなければならない。 ◯2 厚生労働大臣 は、前項の規定により 事業者 が講ずべき措置の 適切かつ有効な実施 を図るため必要な 指 針を公表 するものとする。 ◯3 厚生労働大臣 は、前項の 指針を公表した場合において必要があると認めるときは、 事業者又はその団 体に対し、当該 指針に関し 必要な指導等 を行うことができる 。 事後措置など 健康診断実施後の措置 をまとめると次の通りである。","s":"事業者は、医師等の意見を踏まえ、必要があれば就業場所の変更、作業の転換、労働時間の短縮、深夜業の回数減少等の措置を講じなければなりません。","e":"高血圧で深夜業が体に悪影響と医師が意見した場合、その社員を日勤のみのポジションに異動させます。","p":"意見を「勘案」して措置。具体例の列挙（就業場所変更・作業転換・時間短縮・深夜業回数減少等）が出題される。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":12},{"r":"法66条の7","t":"保健指導","b":"◯1 事業者 は、一般健康診断若しくは当該健康診断に係る労働者指定医師による健康診断又は自発的健康診 断の結果、 特に健康の保持に努める必要がある と認める労働者 に対し、 医師 又は 保健師 による 保健指導 を行うように 努め なければならない 。 ◯2 労働者 は、前条の規定により 通知された健康診断の結果 及び前項の規定による 保健指導 を利用 して、その 健康の保持 に努める ものとする。 健康診断の結果の通知 一般健康診断における 「再検査または精密検査 」は、診断の確定や 症状の程度を明らかにするものであり 、一律には事業者にその実施が 義務づけられているものではありません 。","s":"事業者は、健康診断の結果、特に健康保持に努める必要がある労働者に対し、医師や保健師による保健指導を行うよう努めなければなりません。","e":"メタボリックシンドロームの傾向がある社員に対し、保健師が食事や運動の指導を行います。","p":"努力義務。「医師又は保健師」による指導。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":19},{"r":"法66条の8","t":"面接指導","b":"◯1 事業者 は、その 労働時間の状況 その他の事項が 労働者の健康の保持 を考慮して厚生労働省令で定め る要件に該当する 労働者 （第66条の8の2第1項（ 新たな技術 、商品又は役務の研究開発業務に従事する労働 者等に対する面接指導 ）に規定する者及び第66条の8の4第1項（ 高度プロフェッショナル制度対象労働者に 対する面接指導 ）に規定する者を 除く。以下この条において同じ。）に対し、 医師 による面接指導 （問診 その他の方法により心身の状況を把握し、これに応じて 面接 により必要な指導を行うことを いう。以下同じ。）を行わなければならない。 長時間労働者に対する面接指導 R02-08A 事業者 は、その 労働時間の状況 その他の事項が 労働者の健康の保持 を考慮して厚生労働省令で定め る要件に該当する労働者（一定の者を除く）に対し、 医師による面接指導 を行わなければならない。（法66条 の8第1項） 産業医の選任義務のない 小規模事業場 であっても、 面接指導 を行わなければならず、この場合、面接指導の 要件に該当する労働者は、 地域産業保健センター を活用して面接指導を受けることができる 。（平成20年3月1 R06-09E 派遣労働者に対する面接指導 は、「派遣元 」事業者 が行 います 。（平成18年2月24日基発0224003号） 「医師による 面接指導 」とは、問診その他の方法により 心身の状況 を把握し 、これに応じて 面接により必要な指導 を行うことをいいま す。（法66条の8第1項かっこ書）","s":"事業者は、長時間労働等により健康リスクが高い労働者に対し、医師による面接指導を行わなければなりません。","e":"月80時間超の時間外労働をした社員から申出があった場合、医師との面接指導を実施します。","p":"要件は「時間外・休日労働が月80時間超」かつ「疲労の蓄積が認められる者」の「申出」。研究開発業務従事者や高プロは別規定。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":21},{"r":"法66条の8の2","t":"研究開発業務従事者への面接指導","b":"◯1 事業者 は、その 労働時間 が労働者 の健康の保持 を考慮して 厚生労働省令で定める時間を超える労働者 （労働基準法第36条第11項に規定する業務（ 新たな技術、商品又は役務の研究開発に係る業務 ）に従事 する者 （同法 第41条各号に掲げる者 及び第66条の8の4第1項（ 高度プロフェッショナル制度対象労働者に対 する面接指導 ）に規定する者を 除く。）に 限る。）に対し、 医師による面接指導 を行わなければならな い。","s":"新技術等の研究開発業務に従事する労働者で、時間外・休日労働が月100時間を超えた者には、申出なしでも医師の面接指導を行わなければなりません。","e":"新薬の研究開発部門で月110時間残業した社員には、本人の申出がなくても面接指導を実施します。","p":"「月100時間超」で「申出不要」。一般の面接指導（月80時間超・申出要）との違いが頻出。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":29},{"r":"則52条の7の2","t":"研究開発業務従事者の面接指導の基準時間","b":"◯1 法66条の8の2第1項の厚生労働省令で定める 時間は、休憩時間を除き1週間当たり 40時間 を超えて 労働させた場合における その超えた時間 について、 1月当たり 100時間 とする。 研究開発業務従事者に対する面接指導 R06-09B R02-08B 事業者 は、新技術 、新商品などの研究開発の業務に従事する労働 者で、一定の労働時間 を超えて労働する労働者 に対し 、医師による面接指導 を行わなければならない。（法66条の8の2第1項）","s":"研究開発業務従事者の面接指導の基準は、1週40時間を超える労働時間が月100時間を超えた場合です。","e":"研究開発職の社員が、1か月に100時間を超える時間外労働をした場合が面接指導の対象です。","p":"「月100時間」の具体的基準。休憩時間除き週40時間超の時間で計算。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":29},{"r":"法66条の8の4","t":"高度プロフェッショナル制度適用者への面接指導","b":"◯1 事業者 は、労働基準法第41条の2第1項（ 高度プロフェッショナル制度 ）の規定により労働する 労 働者であって、その 健康管理時間 が当該 労働者 の健康の保持 を考慮して 厚生労働省令で定める時間を超 えるもの に対し、 医師による面接指導 を行わなければならない。 高度プロフェッショナル制度対象労働者に対する面接指導 R02-08C 事業者 は、高度プロフェッショナル制度の対象労働者 で、「 健康管理時間 」が一定時間を超えて労 働する労働者 に対し、 医師による面接指導 を行わなければならない。（法66条の8の4第1項） 対象労働者 R02-08C 当該面接指導の対象労働者 は、1週間当たりの 「健康管理時間 」が40時間を超えた 場合における そ の超えた時間が、1か月当たり 100時間を超える者 である。（則52条の7の4第1項）","s":"高度プロフェッショナル制度で働く労働者で、健康管理時間が一定を超えた者には、医師の面接指導を行わなければなりません。","e":"高プロ適用者の健康管理時間が週40時間を超えた部分が月100時間を超えた場合、面接指導を実施します。","p":"「健康管理時間」が基準。申出不要。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":35},{"r":"法66条の10","t":"ストレスチェック","b":"◯1 事業者は 、労働者 に対し、 医師、保健師 その他の厚生労働省令で定める者（以下この条において 「医師等 」という。）による 心理的な負担 の程度を把握 するための 検査を行わなければならない 。 ◯2 事業者 は、前項の規定により行う 検査を受けた労働者 に対し、当該 検査を行った 医師等 から当該 検査の 結果が通知 されるようにしなければならない。この場合において、当該 医師等 は、 あらかじめ 当該 検査を受けた 労働者 の同意を得ない で、当該労働者の 検査の結果を 事業者に提供 してはならない 。 ストレスチェックの実施方法 事業者 は、常時使用する労働者 に対し、 1年以内ごとに1回 、定期に 、ストレスチェック を行わなければなら ない。（法66条の10第1項、則52条の9）","s":"事業者は、労働者に対し、医師・保健師等による心理的な負担の程度を把握するための検査（ストレスチェック）を行わなければなりません。高ストレス者には医師の面接指導を行います。","e":"年1回のストレスチェックで「高ストレス」と判定された社員が希望すれば、医師の面接指導を受けられます。","p":"常時50人以上の事業場で義務。50人未満は努力義務。結果は本人に直接通知（事業者には本人の同意なく通知不可）。面接指導は「労働者の申出」が要件。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":40},{"r":"法67条","t":"健康管理手帳","b":"◯1 都道府県労働局長 は、 がん その他の 重度の健康障害を生ずるおそれ のある 業務で、政令 で定めるものに従事していた者のうち、厚生労働省令で定める要件に該当する者に対し、 離職の際 に又 は離職の後 に、当該 業務に係る 健康管理手帳 を交付するものとする。ただし、 現に当該業務に係る 健康管理手帳 を所持している者については、この限りでない。 ◯2 政府は、 健康管理手帳 を所持している者 に対する 健康診断 に関し、必要な措置を行う。 ◯3 健康管理手帳 の交付を受けた者 は、当該 健康管理手帳 を他人に譲渡 し、又は 貸与 し てはならない。 健康管理手帳の交付","s":"がん等のリスクがある業務に従事していた者に対し、離職時または離職後に健康管理手帳を交付し、定期的に健康診断を受けられるようにします。","e":"石綿（アスベスト）を扱う業務に長年従事した人が退職するとき、健康管理手帳が交付され、退職後も無料で定期的に健康診断を受けられます。","p":"交付者は「都道府県労働局長」。「離職の際又は離職の後」に交付。対象業務はベンジジン、石綿等。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":52},{"r":"法68条","t":"病者の就業禁止","b":"事業者 は、 伝染性の疾病 その他の 疾病で、厚生労働省令で定めるものにかかった 労働者 については、 その 就業を禁止 しなければならない。 病者の就業禁止","s":"伝染性の疾病等にかかった労働者については、就業を禁止しなければなりません。","e":"労働者が重度の感染症にかかった場合、他の労働者への感染を防ぐため、治るまで就業させてはいけません。","p":"「伝染性の疾病その他の疾病で厚生労働省令で定めるもの」が対象。就業禁止中の賃金は法律上の規定なし。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":55},{"r":"法68条の2","t":"受動喫煙の防止","b":"事業者 は、労働者 の受動喫煙 を防止する ため、当該 事業者 及び事業場 の実情 に応じ適切な措置を 講ずるよう 努める ものとする。","s":"事業者は、労働者の受動喫煙を防止するため、事業場の実情に応じた適切な措置を講じるよう努めなければなりません。","e":"喫煙室を設置する、建物内全面禁煙にするなど、受動喫煙対策を講じます。","p":"努力義務。健康増進法との関係も重要。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":57},{"r":"法71条","t":"国の援助（健康保持増進）","b":"◯1 国は、労働者の健康の保持増進 に関する措置の 適切かつ有効な実施 を図るため、必要な 資料の提 供、作業環境測定 及び 健康診断の実施 の促進 、受動喫煙 の防止のための 設備の設置 の促 進、事業場における 健康教育等 に関する 指導員 の確保及び資質の向上の促進 その他の必要な援助に 努める ものとする。 受動喫煙の防止 事業者 は、労働者の 受動喫煙を防止する ため、 当該事業者及び事業場の実情に応じ 適切な措置を講ずる よう 努める ものとする。（法68条の2） 鉛中毒にかかっている労働者を 「鉛業務 」に従事させてはならない のであり 、「一切の業務 」に従事させてはならないのではありませ ん。 国は、労働者の健康の保持増進に関する措置の適切かつ有効な実施を図るため、必要な 資料の提供 、作業環 境測定及び健康診断の実施の促進 、受動喫煙の防止のための設備の設置の促進 、事業場における 健康教育など に関する指導員の確保及び資質の向上の促進 その他の 必要な援助 に努める ものとする。（法71条） 健康の保持増進に関する国の援助など 必要な 資料の提供 作業環境測定 及び健康診断 の実施の促進 受動喫煙の防止のための設備の設置 の促進 事業場における健康教育などに関する 指導員の確保及び資質の向上 の促進 その他の必要な援助","s":"国は、労働者の健康保持増進に関する措置の実施のため、資料の提供、健康診断の促進、受動喫煙防止設備の促進等の援助を行います。","e":"国が中小企業向けに健康診断の費用助成を行ったり、受動喫煙防止の設備導入に補助金を出したりします。","p":"国の努力義務。「資料の提供」「健康診断の促進」「受動喫煙防止設備の促進」等。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":57},{"r":"法65条の4","t":"作業時間の制限","b":"事業者 は、 潜水業務 その他の 健康障害を生ずるおそれ のある 業務で、厚生労働省令で定めるもの に従事させる 労働者 については、厚生労働省令で定める 作業時間 についての 基準 に違反して 、当該 業務に従事させてはならない 。 作業時間の制限","s":"潜水業務等の健康障害を生じるおそれのある業務では、省令で定める作業時間の基準に違反して労働者を従事させてはいけません。","e":"潜水士が1日に潜れる時間には上限があり、これを超えて作業させることは違法です。","p":"「作業時間」の制限であり「労働時間」の制限ではない。対象業務は厚生労働省令で定める。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":59},{"r":"法65条の3","t":"作業の管理","b":"事業者 は、労働者 の健康 に配慮 して、労働者の従事する 作業 を適切に 管理 するように 努 めなければならない。 労働衛生の3管理 「労働衛生の3管理 」とは、 作業環境管理 、作業管理 及び健康管理 の3管理を指し、労働衛生管理の基本とな るものである。これに 総括管理 と労働衛生教育 を加え、 5管理 とすることもある。","s":"事業者は、労働者の健康に配慮して、従事する作業を適切に管理するよう努めなければなりません。","e":"長時間同じ姿勢で作業する労働者に対して、定期的な休憩やストレッチを組み込んだ作業計画を立てます。","p":"努力義務。「労働衛生の3管理」（作業環境管理・作業管理・健康管理）の「作業管理」に対応する規定。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":61},{"r":"法69条","t":"健康教育・健康相談","b":"◯1 事業者 は、労働者 に対する 健康教育及び健康相談 その他 労働者 の健康の保持増進 を図るため必 要な措置を 継続的かつ計画的 に講ずるように 努め なければならない。 ◯2 労働者 は、前項の 事業者 が講ずる措置を利用して、その 健康の保持増進 に努める ものと する。 健康教育・健康相談など","s":"事業者は、健康教育・健康相談等の健康保持増進措置を継続的・計画的に行うよう努めなければなりません。労働者もこれを利用して健康の保持増進に努めます。","e":"会社でメンタルヘルス研修を定期的に実施したり、保健師による健康相談の機会を設けたりします。","p":"努力義務。事業者だけでなく「労働者」にも自己の健康保持増進の努力義務がある。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":64},{"r":"法71条の2","t":"快適な職場環境の形成","b":"◯1 事業者 は、事業場 における 安全衛生の水準の向上 を図るため 、次の措置を 継続的かつ計画的 に 講ずることにより、 快適な職場環境 を形成する ように 努め なければならない。 1. 作業環境 を快適な状態に維持管理 するための措置 2. 労働者の従事 する 作業 について、その 方法を改善 するための措置 3. 作業に従事する ことによる 労働者 の疲労を回復 するための 施設又は設備 の設置 又は 整備 4. 前3号に掲げるもののほか、 快適な職場環境を形成 するため必要な措置 快適な職場環境の形成のための措置 事業者 は、事業場 における 安全衛生の水準の向上 を図るため、次の措置を 継続的かつ計画的 に講ずることに より、 快適な職場環境を形成 するように 努めなければならない。（法71条の2） 快適な職場環境の形成のための措置 1. 作業環境 を快適な状態に維持管理 するための措置 2. 労働者の従事する作業 について、その 方法を改善 するための措置 3. 作業に従事することによる 労働者の疲労を回復するための施設または設備の設置または整備 4. 1.〜3.に掲げるもののほか、 快適な職場環境を形成 するため必要な措置","s":"事業者は、作業環境の快適化、疲労回復のための施設整備等の措置を継続的・計画的に講じて、快適な職場環境を形成するよう努めなければなりません。","e":"休憩室を快適にする、作業場の温度・湿度を適切に管理する、トイレや更衣室を清潔に保つなど。","p":"努力義務。具体的措置は①作業環境の管理、②作業方法の改善、③疲労回復施設の整備、④その他の施設の整備の4つ。","f":"09_労働安全衛生法9-健康診断等（事後措置、面接指導、ストレスチェック、その他）","pg":65},{"r":"法78条","t":"特別安全衛生改善計画","b":"◯1 厚生労働大臣 は、 重大な労働災害 が発生した場合 において、 重大な労働災害 の再発 を防 止するため 必要がある場合として厚生労働省令で定める場合に該当すると認めるときは、 事業者 に対し、その 事業場の安全又は衛生 に関する 改善計画 （以下「 特別安全衛生改善計画 」という。） を作成 し、これを 厚生労働大臣に提出すべき ことを 指示する ことができる。 ◯2 事業者 は、 特別安全衛生改善計画 を作成しよう とする場合には、当該事業場に労働者の過半数で組 織する 労働組合があるとき においてはその 労働組合 、労働者の過半数で組織する 労働組合がないとき に おいては 労働者の過半数を代表する者 の意見を聴かなければならない 。 ◯4 厚生労働大臣 は、特別安全衛生改善計画 が重大な労働災害 の再発の防止 を図る上で 適切でない と認める ときは、 事業者 に対し、当該 特別安全衛生改善計画 を変更すべきことを 指示することができる。 ◯5 厚生労働大臣 は、第1項若しくは前項の規定による 指示を受けた事業者が その指示に従わなかった 場合 又は特別安全衛生改善計画 を作成した事業者が当該 特別安全衛生改善計画 を守っていない と認める場合におい て、 重大な労働災害が再発するおそれ があると認める ときは、当該事業者に対し、 重大な労働災害の再 発の防止 に関し必要な措置をとるべきことを 勧告 することができる。 ◯6 厚生労働大臣 は、前項の規定による 勧告を受けた 事業者 がこれに 従わなかった ときは、その旨を 公 表することができる。 特別安全衛生改善計画の作成 厚生労働大臣 は、重大な労働災害 として厚生労働省令で定めるものが 発生した場合において、 重大な労働災 害の再発を防止する ため必要がある場合として 厚生労働省令で定める場合に該当する と認めるときは、 事業者 に対し、「 特別安全衛生改善計画 」を作成し、これを 厚生労働大臣 に提出すべきことを 指示することができ る。（法78条1項） 事業者 は、「 特別安全衛生改善計画 」を作成しようとする 場合には、当該事業場に労働者の過半数で組織す る労働組合があるとき においてはその 労働組合 、労働者の過半数で組織する 労働組合がないとき においては 労 働者の過半数を代表する者 の意見を聴かなければならない 。（法78条2項） 厚生労働大臣 は、特別安全衛生改善計画 が重大な労働災害の再発の防止を図る上で 適切でない と認めるとき は、事業者 に対し、当該 特別安全衛生改善計画 を変更すべきことを 指示することができる。（法78条4項）","s":"重大な労働災害が発生した事業場で、再発防止に必要な場合、厚生労働大臣は事業者に特別安全衛生改善計画の作成を指示できます。","e":"工場で死亡事故が起きた場合、厚生労働大臣が事業者に再発防止計画の作成を指示します。計画を守らなければ公表や勧告が行われます。","p":"指示者は「厚生労働大臣」。「重大な労働災害」が要件。計画不遵守→勧告→公表の段階的措置。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":3},{"r":"法79条","t":"安全衛生改善計画","b":"◯1 都道府県労働局長 は、事業場の施設 その他の事項について、 労働災害 の防止 を図るため 総合 的な改善措置 を講ずる必要があると認めるとき（第78条第1項の規定により厚生労働大臣が同項の厚生労働 省令で定める場合に該当すると認めるときを除く。）は、 事業者 に対し、当該 事業場の 安全又は衛生 に関する 改善計画 （以下「 安全衛生改善計画 」という。）を 作成すべきことを 指示 することができる。 ◯2 事業者 は、 安全衛生改善計画 を作成しよう とする場合には、当該事業場に労働者の過半数で組織す る労働組合があるとき においてはその 労働組合 、労働者の過半数で組織する 労働組合がない ときにおい ては 労働者の過半数を代表する者 の意見 を聴かなければならない 。また、第1項の 事業者及びその労 働者は、 安全衛生改善計画 を守らなければならない 。 安全衛生改善計画の作成 都道府県労働局長 は、事業場の施設 その他の事項について、労働災害の防止を図るため 総合的な改善措置を 講ずる必要があると認めるとき は、事業者 に対し、「 安全衛生改善計画 」を作成すべきことを 指示することが できる。（法79条1項） 必ずしも 「法違反の状態にあるもののみを前提とする 」ものではあ りません 。（昭和47年9月18日発基91号） 「総合的な改善措置」とは、労働災害の防止を図るための設備、管 理、教育面などの全般にわたる改善措置をいいますが、 必ずしも事業 場全体に係る改善措置である必要はなく 、事業場のうちの一部門に限 った改善措置でも差し支えありません 。（昭和47年9月18日基発602 号） 事業者 は、「 安全衛生改善計画 」を作成しようとする 場合には、当該事業場に労働者の過半数で組織する 労 働組合がある ときにおいてはその 労働組合 、労働者の過半数で組織する 労働組合がない ときにおいては 労働者 の過半数を代表する者 の意見を聴かなければならない 。（法79条2項）","s":"都道府県労働局長は、事業場の施設等について総合的な改善が必要な場合、安全衛生改善計画の作成を指示できます。","e":"労働基準監督署の臨検で、複数の安全衛生上の問題が見つかった事業場に対し、労働局長が改善計画の作成を指示します。","p":"指示者は「都道府県労働局長」。特別安全衛生改善計画（厚生労働大臣）との違いが出題。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":8},{"r":"法80条","t":"コンサルタントの活用","b":"◯1 厚生労働大臣 は、第78条第1項又は第4項の規定による 特別安全衛生改善計画 の作成又は変更 の指示をした 場合において、 専門的な助言 を必要とすると認める ときは、当該 事業者 に対し、 労働安全コ ンサルタント 又は 労働衛生コンサルタント による 安全又は衛生に係る 診断 を受け 、かつ、 特別 安全衛生改善計画 の作成又は変更 について、これらの者の 意見を聴く べきことを 勧奨 することができ る。 ◯2 都道府県労働局長 は、第79条第1項の規定による 安全衛生改善計画 の作成の指示をした 場合に おいて、 専門的な助言 を必要とすると認めるときは、当該 事業者 に対し、 労働安全コンサルタント 又は 労働衛生コンサルタント による 安全又は衛生に係る 診断 を受け 、かつ、 安全衛生改善計画 の作 成について、これらの者の 意見を聴く べきことを 勧奨 することができる。 安全衛生診断","s":"特別安全衛生改善計画の指示を受けた事業者で、専門的な助言が必要な場合、厚生労働大臣は労働安全コンサルタント等の活用を勧奨できます。","e":"改善計画の内容が高度な技術判断を要する場合、外部の安全コンサルタントに助言を求めるよう勧められます。","p":"「勧奨」であり命令ではない。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":10},{"r":"法81条","t":"労働安全コンサルタント・労働衛生コンサルタント","b":"◯1 労働安全コンサルタント は、労働安全コンサルタント の名称 を用いて、 他人の求めに応じ 報酬 を得て 、労働者の 安全の水準の向上 を図る ため、 事業場 の安全についての 診断 及びこれに基づく 指導 を行う ことを 業とする。 ◯2 労働衛生コンサルタント は、労働衛生コンサルタント の名称 を用いて、 他人の求めに応じ 報酬 を得て 、労働者の 衛生の水準の向上 を図る ため、 事業場 の衛生についての 診断 及びこれに基づく 指導 を行う ことを 業とする。 業務","s":"労働安全コンサルタントは安全の、労働衛生コンサルタントは衛生の診断・指導を、他人の求めに応じて報酬を得て行うことを業とします。","e":"工場の安全管理体制を第三者の目で診断してもらい、改善のアドバイスを受ける専門家です。","p":"「名称独占」（名称を用いない限り業務自体は誰でも可）。試験に合格し登録が必要。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":12},{"r":"法86条","t":"コンサルタントの義務","b":"◯1 コンサルタント は、コンサルタント の信用 を傷つけ 、又は コンサルタント全体の 不名誉 となる ような行為 をしてはならない。 ◯2 コンサルタント は、その 業務に関して知り得た 秘密 を漏らし 、又は 盗用 してはならない 。コン サルタントで なくなった後 においても、同様とする。 義務 コンサルタント は、コンサルタント の信用を傷つけ 、または コンサルタント全体の不名誉となるような行為 をしてはならない。（法86条1項） コンサルタント は、その 業務に関して知り得た 秘密を漏らし 、または 盗用してはならない。（法86条2項）","s":"コンサルタントは、信用を傷つける行為や、業務上知り得た秘密の漏洩・盗用をしてはなりません。","e":"コンサルタントが、診断で知った会社の内部情報を競合他社に漏らすことは禁止されています。","p":"信用失墜行為の禁止と守秘義務。コンサルタントでなくなった後も秘密保持義務は継続。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":15},{"r":"法88条","t":"計画の届出","b":"◯1 事業者 は、機械等 で、危険若しくは 有害な作業 を必要とするもの、 危険な場所 において使用するもの又 は危険若しくは 健康障害 を防止するため使用するもののうち、厚生労働省令で定めるものを 設置 し、若 しくは 移転 し、又はこれらの 主要構造部分を 変更 しよう とするときは、その 計画を当該工事の開始 の日の 30日前 までに、 労働基準監督署長 に届け出 なければならない。 危険な機械等の設置に係る届出 危害の発生が予想されるような設備 が設けられたり 、労働者の安全 衛生をそこなうような生産方法や工法などの採用が行われたりするこ とを「あらかじめチェック 」しようとするものです 。","s":"危険な機械等の設置・移転・変更や、大規模な建設工事の計画は、事前に労基署長等に届け出なければなりません。","e":"大型プレス機を新たに設置する場合、工事開始の30日前までに労基署に届出が必要です。","p":"届出先は「所轄労働基準監督署長」。一定の大規模工事は「厚生労働大臣」。「30日前」までに届出。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":16},{"r":"法89条","t":"計画の審査","b":"◯1 厚生労働大臣 は、第88条第1項から第3項までの規定による 届出があった 計画のうち、 高度の技 術的検討を要するもの について 審査 をする ことができる。 ◯2 厚生労働大臣 は、前項の 審査を行う に当たっては、 学識経験者 の意見 をきかなければならな い。 ◯3 厚生労働大臣 は、第1項の 審査の結果 必要があると認めるときは、 届出をした事業者 に対し、 労働 災害の防止 に関する事項について必要な 勧告 又は 要請 をする ことができる 。 ◯4 厚生労働大臣 は、前項の 勧告又は要請をする に当たっては、 あらかじめ 、当該 届出をした 事業 者の意見 をきかなければならない 。 厚生労働大臣の審査 厚生労働大臣 は、届出があった計画のうち 、高度の技術的検討 を要するもの について 審査をすることができ る。（法89条1項） 厚生労働大臣 は、届出があった計画の 審査を行うに当たっては、 学識経験者の意見 をきかなければならな い。（法89条2項）","s":"厚生労働大臣は、届出のあった計画のうち高度な技術的検討を要するものを審査でき、学識経験者の意見を聴きます。","e":"大規模化学プラントの建設計画について、爆発リスク等の専門的な審査を行います。","p":"「高度の技術的検討を要するもの」が対象。「学識経験者の意見」を聴く。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":33},{"r":"法89条の2","t":"計画の審査（都道府県労働局長）","b":"◯1 都道府県労働局長 は、第88条第1項又は第3項の規定による届出があった 計画 のうち、 高度 の技術的検討を要するものに準ずるもの として当該計画に係る建設物若しくは機械等又は仕事の規模その 他の事項を勘案して厚生労働省令で定めるものについて 審査 をする ことができる。 都道府県労働局長の審査 都道府県労働局長 は、届出があった計画のうち、前条第1項の 高度の技術的検討を要するものに準ずるもの と して当該計画に係る建設物若しくは機械等または仕事の規模その他の事項を勘案して厚生労働省令で定めるも のについて 審査をすることができる。（法89条の2第1項） 都道府県労働局長 は、届出があった計画の 審査を行うに当たっては、 学識経験者の意見 をきかなければなら ない。（法89条の2第2項）","s":"都道府県労働局長も、一定の計画について審査を行うことができます。","e":"中規模の建設工事の計画について、労働局長レベルでの審査が行われます。","p":"厚生労働大臣の審査（法89条）に準ずる規模のもの。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":35},{"r":"法90条","t":"労働基準監督署長・監督官の職務","b":"労働基準監督署長 及び 労働基準監督官 は、労働安全衛生法の施行に関する事務 をつかさどる。","s":"労働基準監督署長と労働基準監督官は、安衛法の施行に関する事務をつかさどります。","e":"監督署長は安衛法に基づく届出の受理や命令を行い、監督官は事業場の臨検等を行います。","p":"安衛法の施行主体。労基法の監督機関と同じ組織が担当。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":37},{"r":"法91条","t":"労働基準監督官の権限","b":"◯1 労働基準監督官 は、労働安全衛生法を施行するため必要があると認めるときは、 事業場に 立ち入 り、関係者に 質問 し、帳簿、書類その他の物件を 検査 し、若しくは 作業環境測定 を行い 、又 は検査に必要な限度において 無償で製品 、原材料 若しくは 器具 を収去 することができる。 労働基準監督署長及び労働基準監督官 労働基準監督署長 及び労働基準監督官 は、労働安全衛生法の施行に関する事務 をつかさどる。（法90条） 労働基準監督官 は、労働安全衛生法を施行するため必要があると認めるときは、 事業場 に立ち入り 、関係者 に質問し、帳簿、書類その他の 物件を検査 し、若しくは 作業環境測定 を行い 、または検査に必要な限度におい て無償で製品、原材料若しくは器具を 収去することができる。（法91条1項）","s":"労働基準監督官は、安衛法の施行に必要があれば、事業場に立ち入り、質問・検査・測定を行い、検査に必要な限度で無償で製品・原材料を収去できます。","e":"監督官が工場を抜き打ちで訪問し、機械の安全装置をチェックしたり、有害物質のサンプルを持ち帰って分析したりできます。","p":"「立入り」「質問」「検査」「作業環境測定」「収去」の権限。収去は「無償」。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":37},{"r":"法93条","t":"産業安全専門官・労働衛生専門官","b":"◯1 厚生労働省 、都道府県労働局及び労働基準監督署 に、 産業安全専門官 及び 労働衛生専門官 を置 く。 産業安全専門官及び労働衛生専門官 「労働基準監督署長及び労働基準監督官」は、労働安全衛生法の施 行に関する事務を行います。","s":"厚生労働省・労働局・監督署に、産業安全専門官と労働衛生専門官を置き、専門的な事務を行います。","e":"化学プラントの安全審査など、高度な専門知識が必要な事案を担当する専門官です。","p":"産業安全専門官と労働衛生専門官の設置。監督官とは別の専門職。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":37},{"r":"法95条","t":"労働衛生指導医","b":"◯1 都道府県労働局 に、 労働衛生指導医 を置く 。 ◯2 労働衛生指導医 は、第65条第5項（作業環境測定の実施等）又は第66条第4項（臨時の健康診断 等）の規定による指示に関する事務その他 労働者の衛生に関する事務に 参画 する。 ◯3 労働衛生指導医 は、労働衛生 に関し 学識経験を有する医師 のうちから、 厚生労働大臣 が 任命する 。 ◯4 労働衛生指導医 は、 非常勤 とする。","s":"都道府県労働局に労働衛生指導医を置き、作業環境測定や健康診断に関する専門的な事務に参画させます。","e":"特殊な化学物質を扱う事業場の健康診断の指示について、労働衛生指導医が専門的な判断を行います。","p":"「都道府県労働局」に置く。非常勤の医師。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":39},{"r":"法96条","t":"労働衛生指導医の立入り","b":"◯4 都道府県労働局長 は、労働衛生指導医 を第95条第2項の規定による事務に参画させるため必要があ ると認めるときは、当該 労働衛生指導医 をして 事業場 に立ち入り 、関係者に 質問 させ、又は 作業環 境測定 若しくは 健康診断 の結果の記録 その他の物件を 検査 させる ことができる。 労働衛生指導医 労働衛生指導医 は、都道府県労働局 に置かれる 非常勤の国家公務員 である。（法95条1項・4項） 労働衛生指導医 は、法65条5項（作業環境測定の実施等）または法66条4項（臨時の健康診断等）の規定によ る指示に関する事務その他労働者の 衛生に関する事務に参画する 。（法95条2項） 労働衛生指導医 は、労働衛生に関し 学識経験を有する医師のうちから 、厚生労働大臣が任命 する。（法95条 3項） 都道府県労働局長 は、労働衛生指導医 を所定の 事務に参画 させるため必要があると認めるときは、当該 労働 衛生指導医 をして 事業場 に立ち入り 、関係者 に質問させ、または 作業環境測定 若しくは 健康診断 の結果の記録 その他の物件を 検査させることができる。（法96条4項）","s":"都道府県労働局長は、必要があれば労働衛生指導医に事業場への立入り、質問、作業環境測定・健康診断の結果の検討をさせることができます。","e":"有害物質を扱う事業場に労働衛生指導医が訪問し、作業環境測定の結果をチェックして改善指導を行います。","p":"労働衛生指導医の事業場立入り権限。都道府県労働局長の命による。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":39},{"r":"法97条","t":"作業従事者の申告","b":"◯1 作業従事者 は、事業場 に労働安全衛生法又はこれに基づく命令の規定 に違反する事実 がある と きは、その 事実を都道府県労働局長 、労働基準監督署長 又は 労働基準監督官 に申告して是正の ため適当な措置をとるように求める ことができる。 ◯2 事業者 は、前項の 申告をしたことを理由 として、 労働者 に対し、 解雇 その他 不利益な取扱い を してはならない 。 労働者の申告 2026改正 作業従事者 は、事業場に労働安全衛生法またはこれに基づく命令の規定に 違反する事実がある とき は、その事実を 都道府県労働局長 、労働基準監督署長 または 労働基準監督官 に申告して是正のため適当な措置 をとるように求めることができる 。（法97条1項） 事業者 は、当該申告をしたことを理由として 、労働者に対し、 解雇その他不利益な取扱いをしてはならな い。（法97条2項） 2026改正 注文者 、機械等貸与者 その他作業従事者に係る事業を行う者の 契約の相手方 は、申告をしたことを 理由として 、当該事業を行う者に対し、 取引の停止その他の不利益な取扱いをしてはならない 。（法97条3 項）","s":"事業場に安衛法違反の事実がある場合、作業従事者は労働局長・監督署長・監督官に申告できます。申告を理由とする不利益取扱いは禁止です。","e":"「うちの工場は安全装置なしで機械を動かしている」と監督署に通報しても、そのことで解雇されることはありません。","p":"「作業従事者」が主体（労働者だけでなく一人親方等も含む）。不利益取扱い禁止。労基法104条に対応する規定。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":40},{"r":"法98条","t":"使用停止命令等","b":"◯1 都道府県労働局長 又は 労働基準監督署長 は、第20条から第25条まで、第25条の2第1項、第3 0条の3第1項若しくは第4項、第31条第1項、第31条の2、第33条第1項又は第34条の規定に 違反する事 実があるとき は、その 違反した事業者 、注文者 、機械等貸与者 又は建築物貸与者 に対し、 作業の全部又は 一部の停止 、建設物等 の全部又は一部 の使用の停止 又は 変更 その他 労働災害を防止 するため必 要な事項を 命ずる ことができる 。","s":"安衛法の安全衛生措置規定に違反する事実がある場合、都道府県労働局長または監督署長は、作業停止・建設物の使用停止等を命じることができます。","e":"足場が基準に適合していない建設現場に対して、監督署長が「足場を直すまで高所作業を禁止する」と命令します。","p":"「違反する事実があるとき」が要件。使用停止命令・作業停止命令。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":41},{"r":"法99条","t":"緊急時の使用停止命令","b":"◯1 都道府県労働局長 又は 労働基準監督署長 は、法98条第1項の場合以外の場合において、 労働災 害発生 の急迫した危険 があり、かつ、 緊急の必要がある ときは、 必要な限度において 、事業を行う 者に対し、 作業の全部又は一部 の一時停止 、建設物等の全部又は一部 の使用の一時停止 その他当該 労働災害を防止する ため必要な 応急の措置を講ずる ことを 命ずる ことができる。 基準違反の場合の使用停止命令 都道府県労働局長 または 労働基準監督署長 は、所定の規定に 違反する事実 があるときは、その違反した 事業 者、注文者 、機械等貸与者 または 建築物貸与者 に対し、 作業の全部または一部 の停止、建設物など の全部また は一部 の使用の停止または 変更その他 労働災害を防止 するため必要な事項を 命ずる ことができる。（法98条1 項） 基準違反でない場合の使用停止命令 2026改正 都道府県労働局長 または 労働基準監督署長 は、法98条1項の場合 以外の場合において、 労働災害発 生の急迫した危険があり 、かつ、 緊急の必要がある ときは、 必要な限度において 、事業を行う者に対し、 作業 の全部または一部 の一時停止 、建設物など の全部または一部 の使用の一時停止 その他当該 労働災害を防止する ため必要な 応急の措置を講ずる ことを 命ずる ことができる。（法99条1項）","s":"法98条の場合以外でも、労働災害発生の急迫した危険があり緊急の必要がある場合、作業の全部または一部の一時停止等を命じることができます。","e":"台風接近で建設現場のクレーンが転倒する危険がある場合、緊急に作業停止を命じます。","p":"「急迫した危険」＋「緊急の必要」が要件。法98条（違反事実あり）と法99条（緊急時）の違い。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":41},{"r":"法99条の2","t":"再発防止のための措置命令","b":"◯1 都道府県労働局長 は、労働災害が発生した 場合において、その 再発を防止 するため必要がある と認めるときは、当該 労働災害に係る事業者 に対し、 期間を定めて 、当該 労働災害が発生した事業場 の 総括安全衛生管理者 、安全管理者 、衛生管理者 、統括安全衛生責任者 その他 労働災害の防 止のための 業務に従事する者 （次項において「 労働災害防止業務従事者 」という。）に 都道府県労働局長 の指 定する者が行う 講習 を受けさせるよう 指示 すること ができる。 労働災害防止業務従事者に対する講習 都道府県労働局長 は、労働災害が発生した 場合において、その 再発を防止するため必要がある と認めるとき は、当該 労働災害に係る事業者 に対し、 期間を定めて 、当該 労働災害が発生した事業場 の総括安全衛生管理 者、安全管理者 、衛生管理者 、統括安全衛生責任者 その他 労働災害の防止のための業務に従事する者 （労働災 害防止業務従事者 ）に都道府県労働局長の指定する者 が行う 講習を受けさせるよう 指示することができる。 （法99条の2第1項）","s":"労働災害が発生した場合、再発防止のため、都道府県労働局長は事業者に対し安全衛生管理者の増員や施設の改善等を命じることができます。","e":"死亡事故が発生した事業場に対し、労働局長が安全管理者の増員と安全設備の改善を命じます。","p":"都道府県労働局長の権限。「期間を定めて」命令。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":42},{"r":"法100条","t":"報告等の徴収","b":"◯1 厚生労働大臣 、都道府県労働局長 又は 労働基準監督署長 は、労働安全衛生法を施行する ため必要があると認める ときは、 事業者 、労働者 、機械等貸与者 、建築物貸与者 、通知対象物譲渡者等 又はコ ンサルタント に対し、必要な事項を 報告 させ、又は 出頭 を命ずる ことができる。 ◯2 厚生労働大臣 、都道府県労働局長 又は 労働基準監督署長 は、労働安全衛生法を施行する ため必要があると認める ときは、 登録設計審査等機関等 に対し、必要な事項を 報告 させることがで きる。 ◯3 労働基準監督官 は、労働安全衛生法を施行するため 必要があると認める ときは、 事業者 又は 労働者 に対し、必要な事項を 報告 させ、又は 出頭 を命ずる ことができる。 報告などの命令 2026改正 厚生労働大臣 、都道府県労働局長 または 労働基準監督署長 は、労働安全衛生法を施行するため 必要 がある と認めるときは、 事業者 、労働者 、機械等貸与者 、建築物貸与者 、通知対象物譲渡者等 又はコンサルタ ントに対し、必要な事項を 報告させ、または 出頭を命ずる ことができる。（法100条1項） 2026改正 厚生労働大臣 、都道府県労働局長 または 労働基準監督署長 は、労働安全衛生法を施行するため 必要 があると認める ときは、 登録設計審査等機関等 に対し、必要な事項を 報告させることができる。（法100条2 項） 労働基準監督官 は、労働安全衛生法を施行するため 必要があると認める ときは、 事業者 または 労働者 に対 し、必要な事項を 報告させ、または 出頭を命ずる ことができる。（法100条3項） ここでいう「コンサルタント」とは、労働安全コンサルタント、労 働衛生コンサルタントを総称したものです。 コンサルタントは、一定の場合、専属の者以外の者の選任も認めら れており、労働者ではないこともありうるため、労働者とは別に、法 100条1項の中に含まれています。","s":"厚生労働大臣・労働局長・監督署長は、安衛法の施行に必要な場合、事業者等に報告や出頭を命じることができます。","e":"労働災害の発生状況について、監督署長が事業者に報告書の提出を求めます。","p":"「事業者、労働者、機械等貸与者、建築物貸与者、コンサルタント」等が対象。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":43},{"r":"則97条","t":"労働者死傷病報告","b":"◯1 事業者 は、労働者 が労働災害 その他 就業中 または 事業場内 若しくはその 附属建設物内 に おける 負傷、窒息または 急性中毒 （以下「 労働災害等 」という。）により 死亡 し、または 休業 した ときは、 遅滞なく 、電子情報処理組織を使用して、所定事項を 所轄労働基準監督署長 に報告 しなけ ればならない。 ◯2 前項の場合において、 休業の日数が4日 に満たない ときは、 事業者 は、同項の規定にかかわらず、 1月から3月 まで、 4月から6月 まで、 7月から9月 まで及び 10月から12月 までの期間におけ る当該事実について、それぞれの期間における 最後の月の翌月末日 までに、電子情報処理組織を使用し て、所定の事項及び休業日数を 所轄労働基準監督署長 に報告しなければならない。 労働者死傷病報告","s":"労働者が労働災害等で死亡または休業した場合、事業者は遅滞なく労基署長に報告しなければなりません。休業4日未満は四半期ごとにまとめて報告します。","e":"従業員が工場で転倒して1週間休業した場合、すぐに監督署に労働者死傷病報告を提出します。","p":"「休業4日以上」→遅滞なく報告。「休業4日未満」→四半期ごとにまとめて報告。虚偽報告＝「労災かくし」で厳しく取り締まられる。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":45},{"r":"則96条","t":"事故報告","b":"◯1 事業者 は、次の場合は、 遅滞なく 、報告書 （事故報告書 ）を 所轄労働基準監督署長 に提 出しなければならない 。 1. 事業場又はその附属建設物内で、次の 事故が発生 したとき ア. 火災 又は 爆発 の事故（次号の事故を除く。） イ. 遠心機械、研削といしその他高速回転体の 破裂の事故 ウ. 機械集材装置、巻上げ機又は索道の鎖又は索の 切断の事故 エ. 建設物、附属建設物又は機械集材装置、煙突、高架そうなどの 倒壊の事故 2. ボイラー （小型ボイラーを除く。）の 破裂、煙道ガス の爆発又はこれらに準ずる事故が発生したと き （以下省略） 事故報告 事業者 は、事業場またはその附属建設物内での 火災または爆発の事故など 所定の事故が発生した ときなどに は、遅滞なく 、「事故報告書 」を所轄労働基準監督署長 に提出しなければならない。（則96条1項）","s":"事業場内で火災・爆発等の事故が発生した場合、遅滞なく事故報告書を監督署長に提出しなければなりません。","e":"工場で化学物質が爆発する事故が起きたら、すぐに事故報告書を労基署に提出します。","p":"「火災又は爆発」「遠心機械の破裂」「クレーン等の倒壊」等が報告対象。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":47},{"r":"法101条","t":"法令等の周知","b":"◯1 事業者 は、労働安全衛生法及びこれに基づく命令 の要旨 を常時各作業場の 見やすい場所 に掲 示し、又は 備え付ける ことその他の厚生労働省令で定める方法により、 労働者 に周知 させなけれ ばならない 。 ◯４ 事業者 は、第57条の2第1項又は第2項の規定により 通知された事項 （同条第3項又は第6項の規定によ り成分の通知に代えて代替化学名等が通知された場合における当該 代替化学名等 を含む。）を、化学物質、化 学物質を含有する製剤その他の物で当該 通知された事項に係るものを取り扱う各作業場 の見やすい場所 に 常時掲示 し、又は 備え付ける ことその他の厚生労働省令で定める方法により、当該物を取り扱う 労 働者に周知 させなければならない 。 法令などの周知 R03-10A 事業者 は、労働安全衛生法及びこれに基づく命令 の要旨を常時各作業場の 見やすい場所 に掲示し、 または 備え付ける ことその他の厚生労働省令で定める方法により、 労働者 に周知させなければならない。（法1 01条1項） R03-10C 2026改正 事業者 は、法57条の2第1項または2項により 文書の交付 などにより 通知された事項 （代 替化学名等を含む ）について、それに係る化学物質やそれを含有する製剤等を取り扱う各作業場の 見やすい場 所に常時掲示 し、または 備え付ける ことなど、厚生労働省令で定める方法により、当該物を取り扱う 労働者 に 周知させなければならない。（法101条4項） なお、主な「 労働者への 周知」についてまとめると次の通りである。 1. 「労働安全衛生法及びこれに基づく命令の要旨 」を労働者に周知 させなければならない。（法101条1 項） 2. 「産業医の業務の内容その他の産業医の業務に関する事項で厚生労働省令で定めるもの 」を労働者に周知 させなければならない。（法101条2項） 3. 「法57条の2第1項または2項の規定 （通知対象物を譲渡または提供する者に課せられた危険有害性等に 関する文書の交付等義務） により通知された事項 （代替化学名等を含む）」を、 当該物を取り扱う 労働者に 周知させなければならない。（法101条4項） 1. 安全衛生推進者または衛生推進者の氏名 を関係労働者に周知 させなければならない。（則12条の4） 2. 作業主任者の氏名及びその者に行なわせる事項 を関係労働者に周知 させなければならない。（則18条） 3. 安全委員会 、衛生委員会または安全衛生委員会 における 議事の概要 を労働者に周知 させなければならな い。（則23条3項） 4. 危険性または有害性などの調査を行った ときは、所定の事項を、リスクアセスメント対象物を製造し、ま たは取り扱う業務に従事する 労働者に周知 させなければならない。（則34条の2の8第1項） 5. 作業計画 を定めたときは、所定の事項を、 関係労働者に周知 させなければならない。（則151条の3第3 項、則151条の89第3項、則151条の125第3項、則151条の153第3項、則155条3項、則194条の5第3項、 則194条の9第3項、則517条の2第3項、第517条の6第3項、第517条の14第3項、第517条の20第3項、第 539条の5第3項）","s":"事業者は、安衛法令の要旨を各作業場の見やすい場所に掲示するなどして、労働者に周知しなければなりません。","e":"工場の休憩室に安全衛生法の要旨のポスターを掲示します。","p":"労基法106条に対応する規定。周知方法は「掲示」「備付け」「書面交付」等。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":51},{"r":"法102条","t":"工作物に関する教示","b":"ガス工作物 その他政令で定める 工作物 を設けている者 は、当該 工作物の所在する場所 又はその附近 で 工事その他の 仕事を行う事業者 から、 当該工作物による 労働災害の発生 を防止するため にとるべき措置 についての 教示 を求められた ときは、これを 教示 しなければならない 。 ガス工作物等設置者の義務 労働安全衛生法及びこれに基づく命令の要旨の労働者への周知は 、 「常時10人以上の労働者を使用する事業場に限る 」わけではありま せん。 ガス工作物 その他政令で定める 工作物を設けている者 は、当該 工作物の所在する場所またはその附近 で工事 その他の 仕事を行う事業者 から、 当該工作物による労働災害の発生を防止するためにとるべき措置 についての 教示を求められたとき は、これを 教示しなければならない。（法102条） 「工作物 」とは、① 電気工作物 、②熱供給施設 、③石油パイプライン である。（令25条）","s":"ガス工作物等の危険な工作物を設けている者は、その近くで工事を行う事業者から教示を求められたら応じなければなりません。","e":"ガス管の近くで掘削工事を行う建設会社が、ガス会社に「ガス管の位置と注意事項を教えてください」と求めた場合、ガス会社は教えなければなりません。","p":"「工作物を設けている者」の義務。建設工事等での事故防止が目的。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":53},{"r":"法104条","t":"労働者の心身の状態に関する情報の取扱い","b":"◯1 事業者 は、労働安全衛生法又は同法に基づく命令の規定による措置の実施に関し、 労働者 の心身の状 態に関する 情報を収集 し、 保管 し、又は 使用 するに当たっては、 労働者 の健康の確保 に 必要な範囲内で 労働者 の心身の状態 に関する 情報を収集 し、並びに当該 収集の目的の範囲内 でこれを 保管 し、及び 使用 しなければならない。ただし、 本人の同意 がある場合その他正当な事由があ る場合は、この限りでない。 心身の状態に関する情報の取扱い 事業者 は、労働安全衛生法または同法に基づく命令の規定による措置の実施に関し、 労働者の心身の状態に 関する情報を収集し 、保管し 、または使用する に当たっては、 労働者の健康の確保に必要な範囲内で 労働者 の 心身の状態 に関する 情報を収集 し、並びに当該 収集の目的の範囲内 でこれを 保管し、及び 使用しなければなら ない。ただし、 本人の同意がある場合 その他正当な事由がある場合は、 この限りでない 。（法104条1項）","s":"事業者は、健康診断等で得た労働者の心身の状態に関する情報を、健康確保に必要な範囲内で適正に管理しなければなりません。","e":"健康診断の結果を人事評価に流用したり、本人の同意なく上司に詳細を伝えたりしてはいけません。必要な範囲で適切に管理します。","p":"「必要な範囲内」での収集・保管・使用。「適正に管理」。プライバシーへの配慮が重要。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":55},{"r":"法106条","t":"国の援助","b":"◯1 国は、労働災害の防止 に資するため、 事業者 が行う 安全衛生施設 の整備、特別安全衛生改善 計画 又は 安全衛生改善計画 の実施その他の活動について、金融上の措置、技術上の助言その他 必要な 援助を行うように 努める ものとする。 ◯2 国は、前項の 援助を行うに当たっては、 中小企業者 に対し、 特別の配慮 をする ものとする。 国の援助 「その他正当な事由がある場合 」とは、メンタルヘルス不調により 自殺企図 （きと︓企てること ）の徴候が見られる 場合などが該当しま す。（コンメンタール104条）","s":"国は、安全衛生施設の整備や改善計画の実施等について、金融・技術面での援助を行うよう努めます。","e":"中小企業が安全設備を導入する際の融資制度や技術的なアドバイスを国が提供します。","p":"国の努力義務。金融上の措置、技術上の助言等。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":55},{"r":"法111条","t":"不服申立て","b":"◯1 製造時等検査 、性能検査 、個別検定 又は 型式検定 の結果についての処分 について は、審査請求 をすることができない 。 ◯2 指定試験機関が行う 試験事務に係る処分 若しくはその 不作為 、指定コンサルタント試験機関が行う コン サルタント試験事務に係る処分 若しくはその 不作為 又は指定登録機関が行う 登録事務に係る処分 若しくはその 不作為 については、 厚生労働大臣 に対し、 審査請求 をすることができる 。この場合において、 厚生 労働大臣 は、行政不服審査法第25条第2項及び第3項、第46条第1項及び第2項、第47条並びに第49条第3項 の規定の 適用については、 指定試験機関 、指定コンサルタント試験機関 又は指定登録機関 の上級行政庁 とみな す。 不服申立て 法106条1項の 国の援助 は、「努力義務 」です。","s":"製造時等検査・性能検査・個別検定・型式検定の結果についての処分は、審査請求ができません。","e":"ボイラーの製造時等検査で不合格になっても、「検査結果がおかしい」と審査請求することはできません。","p":"検査・検定の結果は「審査請求できない」。技術的判断に関する処分の特例。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":56},{"r":"法116条","t":"罰則（最も重い罰則）","b":"第55条（ 製造等禁止物質の製造等の禁止 ）の規定に違反 した者は、 3年以下の拘禁刑又は300万円以 下の罰金 に処する。 罰則 2026改正 法55条 （製造等禁止物質の製造等の禁止 ）の規定に違反 した者は、 3年以下の拘禁刑または300万 円以下の罰金 に処せられる。（法116条） R02-09E 2026改正 法116条以外においても、「 1年以下の拘禁刑または100万円以下の罰金 （法117条、法 118条）」「 6か月以下の拘禁刑または50万円以下の罰金 （法119条）」「 50万円以下の罰金 （法120条、法1 21条）」が、その違反内容に応じて設けられている。（法117条〜法121条）","s":"製造等禁止物質を違法に製造・使用等した者は、3年以下の拘禁刑または300万円以下の罰金に処せられます。","e":"全面禁止されている発がん性物質を許可なく製造した場合、最大3年の拘禁刑または300万円の罰金です。","p":"安衛法で最も重い罰則。法55条（製造等禁止）違反。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":57},{"r":"法122条","t":"両罰規定","b":"法人の代表者 又は法人若しくは 人の代理人 、使用人 その他の 従業者 が、その 法人又は人の業 務に関して、第116条、第117条、第119条又は第120条の 違反行為 をした ときは、 行為者 を罰する ほか、その 法人 又は 人に対しても、各本条の 罰金刑 を科する。 両罰規定 R02-09E 法人の代表者 または 法人若しくは 人の代理人 、使用人 その他の 従業者 が、その法人または人の業務 に関して 、法116条、法117条、法119条または法120条の 違反行為 をしたときは、 行為者を罰する ほか、その 法人または 人に対しても、各本条の 罰金刑 が科せられる 。（法122条）","s":"法人の従業者が安衛法に違反した場合、行為者だけでなく法人にも罰金刑が科されます。","e":"工場長が安全措置を怠り事故が起きた場合、工場長本人と会社の両方に罰金が科される可能性があります。","p":"労基法121条と同様の両罰規定。法人にも罰金刑。","f":"10_労働安全衛生法10-雑則等（安全衛生計画、計画の届出、監督組織、雑則、罰則）","pg":58}],"労災保険法":[{"r":"法1条","t":"目的","b":"労働者災害補償保険 は、 業務上の事由 、事業主が同一人でない2以上の事業に使用される労働者 （以下 「複数事業労働者 」という。）の 2以上の事業の業務 を要因とする事由 又は 通勤 による 労働者 の負 傷、疾病、障害 、死亡等 に対して 迅速かつ公正な保護 をするため 、必要な 保険給付 を行 い、あわせて、 業務上の事由 、複数事業労働者 の2以上の事業の業務を要因とする事由 又は 通 勤により 負傷し、又は 疾病にかかった 労働者 の社会復帰の促進 、当該 労働者及びその遺族の援 護、労働者 の安全及び衛生の確保 等を図り、もって 労働者 の福祉の増進 に寄与する ことを 目的と する。","s":"労災保険は、業務上の事由・複数事業の業務を要因とする事由・通勤による労働者のケガ・病気・障害・死亡等に対して、迅速かつ公正に保険給付を行い、あわせて被災労働者の社会復帰の促進、労働者やその遺族の援護、安全衛生の確保等を図る制度です。","e":"工場で機械に巻き込まれてケガをした場合、労災保険から治療費や休業中の給付が受けられます。通勤中の電車事故でも同様です。","p":"「業務災害」「複数業務要因災害」「通勤災害」の3つが保護対象。「迅速かつ公正な保護」がキーワード。社会復帰促進等事業も目的に含まれる。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":2},{"r":"法2条の2","t":"事業内容","b":"労働者災害補償保険 は、第1条の目的を達成するため、 業務上の事由 、複数事業労働者 の2以上の 事業の業務を要因 とする事由 又は 通勤 による 労働者 の負傷、疾病、障害 、死亡等 に関して 保 険給付 を行うほか、 社会復帰促進等事業 を行うことができる 。 目的","s":"労災保険は、業務災害・複数業務要因災害・通勤災害に関して保険給付を行うほか、社会復帰促進等事業を行うことができます。","e":"治療費や休業補償の給付だけでなく、リハビリ施設の運営や被災労働者の就職支援なども行えます。","p":"保険給付＋社会復帰促進等事業の2本柱。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":2},{"r":"法2条","t":"管掌","b":"労働者災害補償保険 は、 政府 が、これを 管掌する。","s":"労災保険は政府が管掌します。","e":"民間の保険会社ではなく、国（政府）が運営する公的な保険制度です。","p":"「政府」が管掌。健保や厚年と同じ。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":10},{"r":"則1条","t":"事務の管轄","b":"◯2 労働者災害補償保険等関係事務 は、 厚生労働省労働基準局長 の指揮監督 を受けて、 所轄都道府県 労働局長 が行う 。 ただし、次の各号に掲げる場合は、当該各号に定める者を 所轄都道府県労働局長 とする。 1. 事業場が2以上の都道府県労働局の管轄区域にまたがる 場合… その事業の主たる事務所 の所在地を 管轄する都道府県労働局長 2. 当該労働者災害補償保険等関係事務 が法第7条第1項第2号に規定する 複数業務要因災害 に関するもの で ある場合…同号に規定する 複数事業労働者 の2以上の事業 のうち、 その収入が当該複数事業労働者の生計 を維持する程度が最も高いもの （次項第2号及び第2条の2において「 生計維持事業 」という。） の 主たる事務所 の所在地を管轄する都道府県労働局長 ◯3 労働者災害補償保険等関係事務 のうち、 保険給付 （二次健康診断等給付 を除く。）並びに 社会復帰 促進等事業 のうち 労災就学等援護費 及び 特別支給金 の支給並びに 厚生労働省労働基準局長が定め る給付 に関する事務は、 都道府県労働局長 の指揮監督 を受けて、事業場の所在地を管轄する労働基準 監督署長（以下「 所轄労働基準監督署長 」という。） が行う 。 ただし、次の各号に掲げる場合は、当該各号に定める者を 所轄労働基準監督署長 とする。 1. 事業場が2以上の労働基準監督署の管轄区域にまたがる 場合… その主たる事務所 の所在地を管轄す る労働基準監督署長 2. 当該労働者災害補償保険等関係事務 が法第7条第1項第2号に規定する 複数業務要因災害 に関するも のである場合… 生計維持事業の主たる事務所 の所在地を管轄する労働基準監督署長 管掌 労働者災害補償保険 は、政府が、これを 管掌する。（法2条） 労働者災害補償保険等関係事務 は、厚生労働省労働基準局長 の指揮監督 を受けて、 所轄都道府県労働局長 が 行う。（則1条2項）","s":"労災保険の事務は、厚生労働省労働基準局長の指揮監督のもと、所轄都道府県労働局長が行います。","e":"労災の申請は通常、事業場を管轄する労働基準監督署に行い、その上位の労働局が管轄します。","p":"所轄は「都道府県労働局長」。一部の事務は「労働基準監督署長」が行う。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":10},{"r":"法5条","t":"労働政策審議会への諮問","b":"労災保険法に基づく政令及び厚生労働省令 並びに 徴収法に基づく政令及び厚生労働省令 （労働者災害補償保 険事業に係るもの に限る。）は、その 草案について、 労働政策審議会 の意見 を聞いて、これを 制定す る。 命令の制定 労災保険法に基づく政令及び厚生労働省令 並びに 徴収法に基づく政令及び厚生労働省令 （労働者災害補償保 険事業に係るものに限る ）は、その 草案について、 労働政策審議会の意見 を聞いて、 制定される。（法5条）","s":"労災保険に関する政令・省令を制定する際は、その草案について労働政策審議会の意見を聞かなければなりません。","e":"労災保険の給付内容を変更する省令を作るときは、事前に労働政策審議会に意見を求めます。","p":"「草案について意見を聞く」。徴収法に基づく政令・省令も対象。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":17},{"r":"法3条","t":"適用事業","b":"◯1 労災保険法においては、 労働者を使用する事業 を適用事業 とする。 ◯2 前項の規定にかかわらず、 国の直営事業 及び 官公署の事業 （労働基準法別表第1に掲げる事業 を除く 。）については、 労災保険法は 、適用しない 。 適用事業 労災保険法においては、 労働者を使用する事業 を適用事業 とする。（法3条1項） 各法における 諮問機関の横断 労働科目 …労働政策審議会 社会科目 …社会保障審議会 （健康保険法、国民年金法、厚生年金保険法） …中央社会保険医療協議会 （健康保険法） …地方社会保険医療協議会 （健康保険法）","s":"労災保険は、労働者を使用するすべての事業に適用されます。ただし、国の直営事業と官公署の非現業事業は除かれます。","e":"飲食店でアルバイト1人を雇っても労災保険は適用されます。ただし、中央省庁のデスクワーク部門は国家公務員災害補償法が適用されるため除外されます。","p":"「労働者を使用する事業」が適用事業（事業所ではない）。国の直営事業・官公署の非現業事業は除外。個人経営の農林水産業の一部は暫定任意適用。","f":"01_労災保険法1-総則（目的、適用、暫定任意適用事業）","pg":19},{"r":"法7条","t":"通勤の定義","b":"◯2 通勤とは、 労働者 が、 就業 に関し、次に掲げる 移動を、 合理的な経路及び方法 により行う こと をいい、 業務の性質を有するもの を除く ものとする。 1. 住居と就業の場所との間 の往復 2. 厚生労働省令で定める就業の場所 から 他の就業の場所 への移動 3. 第1号に掲げる 往復に 先行 し、又は 後続 する 住居間の移動 （厚生労働省令で定める要件に 該当するものに限る。） 「通勤」とは","s":"通勤とは、労働者が就業に関し、①住居と就業場所の間の往復、②就業場所間の移動、③単身赴任先住居と帰省先住居の間の移動を、合理的な経路・方法で行うことです。ただし業務の性質を有するものは除きます。","e":"自宅→会社の電車通勤は通勤。途中でスーパーに寄るのは「逸脱・中断」だが、日常生活上必要な最小限度の行為なら中断後の移動は通勤に戻ります。","p":"3種類の移動。「合理的な経路及び方法」が要件。「逸脱・中断」の扱い（日用品の購入等の例外）が超頻出。","f":"03_労災保険法3-通勤災害の認定（定義、逸脱・中断、通勤による疾病）","pg":4},{"r":"法22条","t":"療養給付（通勤災害）","b":"◯1 療養給付 は、労働者 が通勤 により 負傷し、又は 疾病（厚生労働省令 （労災保険法施行規則 18 条の4 ）で定めるものに 限る。以下この節において同じ。）にかかった場合に、当該 労働者 に対し、その 請 求に基づいて行う。","s":"通勤災害で負傷・疾病にかかった労働者には、療養給付が支給されます。","e":"通勤中に転んで骨折した場合、労災指定病院で治療を受けると療養給付として無料で治療が受けられます。","p":"通勤災害の場合は「療養給付」（業務災害は「療養補償給付」）。名称の違いに注意。通勤災害には一部負担金あり。","f":"03_労災保険法3-通勤災害の認定（定義、逸脱・中断、通勤による疾病）","pg":34},{"r":"則18条の4","t":"通勤による疾病","b":"第22条第1項の厚生労働省令で定める疾病 は、 通勤による負傷に起因する疾病 その他通勤に起因す ることの明らかな疾病 とする。 通勤による疾病","s":"通勤災害の対象となる疾病は、通勤による負傷に起因する疾病、その他通勤に起因することが明らかな疾病です。","e":"通勤中の自転車事故でケガをして、そのケガが原因で後から感染症になった場合も通勤災害の対象です。","p":"「通勤による負傷に起因する疾病」＋「その他通勤に起因することの明らかな疾病」。","f":"03_労災保険法3-通勤災害の認定（定義、逸脱・中断、通勤による疾病）","pg":34},{"r":"法8条","t":"給付基礎日額（原則）","b":"◯1 給付基礎日額 は、労働基準法第12条 の平均賃金 に相当する額 とする。この場合において、同条第1 項の 平均賃金 を算定すべき事由の発生した日 は、第7条第1項第1号から第3号までに規定する 負傷若しく は死亡の原因 である 事故が発生した日 又は診断によって同項第1号から第3号までに規定する 疾病の発生 が確定した日 （以下「 算定事由発生日 」という。）とする。","s":"給付基礎日額は、労基法の平均賃金に相当する額です。算定事由発生日は業務災害・通勤災害の種類によって異なります。","e":"月給30万円の人が労災にあった場合、直前3か月の賃金総額÷暦日数で給付基礎日額を算定します。","p":"「平均賃金に相当する額」が原則。算定事由発生日は「負傷・死亡の日」または「診断によって疾病の発生が確定した日」。","f":"04_労災保険法4-給付基礎日額（原則、特例、自動変更対象額）","pg":2},{"r":"法8条の5","t":"給付基礎日額の端数処理","b":"給付基礎日額 に1円未満の端数 があるときは、これを 1円に切り上げる ものとする。 給付基礎日額（原則）","s":"給付基礎日額に1円未満の端数があるときは、1円に切り上げます。","e":"計算で9,876.5円となった場合、9,877円になります。","p":"「1円に切り上げ」。切り捨てではない。","f":"04_労災保険法4-給付基礎日額（原則、特例、自動変更対象額）","pg":2},{"r":"則9条","t":"給付基礎日額の特例","b":"◯1 第8条第2項の規定による 給付基礎日額の算定 は、 所轄労働基準監督署長 が、労災保険法施行規則 第9条第1項各号に定めるところによって行う。 給付基礎日額の特例 平均賃金相当額 を給付基礎日額とすることが適当でない と認められるときは、 政府（所轄労働基準監督署 長）が算定する。（法8条2項、則9条1項）","s":"平均賃金相当額を給付基礎日額とすることが適当でない場合は、所轄労働基準監督署長が特例で算定します。","e":"日雇労働者やパートタイム労働者で通常の計算では不当に低くなる場合、監督署長が適切な額を決定します。","p":"算定者は「所轄労働基準監督署長」。","f":"04_労災保険法4-給付基礎日額（原則、特例、自動変更対象額）","pg":5},{"r":"法8条の2","t":"休業給付基礎日額（スライド・最低最高限度額）","b":"◯1 休業補償給付、複数事業労働者休業給付又は休業給付 （以下「 休業補償給付等 」という。）の 額の算定 の基礎 として用いる 給付基礎日額 （以下「 休業給付基礎日額 」という。）については、次に定めるところによ る。 1. 2.に規定する休業補償給付等以外の休業補償給付等 については、 第8条の規定により給付基礎日額とし て算定した額 を休業給付基礎日額 とする。 2. 四半期ごとの平均給与額 が、 算定事由発生日の属する四半期の平均給与額 の100分の110 を超え 、又は 100分の90 を下る に至った場合において、 その上昇し 、又は低下するに至った 四半 期の翌々四半期に属する最初の日以後 に支給すべき事由が生じた 休業補償給付等 については、 その上昇 し、又は低下した比率を基準 として 厚生労働大臣が定める率 を第8条の規定により給付基礎日額とし て算定した額 に乗じて得た額を 休業給付基礎日額 とする。 スライド制の適用がない場合 休業（補償）等給付における休業給付基礎日額 は、スライド制の適用がないとき は、次の通りである。（法8 条の2第1項1号） スライド制の適用がない場合 （休業給付基礎日額 （法8条の2））＝（ 法8条の給付基礎日額 ） スライド制の適用がある場合（初回） スライド制の適用がない 場合には 、「法8条の給付基礎日額 」がそ のまま休業給付基礎日額 となります 。 休業（補償）等給付における休業給付基礎日額 は、算定事由発生日の属する四半期の平均給与額 と比較し て、その後の四半期ごとの平均給与額 が100分の110を超え 、または100分の90を下る に至ったときは、次の 通りである。（法8条の2第1項2号） スライド制の適用がある場合（初回） （休業給付基礎日額 （法8条の2））＝（ 法8条の給付基礎日額 ）×（ スライド率 ）","s":"休業補償給付等の額の算定に使う休業給付基礎日額には、スライド制（賃金水準の変動に応じた改定）と最低・最高限度額が適用されます。","e":"事故から何年も経って賃金水準が上がった場合、休業給付の基礎となる日額もそれに応じて引き上げられます。","p":"「スライド制」と「年齢階層別の最低・最高限度額」の2つの仕組み。","f":"05_労災保険法5-給付基礎日額（スライド制、最低・最高限度額）","pg":6},{"r":"法8条の3","t":"年金給付基礎日額（スライド）","b":"◯1 年金たる保険給付 の額の算定の基礎として用いる給付基礎日額（以下「 年金給付基礎日額 」という。） については、次に定めるところによる。 1. 算定事由発生日の属する年度 の翌々年度 の7月以前 の分として支給する 年金たる保険給付 につ いては、第8条の規定により 給付基礎日額 として算定した額を 年金給付基礎日額 とする。 2. 算定事由発生日の属する年度 の翌々年度の8月以後 の分として支給する 年金たる保険給付 について は、第8条の規定により 給付基礎日額 として算定した額に 当該年金たる保険給付を支給すべき月の属する 年度の前年度 （当該月が4月から7月までの月に該当する場合にあっては、前々年度）の 平均給与 額を算定事由発生日の属する年度 の平均給与額 で除して得た率を基準 として 厚生労働大臣が定 める率 を乗じて得た額を 年金給付基礎日額 とする。 スライド制の適用がない場合","s":"年金の保険給付の額の算定に使う年金給付基礎日額にも、スライド制と最低・最高限度額が適用されます。スライドは算定事由発生日の翌々年度の7月以降に適用開始されます。","e":"20年前の事故で障害年金を受けている人の年金額は、その間の賃金水準の変動に応じて改定されます。","p":"「翌々年度の7月以降」からスライド適用。休業給付基礎日額との適用開始時期の違いが出題される。","f":"05_労災保険法5-給付基礎日額（スライド制、最低・最高限度額）","pg":14},{"r":"法8条の4","t":"一時金の給付基礎日額（スライド）","b":"第8条の3第1項（ 年金給付基礎日額のスライド ）の規定は、 障害補償 一時金 若しくは 遺族補償 一時金 、複数事業労働者障害 一時金 若しくは 複数事業労働者遺族 一時金 又は障害 一時金 若 しくは 遺族 一時金 の額の算定の基礎として用いる 給付基礎日額 について 準用す る。 一時金たる保険給付のスライド 2021改正 障害（補償）等一時金 、遺族（補償）等一時金 、障害（補償）等年金前払一時金 、障害（補償）等 年金差額一時金 、遺族（補償）等年金 前払一時金 の額の算定の基礎として用いる 給付基礎日額 については、 年 金給付基礎日額と同様 のスライド制 が適用される。（法8条の4、則附則19項、則附則24項かっこ書、則附則3 1項かっこ書、則附則36項、則附則37項、則附則40項） 葬祭料等 （葬祭給付 ）は、スライド制の適用においては、遺族（補償）等一時金とみなされ、 年金給付基礎 日額のスライド制 が適用される。（則17条、則18条の11） かつては 「年金給付額 」をスライド していましたが 、現在では 、給 付基礎日額をスライドさせる 方式に改正されています 。 一時金たる保険給付 には、年金給付基礎日額のスライドの規定が準 用されます 。 一時金たる保険給付のスライドには 、「年金給付基礎日額 」と同様 のスライド制が適用されます 。「休業（補償）等給付」のスライド制 に準ずるわけではありません 。","s":"障害（補償）一時金や遺族（補償）一時金の算定にも、年金給付基礎日額のスライド規定が準用されます。","e":"障害一時金を受けるときの給付基礎日額にもスライド制が適用されます。","p":"一時金にも年金と同じスライド規定が準用される。","f":"05_労災保険法5-給付基礎日額（スライド制、最低・最高限度額）","pg":19},{"r":"法12条の8","t":"業務災害に関する保険給付の種類","b":"◯2 業務災害に関する保険給付 （傷病補償年金 及び 介護補償給付 を除く。）は、 労働基準法 に規定する 災害補償 の事由又は 船員法 に規定する 災害補償 の事由（労働基準法 に規定する 災害補償 の事由に相当する部分に 限る。）が生じた場合に、 補償を受けるべき 労働者 若しくは 遺 族又は 葬祭を行う者 に対し、その 請求 に基づいて行う 。 労働基準法84条 ◯1 労働基準法に規定する災害補償 の事由について、 労働者災害補償保険法 又は厚生労働省令で指 定する法令 に基づいて 労働基準法の災害補償に相当する給付 が行なわれるべきものである場合においては、 使 用者は、 補償の責 を免れる 。 労働基準法の災害補償との関係","s":"業務災害の保険給付は、労基法の災害補償の事由が生じた場合に行われます。給付の種類は療養補償給付・休業補償給付・障害補償給付・遺族補償給付・葬祭料・傷病補償年金・介護補償給付の7種類です。","e":"仕事中にケガをしたら療養補償給付（治療費）と休業補償給付（休業中の所得補償）が受けられます。","p":"7種類の給付を正確に覚える。「補償」がつくのは業務災害。通勤災害は「補償」がつかない。","f":"06_労災保険法6-保険給付の種類など、療養給付","pg":5},{"r":"法13条","t":"療養補償給付の範囲","b":"◯2 療養の給付の範囲 は、次の各号（ 政府が必要と認めるもの に限る 。）による。 1. 診察 2. 薬剤 又は 治療材料 の支給 3. 処置 、手術 その他の 治療 4. 居宅 における 療養上の管理 及びその 療養に伴う世話 その他の 看護 5. 病院又は診療所 への 入院 及びその 療養に伴う世話 その他の 看護 6. 移送 療養の給付の範囲 療養の給付の範囲 は、① 診察、②薬剤または治療材料の支給 、③処置、手術その他の治療 、④居宅における 療養上の管理及びその療養に伴う世話その他の看護 、⑤病院または診療所への入院及びその療養に伴う世話そ の他の看護 、⑥移送、のうち 政府が必要と認める ものである。（法13条2項） 療養の給付と認められる 場合は、次の通りである。 療養の給付と認められる場合 義歯を破損した場合にこれを補綴 （ほてつ） しまたは修理する こと（昭和24年11月11日基災発313号） 歯科補綴の効果またはその技術上の必要からの 金冠の使用 （昭和23年2月23日基災発24号） リハビリテーション医療 （平成19年1月30日基発0130005号）（平成15年） 柔道整復師 の骨折 、脱臼に対する施術 （応急の場合を除き、医師の同意を得たもの）（昭和31年11月6日 基発754号）（平成元年） 温泉療養 （病院などの付属施設で医師の直接の指導のもとに行うもの）（昭和25年10月6日基発916号） ※治ゆ前のものに限る 。（令和元年、平成28年、平成5年、昭和46年） 災害現場において医師の診察を受けず、被災者を医療機関への 搬送の途中当該被災者が死亡した場合の 、 当該被災者が 死亡に至るまでに要した搬送の費用 （昭和30年7月13日基収841号）（令和元年、平成28年） 災害現場などから医療機関への移送 、転医などに伴う移送 、通院（一定の場合に限る）（平成20年10月3 0日基発1030001号、昭和31年9月22日基収1058号）（平成28年） 療養の給付と認められない 場合は、次の通りである。 「リハビリテーション医療」とは、業務上の事由または通勤による 傷病労働者に対して当該傷病に係る本来の治療に加え、疾患別リハビ リテーションなどを個々の症例に応じて総合的に実施して、労働能力 の回復をはかり職場復帰への医学的指針を与えるまでの一連の行為を いいます。（平成19年1月30日基発0130005号） なお、「リハビリテーション医療」の中で、理学療法士、作業療法 士などにより実際に行われる医療的な「治療・訓練」そのものを「医 学的リハビリテーション」といいます。","s":"療養補償給付（療養の給付）の範囲は、診察、薬剤の支給、処置・手術等の治療、居宅での療養管理、入院・看護、移送など、政府が必要と認めるものです。","e":"骨折の治療で、診察→レントゲン→手術→入院→リハビリ→通院、すべてが療養の給付の対象です。","p":"「政府が必要と認めるものに限る」。範囲は健康保険の療養の給付と同範囲が基本。","f":"06_労災保険法6-保険給付の種類など、療養給付","pg":18},{"r":"則11条","t":"療養の給付を行う医療機関","b":"◯1 療養の給付 は、 社会復帰促進等事業 として設置された 病院若しくは 診療所 又は 都道府県労働局 長の指定する 病院若しくは 診療所 、薬局若しくは 訪問看護事業者 において行う。 療養の給付の担当機関","s":"療養の給付は、社会復帰促進等事業の病院（労災病院）または都道府県労働局長が指定する病院・診療所・薬局等で行います。","e":"労災にあったら、近くの「労災指定病院」で治療を受けると、窓口での自己負担なしで治療が受けられます。","p":"「労災病院」と「指定医療機関」の2種類。指定外の病院では「療養の費用」の支給となる。","f":"06_労災保険法6-保険給付の種類など、療養給付","pg":24},{"r":"則12条の2","t":"療養の費用の請求","b":"◯1 療養補償給付たる 療養の費用の支給 を受けようとする者 は、次に掲げる事項を記載した 請求書 を、 所轄労働基準監督署長 に提出しなければならない。ただし、当該者が施術所（あはき法の届出に係る施 術所及び柔道整復師法に規定する施術所をいう。）のうち都道府県労働局長が定めるもの（以下「指名施術 所」という。）において治療を受ける場合にあっては、当該請求書を、当該指名施術所を経由して所轄労働基 準監督署長に提出することができる。 1. 労働者 の氏名、生年月日 及び住所 2. 事業の名称及び事業場 の所在地 3. 負傷又は発病の年月日 4. 災害の原因及び発生状況 5. 傷病名及び療養の内容 6. 療養に要した費用の額 7. 療養の給付を受けなかった理由 （当該者が、柔道整復師法に規定する柔道整復師又はあはき法に基づく あん摩マッサージ指圧師、はり師若しくはきゅう師の治療を受ける場合にあっては、この限りでない。） 8. 労働者 が複数事業労働者 である場合は、 その旨 ※ 通勤災害 の場合は、 1.から8.の他、「 災害の発生の時刻及び場所 」「通常の通勤の経路及び方法 」等 についても記載する必要がある。（則18条の6第1項） ◯2 前項3号及び4号に掲げる事項については 事業主 （非災害の事業主を除く 。）の証明 を、同項第5号及び 第6号に掲げる事項については医師その他の診療、薬剤の支給、手当又は訪問看護を担当した者（以下「 診療 担当者 」という。） の証明 を受けなければならない。ただし、看護（病院又は診療所の労働者が提供するもの 及び訪問看護を除く。以下同じ。）又は移送に要した費用の額については、この限りでない。 ※ 通勤災害 の場合は、前項 3.及び「 災害の発生の時刻及び場所 」「通常の勤務の経路及び方法 」等につ いても 事業主 （複数事業労働者にあっては、移動の終点ある就業の場所に係る事業主以外の事業主（通勤 災害に係る事業主以外の事業主）の証明は要しない） の証明 を受ける必要がある。（則18条の6第2項） ◯3 第1項6号の額が 看護又は移送に要した費用の額を含む ものであるときは、 当該費用の額を証明すること ができる書類 を、同項の 請求書に添えなければならない 。","s":"療養の費用の支給を受けるには、所定の事項を記載した請求書を所轄労基署長に提出します。","e":"労災指定でない病院で治療を受けた場合、立て替えた治療費を後から請求します。","p":"請求先は「所轄労働基準監督署長」。","f":"06_労災保険法6-保険給付の種類など、療養給付","pg":32},{"r":"法22条の2","t":"通勤災害の一部負担金","b":"◯3 療養給付を受ける労働者 （第31条第2項の厚生労働省令で定める者を除く。）に支給する 休業給付 であって 最初に支給すべき事由の生じた日 に係るものの額 は、その額から第31条第2項の厚生労働省令 で定める額（ 一部負担金 ）に相当する額を 減じた額 とする。 一部負担金の納付義務者 「療養給付 」を受ける労働者 は、一部負担金 を納付しなければならない。（法31条2項）","s":"通勤災害で最初に休業給付を受けるとき、一部負担金（200円）が控除されます。","e":"通勤災害で休業給付を初めて受けるとき、200円が差し引かれます。これは業務災害にはない仕組みです。","p":"一部負担金は「200円」。業務災害にはない通勤災害独自の制度。初回の休業給付から控除。","f":"06_労災保険法6-保険給付の種類など、療養給付","pg":37},{"r":"法19条","t":"打切補償との関係","b":"業務上負傷 し、又は 疾病にかかった 労働者 が、当該 負傷又は疾病 に係る 療養の開始 後3年を経過した日 において 傷病補償年金 を受けている 場合又は 同日後 において 傷病補償年金 を受けることとなっ た場合には、労働基準法第19条第1項（ 解雇制限 ）の規定の適用 については、当該 使用者 は、それぞ れ、当該 3年を経過した日 又は 傷病補償年金を受けることとなった日 において、同法第81条の規定 により 打切補償 を支払ったものと みなす 。 解雇制限との関係","s":"業務上の傷病で療養開始後3年経っても治らない労働者が傷病補償年金を受けている場合、使用者は労基法の打切補償を支払ったものとみなされ、解雇制限が解除されます。","e":"労災で3年以上療養中の労働者が傷病補償年金を受給している場合、会社は打切補償を払わなくても解雇制限が解除されます。","p":"「療養開始後3年」＋「傷病補償年金を受けている」→打切補償を支払ったものとみなす→解雇制限の解除。","f":"08_労災保険法8-傷病年金、障害給付（併合、併合繰上げ、加重、変更、再発）","pg":13},{"r":"則14条の4","t":"生計維持関係の認定","b":"法第16条の2第1項及び法第16条の7第1項第2号に規定する 労働者 の死亡の当時 その収入によって 生計を 維持していた ことの認定 は、当該 労働者 との同居の事実の有無 、当該 労働者以外の扶養義務者の有無 その 他必要な事項を基礎として 厚生労働省労働基準局長 が定める基準 によって行う。 受給資格者","s":"遺族補償給付の受給資格である「労働者の死亡当時、その収入で生計を維持していた」ことの認定は、同居の事実や他の扶養義務者の有無等を考慮して行います。","e":"労働者と別居していた妻でも、仕送りで生活していたなら「生計を維持していた」と認められます。","p":"同居＝原則として生計維持と推定。別居でも仕送り等で生計維持関係が認められる場合あり。","f":"10_労災保険法10-遺族給付（遺族年金、前払一時金）","pg":5},{"r":"則17条の2","t":"葬祭料の請求","b":"◯1 葬祭料 の支給を受けようとする者は、次に掲げる事項を記載した 請求書 を、 所轄労働基準監督署長 に提出しなければならない。 1. 死亡した労働者 の氏名及び生年月日 2. 請求人 の氏名、住所及び死亡した 労働者との関係 3. 事業の名称及び事業場 の所在地 4. 負傷又は発病及び死亡 の年月日 5. 災害の原因及び発生状況 6. 平均賃金 7. 死亡した労働者 が複数事業労働者 である場合は、 その旨 ※ 通勤災害 の場合は、 1.から7.の他、「 災害の発生の時刻及び場所 」「通常の通勤の経路及び方法 」な ど則18条の5第1項に掲げる事項を記載する必要がある。（則18条の12第1項） ◯2 前項第4号から第6号までに掲げる事項（ 死亡 の年月日を除き、死亡した 複数事業労働者 に係る 非 災害発生事業場の事業主 にあっては、同号に掲げる事項に限る。）については、 事業主の証明 を受けな ければならない。ただし、死亡した労働者が傷病補償年金を受けていた者であるときは、この限りでない。 ※ 通勤災害 の場合は、前記 4.、6.及び「 災害の発生の時刻及び場所 」「通常の通勤の経路及び方法 」な どについて 事業主 （複数事業労働者にあっては、通勤災害に係る事業主以外の事業主の証明は前記 6.の事 項に限る） の証明 を受ける必要がある。（則18条の12第2項） 請求 葬祭料 （葬祭給付 ）の支給を受けようとする者 は、所定事項を記載した 請求書 を、所轄労働基準監督署長に 提出しなければならない。（則17条の2第1項、則18条の12第1項） 葬祭料 の請求書に記載すべき事項 のうち、① 負傷または発病及び死亡の年月日 （死亡の年月日を除く）、② 災害の原因及び発生状況 、③平均賃金 については、 事業主の証明 を受けなければならない。葬祭給付について は、請求書に記載すべき事項のうち、①負傷または発病及び死亡の年月日（死亡の年月日を除く）、③平均賃 金、及び災害の発生の時刻及び場所、通常の通勤の経路及び方法などについて事業主の証明（複数事業労働者 にあっては、通勤災害に係る事業主以外の事業主の証明は③の事項に限る）を受けなければならない。ただ し、死亡した労働者が傷病（補償）年金を受けていた者であるときは、この限りではない。（則17条の2第1 項・2項、則18条の12第2項） 葬祭料（葬祭給付）の請求書への記載事項 事業主の証明 1 死亡した労働者 の氏名及び生年月日 2 請求人 の氏名、住所及び死亡した労働者 との関係 3 事業の名称及び事業場 の所在地 4 負傷または 発病及び死亡の年月日 必要 （死亡の年月日 を除く） 5 災害の 原因及び発生状況 必要 （葬祭給付の場 合を除く） 6 平均賃金 必要 7 2021改正 死亡した労働者 が複数事業労働者 である場合は、 その旨 2021改正 上記4.〜6.については、 事業主の証明を受ける 必要があ りますが、死亡した 複数事業労働者に係る 非災害発生事業場の事業主 は6.に限り事業主の証明が必要です。（則17条の2第2項かっこ書） 事業主の証明を受けなければならない事項について問う問題は出題 されたことがありません。 葬祭料 （葬祭給付 ）の請求を遺族 （補償）給付の請求と同時に行う ことは要求されていません 。","s":"葬祭料の支給を受けるには、死亡した労働者の情報と請求人の情報を記載した請求書を所轄労基署長に提出します。","e":"業務上の事故で亡くなった労働者の葬儀を行った遺族が、監督署に葬祭料を請求します。","p":"請求先は「所轄労働基準監督署長」。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":19},{"r":"法20条の3","t":"複数事業労働者療養給付","b":"◯1 複数事業労働者療養給付 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷 し、又は 疾病（厚生労働省令で定めるものに限る。以下同じ。）にかかった場合に、当該 複数事業労働 者に対し、その 請求 に基づいて行う 。 ◯2 第13条（ 療養補償給付 ）の規定は、 複数事業労働者療養給付 について 準用する。 2021改正 複数業務要因災害に関する保険給付 は、療養（補償）給 付、休業（補償）給付、障害（補償）給付、遺族（補償）給付、葬祭 料（葬祭給付）、傷病（補償）年金及び介護（補償）給付と 同一内容 であり、その給付内容、受給権者、他の社会保険による給付との調整 なども業務災害または通勤災害の場合と同様です。（令和2年8月21 日基発0821第1号） 2021改正 実際の認定調査、審査に当たっては、まず、 業務災害 に 該当するか否かが判断されます。これに該当しないときに、 複数業務 要因災害 として給付対象となるか否かが判断されます。どちらに該当 するかによって、事業主の災害補償責任やメリット制などに影響を与 えます。 2021改正 「複数事業労働者」及び「複数業務要因災害」について は、1-3-1を参照してください。","s":"複数の会社で働く労働者が、2つ以上の事業の業務を要因として負傷・疾病にかかった場合、療養給付が支給されます。","e":"A社とB社でダブルワークしている人が、両方の仕事の負荷が重なって精神疾患を発症した場合、複数事業労働者療養給付が受けられます。","p":"「複数事業労働者」の「2以上の事業の業務を要因」が要件。令和2年改正で新設。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":23},{"r":"法20条の4","t":"複数事業労働者休業給付","b":"◯1 複数事業労働者休業給付 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 とする 負傷 又は疾病による 療養 のため労働することができない ために 賃金を受けない 場合に、当該 複数事業 労働者 に対し、その 請求 に基づいて行う 。 ◯2 第14条（ 休業補償給付 ）及び第14条の2（ 休業補償の不支給 ）の規定は、 複数事業労働者休業給付 につ いて準用する。 複数事業労働者休業給付 2021改正 複数事業労働者休業給付 は、複数事業労働者 がその従事する2以上の事業の業務を要因 とする 負傷 または 疾病（厚生労働省令で定めるものに限る ）による 療養のため労働することができない ために 賃金を受け ない場合に、当該 複数事業労働者 に対し、その 請求に基づいて行われる。（法20条の4第1項）","s":"複数事業労働者が2以上の事業の業務を要因とする傷病で療養のため働けず賃金を受けない場合、休業給付が支給されます。","e":"ダブルワーカーが複合的な業務負荷で休業する場合、両方の事業場の賃金を合算した額を基に休業給付が計算されます。","p":"給付基礎日額は「全事業場の賃金を合算」して算定する点が特徴。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":25},{"r":"法20条の5","t":"複数事業労働者障害給付","b":"◯1 複数事業労働者障害給付 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷 し、又は 疾病にかかり、 治ったとき 身体に 障害が存する 場合に、当該 複数事業労働者 に対し、その 請求 に基づいて行う 。 ◯2 複数事業労働者障害給付 は、第15条第1項の厚生労働省令で定める 障害等級 に応じ、 複数事業労働者 障害年金 又は 複数事業労働者障害一時金 とする。 ◯3 第15条第2項（ 障害補償年金又は障害補償一時金の額 ）及び第15条の2（ 障害等級の変更 ）並びに 別表 第1（障害補償年金に係る部分に限る。）及び 別表第2 （障害補償一時金に係る部分に限る。）の規定は、 複 数事業労働者障害給付 について 準用する。 複数事業労働者障害給付 2021改正 複数事業労働者障害給付 は、複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷 し、または 疾病（厚生労働省令で定めるものに限る ）にかかり、 治ったとき 身体に 障害が存する 場合に、当該 複数事業労働者 に対し、その 請求に基づいて行われる。（法20条の5第1項） 2021改正 複数事業労働者障害給付 には、その 障害等級 に応じ、 複数事業労働者障害年金 と複数事業労働者障 害一時金 がある。（法20条の5第2項）","s":"複数事業労働者が2以上の事業の業務を要因として障害が残った場合、障害給付が支給されます。","e":"複数の事業の業務負荷で疾病にかかり、治った後に障害が残った場合に支給されます。","p":"障害等級に応じて年金または一時金。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":26},{"r":"附則60条の3","t":"複数事業労働者障害給付の前払一時金","b":"◯1 政府は、当分の間 、複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷し、又は 疾病 にかかり、 治ったとき 身体に障害が存する 場合における当該 障害に関しては、 複数事業労働者障害年 金を受ける権利を有する者 に対し、その 請求 に基づき、 保険給付 として、 複数事業労働者障害年金 前払一時金 を支給する 。 ◯3 第59条第3項（ 障害補償年金の支給停止 ）、第4項（ 障害補償年金前払一時金の時効 ）及び第6項（ 20 歳前傷病による障害基礎年金等の不支給 ）の規定は、 複数事業労働者障害年金前払一時金 について 準用する。 複数事業労働者障害年金前払一時金 2021改正 複数事業労働者障害年金の受給権者 であって、当該 障害について 複数事業労働者障害年金前払一時 金の請求をしていない 者は、 複数事業労働者障害年金前払一時金 を請求することができる。（附則60条の3第1 項）","s":"複数事業労働者障害年金の受給者は、当分の間、前払一時金の請求ができます。","e":"障害年金を受ける代わりに、まとまった一時金を先に受け取ることができます。","p":"「当分の間」の経過措置。業務災害の障害補償年金の前払一時金と同じ仕組み。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":27},{"r":"附則60条の2","t":"複数事業労働者障害年金差額一時金","b":"◯1 政府は、当分の間 、複数事業労働者障害年金 を受ける権利を有する者が死亡した 場合において、そ の者に支給された当該 複数事業労働者障害年金 の額及び当該 複数事業労働者障害年金 に係る 複数 事業労働者障害年金前払一時金 の額の合計額 が当該 複数事業労働者障害年金 に係る 障害等級 に応じ、 所定 の額に満たない ときは、その者の 遺族 に対し、その 請求 に基づき 、保険給付 として、その 差額 に相当する額の 複数事業労働者障害年金差額一時金 を支給する 。 ◯2 第16条の3第2項（ 遺族補償年金の額 ）、第16条の9第1項及び第2項（ 遺族補償年金の不支給 ）並びに 第58条第2項（ 障害補償年金差額一時金を受けることができる遺族 ）及び第3項（ 障害補償年金差額一時金の 時効）の規定は、 複数事業労働者障害年金差額一時金 について 準用する。 複数事業労働者障害年金差額一時金 2021改正 複数事業労働者障害年金の受給権者が死亡 した場合において、その者に支給された 複数事業労働者 障害年金の額 及び複数事業労働者障害年金前払一時金の額の合計額 が障害等級別の保障額に満たない ときは、 その差額に相当する額の 複数事業労働者障害年金差額一時金 が、その者の 遺族に対し、その 請求に基づき、支 給される。（附則60条の2第1項）","s":"複数事業労働者障害年金の受給者が死亡した場合、既に受けた年金等の合計が一定額に満たないときは、遺族に差額一時金が支給されます。","e":"障害年金を受け始めて間もなく亡くなった場合、年金の受給額が少ないため、遺族に差額が一時金として支払われます。","p":"受給した年金＋前払一時金の合計が障害等級に応じた一定額に満たない場合の差額。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":28},{"r":"法20条の6","t":"複数事業労働者遺族給付","b":"◯1 複数事業労働者遺族給付 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 として 死亡 した場合に、当該 複数事業労働者 の遺族 に対し、その 請求 に基づいて行う 。 ◯2 複数事業労働者遺族給付 は、 複数事業労働者遺族年金 又は 複数事業労働者遺族一時金 とする。 ◯3 第16条の2（ 遺族補償給付の遺族 ）から第16条の9（ 遺族補償給付の欠格 ）まで並びに 別表第1 （遺族 補償年金に係る部分に限る。）及び 別表第2 （遺族補償一時金に係る部分に限る。）の規定は、 複数事業労働 者遺族給付 について 準用する。 複数事業労働者遺族給付 2021改正 複数事業労働者遺族給付 は、複数事業労働者 がその従事する2以上の事業の業務を要因 として 死亡 した場合に、当該 複数事業労働者 の遺族 に対し、その 請求に基づいて行われる。（法20条の6第1項） 2021改正 複数事業労働者遺族給付 は、複数事業労働者遺族年金 または 複数事業労働者遺族一時金 がある。 （法20条の6第2項）","s":"複数事業労働者が2以上の事業の業務を要因として死亡した場合、遺族に遺族給付が支給されます。","e":"ダブルワーカーが両方の仕事の過重負荷で過労死した場合、遺族に遺族年金または遺族一時金が支給されます。","p":"遺族年金と遺族一時金の2種類。受給資格者の範囲と順位は業務災害と同じ。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":29},{"r":"附則60条の4","t":"複数事業労働者遺族年金の前払一時金","b":"◯1 政府は、当分の間 、複数事業労働者 がその従事する2以上の事業の業務を要因 として 死亡した場合 における当該 死亡に関しては、 複数事業労働者遺族年金 を受ける権利を有する遺族 に対し、その 請 求に基づき 、保険給付 として、 複数事業労働者遺族年金前払一時金 を支給する 。 ◯4 第60条第3項（ 遺族補償年金の支給停止 ）、第5項（ 遺族補償年金前払一時金の時効 ）及び第7項（ 20 歳前傷病による障害基礎年金等の不支給 ）の規定は、 複数事業労働者遺族年金前払一時金 について 準用する。 複数事業労働者遺族年金前払一時金 2021改正 複数事業労働者がその従事する2以上の事業の業務を要因として死亡した場合 における当該 死亡に 関しては、 複数事業労働者遺族年金を受ける権利を有する遺族 に対し、その 請求に基づき、 保険給付 として、 複数事業労働者遺族年金前払一時金 が支給される。（附則60条の4第1項）","s":"複数事業労働者遺族年金の受給者は、当分の間、前払一時金の請求ができます。","e":"遺族年金の一部をまとまった一時金として先に受け取ることができます。","p":"業務災害の遺族補償年金の前払一時金と同じ仕組み。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":30},{"r":"法20条の7","t":"複数事業労働者葬祭給付","b":"◯1 複数事業労働者葬祭給付 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 として 死亡 した場合に、 葬祭を行う者 に対し、その 請求 に基づいて行う 。 ◯2 第17条（ 葬祭料の額 ）の規定は、 複数事業労働者葬祭給付 について 準用する。 複数事業労働者葬祭給付 2021改正 複数事業労働者葬祭給付 は、複数事業労働者 がその従事する2以上の事業の業務を要因 として 死亡 した場合に、 葬祭を行う者 に対し、その 請求に基づいて行われる。（法20条の7第1項）","s":"複数事業労働者が2以上の事業の業務を要因として死亡した場合、葬祭を行う者に葬祭給付が支給されます。","e":"過労死したダブルワーカーの葬儀を行った遺族に葬祭給付が支給されます。","p":"業務災害の葬祭料と同じ算定方法。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":31},{"r":"法20条の8","t":"複数事業労働者傷病年金","b":"◯1 複数事業労働者傷病年金 は、 複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷 し、又は 疾病にかかった場合に、当該 負傷又は疾病 に係る 療養の開始後 1年6箇月を経過した日 において 次の各号のいずれにも該当するとき、又は同日後次の各号のいずれにも該当することとなったときに、 そ の状態が継続している間 、当該 複数事業労働者 に対して 支給する 。 1. 当該 負傷又は疾病 が治っていない こと。 2. 当該 負傷又は疾病 による 障害の程度 が厚生労働省令で定める 傷病等級 に該当する こと。 ◯2 第18条（ 傷病補償年金の額 ）、第18条の2（ 傷病等級の変更 ）及び 別表第1 （傷病補償年金に係る部分 に限る。）の規定は、 複数事業労働者傷病年金 について 準用する。 複数事業労働者傷病年金 2021改正 複数事業労働者傷病年金 は、複数事業労働者 がその従事する2以上の事業の業務を要因 として 負傷 し、または 疾病にかかった場合に、当該 負傷または疾病 に係る療養の開始後 1年6か月 を経過した日 において次 のいずれにも該当するとき、または同日後次のいずれにも該当することとなったときに、 その状態が継続して いる間 、当該 複数事業労働者 に対して支給される。（法20条の8第1項） 支給要件 1. 当該 負傷または疾病 が治っていない こと 2. 当該 負傷または疾病 による 障害の程度 が厚生労働省令で定める 傷病等級 に該当 すること 2021改正 傷病補償年金の規定が準用されます 。（法20条の8第2 項、則18条の3の15）","s":"複数事業労働者が療養開始後1年6か月経過しても治らず、障害の程度が傷病等級に該当する場合、傷病年金が支給されます。","e":"ダブルワーカーが精神疾患で1年6か月以上療養し、なお重い状態にある場合に傷病年金に切り替わります。","p":"「1年6か月」経過後。傷病等級第1級〜第3級。請求ではなく「職権」で支給決定。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":32},{"r":"法26条","t":"二次健康診断等給付","b":"◯1 二次健康診断等給付 は、労働安全衛生法 第66条第1項の規定による 健康診断 又は当該健康診断に係 る同条第5項ただし書の規定による 労働者指定医 による 健康診断 のうち、 直近のもの （以下「 一次健康診 断」という。）において、 血圧検査 、血液検査 その他業務上の事由による 脳血管疾患 及び 心臓疾 患の発生にかかわる身体の状態に関する検査 であって、厚生労働省令で定めるものが行われた場合におい て、当該 検査を受けた労働者 がその いずれの項目 にも 異常の所見 があると 診断されたときに、当該 労働者 （当該 一次健康診断の結果 その他の事情により 既に脳血管疾患又は心臓疾患の症状を有すると認め られるもの を除く 。）に対し、その 請求 に基づいて行う。 二次健康診断等給付","s":"定期健康診断で脳・心臓疾患に関する4つの検査項目すべてに異常があった場合、二次健康診断と特定保健指導を受けられます。ただし、既に脳・心臓疾患の症状がある人は対象外です。","e":"定期健診で血圧・血中脂質・血糖・腹囲（BMI）の全項目で異常が出た人は、無料で精密検査と保健指導が受けられます。","p":"4項目「すべて」に異常が必要。1年度に1回限り。既に症状がある者は除外。「労働安全衛生法の健康診断」が起点。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":35},{"r":"則11条の3","t":"二次健康診断等給付の実施機関","b":"◯1 二次健康診断等給付 は、 社会復帰促進等事業 として設置された病院若しくは診療所 又は 都道府県 労働局長 の指定する病院若しくは診療所 において行う。","s":"二次健康診断等給付は、労災病院または都道府県労働局長の指定する病院等で行います。","e":"二次健康診断は労災指定病院で受けます。","p":"療養の給付と同じく「労災病院」と「指定医療機関」で実施。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":43},{"r":"則18条の19","t":"二次健康診断等給付の請求","b":"◯1 二次健康診断等給付を受けようとする者 は、所定の事項を記載した 請求書 を、当該 二次健康診断等給付 を受けようとする 健診給付病院等 を経由 して 所轄都道府県労働局長 に提出 しなければならない。 ◯4 二次健康診断等給付の請求 は、 一次健康診断を受けた日から3箇月以内 に行わなければならない 。 ただし、天災その他請求をしなかったことについてやむを得ない理由があるときは、この限りでない。 給付の方法 二次健康診断等給付 は、健診給付病院等 （社会復帰促進等事業 として設置された病院若しくは診療所（ 労災 病院）または 都道府県労働局長 が指定した病院若しくは診療所 ）において行われる。（則11条の3第1項） 健診給付病院等 1. 社会復帰促進等事業 として設置された 病院または診療所 （労災病院 ） 2. 都道府県労働局長の指定 する病院または診療所","s":"二次健康診断等給付を受けるには、請求書を健診給付病院等を経由して所轄都道府県労働局長に提出します。","e":"請求書を指定病院に提出し、病院経由で労働局に届きます。","p":"請求先は「所轄都道府県労働局長」。病院等を「経由」する。","f":"11_労災保険法11-遺族給付（遺族一時金、葬祭料）、複数業務要因災害に関する保険給付、二次健康診断等給付","pg":43},{"r":"法9条","t":"年金の支給期間","b":"◯1 年金たる保険給付の支給 は、支給すべき事由が生じた 月の翌月 から始め、支給を受ける権利が 消 滅した月 で終わる ものとする。 ◯2 年金たる保険給付 は、その 支給を停止すべき事由 が生じた ときは、その事由が生じた 月の翌月 からその 事由が消滅した月 までの間は、 支給しない 。 ◯3 年金たる保険給付 は、毎年 2月 、4月 、6月 、8月 、10月 及び 12月 の6期 に、それぞれその 前月分 までを支払う。ただし、支給を受ける 権利が消滅した 場合におけるその期の年 金たる保険給付は、 支払期月でない月 であっても、 支払う ものとする。 年金給付の支給期間","s":"年金の保険給付は、支給事由が生じた月の翌月から始まり、受給権が消滅した月で終わります。支給停止事由がある間は支給されません。","e":"10月に障害
