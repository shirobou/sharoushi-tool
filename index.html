等級に該当したら、11月分から年金の支給が始まります。","p":"「翌月から開始」「消滅した月で終了」。偶数月に前2か月分をまとめて支給。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":2},{"r":"法10条","t":"未支給の保険給付（船舶の行方不明等）","b":"船舶 が沈没し、転覆し、滅失し、若しくは 行方不明 となった際 現にその船舶に乗っていた労働者 若しくは 船舶に乗っていて その 船舶の航行中に行方不明となった労働者 の生死が 3箇月間 わからない 場合又はこれらの 労働者 の死亡が 3箇月以内 に明らか となり、かつ、その 死亡の時期がわからない場 合には、 遺族補償給付 、葬祭料 、遺族給付 及び葬祭給付 の支給に関する規定の適用については、その 船 舶が沈没し、転覆し、滅失し、若しくは 行方不明 となった日又は 労働者 が行方不明 となった日に、当該 労 働者は、死亡したものと 推定 する。 航空機 が墜落し、滅失し、若しくは 行方不明 となった際 現に その航空機に乗っていた労働者 若しくは 航空機に乗っていて その 航空機の航行中行方不明となった労働 者の生死が 3箇月間 わからない 場合又はこれらの 労働者 の死亡が 3箇月以内 に明らか となり、か つ、その 死亡の時期がわからない場合 にも、同様とする。 附則58条、（附則61条2項） ◯4 障害補償年金差額一時金 は、遺族補償給付とみなして 第10条の規定を適用する。 死亡の推定","s":"船舶の沈没等で3か月間生死不明、または航空機の墜落等で行方不明の場合、その日に死亡したものと推定して保険給付を行います。","e":"漁船が沈没して乗組員の生死が3か月間わからない場合、沈没の日に死亡したものとみなして遺族給付等を支給します。","p":"船舶の場合は「3か月」生死不明。航空機の場合は「行方不明となった日」に死亡と推定。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":5},{"r":"法11条","t":"未支給の保険給付","b":"◯1 労災保険法に基づく 保険給付を受ける権利を有する者 が死亡した場合において、その 死亡した者 に支給 すべき 保険給付 でまだその者に 支給しなかったもの があるときは、その者の 配偶者 （婚姻の届出を していないが、事実上婚姻関係と同様の事情にあった者を含む。以下同じ。）、 子、父母 、 孫、祖父母 又は 兄弟姉妹 であって、その者の 死亡の当時 その者と 生計を同じく していたも の（遺族補償年金 については当該 遺族補償年金 を受けることができる 他の遺族 、複数事業労働者遺族年 金については当該 複数事業労働者遺族年金 を受けることができる 他の遺族 、遺族年金 については当該 遺 族年金 を受けることができる 他の遺族 ）は、 自己の名 で、その 未支給の保険給付 の支給を 請求 することができる。 ◯2 前項の場合において、 死亡した者 が死亡前 にその 保険給付 を請求していなかった ときは、同項に規 定する者は、 自己の名 で、その 保険給付 を請求 することができる。 未支給の保険給付 「未支給の保険給付 」とは、①支給事由が生じた保険給付であって、 請求されていないもの 、②請求があっ たがまだ 支給決定がないもの 、③支給決定はあったが まだ支払われていないもの をいう。（昭和41年1月31日 基発73号） 未支給の保険給付 1. 支給事由が生じた保険給付であって、 請求されていない もの 2. 請求があったがまだ 支給決定がない もの 3. 支給決定はあったがまだ 支払われていない もの 「現物給付 」である療養 （補償）等給付たる 「療養の給付 」または 「二次健康診断等給付 」には、未支給の規定は適用されません （「療 養の費用の支給 」については対象です ）。（コンメンタール11条）","s":"保険給付の受給権者が死亡し、まだ支給されていない給付がある場合、一定の遺族が自己の名で請求できます。","e":"障害年金を受けていた人が亡くなり、まだ支払われていない分の年金があれば、遺族が代わりに請求して受け取れます。","p":"請求できる遺族の範囲と順位（配偶者→子→父母→孫→祖父母→兄弟姉妹）。「自己の名で」請求。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":9},{"r":"法12条の5","t":"受給権の保護（退職による不変更）","b":"◯1 保険給付を受ける権利 は、 労働者の退職 によって 変更 されることはない 。 受給権の保護 R06-07ｴ 保険給付を受ける権利 は、労働者の退職 によって 変更されることはない 。（法12条の5第1項） 2人以上の請求権者がいるような場合には、その請求及び支給の手 続を簡素化するために法11条4項は設けられています。","s":"保険給付を受ける権利は、労働者が退職しても変更されません。","e":"労災で障害年金を受けている人が会社を辞めても、年金はそのまま受け続けられます。","p":"労基法83条と同趣旨。退職しても受給権は存続。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":18},{"r":"法12条の6","t":"公課の禁止","b":"租税その他の公課 は、保険給付 として支給を受けた 金品 を標準 として 課することはできない 。 公課の禁止 租税その他の公課 は、保険給付 として支給を受けた 金品を標準として課することはできない 。（法12条の 6） 労働者災害補償保険に関する書類には、 印紙税 を課さない 。（法44条）","s":"労災保険の保険給付として受けたお金には、税金や社会保険料を課すことはできません。","e":"休業補償給付で受け取ったお金に所得税はかかりません。","p":"「租税その他の公課」が禁止。非課税。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":22},{"r":"法12条の7","t":"届出・書類の提出義務","b":"保険給付を受ける権利を有する者 は、政府に対して、 保険給付 に関し必要な厚生労働省令で定める事項を 届け出 、又は 保険給付 に関し必要な厚生労働省令で定める 書類 その他の 物件を提出 しなければ ならない。","s":"保険給付の受給権者は、政府に対して必要な届出を行い、必要な書類等を提出しなければなりません。","e":"障害年金の受給者は、定期的に現況届を提出して、引き続き受給要件を満たしていることを届け出ます。","p":"届出・提出を怠ると、給付の支給を一時差止めされることがある。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":23},{"r":"則21条","t":"定期報告","b":"◯1 年金たる保険給付の受給権者 は、毎年、厚生労働大臣が指定する日（以下「 指定日 」という。）ま でに、所定事項を記載した 報告書 を、 所轄労働基準監督署長に提出 しなければならない。ただし、 所轄 労働基準監督署長 があらかじめ その必要がないと認めて 通知したとき又は厚生労働大臣が番号利用法第22条 第1項の規定により当該報告書と同一の内容を含む 利用特定個人情報の提供を受けることができる ときは、こ の限りでない。 保険給付に関する届出 保険給付を受ける権利を有する者 は、政府に対して、 保険給付 に関し必要な厚生労働省令で定める事項を 届 け出、または 保険給付 に関し必要な厚生労働省令で定める 書類その他の 物件を提出しなければならない。（法1 2条の7） 2025改正 2021改正 2020改正 年金たる保険給付の受給権者 は、毎年、指定日まで に、所定事項を記載した 定期報告書 を、所轄労働基準監督署長に提出 しなければならない。ただし、 所轄労働基準監督署長 があらかじ めその必要がないと認めて 通知した ときまたは厚生労働大臣が 番号利用法 の規定により当該報告書と同一の内 容を含む 利用特定個人情報の提供を受けることができる ときは、この限りでない。（則21条1項、令和2年厚労 告293号） 年金たる保険給付の受給権者の生年月日 指定日 1月から6月生まれ 6月30日 7月から12月生まれ 10月31日","s":"年金受給者は、毎年、厚生労働大臣が指定する日までに報告書を所轄労基署長に提出しなければなりません。","e":"障害年金を受けている人は、毎年決まった時期に現況報告書を監督署に提出します。","p":"マイナンバーにより住民基本台帳の情報を確認できる場合は省略可能な場合あり。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":23},{"r":"法12条","t":"過誤払の調整","b":"◯1前段 年金たる保険給付 の支給を停止すべき事由が生じた にもかかわらず、その 停止すべき期間の分 として 年金たる保険給付 が支払われた ときは、その 支払われた 年金たる保険給付 は、その後に支払 うべき 年金たる保険給付 の内払 とみなすことができる 。 内払処理①（支給停止に係る内払処理） 年金たる保険給付 の支給を「 停止すべき事由 が生じた 」にもかかわらず、その 停止すべき期間の分 として 年 金たる保険給付が支払われた ときは、その 支払われた年金たる保険給付 は、その後に支払うべき年金たる保険 給付の内払とみなすことが できる 。（法12条1項前段）","s":"年金の支給を停止すべきなのに支払われてしまった場合、その分は後の年金から差し引いて調整します。","e":"就労により年金が停止されるべき月の分が誤って支払われた場合、翌月以降の年金から差し引かれます。","p":"「内払」とみなしての調整。過払い分を後の給付から控除する仕組み。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":28},{"r":"法12条の2","t":"死亡後の過誤払の調整","b":"年金たる保険給付 を受ける権利を有する者が 死亡 したためその支給を受ける 権利が消滅した にもかか わらず、その 死亡 の日の属する月の翌月以後の分として当該 年金たる保険給付 の過誤払 が行われた 場合において、当該 過誤払 による 返還金に係る債権 （以下「 返還金債権 」という。）に係る 債務の弁済をすべき者 に支払うべき 保険給付 があるとき は、当該 保険給付の支払金の金額 を当該 過誤払 による 返還金債権 の金額に 充当 することができる 。 充当処理①（死亡に関する保険給付の受給権者の場合） 年金たる保険給付 を受ける権利を有する者が 死亡した ためその支給を受ける 権利が消滅 したにもかかわら ず、その死亡の日の属する月の翌月以後の分として当該 年金たる保険給付の過誤払が行われた 場合において、 当該過誤払 による 返還金債権 に係る 債務の弁済をすべき者 に支払うべき保険給付があるとき は、当該 保険給付 の支払金の金額 を当該 過誤払による返還金債権の金額 に充当することが できる 。（法12条の2）","s":"年金受給者が死亡したのに、死亡月の翌月以降の年金が誤って支払われた場合、同じ人に支払うべき他の保険給付から差し引けます。","e":"年金受給者が亡くなった後に振り込まれた年金は、遺族に支払うべき未支給の保険給付から差し引いて精算します。","p":"死亡後の過誤払→「遺族に支払うべき保険給付」から控除。","f":"12_労災保険法12-給付通則等（給付通則、内払・充当）","pg":40},{"r":"法12条の2の2","t":"給付の制限","b":"◯1 労働者 が、 故意に 負傷、疾病、障害若しくは 死亡又はその 直接の原因 となった 事故を生じさせ たときは、 政府は、保険給付を行わない 。 障害（補償）等給付と「一時金である障害手当金 」が併給される場 合には 、厚生年金保険法の 「障害手当金 」の方が調整されます 。","s":"労働者が故意に事故を起こしたときは保険給付は行われません。故意の犯罪行為や重大な過失で事故を起こしたときは、給付の全部または一部が制限されます。","e":"わざと自分の手を機械に挟ませた場合は保険給付なし。飲酒運転で通勤中に事故を起こした場合は給付が一部カットされる可能性があります。","p":"「故意」→不支給。「故意の犯罪行為・重大な過失」→全部又は一部の制限。「正当な理由なき療養の指示違反」→一時差止め。","f":"13_労災保険法13-給付通則等（制度間調整、支給制限、費用徴収）","pg":10},{"r":"法47条の3","t":"届出等の不履行による一時差止め","b":"政府は、保険給付を受ける権利を有する者 が、正当な理由がなくて 、第12条の7の規定による 届出 を せず、若しくは 書類その他の 物件の提出 をしない とき、又は第47条及び第47条の2（労働者及び受給者 の報告、出頭等及び受診命令）の規定による 命令に従わない ときは、 保険給付の支払を 一時差し止め ることができる。 一時差止め 政府は、保険給付を受ける権利を有する者 が、正当な理由がなくて 、届出をせず 、若しくは 書類その他の 物 件の提出をしない とき、または 保険給付を受けようとする者 が報告、届出、文書などの提出または受診 命令に 従わない ときは、保険給付の 支払を一時差し止める ことができる。（法47条の3） まとめると 、療養（補償）等給付 、介護（補償）等給付 、遺族（補 償）等給付 、葬祭料等 （葬祭給付 ）、二次健康診断等 給付は、故意の 犯罪行為または重過失 、療養に関する指示違反の場合に係る 支給制限 の対象外 となります 。 「保険給付の支払を一時差し止める 」とは、金銭給付の支払を受給 権者に対して 一時的にしないこと であり 、差止め事由がなくなれば留 保した金銭給付の支払を行う ことをいいます 。（コンメンタール47 条の3）","s":"正当な理由なく届出や書類の提出をしない場合、政府は保険給付の支払いを一時差し止めることができます。","e":"現況届を提出しない年金受給者に対して、届出があるまで年金の支払いを一時停止します。","p":"「一時差止め」であり「不支給」ではない。届出すれば支給再開。","f":"13_労災保険法13-給付通則等（制度間調整、支給制限、費用徴収）","pg":19},{"r":"法31条","t":"費用徴収（事業主からの徴収）","b":"◯1 政府は、次の各号のいずれかに該当する 事故について 保険給付 を行ったときは、 業務災害 に関する 保険給付 にあっては 労働基準法 の規定 による 災害補償の価額 の限度 又は 船員法 の規定 による 災害補償 のうち 労働基準法 の規定 による 災害補償に相当する災害補償の価額 の限度 で、 複数 業務要因災害 に関する 保険給付 にあっては 複数業務要因災害 を業務災害 とみなした場合に支給さ れるべき 業務災害 に関する 保険給付 に相当する 労働基準法 の規定 による 災害補償の価額 （当該 複数 業務要因災害に係る事業ごとに算定した額 に限る。） の限度 で、 通勤災害 に関する 保険給付 にあっては 通勤災害 を業務災害 とみなした場合に支給されるべき 業務災害 に関する 保険給付 に相当する 労働 基準法 の規定 による 災害補償の価額 の限度 で、その 保険給付 に要した費用 に相当する金額の 全部又 は一部 を事業主 から徴収することができる。 1. 事業主 が故意又は重大な過失 により徴収法第4条の2第1項の規定（ 保険関係成立届 ）による 届 出であってこの保険に係る 保険関係の成立 に係るものをしていない 期間（政府が当該事業について徴収法 第15条第3項の規定（ 概算保険料の認定決定 ）による 決定をしたときは、その 決定後の期間を除 く。）中に生じた事故 2. 事業主 が徴収法第10条第2項第1号の 一般保険料を納付しない 期間（徴収法第27条第2項の 督促 状に指定する期限後の期間 に限る。）中に生じた事故 3. 事業主 が故意又は重大な過失 により生じさせた 業務災害の原因 である事故 支給停止の場合は 、その後支給されることはありませんが 、一時差 止めの場合は 、差止め事由が解消されたときにさかのぼって支給が行 われます 。","s":"事業主が故意・重過失で保険関係成立届を出さない間に労災事故が起きた場合等、政府は事業主から保険給付の費用の全部または一部を徴収できます。","e":"労災保険に加入手続きをしていない会社で事故が起きた場合、労働者には保険給付を行いますが、その費用は事業主に請求します。","p":"事業主からの費用徴収の3つのケース（故意の届出未提出、重過失の届出未提出、故意・重過失による事故）。","f":"13_労災保険法13-給付通則等（制度間調整、支給制限、費用徴収）","pg":21},{"r":"法12条の3","t":"不正受給者からの費用徴収","b":"◯1 偽りその他不正の手段 により 保険給付を受けた 者があるときは、 政府は、その 保険給付 に要した費 用に相当する金額の 全部又は一部 をその者から 徴収することができる。 ◯2 前項の場合において、 事業主 （徴収法第8条第1項又は第2項の規定により元請負人が事業主とされる場 合にあっては、当該元請負人。以下同じ。）が 虚偽の報告又は証明 をしたため その保険給付が行なわれ たものであるときは、 政府は、その 事業主 に対し、 保険給付を受けた者 と連帯して 前項の 徴収金 を納付 すべきことを 命ずる ことができる。 不正受給者からの費用徴収 R06-07ｵ R02-02C 偽りその他不正の手段 により 保険給付を受けた 者があるときは、 政府は、その 保険給付に 要した費用 に相当する金額の 全部または一部 をその者から 徴収することができる 。（法12条の3第1項） R06-07ｵ R02-02D 事業主が 虚偽の報告または証明 をしたためその 保険給付が行なわれた ものであるときは、 政府は、その 事業主 に対し、 保険給付を受けた者 と連帯して徴収金 を納付すべきことを 命ずる ことができる。 （法12条の3第2項） 労災保険法 、国民年金法 、厚生年金保険法などの 「年金給付 」があ るものは 、「不正の手段 」と表現しますが 、雇用保険法や健康保険法 などの短期給付のものは 、「不正の行為 」と表現しています 。","s":"偽りや不正の手段で保険給付を受けた者からは、給付に要した費用の全部または一部を徴収できます。事業主が虚偽の報告をした場合は、事業主にも連帯して徴収できます。","e":"ケガが治っているのに「まだ治っていない」と嘘をついて休業給付を受け続けた場合、受け取った全額を返還させられます。","p":"不正受給者本人＋虚偽報告をした事業主の「連帯徴収」。","f":"13_労災保険法13-給付通則等（制度間調整、支給制限、費用徴収）","pg":35},{"r":"法12条の4","t":"第三者行為災害","b":"◯1 政府は、保険給付の原因である事故 が第三者の行為 によって生じた 場合において、 保険給付をし たときは、その 給付の価額の限度 で、保険給付を受けた者 が第三者 に対して有する 損害賠償の請 求権を取得 する。 ◯2 前項の場合において、 保険給付を受けるべき者 が当該 第三者 から 同一の事由 について 損害賠償を 受けた ときは、政府は、その 価額の限度 で保険給付をしない ことができる。 求償（労災保険給付先行の場合）","s":"第三者の行為によって事故が起きた場合、政府が先に保険給付をしたときは、その分だけ第三者への損害賠償請求権を政府が取得します（求償）。逆に、先に第三者から賠償を受けた場合は、その分だけ保険給付が控除されます。","e":"通勤中に他の車にぶつけられた場合、まず労災保険から給付を受け、その後、政府が加害者側（保険会社）に求償します。","p":"「求償」（政府→第三者）と「控除」（第三者からの賠償→給付減額）の2つの仕組み。示談による注意点も出題。","f":"14_労災保険法14-損害賠償との調整（第三者行為災害、求償、控除、事業主行為災害）","pg":5},{"r":"附則64条","t":"年金給付と損害賠償との調整","b":"◯1 労働者又はその遺族 が障害補償年金 若しくは 遺族補償年金 、複数事業労働者障害年金 若しくは 複数事業労働者遺族年金 又は障害年金 若しくは 遺族年金 （以下「 年金給付 」という。） を受けるべき場 合（当該年金給付を受ける権利を有することとなった時に、当該年金給付に係る 障害補償年金前払一時金 若し くは遺族補償年金前払一時金 、複数事業労働者障害年金前払一時金 若しくは 複数事業労働者遺族年金前払一時 金又は障害年金前払一時金 若しくは 遺族年金前払一時金 （以下「 前払一時金給付 」という。） を請求す ることができる 場合に限る。）であって、 同一の事由 について、当該 労働者 を使用している 事業主 又は 使用していた 事業主 から民法その他の法律による 損害賠償 （当該 年金給付 によって填補される 損害を填補する部分に限る。） を受けることができる ときは、当該 損害賠償 については、当分の間、次 に定めるところによるものとする。 1. 事業主 は、当該 労働者又はその遺族 の年金給付 を受ける権利が消滅するまで の間、その損害の発生 時から当該 年金給付 に係る 前払一時金給付 を受けるべき時までの その損害の発生時における 法定利率 により計算される額を合算した場合における当該合算した額が当該 前払一時金給付 の 最高限度額 に相当する額となるべき額（次号の規定により損害賠償の責めを免れたときは、その免れ た額を控除した額）の限度で、その 損害賠償 の履行をしない ことができる。 2. 前号の規定により 損害賠償の履行 が猶予 されている場合において、 年金給付 又は 前払一時 金給付 の支給が行われた ときは、 事業主 は、その損害の発生時から当該支給が行われた時までの その損 害の発生時における 法定利率 により計算される額を合算した場合における当該合算した額が当該 年 金給付 又は 前払一時金給付 の額となるべき額の限度で、その 損害賠償 の責めを免れる 。 事業主側（民事損害賠償額）での調整","s":"年金給付を受ける人が、同じ事由で使用者から損害賠償を受ける場合、一定期間（最大7年間）年金の支給が調整されます。","e":"労災事故で障害年金を受けている人が、会社から賠償金を受け取った場合、賠償金の額に応じて最大7年間、年金の一部が支給停止されます。","p":"調整期間は「災害発生後の7年間を限度」。全額停止ではなく一部調整。","f":"14_労災保険法14-損害賠償との調整（第三者行為災害、求償、控除、事業主行為災害）","pg":29},{"r":"法29条","t":"社会復帰促進等事業","b":"◯1 政府は、労働者災害補償保険 の適用事業 に係る 労働者及びその遺族 について、 社会復帰促進等事業 として、次の事業を行うことができる。 1. 療養に関する 施設 及びリハビリテーション に関する 施設の設置及び運営 その他 業務災害 、複 数業務要因災害 及び通勤災害 を被った労働者（以下「 被災労働者 」という。）の 円滑な社会復帰を促 進するために 必要な事業 2. 被災労働者 の療養生活の援護 、被災労働者 の受ける 介護の援護 、その 遺族の就学の援 護、被災労働者 及びその 遺族が必要とする 資金の貸付け による 援護その他 被災労働者 及びその 遺族 の援護 を図るために 必要な事業 3. 業務災害 の防止に関する活動 に対する 援助 、健康診断 に関する 施設の設置及び運営 その他 労働者 の安全及び衛生の確保 、保険給付 の適切な実施の確保 並びに 賃金の支払の確保 を 図るために 必要な事業 社会復帰促進等事業の種類 社会復帰促進等事業 は、次の通りである。（法29条1項） 社会復帰促進等事業 1. 社会復帰促進 事業 2. 被災労働者等援護 事業 3. 安全衛生確保等 事業","s":"政府は、労災保険の適用事業の労働者・遺族について、①社会復帰促進事業、②被災労働者等援護事業、③安全衛生・賃金支払確保事業を行うことができます。","e":"労災病院の運営、義肢の支給、遺族の就学援助、未払賃金立替払事業などが含まれます。","p":"3つの事業（社会復帰促進・被災者援護・安全衛生等確保）。「特別支給金」も社会復帰促進等事業の一部。","f":"15_労災保険法15-社会復帰促進等事業","pg":2},{"r":"法38条","t":"不服申立て","b":"◯1 保険給付 に関する決定に不服のある 者は、 労働者災害補償保険審査官 に対して 審査請求 をし、 その決定に不服のある 者は、 労働保険審査会 に対して 再審査請求 をすることができる。 ◯2 前項の 審査請求をしている 者は、 審査請求 をした日から 3箇月 を経過しても 審査請求についての決 定がない ときは、 労働者災害補償保険審査官 が審査請求 を棄却 したものとみなす ことができる。 ◯3 第1項の 審査請求及び再審査請求 は、 時効の完成猶予及び更新 に関しては、これを 裁判上の請 求とみなす 。 審査請求及び再審査請求","s":"保険給付に関する決定に不服がある場合、まず労災保険審査官に審査請求し、その決定にも不服なら労働保険審査会に再審査請求できます。","e":"障害等級の認定に納得がいかない場合、まず審査官に審査請求し、それでも不服なら審査会に再審査請求します。","p":"「二審制」：①労災保険審査官→②労働保険審査会。審査請求前置（訴訟を起こす前に審査請求が必要）。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":2},{"r":"法40条","t":"訴訟との関係","b":"第38条第1項（保険給付に関する決定）に規定する 処分の取消しの訴え は、当該 処分についての 審査請求 に 対する 労働者災害補償保険審査官 の決定を経た後 でなければ、 提起 することができない 。 訴訟との関係","s":"保険給付に関する処分の取消訴訟は、労災保険審査官の決定を経た後でなければ提起できません。","e":"障害等級に不服で裁判を起こしたい場合、まず審査官の審査請求を経なければ裁判所に訴えられません。","p":"「審査請求前置」。再審査請求を経なくても（審査官の決定後に）訴訟は可能。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":8},{"r":"法30条","t":"保険料","b":"労働者災害補償保険事業に要する費用にあてるため政府が徴収する 保険料 については、 徴収法 の 定めるところ による。 保険料 保険給付に関する処分に対する場合と異なり、審査請求をせずに、 直ちに提起することができます 。","s":"労災保険事業の費用は、徴収法に基づく保険料でまかなわれます。","e":"労災保険料は事業主が全額負担します。労働者の負担はありません。","p":"「全額事業主負担」。保険料率は業種ごとに異なる（メリット制あり）。保険料に関する不服は「直ちに訴訟提起」可能（審査請求前置なし）。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":11},{"r":"法42条","t":"時効","b":"◯1 療養補償給付 、休業補償給付 、葬祭料 、介護補償給付 、複数事業労働者療養給付 、複数事業労働者休業 給付、複数事業労働者葬祭給付 、複数事業労働者介護給付 、療養給付 、休業給付 、葬祭給付 、介護給付 及び二 次健康診断等給付 を受ける権利は、 これらを行使することができる時 から 2年 を経過した とき、 障害補償 給付、遺族補償給付 、複数事業労働者障害給付 、複数事業労働者遺族給付 、障害給付 及び遺族給付 を受ける権 利は、 これらを行使することができる時 から 5年 を経過した ときは、 時効によって消滅 する。 ◯2 第8条の2第1項第2号の規定による 四半期ごとの平均給与額 又は第8条の3第1項第2号の規定による 年度 の平均給与額 が修正されたことにより、第8条の2第1項第2号、第8条の3第1項第2号又は第16条の6第2項 （第20条の6第3項若しくは第22条の4第3項において準用する場合又は第58条第1項、第60条の2第1項若し くは第61条第1項の規定によりその例によることとされる場合を含む。）に規定する厚生労働大臣が定める率 を厚生労働大臣が、第8条第2項に規定する政府が算定する額を政府がそれぞれ 変更した場合において、当該 変更に伴い その額が再び算定された保険給付がある ときは、当該保険給付に係る第11条の規定による 未支 給の保険給付の支給を受ける権利 については、 会計法第31条第1項の規定 を適用しない 。 時効 国庫補助は 、「社会復帰促進等事業に要する費用 」や「事務の執行 に要する費用 」や「通勤災害に関する保険給付の費用 」に限定されて 行われているわけではありません 。","s":"療養・休業・葬祭料・介護の給付は2年、障害・遺族の給付は5年で時効消滅します。","e":"休業補償給付は、各支給対象日の翌日から2年以内に請求しないと時効で権利が消えます。障害補償給付は5年です。","p":"「2年」：療養・休業・葬祭料・介護・二次健診。「5年」：障害・遺族。傷病（補償）年金は職権決定なので時効の概念なし。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":13},{"r":"法45条","t":"市町村長の協力","b":"市町村長 （特別区の区長を含むものとし、指定都市においては、区長又は総合区長とする。）は、 行 政庁又は保険給付を受けようとする者 に対して、当該 市（特別区を含む 。）町村の条例 で定めるところ により、 保険給付を受けようとする者 又は遺族の戸籍 に関し、 無料で証明 を行うことができる。 戸籍事項の無料証明 市町村長 は、行政庁 または 保険給付を受けようとする者 に対して、当該 市町村 の条例で定める ところによ り、保険給付を受けようとする者 または 遺族の戸籍に関し、 無料で証明を行う ことができる。（法45条）","s":"市町村長は、行政庁や保険給付の請求者に対して、戸籍に関する事項の証明等を無料で行わなければなりません。","e":"遺族補償年金の請求に必要な死亡届の証明を、市町村が無料で発行します。","p":"「無料」で証明。戸籍に関する事項の証明等。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":22},{"r":"則51条","t":"書類の保存義務","b":"労災保険 に係る 保険関係 が成立し、若しくは成立していた事業の 事業主 又は労働保険事務組合 若しくは 労働 保険事務組合であった団体 は、労災保険に関する書類 （徴収法又は徴収法施行規則による書類を除く。）を、 その 完結の日 から 3年間 保存しなければならない 。 書類の保存 労災保険 に係る 保険関係 が成立し、若しくは成立していた事業の 事業主 または 労働保険事務組合 若しくは 労 働保険事務組合であった団体 は、労災保険に関する書類 （徴収法または徴収法施行規則による書類を除く） を、その完結の日から3年間保存 しなければならない。（則51条）","s":"労災保険に関係する事業主や労働保険事務組合は、労災保険に関する書類を3年間保存しなければなりません。","e":"労災の申請書類の控え等を、完結の日から3年間保管します。","p":"保存期間は「3年間」。完結の日から起算。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":22},{"r":"法49条の3","t":"資料の提供等の協力","b":"◯1 厚生労働大臣 は、労災保険法の施行に関し、 関係行政機関 又は公私の団体 に対し、 資料の提供 その 他必要な 協力 を求めることができる。 ◯2 前項の規定による協力を求められた 関係行政機関 又は公私の団体 は、 できるだけ その求めに応じな ければならない 。 関係機関などへの要請など 厚生労働大臣 は、労災保険法の施行に関し、 関係行政機関または公私の団体に対し 、資料の提供その他必要 な協力を求める ことができる。（49条の3第1項） 協力を求められた 関係行政機関または公私の団体 は、できるだけ その求めに応じなければならない 。（法49 条の3第2項）","s":"厚生労働大臣は、労災保険法の施行に関し、関係行政機関や公私の団体に資料の提供等の協力を求めることができます。","e":"労災認定に必要な資料を持っている他の行政機関に対して、資料の提供を求めます。","p":"厚生労働大臣の権限。「資料の提供その他必要な協力」。","f":"18_労災保険法18-不服申立て、雑則、罰則","pg":29}],"雇用保険法":[{"r":"法1条","t":"雇用保険の目的","b":"雇用保険 は、労働者 が失業 した場合 及び労働者 について 雇用の継続が困難 となる事由が生じた場 合に必要な給付 を行うほか、 労働者 が自ら 職業に関する 教育訓練 を受けた場合 並びに 労働者 が子 を養育するための休業 及び 所定労働時間を短縮することによる就業 をした場合 に必要な給付 を行うこ とにより、 労働者 の生活及び雇用の安定 を図る とともに、 求職活動 を容易にする 等その 就職を促 進し、あわせて、 労働者 の職業の安定 に資するため、 失業の予防 、雇用状態の是正 及び 雇 用機会の増大 、労働者 の能力の開発及び向上 その他 労働者 の福祉の増進 を図ることを 目的とす る。","s":"雇用保険は、労働者が失業したときや雇用の継続が困難になったときに必要な給付を行う制度です。さらに、労働者が自ら職業に関する教育訓練を受けることを支援し、失業の予防や雇用の安定、就職の促進を図ることも目的としています。","e":"会社が倒産して失業したAさんは、雇用保険から基本手当（いわゆる失業手当）を受け取りながら次の仕事を探せます。また、在職中のBさんが資格取得のためにスクールに通う場合、教育訓練給付金で費用の一部が戻ってきます。","p":"目的は3つ：①失業時の給付、②雇用継続困難時の給付、③自ら教育訓練を受けた場合の支援。「失業の予防」「雇用機会の増大」「労働者の福祉の増進」というキーワードも出題されます。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":2},{"r":"法3条","t":"雇用保険事業の内容","b":"雇用保険 は、第1条の目的を達成するため、 失業等給付 及び 育児休業等給付 を行うほか、 雇用安 定事業 及び 能力開発事業 を行うことができる。 目的","s":"雇用保険は、目的を達成するために「失業等給付」と「育児休業等給付」を行うほか、「雇用安定事業」と「能力開発事業」を行うことができます。","e":"失業したら基本手当（失業等給付）、育児休業中は育児休業給付金（育児休業等給付）がもらえます。また、雇用調整助成金（雇用安定事業）で会社が休業手当を払えるよう支援することもあります。","p":"「失業等給付」「育児休業等給付」は義務的事業（行う）、「雇用安定事業」「能力開発事業」は任意的事業（行うことができる）。この「行う」と「行うことができる」の違いが頻出。二事業＝雇用安定事業＋能力開発事業。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":2},{"r":"法2条","t":"雇用保険の管掌","b":"◯1 雇用保険 は、 政府 が管掌する。 ◯2 雇用保険 の事務の一部 は、 都道府県知事 が行う こととすることができる。 管掌 雇用保険 は、政府が管掌 する。（法2条1項） 雇用保険法に定める 厚生労働大臣の権限 は、その 一部を都道府県労働局長 に委任する ことができる。（法81 条1項） 都道府県労働局長に委任された権限 は、公共職業安定所長 に委任する ことができる。（法81条2項） 雇用保険の事務の一部 は、都道府県知事 が行うこととすることができる。（法2条2項） 能力開発事業 のうち職業能力開発促進法に規定する計画に基づく職業訓練を行う事業主及び職業訓練の推進 のための活動を行う同法13条（認定職業訓練の実施）に規定する事業主などに対する助成の事業の実施に関す る事務は、 都道府県知事 が行うこととする。（令1条1項） 雇用保険に関する一定の事務のうち、 都道府県知事が行う事務 は、適用事業の事業所の所在地を管轄する 都 道府県知事 が行う。（則1条3項） 雇用保険に関する事務のうち、 公共職業安定所長が行う事務 は、都道府県労働局長の指揮監督を受けて、 適 用事業の事業所の所在地を管轄する 公共職業安定所長 （一部を除く）が行う。（則1条5項） 2026改正 教育訓練給付金に関する事務 は、教育訓練給付金支給対象者 、教育訓練休暇給付金支給対象者 の住 所または居所を管轄する公共職業安定所長 が行う。（則1条5項1号）","s":"雇用保険は政府が管掌（運営）します。事務の一部は都道府県知事が行うこともできます。","e":"ハローワーク（公共職業安定所）で失業の認定や給付の手続きを行いますが、これは政府（厚生労働省）の管轄です。職業訓練の一部は都道府県が担当しています。","p":"「政府が管掌」が基本。事務の一部を「都道府県知事」が行える点が出題されます。「市町村長」ではないことに注意。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":8},{"r":"法72条","t":"労働政策審議会への諮問","b":"◯1 厚生労働大臣 は、雇用保険法の施行に関する重要事項について決定しよう とするときは、 あらかじめ 、 労働政策審議会 の意見 を聴かなければならない。 ◯2 労働政策審議会 は、厚生労働大臣 の諮問 に応ずるほか、必要に応じ、 雇用保険事業の運営 に関 し、関係行政庁 に建議 し、又はその 報告 を求める ことができる。 労働政策審議会への諮問 厚生労働大臣 は、雇用保険法の施行に関する重要事項 について決定しようとするときは、 あらかじめ 、労働 政策審議会の意見 を聴かなければならない。（法72条1項） 労働政策審議会 は、厚生労働大臣の諮問 に応ずるほか、必要に応じ、 雇用保険事業の運営 に関し、 関係行政 庁に建議し、またはその 報告を求めることができる。（法72条2項）","s":"厚生労働大臣は、雇用保険法の施行に関する重要事項を決定しようとするときは、あらかじめ労働政策審議会の意見を聴かなければなりません。","e":"失業等給付の金額や要件を変更するような重要な政策を決めるとき、厚生労働大臣は労働政策審議会に「こういう変更をしたいのですが」と意見を求めます。","p":"「あらかじめ」意見を聴く義務がある（事後ではダメ）。「労働政策審議会」の名称が問われます。「社会保障審議会」との混同に注意。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":11},{"r":"法4条","t":"被保険者・離職・失業の定義","b":"◯2 雇用保険法において「 離職」とは、 被保険者 について、 事業主との雇用関係が終了すること をい う。 ◯3 雇用保険法において「 失業」とは、 被保険者 が離職 し、 労働の意思及び能力を有する にもかか わらず、 職業に就くことができない状態 にあることをいう。 離職の定義","s":"「離職」とは、被保険者と事業主との雇用関係が終了すること。「失業」とは、被保険者が離職し、働く意思と能力があるにもかかわらず職業に就けない状態のことです。","e":"会社を辞めた（＝離職）Aさんがハローワークで求職活動をしているが仕事が見つからない状態が「失業」です。一方、辞めた後に「しばらく働きたくない」と思っている人は、働く意思がないので「失業」には該当しません。","p":"「失業」の3要件：①離職していること、②労働の意思があること、③労働の能力があること。「意思」と「能力」の両方が必要。専業主婦になる目的で退職した場合は「失業」に該当しない。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":12},{"r":"法5条","t":"適用事業","b":"◯1 雇用保険法においては、 労働者 が雇用される事業 を適用事業 とする。 強制適用事業 R07-01A 雇用保険法においては、 労働者が雇用される事業 を適用事業 とする。（法5条1項） R04-02A 「事業主 」とは、当該事業についての 法律上の権利義務の主体となるもの をいい、したがって、雇 用関係については、雇用契約の一方の当事者となるものである。 事業主 は、自然人であると 、法人であるとま 労災保険法 においては 、「労働者を 使用する 事業を適用事業とす る。」と表現されています 。（労災保険法3条1項）（1-3-1参照） 原則として、労働者が1人でも雇用される事業は、雇用保険の強制 適用事業となります。 なお、1-3-1で学習した通り 、労災保険法 の場合には 「特別加入 （一人親方等 ）」の制度があるため 、労働者を使用しない事業におい ても労災保険法が適用される場合があります が、雇用保険法には 、 「特別加入 」の制度は設けられていません 。","s":"雇用保険は、労働者が雇用される事業すべてに適用されます（強制適用）。ただし、農林水産業で常時5人未満の労働者を雇用する個人経営の事業は、暫定任意適用事業となります。","e":"コンビニでも大企業でも、1人でも労働者を雇っていれば雇用保険の適用事業です。ただし、個人で農業を営んでいて従業員が3人だけの場合は、任意で加入するかどうか選べます。","p":"原則は「強制適用」。暫定任意適用事業は「農林水産業」＋「個人経営」＋「常時5人未満」の3要件すべてを満たす場合のみ。法人は常に強制適用。","f":"01_雇用保険法1-総則（目的、管掌）、適用事業（強制適用、暫定任意適用）","pg":15},{"r":"法6条","t":"適用除外","b":"次に掲げる者については、 雇用保険法は 、適用しない 。 1. 1週間の所定労働時間 が20時間未満 である者（第37条の5第1項（高年齢被保険者の特例）の規定 による申出をして 高年齢被保険者 となる者及び 日雇労働被保険者 に該当することとなる者を 除く。） 2. 同一の事業主 の適用事業 に継続して31日以上雇用 されることが見込まれない 者（前2月の各月 において 18日以上 同一の事業主の適用事業に雇用された 者及び 日雇労働者 であって第43条第1項各号 （日雇労働被保険者 となる要件）のいずれかに該当するものに該当することとなる者を 除く。） 3. 季節的に雇用 される者であって、次のいずれかに該当するもの（ 日雇労働被保険者 に該当す ることになる者を 除く。） ア 4箇月以内の期間を定めて雇用される 者 イ 1週間の所定労働時間が20時間以上30時間未満である 者 4. 学校教育法の学校の 学生又は生徒 であって、前3号に掲げる者に準ずるものとして厚生労働省令で 定める者 5. 船員法第1条に規定する 船員 であって、 漁船 （政令で定めるものに限る。）に乗り組むため雇 用される者（ 1年を通じて船員として適用事業に雇用される 場合を 除く。） 6. 国、都道府県、市町村 その他これらに準ずるものの事業に雇用される者のうち、離職した場合に、 他の法令、条例、規則等に基づいて支給を受けるべき 諸給与の内容 が、 求職者給付及び就職促進給付 の内容を 超える と認められる者 であって、厚生労働省令で定めるもの 適用除外者 次に掲げる者については、 雇用保険法は 、適用されない （適用除外者 ）。（法6条） 適用除外者①（法6条1号・2号） 2022改正 1週間の所定労働時間 が20時間未満 である者（ 高年齢被保険者の特例 の規定による申出をして 高年齢被保険者となる者 及び日雇労働被保険者 に該当することとなる者を 除く） 同一の事業主の適用事業 に継続して31日以上雇用されることが見込まれない者 （前2か月の各月において 18日以上同一の事業主の適用事業に雇用された者 及び日雇労働者 であって法43条1項各号（日雇労働被保険 者となる要件）のいずれかに該当することとなる者を 除く）","s":"一定の者には雇用保険が適用されません。週20時間未満の労働者、31日以上の雇用見込みがない者、季節的に雇用される一定の者、学生（一部例外あり）、船員保険の被保険者、国・地方公共団体の公務員などが該当します。","e":"週10時間だけ働くパートさんは雇用保険に入れません。また、大学生のアルバイトも原則として適用除外です（ただし夜間学生や休学中の学生は加入可能）。","p":"「週20時間未満」「31日以上の雇用見込みなし」が最重要。学生の例外（夜間・通信・休学中は適用）も頻出。65歳以上で新たに雇用された者は適用除外ではなくなった（H29改正）。","f":"02_雇用保険法2-被保険者（被保険者、適用除外）","pg":12},{"r":"法37条の5","t":"高年齢被保険者の特例（マルチジョブホルダー）","b":"◯1 次に掲げる要件のいずれにも該当する者は、 厚生労働大臣 に申し出て 、当該 申出を行った日から 高 年齢被保険者 となることができる。 1. 2以上の事業主 の適用事業 に雇用される 65歳以上の者 であること。 2. 一の事業主 の適用事業 における 1週間の所定労働時間 が20時間未満 であること。 3. 2の事業主 の適用事業 （申出を行う労働者の一の事業主の適用事業における 1週間の所定労働時間 が厚 生労働省令で定める時間数以上であるものに限る。）における 1週間の所定労働時間の合計 が20時間以 上であること。 ◯2 前項の規定により 高年齢被保険者 となった者は、同項各号の 要件を満たさなくなった ときは、 厚生労働 大臣に申し出 なければならない。 高年齢被保険者の特例 R04-01E 2022改正 次に掲げる要件のいずれにも該当する者は、 厚生労働大臣 に申し出て 、当該 申出を行っ た日から 高年齢被保険者 （特例高年齢被保険者 ）となることができる。（法37条の5第1項、則1条5項1号かっ こ書、則65条の7） 特例高年齢被保険者となるための要件（すべて） 1. 2以上の事業主の適用事業 に雇用される 65歳以上の者 であること。 2. 1の事業主 の適用事業における 1週間の所定労働時間 が20時間未満 であること。 3. 2の事業主の適用事業 （申出を行う労働者の1の事業主の適用事業における1週間の所定労働時間が厚生労 働省令で定める時間数（ 5時間 ）以上であるものに限る ）における 1週間の所定労働時間 の合計が20時間以 上であること。 2022改正 65歳以上 の労働者を対象に 、「本人からの申出 」を起点 に、2つ以上の事業所の労働時間 を「合算」して「週の所定労働時間 が20時間以上である 」ことを基準として雇用保険法を適用する制度 が創設されました 。（行政手引1010） 2022改正 通常の雇用保険とは異なり 、初めて特例高年齢被保険者 に加入する場合は 、要件を満たすと 必ず加入しなければならないわけ ではなく 、特例高年齢被保険者として 申出をする人の 「希望」によ り、ハローワークに申出を行った日から特例高年齢被保険者となりま す。（行政手引1070、Q＆A〜雇用保険マルチジョブホルダー制度〜 事業主向けQ3） 2022改正 マルチジョブホルダー （兼業者 ）の場合 、週所定労働時 間が 20時間以上 ＋20時間未満 →20時間以上の事業主 において 雇用 保険の適用 20時間以上 ＋20時間以上 →主たる雇用関係についてのみ 雇用 保険の適用 （1-4-2参照） 20時間未満 ＋20時間未満 →（原則） 適用除外 （1-4-2参照） →（申出あれば） 高年齢被保険者の特例 2022改正 ハローワークへ 申出を行った日 から、特例高年齢被保険 者となります （就職日などへ遡及して加入することはできません ）。 （行政手引1070、被保険者向けQ7） 2022改正 事業主の同意は不要です 。（被保険者向けQ17）","s":"65歳以上の者が2つ以上の事業所で働いていて、1つの事業所だけでは週20時間未満だが合算すると週20時間以上になる場合、本人が厚生労働大臣に申し出ることで高年齢被保険者になれます。","e":"67歳のCさんがA社で週12時間、B社で週10時間働いている場合、合計22時間なので申し出れば高年齢被保険者になれます。","p":"①65歳以上、②2以上の事業所で勤務、③1つの事業所では週20時間未満、④合算で週20時間以上、⑤本人の「申出」が必要（届出ではない）。申出日から被保険者になる（遡及しない）。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":5},{"r":"法43条","t":"日雇労働被保険者の要件","b":"◯2 日雇労働被保険者 が前2月 の各月において 18日以上 同一の事業主の適用事業に雇用された 場合 又は同一の事業主の適用事業に 継続して31日以上 雇用された 場合において、厚生労働省令で定めるとこ ろにより 公共職業安定所長の認可 を受けた ときは、その者は、 引き続き 、日雇労働被保険者 となる ことができる。 一般被保険者などへの切替、日雇労働被保険者の資格継続","s":"日雇労働被保険者が前2月の各月で18日以上同一事業主に雇用された場合、または同一事業主に31日以上継続して雇用された場合は、日雇労働被保険者でなくなり、一般の被保険者等に切り替わります。","e":"日雇いで働くDさんが、同じ会社で1月に20日、2月に19日働いた場合、常用的な雇用関係とみなされ、日雇労働被保険者ではなくなります。","p":"日雇→一般等への切替要件：①前2月各月18日以上同一事業主、または②同一事業主に継続31日以上。「前2月」「18日」「31日」の数字が狙われます。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":25},{"r":"法7条","t":"被保険者に関する届出","b":"事業主 は、その雇用する労働者に関し、当該 事業主 の行う 適用事業 に係る 被保険者となった こと、当 該事業主 の行う 適用事業 に係る 被保険者でなくなった ことその他厚生労働省令で定める事項を 厚生労 働大臣 に届け出 なければならない。","s":"事業主は、雇用する労働者が被保険者になったこと、被保険者でなくなったことなど、被保険者に関する届出を行う義務があります。","e":"新しく従業員を雇ったときは「被保険者資格取得届」、従業員が退職したときは「被保険者資格喪失届」をハローワークに届け出なければなりません。","p":"届出義務は「事業主」にある。届出を怠ると罰則あり（法83条：6月以下の拘禁刑又は30万円以下の罰金）。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":29},{"r":"法8条","t":"被保険者の確認請求","b":"被保険者 又は 被保険者であった者 は、いつでも 、次条の規定による 確認を請求することができ る。","s":"被保険者または被保険者であった者は、いつでも、自分が被保険者であることの確認を請求できます。","e":"「自分は雇用保険に入っているはずなのに、会社が届出をしていないかもしれない」と思ったら、いつでもハローワークに確認を求められます。","p":"「いつでも」請求できる（期間制限なし）。請求権者は「被保険者」又は「被保険者であった者」。事業主の同意は不要。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":29},{"r":"法9条","t":"被保険者資格の確認","b":"◯1 厚生労働大臣 は、第7条の規定による 届出若しくは前条の規定による 請求により、又は 職権 で、労 働者が被保険者となったこと 又は 被保険者でなくなったこと の確認 を行う ものとする。","s":"厚生労働大臣は、届出・請求により、または職権で、労働者が被保険者になったこと・でなくなったことの確認を行います。確認があるまでは、給付は行われません。","e":"会社が届出を忘れていても、ハローワークが職権で「この人は被保険者だった」と確認してくれれば、遡って被保険者資格が認められます。","p":"確認の3つの契機：①届出、②請求、③職権。確認は「遡及効」がある（資格取得日に遡る）。確認がなければ給付は行われない。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":29},{"r":"法38条","t":"短期雇用特例被保険者の確認","b":"◯2 被保険者 が短期雇用特例被保険者 に該当するかどうかの 確認は、 厚生労働大臣 が行う。","s":"被保険者が短期雇用特例被保険者に該当するかどうかの確認は、厚生労働大臣が行います。","e":"季節的に雇用される漁師さんが短期雇用特例被保険者に該当するかどうかは、厚生労働大臣（実際にはハローワーク）が確認します。","p":"短期雇用特例被保険者の要件：季節的に雇用される者で、4か月以内の期間を定めて雇用される者等。確認主体は「厚生労働大臣」。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":29},{"r":"則9条","t":"被保険者証の交付と届出通知","b":"◯1 公共職業安定所長 は、法第9条第1項の規定による 労働者 が被保険者となったこと 又は被保険者でなくな ったこと の確認をした ときは、それぞれ、雇用保険 被保険者資格取得確認通知書 又は雇用保険 被保険 者資格喪失確認通知書 により、その旨を当該 確認に係る者 及びその者を 雇用し、又は 雇用していた 事業主 に通知しなければならない。この場合において、当該 確認に係る者 に対する 通知は、当該 事業主 を通じて行う ことができる。 ◯2 公共職業安定所長 は、当該 確認に係る者 又は当該 事業主の所在が明らかでない ために前項の規定による 通知をすることができない 場合においては、当該 公共職業安定所 の掲示場 に、その 通知すべき事項 を記載した 文書を掲示 しなければならない。 ◯3 前項の規定による 掲示があった日の翌日 から起算して 7日 を経過した ときは、第1項の規定による 通知があった ものとみなす。 確認の通知 公共職業安定所長 は、労働者が被保険者となったことまたは被保険者でなくなったことの 確認をしたとき は、それぞれ、 雇用保険被保険者資格取得確認通知書 または 雇用保険被保険者資格喪失確認通知書 により、そ の旨を当該「 確認に係る者 」及びその者を 雇用し 、または 雇用していた 「事業主 」に通知しなければならな い。この場合において、当該 確認に係る者に対する通知 は、当該 事業主を通じて行う ことができる。（則9条1 項） 公共職業安定所長 は、当該確認に係る者または当該事業主の 所在が明らかでない ために 通知をすることがで きない 場合においては、 当該公共職業安定所の掲示場 に、その通知すべき事項を記載した 文書を掲示 しなけれ ばならない。（則9条2項） 掲示板への 掲示があった日の翌日 から起算して 7日を経過したとき は、通知があったものとみなされる 。（則 9条3項） 2022改正 厚生労働大臣は、特例高年齢被保険者に関する申出があ ったときは、その労働者が申出を行った「もう一方の勤務先の事業 主」に対しても、被保険者となったことや、被保険者でなくなったこ とを通知することになっています。（法37条の5第4項）","s":"公共職業安定所長は、被保険者となったこと・でなくなったことの確認をしたときは、事業主に通知しなければなりません。事業主はその通知を被保険者（又はであった者）に速やかに知らせます。","e":"ハローワークが「Aさんは被保険者になりました」と確認したら、会社に通知が届き、会社はAさんにそれを伝えなければなりません。","p":"確認の通知先は「事業主」であり、事業主を通じて本人に知らせる仕組み。公共職業安定所長が行う点に注意（厚生労働大臣から権限が委任されている）。","f":"03_雇用保険法3-被保険者の種類、資格の確認","pg":33},{"r":"則141条","t":"事業所の設置・廃止の届出","b":"◯1 事業主 は、事業所を設置した とき、又は 事業所を廃止した ときは、所定事項を記載した 届書に登記事項 証明書、賃金台帳、労働者名簿その他の当該各号に掲げる事項を証明することができる書類を添えてその 設置 又は廃止の日の翌日 から起算して 10日以内 に、 事業所の所在地を管轄する公共職業安定所の長 に提 出しなければならない。 ◯2 前項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 届書は、 年金事務 所を経由 して提出することができる。 ◯3 第1項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 届書は、次の各号に 掲げる区分に応じ、当該各号に定める届書と 併せて提出する場合 には、その 事業所の所在地を管轄する 労 働基準監督署長 又は 年金事務所 を経由 して提出することができる。 1. 第1項の規定により事業所を設置したときに提出する 適用事業所設置届 …健康保険法施行規則第19条第 1項の規定による 新規適用届 及び厚生年金保険法施行規則第13条第1項の規定による 新規適用届 又は徴収 法第4条の2第1項による 保険関係成立届 （有期事業、労働保険事務組合に労働保険事務の処理が委託され ている事業及び二元適用事業に係るものを除く。） 2. 第1項の規定により事業所を廃止したときに提出する 適用事業所廃止届 …健康保険法施行規則第20条第 1項の規定による 適用事業所全喪届 及び厚生年金保険法施行規則第13条の2第1項による 適用事業所全喪届 適用事業所設置（廃止）届 R07-02B 事業主 は、事業所を設置 したとき、または 事業所を廃止 したときは、 適用事業所設置届 または 適用 事業所廃止届 をその 設置または廃止の日の翌日 から起算して 10日以内 に、事業所の所在地を管轄する公共職業 安定所長 に提出しなければならない。（則141条1項）","s":"事業主は、事業所を設置したとき又は廃止したときは、届書に登記事項証明書・賃金台帳・労働者名簿などを添付して届け出なければなりません。","e":"新しく支店を開設したら、その支店の所在地を管轄するハローワークに「事業所設置届」を提出する必要があります。","p":"届出先は「所轄の公共職業安定所長」。添付書類として「登記事項証明書」「賃金台帳」「労働者名簿」が必要。設置日の翌日から10日以内に届出。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":2},{"r":"則142条","t":"事業主・事業所の変更届","b":"◯1 事業主 は、その 氏名若しくは 住所又は事業所の 名称及び所在地 若しくは 事業の種類 に変更 があった ときは、その 変更があった事項 及び 変更の年月日 を記載した 届書に登記事項証明書、賃金台帳、労 働者名簿その他の当該各号に掲げる事項に変更があったことを証明することができる書類を添えて、その 変更 があった日の翌日 から起算して 10日以内 に、その 事業所の所在地を管轄する公共職業安定所 の長 に提出しなければならない。 ◯2 前項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 届書は、 年金事務 所を経由 して提出することができる。 事業主事業所各種変更届 R07-02A 事業主 は、その 氏名若しくは住所または事業所の名称及び所在地若しくは事業の種類に変更があっ たとき は、変更があった事項及び変更の年月日を記載した届書に登記事項証明書、賃金台帳、労働者名簿その 他の当該各号に掲げる事項に変更があったことを証明することができる書類を添えて、その 変更があった日の 翌日から起算して 10日以内 に、その 事業所の所在地を管轄する公共職業安定所長 に提出しなければならない。 （則142条1項） 事業所が 「統合」した場合 、主たる事業所 では特段の事務手続は不 要で、従たる事業所 では「雇用保険適用事業所廃止 届」を提出 させ、 従たる事業所に係る被保険者については 、廃止届の提出によって、デ ータが移し替えられるため 、特段の事務手続 は不要 です。","s":"事業主は、氏名・住所・事業所の名称・所在地・事業の種類に変更があったときは、変更があった事項と変更年月日を届け出なければなりません。","e":"会社名が「〇〇商事」から「〇〇ホールディングス」に変わったら、速やかにハローワークに届け出ます。","p":"届出期限は「変更があった日の翌日から起算して10日以内」。届出先は所轄公共職業安定所長。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":10},{"r":"則145条","t":"代理人の選任","b":"◯1 事業主 は、あらかじめ 代理人 を選任した 場合には、この省令の規定により事業主が行わなければな らない事項を、その 代理人 に行わせることができる。 ◯2 事業主は、前項の 代理人 を選任し、又は 解任したときは、所定事項を記載した届書を、当該 代理人 の選 任又は解任に係る 事業所の所在地を管轄する公共職業安定所の長 に提出しなければならない。 代理人選任・解任届 事業主 は、あらかじめ 代理人を選任 した場合には、この省令の規定により事業主が行わなければならない事 項を、その 代理人に行わせる ことができる。（則145条1項） 2024改正 2021改正 事業主 は、代理人を選任し 、または解任した ときは、所定事項を記載した 届書を、当該 代理人の選任または解任に係る 事業所の所在地を管轄する公共職業安定所長に提出 しなければならない。（則1 45条2項） 2020改正 事業所の所在地を管轄する公共職業安定所長に提出する 代理人の選任または解任に関する届出 は、 年金事務所を経由 して提出することができる。（則145条4項） R07-02D 代理人の解任が「事業所の廃止」に伴うものであるとき は､改めて代理人解任届を提出する必要はありません。（行政手引22 402） 代理人の選任または解任に関する届出 は、当該「代理人の選任または解 任に係る事業所の所在地を管轄する公共職業安定所長 」に提出します 。 「本社の所在地のある公共職業安定所長 」に提出するのではありません 。","s":"事業主は、あらかじめ代理人を選任すれば、省令で定める届出等の手続きをその代理人に行わせることができます。","e":"社長が忙しくて手続きできない場合、総務部長を代理人として届け出ておけば、総務部長がハローワークへの届出を行えます。","p":"「あらかじめ」選任する必要がある（事後選任は不可）。代理人選任届を提出する必要がある。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":12},{"r":"則6条","t":"被保険者資格取得届の提出期限","b":"◯1 事業主 は、法7条の規定により、その雇用する 労働者 が当該事業主の行う 適用事業 に係る 被保険者とな ったこと について、 当該事実のあった日の属する月の 翌月10日 までに、雇用保険 被保険者資格取得 届をその 事業所の所在地を管轄する公共職業安定所の長 に提出しなければならない。 ◯2 前項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 資格取得届 （様式第2 号によるものに限る。）は、 年金事務所 を経由 して提出することができる。 ◯3 第1項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 資格取得届 （様式第2 号の2によるものに限る。）は、その事業所の所在地を管轄する 労働基準監督署長 又は 年金事務所 を 経由して提出することができる。 資格取得届","s":"事業主は、労働者が被保険者になったときは、その事実のあった日の属する月の翌月10日までに、資格取得届をハローワークに届け出なければなりません。","e":"4月1日に新入社員が入社して被保険者になったら、5月10日までに資格取得届を提出します。","p":"期限は「事実のあった日の属する月の翌月10日まで」。届出先は「事業所の所在地を管轄する公共職業安定所長」。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":14},{"r":"則10条","t":"雇用保険被保険者証の交付","b":"◯1 公共職業安定所長 は、法第9条の規定により 被保険者となったことの確認 をしたときは、その確認 に係る者に 雇用保険被保険者証 を交付しなければならない。 ◯2 前項の規定による 被保険者証の交付 は、当該被保険者を雇用する 事業主 を通じて行う ことができ る。 ◯3 被保険者証の交付を受けた者 は、当該被保険者証を 滅失し、又は 損傷したときは、雇用保険 被保険者 証再交付申請書 に運転免許証、健康保険の被保険者証その他の被保険者証の 再交付 の申請をしようと する者が本人であることを証明することができる書類を添えて公共職業安定所長に提出し、被保険者証の 再交付 を受けなければならない。 被保険者証の交付 公共職業安定所長 は、法9条の規定により 被保険者となったことの確認をしたとき は、その確認に係る者に 雇 用保険被保険者証 （被保険者証 ）を交付しなければならない。（則10条1項） 被保険者証の交付 は、当該被保険者を雇用する 事業主を通じて行う ことができる。（則10条2項）","s":"公共職業安定所長は、被保険者となったことの確認をしたときは、その者に雇用保険被保険者証を交付しなければなりません。","e":"新しく雇用保険に加入した従業員には、ハローワークから被保険者証が発行されます。これは転職先でも使うので大切に保管します。","p":"被保険者証は「被保険者本人」に交付される。事業主を通じて交付されることが多いが、法的には本人への交付。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":18},{"r":"則7条","t":"被保険者資格喪失届の提出期限","b":"◯1 事業主 は、法7条の規定により、その雇用する 労働者 が当該事業主の行う 適用事業 に係る 被保険者でな くなったこと について、当該 事実のあった日の翌日から起算して10日以内 に、雇用保険 被保険者資格 喪失届 に労働契約に係る 契約書 、労働者名簿 、賃金台帳 、登記事項証明書 その他の当該適用事業に係る 被 保険者でなくなったことの事実及びその事実のあった年月日を証明することができる書類 を添えてその 事 業所の所在地を管轄する公共職業安定所の長 に提出しなければならない。 ◯2 前項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 資格喪失届 は、 年金 事務所 を経由 して提出することができる。 資格喪失届","s":"事業主は、労働者が被保険者でなくなったときは、その事実のあった日の翌日から起算して10日以内に、資格喪失届をハローワークに届け出なければなりません。","e":"従業員が3月31日に退職した場合、4月1日から10日以内（4月10日まで）に資格喪失届を提出します。","p":"期限は「事実のあった日の翌日から10日以内」。資格取得届の「翌月10日まで」とは期限の計算方法が異なるので注意。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":20},{"r":"則17条","t":"離職票の交付","b":"◯1 公共職業安定所長 は、次の各号に掲げる場合においては、 離職票 を、離職したことにより 被 保険者でなくなった者 に交付 しなければならない。ただし、その者の住所又は居所が明らかでないためそ の他やむを得ない理由のため離職票を交付することができないときは、この限りでない。 1. 資格喪失届 により 被保険者でなくなったこと の確認をした場合であって、 事業主 が当該 資格喪失 届に離職証明書 を添えた とき。 2. 資格喪失届 により 被保険者でなくなったこと の確認をした場合であって、当該 被保険者であった 者から 離職証明書 を添えて 請求 があった とき。 3. 第8条の規定による 確認の請求 により、又は 職権 で被保険者でなくなったこと の確認をした場 合であって、当該 被保険者であった者 から 離職証明書 を添えて 請求 があった とき。 離職票の交付 公共職業安定所長 は、次の場合において、原則として、 離職票を交付 しなければならない。（則17条1項） 離職票の交付 1. 資格喪失届 により被保険者でなくなったことの 確認をした場合であって、 事業主 が当該資格喪失届に 離職 証明書を添えた とき。 2. 資格喪失届 により被保険者でなくなったことの 確認をした場合であって、 被保険者であった者 から離職証 明書を添えて 請求があった とき。 3. 法8条の規定による 確認の請求 により、または 職権で被保険者でなくなったことの 確認をした 場合であっ て、当該 被保険者であった者 から離職証明書を添えて 請求があった とき。","s":"公共職業安定所長は、離職により被保険者でなくなった者に離職票を交付しなければなりません。ただし、本人が交付を希望しない場合は交付しなくてよい場合があります。","e":"退職した従業員がすぐに次の会社に転職するので「離職票はいりません」と言えば、交付しないこともできます。ただし、59歳以上の者については本人が希望しなくても交付義務があります。","p":"59歳以上の離職者には本人の希望にかかわらず離職票を交付しなければならない。離職票は基本手当の受給に必要な書類。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":32},{"r":"則14条の3","t":"休業開始時賃金月額証明書の届出","b":"◯1 事業主 は、法第7条の規定により、次の各号に掲げる場合に応じ、当該各号に定める日までに、 雇用保 険被保険者休業開始時賃金月額証明書 ・所定労働時間短縮開始時賃金証明書 （以下「 休業等開始時賃金証 明書 」という。）に 労働者名簿 、賃金台帳 その他の 当該休業を開始した日及びその日前の賃金の額並びに 雇用期間を証明することができる書類 を添えてその 事業所の所在地を管轄する 公共職業安定所の長に提 出しなければならない。 1. その雇用する 被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。以下同じ。） が法第61条の4第1項に規定する 介護休業 を開始した 場合…当該 被保険者 が介護休業給付金支給申請 書の提出をする日 2. その雇用する 被保険者 が法第61条の7第1項に規定する 育児休業 （同一の子について2回以上の休業をし た場合にあっては、 初回の休業 に限る。）を開始した 場合…当該 被保険者 が育児休業給付受給資格確認 票・（初回）育児休業給付金／出生後休業支援給付金支給申請書 又は 育児休業給付受給資格確認票・ 出生時育児休業給付金／出生後休業支援給付金支給申請書 の提出をする日 3. その雇用する被保険者が 育児時短就業 （同一の子について2回以上の同項に規定する就業をした場合に あっては、 初回の就業 に限る。以下「初回育児時短就業」という。） を開始した 場合（当該被保険者が育 児休業給付金の支給を受けていた場合であって当該育児休業給付金の支給に係る育児休業の終了後に引き 続き当該育児休業の申出に係る子について初回育児時短就業をしたとき及び出生時育児休業給付金の支給 を受けていた場合であって当該出生時育児休業給付金の支給に係る出生時育児休業の終了後に引き続き当 該出生時育児休業の申出に係る子について初回育児時短就業をしたときを除く。）…当該 被保険者 が育 児時短就業給付受給資格確認票・（初回）育児時短就業給付金支給申請書 の提出をする日 ◯3 公共職業安定所長 は、第1項の規定により 休業等開始時賃金証明書の提出を受けた ときは、当該 休業等 開始時賃金証明書 に基づいて作成した雇用保険被保険者 休業開始時賃金月額証明票・所定労働時間短縮開始時 賃金証明票 （「 休業等開始時賃金証明票 」という。）を当該 被保険者に交付 しなければならない。 休業等開始時賃金証明書（休業開始時賃金月額証明書・所定労働時間短縮開始時 賃金証明書） 2026改正 2025改正 2023改正 事業主 は、その雇用する 被保険者 （短期雇用特例被保険者 及び日雇労働被保 険者を除く）が、次の場合には、「 休業等開始時賃金証明書 」に必要書類を添えて、その 事業所の所在地を管 轄する公共職業安定所長 に提出しなければならない。（則14条の3第1項） 休業等開始時賃金証明書の提出 提出期限 介護休業を開始したとき 被保険者が 「介護休業給付金支給申請書 」の提出をする日 まで に 育児休業 （同一の子については 、初回の 休業に限る）を開始したとき 被保険者が 「育児休業給付受給資格確認票 ・（初回）育児 休業給付金 ／出生後休業支援給付金支給申請書 」の提出をす る日までに 被保険者が 「育児休業給付受給資格確認票 ・出生時育児休 業給付金 ／出生後休業支援給付金支給申請書 」の提出をする 日までに 育児時短就業 （同一の子については 、初 回の就業 に限る）を開始したとき ※育児休業や出生時育児休業から引き続い て育児時短就業をした場合は、提出不要 被保険者が 「育児時短就業給付受給資格確認票 ・（初回）育児 時短就業給付金支給申請書 」の提出をする日まで","s":"事業主は、被保険者が育児休業や介護休業などの休業を開始したときは、休業開始時の賃金月額を証明する書類を届け出なければなりません。","e":"従業員が育児休業を開始したら、休業前の賃金がいくらだったかをハローワークに届け出ます。これが育児休業給付金の金額を計算する基礎になります。","p":"届出は育児休業給付金や介護休業給付金の支給額算定に不可欠。届出期限を確認しておくこと。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":35},{"r":"則14条の4","t":"介護休業の届出","b":"◯1 事業主 は、その雇用する 被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。以下 において同じ。）がその 対象家族を介護するための休業 若しくは 小学校就学の始期 に達するまでの子を 養育するための休業 をした場合又はその雇用する 被保険者 のうちその 対象家族を介護する被保険者 若しくは 小 学校就学の始期に達するまでの子を養育する被保険者 に関して 所定労働時間の短縮 を行った 場合であっ て、当該 被保険者 が離職 し、 特定理由離職者 又は 特定受給資格者 として 受給資格の決定を受け ることとなるときは、当該 被保険者 が当該 離職 したことにより 被保険者でなくなった日の翌日 から起算 して 10日以内 に、 休業等開始時賃金証明書 に育児休業申出に係る書面 、出生時育児休業申出 に係る 書面、介護休業申出に係る書面 、所定労働時間の短縮措置申出に係る書類 その他の 休業等を行ったことの事実 及び休業等を行った期間 並びに当該 休業等を開始した日前の賃金の額 を証明することができる書類を添えてそ の事業所の所在地を管轄する 公共職業安定所の長に提出 しなければならない。 ◯3 公共職業安定所長 は、第1項の規定により 休業等開始時賃金証明書 の提出を受けたときは、当該 休業等開始時賃金証明書 に基づいて作成した 休業等開始時賃金証明票 を当該 被保険者に交付 しなけ ればならない。 休業等を行っていた者が離職した場合の賃金の届出 2026改正 事業主 は、その雇用する 被保険者 （短期雇用特例被保険者 及び日雇労働被保険者 を除く）が介護休 業若しくは育児休業をした 場合又は 所定労働時間の短縮を行った 場合であって、当該被保険者が 離職し、特定 理由離職者又は特定受給資格者として受給資格の決定を受ける こととなるときは、当該被保険者が当該離職し 2025改正 休業等開始時賃金証明票の交付 は、被保険者を雇用する 「事業主を通じて 」行うことができます 。（則14条の2第4項） たことにより 被保険者でなくなった日の翌日 から起算して 10日以内 に、「 休業等開始時賃金証明書 」に次の書 類を添えてその 事業所の所在地を管轄する公共職業安定所長 に提出しなければならない。（則14条の4第1項） 休業等開始時賃金証明書に添付する書類 1. 休業等を行ったことの 事実及び休業等を行った期間を証明できる書類 （育児休業、出生時育児休業、介護 休業の申出書など） 2. 当該 休業等を開始した日前の 賃金の額を証明することができる書類 （賃金台帳など）","s":"事業主は、被保険者（短期雇用特例被保険者・日雇労働被保険者を除く）が対象家族を介護するための休業をしたときは、所定の届出を行わなければなりません。","e":"従業員が親の介護のために休業した場合、事業主はハローワークに届出を行い、介護休業給付金の支給手続きに必要な情報を提供します。","p":"対象となるのは一般被保険者と高年齢被保険者。短期雇用特例被保険者・日雇労働被保険者は対象外。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":39},{"r":"則14条の2","t":"育児休業等の届出","b":"◯1 事業主 は、その雇用する 一般被保険者 （被保険者のうち、高年齢被保険者、短期雇用特例被保険者及び 日雇労働被保険者以外のものをいう。以下同じ。）が第101条の2の18第1項に規定する 教育訓練休暇を開始 したときは、法第7条の規定により、 休暇開始日の翌日 から起算して 10日以内 に、雇用保険被保険者教 育訓練休暇開始時賃金月額証明書 に雇用契約書 、賃金台帳 その他の 休暇開始日及びその日前の賃金の額を証明 することができる書類 並びに 就業規則 その他の当該 事業主が教育訓練休暇制度を設けていることを証明するこ とができる書類 を添えてその 事業所の所在地を管轄する 公共職業安定所の長に提出 しなければならな い。 ◯3 公共職業安定所長 は、第1項の規定により 雇用保険被保険者教育訓練休暇開始時賃金月額証明書の提出 を受けた ときは、当該 雇用保険被保険者教育訓練休暇開始時賃金月額証明書 に基づいて作成した 雇用保険 被保険者教育訓練休暇開始時賃金月額証明票 を当該 一般被保険者に交付 しなければならない。 教育訓練休暇開始時賃金月額証明書 2026改正 事業主 は、その雇用する 一般被保険者 が教育訓練休暇を開始した ときは、 休暇開始日の翌日 から起 算して 10日以内 に、「 教育訓練休暇開始時賃金月額証明書 」に次の書類を添えてその 事業所の所在地を管轄す る公共職業安定所長 に提出しなければならない。（則14条の2第1項） 教育訓練休暇開始時賃金月額証明書に添付する書類 1. 休暇開始日 及びその日前の 賃金の額を証明することができる書類 （雇用契約書、賃金台帳など） 2. 当該事業主が 教育訓練休暇制度を設けていることを証明することができる書類 （就業規則など） 教育訓練休暇開始時賃金月額証明票の交付","s":"事業主は、一般被保険者が育児休業等を開始したときは、賃金月額証明書等の届出を行わなければなりません。","e":"従業員が子どもの育児のために育休を取り始めたら、事業主はハローワークに育児休業開始の届出と休業前の賃金情報を届け出ます。","p":"一般被保険者が対象。高年齢被保険者、短期雇用特例被保険者、日雇労働被保険者は対象外。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":42},{"r":"則13条","t":"転勤届","b":"◯1 事業主 は、その雇用する 被保険者 を当該事業主の一の事業所から他の事業所に 転勤させた ときは、当該 事実のあった日の翌日 から起算して 10日以内 に雇用保険 被保険者転勤届 （転勤届 ）を 転勤後 の事業 所の所在地を管轄する 公共職業安定所の長 に提出しなければならない。 ◯2 前項の規定によりその事業所の所在地を管轄する公共職業安定所の長に提出する 転勤届 は、 年金事務 所を経由 して提出することができる。 転勤届 事業主 は、その雇用する 被保険者 を当該事業主の一の事業所から他の事業所に 転勤させた ときは、当該 事実 のあった日の翌日 から起算して 10日以内 に「転勤届 」を、 転勤後 の事業所の所在地を管轄する 公共職業安定所 長に提出しなければならない。（則13条1項） 被保険者 は、その雇用される事業主の一の事業所から他の事業所に 転勤した ときは、速やかに、 被保険者証 をその 事業主に提示 しなければならない。（則13条5項） 2020改正 その事業所の所在地を管轄する公共職業安定所長に提出する 転勤届 は、年金事務所を経由 して提出 することができる。（則13条2項） R04-03A 転勤と認められた場合は、 転勤前の事業所と転勤後の事業所とが同一の公共職業安定所の管内であ る場合でも転勤届の提出を要する ものであり、事業主が慣習上転勤として取り扱っているか否かには関係な い。（行政手引21752） 「転勤届 」は、転勤前の事業所と転勤後の事業所が同じ公共職業安 定所の管轄内にあるときであっても必要です 。","s":"事業主は、被保険者を一の事業所から他の事業所に転勤させたときは、その事実のあった日の翌日から10日以内に届け出なければなりません。","e":"東京本社のEさんが大阪支店に転勤した場合、事業主は転勤の翌日から10日以内にハローワークに届け出ます。","p":"期限は「事実のあった日の翌日から10日以内」。資格喪失届と同じ計算方法。届出先は転勤後の事業所の所在地を管轄する公共職業安定所長。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":46},{"r":"則14条","t":"個人番号変更届","b":"事業主 は、その雇用する 被保険者 （日雇労働被保険者 を除く。）の 個人番号 が変更された とき は、 速やかに 、個人番号変更届 をその 事業所の所在地を管轄する公共職業安定所の長 に提出し なければならない。 個人番号変更届 2020改正 「被保険者の氏名変更届 」の規定は廃止されました 。ま た、これに伴い、被保険者が事業主に対して行う氏名変更の申出も廃 止されています。 「被保険者 」に係る氏名変更届の提出は不要ですが 、「受給資格 者」に係る氏名変更届の提出は必要となっています 。（則49条1項）","s":"事業主は、被保険者（日雇労働被保険者を除く）の個人番号（マイナンバー）が変更されたときは、速やかに個人番号変更届を届け出なければなりません。","e":"従業員がマイナンバーの変更を受けた場合、事業主は速やかにハローワークに届け出ます。","p":"「速やかに」届け出る（具体的な日数の定めなし）。日雇労働被保険者は対象外。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":48},{"r":"則71条","t":"日雇労働被保険者資格取得届の提出期限","b":"◯1 日雇労働被保険者 は、法第43条第1項第1号から第3号までのいずれかに該当することについて、そ の該当するに至った日 から起算して 5日以内 に、 日雇労働被保険者資格取得届 を管轄公共職業安定 所の長 に提出しなければならない。 育児休業給付金支給申請書については 、電子申請の対象となりまし たが、「介護休業給付金支給申請書 」については対象となっていませ ん。","s":"日雇労働被保険者に該当することになった者は、その日から5日以内に日雇労働被保険者資格取得届を届け出なければなりません。","e":"日雇いで働き始めたFさんは、日雇労働被保険者に該当してから5日以内にハローワークに届け出ます。","p":"届出義務者は「本人」（事業主ではない）。期限は「5日以内」。一般の被保険者の届出は事業主が行うが、日雇は本人が行う。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":51},{"r":"法44条","t":"日雇労働被保険者手帳","b":"日雇労働被保険者 は、公共職業安定所 において、 日雇労働被保険者手帳 の交付 を受けなければな らない。","s":"日雇労働被保険者は、公共職業安定所で日雇労働被保険者手帳の交付を受けなければなりません。","e":"日雇いで働くGさんは、ハローワークで手帳をもらい、働くたびに事業主に印紙保険料を貼ってもらいます。","p":"手帳には印紙保険料の納付状況が記録される。手帳の交付を受けずに働くと給付を受けられない。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":53},{"r":"則73条","t":"日雇労働被保険者手帳の交付","b":"◯1 管轄公共職業安定所の長 は、日雇労働被保険者資格取得届 の提出を受けたとき、又は第72条第1項 の日雇労働被保険者任意加入申請書 に基づき法第43条第1項第4号の 認可をしたときは、当該 日雇労働被保険 者資格取得届を提出した者 又は当該 認可に係る者 に、 日雇労働被保険者手帳 を交付しなければならな い。 日雇労働被保険者手帳の交付 手続きは 、「日雇労働被保険者 」自身が行います 。「事業主 」が手 続きをするのではありません 。","s":"管轄公共職業安定所長は、日雇労働被保険者資格取得届の提出を受けたときや任意加入の申請に基づき認可したときは、日雇労働被保険者手帳を交付します。","e":"Gさんが資格取得届を出したら、ハローワーク所長が手帳を交付してくれます。","p":"交付するのは「管轄公共職業安定所長」。手帳には被保険者の氏名等が記載される。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":53},{"r":"法10条","t":"失業等給付の種類","b":"◯1 失業等給付 は、 求職者給付 、就職促進給付 、教育訓練給付 及び 雇用継続給付 とす る。 失業等給付の種類","s":"失業等給付は、①求職者給付、②就職促進給付、③教育訓練給付、④雇用継続給付の4種類です。","e":"失業して求職中なら求職者給付（基本手当など）、再就職が決まったら就職促進給付（再就職手当など）、資格取得の勉強なら教育訓練給付、60歳以降も働くなら雇用継続給付（高年齢雇用継続給付など）がもらえます。","p":"4種類の体系は暗記必須。育児休業等給付は「失業等給付」とは別体系（法3条）であることに注意。求職者給付はさらに一般被保険者・高年齢被保険者・短期雇用特例被保険者・日雇労働被保険者に分かれる。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":55},{"r":"法10条の2","t":"求職活動の努力義務","b":"求職者給付 の支給を受ける者 は、必要に応じ 職業能力の開発及び向上 を図りつつ、 誠実かつ熱 心に求職活動 を行うことにより、 職業に就く ように 努め なければならない。 就職への努力","s":"求職者給付を受ける者は、職業能力の開発・向上を図りつつ、誠実かつ熱心に求職活動を行い、職業に就くように努めなければなりません。","e":"失業手当をもらいながら家でゴロゴロしているだけではダメです。ハローワークで紹介された求人に応募したり、資格の勉強をしたりして、積極的に就職活動をする必要があります。","p":"「努力義務」であり罰則はないが、失業の認定では求職活動の実績が求められる。求職活動実績がないと認定を受けられない。","f":"04_雇用保険法4-届出、失業等給付の種類","pg":58},{"r":"法13条","t":"基本手当の受給資格","b":"◯1 基本手当 は、被保険者 が失業 した場合において、 離職の日 以前 2年間 （「 算定対象期 間」という。）に、 被保険者期間 が通算して12箇月 以上であったときに、支給する。 受給資格要件","s":"基本手当は、離職の日以前2年間に被保険者期間が通算12か月以上ある場合に受給できます。ただし、倒産・解雇等の特定受給資格者や特定理由離職者は、離職の日以前1年間に被保険者期間が通算6か月以上あれば受給できます。","e":"自己都合で退職したHさんは、過去2年間に12か月以上働いていれば基本手当がもらえます。一方、会社が倒産して失業したIさんは、過去1年間に6か月以上あればOKです。","p":"原則：2年間に12か月以上。特定受給資格者・特定理由離職者：1年間に6か月以上。「2年・12か月」「1年・6か月」のセットは最頻出。算定対象期間は最大4年まで延長可能。","f":"05_雇用保険法5-基本手当（受給資格）","pg":4},{"r":"法14条","t":"被保険者期間の計算","b":"◯1 被保険者期間 は、 被保険者であった期間 のうち、当該 被保険者でなくなった日 又は各月において そ の日に応当 し、かつ、当該 被保険者であった期間内にある日 （その日に応当する日がない月においては、その 月の末日。以下「 喪失応当日 」という。）の各前日から各前月の 喪失応当日 までさかのぼった各期間（ 賃 金の支払の基礎となった日数 が11日以上 であるものに 限る。）を 1箇月 として計算し、その他の 期間は、 被保険者期間 に算入しない 。 ただし、当該 被保険者となった日 からその日後における 最初の 喪失応当日 の前日までの期間 の日数が 15日以上 であり、かつ、当該期間内における 賃金の支払の基礎となった日数 が11日以上 である ときは、当該期間を 2分の1箇月 の被保険者期間 として計算する。 ◯3 前2項の規定により計算された 被保険者期間 が12箇月 （前条第2項の規定により読み替えて適用する場 合にあっては、6箇月） に満たない 場合における第1項の規定の適用については、同項中「であるもの」とあ るのは「であるもの又は 賃金の支払の基礎となった時間数 が80時間以上 であるもの」と、「である とき」とあるのは「であるとき又は 賃金の支払の基礎となった時間数 が80時間以上 であるとき」と する。 被保険者期間などの定義","s":"被保険者期間は、離職日から遡って1か月ごとに区切り、各期間に賃金支払基礎日数が11日以上ある月を1か月として計算します。11日未満でも賃金支払の基礎となった労働時間数が80時間以上あれば1か月として算入されます。","e":"3月31日に退職した場合、3月1日〜31日、2月1日〜28日…と遡って区切り、各月で11日以上出勤していれば1か月とカウントします。","p":"「11日以上」が基本。11日未満でも「80時間以上」あればOK（短時間労働者への配慮）。最後の端数期間（15日以上かつ11日以上）のカウントも出題されます。","f":"05_雇用保険法5-基本手当（受給資格）","pg":17},{"r":"法15条","t":"失業の認定","b":"◯1 基本手当 は、受給資格を有する者（以下「 受給資格者 」という。）が 失業している日 （失業してい ることについての 認定を受けた日 に限る 。以下同じ。）について支給する。 ◯2 前項の 失業していることについての認定 （以下「 失業の認定 」という。）を受けようとする 受給資 格者は、離職後 、公共職業安定所 に出頭し、 求職の申込み をしなければならない。","s":"基本手当は、受給資格者が失業している日について支給されます。失業の認定を受けた日のみが対象です。認定日にハローワークに出頭し、求職の申込みをして失業していることを認定してもらう必要があります。","e":"4週間に1回の認定日にハローワークに行き、「この間ずっと失業していました」「求職活動をしました」と申告して認定を受けます。認定を受けた日の分だけ基本手当が支給されます。","p":"原則4週間に1回、指定された認定日に出頭。出頭できない正当理由がある場合は証明書による認定（代理認定）も可能。認定日に出頭しなければその期間の基本手当は支給されない。","f":"06_雇用保険法6-基本手当（失業の認定、基本手当の支給）","pg":1},{"r":"則19条","t":"求職の申込み手続き","b":"◯1 基本手当の支給を受けようとする者 （未支給給付請求者を除く。）は、 管轄公共職業安定所 に出頭 し、運転免許証その他の基本手当の支給を受けようとする者が 本人であることを確認することができる書類 を 添えて又は 個人番号カード を提示して 離職票 （当該基本手当の支給を受けようとする者が離職票に記載 された離職の理由に関し、異議がある場合にあっては、離職票及び離職の理由を証明することができる書類） を提出 しなければならない。 ◯3 管轄公共職業安定所長 は、 離職票 を提出した者 が、法第13条第1項（同条第2項において読み 替えて適用する場合を含む。次項において同じ。）（基本手当の受給資格）の規定に該当すると認めたとき は、 失業の認定日 を定め、その者に 知らせる とともに、 受給資格者証 （個人番号カード を提示して 第1項の規定による提出をした者であって、 雇用保険受給資格通知 （当該者の氏名、被保険者番号、性別、生 年月日、離職理由、基本手当日額、所定給付日数、給付に係る処理状況その他の職業安定局長が定める事項を 記載した通知をいう。以下「受給資格通知」という。）の 交付を希望する ものにあっては、 受給資格通 知）に必要な事項を記載した上、 交付しなければならない。","s":"基本手当の支給を受けようとする者は、管轄公共職業安定所に出頭し、本人確認書類（運転免許証等）を提示して求職の申込みをしなければなりません。","e":"退職したJさんは、住所地のハローワークに行き、離職票と運転免許証を持って窓口で「仕事を探しています」と求職の申込みをします。","p":"最初に求職の申込みをした日が起算日となり、そこから待期期間7日が始まる。「管轄」公共職業安定所（住所地）に出頭する。","f":"06_雇用保険法6-基本手当（失業の認定、基本手当の支給）","pg":3},{"r":"則22条","t":"失業認定日の手続き","b":"◯1 受給資格者 は、 失業の認定 を受けよう とするときは、 失業の認定日 に、 管轄公共職業安定 所に出頭 し、 受給資格者証 を添えて （当該受給資格者が 受給資格通知 の交付を受けた場合にあっ ては、 個人番号カード を提示して） 失業認定申告書 を提出した上、 職業の紹介 を求めなければならな い。ただし、 受給資格者証 を添えて（当該受給資格者が受給資格通知の交付を受けた場合にあっては、 個人番 号カードを提示して ）提出することができない ことについて 正当な理由がある ときは、 受給資格者証 を添えな い（当該受給資格者が受給資格通知の交付を受けた場合にあっては、 個人番号カード を提示しない）ことがで きる。 認定手続","s":"受給資格者は、失業の認定を受けようとするときは、認定日に管轄公共職業安定所に出頭し、受給資格者証を添えて失業認定申告書を提出しなければなりません。","e":"認定日にハローワークへ行き、受給資格者証と「この期間にこういう求職活動をしました」と記入した失業認定申告書を窓口に出します。","p":"必要書類は①受給資格者証、②失業認定申告書。認定日に出頭しなければ認定を受けられない。やむを得ない理由で出頭できない場合は別途手続きがある。","f":"06_雇用保険法6-基本手当（失業の認定、基本手当の支給）","pg":9},{"r":"則24条","t":"公共職業訓練等受講者の失業認定","b":"◯1 公共職業安定所長 の指示した 公共職業訓練等 を受ける受給資格者に係る 失業の認定 は、 1月に1 回、直前の月 に属する各日 （既に失業の認定の対象となった日を除く。）について行うものとする。 失業の認定（公共職業訓練等を受ける受給資格者の場合） R05-04A 公共職業安定所長 の指示した「 公共職業訓練等を受ける受給資格者 」に係る失業の認定 は、1か月 に1回 、直前の月に属する各日 （既に失業の認定の対象となった日を除く）について行われる。（法15条3項、 則24条1項） 雇用保険を受給している求職者を対象に、就職に必要な職業スキル や知識を習得するための「公共職業訓練」が無料（テキスト代などは 自己負担）で実施されています。自動車整備科、木工科、造園科、電 気設備技術科、介護サービス科、情報処理科などがあります。","s":"公共職業安定所長の指示した公共職業訓練等を受けている受給資格者の失業認定は、1月に1回、直前の月に属する各日について行います。","e":"職業訓練を受講中のKさんは、通常の4週間に1回ではなく、毎月1回の認定でOKです。訓練を真面目に受けていれば、それ自体が求職活動とみなされます。","p":"一般の受給資格者は「4週間に1回」だが、公共職業訓練等受講者は「1月に1回」。訓練受講自体が求職活動実績として認められる。","f":"06_雇用保険法6-基本手当（失業の認定、基本手当の支給）","pg":28},{"r":"法30条","t":"基本手当の支給方法","b":"◯1 基本手当 は、 4週間に1回 、失業の認定を受けた日 分を支給する ものとする。ただし、 厚生 労働大臣 は、公共職業安定所長 の指示した 公共職業訓練等 を受ける受給資格者 その他厚生労働省令で 定める受給資格者に係る基本手当の支給について 別段の定め をすることができる。 ◯2 公共職業安定所長 は、各受給資格者について 基本手当 を支給すべき日 を定め 、その者に 通知 す るものとする。 基本手当の支給 基本手当 は、4週間に1回 、失業の認定を受けた日分 が支給される。（法30条1項） 公共職業安定所長の指示した公共職業訓練等 を受ける受給資格者に係る 基本手当の支給 については、 1か月に 1回支給される。（則43条1項） 公共職業安定所長 は、各受給資格者について 基本手当を支給すべき日 を定め、その者に 通知する。（法30条 2項） 代理人による基本手当の受給 受給資格者 （口座振込受給資格者を除く）が疾病、負傷、就職その他やむを得ない理由によって、 支給日 に 管轄公共職業安定所に出頭することができない ときは、その 代理人 が当該受給資格者に支給されるべき 基本手 当の支給を受けることができる 。（則46条1項） 基本手当は、受給資格者に対し、原則として、受給資格者の預金ま たは貯金への「振込みの方法」により支給されます。（則44条1項）","s":"基本手当は、4週間に1回、失業の認定を受けた日分を支給します。ただし、公共職業訓練等を受講している者は1月に1回支給されます。","e":"通常は4週間分をまとめて銀行口座に振り込まれます。職業訓練受講者は毎月支給されるので、生活のリズムが作りやすいです。","p":"原則「4週間に1回」、訓練受講者は「1月に1回」。支給は認定後に行われる。日額×認定日数で計算。","f":"06_雇用保険法6-基本手当（失業の認定、基本手当の支給）","pg":42},{"r":"則2条","t":"現物給与の範囲と評価","b":"◯1 法第4条第4項の賃金に算入すべき 通貨以外のもので支払われる賃金 の範囲は、 食事 、被服 及 び住居 の利益のほか、 公共職業安定所長 が定めるところによる。 ◯2 前項の 通貨以外のもので支払われる賃金 の評価額 は、 公共職業安定所長 が定める。 賃金 「賃金」とは、賃金、給料、手当、賞与その他 名称のいかんを問わず 、労働の対償 として 事業主が労働者に 支払うもの （通貨以外のもので支払われるものであって、厚生労働省令で定める範囲外のものを除く）をい う。（法4条4項）","s":"賃金に算入すべき通貨以外で支払われる賃金（現物給与）の範囲は、食事・被服・住居の利益のほか、公共職業安定所長が定めるものです。その評価額も公共職業安定所長が定めます。","e":"会社から無料で社宅を提供されている場合、その住居の利益も賃金として評価されます。評価額はハローワーク所長が地域の実情に応じて決めます。","p":"現物給与の評価額を定めるのは「公共職業安定所長」（厚生労働大臣ではない）。食事・被服・住居が代表例。","f":"07_雇用保険法7-基本手当（賃金、賃金日額、基本手当日額、自動的変更）","pg":2},{"r":"法17条","t":"賃金日額の算定","b":"◯1 賃金日額 は、 算定対象期間 において 被保険者期間 として計算された 最後の 6箇月間 に支払われ た賃金 （臨時に支払われる賃金 及び 3箇月を超える期間ごとに支払われる賃金 を除く。）の総額を 180 で除して得た額 とする。 賃金日額（原則）","s":"賃金日額は、算定対象期間において被保険者期間として計算された最後の6か月間に支払われた賃金の総額を180で割った金額です。臨時の賃金や3か月を超える期間ごとに支払われる賃金は除きます。","e":"退職前6か月の給与総額が180万円なら、賃金日額は180万円÷180＝1万円です。ボーナス（賞与）は計算に入りません。","p":"「最後の6か月」「÷180」が基本公式。除外されるのは「臨時の賃金」と「3か月超の期間ごとの賃金（賞与等）」。賃金日額には上限額・下限額がある。","f":"07_雇用保険法7-基本手当（賃金、賃金日額、基本手当日額、自動的変更）","pg":9},{"r":"法19条","t":"基本手当の減額（内職等による収入）","b":"◯1 受給資格者 が、 失業の認定 に係る期間中に 自己の労働 によって 収入を得た 場合には、その 収入の基 礎となった日数 （以下「 基礎日数 」という。）分の 基本手当 の支給については、次に定めるところによる。 1. その 収入の1日分 に相当する額（ 収入の総額 を基礎日数 で除して得た額をいう。）から 控除額 を控除し た額と基本手当の日額との合計額が賃金日額の 100分の80 に相当する額を超えないとき… 基本手当の 日額に基礎日数 を乗じて得た額を支給する。 2. 合計額 が賃金日額 の100分の80 に相当する額を超えるとき（次号に該当する場合を除く。）…当該 超過額 を基本手当の日額 から控除した残りの額に 基礎日数 を乗じて得た額を支給する。 3. 超過額 が基本手当の日額 以上であるとき…基礎日数分の 基本手当を支給しない 。 ◯3 受給資格者 は、失業の認定を受けた期間中に 自己の労働によって収入を得た ときは、その 収入の額 その 他の事項を 公共職業安定所長 に届け出なければならない。 基本手当の減額","s":"受給資格者が失業認定期間中に自己の労働で収入を得た場合、その収入額に応じて基本手当が減額されることがあります。1日あたりの収入額と基本手当日額の合計が賃金日額の80%を超えると減額されます。","e":"失業中にアルバイトで1日5,000円稼いだ場合、基本手当日額と合算して賃金日額の80%を超える部分は減額されます。ただし、完全に支給停止になるわけではありません。","p":"減額の基準は「賃金日額の80%」。収入と基本手当日額の合計が賃金日額の80%以下なら全額支給。「基礎日数」分は基本手当が支給されない（不支給）。","f":"07_雇用保険法7-基本手当（賃金、賃金日額、基本手当日額、自動的変更）","pg":23},{"r":"法18条","t":"自動変更対象額の変更","b":"◯1 厚生労働大臣 は、年度の平均給与額 が平成27年4月1日から始まる年度（この条の規定により自動 変更対象額が 変更されたときは、直近の当該 変更がされた年度 の前年度 ）の 平均給与額 を超え 、又は 下 るに至った場合においては、その上昇し、又は低下した比率に応じて、その 翌年度の8月1日 以後の 自動 変更対象額を変更 しなければならない。 ◯2 前項の規定により変更された 自動変更対象額 に5円未満 の端数 があるときは、これを 切り捨て 、 5円以上10円未満 の端数 があるときは、これを 10円に切り上げる ものとする。 ◯3 前2項の規定に基づき算定された 各年度の8月1日以後 に適用される 自動変更対象額 のうち、 最低 賃金日額 に達しないものは、 当該年度の8月1日以後 、当該 最低賃金日額 とする。 自動変更対象額とは 雇用保険法に係る「 自動変更対象額 」とは、次のものをいう。（法18条4項） 自動変更対象額 1. 賃金日額の 最低・最高限度額 2. 基本手当の日額の算定に当たっての100分の80や100分の50を乗じる 賃金日額の範囲の額","s":"厚生労働大臣は、年度の平均給与額が変動した場合、賃金日額の上限額・下限額等を自動的に変更します。変更の基準は平成27年4月1日を起点とした平均給与額の変動です。","e":"物価や賃金水準が上がれば、基本手当の計算の基礎となる賃金日額の上限・下限も引き上げられ、より多くの給付を受けられるようになります。","p":"「毎年8月1日」に変更される（毎年4月1日ではない）。変動の基準は「平均給与額」。自動変更の仕組みにより、法改正なしで金額が変わる。","f":"07_雇用保険法7-基本手当（賃金、賃金日額、基本手当日額、自動的変更）","pg":27},{"r":"法20条","t":"受給期間","b":"◯1 基本手当 は、雇用保険法に別段の定めがある場合を除き、次の各号に掲げる受給資格者の区分に応じ、 当該各号に定める期間内の 失業している日 について、 所定給付日数 に相当する日数分を限度 として支給 する。 1. 次号及び第3号に掲げる受給資格者以外の受給資格者（ 原則）…当該基本手当の受給資格に係る 離職 の日 （以下「 基準日 」という。） の翌日から 起算して 1年 2. 基準日 において 45歳以上65歳未満 であって 算定基礎期間 が1年以上 の就職困難 な受給資 格者… 基準日の翌日から 起算して 1年に60日 を加えた 期間 3. 基準日 において 45歳以上60歳未満 であって 算定基礎期間 が20年以上 の特定受給資格者 … 基準日の翌日から 起算して 1年に30日 を加えた 期間 ◯3 受給資格を有する者 が、基本手当 の受給期間内 に新たに受給資格、高年齢受給資格又は特例受給資格 を取得した ときは、その取得した日以後においては、 前の受給資格に基づく基本手当 は、支給しな い。 受給期間 「受給期間 」とは、その期間内の失業している日について 基本手当の支給を受けることのできる期間 をい う。（法24条2項かっこ書）","s":"基本手当の受給期間は、原則として離職の日の翌日から1年間です。所定給付日数が300日の者は1年＋30日、360日の者は1年＋60日。妊娠・出産・育児等の理由で働けない期間がある場合は最大4年まで延長できます。","e":"3月31日に退職したLさんの受給期間は4月1日〜翌年3月31日の1年間。この間に所定給付日数分の基本手当を受けきれなければ、残りは消滅します。出産で半年間働けなかった場合は、その分延長できます。","p":"原則「1年」、300日→「1年＋30日」、360日→「1年＋60日」。延長申請は「最大4年」。延長理由は妊娠・出産・育児・疾病・負傷等。「受給期間」と「所定給付日数」の違いを混同しない。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":2},{"r":"法20条の2","t":"受給期間の特例（事業開始等）","b":"受給資格者 であって、 基準日後 に事業（その実施期間が 30日未満 のものその他厚生労働省令で定める ものを除く。） を開始したもの その他これに準ずるものとして厚生労働省令で定める者が、厚生労働省令で定 めるところにより 公共職業安定所長 にその旨を 申し出た 場合には、当該 事業の実施期間 （当該実施期間 の日数が 4年 から法20条第1項及び第2項の規定により算定される期間の日数を除いた日数を超える場合 における当該超える日数を除く。）は、法20条第1項及び第2項の規定による期間（ 受給期間 ）に算入し ない。 事業開始の特例 2023改正 受給資格者 であって、 基準日後 に事業（その実施期間が 30日未満 のものその他厚生労働省令で定 めるものを 除く）を開始したもの その他これに準ずるものとして厚生労働省令で定める者が、厚生労働省令で 定めるところにより 公共職業安定所長 にその旨を 申し出た 場合には、当該事業の 実施期間 （当該 実施期間の日 数が4年から受給期間の日数を除いた日数 を超える場合における当該超える日数を除く）は、 受給期間 には算入 させない 。（法20条の2、則31条の4、則31条の5、行政手引50292） 特例申請の要件（すべて） 1. 実施期間 が30日以上 であること。 2. 「事業を 開始した日 」または「 事業に専念し始めた日 」若しくは「 事業の準備に専念し始めた日 」から起 算して、 30日を経過する日 が、受給期間の末日以前である こと。 3. 2025改正 その事業について当該事業を実施する受給資格者が 再就職手当の支給を受けていない こと。 4. 当該事業により 自立することができない と認められる事業ではない こと。 5. 受給資格に係る 離職日の翌日以後 （＝基準日後 ）に開始した事業 （離職日以前に当該事業を開始し、離職 日後に当該事業に専念する場合を含む）であること。 2023改正 基本手当の受給期間は 、原則として 、離職日の翌日から 1年以内ですが 、事業を開始などした人が 「事業を行っている期間 」 などは 、最大3年間受給期間に算入しない こととされました 。これに よって 仮に事業を休廃業した場合であっても 、その後の再就職に当た って基本手当を受給することが可能になります 。 2023改正 1.については 、申請時点において30日以上実施する 「見 込み」がある場合であっても 、結果として実施期間が 「30日に満た ない」場合は対象にはなりません 。（行政手引50292） 2023改正 2.における 「事業に専念する 」とは、「離職日以前 」に 事業を開始し 、離職日後に当該事業に専念する者をい います 。「離職 後」から新たに 事業に専念すると 、「求職活動の意思がない （＝失業 の状態にない ）」と判断される 可能性があります 。","s":"受給資格者が離職後に事業を開始した場合（実施期間30日未満のものを除く）、受給期間に事業を行っていた期間を加算でき、最大で離職の日の翌日から4年間まで延長できます。","e":"退職後にラーメン屋を開業したが3か月で廃業した場合、その3か月間は受給期間に加算され、基本手当を受けられる期間が延びます。","p":"「30日未満」の事業は対象外。延長の上限は「4年」（原則1年＋最大3年）。創業支援と再就職支援の両立を図る制度。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":26},{"r":"法21条","t":"待期期間","b":"基本手当 は、 受給資格者 が当該基本手当の 受給資格 に係る 離職後 最初に公共職業安定所に求職の申 込みをした日 以後において、 失業 している日（ 疾病又は負傷 のため職業に就くことができない日 を含む 。）が 通算 して 7日 に満たない間 は、支給しない 。 待期 定年退職者等の特例や事業開始の特例の場合、事由が事前に明確で あるため、手続きの期限も短く設定されています。これに対し、妊 娠・出産等の特例は、不確実な事情に備えるためのものであるため、 長い期間が設定されています。","s":"基本手当は、受給資格者が離職後最初にハローワークに求職の申込みをした日以後、失業している日が通算7日に達するまでは支給されません。この7日間を「待期期間」といいます。","e":"4月1日にハローワークで求職申込みをしたら、4月1日〜7日の7日間が待期期間です。この間は基本手当は出ません。4月8日以降の失業日から支給対象になります。","p":"「通算して7日」（連続でなくてよい）。待期期間中にアルバイトをした日は待期に算入されない。疾病・負傷の日も待期に算入される（求職活動は不要）。全受給資格者に共通。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":33},{"r":"法22条","t":"所定給付日数（一般の受給資格者）","b":"◯1 一の受給資格に基づき 基本手当を支給する日数 （以下「 所定給付日数 」という。）は、受給資格者 の区分に応じ、それぞれに定める日数とする。 所定給付日数とは 「所定給付日数 」とは、一の受給資格に基づく 基本手当の支給を受けることができる日数 をいい、基準日 （当該基本手当の受給資格に係る離職の日）における① 受給資格者の区分 、②算定基礎期間 、③年齢（就職困 難者である受給資格者及び特定受給資格者の場合 ）によって決定される。（行政手引50301） 就職困難者である受給資格者 及び特定受給資格者 の場合 、年齢により所定給付日数は異なるが、この場合に おける 年齢とは、基本手当の受給資格に係る 離職の日 （基準日 ）における年齢 である。（法20条1項かっこ 書、法22条2項、法23条1項） 待期期間中にアルバイトなどで働いた場合、その日は「職業に就い ている」と見なされるため、「失業している日」には該当せず、待期 には算入されません。結果として、その日は待期カウントから除外さ れ、待期満了が後ろ倒しになります。 2枚以上の離職票がある 場合には 、「最後の離職票 」の離職理由 で 判断されます 。（行政手引50104）","s":"一般の受給資格者（自己都合退職等）の所定給付日数は、被保険者期間に応じて90日〜150日です。1年以上10年未満で90日、10年以上20年未満で120日、20年以上で150日。","e":"自己都合で退職したMさんの被保険者期間が15年なら、所定給付日数は120日（約4か月分）です。","p":"一般の受給資格者は「年齢に関係なく」被保険者期間のみで決まる（90日・120日・150日の3段階）。特定受給資格者・就職困難者とは日数が異なるので比較出題に注意。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":38},{"r":"法23条","t":"特定受給資格者の定義と所定給付日数","b":"◯2 特定受給資格者 とは、次の各号のいずれかに該当する 受給資格者 （厚生労働省令で定める理由により 就職が困難な受給資格者 を除く。）をいう。 1. 当該 基本手当の受給資格 に係る離職 が、その者を雇用していた事業主の事業について発生した 倒産 （破産手続 開始、再生手続 開始、更生手続 開始又は 特別清算 開始の申立て その他厚生 労働省令で定める事由に該当する事態をいう。）又は当該事業主の 適用事業の縮小 若しくは 廃 止に伴うものである者 として厚生労働省令で定めるもの 2. 前号に定めるもののほか、 解雇 （自己の責めに帰すべき重大な理由によるもの を除く。）その他の 厚生労働省令で定める理由により 離職 した者 特定受給資格者 特定受給資格者 とは、次のいずれかに該当する受給資格者（ 就職困難者である受給資格者を除く ）をいう。 （法23条2項） 特定受給資格者 1. R04-04A〜E 倒産などにより離職 した受給資格者 2. 解雇（自己の責めに帰すべき重大な理由によるものを除く ）などにより離職 した受給資格者 「定年年齢に達したことにより退職した者 」は特定受給資格者には 該当しません 。","s":"特定受給資格者とは、倒産や解雇により離職した者をいいます。所定給付日数は年齢と被保険者期間に応じて90日〜330日と手厚くなっています。","e":"勤続20年の45歳の会社員が会社の倒産で失業した場合、所定給付日数は330日（約11か月分）と、自己都合退職の150日より大幅に多くなります。","p":"特定受給資格者は「年齢」と「被保険者期間」の2軸で日数が決まる。最大330日（45歳以上60歳未満・20年以上）。「就職困難な受給資格者」を除くことに注意。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":45},{"r":"則32条","t":"就職困難な受給資格者の範囲","b":"就職困難な受給資格者 は、次のとおりとする。 1. 障害者雇用促進法 に規定する 身体障害者 、知的障害者 及び 精神障害者 2. 更生保護法 第48条各号（ 保護観察対象者 ）又は第85条第1項各号（ 更生緊急保護の対象者 ）に掲げ る者であって、その者の職業のあっせんに関し保護観察所長から 公共職業安定所長 に連絡のあったもの 3. 社会的事情 により 就職が著しく阻害 されている者 就職困難な受給資格者 6.については、 労働条件が変更 されたことにより 採用条件と実際の 労働条件が著しく異なることとな った場合において、 事由発生後1年 を経過した後 に退職した場合のほか、次のような場合が該当します。 （行政手引50305-2） 各種手当が支払われるという労働条件を明示の上、採用された にもかかわらず、当該 手当が支払われなくなった 場合 深夜勤務、法定休日出勤にかかる 割増率が労働基準法の定める 基準を下回った 場合 「子弟の教育 」のために退職することは 、該当しません 。","s":"就職困難な受給資格者とは、身体障害者、知的障害者、精神障害者、刑法等の保護観察中の者、社会的事情により就職が著しく困難な者をいいます。所定給付日数は300日または360日と最も手厚い。","e":"身体障害者手帳を持つNさんが失業した場合、45歳未満で被保険者期間1年以上なら300日、45歳以上65歳未満なら360日の所定給付日数があります。","p":"対象者：①身体障害者、②知的障害者、③精神障害者、④保護観察中の者、⑤社会的事情により就職困難な者。所定給付日数は1年未満で150日、1年以上で300日（45歳未満）又は360日（45歳以上65歳未満）。","f":"08_雇用保険法8-基本手当（受給期間、待期、所定給付日数、特定受給資格者、特定理由離職者）","pg":71},{"r":"則56条","t":"技能習得手当の種類","b":"技能習得手当 は、 受講手当 及び 通所手当 とする。 常にどこを学習しているのかを意識することが大切です 。","s":"技能習得手当は、公共職業訓練等を受講する受給資格者に支給される手当で、受講手当と通所手当の2種類があります。","e":"職業訓練校に通っているOさんには、基本手当に加えて、受講手当（1日500円、最大40日分）と通所手当（通学の交通費）が支給されます。","p":"受講手当は「日額500円」「最大40日分（2万円）」。通所手当は交通費の実費（上限あり）。2種類であることが出題される。","f":"10_雇用保険法10-一般被保険者に対する求職者給付（技能習得手当、寄宿手当、傷病手当）","pg":2},{"r":"法37条","t":"傷病手当","b":"◯1 傷病手当 は、受給資格者 が、 離職後 公共職業安定所に出頭 し、 求職の申込み をした後 におい て、疾病又は負傷 のために 職業に就くことができない 場合に、基本手当の受給期間内の当該疾病又は負 傷のために 基本手当の支給を受けることができない日 （疾病又は負傷のために基本手当の支給を受ける ことができないことについての 認定を受けた日 に限る 。）について 、支給する 。 傷病手当","s":"受給資格者が離職後にハローワークで求職の申込みをした後、疾病・負傷のために15日以上職業に就けない場合、基本手当の代わりに傷病手当が支給されます。金額は基本手当日額と同額です。","e":"求職活動中のPさんが骨折して1か月間仕事を探せなくなった場合、その間は基本手当ではなく傷病手当が支給されます。金額は基本手当と同じです。","p":"「15日以上」継続して就業不能の場合。14日以内なら基本手当の支給対象（証明書による認定）。傷病手当の支給日数は所定給付日数から差し引かれる。健康保険の傷病手当金との違いに注意。","f":"10_雇用保険法10-一般被保険者に対する求職者給付（技能習得手当、寄宿手当、傷病手当）","pg":13},{"r":"法37条の3","t":"高年齢求職者給付金の受給要件","b":"◯1 高年齢求職者給付金 は、 高年齢被保険者 が失業した 場合において、 離職の日以前 1年間 （当該 期間に 疾病、負傷その他厚生労働省令で定める理由により 引き続き30日以上 賃金の支払を受けることが できなかった 高年齢被保険者 である被保険者については、当該理由により賃金の支払を受けることがで きなかった日数を 1年 に加算した期間（その期間が 4年 を超える ときは、 4年間 ））に、被保険 者期間が 通算して 6箇月以上 であったときに、支給する。この場合における第14条の規定の適用につい ては、同条第3項中「12箇月（前条第2項の規定により読み替えて適用する場合にあっては、6箇月）」とあ るのは、「6箇月」とする。 ◯2 前項の規定により 高年齢求職者給付金 の支給を受けることができる資格（以下「 高年齢受給資格 」とい う。）を有する者を「 高年齢受給資格者 」という。 高年齢求職者給付金","s":"高年齢被保険者が失業した場合、離職の日以前1年間に被保険者期間が6か月以上あれば、高年齢求職者給付金を受給できます。","e":"65歳以上で働いていたQさんが退職した場合、過去1年間に6か月以上の被保険者期間があれば、高年齢求職者給付金がもらえます。","p":"要件は「1年間に6か月以上」（一般の基本手当の「2年間に12か月以上」とは異なる）。高年齢求職者給付金は一時金として支給される（基本手当のように分割ではない）。","f":"11_雇用保険法11-高年齢求職者給付金、特例一時金","pg":2},{"r":"法37条の4","t":"高年齢求職者給付金の額と期限","b":"◯5 高年齢求職者給付金 の支給を受けようとする 高年齢受給資格者 は、 離職の日の翌日 から起算し て1年 を経過する日まで に、公共職業安定所 に出頭 し、 求職の申込み をした上、 失業している ことについての 認定 を受けなければならない 。 受給手続","s":"高年齢求職者給付金は一時金で支給され、被保険者期間1年以上で基本手当日額の50日分、1年未満で30日分です。離職の日の翌日から1年を経過するまでに申請が必要です。","e":"被保険者期間3年のRさん（67歳）が退職したら、基本手当日額×50日分が一括でもらえます。ただし、退職日の翌日から1年以内にハローワークで手続きしないと権利が消滅します。","p":"金額：1年以上→50日分、1年未満→30日分。申請期限は「離職の日の翌日から1年」。年金との併給調整はない。何度でも受給可能（一般の基本手当と異なる）。","f":"11_雇用保険法11-高年齢求職者給付金、特例一時金","pg":5},{"r":"法39条","t":"特例一時金の受給要件","b":"◯1 特例一時金 は、 短期雇用特例被保険者 が失業した 場合において、 離職の日以前 1年間 （当該期 間に疾病、負傷その他厚生労働省令で定める理由により 引き続き30日以上 賃金の支払を受けることがで きなかった 短期雇用特例被保険者 である被保険者については、当該理由により賃金の支払を受けること ができなかった日数を 1年 に加算した期間（その期間が 4年 を超える ときは、 4年間 ））に、被 保険者期間が通算して 6箇月以上 であったときに、支給する。この場合における第14条の規定の適用に ついては、同条第3項中「12箇月（前条第2項の規定により読み替えて適用する場合にあっては、6箇月）」 とあるのは、「6箇月」とする。 ◯2 前項の規定により 特例一時金 の支給を受けることができる資格（以下「 特例受給資格 」という。）を有 する者を「 特例受給資格者 」という。 特例一時金 R04-01D 2022改正 賃金日額 には、年齢にかかわらず一律の 最低 限度額 が定められていますが 、特例高年齢被保険者には 、適用はあり ません 。（法37条の6第2項、行政手引2140） 離職理由が異なっているときは 、離職者にとって不利益とならない 方の離職理由に一本化して給付が行われます 。","s":"短期雇用特例被保険者が失業した場合、離職の日以前1年間に被保険者期間が6か月以上あれば、特例一時金を受給できます。","e":"冬場だけスキー場で働くSさん（季節労働者）が失業した場合、過去1年間に6か月以上働いていれば特例一時金がもらえます。","p":"要件は「1年間に6か月以上」。高年齢求職者給付金と同じ要件。算定対象期間の延長は最大2年まで（一般の最大4年とは異なる）。","f":"11_雇用保険法11-高年齢求職者給付金、特例一時金","pg":16},{"r":"法40条","t":"特例一時金の額と申請期限","b":"◯3 特例一時金 の支給を受けようとする 特例受給資格者 は、 離職の日の翌日 から起算して 6箇 月を経過する日まで に、公共職業安定所に 出頭 し、 求職の申込み をした上、失業していることに ついての 認定 を受けなければならない。 同じ暦月中において、A事業所で6日、B事業所で5日のような場 合、賃金支払基礎日数は合算されるため、「1か月」の被保険者期間 とされます。 高年齢求職者給付金の場合と同様です。","s":"特例一時金は、基本手当日額の40日分が一時金として支給されます。離職の日の翌日から6か月を経過する日までに申請が必要です。","e":"季節労働者のSさんには、基本手当日額×40日分がまとめて支給されます。ただし、退職日の翌日から6か月以内に手続きしないといけません。","p":"金額は「40日分」（当分の間の暫定措置、本則は50日分）。申請期限は「6か月」（高年齢求職者給付金の「1年」より短い）。待期7日は適用される。","f":"11_雇用保険法11-高年齢求職者給付金、特例一時金","pg":20},{"r":"法45条","t":"日雇労働求職者給付金の受給要件","b":"日雇労働求職者給付金 は、日雇労働被保険者 が失業した場合において、その 失業 の日の属する月 の 前2月間 に、その者について、 印紙保険料 が通算して26日分 以上納付されているとき に支給す る。 普通給付","s":"日雇労働被保険者が失業した場合、失業の日の属する月の前2月間に印紙保険料が通算26日分以上納付されていれば、日雇労働求職者給付金が支給されます。","e":"日雇いのTさんが3月に失業したら、1月と2月の2か月間に合計26日分以上の印紙保険料が貼られていれば給付金がもらえます。","p":"「前2月間」に「26日分以上」の印紙保険料の納付が要件。印紙保険料は事業主が手帳に印紙を貼付して納付する。「26日」の数字が頻出。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":4},{"r":"法47条","t":"日雇労働求職者給付金の失業認定","b":"◯1 日雇労働求職者給付金 は、 日雇労働被保険者 が失業している日 （失業していることについての 認 定を受けた日 に限る。）について支給する。 ◯2 前項の失業していることについての 認定（以下「 失業の認定 」という。）を受けようとする者は、 公共職業安定所 に出頭 し、 求職の申込み をしなければならない。","s":"日雇労働求職者給付金は、日雇労働被保険者が失業している日（失業の認定を受けた日に限る）について支給されます。認定はハローワークに出頭して行います。","e":"日雇いのTさんは、仕事がない日にハローワークに行って「今日は失業しています」と認定を受けて、その日の分の給付金をもらいます。","p":"一般の受給資格者と異なり、日ごとに失業の認定を受ける。「その日」にハローワークに出頭して認定を受ける必要がある。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":8},{"r":"法51条","t":"日雇労働求職者給付金の支給日","b":"◯1 日雇労働求職者給付金 は、公共職業安定所 において、 失業の認定を行った日 に支給する ものとす る。 受給要件 日雇労働求職者給付金 は、日雇労働被保険者 が失業している日 （失業の認定を受けた日に 限る）について支 給される。（法47条1項） 失業の認定を受けようとする者 は、公共職業安定所 に出頭し、求職の申込み をしなければならない。（法47 条2項） 日雇労働求職者給付金 は、公共職業安定所 において、 失業の認定を行った日 に支給される。（法51条1項） 現在は口座振込みによる支給が原則です 。（行政手引90554） 日雇労働求職者給付金においても 、求職の申込みをする必要があり ます。","s":"日雇労働求職者給付金は、公共職業安定所において失業の認定を行った日に支給されます。","e":"ハローワークで「今日は失業」と認定を受けたら、その場でその日の分の給付金が支給されます。","p":"認定日に即日支給される点が特徴。一般の基本手当が4週間分まとめて支給されるのとは全く異なる。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":8},{"r":"法50条","t":"日雇労働求職者給付金の支給日数と限度","b":"◯1 日雇労働求職者給付金 は、日雇労働被保険者 が失業した日の属する月 における 失業の認定 を受けた 日について、その月の 前2月間 に、その者について納付されている 印紙保険料 が通算して 28日分以 下であるとき は、通算して 13日分 を限度として支給 し、その者について納付されている 印紙保険料 が 通算して 28日分を超えている ときは、通算して、 28日分 を超える 4日分 ごとに1日を 13日 に加えて得た日数分を限度 として支給する。ただし、その月において 通算して 17日分 を超えては支給し ない。 受給日数 日雇労働求職者給付金の支給日数 は、前2か月間の納付状況に応じ、次の通りである。（法50条1項） 前2か月間に納付された印紙保険料 支給日数の限度 通算して26日分 〜31日分 13日分 通算して32日分 〜35日分 14日分 通算して36日分 〜39日分 15日分 通算して40日分 〜43日分 16日分 通算して44日分以上 17日分 上記支給日数は 「失業の認定を受けた 」場合の限度日数 です。その ため、失業の認定を受けることができない日が多ければ 、表の支給日 数を受けることができないこともあります 。","s":"日雇労働求職者給付金は、前2月間の印紙保険料の納付日数に応じて、月に13日〜17日分支給されます。","e":"前2月間に合計28日分の印紙保険料が納付されていれば月に13日分、44日以上なら月に17日分の給付金が受けられます。","p":"支給日数は印紙保険料の納付日数に連動する。26日以上28日以下→13日、29日以上31日以下→14日…と段階的に増える。月の上限日数を押さえる。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":15},{"r":"法53条","t":"日雇労働求職者給付金の特例給付","b":"◯1 日雇労働被保険者 が失業した場合において、次の各号のいずれにも該当するときは、その者は、 公共職 業安定所長 に申し出て 、特例給付による日雇労働求職者給付金の支給 を受けることができる。 1. 継続する6月間 に当該 日雇労働被保険者 について 印紙保険料 が各月11日分 以上、かつ、 通算 して78日分 以上納付 されていること。 2. 前号に規定する 継続する6月間 （以下「 基礎期間 」という。） のうち 後の5月間 に第45条 （普通給付）の規定による 日雇労働求職者給付金の支給を受けていない こと。 3. 基礎期間 の最後の月の翌月 以後 2月間 （申出をした日が当該 2月 の期間内にあるとき は、同日までの間）に第45条（普通給付）の規定による 日雇労働求職者給付金の支給を受けていない こ と。 ◯2 前項の 申出は、 基礎期間 の最後の月の翌月 以後 4月 の期間内 に行わなければならない。","s":"日雇労働被保険者が一定の要件（継続6か月間に各月11日以上かつ通算78日以上の印紙保険料納付）を満たす場合、通常の給付を受け終わった後に特例給付を受けられます。","e":"日雇いのUさんが6か月間安定して働いていたのに急に仕事がなくなった場合、通常の給付に加えて、さらに60日分の特例給付が受けられます。","p":"特例給付の要件：「継続する6か月間に各月11日以上」かつ「通算78日分以上」の印紙保険料納付。給付日数は「60日」が上限。4週間に1回の認定。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":22},{"r":"則79条","t":"特例給付の失業認定","b":"◯1 法第53条第1項（特例給付）の申出をした者が受ける 失業の認定 は、管轄公共職業安定所 におい て、その 申出をした日 から起算して 4週間に1回ずつ 行うものとする。 特例給付 日雇労働被保険者 の中には、 ある期間は比較的失業することなく就業し 、他の特定の期間に継続的に失業す る者がある が、これらの者に対して、日雇給付金の「 特例給付 」の制度 が設けられている。すなわち、日雇給 付金における通常の給付である普通給付は、2か月において資格を満たすことができるが、特例給付制度では、 資格期間を6か月にとり、日雇給付金の支給も、普通給付は、その2 か月に引き続く1か月内に13日〜17日分を 支給しているものを、その6か月に引き続く4か月間に60日分まで行い得ることとするものである。（行政手引 90601）","s":"日雇労働求職者給付金の特例給付を受ける者の失業認定は、申出をした日から4週間に1回ずつ行います。","e":"特例給付を受けるUさんは、通常の日々の認定ではなく、4週間に1回ハローワークに行って認定を受けます。","p":"通常の日雇は「日ごと」の認定だが、特例給付は「4週間に1回」。一般の基本手当と同じ頻度になる。","f":"12_雇用保険法12-日雇労働求職者給付金","pg":22},{"r":"則84条","t":"常用就職支度手当の申請期限","b":"◯1 受給資格者等 は、常用就職支度手当の支給を受けようとするときは、 安定した職業に就いた日の翌日 か ら起算して 1箇月以内 に、事実を証明することができる書類及び 受給資格者証等 を添えて（受給資格 者、高年齢受給資格者又は特例受給資格者がそれぞれ受給資格通知、高年齢受給資格通知又は特例受給資格通 知の交付を受けた場合にあっては、当該事実を証明することができる書類の添付に併せて 個人番号カード を提 示して） 常用就職支度手当支給申請書 を管轄公共職業安定所の長 （日雇受給資格者にあっては、安定した職業 に係る事業所の所在地を管轄する公共職業安定所の長。）に提出しなければならない。 支給申請手続 2023改正 受給資格者等 は、常用就職支度手当の支給を受けようとするとき は、安定した職業に就いた日の翌 日から起算して 1か月以内 に、事実を証明することができる書類及び 受給資格者証など を添えて（受給資格者、 高年齢受給資格者または特例受給資格者がそれぞれ 受給資格通知 、高年齢受給資格通知 または 特例受給資格通 知の交付を受けた場合にあっては、当該事実を証明することができる書類の添付に併せて 個人番号カード を提","s":"常用就職支度手当の支給を受けようとするときは、安定した職業に就いた日の翌日から1か月以内に申請しなければなりません。","e":"就職困難者のVさんがハローワークの紹介で正社員として就職した場合、就職日の翌日から1か月以内に申請書を提出します。","p":"申請期限は「就職日の翌日から1か月以内」。対象は就職困難者や一定の受給資格者等。再就職手当との違いを整理しておく。","f":"13_雇用保険法13-就職促進給付（再就職手当、就業促進定着手当、常用就職支度手当）","pg":29},{"r":"法58条","t":"移転費","b":"◯1 移転費 は、 受給資格者等 が公共職業安定所 、特定地方公共団体 若しくは 職業紹介事業者 の紹介した 職業に就く ため、又は 公共職業安定所長 の指示した 公共職業訓練等を受ける ため、その 住所又は 居所 を変更する 場合において、 公共職業安定所長 が厚生労働大臣 の定める基準 に従って必要があると 認めたとき に、支給する。","s":"受給資格者等がハローワーク等の紹介した職業に就くため、又は公共職業訓練等を受けるために住所を変更する場合、移転費が支給されます。","e":"東京在住のWさんが、ハローワークの紹介で大阪の会社に就職することになった場合、引っ越し費用として移転費が支給されます。","p":"支給対象は「ハローワーク等の紹介」又は「公共職業訓練等の受講」のための移転。自分で見つけた仕事のための引っ越しは対象外。「受給資格者等」には受給資格者・高年齢受給資格者・特例受給資格者・日雇受給資格者が含まれる。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":3},{"r":"則87条","t":"移転費の種類","b":"◯1 移転費 は、鉄道賃 、船賃、航空賃 、車賃、移転料 及び 着後手当 とする。 移転費 移転費 は、受給資格者等が 公共職業安定所などの紹介した職業に就くため 、または公共職業安定所長の指示 した公共職業訓練等を受けるため 、その 住所または居所を変更 する場合において、 公共職業安定所長 が厚生労 働大臣の定める基準 に従って必要があると認めたときに、支給される。（法58条1項）","s":"移転費は、鉄道賃、船賃、航空賃、車賃、移転料、着後手当の6種類です。","e":"大阪に引っ越すWさんには、新幹線代（鉄道賃）、荷物の運搬費（移転料）、引っ越し後の当面の生活費（着後手当）などが支給されます。","p":"6種類を覚える：鉄道賃・船賃・航空賃・車賃・移転料・着後手当。「宿泊料」は移転費には含まれない（広域求職活動費に含まれる）。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":3},{"r":"則92条","t":"移転費の申請期限","b":"◯1 受給資格者等 は、移転費 の支給を受けようとするときは、 移転の日の翌日 から起算して 1箇月以内 に、 受給資格者証等 を添えて（受給資格者、高年齢受給資格者又は特例受給資格者がそれぞれ 受給資格 通知、高年齢受給資格通知 又は特例受給資格通知 の交付を受けた場合にあっては、 個人番号カード を提示し て） 移転費支給申請書 を管轄公共職業安定所の長に提出 しなければならない。 支給申請手続 2023改正 受給資格者等 は、移転費の支給を受けようとするとき は、移転の日の翌日から起算して 1か月以内 に、受給資格者証など を添えて（受給資格者、高年齢受給資格者または特例受給資格者がそれぞれ 受給資格通 知、高年齢受給資格通知 または 特例受給資格通知 の交付を受けた場合にあっては、 個人番号カード を提示し て）移転費支給申請書 を管轄公共職業安定所長 に提出しなければならない。（則92条1項）","s":"移転費の支給を受けようとするときは、移転の日の翌日から1か月以内に申請しなければなりません。","e":"3月15日に大阪に引っ越したWさんは、4月15日までに移転費の申請書を提出します。","p":"申請期限は「移転の日の翌日から1か月以内」。受給資格者証等を添付する必要がある。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":8},{"r":"則95条","t":"移転費の返還","b":"◯1 移転費の支給を受けた受給資格者等 は、公共職業安定所 、特定地方公共団体 若しくは 職業紹介事業者 の 紹介した 職業に就かなかった とき、又は 公共職業安定所長 の指示した 公共職業訓練等を受けなかっ たときは、その 事実が確定した日の翌日 から起算して 10日以内 に移転費を支給した公共職業安定所長 にその旨を届け出るとともに、その 支給を受けた移転費に相当する額 を返還 しなければならない。 移転費の返還 移転費の支給を受けた受給資格者等 が、① 公共職業安定所 、特定地方公共団体 若しくは 職業紹介事業者 の紹 介した 職業に就かなかったとき 、②公共職業安定所長 の指示した公共職業訓練等を受けなかったとき は、その 事実が確定した日の翌日 から起算して 10日以内 に移転費を支給した公共職業安定所長にその旨を 届け出る とと もに、その支給を受けた 移転費に相当する額 を返還しなければならない。（則95条1項）","s":"移転費の支給を受けた受給資格者等が、紹介された職業に就かなかったとき又は公共職業訓練等を受けなかったときは、移転費を返還しなければなりません。","e":"移転費をもらって大阪に引っ越したのに、結局その会社に就職しなかった場合は、受け取った移転費を返さなければなりません。","p":"返還義務が発生するのは「就かなかったとき」「受けなかったとき」。正当な理由がある場合は返還免除される可能性がある。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":8},{"r":"法59条","t":"求職活動支援費","b":"◯1 求職活動支援費 は、 受給資格者等 が求職活動 に伴い次の各号のいずれかに該当する行為をする場合 において、 公共職業安定所長 が厚生労働大臣 の定める基準 に従って必要があると認めたときに、支給す る。 1. 公共職業安定所 の紹介による 広範囲の地域 にわたる求職活動 （広域求職活動費 ） 2. 公共職業安定所 の職業指導 に従って行う職業に関する 教育訓練の受講 その他の活動（ 短期訓練受 講費 ） 3. 求職活動を容易にするための役務の利用 （求職活動関係役務利用費 ） 求職活動支援費の種類 「求職活動支援費 」には、 広域求職活動費 、短期訓練受講費 、求職活動関係役務利用費 がある。（法59条1 項、則96条）","s":"受給資格者等が求職活動に伴い一定の行為をする場合に、公共職業安定所長が基準に照らして必要と認めたときに支給される費用です。広域求職活動費・短期訓練受講費・求職活動関係役務利用費の3種類があります。","e":"遠方の面接に行く交通費（広域求職活動費）、再就職に必要な短期の資格講座の費用（短期訓練受講費）、面接のために子どもを預ける費用（求職活動関係役務利用費）が支給されます。","p":"3種類：①広域求職活動費、②短期訓練受講費、③求職活動関係役務利用費。「公共職業安定所長」が必要性を認めた場合に支給。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":9},{"r":"則96条","t":"広域求職活動費の支給要件","b":"広域求職活動費 は、受給資格者等 が公共職業安定所の紹介 により 広範囲の地域 にわたる 求職活動 （以 下「 広域求職活動 」という。）をする場合であって、次の各号のいずれにも該当するときに支給するも のとする。 1. 法第21条（ 待期）、第32条第1項（ 就職拒否又は受講拒否による 給付制限 ）若しくは第2項（ 職業指導 拒否による 給付制限 ）又は法第52条第1項（ 就職拒否による日雇労働求職者給付金の 給付制限 ）の規 定による期間が 経過した後 に広域求職活動を開始 したとき。 2. 広域求職活動 に要する費用（以下「 求職活動費 」という。）が広域求職活動のために訪問する事業 所（以下「 訪問事業所 」という。）の 事業主 から 支給されない とき、又はその 支給額 が広域求職活動 費の 額に満たない とき。","s":"広域求職活動費は、受給資格者等がハローワークの紹介により広範囲の地域にわたる求職活動をする場合に支給されます。","e":"東京在住のXさんが、ハローワークの紹介で名古屋の会社の面接に行く場合、交通費と宿泊費が広域求職活動費として支給されます。","p":"「ハローワークの紹介」が必須要件。自分で見つけた求人の面接交通費は対象外。「広範囲の地域」とは往復で一定距離以上。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":11},{"r":"則97条","t":"広域求職活動費の種類","b":"◯1 広域求職活動費 は、 鉄道賃 、船賃 、航空賃 、車賃 及び 宿泊料 とする。 広域求職活動費 広域求職活動費 は、受給資格者等 が公共職業安定所の紹介 により 広域求職活動 を行う場合に、 支給される 。 （則96条）","s":"広域求職活動費は、鉄道賃、船賃、航空賃、車賃、宿泊料の5種類です。","e":"名古屋まで新幹線で面接に行くXさんには、新幹線代（鉄道賃）と、必要に応じてホテル代（宿泊料）が支給されます。","p":"5種類：鉄道賃・船賃・航空賃・車賃・宿泊料。移転費との違い：移転費には「移転料」「着後手当」があるが宿泊料がない。広域求職活動費には「宿泊料」があるが移転料・着後手当がない。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":11},{"r":"則99条","t":"広域求職活動費の申請期限","b":"◯1 受給資格者等 は、広域求職活動費 の支給を受けようとするときは、 公共職業安定所 の指示による 広域 求職活動を終了した日 の翌日 から起算して 10日以内 に、 受給資格者証等 を添えて（受給資格者、 高年齢受給資格者又は特例受給資格者がそれぞれ受給資格通知、高年齢受給資格通知又は特例受給資格通知の 交付を受けた場合にあっては、 個人番号カード を提示して） 求職活動支援費（広域求職活動費）支給申請 書を管轄公共職業安定所の長に提出 しなければならない。 支給申請手続 2023改正 受給資格者等 は、広域求職活動費の支給を受けようとするとき は、公共職業安定所 の指示による 広 域求職活動を終了した日の翌日 から起算して 10日以内 に、受給資格者証など を添えて（受給資格者、高年齢受 給資格者または特例受給資格者がそれぞれ 受給資格通知 、高年齢受給資格通知 または 特例受給資格通知 の交付 を受けた場合にあっては、 個人番号カード を提示して） 求職活動支援費 （広域求職活 動費）支給申請書 を管轄 公共職業安定所長 に提出しなければならない。（則99条1項）","s":"広域求職活動費の支給を受けようとするときは、広域求職活動を終了した日の翌日から10日以内に申請しなければなりません。","e":"名古屋での面接を終えて東京に戻った翌日から10日以内に、ハローワークに申請書を提出します。","p":"申請期限は「終了日の翌日から10日以内」。移転費（1か月以内）や常用就職支度手当（1か月以内）とは期限が異なる。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":15},{"r":"則100条の2","t":"短期訓練受講費の支給要件","b":"短期訓練受講費 は、受給資格者等 が公共職業安定所 の職業指導 により 再就職の促進 を図るため に 必要な 職業に関する 教育訓練 を受け 、当該 教育訓練 を修了 した場合（ 待期期間 が経過した後に当該 教育訓練を開始した場合に 限る。）において、当該 教育訓練の受講のために支払った費用 （入学料 及び 受講料 に限る。）について 教育訓練給付金の支給を受けていない ときに、 厚生労働大臣 の定める基 準に従って、支給するものとする。 短期訓練受講費 短期訓練受講費 は、受給資格者等 が公共職業安定所 の職業指導 により 再就職の促進を図る ために必要な職業 に関する 教育訓練 を受け 、当該 教育訓練を修了した 場合（ 待期期間が経過した後 に当該教育訓練を開始した場 合に限る）において、当該 教育訓練の受講のために支払った費用 （入学料及び受講料に限る ）について 教育訓 練給付金の支給を受けていないとき に、厚生労働大臣の定める基準に従って、支給される。（則100条の2）","s":"短期訓練受講費は、受給資格者等がハローワークの職業指導により再就職に必要な教育訓練を受け、修了した場合に支給されます。支給額は教育訓練経費の20%（上限10万円）です。","e":"ハローワークの指導で「この資格を取れば就職しやすくなりますよ」と言われ、3万円の講座を受講・修了した場合、6,000円が戻ってきます。","p":"支給率は「20%」、上限は「10万円」。「ハローワークの職業指導」が要件。教育訓練給付金との併給はできない。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":16},{"r":"則100条の6","t":"求職活動関係役務利用費の支給要件","b":"求職活動関係役務利用費 は、受給資格者等 が求人者との面接等 をし、又は法第60条の2第1項の 教育訓練給 付金の支給に係る教育訓練 若しくは 短期訓練受講費 の支給に係る教育訓練 、公共職業訓練等 若しくは 認定職業 訓練（以下「 求職活動関係役務利用費対象訓練 」という。）を受講するため、その 子に関して、次の各 号に掲げる 役務（以下「 保育等サービス 」という。） を利用する 場合（ 待期期間 が経過した後に保 育等サービスを利用する場合に 限る。）に支給するものとする。 1. 保育所 、認定こども園 又は家庭的保育事業等 における 保育 2. 子ども ・子育て支援法 に規定する事業における 役務 3. その他前2号に掲げる役務に準ずるものとして 職業安定局長 が定めるもの 求職活動関係役務利用費 求職活動関係役務利用費 は、受給資格者等 が求人者との面接など をし、または 求職活動関係役務利用費対象 訓練を受講 するため、その 子に関して、 保育等サービスを利用 する場合（ 待期期間が経過した後 に保育等サー ビスを利用する場合に 限る）に支給される。（則100条の6）","s":"受給資格者等が面接や教育訓練のために保育サービス等を利用した場合に支給されます。1日あたりの上限額があり、支給対象日数にも制限があります。","e":"面接に行くために子どもを保育所に一時預かりしてもらった費用の80%（1日上限8,000円）が支給されます。","p":"支給率は「80%」。1日の上限「8,000円」。面接等のための保育サービス利用が対象。求職活動と教育訓練の場合で支給対象日数が異なる。","f":"14_雇用保険法14-就職促進給付（移転費、求職活動支援費、広域求職活動費、短期訓練受講費、求職活動関係役務利用費）","pg":19},{"r":"法60条の2","t":"教育訓練給付金の支給要件","b":"◯2 支給要件期間 は、 教育訓練給付金支給対象者 が基準日 までの間に 同一の事業主 の適用事業 に引 き続いて 被保険者として 雇用された期間 （当該 雇用された期間 に係る 被保険者となった日前 に被保険者 であったことがある者 については、当該 雇用された期間 と当該 被保険者であった期間 を通算した期 間）とする。ただし、当該期間に次の各号に掲げる期間が含まれているときは、当該各号に掲げる期間に該当 する全ての期間 を除いて算定 した期間とする。 1. 当該 雇用された期間 又は当該 被保険者であった期間 に係る 被保険者となった日 の直前の被保険者でなく なった日 が当該 被保険者となった日前 1年の期間内にない ときは、当該 直前の被保険者でなくなった 日前の被保険者であった期間 2. 当該基準日前に 教育訓練給付金の 支給を受けたことがある ときは、当該給付金に係る 基準日前の被 保険者であった期間 ◯3 被保険者となった日 が被保険者となった ことの 確認があった日 の2年前 の日より前である とき は、当該 確認があった日 の2年前の日 に被保険者となった ものとみなして前項の 支給要件期間の算定を行う も のとする。 支給要件期間 2026改正 「支給要件期間 」とは、原則として、 教育訓練給付金支給対象者 が基準日 （当該教育訓練を開始し た日）までの間に 同一の事業主 の適用事業に引き続いて 被保険者として雇用された期間 （当該雇用された期間 に係る被保険者となった日前に被保険者であったことがある者については、当該雇用された期間と当該被保険 者であった期間を通算した期間）をいう。（法60条の2第2項） R05-07A 一般教育訓練給付金および特定一般教育訓練給付金の支 給要件期間は 、「基準日 」において判断されます 。したがって 、教育 訓練期間中に被保険者資格を 「喪失」した場合であっても 、教育訓練 開始日において支給要件期間を満たしていれば 、教育訓練を修了した 際に支給の対象となります （訓練受講中に離職しても訓練を継続でき るわけです ）。（行政手引58041、58151）","s":"教育訓練給付金は、被保険者期間が一定以上ある者が厚生労働大臣の指定する教育訓練を受講・修了した場合に支給されます。一般教育訓練は被保険者期間3年以上（初回は1年以上）で費用の20%（上限10万円）、専門実践教育訓練は3年以上（初回は2年以上）で費用の50%〜70%が支給されます。","e":"会社員のYさんが簿記の講座（一般教育訓練）を15万円で受講し修了したら、3万円が戻ってきます。看護師の専門学校（専門実践教育訓練）なら費用の50〜70%が支給されます。","p":"3種類：一般（20%・上限10万円）、特定一般（40%・上限20万円）、専門実践（50%・上限年間40万円、資格取得で70%・上限年間56万円）。支給要件期間の「初回」の短縮要件は頻出。","f":"15_雇用保険法15-教育訓練給付（教育訓練給付金）","pg":14},{"r":"則101条の2の11","t":"一般教育訓練給付金の申請手続き","b":"◯1 教育訓練給付金支給対象者 は、一般教育訓練 に係る教育訓練給付金 の支給を受けようとするときは、当 該教育訓練給付金の支給に係る 一般教育訓練を修了した日 の翌日 から起算して 1箇月以内 に、教育訓 練給付金支給申請書 に所定の書類を添えて 管轄公共職業安定所の長 に提出 しなければならない。 支給申請手続 2026改正 教育訓練給付 金支給 対象者 は、「 一般教育訓練 」に係る教育訓練給付金 の支給を受けようとすると きは、当該教育訓練給付金の支給に係る 一般教育訓練を修了した日の翌日 から起算して 1か月以内 に、教育訓練 給付金支給申請書 に所定の書類を添えて 管轄公共職業安定所長 に提出しなければならない。（則101条の2の11 第1項、行政手引58031）","s":"一般教育訓練に係る教育訓練給付金は、訓練を修了した日の翌日から1か月以内に申請しなければなりません。","e":"簿記講座を3月31日に修了したYさんは、4月30日までにハローワークに申請書を提出します。","p":"申請期限は「修了日の翌日から1か月以内」。「受講開始前」の手続きは不要（特定一般・専門実践と異なる）。","f":"15_雇用保険法15-教育訓練給付（教育訓練給付金）","pg":37},{"r":"則101条の2の12","t":"特定一般教育訓練の事前手続き","b":"◯1 特定一般教育訓練受講予定者 は、当該 特定一般教育訓練 を開始する日 の14日前 までに、教育 訓練給付金及び教育訓練支援給付金 受給資格確認票 に所定の書類を添えて 管轄公共職業安定所の長 に提出 しなければならない。 受給資格確認 2024改正 2020改正 特定一般教育訓練受講予定者 は、当該「 特定一般教育訓練 」を開始する日の14日前まで に、教育訓練給付金及び教育訓練支援給付金 受給資格確認票 に所定の書類を添えて 管轄公共職業安定所長 に提 出しなければならない。（則101条の2の12第1項） 教育訓練給付金の支給を受けるためには 、教育訓練を受け 、当該教 育訓練を修了すること が必要です 。その証明が「一般教育訓練修了証 明書」です。","s":"特定一般教育訓練を受ける者は、訓練を開始する日の14日前までに、受給資格確認票等を提出して事前手続きを行わなければなりません。","e":"介護職員初任者研修（特定一般教育訓練）を5月1日に開始する予定なら、4月17日までにハローワークで事前手続きをします。","p":"事前手続き期限は「開始日の14日前まで」。一般教育訓練には事前手続きがないが、特定一般と専門実践には必要。","f":"15_雇用保険法15-教育訓練給付（教育訓練給付金）","pg":40},{"r":"則101条の2の13","t":"専門実践教育訓練の事前手続き","b":"◯1 専門実践教育訓練受講予定者 は、当該 専門実践教育訓練 を開始する日 の14日前 までに、所定 の書類及び運転免許証その他の専門実践教育訓練受講予定者が本人であることを確認することができる書類を 添えて、又は所定の書類の添付に併せて個人番号カードを提示して 教育訓練給付金及び教育訓練支援給付金 受給資格確認票 を管轄公共職業安定所の長 に提出しなければならない。 受給資格確認 R05-07E 2024改正 2023改正 専門実践教育訓練受講予定者 は、当該 専門実践教育訓練 を開始する日の14日 前まで に、所定の書類及び運転免許証その他の専門実践教育訓練受講予定者が本人であることを確認すること ができる書類を添えて、または所定の書類の添付に併せて 個人番号カード を提示して 教育訓練給付金及び教育 訓練支援給付金 受給資格確認票 を管轄公共職業安定所長 に提出しなければならない。（則101条の2の13第1 項） 2020改正 専門実践教育訓練に係る教育訓練給付金と異なり 、一時 金での支給 となります 。これは一般教育訓練に係る教育訓練給付金も 同様です 。","s":"専門実践教育訓練を受ける者は、訓練を開始する日の14日前までに、所定の書類を提出して事前手続きを行わなければなりません。","e":"看護学校（専門実践教育訓練）に4月入学するなら、3月18日までにハローワークで事前手続きをします。","p":"事前手続き期限は「開始日の14日前まで」。特定一般教育訓練と同じ期限。ジョブカードの提出が必要。","f":"15_雇用保険法15-教育訓練給付（教育訓練給付金）","pg":46},{"r":"法60条の3","t":"教育訓練休暇給付金","b":"◯1 教育訓練休暇給付金 は、 一般被保険者 が、職業に関する教育訓練を受けるための休暇 （以下「 教育 訓練休暇 」という。）を 取得した 場合に、当該 教育訓練休暇 （当該 教育訓練休暇を開始した日 から起算して 1 年を経過する日 までに 2回以上の教育訓練休暇を取得した 場合にあっては、 初回の教育訓練休暇 ）を開始した 日（以下「 休暇開始日 」という。）から起算して 1年 の期間内の教育訓練休暇を取得している日 （教育訓 練休暇を取得していることについての 認定を受けた日に限る 。）について、 第6項の規定による日数に相当す る日数分 を限度として 支給する。ただし、 次の各号のいずれかに該当する ときは、 この限りでない 。 1. 休暇開始日前 2年間 （当該期間に 疾病、負傷その他厚生労働省令で定める理由により 引き続き30日 以上賃金の支払を受けることができなかった一般被保険者 については、当該理由により賃金の支払を受け ることができなかった日数を 2年 に加算した期間 （その期間が 4年 を超えるときは、 4年 間））における みなし被保険者期間 が、通算して 12箇月 に満たない とき。 2. 当該一般被保険者を受給資格者と、 休暇開始日の前日 を第20条第1項第1号に規定する 基準日とみなし て第22条第3項及び第4項の規定を適用した場合に 算定されることとなる期間に相当する期間 が、 5年 に満たない とき。 受給資格要件 2026改正 教育訓練休暇給付金 は、一般被保険者 が、次の要件のいずれも満たす場合に支給される。（法60条 の3第1項） 受給資格要件（すべて） 1. 休暇開始日前 2年間 における みなし被保険者期間 が、通算して12か月以上 であること 2. 算定基礎期間 が、通算して5年以上 であること","s":"一般被保険者が職業に関する教育訓練を受けるための休暇（教育訓練休暇）を取得した場合に支給される給付金です。被保険者期間が5年以上あることが要件です。","e":"勤続5年以上の社員が、会社の許可を得て大学院に通うために無給の教育訓練休暇を取得した場合、教育訓練休暇給付金が支給されます。","p":"対象は「一般被保険者」のみ。被保険者期間「5年以上」が要件。失業等給付の中の「教育訓練給付」に分類される。基本手当日額相当が支給される。","f":"16_雇用保険法16-教育訓練給付（教育訓練休暇給付金、教育訓練支援給付金）","pg":2},{"r":"法61条","t":"高年齢雇用継続基本給付金","b":"◯1 高年齢雇用継続基本給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除 く。以下「高年齢雇用継続基本給付金」の規定において同じ。）に対して 支給対象月 に支払われた 賃金 の額が、当該 被保険者 を受給資格者 と、当該 被保険者 が60歳に達した日 を受給資格 に係る 離職の 日とみなして第17条（第3項を除く。）の規定を適用した場合に算定されることとなる 賃金日額 に相当する 額（以下「 みなし賃金日額 」という。）に 30を乗じて得た額の 100分の75 に相当する額を下る に至った 場合に、当該 支給対象月 について支給 する。 ◯6 支給対象月 における 高年齢雇用継続基本給付金 の額として算定された額が 第17条第4項第1号に掲げる 額の100分の80 に相当する額を超えないときは、当該 支給対象月 については、 高年齢雇用継続基本給 付金 は、支給しない 。 支給対象者 短期雇用特例被保険者 及び日雇労働被保険者 には、 高年齢雇用継続基本給付金 は支給されない 。（法61条1 項かっこ書）","s":"60歳以上65歳未満の被保険者で、60歳時点の賃金と比べて75%未満に低下した場合に支給されます。被保険者期間が5年以上必要です。支給額は賃金の最大15%です。","e":"60歳で再雇用されたZさんの給料が60歳時の60%に下がった場合、現在の賃金の15%が高年齢雇用継続基本給付金として支給されます。月給24万円なら最大3.6万円です。","p":"要件：①60歳以上65歳未満、②被保険者期間5年以上、③賃金が75%未満に低下。支給率は最大「15%」（61%以下に低下した場合）。「75%」と「15%」が最重要数字。基本手当を受給していないことが条件。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":6},{"r":"則101条の5","t":"高年齢雇用継続基本給付金の申請期限","b":"◯1 被保険者 は、初めて高年齢雇用継続基本給付金の支給を受けようとする ときは、 支給対象月の初日 から起算して 4箇月以内 に、高年齢雇用継続給付受給資格確認票 ・（初回）高年齢雇用継続給付支給申請 書に60歳到達時等賃金証明書 等の書類を添えて、 事業主を経由 してその 事業所の所在地を管轄する 公共職業安定所の長 に提出しなければならない。ただし、 やむを得ない理由 のため事業主を経由して当 該申請書の提出を行うことが困難であるときは、 事業主を経由しない で提出を行うことができる。 支給申請手続（初回） 被保険者 は、初めて高年齢雇用継続基本給付金の支給を受けようとするとき は、支給対象月の初日から起算 して4か月以内 に、高年齢雇用継続給付受給資格確認票 ・（初回）高年齢雇用継続給付支給申請書 に60歳到達 時等賃金証明書 等の書類を添えて 、事業主を経由 してその 事業所の所在地を管轄する公共職業安定所長 に提出 しなければならない。ただし、 やむを得ない理由 のため事業主を経由して当該申請書の提出を行うことが困難 であるときは、 事業主を経由しない で提出を行うことができる。（則101条の5第1項）","s":"初めて高年齢雇用継続基本給付金を受けようとするときは、支給対象月の初日から4か月以内に申請しなければなりません。","e":"60歳になった4月が最初の支給対象月なら、8月末日までに申請します。以後は2か月に1回の支給申請を行います。","p":"初回申請期限は「支給対象月の初日から4か月以内」。2回目以降は指定された支給申請月に申請。事業主を通じて申請可能。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":27},{"r":"法61条の2","t":"高年齢再就職給付金","b":"◯1 高年齢再就職給付金 は、受給資格者 （その 受給資格 に係る 離職の日 における 算定基礎期間 が5年 以上 あり、かつ、当該 受給資格 に基づく 基本手当の支給を受けたことがある者 に限る。）が 60歳に達 した日以後 安定した職業 に就くことにより 被保険者 （短期雇用特例被保険者 及び 日雇労働被保険 者を除く。以下「高年齢再就職給付金」の規定において同じ。）となった場合において、当該 被保険者 に 対し 再就職後の支給対象月 に支払われた賃金の額 が、当該 基本手当の日額 の算定の基礎となった賃 金日額 に30を乗じて得た額の 100分の75 に相当する額を下る に至ったときに、当該 再就職後の支給対 象月 について支給 する。 支給対象者 短期雇用特例被保険者 及び日雇労働被保険者 には、 高年齢再就職給付金 は支給されない 。（法61条第1項か っこ書）","s":"基本手当の受給資格者（算定基礎期間5年以上）が60歳以上で再就職し、基本手当の支給残日数が100日以上ある場合に支給されます。賃金が75%未満に低下していることも要件です。","e":"60歳で退職して基本手当を受給中のAさん（支給残日数150日）が、月給が以前の60%の条件で再就職した場合、高年齢再就職給付金が支給されます。","p":"要件：①算定基礎期間5年以上、②60歳以上で再就職、③支給残日数100日以上、④賃金75%未満に低下。支給期間は残日数200日以上→2年、100日以上200日未満→1年。再就職手当との併給不可。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":30},{"r":"則101条の7","t":"高年齢再就職給付金の申請期限","b":"◯1 被保険者 は、初めて高年齢再就職給付金の支給を受けようとする ときは、 再就職後の支給対象月の初 日から起算して 4箇月以内 に、高年齢雇用継続給付受給資格確認票 ・（初回）高年齢雇用継続給付支給 申請書 に所定の書類を添えて、 事業主を経由 してその 事業所の所在地を管轄する 公共職業安定所の 長に提出しなければならない。ただし、 やむを得ない理由 のため事業主を経由して当該申請書の提出を行 うことが困難であるときは、 事業主を経由しない で提出を行うことができる。 支給申請手続（初回） 高年齢再就職給付金の支給額 は、高年齢雇用継続基本給付金と同様 の計算方法 により計算します 。 「100分の64 」未満のときに 、「100分の10 」となります 。","s":"初めて高年齢再就職給付金を受けようとするときは、再就職後の支給対象月の初日から4か月以内に申請しなければなりません。","e":"60歳で再就職した月が支給対象月の初月なら、そこから4か月以内に申請します。","p":"申請期限は高年齢雇用継続基本給付金と同じ「4か月以内」。事業主を通じて申請可能。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":42},{"r":"法61条の4","t":"介護休業給付金","b":"◯1 介護休業給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。以下「介 護休業給付金」の規定において同じ。）が、 対象家族 を介護するための休業 （以下「 介護休業 」とい う。）をした場合において、当該 介護休業 （当該 対象家族 を介護するための 2回以上の介護休業 をした場合に あっては、 初回の介護休業 とする。以下同じ。） を開始した日前 2年間 に、 みなし被保険者期間 が 通算して12箇月以上 であったとき に、 支給単位期間 について支給する。 支給対象者 短期雇用特例被保険者 及び日雇労働被保険者 には、 介護休業給付金 は支給されない 。（法61条の4第1項かっ こ書）","s":"被保険者が対象家族を介護するために休業した場合に支給されます。休業開始前2年間に被保険者期間12か月以上が要件。支給額は休業開始時賃金日額×支給日数の67%です。同一家族につき通算93日、3回まで分割取得可能です。","e":"母親の介護のために2か月休業したBさんには、休業前の賃金の67%が支給されます。その後、父親の介護で別途取得することもできます。","p":"支給率「67%」。通算「93日」、「3回」まで分割可能。対象家族は配偶者・父母・子・配偶者の父母・祖父母・兄弟姉妹・孫。「93日」「3回」「67%」が最重要。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":44},{"r":"則101条の19","t":"介護休業給付金の申請手続き","b":"◯1 被保険者 は、介護休業給付金の支給を受けようとする ときは、 介護休業 を終了した日（当該休業に係る 最後の支給単位期間の末日をいう。）以後の日において 雇用されている 場合に、 当該休業を終了した日の翌日 から起算して 2箇月を経過する日の属する月の末日 までに、 介護休業給付金支給申請書 に休業等開始時 賃金証明票 等の書類を添えて、 事業主を経由 してその 事業所の所在地を管轄する 公共職業安定所の 長に提出しなければならない。ただし、 やむを得ない理由 のため事業主を経由して当該申請書の提出を行 うことが困難であるときは、 事業主を経由しないで提出 を行うことができる。 支給申請手続 2025改正 被保険者 は、介護休業給付金の支給を受けようとするとき は、介護休業を終了した日以後の日にお いて雇用されている 場合に、 当該休業を終了した日の翌日 から起算して 2か月を経過する日の属する月の末日 ま でに、 介護休業給付金支給申請書 に休業等開始時賃金証明票 などの書類を添えて 、事業主を経由 してその 事業 所の所在地を管轄する公共職業安定所長 に提出しなければならない。ただし、 やむを得ない理由 のため事業主 を経由して当該申請書の提出を行うことが困難であるときは、 事業主を経由しないで提出 を行うことができ る。（則101条の19第1項） 例えば 、介護休業が3月28日に終わったならば 、「3月29日〜5月 31日」の期間中に手続きを行う必要があります 。 介護休業給付金 は、一の休業期間が終了したときに 、「まとめて請 求する 」ため、「介護休業を終了した日の翌日 」から起算します 。 （行政手引59805） 休業が終了 してから申請手続を行うため 、「介護休業期間中 」に支 給を受けることはできません 。","s":"介護休業給付金を受けようとするときは、介護休業を終了した日以後に申請します。休業終了日の翌日から2か月を経過する日の属する月の末日までが期限です。","e":"3月31日に介護休業を終了した場合、5月31日の属する月の末日（5月31日）までに申請します。","p":"申請時期は「休業終了後」。育児休業給付金が休業中に申請するのとは異なる。期限は「終了日の翌日から2か月を経過する日の属する月の末日まで」。","f":"17_雇用保険法17-高年齢雇用継続給付（高年齢雇用継続基本給付金、高年齢再就職給付金）、介護休業給付","pg":68},{"r":"法61条の6","t":"育児休業等給付の種類","b":"◯1 育児休業等給付 は、 育児休業給付 、出生後休業支援給付 及び 育児時短就業給付 とする。 ◯2 育児休業給付 は、次のとおりとする。 1. 育児休業給付金 2. 出生時育児休業給付金 ◯3 出生後休業支援給付 は、 出生後休業支援給付金 とする。 ◯4 育児時短就業給付 は、 育児時短就業給付金 とする。 ◯5 第10条の3から第12条までの規定（ 未支給の失業等給付 、返還命令 、受給権の保護及び公課の禁止 ） は、育児休業等給付について 準用する。 育児休業等給付 2025改正 2023改正 2020改正 育児休業等給付 は、育児休業給付 、出生後休業支援給付 及び育児時短就業給 付とする。（法61条の6第1項）","s":"育児休業等給付は、①育児休業給付（育児休業給付金＋出生時育児休業給付金）、②出生後休業支援給付、③育児時短就業給付の3つで構成されます。","e":"育休中は育児休業給付金、パパ育休では出生時育児休業給付金、育休直後の支援は出生後休業支援給付金、時短勤務には育児時短就業給付金と、状況に応じた給付があります。","p":"育児休業等給付は「失業等給付」とは別体系。育児休業給付は育児休業給付金と出生時育児休業給付金の2種類。令和7年4月施行の出生後休業支援給付・育児時短就業給付は新設制度。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":2},{"r":"法61条の7","t":"育児休業給付金","b":"◯1 育児休業給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。以下この 章において同じ。）が、その 1歳に満たない子 を養育するための休業 （以下この節並びに第61条の12第1 項及び第6項第1号において「 育児休業 」という。）をした場合において、当該 育児休業 （当該子について2回 以上の育児休業をした場合にあっては、 初回の育児休業 とする。以下この項及び第3項において同じ。） を開 始した日前 2年間 に、 みなし被保険者期間 が通算して12箇月以上 であったとき に、 支給単位 期間 について支給する。 支給対象者 短期雇用特例被保険者 及び日雇労働被保険者 には、 育児休業給付金 は支給されない 。（法61条の7第1項かっ こ書）","s":"被保険者が1歳未満の子を養育するために育児休業を取得した場合に支給されます。休業開始前2年間に被保険者期間12か月以上が要件。支給額は休業開始時賃金日額×支給日数の67%（181日目以降は50%）。一定要件で最大2歳まで延長可能です。","e":"出産後に育休を取ったCさんには、最初の180日は賃金の67%、その後は50%が支給されます。保育所に入れなければ1歳6か月、さらに2歳まで延長できます。","p":"180日目まで「67%」、181日目以降「50%」。延長：1歳6か月、最大2歳まで（保育所に入れない等の理由が必要）。パパママ育休プラス→1歳2か月まで。「12か月以上」の被保険者期間要件も重要。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":5},{"r":"則101条の30","t":"育児休業給付金の申請期限","b":"◯1 被保険者 は、初めて育児休業給付金の支給を受けようとする ときは、 支給単位期間の初日 から起算して 4箇月を経過する日の属する月の末日 までに、当該被保険者の 氏名、住所又は居所 、被保険者番号 、個人 番号、育児休業の申出に係る 子の出産年月日 、支給単位期間の初日及び末日 、支給単位期間中の就業日数 並び に支給単位期間に支払われた賃金の額 その他の職業安定局長が定める事項を記載した申請書（以下「 育児休業 給付受給資格確認票・（初回）育児休業給付金／出生後休業支援給付金支給申請書 」という。）に 休業等 開始時賃金証明票 、母子健康手帳 、労働者名簿 、賃金台帳 その他の第101条の22の休業に係る子があるこ との事実、被保険者が雇用されていることの事実、当該休業終了後の雇用の継続の予定（期間を定めて雇用さ れる者に限る。）、賃金の支払状況及び賃金の額を証明することができる書類を添えて、 事業主を経由 してその 事業所の所在地を管轄する 公共職業安定所の長 に提出しなければならない。ただし、 やむを得 ない理由 のため事業主を経由して当該申請書の提出を行うことが困難であるときは、 事業主を経由しないで提 出を行うことができる。 支給申請手続（初回） 2025改正 被保険者 は、初めて育児休業給付金の支給を受けようとするとき は、支給単位期間の初日 から起算 して4か月を経過する日の属する月の末日 までに、 育児休業給付受給資格確認票・（初回）育児休業給付金／出 生後休業支援給付金支給申請書 に休業等開始時賃金証明票 などの書類を添えて 、事業主を経由 してその 事業所 の所在地を管轄する公共職業安定所長 に提出しなければならない。ただし、 やむを得ない理由 のため事業主を 経由して当該申請書の提出を行うことが困難であるときは、 事業主を経由しない で提出を行うことができる。 （則101条の30第1項） 例えば 、育児休業開始日が3月28日ならば 、「4か月を経過する 日」は7月27日ですので 、原則として 、提出は7月31日となります 。 （厚生労働省育児休業給付の内容及び支給申請手続について） 2022改正 特例高年齢被保険者 の場合は、 事業主を経由することな く、被保険者が、管轄公共職業安定所長に提出します 。（則65条の1 3第1項）","s":"初めて育児休業給付金を受けようとするときは、支給単位期間の初日から4か月を経過する日の属する月の末日までに申請しなければなりません。","e":"4月1日から育休を開始した場合、4月1日から4か月後の7月31日が属する月の末日（7月31日）までに申請します。","p":"期限は「支給単位期間の初日から4か月を経過する日の属する月の末日まで」。事業主を通じて2か月に1回の支給申請を行うのが通常。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":40},{"r":"法61条の8","t":"出生時育児休業給付金（パパ育休）","b":"◯1 出生時育児休業給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。） が、その子の 出生の日 から起算して 8週間を経過する日の翌日 まで（ 出産予定日前 に当該子が出生した場 合にあっては当該 出生の日 から当該 出産予定日から起算して8週間を経過する日の翌日 までとし、 出産予定日 後に当該子が出生した場合にあっては当該 出産予定日 から当該 出生の日から起算して8週間を経過する日の翌 日までとする。第61条の10において同じ。）の期間内に 4週間 以内の期間を定めて当該 子を養育するた めの休業 （当該被保険者が出生時育児休業給付金の支給を受けることを希望する旨を公共職業安定所長に 申し 出たものに限る。以下この条並びに第61条の12第1項及び第6項第1号において「 出生時育児休業 」とい う。）をした場合において、当該出生時育児休業（当該子について 2回目の出生時育児休業 をした場合にあっ ては、 初回 の出生時育児休業 とする。以下この項及び第3項において同じ。）を開始した日前 2年間 に、 みなし被保険者期間 が通算して12箇月以上 であったとき に、支給する。 支給対象者","s":"被保険者が子の出生日から8週間以内に4週間（28日）以内の育児休業を取得した場合に支給されます。2回まで分割取得可能。支給額は休業開始時賃金日額×休業日数の67%です。","e":"妻の出産後、夫のDさんが出生から8週間以内に2週間の育休を取得した場合、賃金の67%が出生時育児休業給付金として支給されます。残り2週間分は後から取ることも可能です。","p":"「出生日から8週間以内」「4週間（28日）以内」「2回まで分割可能」「67%」がポイント。休業中に就業した日がある場合、一定の範囲内（10日又は80時間）なら支給される。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":45},{"r":"則101条の33","t":"出生時育児休業給付金の申請期限","b":"◯1 被保険者 は、出生時育児休業給付金の支給を受けようとする ときは、当該出生時育児休業給付金の支給 に係る 子の出生の日 （出産予定日前に当該子が出生した場合にあっては、当該 出産予定日 ）から起算して 8 週間を経過する日の翌日から当該日から起算して2箇月を経過する日の属する月の末日 までに、当該被保険 者の氏名、住所又は居所 、被保険者番号 、個人番号 、出生時育児休業の申出に係る 子の出産年月日 、出生時育 児休業の申出に係る 休業の 初日及び末日 、当該 休業期間中の就業日数 並びに当該 休業期間に支払われた賃金の 額その他の職業安定局長が定める事項を記載した申請書（以下「 育児休業給付受給資格確認票・出生時育児休 業給付金／出生後休業支援給付金支給申請書 」という。）に 休業等開始時賃金証明票 、母子健康手帳 、 労働者名簿 、賃金台帳 その他の第101条の31の休業に係る子があることの事実、被保険者が雇用されている ことの事実、当該休業終了後の雇用の継続の予定（期間を定めて雇用される者に限る。）、賃金の支払状況及 び賃金の額を証明することができる書類を添えて、 事業主を経由 してその 事業所の所在地を管轄する 公共職業安定所の長 に提出しなければならない。ただし、 やむを得ない理由 のため事業主を経由して当 該申請書の提出を行うことが困難であるときは、 事業主を経由しないで提出 を行うことができる。 支給申請手続 2025改正 被保険者 は、出生時育児休業給付金の支給を受けようとするとき は、当該出生時育児休業給付金の 支給に係る子の 出生の日 （出産予定日前に当該子が出生した場合にあっては、当該 出産予定日 ）から起算して 8 週間を経過する日の翌日から当該日から起算して2か月を経過する日の属する月の末日 までに、 育児休業給付受 給資格確認票・出生時育児休業給付金／出生後休業支援給付金支給申請書 に休業等開始時賃金証明票 などの書 類を添えて 、事業主を経由 してその 事業所の所在地を管轄する公共職業安定所長 に提出しなければならない。 ただし、 やむを得ない理由 のため事業主を経由して当該申請書の提出を行うことが困難であるときは、 事業主 を経由しないで提出 を行うことができる。（則101条の33第1項）","s":"出生時育児休業給付金を受けようとするときは、子の出生日（出産予定日前に出生した場合は出産予定日）から8週間を経過する日の翌日から2か月を経過する日の属する月の末日までに申請します。","e":"4月1日に子が生まれた場合、8週間後の5月27日の翌日5月28日から2か月後の7月27日が属する月の末日（7月31日）までに申請します。","p":"出産予定日前に出生した場合は「出産予定日」を基準にする。申請期限の計算が複雑なので注意。","f":"18_雇用保険法18-育児休業等給付（育児休業給付金、出生時育児休業給付金、出生後休業支援給付金、育児時短就業給付金）","pg":58},{"r":"法61条の10","t":"出生後休業支援給付金","b":"◯1 出生後休業支援給付金 は、被保険者 （短期雇用特例被保険者 及び 日雇労働被保険者 を除く。） が、対象期間内 にその子を養育するための休業 （以下この節において「 出生後休業 」という。）をした場合に おいて、次の各号に掲げる要件のいずれにも該当するときに、 支給する。 1. 当該 出生後休業 （当該子について2回以上の出生後休業をした場合にあっては、 初回の出生後休業 とす る。以下この号及び第4項において同じ。） を開始した日前 2年間 に、 みなし被保険者期間 が 通算して12箇月以上 であった とき
