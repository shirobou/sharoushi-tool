<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>社労士 条文かみ砕きツール</title>
<style>
:root{--p:#1a73e8;--pl:#e8f0fe;--bg:#f8f9fa;--c:#fff;--t:#202124;--ts:#5f6368;--bd:#dadce0;--as:#1a73e8;--ae:#0d652d;--ap:#c5221f;--ao:#7627bb;--bm:#f9ab00;--done:#34a853}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.hd{background:var(--p);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.hd h1{font-size:18px;font-weight:600}.hd .sub{font-size:12px;opacity:.8;margin-top:2px}
.hd-nav{display:flex;gap:12px;margin-top:8px}
.hd-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer}
.hd-nav button:hover{background:rgba(255,255,255,.35)}
.hd-nav button.hn-act{background:#fff;color:var(--p);font-weight:600}
.ct{max-width:800px;margin:0 auto;padding:16px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:16px 0}
.sb{padding:14px 12px;border:2px solid var(--bd);border-radius:12px;background:var(--c);cursor:pointer;text-align:center;font-size:13px;font-weight:500;transition:all .2s;position:relative}
.sb:hover{border-color:var(--p);background:var(--pl)}
.sb.act{border-color:var(--p);background:var(--p);color:#fff}
.sb .cnt{display:block;font-size:11px;color:var(--ts);margin-top:4px}
.sb.act .cnt{color:rgba(255,255,255,.8)}
.sb .prog{display:block;margin-top:6px;height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.sb .prog-bar{height:100%;background:var(--done);border-radius:2px;transition:width .3s}
.sb .prog-txt{font-size:10px;color:var(--ts);margin-top:2px}
.sx{position:relative;margin:16px 0}
.sx input{width:100%;padding:12px 16px 12px 44px;border:2px solid var(--bd);border-radius:24px;font-size:15px;outline:none;background:var(--c)}
.sx input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(26,115,232,.15)}
.sx::before{content:'\1F50D';position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px}
.st{text-align:center;color:var(--ts);font-size:13px;margin:8px 0 16px}
.al{list-style:none}
.ai{background:var(--c);border-radius:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;border:1px solid var(--bd)}
.ai.learned{border-left:4px solid var(--done)}
.ai.bookmarked{border-left:4px solid var(--bm)}
.ai.learned.bookmarked{border-left:4px solid var(--bm)}
.ah{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ah:hover{background:var(--pl)}
.ar{background:var(--p);color:#fff;padding:3px 10px;border-radius:6px;font-size:13px;font-weight:600;white-space:nowrap}
.at{font-size:14px;font-weight:500;flex:1}
.a-icons{display:flex;gap:2px;align-items:center}
.a-bm,.a-ck{font-size:16px;padding:4px;cursor:pointer;opacity:.3;transition:opacity .2s;user-select:none}
.a-bm:hover,.a-ck:hover{opacity:.7}
.a-bm.on{opacity:1;color:var(--bm)}.a-ck.on{opacity:1;color:var(--done)}
.ag{font-size:18px;color:var(--ts);transition:transform .2s}
.ai.op .ag{transform:rotate(180deg)}
.ab{display:none;padding:0 16px 16px}
.ai.op .ab{display:block}
.sc{margin-bottom:14px;padding:12px 14px;border-radius:8px;border-left:4px solid}
.sc-s{background:#e8f0fe;border-color:var(--as)}
.sc-e{background:#e6f4ea;border-color:var(--ae)}
.sc-p{background:#fce8e6;border-color:var(--ap)}
.sc-o{background:#f3e8fd;border-color:var(--ao)}
.sl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sc-s .sl{color:var(--as)}.sc-e .sl{color:var(--ae)}.sc-p .sl{color:var(--ap)}.sc-o .sl{color:var(--ao)}
.st2{font-size:14px;line-height:1.7}
.si{font-size:11px;color:var(--ts);margin-top:8px;padding:6px 10px;background:var(--bg);border-radius:6px}
.bb{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;background:var(--pl);color:var(--p);border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:12px}
.bb:hover{background:#d2e3fc}
.vt{display:none}.vs{display:none}.vb{display:none}.vp{display:none}
.app[data-view="top"] .vt{display:block}
.app[data-view="subject"] .vs{display:block}
.app[data-view="bookmarks"] .vb{display:block}
.app[data-view="progress"] .vp{display:block}
.eb{padding:6px 14px;border:1px solid var(--bd);border-radius:16px;background:var(--c);cursor:pointer;font-size:12px;color:var(--ts)}
.eb:hover{background:var(--bg)}
.tb{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border:1px solid var(--bd);border-radius:12px;background:var(--c);cursor:pointer;font-size:11px;color:var(--ts)}
.filter-btn:hover{background:var(--bg)}
.filter-btn.factive{background:var(--p);color:#fff;border-color:var(--p)}
.prog-summary{background:var(--c);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--bd)}
.prog-summary h3{font-size:16px;margin-bottom:12px}
.prog-overall{height:12px;background:#e0e0e0;border-radius:6px;overflow:hidden;margin-bottom:8px}
.prog-overall-bar{height:100%;background:var(--done);border-radius:6px;transition:width .3s}
.prog-pct{font-size:24px;font-weight:700;color:var(--done);text-align:center;margin:12px 0}
.prog-detail{font-size:13px;color:var(--ts);text-align:center}
.subj-prog{display:grid;grid-template-columns:1fr;gap:8px;margin-top:16px}
.sp-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--c);border-radius:8px;border:1px solid var(--bd)}
.sp-name{font-size:13px;font-weight:500;width:120px;flex-shrink:0}
.sp-bar{flex:1;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.sp-bar-fill{height:100%;background:var(--done);border-radius:4px}
.sp-txt{font-size:11px;color:var(--ts);width:60px;text-align:right;flex-shrink:0}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr)}.ct{padding:12px}.sp-name{width:80px;font-size:11px}}
</style>
</head>

<script>
const D={"労働基準法":[{"r":"法1条","t":"労働条件の原則","b":"◯1 労働条件 は、労働者 が人たるに値する生活 を営む ための 必要を充たすべきもの でなければならな い。 ◯2 労働基準法 で定める 労働条件の基準 は最低のもの であるから、 労働関係の当事者 は、この 基準を理 由として 労働条件 を低下させてはならない ことはもとより、その 向上 を図る ように 努め なけれ ばならない。 労働基準法制定の根拠 日本国憲法27条 2項には、「賃金、就業時間、休息その他の 勤労条件に関する基準 は、法律で これを定め る。」と規定されており、このことが、 労働基準法制定の根拠 となっている。（日本国憲法27条2項）","s":"労働基準法は「働く人が人間らしい生活を送れるように、最低限のルールを決めた法律」です。ここで決めた基準はあくまで最低ラインなので、会社はこれを理由に条件を下げてはいけません。むしろ、もっと良くするよう努力する義務があります。","e":"たとえば、法律で「残業代は25%増し」と決まっているのに、会社が「法律通り25%増しにしてるから、今まで30%増しだったのを25%に下げるね」と言うのは、この条文の精神に反します。","p":"「最低基準」であること、「労働関係の当事者」（使用者と労働者の両方＋それぞれの団体）に向上義務があること、法1条には罰則がないことが狙われます。","f":"01_労働基準法1-総則（労働条件の原則、労働条件の適用）","pg":4},{"r":"法112条","t":"国・公共団体への適用","b":"労働基準法及び労働基準法に基づいて発する命令 は、 国、都道府県 、市町村 その他これに準 ずべきもの についても 適用あるもの とする。 一般職の国家公務員 一般職の国家公務員 には労働基準法は 適用されない 。（平成25年6月13日基発0613第1号）","s":"労働基準法のルールは、国や都道府県、市町村など公的な機関にも適用されます。ただし、一般職の国家公務員には適用されません（別の法律で保護されている）。","e":"市役所で働く臨時職員にも労働基準法は適用されます。ただし、国家公務員法が適用される中央省庁の職員には、労働基準法ではなく国家公務員法のルールが適用されます。","p":"「一般職の国家公務員には適用されない」がひっかけで出ます。地方公務員には原則として適用されることも重要。","f":"01_労働基準法1-総則（労働条件の原則、労働条件の適用）","pg":17},{"r":"法116条","t":"適用除外","b":"◯1 第1条から第11条（総則や労働条件の原則等）まで、次項、第117条から第119条（罰則）まで及び第1 21条（施行規定）の規定を除き、 労働基準法 は、船員法 第1条第1項に規定する 船員 については、 適用し ない。 ◯2 労働基準法 は、 同居の親族のみ を使用する事業 及び 家事使用人 については、 適用しない 。 船員 船員 には、原則として、 船員法が適用 されるため、 労働基準法は適用されない 。ただし、 総則などの 労働憲 章的部分及び罰則の 一部は労働基準法の 適用を受ける 。（法116条1項）","s":"船員には原則として労働基準法は適用されません（船員法が適用）。ただし、「労働条件の原則」などの基本的な部分と罰則の一部は適用されます。また、同居の親族だけで働いている事業と家事使用人にも適用されません。","e":"家族だけで経営している飲食店（従業員ゼロ）には労働基準法は適用されません。でも、1人でもアルバイトを雇ったら適用されます。また、個人宅に住み込みで働くお手伝いさん（家事使用人）にも適用されません。","p":"船員への「一部適用」の範囲（総則＋罰則の一部）、「同居の親族のみ」＋「家事使用人」の2つが適用除外であることが頻出。","f":"01_労働基準法1-総則（労働条件の原則、労働条件の適用）","pg":22},{"r":"法9条","t":"労働者の定義","b":"労働基準法で「 労働者 」とは、 職業の種類 を問わず 、事業又は事務所 （以下「 事業」という。）に 使用される者 で、 賃金を支払われる者 をいう。 労働者の定義 R04-01A R04-01E 労働基準法で「 労働者 」とは、 職業の種類 を問わず 、事業に使用される 者で、 賃金を支 払われる者 をいう。（法9条）","s":"労働基準法でいう「労働者」とは、どんな職業であっても、事業に使用されて（＝指揮命令を受けて）、賃金を払われている人のことです。","e":"正社員、パート、アルバイト、派遣社員、外国人労働者、すべて「労働者」です。ただし、個人事業主（フリーランス）として業務委託を受けている人は、指揮命令関係がなければ労働者ではありません。","p":"「職業の種類を問わず」「使用される者」「賃金を支払われる者」の3要素。労働者性の判断基準として超頻出です。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":2},{"r":"法10条","t":"使用者の定義","b":"労働基準法で「 使用者 」とは、 事業主 又は 事業の経営担当者 その他その事業の 労働者 に関する事 項について、 事業主のために行為をするすべての者 をいう。 使用者の定義","s":"「使用者」とは社長だけでなく、事業の経営に関わる人や、労働者に関する事項について会社のために行動するすべての人を含みます。","e":"人事部長、工場長、店長なども「使用者」になり得ます。アルバイトのシフトを決める権限を持つ店長が違法な長時間労働をさせたら、その店長も使用者として責任を問われます。","p":"「事業主」「経営担当者」「事業主のために行為をするすべての者」の3つの類型。部長・課長レベルでも使用者になりうることが出題されます。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":13},{"r":"法2条","t":"労働条件の決定","b":"◯1 労働条件 は、 労働者と使用者 が、対等の立場 において 決定すべき ものである。 ◯2 労働者及び使用者 は、 労働協約 、就業規則 及び 労働契約 を遵守し、誠実に 各々その 義務を履行 しなければならない。 対等の立場","s":"労働条件は、労働者と使用者が対等な立場で決めるべきものです。そして両者とも、労働協約・就業規則・労働契約を守り、誠実にそれぞれの義務を果たさなければなりません。","e":"会社が一方的に「来月から給料を3万円下げます」と言うのは対等の原則に反します。労働条件の変更には労使の合意が必要です。","p":"法2条2項（誠実な義務履行）には罰則がない点が狙われます。「対等の立場」は理念規定です。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":25},{"r":"法3条","t":"均等待遇","b":"使用者 は、労働者 の国籍 、信条 又は 社会的身分 を理由として、 賃金、労働時間その他の 労 働条件 について、 差別的取扱 をしてはならない。 均等待遇","s":"会社は、労働者の国籍・信条（思想や宗教など）・社会的身分を理由に、賃金や労働時間などの労働条件で差別してはいけません。","e":"「外国籍だから時給を下げる」「特定の宗教を信じているから昇進させない」は違法です。ただし、「性別」はここに含まれていない点に注意（性別は法4条で賃金のみ規定）。","p":"列挙されている差別理由は「国籍」「信条」「社会的身分」の3つだけ。「性別」「年齢」「障害」は含まれません。「社会的身分」は「生来の身分」を指し、職制上の地位は含まれません。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":28},{"r":"法4条","t":"男女同一賃金の原則","b":"使用者 は、労働者 が女性 であることを 理由として、 賃金 について、 男性 と差別的取扱い をし てはならない。","s":"会社は、「女性だから」という理由で賃金を男性と差別してはいけません。","e":"同じ仕事をしている男性社員と女性社員で、性別だけを理由に基本給に差をつけるのは違法です。ただし、勤続年数や能力など合理的な理由による差は問題ありません。","p":"法4条で禁止されているのは「賃金」の差別のみ。昇進や配置転換における性差別は法4条の対象外（男女雇用機会均等法で規定）。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":33},{"r":"法7条","t":"公民権行使の保障","b":"使用者 は、労働者 が労働時間中 に、選挙権 その他 公民としての権利 を行使し、又は 公の職務 を執 行するために 必要な時間 を請求した場合においては、 拒んではならない 。ただし、 権利の行使 又は 公 の職務の執行 に妨げがない 限り、 請求された時刻 を変更すること ができる。 公民権行使の保障","s":"会社は、労働者が選挙に行ったり、裁判員を務めたりする時間を求めた場合、拒否できません。ただし、業務に支障がなければ、時刻を変更することはできます。","e":"従業員が「選挙に行きたいので午前中2時間休ませてください」と言った場合、会社は拒否できません。ただし「午前中は忙しいから、午後に行ってくれ」と時間をずらすことは可能です。","p":"「有給にするかどうか」は規定なし（無給でもOK）。「請求された時刻の変更」は可能。公民権の範囲（選挙権・被選挙権・裁判員など）が出題されます。","f":"02_労働基準法2-総則（定義、労働条件の決定、均等待遇、男女同一賃金の原則、公民権行使の保障）","pg":36},{"r":"法5条","t":"強制労働の禁止","b":"使用者 は、 暴行 、脅迫、監禁その他 精神 又は身体の自由 を不当に拘束 する手段によって、 労 働者の意思に反して 労働を強制 してはならない 。 強制労働の禁止 R04-04D 使用者 は、暴行、脅迫、監禁その他 精神または身体の自由 を不当に拘束 する手段によって、労働者 の意思に反して 労働を強制 してはならない。（法5条）","s":"暴行・脅迫・監禁など、肉体的・精神的に自由を奪う方法で、労働者の意思に反して無理やり働かせてはいけません。","e":"「辞めたら家族に危害を加えるぞ」と脅して働かせたり、パスポートを取り上げて外国人労働者を働かせるのは強制労働です。","p":"労働基準法で最も重い罰則（1年以上10年以下の懲役または20万円以上300万円以下の罰金）。法117条。","f":"03_労働基準法3-総則（強制労働の禁止、中間搾取の排除、賠償予定の禁止、前借金相殺の禁止、強制貯金）","pg":2},{"r":"法6条","t":"中間搾取の排除","b":"何人 も、法律に基づいて許される場合 の外、 業として他人の就業に介入 して利益を得て はならな い。 中間搾取の排除","s":"法律で許されている場合を除き、他人の就職や働くことに「ビジネスとして」介入してピンハネしてはいけません。","e":"「仕事を紹介してやるから給料の30%をよこせ」というブローカー行為は違法です。ただし、職業安定法に基づく職業紹介事業や、労働者派遣法に基づく派遣事業は法律で認められた例外です。","p":"「業として」（反復継続の意思で）行うことが要件。労働者派遣は「中間搾取に当たらない」（そもそも該当しないという解釈）。","f":"03_労働基準法3-総則（強制労働の禁止、中間搾取の排除、賠償予定の禁止、前借金相殺の禁止、強制貯金）","pg":6},{"r":"法16条","t":"賠償予定の禁止","b":"使用者 は、労働契約の不履行 について 違約金 を定め、又は 損害賠償額を予定する契約 をしてはな らない 。 賠償予定の禁止 R04-05C 使用者 は、労働契約の不履行 について 違約金 を定め、または 損害賠償額を予定する契約 をしてはな らない 。（法16条） 労働者派遣事業は 、「法律で特別に許されているから中間 搾取にな らない 」のではありません。 派遣という仕組み自体がそもそも 「中間 搾取」には当たらないので （違法・合法を問わず ）、法6条違反には ならないという解釈です 。 「損害賠償額 」を予定する契約 をしてはならない のであって 、「損 害賠償 」を予定する契約ではありません 。 R04-05C 本条は 、違約金またはあらかじめ定めた損害賠償額を 「現実に徴収した 」ときに違反が成立するのではなく 、そのような 「契約を締結した 」ときに違反が成立します 。（コンメンタール16 条）","s":"会社は、労働者が契約に違反した場合の違約金や、あらかじめ決めた損害賠償額を労働契約で定めてはいけません。","e":"「3年以内に辞めたら研修費100万円を払え」という契約は違法です。ただし、実際に損害が発生した場合に、その実額を請求すること自体は禁止されていません。","p":"禁止されるのは「予定する契約」。実損害の賠償請求は別途可能。「違約金」と「損害賠償額の予定」の2つが対象。","f":"03_労働基準法3-総則（強制労働の禁止、中間搾取の排除、賠償予定の禁止、前借金相殺の禁止、強制貯金）","pg":9},{"r":"法17条","t":"前借金相殺の禁止","b":"使用者 は、 前借金 その他 労働することを条件 とする 前貸の債権 と賃金 を相殺してはなら ない。 前借金相殺の禁止","s":"「お金を貸してあげるから、そのぶん給料から差し引くよ」という形で、借金と賃金を相殺してはいけません。","e":"会社が従業員に20万円貸して、「来月の給料から20万円引くね」とするのは違法です。これは借金で労働者を縛りつける（身体拘束の手段とする）ことを防ぐためです。","p":"「労働することを条件とする前貸の債権」と「賃金」の相殺が禁止。労働者が自由意思で返済することは問題なし。","f":"03_労働基準法3-総則（強制労働の禁止、中間搾取の排除、賠償予定の禁止、前借金相殺の禁止、強制貯金）","pg":13},{"r":"法18条","t":"強制貯金の禁止","b":"◯1 使用者 は、 労働契約に附随 して 貯蓄の契約 をさせ、又は 貯蓄金を管理する契約 をしては ならない 。 強制貯蓄契約の禁止 使用者 は、労働契約に附随 して貯蓄の契約 をさせ、または 貯蓄金を管理する契約 をしてはならない 。（法18 条1項） 「労働契約に付随する 強制貯蓄契約 」とは、例えば次のような契約 です。 1. 「労働契約中に貯蓄すべき 」ことが定められている契約 2. 貯蓄契約をすることが 「雇入れの条件 」となっている契約 3. 雇入れ後に貯蓄の契約を 「締結しなければ解雇 」する契約 貯蓄金を管理する契約 （貯蓄金管理契約 ）には、①使用者自身が直 接労働者の預金を受け入れて自ら管理する「 社内預金 」と②使用者が 受け入れた労働者の預金を労働者個人ごとの名義で銀行などに預け入 れ、その通帳や印鑑を保管する「 通帳保管 」があります。","s":"会社は、労働契約に関連づけて強制的に貯金させたり、貯金を管理する契約をしてはいけません。ただし、労使協定を結んで届け出れば、任意の社内預金は認められます。","e":"「入社したら毎月5万円を会社に預けること」という条件は違法です。ただし、従業員が「便利だから会社に預けたい」と自発的に行う場合は、労使協定を結べばOKです。","p":"「強制貯金＝全面禁止」「任意貯金（社内預金）＝労使協定＋届出で可能」の区別が重要。任意貯金には利率の下限あり。","f":"03_労働基準法3-総則（強制労働の禁止、中間搾取の排除、賠償予定の禁止、前借金相殺の禁止、強制貯金）","pg":16},{"r":"法13条","t":"労働基準法違反の労働契約","b":"労働基準法で定める 基準に達しない労働条件 を定める 労働契約 は、 その部分 については 無効とす る。この場合において、 無効となった部分 は、 労働基準法で定める基準 による。 趣旨","s":"労働基準法の基準を下回る労働条件を定めた契約は、その部分だけが無効になります。無効になった部分は、自動的に労働基準法の基準に置き換わります。","e":"「時給800円」と契約しても、最低賃金が1,000円なら、800円の部分だけが無効になり自動的に1,000円になります。契約全体が無効になるわけではありません。","p":"「その部分だけ」が無効（契約全体ではない）。無効部分は「労働基準法の基準による」（自動的に補充）。","f":"04_労働基準法4-労働契約（労働契約の締結）","pg":2},{"r":"法14条","t":"契約期間","b":"◯1 労働契約 は、 期間の定めのないもの を除き、 一定の事業の完了に必要な期間を定めるもの のほか は、 3年 （次の各号のいずれかに該当する 労働契約 にあっては、 5年 ）を超える期間 について 締結し てはならない 。 1. 専門的な知識、技術又は経験 （以下この号及び第41条の2第1項第1号においてにおいて「 専門的知 識等」という。）であって 高度のもの として 厚生労働大臣 が定める 基準に該当する 専門的知識 等を有する 労働者 （当該 高度の専門的知識等を必要とする業務 に就く者 に限る 。）との間に 締結される 労働契約 2. 満60歳以上 の労働者との間に締結される 労働契約 （1.に掲げる労働契約を除く。） 期間の定めのない労働契約 「期間の定めのない労働契約 」には、 労働者側からの解約する自由がある ため、 法14条の規定からは除外さ れている 。（法14条1項、コンメンタール14条）","s":"有期労働契約の上限は原則3年です。ただし、高度な専門知識を持つ人や60歳以上の人との契約は5年まで可能です。一定の事業の完了に必要な期間を定める場合は期間の上限なし。","e":"普通のアルバイト契約は最長3年。博士号を持つ研究者や公認会計士との契約、または65歳の再雇用者との契約は最長5年。ビル建設プロジェクト（完了まで4年）のための契約は4年でもOK。","p":"「3年」が原則、「5年」は例外の2パターン（高度専門職＋満60歳以上）。5年の「高度専門職」は年収要件（1,075万円以上）も要チェック。","f":"04_労働基準法4-労働契約（労働契約の締結）","pg":12},{"r":"附則137条","t":"1年経過後の退職の自由","b":"期間の定めのある労働契約 （一定の事業の完了に必要な期間を定めるもの を除き、その期間が 1年を 超えるもの に限る。）を締結した 労働者 （第14条第1項各号に規定する労働契約の上限が 5年 である 労 働者を除く。）は、当分の間、民法第628条の規定にかかわらず、当該労働契約の期間の初日から 1年を経 過した日以後 においては、その 使用者 に申し出る ことにより、 いつでも 退職することができる 。 有期労働契約の特例 一定の事業の完了に必要な期間を定めるものを除き 、1年を超える期間の定めのある労働契約 を締結した労働 者（契約期間の上限が5年とされている者を除く ）は、当該労働契約の期間の初日から 1年を経過した日以後 に おいては、その使用者に申し出ることにより、 いつでも 退職することができる 。（附則137条）","s":"1年を超える有期労働契約を結んだ労働者は、契約開始から1年経てば、いつでも退職できます。ただし、5年上限の対象者（高度専門職・60歳以上）には適用されません。","e":"3年契約で入社した場合、最初の1年は原則辞められませんが、1年経過後はいつでも「辞めます」と言えます。","p":"適用されないのは「5年上限の対象者」と「一定の事業の完了に必要な期間を定めるもの」。「当分の間」の暫定措置であること。","f":"04_労働基準法4-労働契約（労働契約の締結）","pg":18},{"r":"法15条","t":"労働条件の明示と即時解除","b":"◯2 第15条第1項（労働条件の明示）の規定によって 明示された労働条件 が事実と相違する 場合におい ては、 労働者 は、 即時に 労働契約を 解除 することができる。 ◯3 前項の場合、 就業のために 住居を変更 した労働者 が、 契約解除 の日から 14日以内に帰郷 する場合においては、 使用者 は、必要な旅費 を負担 しなければならない。 即時解除権 R05-05B 明示された労働条件と事実が相違する 場合には、 労働者 は即時に 労働契約 を解除することができ る。（法15条2項） 解除 「解除」とは、 民法の一般の意味における解除（既存の契約の効力を遡及的に消滅させ、契約が締結されな かったのと同一の法律効果を生じさせるもの）ではなく 、労働関係という継続的契約関係を「 将来に向かっ て」消滅させる ことをいう。（コンメンタール15条） 民法における契約解除の効力は 、契約が遡及的に消滅し 、最初から なかったものとみなす 「直接効果説 」が採用されています 。つまり 、 民法では 「約束が守られなかったら 、その契約はさかのぼって無効に なる」という考え方が原則 です。 これに対し 、労働契約は単なる取引ではなく 、労働者の生活を支え る継続的な関係であるため 、契約をさかのぼって無効とすると 、生活 の安定が著しく損なわれるおそれがあります 。そのため 、労働基準法 では、労働条件と実態に大きな違いがあった場合でも 、契約を将来に 向かって終了させる （将来効 ）を原則としています 。（コンメンター ル15条）","s":"会社が示した労働条件が実際と違う場合、労働者はすぐに契約を解除できます。引っ越してきた人が14日以内に帰郷する場合、旅費は会社が負担します。","e":"「月給30万円」と言われて入社したのに実際は25万円だった場合、即座に辞められます。地方から上京してきたなら、14日以内に帰る交通費・引越し費用は会社持ちです。","p":"即時解除権は「労働者側のみ」の権利。帰郷旅費は「14日以内」「就業のために住居を変更した場合」の2要件。","f":"04_労働基準法4-労働契約（労働契約の締結）","pg":42},{"r":"法19条","t":"解雇制限","b":"◯1 使用者 は、労働者 が業務上 負傷し、又は 疾病にかかり療養のために 休業 する期間 及びその後 30日間 並びに 産前産後 の女性 が第65条（産前産後休業）の規定によって 休業 する期間 及びその 後30日間 は、解雇してはならない 。 業務上の傷病による解雇制限","s":"仕事でケガや病気になって休んでいる間とその後30日間、そして産前産後の休業期間とその後30日間は、会社は労働者を解雇できません。","e":"工場で作業中に腕を骨折して3か月休業した場合、休業中と復帰後30日間は解雇されません。また、出産のために産休を取っている期間とその後30日間も同様です。","p":"「業務上の傷病」＋「産前産後」の2つの場面。「通勤災害」は含まれない。解雇制限が解除される場合（打切補償・天災事変）も重要。","f":"05_労働基準法5-労働契約（解雇制限、解雇制限の解除）","pg":6},{"r":"法20条","t":"解雇予告","b":"◯1 使用者 は、労働者 を解雇しようとする場合においては、 少なくとも 30日前 にその 予告をしなけれ ばならない。 30日前 に予告をしない使用者 は、 30日分以上 の平均賃金 （解雇予告手当 ）を支払 わなければならない。 ◯2 前項の 予告の日数 は、1日について 平均賃金 を支払った 場合においては、その 日数を 短縮すること ができる。 解雇予告及び解雇予告手当","s":"会社が労働者を解雇するには、30日前に予告するか、30日分以上の平均賃金（解雇予告手当）を払う必要があります。予告日数と手当の組み合わせも可能です。","e":"3月31日に辞めてもらいたいなら、3月1日までに予告するか、即日解雇なら30日分の平均賃金を払います。15日前に予告した場合は、15日分の手当を払えばOKです。","p":"「30日前」＋「30日分の平均賃金」の組み合わせ（合計30日になればよい）。即日解雇も手当を払えば可能。","f":"06_労働基準法6-労働契約（解雇予告、退職時の証明、金品の返還）","pg":2},{"r":"法21条","t":"解雇予告の適用除外","b":"第20条の 解雇予告 の規定は、次に掲げる 労働者 については 適用しない 。 1. 日日雇い入れられる 者（ 1箇月を超えて 引き続き使用される に至った場合を 除く。） 2. 2箇月以内の期間を定めて使用される 者（ 所定の期間を超えて 引き続き使用される に至った場 合を除く。） 3. 季節的業務に4箇月以内の期間を定めて使用される 者（ 所定の期間を超えて 引き続き使用され るに至った場合を 除く。） 4. 試の使用期間中 の者（ 14日を超えて 引き続き使用される に至った場合を 除く。） 日日雇い入れられる者","s":"一定の短期間雇用者や試用期間中の人には解雇予告は不要です。ただし、それぞれ一定期間を超えて引き続き使用された場合は、予告が必要になります。","e":"日雇い労働者は解雇予告不要ですが、1か月を超えて続けて雇った場合は必要になります。試用期間中の人も14日以内なら不要ですが、15日目以降は必要です。","p":"4つの類型と除外が解除される期間（日雇い→1か月超、2か月以内→所定期間超、季節的4か月以内→所定期間超、試用→14日超）は暗記必須。","f":"06_労働基準法6-労働契約（解雇予告、退職時の証明、金品の返還）","pg":21},{"r":"法22条","t":"退職時の証明・解雇理由証明書","b":"◯1 労働者 が、退職の場合において、 使用期間 、業務の種類 、その事業における 地位 、賃 金又は 退職の事由 （退職の事由 が解雇 の場合にあっては、その 理由 を含む 。）について 証明書 を請求 した場合においては、 使用者 は、 遅滞なく これを 交付しなければならない。 ◯2 労働者 が、第20条第1項の 解雇の予告がされた日 から退職の日 までの間において、当該 解雇の理 由について 証明書 を請求 した場合においては、 使用者 は、 遅滞なく これを 交付しなければならない。 ただし、 解雇の予告がされた日 以後に労働者が当該 解雇以外の事由 により退職 した場合において は、使用者 は、当該 退職の日以後 、これを 交付することを要しない 。 ◯3 前2項の 証明書 には、 労働者の請求しない 事項を記入してはならない 。 退職時証明書 R05-05D 労働者 が、退職の場合において、 証明書を請求 したとき は、使用者は、 遅滞なく 、「退職時証明 書」を交付しなければならない。（法22条1項） 退職時の証明書における「 退職の場合 」とは、労働者の 自己退職の場合に限らず 、使用者より 解雇された場 合や契約期間の満了 により自動的に契約が終了する場合も含まれ、 退職原因のいかんを問わず 、使用者には証 明書の 交付義務がある 。（コンメンタール22条）","s":"退職する労働者が「使用期間」「業務の種類」「地位」「賃金」「退職の事由」について証明書を求めたら、会社はすぐに出さなければなりません。解雇予告された労働者は、退職前でも解雇理由の証明書を請求できます。","e":"転職先から「前の会社の在籍証明をもらってきて」と言われたら、前の会社は速やかに発行する義務があります。また、「解雇」と言われた場合、その理由を文書で請求する権利があります。","p":"証明書に記載するのは「労働者が請求した事項のみ」（請求しない事項を書いてはいけない）。「遅滞なく」交付が必要。","f":"06_労働基準法6-労働契約（解雇予告、退職時の証明、金品の返還）","pg":27},{"r":"法23条","t":"金品の返還","b":"◯1 使用者 は、労働者 の死亡 又は 退職 の場合において、 権利者の請求 があった 場合において は、 7日 以内に 賃金を支払い、 積立金 、保証金 、貯蓄金その他 名称のいかんを問わず 、労働者の権利 に属 する 金品 を返還しなければならない 。 ◯2 前項の 賃金又は金品に関して 争いがある 場合においては、 使用者 は、異議のない部分 を、 7日以内 に支払い 、又は返還しなければならない 。 金品の返還","s":"労働者が死亡または退職した場合、権利者から請求があれば、7日以内に賃金を払い、預かっていた金品を返さなければなりません。","e":"従業員が退職した後、「まだ最後の給料がもらえていない」と請求されたら、7日以内に払わなければなりません。保証金を預かっていた場合も同様に7日以内に返還します。","p":"「7日以内」がポイント。争いがある場合は「異議のない部分」だけ7日以内に支払う。","f":"06_労働基準法6-労働契約（解雇予告、退職時の証明、金品の返還）","pg":34},{"r":"法11条","t":"賃金の定義","b":"労働基準法で 賃金とは、 賃金、給料、手当、賞与その他 名称のいかんを問わず 、労働の対償 として 使 用者が労働者に支払う すべてのもの をいう。","s":"賃金とは、名前（手当、賞与、給料など）に関係なく、労働の対価として使用者が労働者に払うすべてのお金のことです。","e":"基本給はもちろん、残業手当、通勤手当、賞与なども「労働の対価」であれば賃金です。ただし、結婚祝い金などの恩恵的なものは含まれません。","p":"「名称のいかんを問わず」「労働の対償」の2要素。チップ（客から直接）は賃金に含まれない。退職金は就業規則等で規定されていれば賃金。","f":"07_労働基準法7-賃金の支払（賃金の定義、平均賃金）","pg":1},{"r":"法12条","t":"平均賃金","b":"◯1 労働基準法で 平均賃金 とは、これを 算定すべき事由の発生した日以前 3箇月間 にその 労働者 に対し 支払われた 賃金の総額 を、その期間の 総日数 で除した金額 をいう。 ◯2 前項の期間は、 賃金締切日 がある場合 においては、 直前の賃金締切日 から起算 する。 平均賃金とは 平均賃金 とは、① 解雇予告手当 、②休業手当 、③年次有給休暇の賃金 、④災害補償 、⑤減給の制裁の制限額 を算定するときのそれぞれの 尺度として使われる、労働者の 1日当たりの生活賃金 をいう。（コンメンタール1 2条）","s":"平均賃金とは、計算が必要になった日の前3か月間に支払われた賃金の合計を、その期間の暦日数で割った金額です。賃金締切日がある場合は、直前の締切日から起算します。","e":"6月15日に解雇予告手当を計算する場合、3月16日〜6月15日の3か月間の賃金総額（例えば90万円）を暦日数（92日）で割って、約9,783円が平均賃金です。","p":"「暦日数」で割る（労働日数ではない）。「直前の賃金締切日」から起算。使用目的（解雇予告手当、休業手当、災害補償、年休賃金、減給制裁の上限）も要暗記。","f":"07_労働基準法7-賃金の支払（賃金の定義、平均賃金）","pg":16},{"r":"法24条","t":"賃金支払の5原則","b":"◯1 賃金は、 通貨 で、 直接 労働者 に、その 全額 を支払わなければならない 。ただし、 法 令若しくは 労働協約 に別段の定めがある 場合又は厚生労働省令で定める賃金について 確実な支払の 方法 で厚生労働省令で定めるものによる 場合においては、 通貨 以外のもの で支払い、また、 法令 に別段の定めがある 場合又は 労使協定 がある 場合においては、賃金の 一部を控除 して支払う ことが できる。 ◯2 賃金は、 毎月1回以上 、一定の期日 を定めて 支払わなければならない。ただし、 臨時に支払 われる賃金 、賞与 その他これに準ずるもので厚生労働省令で定める賃金（第89条において「 臨時の 賃金等 」という。）については、 この限りでない 。 賃金支払5原則","s":"賃金は①通貨で②直接労働者に③全額を④毎月1回以上⑤一定期日に支払わなければなりません。それぞれ例外があります。","e":"①給料は日本円で（現物支給は原則ダメ）②本人に手渡しか口座振込（親に渡すのはダメ）③税金・社会保険料は法令による控除OK④月給・週給はOK、年1回はダメ⑤「毎月25日」など特定の日を決める（「毎月第4金曜」はダメ）。","p":"5原則と各例外の組み合わせは頻出中の頻出。「通貨払い」の例外は労働協約、「全額払い」の控除は法令OR労使協定、「一定期日」は「第4金曜日」のように特定できない日は不可。","f":"08_労働基準法8-賃金の支払（賃金支払5原則、非常時払、休業手当、出来高払制の保障給）","pg":2},{"r":"法25条","t":"非常時払","b":"使用者 は、労働者 が出産 、疾病 、災害 その他厚生労働省令で定める 非常の場合 の費用に充て るために 請求 する場合においては、 支払期日前 であっても、 既往の労働 に対する 賃金を支払わ なければならない 。 非常時払 R05-06D 使用者 は、労働者 が出産、疾病、災害その他厚生労働省令で定める 非常の場合の費用 に充てるため に請求する場合においては、 支払期日前であっても 、既往の労働に対する賃金 を支払わなければならない。 （法25条）","s":"出産・病気・災害などの非常時に、労働者が「まだ給料日前だけど、もう働いた分の給料を先に払ってほしい」と請求した場合、会社は支払わなければなりません。","e":"給料日は25日だけど、妻が急に入院して10日に「今月の今まで働いた分の給料を先にください」と言われたら、会社は10日までの分を払う義務があります。","p":"「既往の労働」に対する賃金。まだ働いていない将来の分を前払いする義務はない。非常の場合は出産・疾病・災害・結婚・死亡・やむを得ない帰郷。","f":"08_労働基準法8-賃金の支払（賃金支払5原則、非常時払、休業手当、出来高払制の保障給）","pg":46},{"r":"法26条","t":"休業手当","b":"使用者の責に帰すべき事由 による休業 の場合においては、 使用者 は、休業期間中 当該労働者 に、その 平均賃金 の100分の60以上 の手当を支払わなければならない 。 休業手当 R03-04C 使用者の責に帰すべき事由による休業 の場合においては、 使用者 は、休業期間中 当該労働者 に、そ の平均賃金の100分の60以上 の休業手当 を支払わなければならない。（法26条）","s":"会社の責任で休業させた場合（＝使用者の責に帰すべき事由による休業）、会社は平均賃金の60%以上の手当を払わなければなりません。","e":"資材の調達ミスで工場を1週間止めた場合、出勤できなかった従業員には平均賃金の60%以上を支払う必要があります。ただし、大地震などの不可抗力による休業は対象外です。","p":"「100分の60以上」。民法の「債権者の責めに帰すべき事由」より広い概念（経営障害も含む）。天災事変等の不可抗力は対象外。","f":"08_労働基準法8-賃金の支払（賃金支払5原則、非常時払、休業手当、出来高払制の保障給）","pg":50},{"r":"法27条","t":"出来高払制の保障給","b":"出来高払制 その他の請負制 で使用する 労働者 については、 使用者 は、 労働時間 に応じ 一定額の 賃金の保障 をしなければならない 。 出来高払制の保障給","s":"完全歩合制で働く人にも、会社は労働時間に応じた最低限の賃金を保障しなければなりません。","e":"タクシー運転手が完全歩合制で、たまたまお客さんが全然来ない日があっても、働いた時間に応じた最低限の給料は保障されます。「今日は売上ゼロだから給料もゼロ」は違法です。","p":"「労働時間に応じ」た保障なので、遅刻・欠勤で勤務しなかった分は保障不要。金額の具体的な基準は法律では定められていない。","f":"08_労働基準法8-賃金の支払（賃金支払5原則、非常時払、休業手当、出来高払制の保障給）","pg":70},{"r":"法41条","t":"労働時間等の適用除外","b":"は、その性質または態様が 法定労働時間や週休制を適用するに適しない 事業または業務に従事する労 働者については、 本法上の労働時間 、休憩及び休日に関する規定を適用しない ことを定めたものである。（コ ンメンタール41条） 法41条によって適用除外を受ける者（ 法41条該当者 ）は、 業務が天候 、気象などの自然的条件の影響を著し く受ける産業 としての 農業などに従事する労働者 、あらゆる事業を通じて 監督若しくは管理の地位にある者 ま たは機密の事務を取り扱う者 、及び 監視断続的労働に従事する者で行政官庁の許可を受けたもの であり、最後 の監視断続的労働の一態様として 宿直または日直の勤務 も含まれている 。（コンメンタール41条）","s":"農業・水産業の労働者、管理監督者・機密事務取扱者、監視断続的労働者（許可を受けた者）には、労働時間・休憩・休日の規定が適用されません。","e":"工場長のような管理監督者は、残業時間の上限や休日の規定は適用されません。ただし、深夜割増賃金と年次有給休暇は適用されます。名ばかり管理職（権限も待遇もないのに肩書だけ管理職）は法41条の管理監督者には当たりません。","p":"適用除外されるのは「労働時間」「休憩」「休日」のみ。「深夜業」「年次有給休暇」は適用除外されない。「名ばかり管理職」問題も重要。","f":"09_労働基準法9-労働時間・休憩・休日（法41条該当者、高度プロフェッショナル制度、労使協定）","pg":2},{"r":"則6条の2","t":"過半数代表者","b":"◯1 「 過半数代表者 」は、次の各号の いずれにも該当する者 とする。 ア. 法第41条第2号に規定する 監督又は管理の地位にある者 でない こと。 イ. 法に規定する協定等をする者を選出することを明らかにして実施される 投票 、挙手 等の方法 による手続により選出された者であって、 使用者の意向 に基づき選出されたものでない こと。 過半数代表者 R05-06B 過半数代表者 は、次の いずれの要件も満たす者 でなければならない。（則6条の2第1項） 労働者側の締結当事者たる 「労働者の過半数を代表する者 」を選出 するときの当該事業場の労働者数の算定に当たっては 、派遣労働者 は、「派遣元 」の労働者に含まれることになります 。「派遣先 」の労 働者に含まれるわけではありません 。 過半数代表者の要件 1. 法41条2号に規定する 監督または管理の地位にある者でない こと。 2. 労使協定の締結当事者を選出することを明らかにして実施される 投票、挙手などの方法による手続により 選出された者であって、 使用者の意向によって選出された者ではない こと。","s":"労使協定の締結などで必要な「過半数代表者」は、①管理監督者でないこと、②投票や挙手など民主的な方法で選ばれたこと、③使用者の意向で選ばれていないこと、が条件です。","e":"「部長を過半数代表者にしよう」はダメ（管理監督者）。「社長が○○さんを指名した」もダメ（使用者の意向）。挙手や投票で選ぶ必要があります。","p":"2要件（管理監督者でない＋民主的手続き＋使用者の意向でない）。過半数の算定に派遣労働者は含まれない（派遣先の労働者として）。","f":"09_労働基準法9-労働時間・休憩・休日（法41条該当者、高度プロフェッショナル制度、労使協定）","pg":37},{"r":"法32条","t":"法定労働時間","b":"◯1 使用者 は、労働者 に、 休憩時間 を除き 1週間 について 40時間 を超えて 、労働させてはならな い。 ◯2 使用者 は、1週間の各日 については、 労働者 に、 休憩時間 を除き 1日について 8時間 を超えて 、 労働させてはならない 。 法定労働時間","s":"会社は労働者を、1週間に40時間、1日に8時間を超えて働かせてはいけません（休憩時間は除く）。","e":"9時始業、18時終業、12〜13時が昼休みの会社は、実働8時間でちょうど上限です。これを超える場合は36協定と割増賃金が必要です。","p":"「1週40時間」「1日8時間」のダブル規制。特例措置対象事業場（商業、映画演劇、保健衛生、接客娯楽で常時10人未満）は週44時間。","f":"10_労働基準法10-労働時間・休憩・休日（労働時間、法定労働時間、時間計算、1か月単位の変形制）","pg":9},{"r":"法38条","t":"労働時間の通算","b":"◯1 労働時間 は、 事業場を異にする 場合においても、 労働時間 に関する規定の適用については 通算 する。 事業場を異にする場合（異事業通算制） 労働時間 は、事業場を異にする場 合においても、 労働時間 に関する規定の適用については 通算する 。（法38 条1項） 「事業場を異にする場合 」には「事業主を異にする 」場合をも含まれる 。（昭和23年5月14日基発769号） 労働基準法は、事業場単位で規制を行うのが原則ですが、「同一使 用者」のA事業場とB事業場の労働時間を通算させないことは不合理 であるため、通算することが規定されています。 副業や兼業のように「使用者が異なる」場合にも通算させるかどう かは法38条1項からは直接的には読み取れませんが、通達で通算させ ることとされています（通算させるかどうかは労働基準法の前身であ る工場法の時代から議論がありました）。 2021改正 フリーランス 、独立、起業、共同経営 、アドバイザー 、 コンサルタント 、顧問、理事、監事など については、 そもそも労働基 準法が適用されないため、労働時間は 通算されません 。（令和2年9 月1日基発0901第3号）","s":"別の職場で働いた時間も、労働時間として合算されます。これは同じ会社の別の事業場だけでなく、別の会社で働いた場合も含みます。","e":"A社で6時間、その後B社で3時間働いた場合、合計9時間となり、8時間を超える1時間分は時間外労働として割増賃金が必要です（後から雇用した使用者が負担）。","p":"「事業場を異にする場合」には「事業主を異にする場合」も含まれる（通達）。副業・兼業の場合の労働時間管理に直結。","f":"10_労働基準法10-労働時間・休憩・休日（労働時間、法定労働時間、時間計算、1か月単位の変形制）","pg":14},{"r":"法32条の4","t":"1年単位の変形労働時間制（労働日数・時間の限度）","b":"◯3 厚生労働大臣 は、 労働政策審議会 の意見を聴いて 、厚生労働省令で、 対象期間 における 労働 日数の限度 並びに 1日及び1週間 の労働時間の限度 並びに 対象期間 （労使協定 で特定期間 として定 められた期間を除く。）及び 労使協定 で特定期間 として定められた期間における 連続して労働させる 日数の限度 を定める ことができる。 労働日数及び労働時間などの限度 厚生労働大臣 は、労働政策審議会 の意見を聴いて、 対象期間 における「 労働日数 」の限度 並びに「 1日及び1 週間の労働時間 」の限度 並びに「 対象期間 及び労使協定で 特定期間として定められた期間における連続して労 働させる日数 」の限度 を定めることができる。（法32条の4第3項） 「労働日数」の限度 労働日数の限度 は、次の通りである。（則12条の4第3項） 1年単位の変形労働時間制 には、対象期間における ①「労働日数 」 の限度 、②「 1日当たり及び1週間当たりの労働時間 」の限度 、③ 「連続労働日数 」の限度 が設けられています 。 あまり出題実績はないのですが、「選択対策」を怠らないようにし てください。 対象期間 労働日数の限度 1年 280日 3か月を超え1年未満 280日×対象期間の暦日数／365 3か月以内 限度なし","s":"1年単位の変形労働時間制における労働日数や1日・1週の労働時間には上限があり、厚生労働大臣が労働政策審議会の意見を聴いて定めます。","e":"1年の変形制を導入しても、1日10時間・1週52時間が上限。年間の労働日数は280日が限度。連続勤務日数は原則6日（特定期間は12日）まで。","p":"労働日数の限度「280日」、1日の上限「10時間」、1週の上限「52時間」、連続勤務日数「6日（特定期間12日）」。","f":"11_労働基準法11-労働時間・休憩・休日（フレックスタイム制、1年単位の変形制、1週間単位の変形制）","pg":34},{"r":"法32条の4第2項","t":"1年単位の変形労働時間制（各期間の労働日等の通知）","b":"◯2 使用者 は、労使協定 で第32条の4第1項4号（上記◯1）の区分をし、当該区分による各期間のうち 最 初の期間 を除く 各期間 における 労働日数 及び 総労働時間 を定めたときは、当該 各期間の初日 の 少なくとも30日前 に、当該事業場に、 労働者の過半数で組織する労働組合がある 場合においてはその 労働組合 、労働者の過半数で組織する労働組合がない 場合においては 労働者の過半数を代表する者 の同意 を得て、当該 労働日数 を超えない範囲内において当該 各期間 における 労働日 及び当該 総労働 時間を超えない範囲内において当該 各期間 における 労働日ごとの労働時間 を定めなければならない。 対象期間を1か月以上の期間ごとに区分する場合 1年単位の変形労働時間制 を採用する場合において、 労使協定 により、 対象期間を1か月以上の期間ごとに区 分することとしたときは、次の通りとなる。 対象期間を1か月以上の期間ごとに区分した場合 1. 使用者 は、当該区分による各期間のうち「 最初の期間 」における 「労働日 」と当該 「労働日ごとの労働時 間」を特定 し、当該「 最初の期間以外の期間 」における 「労働日数 」と「総労働時間 」を定める ことができ る。（法32条の4第1項4号かっこ書） 2. 当該 最初の期間以外の各期間の初日 の少なくとも30日前まで に、当該事業場の 過半数労働組合または過 半数代表者の同意 を得て、当該労働日数を超えない範囲内において当該各期間における 労働日 及び当該総労 働時間を超えない範囲内において当該各期間における労働日ごとの 労働時間 を定めなければならない。（法 32条の4第2項）","s":"1年単位の変形制で期間を区分した場合、最初の期間以外は各期間の開始30日前までに、労働組合等の同意を得て労働日と労働時間を定める必要があります。","e":"1年を4つの四半期に区分した場合、第2四半期以降の具体的な労働日・時間は、各四半期の始まる30日前までに、過半数組合または過半数代表者の同意を得て決定します。","p":"「30日前」までに通知。「同意」が必要（届出ではない）。最初の期間は協定締結時に定める。","f":"11_労働基準法11-労働時間・休憩・休日（フレックスタイム制、1年単位の変形制、1週間単位の変形制）","pg":44},{"r":"法32条の4の2","t":"1年変形制の途中退職者への精算","b":"使用者 が、対象期間中 の1年単位の変形労働時間制 の規定により 労働させた期間 が当該対象期間より 短い労働者 について、当該 労働させた期間 を平均し 1週間当たり 40時間 を超えて 労働させた場合に おいては、その 超えた時間 （第33条又は第36条第1項の規定により延長し、又は休日に労働させた時間を除 く。）の労働については、 第37条の規定の例 により 割増賃金 を支払わなければならない。 途中退職者などに対する賃金の精算 1年単位の変形労働時間制 を採用する 事業場 において、 対象期間の 途中で退職 した場合など1年単位の変形労 働時間制で労働した期間が当該 対象期間よりも短い労働者 については、労働した期間を平均して 1週間当たり4 0時間を超えた 時間（法33条または法36条1項の規定により延長し、または休日に労働させた時間を除く）に対 し、法37条1項 （割増賃金 ）の規定の例 により 割増賃金を支払わなければならない 。（法32条の4の2） 最初の期間以外の各期間の労働日及び労働日ごとの労働時間を特定 するのは 、「各期間の初日の少なくとも30日前まで 」です。「各期 間の開始の日まで 」ではありません 。 この「書面」は所轄労働基準監督署長に 届け出る必要はありませ ん。","s":"1年の変形労働時間制の途中で退職した労働者について、実際の労働期間を平均して週40時間を超えていた場合、その超過分の割増賃金を払わなければなりません。","e":"繁忙期（1日10時間労働）に3か月だけ働いて退職した場合、その3か月を平均すると週40時間を超えているなら、超過分の割増賃金を払う必要があります。","p":"「対象期間より短い労働者」に対する精算義務。閑散期のみ勤務で平均が40時間以下なら精算不要。","f":"11_労働基準法11-労働時間・休憩・休日（フレックスタイム制、1年単位の変形制、1週間単位の変形制）","pg":47},{"r":"法34条","t":"休憩","b":"◯1 使用者 は、労働時間 が6時間を超える 場合においては 少なくとも 45分 、8時間を超える 場 合においては 少なくとも 1時間 の休憩時間 を労働時間の 途中 に与えなければならない 。 ◯2 前項の 休憩時間 は、 一斉 に与えなければならない 。ただし、 労使協定 があるときは、この限り でない。 ◯3 使用者 は、第1項の 休憩時間 を自由に利用 させなければならない 。 休憩時間の定義 R05-02ｵ 「休憩時間 」とは 単に作業に従事しない 手待時間を含まず 労働者が 権利として労働から離れること を保障されている時間 をいう。（昭和22年9月13日発基17号） 休憩の付与","s":"労働時間が6時間超なら45分以上、8時間超なら1時間以上の休憩を、勤務の途中に与えなければなりません。休憩は原則一斉に与え、自由に利用させなければなりません。","e":"9〜18時勤務（実働8時間）なら45分以上の休憩が必要。残業で8時間を超えたら合計1時間以上必要。「電話番をしながら休憩」は、自由利用の原則に反するため休憩とみなされません。","p":"「6時間ちょうど」は45分不要（超えた場合のみ）。一斉付与の例外は「労使協定」。自由利用の例外は警察・消防等。「手待時間」は休憩ではなく労働時間。","f":"12_労働基準法12-労働時間・休憩・休日（休憩、休日）","pg":2},{"r":"法35条","t":"休日","b":"◯1 使用者 は、労働者 に対して、 毎週 少なくとも1回 の休日を与えなければならない。 ◯2 前項の規定は、 4週間を 通じ 4日以上 の休日を与える 使用者 については 適用しない 。 休日の定義 「休日」とは 暦日を指し、 午前零時から午後12時までの休業 と解される。（昭和23年4月5日基発535号） 休日の付与 労働契約において 「労働義務を負わない日 」を「休日」といいま す。 休日は 、「労働義務から解放された継続した24時間 」ではありま せん。","s":"会社は労働者に毎週少なくとも1回の休日を与えなければなりません。または、4週間を通じて4日以上の休日を与えることでもOKです。","e":"普通は土日のどちらか1日が法定休日です。4週4日制を採用すれば、月初に4日連続で休みを与えて残りは出勤、というシフトも合法です。","p":"「毎週1回」が原則、「4週4日」が例外。休日は「暦日」（午前0時〜午後12時）。法定休日は週1回（残り1日は法定外休日）。","f":"12_労働基準法12-労働時間・休憩・休日（休憩、休日）","pg":17},{"r":"法33条","t":"公務のための臨時の必要","b":"◯3 公務 のために 臨時の必要 がある場合においては、第33条第1項の規定にかかわらず、 官公署 の 事業（別表第1に掲げる事業を除く。）に 従事する 国家公務員 及び 地方公務員 については、第32条 から第32条の5まで若しくは第40条の 労働時間を延長 し、又は第35条の 休日に労働させる ことができる。 公務のため臨時の必要がある場合 公務のために臨時の必要がある 場合においては、 官公署の事業 （別表第1に掲げる事業を除く ）に従事する 国 家公務員 及び地方公務員 については、 所轄労働基準監督署長の許可、届出、報告などを行うことなく 、労働時 間を延長し、または 休日に労働 させることができる。（法33条3項、コンメンタール33条） 「代休付与命令 」は、所轄労働基準監督署長が 「不適当と認める 」 ときに出されるものです 。年少者や妊産婦などに対して労働時間の延 長または休日の労働をさせた場合に 、必ず発せられるものではありま せん。","s":"公務で臨時に必要がある場合、官公署の事業に従事する国家公務員・地方公務員については、許可・届出なしに時間外労働や休日労働をさせることができます。","e":"大規模災害時に市役所の職員が復旧対応のために深夜まで働く場合、36協定や労基署の許可は不要です。","p":"「官公署の事業」で「別表第1の事業を除く」。官公署でも病院や学校（別表第1の事業）は一般のルールに従う。","f":"13_労働基準法13-時間外・休日労働（時間外・休日労働、36協定、有害業務の制限）","pg":7},{"r":"法36条","t":"36協定と時間外労働の限度時間","b":"◯3 第36条第2項第4号の 労働時間を延長して労働させることができる時間 は、当該 事業場 の業務量 、 時間外労働の動向 その他の事情を考慮 して 通常予見される時間外労働 の範囲内 において、 限度時間 を超えない時間に限 る。 ◯4 第3項の 限度時間 は、1箇月 について 45時間 及び1年について 360時間 （1年単位の変形労働時 間制の対象期間として 3箇月 を超える期間を定めて当該変形労働時間制の規定により労働させる場合にあ っては、 1箇月 について 42時間 及び1年について 320時間 ）とする。 時間外労働の限度時間 労働時間を延長して労働させることができる時間 （延長時間 ）は、当該 事業場 の業務量 、時間外労働の動向 その他の事情を考慮して 通常予見される時間外労働の範囲内 において、「 限度時間 」を超えない時間 に限られ る。（法36条3項） R02-06C 36協定において定める 労働時間を延長して労働させることができる 限度時間 は、原則として、 1か 月45時間 、1年360時間 である。（法36条4項） R02-06C 1年単位の変形労働時間制 （対象期間3か月超 ）の場合の 限度時間 は、1か月 42時間 、1年320時間 である。（法36条4項かっこ書）","s":"時間外労働をさせるには36（サブロク）協定が必要です。限度時間は月45時間、年360時間が上限です。1年単位の変形制（3か月超）の場合は月42時間、年320時間です。","e":"月の残業が45時間を超える場合は、特別条項付きの36協定が必要。それでも年720時間、月100時間未満（休日労働含む）、2〜6か月平均80時間以下（休日労働含む）が上限。","p":"限度時間「月45時間・年360時間」は暗記必須。1年変形制の場合「月42時間・年320時間」も出る。特別条項の上限（年720時間、月100時間未満、複数月平均80時間）も重要。","f":"13_労働基準法13-時間外・休日労働（時間外・休日労働、36協定、有害業務の制限）","pg":20},{"r":"法37条","t":"割増賃金","b":"◯1 使用者 が、第33条（災害等又は公務のため臨時の必要がある場合）又は第36条第1項（36協定）の規定 により 労働時間を延長 し、又は 休日に労働 させた場合においては、その 時間又はその 日の労働については、 通常の労働時間又は労働日の賃金 の計算額の2割5分以上5割以下 の範囲内 でそれぞれ 政令で定める 率以上の率で計算した 割増賃金 を支払わなければならない 。ただし、当該 延長して労働させた時間 が1箇月に ついて 60時間 を超えた 場合においては、その 超えた時間の労働 については、 通常の労働時間の賃金の計 算額の5割以上 の率で計算した 割増賃金を支払わなければならない 。 ◯2 第1項の 政令は、労働者の 福祉 、時間外又は休日の労働の動向 その他の事情を考慮して定める ものとする。 ◯4 使用者 が、 午後10時 から 午前5時 まで（ 厚生労働大臣 が必要であると認める場合において は、その定める 地域又は期間 については 午後11時 から 午前6時 まで）の間において労働させた 場合においては、その時間の労働については、 通常の労働時間の賃金 の計算額 の2割5分 以上の率 で 計算した 割増賃金を支払わなければならない 。 法定労働時間を超えて労働させた場合 使用者 が、法33条 （災害などまたは公務のため臨時の必要がある場合 ）または 法36条1項 （36協定 ）の規定 により 法定労働時間 （1週40時間または44時間 、1日8時間 ）を延長して労働 させた場合には、「 割増賃金 」を 支払わなければならない。（法37条1項）","s":"時間外労働には25%以上、休日労働には35%以上、深夜労働には25%以上の割増賃金が必要です。月60時間を超える時間外労働は50%以上です。","e":"通常の時給1,000円の人が残業したら1,250円以上。休日出勤なら1,350円以上。深夜の残業（22時以降）は1,500円以上（25%+25%）。月60時間超の残業は1,500円以上。","p":"時間外25%以上、休日35%以上、深夜25%以上。月60時間超→50%以上（代替休暇制度あり）。休日労働には月60時間の計算に含めない。深夜の休日労働→35%+25%=60%以上。","f":"14_労働基準法14-時間外・休日労働（割増賃金、割増賃金に係る代替休暇）","pg":2},{"r":"則24条の2第2項","t":"事業場外みなし労働の労使協定の有効期間","b":"法第38条の2第2項の 労使協定（労働協約 による場合を 除く。）には、 有効期間 の定め をするものとす る。 採用の要件","s":"事業場外のみなし労働時間制に関する労使協定には、有効期間を定めなければなりません。","e":"外回りの営業職にみなし労働時間制を適用する場合の労使協定は、「2024年4月1日から2025年3月31日まで」のように有効期間を明記する必要があります。","p":"労使協定には「有効期間の定めが必要」。労働協約による場合は除く。","f":"15_労働基準法15-みなし労働時間制（事業場外労働のみなし労働、専門業務型裁量労働制、企画業務型裁量労働制）","pg":7},{"r":"法38条の4","t":"企画業務型裁量労働制の指針","b":"◯3 厚生労働大臣 は、対象業務 に従事する 労働者 の適正な労働条件の確保 を図るために、 労働政策審 議会 の意見を聴いて 、労使委員会 が決議する事項について 指針 を定め、これを 公表 するものとす る。 指針","s":"企画業務型裁量労働制について、厚生労働大臣は労働政策審議会の意見を聴いて指針を定め、公表します。","e":"企業の企画・立案・調査・分析の業務を行う人に裁量労働制を適用する場合のルール（対象業務の範囲や労使委員会の運営方法など）が指針で示されます。","p":"企画業務型は「労使委員会の決議」が必要（労使協定ではない）。委員の5分の4以上の多数決。指針は厚生労働大臣が労働政策審議会の意見を聴いて定める。","f":"15_労働基準法15-みなし労働時間制（事業場外労働のみなし労働、専門業務型裁量労働制、企画業務型裁量労働制）","pg":41},{"r":"法39条","t":"年次有給休暇の付与","b":"◯1 使用者 は、その 雇入れの日 から起算して 6箇月間継続勤務 し全労働日 の8割以上 出勤した労働 者に対して、 継続 し、又は 分割 した 10労働日 の有給休暇 を与えなければならない。","s":"入社日から6か月間、継続して勤務し、全労働日の80%以上出勤した労働者には、10日の有給休暇が与えられます。","e":"4月1日入社で10月1日時点で出勤率80%以上なら10日付与。その後1年ごとに日数が増え、6年6か月以降は毎年20日（上限）が付与されます。パートタイマーも比例付与の対象です。","p":"「6か月継続勤務」＋「8割以上出勤」の2要件。付与日数の推移（10→11→12→14→16→18→20日）。比例付与の対象は週4日以下かつ週30時間未満。","f":"16_労働基準法16-年次有給休暇（付与、付与日数、比例付与、時間単位年休）","pg":1},{"r":"則24条の6","t":"年5日の時季指定義務","b":"◯1 使用者 は、法第39条第7項の規定により労働者に有給休暇を 時季を定めることにより与える に当たって は、 あらかじめ 、同項の規定により当該有給休暇を与えることを当該 労働者 に明らか にした上で、 その時季について当該 労働者の意見 を聴かなければならない 。 ◯2 使用者 は、上記の規定により 聴取した 意見 を尊重 するよう 努め なければならない 。 使用者による時季指定（付与義務） R02-06E 使用者 は、10日以上 の年次有給休暇が付与される労働者 に対して、そのうち 5日について は、労働 者ごと に時季を指定して 年次有給休暇を与えなければならない 。（法39条7項） R02-06E 使用者 は、労働者に 有給休暇を時季を定めることにより与える に当たっては、 あらかじめ 、当該有 給休暇を与えることを当該 労働者に明らかにした上 で、その時季について当該 労働者の意見を聴かなければな らない 。（則24条の6第1項） R02-06E 使用者 は、当該聴取した 意見を尊重 するよう 努めなければならない。（則24条の6第2項）","s":"10日以上の有給休暇が付与された労働者に対して、使用者はそのうち5日については、労働者の意見を聴いた上で時季を指定して取得させなければなりません。","e":"20日の有休がある社員が自分で3日しか取っていなければ、会社は残り2日を「○月○日に休んでください」と指定する義務があります。自分で5日以上取っていれば指定不要。","p":"対象は「10日以上付与される労働者」。「意見を聴いて」「尊重するよう努める」。労働者が自ら5日以上取得済み、または計画的付与で5日以上ある場合は義務免除。","f":"17_労働基準法17-年次有給休暇（指定権、変更権、計画的付与、使用者による指定、休暇中の賃金、雑則）","pg":16},{"r":"法115条","t":"年次有給休暇の消滅時効","b":"年次有給休暇の消滅時効 は、これを 行使することができる時 から 2年 である。","s":"年次有給休暇の権利は、付与された日から2年で時効消滅します。","e":"2024年10月1日に付与された10日の有休は、2026年9月30日までに使わないと消滅します。つまり最大で2年分の繰越しが可能です。","p":"時効は「2年」。付与日から起算。前年の繰越分＋当年付与分で最大40日保有も可能。","f":"17_労働基準法17-年次有給休暇（指定権、変更権、計画的付与、使用者による指定、休暇中の賃金、雑則）","pg":38},{"r":"附則136条","t":"有給休暇取得者への不利益取扱いの禁止","b":"使用者 は、第39条第1項から第4項までの規定による 有給休暇を取得した 労働者 に対して、 賃金の減額 その他 不利益な取扱い をしないようにしなければならない。 不利益取扱いの禁止 使用者 は、年次有給休暇を取得した労働者 に対して、 賃金の減額 その他 不利益な取扱いをしないようにしな ければならない 。（附則136条） 本条に 罰則の定めはない 。（法117条〜法120条） 不利益取扱い 労働協約において 稼働率80％以下の労働者を賃上げ対象から除外する旨の規定 を定めた場合に、当該稼働率 の算定に当たり 労働基準法または労働組合法上の権利に基づく不就労を稼働率算定の基礎とすること は、公序 に反し無効である とするのが最高裁判所の判例である。 （平成元年12月14日最高裁判所第一小法廷日本シェー リング事件） 罰則はありませんが 、法律違反です 。民法709条 （不法行為による 損害賠償 ）の適用はありえます 。","s":"会社は、有給休暇を取った労働者に対して、賃金の減額などの不利益な取扱いをしてはいけません。","e":"「有休を取った月はボーナスの査定を下げる」「有休を多く取った人は昇給しない」というルールは、この条文の趣旨に反します。","p":"罰則はない。精皆勤手当や賞与の算定で有休取得日を欠勤扱いにすることが不利益取扱いに当たるかが論点。","f":"17_労働基準法17-年次有給休暇（指定権、変更権、計画的付与、使用者による指定、休暇中の賃金、雑則）","pg":40},{"r":"法56条","t":"最低年齢","b":"◯1 使用者 は、児童が満15歳 に達した日以後の 最初の3月31日 が終了 するまで、これを 使用して はならない 。 最低年齢の原則","s":"満15歳に達した日以後の最初の3月31日が終了するまで（＝中学校を卒業するまで）は、原則として働かせてはいけません。","e":"中学3年生は3月31日まで原則として働けません。4月1日から、つまり高校1年生の年齢から就労可能です。ただし、映画・演劇の子役や軽易な作業は例外で許可を得て可能です。","p":"「15歳に達した日以後の最初の3月31日が終了するまで」という表現が正確に出題される。例外（映画・演劇の子役等）の要件も重要。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":2},{"r":"法57条","t":"年少者の証明書","b":"◯1 使用者 は、 満18歳に満たない 者について、その 年齢を証明 する 戸籍証明書 を事業場 に備え付 けなければならない 。 ◯2 使用者 は、第56条第2項（最低年齢の例外）の規定によって使用する 児童については、 修学に差し支え ないことを証明 する 学校長の証明書 及び 親権者又は後見人の同意書 を事業場 に備え付けなければな らない 。 年少者の証明書","s":"18歳未満の者を雇う場合、年齢を証明する戸籍証明書を事業場に備え付ける義務があります。中学生を例外で使用する場合は、学校長の証明書と親の同意書も必要です。","e":"高校生のアルバイトを雇う場合、生年月日がわかる住民票記載事項証明書などを店に置いておく必要があります。","p":"18歳未満→「戸籍証明書」。児童を使用する場合→追加で「学校長の証明書」＋「親権者or後見人の同意書」。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":7},{"r":"法59条","t":"未成年者の賃金請求権","b":"未成年者 は、独立して 賃金を請求 することができる 。親権者 又は 後見人 は、 未成年 者の賃金を代わって 受け取ってはならない 。 未成年者の賃金請求権 労働契約を解除することができるのは 、「親権者 」、「 後見人 」、 「所轄労働基準監督署長 」であり 、「学校長 」では解除することはで きません 。","s":"未成年者は、自分の名前で独立して賃金を請求できます。親や後見人が代わりに受け取ることはできません。","e":"高校生バイトの給料を「親に渡しておいたよ」はダメ。本人に直接支払わなければなりません。","p":"「独立して賃金を請求できる」＝親権者の代理受領を禁止。「労働契約の代理締結の禁止」（法58条）とセットで出題。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":13},{"r":"法60条","t":"年少者への適用除外規定","b":"◯1 第32条の2から第32条の5まで（ 変形労働時間制 ）、第36条（ 36協定による時間外及び休日労 働）、第40条（ 労働時間及び休憩の特例 ）及び第41条の2（ 高度プロフェッショナル制度 ）の規 定は、 満18歳に満たない者 については、 これを適用しない 。 年少者には適用されない規定 次の規定は、 年少者 （満18歳に満たない者 ）には適用されない 。（法60条1項） 年少者には適用されない規定 1. 変形労働時間制 （法32条の2（1か月単位の変形労働時間制）、法32条の3（フレックスタイム制）、法3 2条の4（1年単位の変形労働時間制）、法32条の5（1週間単位の非定型的変形労働時間制）） 2. 36協定 による 時間外・休日労働 （法36条） 3. 法定労働時間の特例 （週44時間 の特例 ）（法40条） 4. 休憩の特例 （休憩付与の適用除外 、一斉付与の例外 、自由利用の例外 ）（法40条） 5. 高度プロフェッショナル制度 （法41条の2）","s":"18歳未満の者には、変形労働時間制・36協定による時間外休日労働・労働時間の特例・高度プロフェッショナル制度は適用されません。","e":"高校生のアルバイトには1日8時間・週40時間の法定労働時間が厳格に適用され、残業も原則させられません。変形労働時間制も使えません。","p":"年少者に適用されない制度の列挙が頻出。ただし、満15歳以上の年少者には修学時間を含む1日8時間・週40時間の範囲で変形的な配分が可能（法60条3項）。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":15},{"r":"法61条","t":"年少者・児童の深夜業の制限","b":"◯5 使用者 は、第56条第2項の規定によって使用する 児童を午後8時 から 午前5時 までの間におい て使用してはならない 。 ◯ 厚生労働大臣 は、必要であると認める場合 においては、前項の時刻を、 地域又は期間を限って 、 午後9時 及び 午前6時 とすることができる。 児童の深夜業に関する制限 使用者 は、児童について、 午後8時から午前5時 （厚生労働大臣が必要であると認める場合においては 、地域 または期間を限って 、午後9時から午前6時 ）までの間は 使用してはならない 。（法61条5項）","s":"中学生以下の児童は午後8時から午前5時まで働かせてはいけません。厚生労働大臣が必要と認めれば午後9時〜午前6時に変更できます。","e":"子役の撮影で中学生を午後9時以降に使うことはできません（厚生労働大臣の許可がある場合は午後9時まで可能）。","p":"年少者（18歳未満）の深夜業は原則禁止（午後10時〜午前5時）。児童はさらに制限（午後8時〜午前5時）。交替制の満16歳以上の男性は例外あり。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":41},{"r":"法63条","t":"年少者の坑内労働の禁止","b":"使用者 は、 満18歳 に満たない者 を坑内 で労働させてはならない 。 年少者の坑内労働の禁止 R05-03A 使用者 は、年少者 （満18歳に満たない者 ）を「 坑内」で労働させてはならない 。（法63条）","s":"18歳未満の者を坑内（鉱山のトンネル内など）で働かせてはいけません。","e":"鉱山やトンネル工事の現場で、18歳未満のアルバイトを坑内作業に従事させることは絶対にできません。","p":"年少者→坑内労働は「全面禁止」。女性の坑内労働の制限（法64条の2）との比較が出題される。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":43},{"r":"法62条","t":"年少者の危険有害業務の制限","b":"◯1 使用者 は、 満18歳 に満たない者 に、 運転中の機械 若しくは 動力伝導装置 の危険な部分 の 掃除、注油、検査若しくは 修繕をさせ、 運転中の機械 若しくは 動力伝導装置 にベルト若しくはロー プの取付け 若しくは 取りはずし をさせ、 動力による クレーンの運転 をさせ、その他厚生労働省令で定める 危険な業務 に就かせ、又は厚生労働省令で定める 重量物を取り扱う業務 に就かせてはならない 。 ◯2 使用者 は、 満18歳 に満たない者 を、毒劇薬 、毒劇物 その他 有害な原料若しくは 材料又は 爆発 性、発火性 若しくは 引火性 の原料若しくは 材料を取り扱う業務、著しく じんあい 若しくは 粉 末を飛散し、若しくは 有害ガス 若しくは 有害放射線 を発散する場所又は 高温若しくは 高圧の場所に おける業務その他 安全 、衛生 又は 福祉 に有害な場所 における業務に 就かせてはならない 。 年少者の危険有害業務の就業制限","s":"18歳未満の者を、危険な機械の操作・重量物の取扱い・有害物質を扱う業務などの危険有害業務に就かせてはいけません。","e":"高校生のアルバイトにクレーンの運転をさせたり、有害な化学物質を扱わせたりすることはできません。","p":"危険業務（1項）と有害業務（2項）の両方が制限。妊産婦等の危険有害業務制限（法64条の3）との違いに注意。","f":"18_労働基準法18-年少者（労働契約、労働条件、就業制限）","pg":43},{"r":"法64条の2","t":"女性の坑内業務の制限","b":"使用者 は、次の各号に掲げる 女性を当該各号に定める業務に 就かせてはならない 。 1. 妊娠中の女性 及び 坑内で行われる業務 に従事しない旨を 使用者 に申し出た 産後1年を経過し ない女性 …坑内で行われる すべての業務 2. 前号に掲げる女性以外の 満18歳以上の女性 …坑内で行われる業務のうち 人力 により行われる 掘削の業務 その他の女性に 有害な業務 として厚生労働省令で定めるもの 用語の定義","s":"妊娠中の女性と申し出た産後1年以内の女性は坑内のすべての業務が禁止。それ以外の女性（18歳以上）は、人力による掘削など特に有害な業務のみ禁止です。","e":"妊娠中の女性はトンネル内のすべての作業が禁止ですが、妊娠していない女性はトンネル内でも事務作業ならOK。ただし手掘り作業などは禁止です。","p":"3段階の制限：①妊婦＋申出た産後1年→すべての坑内業務禁止、②それ以外の18歳以上女性→人力掘削等のみ禁止、③年少者（法63条）→全面禁止。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":2},{"r":"法64条の3","t":"妊産婦等の危険有害業務の制限","b":"◯1 使用者 は、 妊娠中の女性 及び 産後1年を経過しない女性 （以下「 妊産婦 」という。）を、 重量物 を取り扱う業務、 有害ガス を発散する場所における業務その他 妊産婦 の妊娠 、出 産、哺育 等に 有害な業務 に就かせてはならない 。 ◯2 使用者 は、 妊産婦以外の女性 を、前項に規定する業務のうち 女性の妊娠又は出産に係る機能に有 害である業務 として厚生労働省令で定める業務に 就かせてはならない 。 危険有害業務の就業制限 使用者 は、妊娠中の女性及び産後1年を経過しない女性 （妊産婦 ）を、 重量物 を取り扱う業務、 有害ガス を発 散する場所における業務その他 妊産婦の妊娠 、出産、哺育などに有害な業務 に就かせてはならない 。（法64条 の3第1項） 女性労働者に対する就業制限 をまとめると、次の通りである。 坑内で行われるすべての業務が禁止されるのは 、「妊娠中の女性 」 と「坑内で行われる業務に従事しない旨を使用者に申し出た産後1年 を経過しない女性 」です。「坑内で行われる業務に従事しない旨を使 用者に申し出た女性」 ではありません 。 女性 危険有害業務の就業制限 妊娠中の女性 （妊婦） （女性則2条1項） R02-03C 女性則2条1項に規定するボイラーの取扱いの業務など 2 4業務 の就業制限 産後1年を経過しない女性 （産婦） （女性則2条2項） R02-03B 24業務 のうち、① 重量物を取り扱う業務 、②一定の有 害物を発散させる場所における一定の業務 、③さく岩機、鋲打機等 身体に著しい振動を与える機械器具を用いて行う業務 （3業務 ）の 就業制限 R02-03E ボイラーの取扱いの業務、ボイラーの溶接の業務、つり 上げ荷重が5トン以上のクレーン若しくはデリックの運転の業務な ど19業務 については、使用者にその 業務に従事しない旨を申し出 たときは 就業制限 妊産婦以外の女性 （女性則3条） R02-03A 24業務 のうち、女性の妊娠または出産に係る機能に有 害である業務として厚生労働省令で定めるもの（① 重量物を取り扱 う業務 、②一定の有害物を発散させる場所における一定の業務 の2 業務）の就業制限","s":"妊産婦は重量物の取扱い・有害ガスを発散する場所での業務など妊娠出産に有害な業務に就けません。妊産婦以外の女性も、妊娠機能に有害な業務は制限されます。","e":"妊娠中の女性に重い荷物を運ばせたり、有害な薬品を扱う部署で働かせたりすることはできません。","p":"「妊産婦」と「妊産婦以外の女性」で制限範囲が異なる。「妊産婦」＝妊娠中＋産後1年以内の定義も重要。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":5},{"r":"法65条","t":"軽易な業務への転換","b":"◯3 使用者 は、 妊娠中の女性 が請求した場合においては、 他の軽易な業務 に転換させなければなら ない。 他の軽易な業務への転換 使用者 は、「 妊娠中の 女性」が「 請求」した場合 においては、 他の軽易な業務 に「転換」させなければなら ない。（法65条3項） 「さく岩機 、鋲打機など 身体に著しい振動を与える機械器具を用い て行う業務 」は、「妊婦及び産婦に対する就業制限 」であり、「すべ ての女性に対する就業制限 」ではありません 。 妊婦と産婦との大きな違いは 、「従事しない旨申し出ない場合には 就業可能 」な19業務 の存在です 。 この19業務 について細かく出題されたのは 、令和2年 、平成23年 及び昭和61年です 。「ボイラー （の取扱業務 、溶接業務 ）」、「 動 力により駆動される土木建築用機械の運転の業務 」を例に挙げた出題 でした 。","s":"妊娠中の女性が請求した場合、会社はその人を他の軽い仕事に移さなければなりません。","e":"倉庫で重い荷物を運ぶ仕事をしていた妊婦が「もっと軽い仕事にしてほしい」と請求したら、事務作業などに配置転換しなければなりません。","p":"請求権は「妊娠中の女性」のみ（産後の女性は含まない）。「他の軽易な業務」がない場合に新たに業務を創設する義務はない。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":9},{"r":"法66条","t":"妊産婦の労働時間の制限","b":"◯1 使用者 は、 妊産婦 が請求した 場合においては、 1箇月単位 の変形労働時間制 、1年単位 の 変形労働時間制 及び 1週間単位 の非定型的変形労働時間制 の規定にかかわらず、 1週間 について 法定労 働時間 、1日について 8時間 を超えて労働させてはならない 。 ◯2 使用者 は、 妊産婦 が請求した 場合においては、第33条第1項及び第3項並びに第36条第1項の規定 にかかわらず、 時間外労働 をさせてはならず 、又は 休日 に労働させてはならない 。 変形労働時間制の制限 妊産婦が請求した場合 は、1か月単位の変形労働時間制 、1年単位の変形労働時間制 、1週間単位の非定型的 変形労働時間制 の規定にかかわらず、「 法定労働時間 」を超えて労働 させてはならない 。（法66条1項）","s":"妊産婦が請求した場合、①変形労働時間制でも1日8時間・週40時間を超えて働かせてはいけません。②時間外労働・休日労働もさせてはいけません。③深夜業もさせてはいけません。","e":"変形労働時間制の職場で1日10時間のシフトが組まれていても、妊婦が請求すれば8時間までに制限されます。残業や夜勤も請求があればさせられません。","p":"すべて「請求した場合」が条件。請求がなければ適用されない。変形制の制限（1項）・時間外休日労働の禁止（2項）・深夜業の禁止（3項）の3つ。フレックスタイム制は制限対象外。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":20},{"r":"法67条","t":"育児時間","b":"◯1 生後 満1年に達しない 生児 を育てる 女性 は、第34条の 休憩時間 のほか、 1日 2回各々 少なくとも 30分 、その 生児を育てるための時間 を請求することができる 。 ◯2 使用者 は、前項の 育児時間中 は、その 女性 を使用してはならない 。 育児時間","s":"生後1年未満の赤ちゃんを育てている女性は、通常の休憩時間のほかに、1日2回各30分以上の育児時間を請求できます。","e":"生後6か月の赤ちゃんを育てている母親は、昼休みとは別に、午前と午後に各30分の育児時間をもらえます。授乳などに使えます。","p":"「女性」のみの権利（男性は対象外）。「1日2回」「各々少なくとも30分」。1日の労働時間が4時間以内の場合は1回でよい。有給・無給は法律に規定なし。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":25},{"r":"法68条","t":"生理休暇","b":"使用者 は、 生理日 の就業が著しく困難 な女性が休暇を請求したときは、その者を 生理日 に就 業させてはならない 。 生理休暇 育児時間 は、授乳に要する時間を通常の休憩時間とは別に確保する ことのために設けられたものであるのに対し 、子の養育に手がかかる 時期における所定労働時間を短縮することにより 労働者が就業しつつ 子を養育することを容易にする ための育児 ・介護休業法に規定する 所 定労働時間の短縮措置 は、その趣旨及び目的が異なります 。（平成2 7年3月31日雇児発0331第27号）","s":"生理日の就業が著しく困難な女性が休暇を請求したら、その日は働かせてはいけません。","e":"生理痛がひどくて仕事ができない女性が「今日は休ませてください」と言ったら、会社は拒否できません。日数の制限はなく、半日や時間単位の請求も可能です。","p":"「著しく困難な」が要件。日数制限なし。有給・無給は法律に規定なし。医師の診断書は不要（本人の申出でOK）。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":27},{"r":"法69条","t":"徒弟の弊害排除","b":"◯1 使用者 は、徒弟、見習、養成工 その他 名称のいかんを問わず 、技能の習得 を目的とする者 であるこ とを理由として、 労働者を酷使 してはならない 。 ◯2 使用者 は、 技能の習得 を目的とする 労働者 を家事 その他 技能の習得に関係のない作業 に 従事させてはならない 。 徒弟の弊害排除 使用者 は、徒弟、見習、養成工 その他名称のいかんを問わず、 技能の習得を目的とする者 であることを 理由 として、 労働者を酷使してはならない 。（法69条1項） 使用者 は、技能の習得を目的とする労働者を家事その他 技能の習得に関係のない作業 に従事させてはならな い。（法69条2項）","s":"「修行中だから」「見習いだから」という名目で、労働者を酷使したり、技能習得と無関係な雑用をさせたりしてはいけません。","e":"「料理の修行中」という名目で、皿洗いやゴミ出しだけを何年もやらせて料理を全く教えないのは違法です。","p":"「名称のいかんを問わず」。罰則の適用はない（法69条には罰則規定がない）。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":30},{"r":"法70条","t":"職業訓練の特例","b":"職業能力開発促進法第24条第1項の 都道府県知事の認定 を受けて行う 職業訓練 を受ける 労働者 につい て必要がある場合においては、その必要の限度で、以下の規定について、厚生労働省令で 別段の定め をするこ とができる。ただし、第63条の 年少者の坑内労働の禁止 に関する規定については、 満16歳 に満たな い者に関しては、この限りでない。 1. 第14条第1項の 契約期間 2. 第62条の 年少者の 危険有害業務の就業制限 3. 第64条の3の妊産婦等の危険有害業務の就業制限（別段の定めなし） 4. 第63条の 年少者の坑内労働の禁止 5. 第64条の2の妊産婦等の坑内業務の就業制限（別段の定めなし） 法71条、則34条の4 第70条の規定に基づいて発する厚生労働省令は、当該厚生労働省令によって 労働者を使用する ことについ て行政官庁 （所轄都道府県労働局長 ）の許可 を受けた使用者 に使用される労働者以外の労働者につ いては、 適用しない 。 認定職業訓練生の特例 職業能力開発促進法の規定による「 都道府県知事 」の認定を受け て行う職業訓練 を受ける 労働者 について は、次の「 認定職業訓練生の特例 」が適用 される。（法70条） 認定職業訓練生の特例 内容 契約期間 （則34条の2の5） 認定職業訓練生に限り、労働契約の期間を、通常の契約期間上限の 適用を受けず、訓練課程に応じた期間で定めることができる。 危険有害業務の就業制限 （則34条の3） 認定職業訓練生に限り、年少則で禁止されている危険有害業務のう ち、訓練上必要な一部の業務に就かせることができる。 年少者の坑内労働の禁止 （則34条の3） 認定職業訓練生に限り、 満16歳以上の男性 である訓練生であれば坑 内労働に就かせることができる（満16歳未満の者（男女問わず）は全 面禁止）。 ただし、当該 労働者を使用 することについて、 使用者 は「所轄都道府県労働局長 」の許可 を受けなければな らない。（法71条、則34条の4）","s":"都道府県知事の認定を受けた職業訓練を受ける労働者については、契約期間や年少者の就業制限などについて、厚生労働省令で別のルールを定めることができます。","e":"認定職業訓練を受けている16歳の訓練生に対して、通常は禁止される一部の危険業務の就業が特例的に認められる場合があります。","p":"特例が認められる規定（契約期間、年少者の危険有害業務、坑内労働禁止等）の列挙。坑内労働は「満16歳に満たない者」については特例なし。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":31},{"r":"法72条","t":"未成年訓練生の年次有給休暇","b":"第70条の規定に基づく 職業訓練に関する特例 の許可を受ける 未成年者 に対して 付与される 年次有給休 暇の日数は、雇入れの日から起算して6箇月間継続勤務し全労働日の8割以上出勤した場合に 12労働日 と する。 未成年訓練生の年次有給休暇 未成年訓練生の年次有給休暇付与日数 は、次の通りである。（法72条） 勤続年数 0.5年 1.5年 2.5年 3.5年 4.5年 5.5年以上 付与日数 12日 13日 14日 16日 18日 20日 年少者の坑内労働は禁止されていますが 、「満16歳以上の男性 」 である訓練生の場合には特例的にその就業が許可されます 。「満15 歳に達した日以後の最初の3月31日が終了した男性労働者 」ではあり ません 。","s":"認定職業訓練を受ける未成年者の年次有給休暇は、最初の付与日数が通常の10日ではなく12日になります。","e":"認定職業訓練中の17歳の訓練生は、6か月勤務後に12日の有休がもらえます（通常の労働者は10日）。","p":"初年度「12日」（通常は10日）。2年目以降の加算は通常通り。","f":"19_労働基準法19-妊産婦等、技能習得者（妊産婦等の就業制限、妊産婦等の労働条件、技能習得者）","pg":34},{"r":"法90条","t":"就業規則の意見聴取","b":"◯1 使用者 は、就業規則の 作成 又は 変更 について、当該事業場に、 労働者の過半数で組織する労働 組合がある 場合においてはその 労働組合 、労働者の過半数で組織する労働組合がない 場合においては 労働者の過半数を代表する者 の意見 を聴かなければならない 。 ◯2 使用者 は、第89条の規定により就業規則の届出をなすについて、前項の 意見 を記した 書面を添 付しなければならない 。 意見の聴取 常時10人以上の労働者を使用する使用者 は、就業規則の作成 については、当該事業場に、過半数労働組合が ある場合には当該 労働組合 （過半数労働組合がない場合においては 過半数代表者 ）の「 意見」を聴かなければ ならない が、同意を得る必要はない 。（法90条1項） 使用者 は、就業規則の一部のみを 変更する場合 においても、 過半数 労働組合または過半数代表者の意見を聴 かなければならず 、所轄労働基準監督署長に届け出なければならない 。（法90条1項） 「意見」を聴けばよく 、「同意」は要求されていません 。就業規則 に添付した意見書の内容が当該規則に 全面的に反対するもの である と、特定部分に関して反対するもの であるとを問わず 、またその 反対 事由のいかんを問わず 、その効力の発生についての他の要件を具備す る限り 、就業規則の効力には影響がありません 。（昭和24年3月28日 基発373号） 就業規則の 「一部の変更 」のときであっても 、意見を聴く必要があ ります 。","s":"就業規則の作成・変更には、過半数労働組合（なければ過半数代表者）の意見を聴かなければなりません。届出時にはその意見書を添付します。","e":"新しい就業規則を労基署に届け出るとき、「従業員の過半数を代表する○○さんの意見：特に反対なし」という書面を添付する必要があります。","p":"「意見を聴く」だけでよく、「同意」は不要。反対意見であっても就業規則は有効。意見書の「添付」も義務。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":16},{"r":"法91条","t":"減給の制裁の制限","b":"就業規則 で、労働者 に対して 減給の制裁 を定める場合においては、その 減給は、1回の額 が平均賃金 の 1日分の 半額 を超え、 総額が一賃金支払期における 賃金の総額 の10分の1 を超えてはならない 。 減給の制裁の制限 制裁のなかでも 減給の制裁 については、それが労働の結果いったん発生した賃金債権を減額するものである ことから、その額があまりに多額であると 労働者の生活を脅かすおそれ がある。法91条は、この従来の解釈例 規の考え方を踏襲し、 減給の最高限度を定めたもの である。（コンメンタール91条） 制限の上限 事案1回の上限 …1回の額 が平均賃金の1日分の半額 を超えてはならない 。（法91条）","s":"就業規則で減給の制裁（ペナルティ）を定める場合、1回の違反につき平均賃金1日分の半額まで、1賃金支払期で賃金総額の10分の1までが上限です。","e":"遅刻に対する減給で、1回あたり引ける金額は平均賃金1日分の半額まで（例：平均賃金1万円なら5千円まで）。月に何度遅刻しても、その月の給料から引ける合計は給料の10%までです。","p":"「1回の額→平均賃金1日分の半額」「総額→一賃金支払期の賃金総額の10分の1」の2段階制限。両方超えてはならない。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":23},{"r":"法93条","t":"就業規則と労働契約の関係","b":"労働契約 と就業規則 との関係については、 労働契約法 第12条 の定めるところによる。 労働契約法12条 ◯ 就業規則 で定める基準に 達しない 労働条件 を定める 労働契約 は、その部分については、 無効 とする。この場合において、 無効 となった部分は、 就業規則 で定める基準 による。 就業規則と労働契約との関係","s":"労働契約で定めた労働条件が就業規則の基準を下回る場合、その部分は無効になり、就業規則の基準が適用されます。","e":"就業規則で「残業手当は30%増し」と定めているのに、個別の労働契約で「25%増し」としても、25%の部分は無効になり自動的に30%になります。","p":"「就業規則＞労働契約」の関係。労働契約法12条で規定。就業規則を上回る労働契約は有効。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":34},{"r":"法94条","t":"寄宿舎生活の自治","b":"◯1 使用者 は、 事業の附属寄宿舎に寄宿する 労働者 の私生活の自由 を侵してはならない 。 ◯2 使用者 は、寮長、室長その他 寄宿舎生活の自治 に必要な 役員の選任 に干渉 してはならな い。 私生活の自由 使用者 は、事業の附属寄宿舎に寄宿する労働者 の私生活の自由 を侵してはならない。（法94条1項） 「私生活の自由を侵す行為 」とは次の通りである。（事業附属寄宿舎規程4条）","s":"会社の寄宿舎に住む労働者の私生活の自由を侵してはいけません。寮長の選任など自治に関することに干渉してもいけません。","e":"「寮では外出禁止」「面会禁止」「スマホ禁止」のようなルールを会社が一方的に押し付けるのは違法です。寮のルールは寮生の自治で決めるべきです。","p":"法94条1項（私生活の自由）には罰則がない。2項（役員選任への不干渉）にも罰則なし。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":36},{"r":"法96条","t":"寄宿舎の設備と安全衛生","b":"◯1 使用者 は、事業の附属寄宿舎について、 換気 、採光 、照明 、保温、防湿、清潔、避難、 定員の収容 、就寝に必要な措置 その他労働者の 健康、風紀及び生命の保持 に必要な措置を講じなければ ならない 。 ◯2 使用者 が前項の規定によって講ずべき措置の 基準 は、厚生労働省令（ 事業附属寄宿舎規程及び建設 業附属寄宿舎規程 ）で定める。 寄宿舎の設備及び安全衛生","s":"会社は寄宿舎について、換気・採光・照明・保温・避難などの衛生と安全に必要な措置をとらなければなりません。","e":"会社の寮に窓がない、避難経路がない、エアコンもなく極端に暑い・寒い、といった状態は違反です。","p":"具体的基準は「厚生労働省令（事業附属寄宿舎規程・建設業附属寄宿舎規程）」で定める。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":41},{"r":"法96条の3","t":"寄宿舎の使用停止命令","b":"◯1 労働者 を就業させる事業の 附属寄宿舎 が、 安全及び衛生 に関し定められた 基準に反する 場合におい ては、 行政官庁 （所轄労働基準監督署長 ）は、 使用者 に対して、その 全部又は一部 の使用の停止 、 変更 その他必要な事項を 命ずる ことができる。 ◯2 前項の場合において 行政官庁 （所轄労働基準監督署長 ）は、 使用者 に命じた事項について必要な事 項を労働者 に命ずる ことができる。 附属寄宿舎の設置、移転などの計画の届出","s":"寄宿舎が安全・衛生の基準に違反している場合、労働基準監督署長は使用停止や変更を命令できます。","e":"寮の避難設備が基準を満たしていない場合、監督署長は「その寮の使用をやめなさい」と命令できます。","p":"命令権者は「所轄労働基準監督署長」。使用者だけでなく労働者にも命令できる。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":43},{"r":"法75条","t":"療養補償","b":"◯1 労働者が 業務上 負傷し、又は 疾病にかかった場合においては、 使用者 は、その費用で必要な 療 養を行い 、又は必要な 療養の費用 を負担しなければならない 。 ◯2 前項に規定する 業務上の疾病及び療養の範囲 は、厚生労働省令 で定める。 療養補償 労働者 が業務上 負傷し 、または 疾病にかかった 場合においては、 使用者 は、その費用で必要な 療養を行い 、 または 必要な療養の費用を負担 しなければならない。（法75条1項） 業務上の疾病及び療養の範囲 は、厚生労働省令 で定められる。（法75条2項） 労働者が就業中または事業場若しくは事業の附属建設物内で負傷し、疾病にかかりまたは死亡した 場合に は、使用者 は、遅滞なく 医師に診断 させなければならない。（則37条）","s":"労働者が仕事中にケガや病気になった場合、会社はその費用で治療を受けさせるか、治療費を負担しなければなりません。","e":"工場で作業中に指を切った場合、病院での治療費は全額会社負担です。","p":"「業務上」の傷病が要件。通勤災害は含まれない（労災保険法で対応）。「その費用で」＝全額使用者負担。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":46},{"r":"法76条","t":"休業補償","b":"◯1 労働者 が第75条の規定による 療養のため、 労働することができない ために 賃金を受けない 場 合においては、 使用者 は、労働者の 療養中 平均賃金 の100分の60 の休業補償 を行わなければならな い。 休業補償 労働者 が法75条の規定による 療養のため 、労働することができないために賃金を受けない 場合においては、 使用者 は、労働者の療養中 平均賃金 の100分の60 の「休業補償 」を行わなければならない。（法76条1項）","s":"業務上の傷病で働けず賃金をもらえない場合、会社は療養中、平均賃金の60%の休業補償を払わなければなりません。","e":"仕事中の事故で1か月入院して働けない場合、平均賃金の60%が会社から支払われます。","p":"「100分の60」。労災保険の休業補償給付（60%）＋休業特別支給金（20%）で合計80%との比較が出る。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":48},{"r":"法77条","t":"障害補償","b":"労働者 が業務上 負傷し、又は 疾病にかかり、 治った 場合において、その 身体に障害 が存する ときは、 使用者 は、その 障害の程度 に応じて、 平均賃金 に別表第2に定める日数を乗じて得た金額の 障害 補償を行わなければならない。 障害補償 労働者 が業務上負傷し 、または疾病にかかり 、治った 場合において、その身体に 障害が存するとき は、使用 者は、その障害の程度に応じて、 平均賃金 に別表第2（ 第1級1,340日分〜第14級50日分 ）に定める日数を乗 じて得た金額の「 障害補償 」を行わなければならない。（法77条、別表第2）","s":"業務上の傷病が治った後に身体に障害が残った場合、障害の程度に応じて、平均賃金の所定日数分の補償を一時金で支払います。","e":"工場での事故で指を1本失った場合、障害等級に応じた日数分（例：第12級なら156日分）の平均賃金が補償されます。","p":"「治った場合」（症状固定）に支給。障害等級は第1級（1,340日分）〜第14級（50日分）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":49},{"r":"法79条","t":"遺族補償","b":"労働者 が業務上 死亡した場合においては、 使用者 は、遺族に対して、 平均賃金 の1,000日分 の遺族補償 を行わなければならない。 遺族補償 労働者 が業務上 死亡した場合においては、 使用者 は、遺族に対して、 平均賃金 の1,000日分 の「遺族補償 」 を行わなければならない。（法79条） この「補償義務の免除 」規定は 、休業補償 と障害補償 に限られてい ます。","s":"労働者が業務上の原因で死亡した場合、会社は遺族に平均賃金の1,000日分の遺族補償を支払わなければなりません。","e":"建設現場の事故で労働者が亡くなった場合、遺族に平均賃金の1,000日分（約2年9か月分）が支払われます。","p":"「1,000日分」。打切補償（1,200日分）より少ない点に注意。「補償義務の免除」は休業補償と障害補償に限られ、遺族補償は対象外。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":50},{"r":"法80条","t":"葬祭料","b":"労働者 が業務上 死亡した場合においては、 使用者 は、 葬祭を行う者 に対して、 平均賃金 の 60日分 の葬祭料 を支払わなければならない。 葬祭料 労働者 が業務上死亡 した場合においては、 使用者 は、葬祭を行う者 に対して、 平均賃金 の60日分 の「葬祭 料」を支払わなければならない。（法80条）","s":"労働者が業務上死亡した場合、葬儀を行う人に平均賃金の60日分の葬祭料を支払います。","e":"業務上の事故で亡くなった労働者の葬儀を行う遺族に、平均賃金の60日分が支払われます。","p":"「60日分」。支払先は「葬祭を行う者」（遺族とは限らない）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":51},{"r":"法81条","t":"打切補償","b":"第75条（ 療養補償 ）の規定によって 補償を受ける 労働者 が、 療養開始後3年 を経過しても 負傷又は疾 病がなおらない 場合においては、 使用者 は、 平均賃金 の1,200日分 の打切補償 を行い、その後 は労働基準法の規定による 補償を行わなくてもよい 。 打切補償 法75条（ 療養補償 ）の規定によって 補償を受ける労働者 が、療養開始後3年を経過しても負傷または疾病が なおらない 場合においては、 使用者 は、平均賃金 の1,200日分の打切補償 を行い、その後は労働基準法の規定 による 補償を行わなくてもよい 。（法81条）","s":"療養補償を受けている労働者が、療養開始後3年経っても治らない場合、会社は平均賃金の1,200日分を払うことで、それ以降の補償義務を免れることができます。","e":"3年間治療を続けても完治しない場合、会社は1,200日分の平均賃金を一括で支払い、それ以降は補償義務がなくなります。これにより解雇制限も解除されます。","p":"「3年経過」「1,200日分」。打切補償を行えば法19条の解雇制限も解除される。労災保険の傷病補償年金の受給を開始した場合は打切補償を支払ったものとみなされる。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":51},{"r":"法82条","t":"分割補償","b":"使用者 は、 支払能力 のあることを 証明し、補償を受けるべき者 の同意を得た 場合においては、第7 7条（障害補償）又は第79条（遺族補償）の規定による補償に替え、平均賃金に別表第3に定める日数を乗じ て得た金額を、 6年 にわたり 毎年補償する ことができる。 分割補償 使用者 は、支払能力 のあることを 証明し、補償を受けるべき者 の同意を得た 場合においては、法77条（障害 補償）または法79条（遺族補償）の規定による補償に替え、平均賃金に別表第3に定める日数を乗じて得た金 額を、 6年にわたり 毎年補償 することができる。（法82条）","s":"会社に支払能力があることを証明し、補償を受ける人の同意を得れば、障害補償や遺族補償を6年間の分割で支払うことができます。","e":"障害補償として1,000万円の支払義務がある場合、支払能力の証明＋本人の同意があれば、6年間の分割払いにすることが可能です。","p":"対象は「障害補償」と「遺族補償」のみ。「支払能力の証明」＋「本人の同意」の2要件。「6年にわたり毎年」。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":52},{"r":"法83条","t":"補償を受ける権利","b":"◯1 補償を受ける権利 は、労働者の 退職 によって 変更されることはない 。 ◯2 補償を受ける権利 は、これを 譲渡 し、又は 差し押えて はならない。 補償を受ける権利 補償を受ける権利 は、労働者の 「退職」によって 変更されることはない 。（法83条1項） 補償を受ける権利 は、これを 譲渡し 、または差し押えてはならない 。（法83条2項）","s":"補償を受ける権利は、退職しても変わりません。また、この権利は譲渡も差押えもできません。","e":"業務上の事故で補償を受ける権利がある労働者が退職しても、会社は引き続き補償する義務があります。その権利を他人に売ったり、借金の返済のために差し押さえたりすることもできません。","p":"「退職によって変更されない」「譲渡・差押え禁止」の2つ。労災保険の保険給付を受ける権利にも同様の規定あり。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":53},{"r":"法84条","t":"他の法律との関係","b":"◯1 労働基準法に規定する 災害補償 の事由について、 労働者災害補償保険法 又は厚生労働省令で指定す る法令に基づいて 労働基準法 の災害補償 に相当する給付が行なわれるべきものである場合においては、 使用者 は、 補償の責 を免れる 。 ◯2 使用者 は、 労働基準法 による補償を行った 場合においては、 同一の事由 については、その 価額 の限度 において 民法による損害賠償 の責を免れる 。 他の法律との関係 労働者が業務上負傷し、または疾病にかかったときは、その後、当 該事業場の 労働者たる地位を保有しなくなった場合 においても 災害補 償を請求する権利が認められています 。（コンメンタール83条）","s":"労災保険など他の法律で同じ補償が行われる場合、会社は補償義務を免れます。また、労基法の補償を行った分だけ、民法の損害賠償責任も免れます。","e":"労災保険から休業補償給付が支払われた場合、会社は別途法76条の休業補償を支払う必要はありません。","p":"「労災保険法に基づく給付が行われるべき場合→使用者は補償を免れる」。「民法の損害賠償→補償の価額の限度で免責」。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":53},{"r":"法97条","t":"監督機関の組織","b":"◯1 労働基準主管局 （厚生労働省の内部部局として置かれる局で労働条件及び労働者の保護に関する事 務を所掌するものをいう。以下同じ。）、 都道府県労働局 及び 労働基準監督署 に労働基準監督 官を置くほか、厚生労働省令で定める必要な職員を置くことができる。 ◯2 労働基準主管局の局長（以下「 労働基準主管局長 」という。）、 都道府県労働局長 及び 労働基準 監督署長 は、 労働基準監督官 をもってこれに充てる。 監督機関の職員など","s":"労働基準監督の仕事は、厚生労働省の労働基準主管局、都道府県労働局、労働基準監督署の3層構造で行います。局長と署長は労働基準監督官が務めます。","e":"全国に321か所ある労働基準監督署の署長は、すべて労働基準監督官（資格保有者）です。","p":"「労働基準主管局長」「都道府県労働局長」「労働基準監督署長」は労働基準監督官をもって充てる。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":56},{"r":"法101条","t":"労働基準監督官の臨検権限","b":"◯1 労働基準監督官 は、事業場 、寄宿舎 その他の 附属建設物 に臨検 し、帳簿及び書類 の提出 を求 め、又は 使用者若しくは労働者 に対して 尋問 を行うことができる。 ◯2 前項の場合において、 労働基準監督官 は、その身分を証明する 証票を 携帯しなければならない。","s":"労働基準監督官は、事業場や寄宿舎に立ち入り検査（臨検）し、帳簿書類の提出を求め、関係者に質問することができます。その際は身分証を携帯します。","e":"労働基準監督官が予告なく会社に来て、タイムカードや賃金台帳を見せるよう求めたり、社長や従業員に質問したりできます。","p":"権限は「臨検」「帳簿書類の提出を求める」「尋問」の3つ。「証票の携帯」義務あり。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":58},{"r":"法102条","t":"労働基準監督官の司法警察権","b":"労働基準監督官 は、労働基準法違反の罪 について、刑事訴訟法に規定する 司法警察官 の職務を行う 。","s":"労働基準監督官は、労働基準法違反の罪について、警察官と同じように犯罪捜査を行う権限を持っています。","e":"賃金未払いなどの労基法違反を発見した場合、監督官は自ら証拠を集めて送検することができます。わざわざ警察に通報する必要はありません。","p":"「司法警察官の職務を行う」＝逮捕・捜索・差押えなどの権限。労基法違反の罪に限定。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":58},{"r":"法103条","t":"監督官の即時権限","b":"労働者を就業させる事業の 附属寄宿舎 が、 安全及び衛生 に関して定められた 基準 に反し、かつ 労 働者に急迫した危険 がある場合においては、 労働基準監督官 は、第96条の3の規定による 行政官庁の権 限を即時に行う ことができる。","s":"寄宿舎が安全衛生基準に違反し、労働者に差し迫った危険がある場合、監督官は行政官庁の権限を即座に行使できます。","e":"寮で火災の危険が切迫している場合、監督官は署長の判断を待たずに、その場で使用停止命令を出せます。","p":"「急迫した危険」がある場合の「即時」の権限行使。通常は署長が命令するが、緊急時は監督官が直接行う。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":58},{"r":"法104条の2","t":"報告・出頭命令","b":"◯1 行政官庁 は、労働基準法を施行するため 必要があると認める ときは、 使用者又は労働者 に対し、必要な 事項を 報告 させ、又は 出頭 を命ずる ことができる。 ◯2 労働基準監督官 は、労働基準法を施行するため 必要があると認める ときは、 使用者又は労働者 に対 し、必要な事項を 報告 させ、又は 出頭 を命ずる ことができる。 労働基準監督官の権限など 労働基準監督官 は、事業場 、寄宿舎その他の附属建設物に 臨検し、帳簿及び書類 の提出を求め、または 使用 者若しくは労働者 に対して 尋問を行うことができる。（法101条1項） 労働基準監督官 は、その身分を証明する 証票を携帯 しなければならない。（法101条2項） R02-02C 労働基準監督官 は、労働基準法違反の罪について、刑事訴訟法に規定する 司法警察官 の職務を行 う。（法102条）","s":"行政官庁や労働基準監督官は、法律の施行に必要な場合、使用者や労働者に対して報告や出頭を命じることができます。","e":"労基署が「残業時間の実態について報告書を出してください」と会社に求めたり、「○月○日に監督署に来てください」と呼び出したりできます。","p":"「行政官庁」（法104条の2第1項）と「労働基準監督官」（同条2項）の両方に権限がある。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":58},{"r":"法104条","t":"監督機関への申告","b":"◯1 事業場 に、労働基準法 又は労働基準法に基いて発する命令 に違反する事実 がある場合においては、 労働者 は、その 事実を行政官庁 又は 労働基準監督官 に申告 することができる。 ◯2 使用者 は、前項の 申告 をしたことを理由 として、 労働者 に対して 解雇 その他 不利益な取 扱をしてはならない。 監督機関に対する申告","s":"労基法違反がある場合、労働者は行政官庁や監督官に申告できます。会社は申告を理由に不利益な取扱いをしてはいけません。","e":"「うちの会社は残業代を払っていない」と労基署に通報した従業員を、会社が報復として解雇することは違法です。","p":"申告権は「労働者」のみ（使用者にはない）。「不利益取扱いの禁止」には罰則あり（法119条1号）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":62},{"r":"法106条","t":"法令等の周知義務","b":"◯1 使用者 は、労働基準法 及び労働基準法に基づく命令 の要旨 、就業規則 、労働基準法に基づく 労使協定 並びに第38条の4第1項及び第5項（第41条の2第3項において準用する場合を含む。）並びに第 41条の2第1項（企画業務型裁量労働制及び高度プロフェッショナル制度）に規定する 労使委員会の決議 を、常時各作業場の見やすい場所 へ掲示 し、又は 備え付ける こと、 書面を交付する ことその他 の厚生労働省令で定める方法によって、 労働者に周知 させなければならない 。 法令などの周知義務","s":"会社は、労働基準法の要旨・就業規則・労使協定・労使委員会の決議を、見やすい場所に掲示するなどして労働者に知らせなければなりません。","e":"就業規則を社長室の金庫にしまっておくのはダメ。休憩室の壁に貼ったり、イントラネットで見られるようにしたりする必要があります。","p":"周知方法は「掲示」「備え付け」「書面交付」「電磁的方法」の4つ。周知義務の対象は法令の「要旨」（全文ではない）と就業規則（全文）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":63},{"r":"法107条","t":"労働者名簿","b":"◯1 使用者 は、各事業場ごと に労働者名簿 を、各労働者 （日日雇い入れられる者 を除く。）につい て調製し、労働者 の氏名、生年月日 、履歴 その他厚生労働省令で定める事項を 記入しなければならな い。 ◯2 前項の規定により 記入すべき事項 に変更 があった場合においては、 遅滞なく 訂正しなければな らない 。 労働者名簿の調製","s":"使用者は事業場ごとに、日雇い労働者を除くすべての労働者について、氏名・生年月日・履歴などを記載した労働者名簿を作成し、記載事項に変更があれば遅滞なく訂正しなければなりません。","e":"すべての従業員（日雇い除く）の名簿を作って、住所変更や異動があったらすぐに更新します。","p":"「日雇い労働者は除く」。法定三帳簿（労働者名簿、賃金台帳、出勤簿）のひとつ。保存期間は5年（経過措置で当分3年）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":70},{"r":"法108条","t":"賃金台帳","b":"使用者 は、各事業場ごと に賃金台帳 を調製し、賃金計算の基礎となる事項 及び 賃金の額 その他厚 生労働省令で定める事項を 賃金支払の都度 遅滞なく 記入しなければならない 。 賃金台帳の調製","s":"使用者は事業場ごとに賃金台帳を作成し、賃金の計算基礎や金額などを、賃金を支払うたびにすぐ記入しなければなりません。","e":"毎月の給料日ごとに、各従業員の基本給・手当・控除額・支給額を記録した台帳を作成・更新します。","p":"「賃金支払の都度」「遅滞なく」記入。日雇い労働者も対象（労働者名簿とは異なる）。法定三帳簿のひとつ。保存期間5年（経過措置3年）。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":72},{"r":"法111条","t":"無料証明","b":"労働者及び労働者になろうとする者 は、その 戸籍 に関して 戸籍事務を掌る者又はその代理者 に対し て、 無料 で証明を請求する ことができる。 使用者 が、労働者及び労働者になろうとする者 の戸籍 に 関して 証明を請求 する場合においても同様である。 無料証明 労働者及び労働者になろうとする者 は、その 戸籍に関して 戸籍事務を掌る者またはその代理者 に対して、 無 料で証明を請求する ことができる。 使用者 が、労働者及び労働者になろうとする者 の戸籍に関して 証明を請求 する場合においても同様である。（法111条）","s":"労働者やこれから労働者になろうとする人は、戸籍に関する証明を無料で請求できます。使用者が証明を請求する場合も同様です。","e":"就職のために戸籍の証明書が必要な場合、手数料なしで発行を請求できます。","p":"「労働者」と「労働者になろうとする者」の両方が対象。使用者が請求する場合も無料。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":81},{"r":"法121条","t":"両罰規定","b":"◯1 労働基準法 の違反行為 をした者が、当該事業の 労働者 に関する事項について、 事業主 のために 行為した 代理人 、使用人 その他の従業者 である場合においては、 事業主 に対しても各本条の 罰金刑 を科する。ただし、 事業主 （事業主 が法人である場合においてはその 代表者 、事業主 が営業 に関し成年者と同一の行為能力を有しない 未成年者 又は成年被後見人 である場合においてはその 法定代理人 （法定代理人が法人であるときは、その代表者）を 事業主 とする。次項において同じ。）が 違反の防止 に必要な措置をした場合においては、この限りでない。 ◯2 事業主 が違反の計画を知り その 防止に必要な措置 を講じなかった 場合、 違反行為を知 り、その 是正に必要な措置 を講じなかった 場合又は 違反を教唆 した場合においては、 事業主 も行為者 として 罰する 。 行為者処罰主義 原則として、 労働基準法 は、行為者処罰主義 （現実の行為者を使用者として把握し本法の責任の主体とす る）を採用する。（コンメンタール第13章、10条）","s":"労基法違反をした行為者だけでなく、事業主にも罰金刑が科されます。ただし、事業主が違反防止に必要な措置をしていた場合は免責されます。逆に、事業主が違反を指示・計画した場合は、事業主も行為者として罰せられます。","e":"部長が違法な長時間労働をさせた場合、部長本人だけでなく会社にも罰金が科される可能性があります。ただし、会社が残業管理システムをきちんと整備していたなら免責の余地があります。","p":"両罰規定＝「行為者」＋「事業主」の両方を罰する。事業主の免責要件は「違反の防止に必要な措置をした場合」。事業主自身が違反を指示した場合は「行為者」としても罰せられる。","f":"20_労働基準法20-就業規則、雑則等（就業規則、寄宿舎、災害補償、監督機関、雑則、罰則）","pg":89}],"労働安全衛生法":[{"r":"法1条","t":"目的","b":"労働安全衛生法 は、 労働基準法 と相まって 、労働災害の防止 のための 危害防止基準の確立 、責 任体制の明確化 及び 自主的活動の促進 の措置を講ずる等その 防止に関する 総合的計画的 な対策 を推進 することにより 職場における 労働者 の安全と健康 を確保 するとともに、 快適な職場環境の形成を促 進することを 目的とする。 目的","s":"労働安全衛生法は、労働基準法と一緒に使って、職場での労働災害を防ぐための法律です。危険防止の基準を作り、責任体制を明確にし、自主的な安全活動を促進して、働く人の安全と健康を守り、快適な職場環境を作ることが目的です。","e":"工場で機械のカバーをつける基準を定めたり、安全管理者を選任させたり、会社の自主的な安全パトロールを促すのがこの法律の役割です。","p":"「労働基準法と相まって」という表現が重要。安衛法は労基法から独立した法律。「快適な職場環境の形成」も目的に含まれる。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":2},{"r":"法2条","t":"定義","b":"労働安全衛生法 において、次の各号に掲げる用語の意義は、それぞれ当該各号に定めるところによる。 1. 労働災害 …労働者の就業 に係る 建設物 、設備、原材料 、ガス、蒸気、粉じん 等により、又は 作業 行動 その他業務に起因 して、労働者 が負傷し、疾病にかかり、又は 死亡することをいう。（1号） 2. 労働者 …労働基準法第9条に規定する 労働者 （同居の親族のみ を使用する事業 又は事務所に使用さ れる者 及び 家事使用人 を除く。）をいう。（2号） 3. 事業者 …事業を行う者 で、労働者を使用するもの をいう。（3号） 4. 化学物質 …元素及び化合物 をいう。（3号の2） 5. 作業環境測定 …作業環境の実態をは握する ため 空気環境 その他の 作業環境 について行う デザイ ン、サンプリング 及び分析（解析 を含む。）をいう。（4号） 労働安全衛生法の対象となる作業・業務について、「適用される規 則」を問う問題が出題されたことがありますが、「捨て問」になるか と思われます。問われた論点は、潜水業務には、（ 酸素欠乏症等防止 規則ではなく 、）高気圧作業安全衛生規則の適用があるというもので した。","s":"この法律で使う用語の定義です。「労働災害」とは、建物・設備・原材料・ガスなどにより、または作業行動その他業務に起因して、労働者がケガ・病気・死亡することをいいます。","e":"工場の機械に巻き込まれてケガをした場合や、有害な粉じんを吸って病気になった場合が労働災害です。通勤中の事故は労働災害には含まれません。","p":"「労働災害」の定義は「業務に起因」が要件。「作業行動」も含む。「事業者」＝事業を行う者で労働者を使用するもの（法人なら法人そのもの、個人なら事業主個人）。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":6},{"r":"法115条","t":"適用除外","b":"◯1 労働安全衛生法 （労働災害防止計画に関する規定を除く。）は、 鉱山保安 法第2条第2項及び第4項 の規定による 鉱山における保安 については、 適用しない 。 ◯2 労働安全衛生法 は、 船員 法の適用を受ける 船員 については、 適用しない 。 適用除外 R02-09A 労働安全衛生法 は、同居の親族のみ を使用する事業または事務所 を除き 、原則として労働者を使用 する全事業について適用される が、つぎの 1.から3.に掲げる者については 適用されない 。（法115条2項、昭和 47年9月18日発基91号） 適用除外 1. 家事使用人 2. 船員法 の適用を受ける 船員 3. 国家公務員 事業場の単位 労働安全衛生法の適用範囲 は、原則として 、労働基準法と同一 で す。したがって、 同居の親族のみを使用する事業または事務所 や家事 使用人 については適用されません。（昭和47年9月18日発基91号）","s":"鉱山の保安については鉱山保安法が適用されるため、安衛法は適用されません（ただし労働災害防止計画は適用）。船員にも安衛法は適用されません。","e":"炭鉱や金属鉱山での安全管理は鉱山保安法で規制されます。漁船で働く船員の安全は船員法で規制されます。","p":"「鉱山における保安」は適用除外だが「労働災害防止計画に関する規定」は適用される。船員は全面適用除外。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":12},{"r":"法3条","t":"事業者等の責務","b":"◯1 事業者 は、単に労働安全衛生法で定める 労働災害の防止 のための 最低基準 を守るだけ でなく、 快 適な職場環境 の実現と労働条件 の改善を通じて 職場における 労働者 の安全と健康 を確保する よう にしなければならない。また、 事業者 は、国が実施する労働災害の防止に関する施策 に協力 するように しなければならない。 ◯2 機械、器具その他の設備 を設計 し、 製造 し、若しくは 輸入 する者 、原材料 を製造 し、若しくは 輸入 する者 又は建設物 を建設 し、若しくは 設計 する者 は、これらの物の 設 計、製造 、輸入 又は 建設 に際して、これらの物が使用されることによる 労働災害の発生の防 止に資するように努め なければならない 。 ◯3 建設工事 の注文者 その他の 仕事を他人に請け負わせる者 は、施工方法 、作業方法 、工期、納期 等について、 安全で衛生的な作業 の遂行を損なうおそれのある条件 を付さないように 配慮 しなけれ ばならない 。","s":"事業者は、安衛法の最低基準を守るだけでなく、快適な職場環境の実現と労働条件の改善を通じて、労働者の安全と健康を確保しなければなりません。また、国の施策に協力する義務もあります。","e":"「法律で義務付けられた安全柵だけ設置すればいい」ではなく、より安全で快適な職場を自主的に追求すべき、ということです。","p":"労基法1条と同様の「最低基準＋向上努力」の構造。事業者の責務には「国が実施する労働災害防止施策への協力」も含まれる。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":21},{"r":"法4条","t":"労働者の協力義務","b":"労働者 及び 労働者以外の者で労働者と同一の場所において仕事の作業に従事するもの は、労働災 害を防止するため 必要な事項を守る ほか、 事業者その他の関係者 が実施する 労働災害の防止に関する措置 に 協力 するように 努め なければならない。 事業者の責務","s":"労働者（と同じ場所で働く労働者以外の人）も、労働災害を防ぐための事項を守り、事業者が行う災害防止措置に協力するよう努めなければなりません。","e":"「ヘルメットをかぶってください」というルールがあるのに被らない、安全教育を受けない、といった行為は労働者側の義務違反です。","p":"労働者にも協力義務がある（努力義務）。「労働者以外の者で同一場所において作業に従事するもの」も対象。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":21},{"r":"法6条","t":"労働災害防止計画の策定","b":"厚生労働大臣 は、 労働政策審議会 の意見をきいて 、労働災害 の防止 のための主要な対策に関する 事項その他 労働災害 の防止 に関し重要な事項を定めた 計画（以下「 労働災害防止計画 」という。）を 策定しな ければならない。","s":"厚生労働大臣は、労働政策審議会の意見を聴いて、労働災害防止のための計画を策定しなければなりません。","e":"「今後5年間で職場の転落事故を30%減らす」といった国全体の目標と計画を作ります。","p":"「労働政策審議会の意見を聴いて」が要件。計画の策定は厚生労働大臣の義務。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":30},{"r":"法7条","t":"労働災害防止計画の変更","b":"厚生労働大臣 は、労働災害の 発生状況 、労働災害の防止に関する 対策の効果 等を考慮して 必 要がある と認めるときは、 労働政策審議会 の意見をきいて 、労働災害防止計画 を変更しなければならな い。 労働災害防止計画の策定","s":"厚生労働大臣は、災害の発生状況や対策の効果を踏まえ、必要があれば労働政策審議会の意見を聴いて計画を変更しなければなりません。","e":"計画期間中に新たな労働災害が多発した場合、計画を見直して対策を強化します。","p":"変更も「労働政策審議会の意見を聴いて」行う。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":30},{"r":"法8条","t":"計画の公表","b":"厚生労働大臣 は、労働災害防止計画を策定 したときは、 遅滞なく 、これを 公表 しなければならな い。これを 変更したときも、同様とする。","s":"労働災害防止計画を策定・変更したときは、遅滞なく公表しなければなりません。","e":"厚生労働省のウェブサイトなどで計画の内容を国民に公開します。","p":"「遅滞なく」公表。策定時も変更時も同様。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":32},{"r":"法9条","t":"勧告・要請","b":"厚生労働大臣 は、労働災害防止計画 の的確かつ円滑な実施 のため 必要がある と認めるときは、 事業 を行う者 、その団体 その他の関係者 に対し、 労働災害の防止 に関する事項について必要な 勧告 又 は要請 をすることができる。 公表・勧告など 厚生労働大臣 は、労働災害防止計画を策定した ときは、 遅滞なく 、これを 公表しなければならない。これを 変更したときも、同様とする。（法8条） 2026改正 厚生労働大臣 は、労働災害防止計画 の的確かつ円滑な実施のため必要があると認める ときは、 事業 を行う者 、その団体 その他の関係者 に対し、 労働災害の防止 に関する事項について 必要な勧告又は要請 をする ことができる。（法9条） 2026改正 これまで、「事業者、事業者の団体その他の関係者に対 し」だった規定が、「事業を行う者、その団体その他の関係者に対 し」に改正が行われました。 雇用関係にない「労働者以外の者」が職場で働く機会が増えている ため、直接の「事業者」ではないけれども、実質的に現場の安全に影 響力を持つ主体（事業を行う者、その団体、その他の関係者）にも、 国の施策への協力を求めることができるようになりました。","s":"厚生労働大臣は、労働災害防止計画の実施に必要があれば、事業者やその団体等に対して勧告または要請ができます。","e":"特定の業界で事故が多発している場合、その業界団体に対して安全対策の強化を勧告します。","p":"「勧告」と「要請」。命令ではなく強制力はない。","f":"01_労働安全衛生法1-総則（目的、定義、適用範囲、責務、共同企業体、労働災害防止計画）","pg":32},{"r":"法10条","t":"総括安全衛生管理者","b":"◯1 事業者 は、政令で定める規模の 事業場ごと に、 総括安全衛生管理者 を選任 し、その者に 安全管理 者、衛生管理者 又は 救護 に関する技術的事項を管理する者 （以下「 救護技術管理者 」とい う。）の 指揮をさせるとともに、 安全衛生 に関する業務を 統括管理 させなければならない。 ◯2 総括安全衛生管理者 は、当該 事業場 においてその 事業の実施 を統括管理 する者 をもって 充てなければならない。 ◯3 都道府県労働局長 は、労働災害を防止するため必要がある と認めるときは、 総括安全衛生管理 者の業務の執行 について 事業者 に勧告 することができる。","s":"一定規模の事業場では、総括安全衛生管理者を選任し、安全管理者・衛生管理者等を指揮させるとともに、安全衛生に関する業務を統括管理させなければなりません。","e":"従業員1,000人の工場では、工場長などを総括安全衛生管理者に選任して、安全・衛生の取り組み全体を統括させます。","p":"選任規模は業種によって異なる（建設・運送等→100人以上、製造等→300人以上、その他→1,000人以上）。資格要件はない（その事業の実施を統括管理する者）。遅滞なく選任。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":3},{"r":"法11条","t":"安全管理者","b":"◯1 事業者 は、政令で定める業種及び規模の 事業場ごと に、 厚生労働省令で定める資格を有する者 のう ちから、 安全管理者 を選任 し、その者に第10条第1項各号の業務（ 総括安全衛生管理者が統括管理する 業務。救護技術管理者 を選任した場合においては、 労働者 の救護 に関する措置に該当するものを除 く。）のうち 安全に係る 技術的事項 を管理 させなければならない 。 ◯2 労働基準監督署長 は、労働災害を防止するため必要がある と認めるときは、 事業者 に対し、 安全 管理者 の増員 又は 解任 を命ずる ことができる。 選任 R06-08A 屋外産業的業種 （建設業、運送業など）及び 一部の非工業的業種を含む工業的業種 （製造業、各種 商品卸売業、旅館業など）に属する事業者は、 常時50人以上の労働者 を使用する事業所ごとに 安全管理者 を選 任しなければならない。（法11条1項、令3条）","s":"一定の業種・規模の事業場では、資格のある者から安全管理者を選任し、安全に関する技術的事項を管理させなければなりません。","e":"製造業で常時50人以上の事業場では、安全に関する実務経験と研修を修了した人を安全管理者に選任します。","p":"選任業種は限定あり（林業・鉱業・建設業・製造業・運送業等）。常時50人以上。資格要件あり。14日以内に選任。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":17},{"r":"法12条","t":"衛生管理者","b":"◯1 事業者 は、政令で定める規模の 事業場ごと に、 都道府県労働局長 の免許 を受けた者 その他厚生 労働省令で定める資格を有する者のうちから、当該事業場の業務の区分に応じて、 衛生管理者 を選任 し、その者に第10条第1項各号の業務（ 総括安全衛生管理者が統括管理する業務 。救護技術管理者 を選 任した場合においては、 労働者 の救護 に関する措置に該当するものを除く。）のうち 衛生に係る 技術 的事項 を管理させなければならない 。 ◯2 労働基準監督署長 は、労働災害を防止するため必要がある と認めるときは、 事業者 に対し、 衛生 管理者 の増員 又は 解任 を命ずる ことができる。 選任 R06-08A C業種を問わず 、常時 50人以上 の労働者を使用する事業所ごとに 衛生管理者 を選任しなければなら ない。（令4条）","s":"一定規模の事業場では、免許または資格を持つ者から衛生管理者を選任し、衛生に関する技術的事項を管理させなければなりません。","e":"常時50人以上の会社では、衛生管理者免許を持つ人を選任して、職場の換気・照明・健康診断の管理などを担当させます。","p":"すべての業種で常時50人以上。人数に応じて選任数が増える（50〜200人→1人、201〜500人→2人等）。14日以内に選任。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":27},{"r":"法13条","t":"産業医","b":"◯1 事業者 は、政令で定める規模の 事業場ごと に、医師のうちから 産業医 を選任 し、その者に 労働者 の 健康管理 その他の厚生労働省令で定める事項（以下「 労働者 の健康管理等 」という。）を行わせなければなら ない。 ◯3 産業医 は、労働者 の健康管理等 を行うのに必要な 医学 に関する 知識に基づいて、 誠実に その職 務を行わなければならない 。 ◯4 産業医を選任した事業者 は、産業医 に対し、 労働者の労働時間 に関する 情報 その他の 産業医 が 労働者の健康管理等 を適切に行うために必要な 情報 として厚生労働省令で定めるものを 提供しなければ ならない 。 ◯5 産業医 は、労働者の 健康を確保 するため 必要がある と認めるときは、 事業者 に対し、 労働者の 健康管理等 について必要な 勧告 をすることができる 。この場合において、 事業者 は、当該 勧告 を 尊重 しなければならない 。 ◯6 事業者 は、前項の 勧告 を受けた ときは、当該勧告の内容その他の厚生労働省令で定める事項を 衛 生委員会又は安全衛生委員会 に報告 しなければならない 。 選任 R03-10B 業種を問わず 、常時50人以上 の労働者を使用する事業所ごとに 産業医 を選任しなければならない。 （令5条）","s":"一定規模の事業場では、医師のうちから産業医を選任し、労働者の健康管理等を行わせなければなりません。産業医は労働者の健康を確保するため必要があれば事業者に勧告でき、事業者はそれを尊重しなければなりません。","e":"常時50人以上の会社は産業医を選任し、月1回の職場巡視や健康診断結果のチェックを担当させます。1,000人以上なら専属の産業医が必要です。","p":"常時50人以上→選任義務。1,000人以上（有害業務は500人以上）→専属。3,000人以上→2人以上。産業医の勧告権と事業者の尊重義務が重要。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":43},{"r":"法13条の2","t":"産業医等の選任義務のない事業場","b":"◯1 事業者 は、第13条第1項の事業場以外の事業場 については、 労働者の健康管理等 を行うのに必要な 医 学に関する 知識を有する 医師 その他 厚生労働省令で定める者 に労働者の健康管理等 の全部又は一部を 行わせるように 努め なければならない 。 ◯2 前項に規定する者に 労働者の健康管理等 の全部又は一部を行わせる 事業者 は、同項に規定する者に対 し、労働者 の労働時間に関する情報 その他の同項に規定する者が 労働者の健康管理等 を適切に行うため に必要な 情報 として厚生労働省令で定めるものを 提供するように 努め なければならない 。","s":"産業医の選任義務がない小規模事業場でも、医師等に労働者の健康管理の全部または一部を行わせるよう努めなければなりません。","e":"従業員30人の会社でも、地域の医師に健康相談を委託するなどの努力が求められます。","p":"努力義務。「医師その他厚生労働省令で定める者」が対象。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":61},{"r":"法13条の3","t":"健康相談等の体制整備","b":"事業者 は、 産業医 又は第13条の2第1項に規定する者による 労働者の健康管理等 の適切な実施を図るた め、産業医又は第13条の2第1項に規定する者が 労働者 からの 健康相談 に応じ、適切に対応するために必 要な 体制の整備 その他の必要な措置を講ずるように 努め なければならない 。","s":"事業者は、産業医等が労働者からの健康相談に応じ、適切に対応するための体制を整備しなければなりません。","e":"「産業医に相談したいけど、どうすればいいかわからない」とならないよう、相談窓口や予約方法を整備して労働者に周知します。","p":"産業医等による健康相談体制の「整備」と「必要な措置」の義務。","f":"02_労働安全衛生法2-一般組織の管理体制（総括安全衛生管理者、安全管理者、衛生管理者、産業医）","pg":61},{"r":"法14条","t":"作業主任者","b":"事業者 は、 高圧室内作業 その他の 労働災害を防止 するための管理を必要とする 作業で、政令で定める ものについては、 都道府県労働局長 の免許を受けた者 又は 都道府県労働局長 の登録を受けた者 （登 録教習機関）が行う 技能講習 を修了した者 のうちから、当該 作業の区分 に応じて、 作業主任者 を選 任し、その者に当該 作業に従事する 労働者の指揮 その他の厚生労働省令で定める事項を行わせなければ ならない。 選任作業 R06-08D R04-09A R04-09C 一定の危険または有害業務 については、 作業主任者 を選任し、その者に 労働者 の指揮 その他の厚生労働省令で定める事項を行わせなければならない。（法14条）","s":"高圧室内作業など危険な作業については、免許や技能講習修了者のうちから作業主任者を選任し、作業に従事する労働者の指揮等を行わせなければなりません。","e":"プレス機械の作業では、プレス機械作業主任者の技能講習を修了した人を選任して、作業者への指示や安全確認を担当させます。","p":"「都道府県労働局長の免許」または「登録教習機関の技能講習修了」が必要。作業の種類ごとに選任。","f":"03_労働安全衛生法3-一般組織の管理体制（推進者、化学物質管理者、作業主任者、委員会）","pg":22},{"r":"法17条","t":"安全委員会","b":"◯1 事業者 は、政令で定める業種及び規模の 事業場ごと に、次の事項を 調査審議 させ、 事業者 に対し 意見を 述べさせるため、 安全委員会 を設けなければならない 。 1. 労働者 の危険を防止 するための 基本となるべき対策 に関すること。 2. 労働災害 の原因 及び 再発防止対策 で、 安全 に係るものに関すること。 3. 1.及び2.に掲げるもののほか、 労働者 の危険の防止 に関する 重要事項 設置規模 事業者 は、政令で定める業種及び規模の 事業場ごと に、所定の事項を 調査審議 させ、 事業者 に対し 意見を述 べさせるため、 安全委員会 を設けなければならない。（法17条1項） R04-10B 事業者 は、事業場の業種の区分に応じて、 安全委員会 を設けなければならない。（令8条） 業種 使用労働者数 ① 林業、鉱業、建設業 、製造業のうち木材 ・木製品 製造業 、化学工業 、鉄鋼業 、金属製品製造業及び輸送 用機械器具製造業 、運送業 のうち道路貨物運送業及び 港湾運送業 、自動車整備業 、機械修理業 並びに 清掃業常時50人以上 ② 製造業 （物の加工業を含む 、①の業種を除く ）、 電気業 、ガス業 、熱供給業 、水道業 、通信業 、各種商 品卸売業 、家具・建具・じゅう器等卸売業 、各種商品 小売業 、家具・建具・じゅう器小売業 、燃料小売業 、 旅館業 、ゴルフ場業 、運送業 （①の業種を除く ）常時100人 以上","s":"一定の業種・規模の事業場には、労働者の安全に関する事項を調査審議し、事業者に意見を述べるための安全委員会を設置しなければなりません。","e":"工場で安全委員会を設け、月1回集まって事故防止策を議論し、経営者に提言します。","p":"安全委員会の設置業種は限定あり。委員の半数は労働者側の推薦。毎月1回以上開催。","f":"03_労働安全衛生法3-一般組織の管理体制（推進者、化学物質管理者、作業主任者、委員会）","pg":32},{"r":"法18条","t":"衛生委員会","b":"◯1 事業者 は、政令で定める規模の 事業場ごと に、次の事項を 調査審議 させ、 事業者 に対し 意見を述べさせ るため、 衛生委員会 を設けなければならない 。 1. 労働者 の健康障害を防止 するための 基本となるべき対策 に関すること。 2. 労働者 の健康の保持増進 を図るための 基本となるべき対策 に関すること。 3. 労働災害 の原因 及び 再発防止対策 で、 衛生 に係るものに関すること。 4. 1.〜3.に掲げるもののほか、 労働者 の健康障害の防止 及び 健康の保持増進 に関する 重要事項 設置規模","s":"一定規模の事業場には、労働者の健康障害防止等の事項を調査審議し、事業者に意見を述べるための衛生委員会を設置しなければなりません。","e":"オフィスワークの会社でも常時50人以上なら衛生委員会を設け、職場の空調・照明・メンタルヘルス対策などを議論します。","p":"すべての業種で常時50人以上。委員の半数は労働者側の推薦。毎月1回以上開催。","f":"03_労働安全衛生法3-一般組織の管理体制（推進者、化学物質管理者、作業主任者、委員会）","pg":40},{"r":"法19条","t":"安全衛生委員会","b":"◯1 事業者 は、第17条及び前条の規定により 安全委員会 及び衛生委員会 を設けなければならないときは、 そ れぞれの委員会の設置に代えて 、安全衛生委員会 を設置することができる。 設置 R04-10C 事業者 は、安全委員会 及び衛生委員会 を設けなければならないときは、 それぞれの委員会の設置に 代えて 、安全衛生委員会 を設置することができる。（法19条1項） 労働基準法41条2号に定める 「監督若しくは管理の地位にある者 ま たは機密の事務を取り扱う者 を委員に選任してはならない 」といった 規定はありません 。 安全委員会及び衛生委員会を設けなければならないときは、それぞ れの委員会の設置に代えて、安全衛生委員会を設置することができま すが、 この設置において 、「企業規模に規制がある 」わけではありま せん。","s":"安全委員会と衛生委員会の両方を設けなければならない場合、それぞれの設置に代えて安全衛生委員会を設置することができます。","e":"両方の委員会が必要な製造業の工場では、まとめて1つの安全衛生委員会にすることができます。","p":"「設置に代えて」＝任意（両方別々に設置してもよい）。","f":"03_労働安全衛生法3-一般組織の管理体制（推進者、化学物質管理者、作業主任者、委員会）","pg":47},{"r":"則23条","t":"委員会の運営","b":"◯1 事業者 は、安全委員会 、衛生委員会 又は安全衛生委員会 （以下「 委員会 」という。）を 毎月1回以 上開催するようにしなければならない。 ◯3 事業者 は、委員会の開催の都度 、遅滞なく 、委員会 における 議事の概要 を次に掲げるいずれか の方法によって 労働者 に周知 させなければならない。 1. 常時各作業場の見やすい場所 に掲示 し、又は 備え付ける こと。 2. 書面 を労働者 に交付 すること。 3. 事業者の使用に係る電子計算機に備えられたファイル又は電磁的記録媒体（電磁的記録に係る記録媒体 をいう。以下同じ。）をもって調製するファイルに 記録 し、かつ、各作業場に労働者が当該記録の内 容を常時確認できる機器を設置する こと。 ◯4 事業者 は、委員会の開催の都度 、次に掲げる事項を 記録し、これを 3年間 保存しなければならな い。 ア. 委員会の 意見 及び当該 意見 を踏まえて講じた 措置の内容 イ. ア.に掲げるもののほか、委員会における 議事に重要なもの ◯5 産業医 は、衛生委員会又は安全衛生委員会に対して 労働者の健康を確保する観点 から必要な 調査 審議 を求めることができる。 委員会の開催 事業者 は、安全委員会 、衛生委員会または安全衛生委員会 を毎月1回以上開催 するようにしなければならな い。（則23条1項）","s":"委員会は毎月1回以上開催し、開催のたびに議事概要を労働者に周知しなければなりません。議事録は3年間保存します。","e":"毎月の安全衛生委員会の議事録を作成し、社内掲示板に掲示して従業員に知らせ、3年間保管します。","p":"「毎月1回以上」開催。議事の概要は「労働者に周知」。議事録の保存は「3年間」。","f":"03_労働安全衛生法3-一般組織の管理体制（推進者、化学物質管理者、作業主任者、委員会）","pg":49},{"r":"法15条の2","t":"元方安全衛生管理者","b":"◯1 統括安全衛生責任者 を選任した 事業者 で、 建設業 その他政令で定める業種に属する事業を行う ものは、厚生労働省令で定める資格を有する者のうちから、 元方安全衛生管理者 を選任 し、その者に第3 0条第1項各号の事項（ 統括安全衛生責任者が統括管理する事項 ）のうち 技術的事項 を管理させなければ ならない 。 ◯2 労働基準監督署長 は、労働災害を防止するため必要がある と認めるときは、当該 元方安全衛生管 理者 を選任した 事業者 に対し、 元方安全衛生管理者 の増員 又は 解任 を命ずる ことができる。 選任 R04-08B 統括安全衛生責任者を選任した事業者 で、建設業 その他 政令で定める業種 に属する事業を行うもの は、厚生労働省令で定める資格を有する者のうちから、 元方安全衛生管理者 を選任し、その者に統括安全衛生 責任者が統括管理する事項のうち 技術的事項を管理 させなければならない。（法15条の2第1項） 資格 建設業 「その他政令で定める業種 」とされていますが 、現在「その 他政令で定める業種 」は定められていない ため、建設業 を行う事業者 （元方事業者 ）だけが選任することになります 。 元方安全衛生管理 者を選任すべき事業場は 、「建設業 」です。「製 造業」については 、元方安全衛生管理者の選任は義務づけられていま せん。","s":"統括安全衛生責任者を選任した建設業等の事業者は、資格者から元方安全衛生管理者を選任し、統括安全衛生責任者が統括管理する事項の技術的事項を管理させます。","e":"大規模建設現場で、元請会社が統括安全衛生責任者の下に、安全管理の専門知識を持つ元方安全衛生管理者を置きます。","p":"「建設業その他政令で定める業種」に限定。統括安全衛生責任者の技術的補佐役。","f":"04_労働安全衛生法4-請負組織の管理体制","pg":17},{"r":"法16条","t":"安全衛生責任者","b":"◯1 統括安全衛生責任者 を選任すべき 場合において、 統括安全衛生責任者を選任すべき事業者以外 の請負人 で、当該 仕事を自ら行う ものは、 安全衛生責任者 を選任 し、その者に 統括安全衛生責任 者との 連絡 その他の厚生労働省令で定める事項を行わせなければならない。 ◯2 前項の規定により 安全衛生責任者 を選任した 請負人 は、同項の事業者に対し、 遅滞なく 、その 旨を 通報 しなければならない 。 選任","s":"統括安全衛生責任者を選任すべき現場で、元請以外の下請業者は安全衛生責任者を選任し、統括安全衛生責任者との連絡等を行わせます。","e":"建設現場の下請会社が、自社の現場責任者を安全衛生責任者として選任し、元請の統括安全衛生責任者と連携します。","p":"下請側の選任義務。資格要件なし。統括安全衛生責任者との「連絡」が主な職務。","f":"04_労働安全衛生法4-請負組織の管理体制","pg":22},{"r":"法15条の3","t":"店社安全衛生管理者","b":"◯1 建設業 に属する事業の 元方事業者 は、その 労働者である作業従事者 （当該 労働者である作業従事者 のほか、 労働者以外の当該元方事業者に係る作業従事者 がある 場合には、 当該者 を含む。）及び 関係請負人に 係る作業従事者 が一の場所 （これらの作業従事者の数が厚生労働省令で定める数未満である場所及び 統括安全衛生責任者 を選任しなければならない場所 を除く。）において 作業を行う ときは、当該場所に おいて行われる 仕事に係る 請負契約を締結 している 事業場ごと に、これらの 作業従事者の作業 が同一の場 所で行われることによって生ずる 労働災害を防止する ため、厚生労働省令で定める資格を有する者のうち から、 店社安全衛生管理者 を選任 し、その者に、当該事業場で締結している当該請負契約に係る仕事を 行う場所における第30条第1項各号の事項（特定元方事業者が講ずべき措置）を 担当する者に対する 指 導その他厚生労働省令で定める事項を行わせなければならない。 選任","s":"建設業の元方事業者は、統括安全衛生責任者の選任義務がない中小規模の現場で、一定要件に該当する場合、店社安全衛生管理者を選任しなければなりません。","e":"中規模の建設現場で、本社（店社）から安全管理の担当者を定期的に派遣して、現場の安全衛生を管理させます。","p":"「建設業に属する事業の元方事業者」に限定。統括安全衛生責任者の選任義務がない現場が対象。","f":"04_労働安全衛生法4-請負組織の管理体制","pg":28},{"r":"法19条の2","t":"安全衛生業務従事者への能力向上教育","b":"◯1 事業者 は、事業場 における 安全衛生の水準の向上 を図るため、 安全管理者 、衛生管理者 、安 全衛生推進者 、衛生推進者 その他 労働災害の防止 のための業務に従事する者に対し、これらの者が従 事する 業務に関する 能力の向上 を図るための 教育、講習等 を行い、又はこれらを受ける 機会を与えるよ うに 努め なければならない 。 ◯2 厚生労働大臣 は、前項の 教育、講習等 の適切かつ有効な実施を図るため必要な 指針 を公表する もの とする。 ◯3 厚生労働大臣 は、前項の 指針 に従い、 事業者又はその団体 に対し、必要な 指導 等を行う ことが できる。 安全管理者などに対する教育など 事業者 は、事業場 における 安全衛生の水準の向上を図る ため、 安全管理者 、衛生管理者 、安全衛生推進者 、 衛生推進者 その他 労働災害の防止のための業務に従事する者 に対し、これらの者が従事する業務に関する能力 の向上を図るための 教育、講習など を行い、またはこれらを 受ける機会を与える ように 努めなければならな い。（法19条の2第1項） 厚生労働大臣 は、教育、講習などの適切かつ有効な実施を図るため必要な 指針を公表するものとする。（法1 9条の第2項） 厚生労働大臣 は、指針に従い、 事業者またはその団体 に対し、 必要な指導などを行う ことができる。（法19 条の2第3項）","s":"事業者は、安全管理者・衛生管理者等の安全衛生業務に従事する者に対し、能力向上のための教育等を行うよう努めなければなりません。","e":"安全管理者として選任された人に対して、最新の安全技術や法改正の研修を受けさせます。","p":"努力義務。対象は安全管理者、衛生管理者、安全衛生推進者、衛生推進者等。","f":"04_労働安全衛生法4-請負組織の管理体制","pg":35},{"r":"法19条の3","t":"国の援助（小規模事業場の健康確保）","b":"国は、産業医の選任が義務づけられていない事業場 の労働者の健康の確保 に資するため、 労働者の健 康管理 等に関する 相談、情報の提供 その他の必要な援助を行うように 努める ものとする。 国の援助 国は、産業医の選任が義務づけられていない事業場 の労働者の健康の確保に資するため、労働者の健康管理 などに関する 相談、情報の提供 その他の必要な援助を行うように 努める ものとする。（法19条の3） 技術革新の進展 に伴い、新たな機械設備、化学物質の増加、新たな 種類の労働災害の発生など、事業場によっては職場の安全衛生管理に 新たな課題が生じ、また、安全管理者などの業務の執行に当たり、新 しい知識・技術を必要とする場合が増えています。そこで、 能力の向 上を図るための教育 、講習などを行う 規定が設けられています。（コ ンメンタール19条の2） この規定の対象者は 、安全管理者 、衛生管理者 、（安全）衛生推進 者、作業主任者 、元方安全衛生管理者 などです 。（昭和63年9月16日 基発601号の1）","s":"国は、産業医の選任義務がない小規模事業場の労働者の健康確保のため、相談・情報提供等の援助を行うよう努めます。","e":"地域産業保健センターを設置して、小規模事業場の労働者が無料で健康相談を受けられるようにしています。","p":"国の努力義務。「産業医の選任が義務づけられていない事業場」が対象。","f":"04_労働安全衛生法4-請負組織の管理体制","pg":36},{"r":"法20条","t":"機械等による危険の防止","b":"事業者 は、次の 危険を防止 するため 必要な措置を講じなければならない 。 1. 機械、器具その他の設備（以下「機械等」という。）による 危険 2. 爆発性の物 、発火性の物 、引火性の物 等による 危険 3. 電気、熱その他の エネルギー による 危険 機械などによる危険防止措置 R02-09E 事業者 は、① 機械、器具その他の設備による危険、② 爆発性の物 、発火性の物 、引火性の物 などに よる危険、③ 電気、熱その他のエネルギーによる 危険を防止するため必要な措置 を講じなければならない。 （法20条）","s":"事業者は、①機械・器具等による危険、②爆発性・発火性・引火性の物による危険、③電気・熱等のエネルギーによる危険を防止するため必要な措置を講じなければなりません。","e":"プレス機に安全装置をつける、危険物の保管場所に火気厳禁の表示をする、電気設備に感電防止措置を施すなど。","p":"事業者の「措置義務」。3つの類型（機械等・爆発物等・エネルギー）。違反には罰則あり。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":7},{"r":"法21条","t":"作業方法・墜落等の危険の防止","b":"◯1 事業者 は、掘削、採石、荷役、伐木等の業務における 作業方法 から生ずる危険を防止する ため 必要な措置を講じなければならない 。 ◯2 事業者 は、 労働者が墜落する おそれのある場所 、土砂等が崩壊する おそれのある場所 等 に係る危険を防止するため 必要な措置を講じなければならない 。 作業方法などによる危険防止措置 事業者 は、掘削、採石、荷役、伐木などの業務における 作業方法 から生ずる 危険を防止するため必要な措置 を講じなければならない 。（法21条1項）","s":"事業者は、掘削・荷役等の作業方法から生じる危険を防止し、墜落・土砂崩壊等のおそれがある場所での危険を防止するため必要な措置を講じなければなりません。","e":"高所作業では足場と手すりを設置する、土砂崩壊の危険がある溝では土止め措置をするなど。","p":"2つの類型：①作業方法からの危険、②墜落・崩壊等のおそれがある場所。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":17},{"r":"法22条","t":"健康障害の防止","b":"事業者 は、次の 健康障害 を防止するため 必要な措置を講じなければならない 。 1. 原材料 、ガス、蒸気、粉じん 、酸素欠乏空気 、病原体 等による 健康障害 2. 放射線 、高温、低温、超音波 、騒音、振動 、異常気圧 等による 健康障害 3. 計器監視 、精密工作 等の 作業 による 健康障害 4. 排気 、排液 又は残さい物 による 健康障害 健康障害防止措置 事業者 は、健康障害を防止する ため必要な措置を講じなければならない。（法22条） 健康障害防止措置 1. 原材料 、ガス、蒸気、粉じん 、酸素欠乏空気 、病原体 などによる 健康障害 2. 放射線 、高温、低温、超音波 、騒音、振動、異常気圧 などによる 健康障害 3. 計器監視 、精密工作 などの作業による 健康障害 4. 排気、排液または 残さい物 による 健康障害","s":"事業者は、有害物質・放射線・騒音・酸素欠乏等による健康障害を防止するため必要な措置を講じなければなりません。","e":"粉じんが発生する作業場に換気装置を設置する、騒音の大きい工場で防音措置をとるなど。","p":"5つの類型（原材料等・放射線等・排気排液等・計器監視等の作業態様・排気排液廃棄物等）。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":22},{"r":"法23条","t":"作業場の保全","b":"事業者 は、労働者 を就業 させる 建設物その他の作業場 について、 通路、床面、階段等の 保全 並び に換気 、採光 、照明 、保温 、防湿 、休養、避難及び清潔に必要な措置その他 労働者 の 健康、風紀及び生命の保持 のため 必要な措置を講じなければならない 。 作業環境整備措置","s":"事業者は、労働者が働く建設物・作業場について、通路・床面・換気・照明・避難等に必要な措置をとらなければなりません。","e":"工場の通路に物を置かない、十分な照明を確保する、非常口の表示を設置するなど。","p":"「労働者の健康、風紀及び生命の保持」のための措置。労基法96条（寄宿舎）と類似の規定。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":26},{"r":"法24条","t":"作業行動からの労働災害防止","b":"事業者 は、労働者 の作業行動 から生ずる 労働災害を防止 するため 必要な措置を講じなければなら ない。 作業行動からの労働災害防止措置 事業者 は、労働者 の作業行動 から生ずる 労働災害を防止 するため 必要な措置を講じなければならない 。（法2 4条）","s":"事業者は、労働者の不安全な作業行動から生じる労働災害を防止するため必要な措置を講じなければなりません。","e":"「安全帯をつけずに高所作業をする」という不安全行動を防ぐため、使用ルールの徹底や教育を行います。","p":"法20条〜23条が設備・環境面、法24条が行動面の規制。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":34},{"r":"法26条","t":"労働者等の遵守義務","b":"労働者及び労働者と同一の場所において仕事の作業に従事する労働者以外の作業従事者 は、事業者が 第20条から第25条まで及び前条第1項の規定に基づき講ずる措置に応じて、 必要な事項 を守らなければな らない 。 労働者等の遵守義務 2026改正 労働者及び労働者と同一の場所において仕事の作業に従事する労働者以外の作業従事者 は、事業者 が法20条から法25条まで及び法25条の2第1項の規定に基づき講ずる措置に応じて、必要な事項を 守らなけれ ばならない 。（法26条） 当該規定に 違反した者は、 50万円以下の罰金 に処せられる。（法120条1号）","s":"労働者や同じ場所で働く作業従事者は、事業者が法律に基づいて講じた安全衛生措置に応じて、必要な事項を守らなければなりません。","e":"事業者が設置した安全柵を勝手に外したり、指示された保護具を使わなかったりすることは義務違反です。","p":"労働者側にも遵守義務あり。法4条（努力義務）と異なり、法26条は義務規定。ただし罰則はない。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":36},{"r":"法28条","t":"技術上の指針の公表","b":"◯1 厚生労働大臣 は、第20条から第25条まで及び第25条の2第1項の規定により 事業者が講ずべき措置 の適切かつ有効な実施 を図るため必要な業種又は作業ごとの 技術上の指針 を公表 するものとする。 ◯2 厚生労働大臣 は、前項の 技術上の指針 を定めるに当たっては、 中高年齢者 に関して、特に 配 慮するものとする。 技術上の指針などの公表 労働安全衛生法では 、事業者に講ずべき措置 を設け 、これに違反す る場合には罰則を設ける一方で 、労働者 側にもその遵守義 務を課し 、 これに対しても罰則を設けています 。","s":"厚生労働大臣は、事業者が講ずべき安全衛生措置の適切な実施のため、業種・作業ごとの技術上の指針を公表します。","e":"化学物質を扱う作業場での具体的な換気設備の基準や、機械の安全装置の技術仕様などが指針として公表されます。","p":"指針に従う義務はないが、労基署の指導の際の基準となる。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":37},{"r":"法25条","t":"危険時の退避措置","b":"事業者 は、労働災害発生 の急迫した危険がある ときは、 直ちに 作業を中止 し、労働者 を作業場 か ら退避 させる等 必要な措置を講じなければならない 。 危険時退避措置 事業者 は、労働災害発生 の急迫した危険 があるときは、 直ちに作業を中止 し、労働者を 作業場から退避 させ るなど 必要な措置を講じなければならない 。（法25条）","s":"事業者は、労働災害が発生する差し迫った危険があるときは、直ちに作業を中止し、労働者を退避させなければなりません。","e":"建設現場で大雨によるがけ崩れの危険が迫ったとき、すぐに作業を止めて全員を安全な場所に避難させます。","p":"「急迫した危険」→「直ちに」作業中止・退避。事業者の義務。","f":"05_労働安全衛生法5-危険または健康障害防止措置","pg":38},{"r":"法25条の2","t":"救護措置","b":"◯1 建設業 その他政令で定める業種に属する事業の仕事 で、政令で定めるものを行う 事業者 は、 爆 発、火災 等が生じたことに伴い 作業従事者 の救護 に関する措置がとられる場合における 労働災害 の発生を防止する ため、 次の措置を講じなければならない 。 1. 作業従事者 の救護に関し必要な 機械等の備付け及び管理 を行う こと 2. 作業従事者 の救護に関し必要な事項についての 訓練 を行う こと。 3. 1.及び2.に掲げるもののほか、 爆発 、火災 等に備えて、 作業従事者 の救護に関し必要な事項を 行うこと。 ◯2 前項に規定する 事業者 は、厚生労働省令で定める 資格を有する者 のうちから、同項各号の措置のう ち技術的事項 を管理する者 を選任し、その者に当該 技術的事項 を管理させなければならない 。 救護措置（建設業）","s":"建設業等で爆発・火災等が生じた場合の救護に伴う労働災害を防止するため、救護に関する技術的事項の管理者の選任、訓練の実施等の措置を講じなければなりま
