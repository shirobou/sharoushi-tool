師の診療を受けた日 （以下「 初診日 」という。）において 被保険者であった者が、当該 初診日 から起算して 1年6月 を経過した日 （その期間内にその傷病が 治った日 （その症状が 固定し治療の効果が期待できない状態 に至った日を 含む。以下同じ。）があ るときは、その日とし、以下「 障害認定日 」という。）において、その 傷病により次項に規定する 障 害等級 に該当する程度の 障害の状態 にある場合に、その障害の程度に応じて、その者に 支給する。ただ し、当該 傷病に係る 初診日の前日 において、当該 初診日の属する月の前々月 までに 国民年金の被 保険者期間 があり、かつ、当該被保険者期間に係る 保険料納付済期間 と保険料免除期間 とを合算した期間 が当該 被保険者期間 の3分の2 に満たないときは、 この限りでない 。 障害厚生年金の支給要件 R06-10ｱ R02-10ｴ 障害厚生年金 は、次のすべての要件を満たしたときに 支給される。（法47条1項） 初診日が昭和61年4月1日前にあっても 、障害認定日が昭和61年4 月1日以後にある場合には 、新法の障害厚生年金が支給されます 。","s":"初診日に被保険者であった者が、障害認定日に障害等級1～3級に該当する場合、保険料納付要件を満たしていれば障害厚生年金が支給されます。","e":"会社員のHさんが在職中に病気で初めて病院に行き（初診日）、1年6か月後の障害認定日に障害等級2級に該当していれば、障害厚生年金が支給されます。","p":"3要件：「初診日に被保険者」「障害認定日に1～3級該当」「保険料納付要件充足」。国民年金の障害基礎年金は1～2級のみだが、厚生年金は3級まで。初診日が被保険者期間中にあることが必須。","f":"15_厚生年金保険法15-障害厚生年金等（支給要件、併合認定）","pg":2},{"r":"法47条の2","t":"事後重症による障害厚生年金","b":"◯1 疾病にかかり、又は 負傷し、かつ、その 傷病に係る 初診日 において 被保険者であった者 であって、 障害認定日 において 障害等級に該当する程度の障害の状態になかった ものが、同日後 65歳に達する日の前 日までの間において、その 傷病により 障害等級に該当する程度の障害の状態に該当するに至った とき は、その者は、 その期間内 に第47条第1項の 障害厚生年金 の支給を請求 することができる。 ◯2 第47条第1項ただし書（保険料納付要件）の規定は、前項の場合に準用する。 ◯3 第1項の 請求 があったときは、その 請求 をした者に第47条第1項の 障害厚生年金 を支給する。 事後重症による障害厚生年金","s":"障害認定日に障害等級に該当しなかった者が、その後65歳に達する日の前日までに障害等級に該当した場合、請求により障害厚生年金が支給されます。","e":"障害認定日には軽かった障害が徐々に悪化し、63歳のときに2級に該当した場合、請求すれば障害厚生年金を受給できます。ただし65歳の誕生日の前々日までに請求が必要です。","p":"請求期限は「65歳に達する日の前日まで」。支給は「請求月の翌月」から（遡及しない）。障害認定日請求と異なり事後重症は請求日が重要。","f":"15_厚生年金保険法15-障害厚生年金等（支給要件、併合認定）","pg":16},{"r":"法47条の3","t":"基準傷病による障害厚生年金","b":"◯1 疾病にかかり、又は 負傷し、かつ、その 傷病（以下「 基準傷病 」という。）に係る 初診日 にお いて被保険者であった者であって、 基準傷病以外の傷病 により 障害の状態 にあるものが、 基準傷病に係る 障害認定日 以後 65歳に達する日の前日 までの間において、 初めて 、基準傷病による障害 （以下「 基 準障害 」という。）と 他の障害 とを併合して障害等級の 1級又は2級 に該当する程度の 障害の状態 に該 当するに至ったとき（基準傷病の初診日が、基準傷病以外の傷病（基準傷病以外の傷病が2以上ある場合は、 基準傷病以外のすべての傷病）に係る 初診日 以降であるときに 限る。）は、その者に 基準障害 と 他の障害 とを併合した障害の程度による 障害厚生年金 を支給する。 ◯2 第47条第1項ただし書の規定は、前項の場合に準用する。この場合において、同条第1項ただし書中 「当該傷病」とあるのは、「基準傷病」と読み替えるものとする。 ◯3 第1項の障害厚生年金の 支給は、第36条第1項の規定にかかわらず、当該障害厚生年金の 請求があった 月の翌月 から始める ものとする。 基準障害による障害厚生年金（はじめて2級） R07-03ｴ すでに障害の状態 （障害等級1級または2級に該当しない状態 ）にある者 が、新たに発生した傷病 （基準傷病 ）に係る障害認定日から 65歳に達する日の前日まで の間に、 基準傷病による障害 （基準障害 ）とす でに有していた障害 とを併合した障害の程度が、 初めて2級以上に該当 した場合には、基準傷病の初診日の前日 において保険料納付等の要件を満たしていることを条件として、「 基準障害による障害厚生年金 」が支給され る。（法47条の3第1項・2項） R07-03ｲ R03-04ｱ 基準障害による障害厚生年金 は、当該障害厚生年金の 請求があった月の翌月 から支給され る。（法47条の3第3項）","s":"既に障害がある者が、新たな傷病（基準傷病）により、前後の障害を併合して初めて障害等級1～2級に該当した場合、障害厚生年金が支給されます。","e":"既に片目の視力が弱い（3級以下）人が、新たに別の病気で反対の目も悪くなり、合わせて2級に該当するようになった場合、基準傷病による障害厚生年金が支給されます。","p":"「基準傷病」は後発の傷病。初診日に被保険者であること。前の障害と合わせて「初めて」1～2級に該当することが要件。基準傷病の初診日における保険料納付要件が問われる。","f":"15_厚生年金保険法15-障害厚生年金等（支給要件、併合認定）","pg":19},{"r":"法48条","t":"併合認定","b":"◯1 障害厚生年金 （その 権利を取得した当時から 引き続き障害等級の 1級又は2級 に該当しない 程度の 障害の状態にある受給権者に係るものを 除く。以下この条において同じ。） の受給権者 に対して 更に障害厚生 年金を支給すべき事由が生じた ときは、 前後の障害を併合 した障害の程度による 障害厚生年金 を支給す る。 ◯2 障害厚生年金の受給権者が前項の規定により 前後の障害を併合 した障害の程度による障害厚生年金 の受給権を取得したときは、 従前の障害厚生年金の受給権 は、消滅する。","s":"障害厚生年金の受給権者に、さらに別の障害厚生年金を支給すべき事由が生じた場合、前後の障害を併合した新しい障害厚生年金が支給され、従前の障害厚生年金の受給権は消滅します。","e":"障害厚生年金3級を受給中のIさんが、別の傷病で新たに障害厚生年金の受給権を得た場合、2つの障害を合わせた新しい等級の障害厚生年金が支給されます。","p":"併合認定により「新たな」障害厚生年金が支給され、「従前の」障害厚生年金は消滅。1級＋1級のように同じ等級でも併合が行われる。失権事由の一つ。","f":"15_厚生年金保険法15-障害厚生年金等（支給要件、併合認定）","pg":25},{"r":"法50条","t":"併合認定後の年金額の特例","b":"◯4 法48条第1項の規定による 障害厚生年金の額 は、その額が同条第2項の規定により 消滅した障害厚生年 金の額 より低額であるときは、法48条第1項及び第2項の規定にかかわらず、 従前の障害厚生年金の額 に 相当する額とする。 併合認定 R05-07D 障害厚生年金 （権利を取得した当時から 引き続き障害等級の 1級または2級に該当しない 程度の障害 の状態にある受給権者に係るものを 除く）の受給権者 に対して 更に障害厚生年金 （権利を取得した当時から 引 き続き障害等級の 1級または2級に該当しない 程度の障害の状態にある受給権者に係るものを 除く）を支給すべ き事由が生じた ときは、 前後の障害を併合 した障害の程度による 障害厚生年金 が支給 される。（法48条1項） R03-04ｲ R03-04ｳ この場合、 従前の障害厚生年金の受給権は 、消滅する。（法48条2項） 障害基礎年金と同様に 、複数の障害を一本化します 。 R03-04ｴ 併合認定の規定による障害厚生年金の額 は、その額が併合認定の規定により 消滅した障害厚生年金 の額より 低額であるときは、 従前の障害厚生年金の額に相当する額 とする。（法50条4項）","s":"併合認定による障害厚生年金の額が、消滅した従前の障害厚生年金の額より低い場合は、従前の額が保障されます（差額加算あり）。","e":"併合認定で新しい障害厚生年金の額が計算上低くなってしまう場合でも、以前の年金額を下回ることはありません。","p":"「従前額保障」の規定。併合認定で不利にならないようにする仕組み。従前の額が保障されるケース（新しい年金額＜旧年金額の場合）を理解する。","f":"15_厚生年金保険法15-障害厚生年金等（支給要件、併合認定）","pg":25},{"r":"法50条の2","t":"障害厚生年金の加給年金額","b":"◯1 障害の程度 が障害等級 の1級又は2級 に該当する者に支給する 障害厚生年金の額 は、受給権者 によ って 生計を維持している その者の 65歳未満の配偶者 があるときは、第50条の規定にかかわらず、同 条に定める額に 加給年金額 を加算した額 とする。 ◯2 前項に規定する 加給年金額 は、 224,700円 に改定率 を乗じて得た額（その額に 50円未満 の端 数が生じたときは、これを 切り捨て 、50円以上100円未満 の端数が生じたときは、これを 100円 に切り上げるもの とする。）とする。 配偶者加給年金額 R04-06A 障害等級の 「1級または2級 」に該当する者に支給する障害厚生年金の額 は、受給権者によって 生計 を維持しているその者の65歳未満の配偶者がある ときは、障害厚生年金の額に 加給年金額 が加算される。（法 50条の2第1項）","s":"障害等級1級又は2級の障害厚生年金の受給権者に、生計を維持する65歳未満の配偶者がいる場合、加給年金額が加算されます。","e":"障害厚生年金2級を受給している40歳の方に、35歳の配偶者がいる場合、加給年金額が加算されます。","p":"対象は「1級又は2級」のみ（3級は加算なし）。対象は「65歳未満の配偶者」のみ（子は含まない＝子の加算は障害基礎年金側）。老齢厚生年金の加給年金と異なり被保険者期間240月の要件はない。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":11},{"r":"法52条","t":"障害厚生年金の額の改定","b":"◯4 障害厚生年金 （その権利を取得した当時から引き続き障害等級の1級又は2級に該当しない程度の障害 の状態にある受給権者 に係るものを除く。以下同じ。） の受給権者 であって、 疾病にかかり、又は 負傷 し、かつ、その 傷病（当該障害厚生年金の支給事由となった障害に係る傷病の 初診日 後に初診日 が あるものに限る。以下同じ。）に係る当該 初診日 において 被保険者 であったものが、当該 傷病によ り障害（障害等級 の1級又は2級に該当しない程度 のものに限る。以下「 その他障害 」という。）の 状態にあり、かつ、当該傷病に係る 障害認定日以後 65歳に達する日の前日 までの間において、当該 障害 厚生年金 の支給事由となった 障害とその他障害 （その他障害が2以上ある場合は、全てのその他障害を 併 合した障害）とを併合した障害の程度が当該障害厚生年金の支給事由となった 障害の程度 より 増進 した ときは、その者は、 実施機関 に対し、その期間内に障害厚生年金の 額の改定を請求 することができ る。 その他障害による年金額の改定（併合改定） 障害厚生年金 （その権利を取得した当時から引き続き障害等級の1級または2級に該当しない程度の障害の状 態にある受給権者に係るものを除く ）の受給権者 に、更に 障害等級1級または2級に該当しない程度の障害 （そ の他障害 ）が発生し、その他障害の 障害認定日以後 65歳に達する日の前日 までの間に、 前後の障害を併合した 障害の程度 が受給中の障害厚生年金の障害の程度より 増進したときは、 実施機関 に対し、 65歳に達する日の前 日まで の期間内に当該障害厚生年金の 額の改定を請求する ことができる。（法52条4項） 「2級」の障害基礎年金及び障害厚生年金の受給権者が 、症状が 「軽減」して3級の障害の状態になったため 、当該2級の障害基礎年 金は支給停止となった場合において 、「65歳に達した日 」以後に再 び障害の程度が増進して 「2級」の障害の状態になったときは 、2級 の障害基礎年金及び障害厚生年金が支給されます 。","s":"障害厚生年金の受給権者の障害の程度が変わった場合、実施機関は職権またはその者の請求により年金額を改定できます。","e":"障害厚生年金3級の受給者の障害が悪化して2級に該当するようになったら、請求により年金額が2級の額に改定されます。逆に軽くなった場合も改定されます。","p":"改定には「職権」と「請求」の2つの方法。請求による改定は受給権取得日又は審査日から「1年」経過後。65歳以上の者は1級又は2級の障害厚生年金に限り請求可能。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":27},{"r":"法54条","t":"労働基準法の障害補償との調整","b":"◯1 障害厚生年金 は、その 受給権者 が当該傷病について 労働基準法 の規定による 障害補償 を受ける 権利を取得したときは、 6年間 、その 支給を停止 する。 障害補償による支給停止 障害厚生年金 は、その受給権者が当該傷病による障害について、 労働基準法の規定による障害補償 を受ける ことができるときは、 6年間 、その 支給が停止 される。（法54条1項）","s":"障害厚生年金の受給権者が同一の傷病について労働基準法の障害補償を受ける権利を取得したときは、6年間、障害厚生年金の支給が停止されます。","e":"業務上の災害で障害を負い、会社から労基法の障害補償を受けた場合、障害厚生年金は6年間支給停止されます。","p":"停止期間は「6年間」。「支給停止」であり「失権」ではない。労災保険の給付とは別の調整方法（労災は減額調整）。遺族厚生年金にも同様の規定（法64条）。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":32},{"r":"法53条","t":"障害厚生年金の失権","b":"障害厚生年金 の受給権 は、第48条第2項（ 併合認定 ）の規定によって 消滅するほか、受給権者が次の 各号のいずれかに該当するに至ったときは、 消滅する。 1. 死亡したとき。 2. 障害等級に該当する程度の 障害の状態にない 者が、 65歳に達した とき。ただし、 65歳に達 した 日において、障害等級に該当する程度の 障害の状態に該当しなくなった日 から起算して障害等級に 該当する程度の 障害の状態に該当することなく 3年を経過していない ときを 除く。 3. 障害等級に該当する程度の 障害の状態に該当しなくなった日 から起算して障害等級に該当する程度の 障 害の状態に該当することなく 3年を経過した とき。ただし、 3年を経過した 日において、当該受 給権者が 65歳未満 であるときを 除く。 失権 障害厚生年金の受給権 は、次のいずれかに該当するに至ったときは、 消滅する。（法53条） 障害厚生年金が障害等級不該当となり支給停止中の者に、さらに 「その他障害」が発生し、両者を併合した障害の程度が1級または2 級に該当するに至った場合には、併合改定が行われ、障害厚生年金の 支給停止が解除されることになります（その他障害が絡むため、「6 5歳要件」が求められます）。","s":"障害厚生年金の受給権は、併合認定による消滅のほか、死亡、障害等級不該当のまま3年経過かつ65歳到達、障害等級不該当のまま65歳到達等の場合に消滅します。","e":"障害厚生年金3級を受給中の方の障害が軽くなり、障害等級に該当しなくなって3年が経過し、かつ65歳に達したとき、受給権は消滅します。","p":"失権事由：①死亡、②併合認定による消滅、③障害不該当＋3年経過＋65歳到達（又は3年経過後65歳到達）。3級の場合は不該当になりやすいので失権の可能性が高い。1級・2級は障害基礎年金も失権する。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":36},{"r":"法55条","t":"障害手当金の支給要件","b":"◯1 障害手当金 は、疾病にかかり、又は 負傷し、その 傷病に係る 初診日 において 被保険者 であった 者が、当該 初診日 から起算して 5年を経過する日 までの間におけるその 傷病の治った日 におい て、その 傷病により政令で定める程度の障害の状態にある場合に、その者に 支給する。 ◯2 第47条第1項ただし書（保険料納付要件）の規定は、前項の場合に準用する。 障害手当金の支給要件","s":"初診日に被保険者であった者が、初診日から5年以内に傷病が治り、治った日に障害手当金に該当する程度の障害の状態にある場合に支給されます。","e":"会社員のJさんが在職中にケガをし、3年後に治ったが軽い障害が残った場合、障害等級に該当しない程度でも障害手当金（一時金）が支給されることがあります。","p":"「初診日から5年以内」に「治った」ことが要件。「治る」＝症状固定を含む。一時金であり年金ではない。障害等級3級より軽い障害が対象。障害厚生年金等の受給権がある場合は不支給。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":38},{"r":"法57条","t":"障害手当金の額","b":"障害手当金の額 は、第50条第1項（ 障害厚生年金の額 ）の規定の例により計算した額の 100分の200 に 相当する額とする。ただし、その額が同条第3項に定める額（ 障害等級3級等の最低保障額 ）に 2を乗じ て得た額に満たないときは、当該額とする。 例外として支給されるのは 、障害状態に該当することなく 「3年」 を経過した障害厚生年金 、障害基礎年金の受給権者です 。「2年」で はありません 。 「過去に障害手当金を受給した 」場合であっても 、新たな障害によ り障害手当金の受給要件を満たした場合には 、再度障害手当金支給を 受ける ことができます 。 労災保険法に規定されている障害補償給付を受ける権利を有する者 にあっては 、障害手当金は支給されません 。「障害手当金と障害補償 給付の両方が支給される 」わけではありません 。","s":"障害手当金の額は、障害厚生年金の額の計算例により計算した額の200%に相当する額です。最低保障額があります。","e":"障害厚生年金の計算で50万円となる場合、障害手当金は100万円（50万円×200%）となります。ただし最低保障額を下回る場合はその額が支給されます。","p":"額は「報酬比例部分の2倍」（100分の200）。最低保障額は障害厚生年金3級の最低保障額の2倍。一時金として一括支給。","f":"16_厚生年金保険法16-障害厚生年金等（障害厚生年金の額、支給停止、失権、障害手当金）","pg":46},{"r":"法59条","t":"遺族厚生年金の遺族の範囲","b":"◯1 遺族厚生年金を受けることができる遺族 は、被保険者又は被保険者であった者 の配偶者 、子、 父母 、孫又は 祖父母 であって、 被保険者又は被保険者であった者 の死亡の当時 （失踪の宣 告を受けた被保険者であった者にあっては、 行方不明 となった当時。）その者によって 生計を維持 した ものとする。ただし、 妻以外の者にあっては、次に掲げる要件に該当した場合に 限るものとする。 1. 夫、父母又は祖父母 については、 55歳以上 であること。 2. 子又は孫については、 18歳に達する日以後の最初の3月31日までの間 にあるか、又は 20歳未 満で障害等級の 1級若しくは2級 に該当する 障害の状態 にあり、かつ、 現に婚姻をしていない こと。 遺族厚生年金の受給権者（遺族） R05-10ｳ R04-10C R03-05ｳ R02-10ｵ 遺族厚生年金を受けることができる 「遺族」は、 被保険者または被保 険者であった者 の死亡の当時 、死亡者によって 生計を維持 されていた「 配偶者 」、「 子」、「 父母」、「 孫」 または「 祖父母 」であって、 妻以外の者 にあっては、次の要件を満たしている場合である 。（法59条1項） 夫、父母、祖父母 R06-05ｳ 被保険者等の 死亡の当時 、55歳以上 である場合 子、孫 1. 18歳に達する日以後の最初の3月31日までの間にあり 、かつ、現に 婚姻をしてい ない場合 2. 20歳未満であって障害等級 （1級・2級 ）に該当する障害の状態にあり 、かつ、 現 に婚姻をしていない 場合 R02-01C 失踪の宣告を受けた被保険者であった者 に係る遺族厚生年金を受けることができる 遺族の生計維持 関係は、行方不明となった当時 で判断する。（法59条1項ただし書）","s":"遺族厚生年金を受けられる遺族は、被保険者等の死亡当時に生計を維持されていた配偶者、子、父母、孫、祖父母です。受給順位もこの順です。","e":"会社員が亡くなった場合、まず配偶者と子が受給権者となります。配偶者と子がいなければ父母、父母もいなければ孫、その次が祖父母です。","p":"遺族の範囲は「配偶者・子・父母・孫・祖父母」。子・孫は18歳年度末まで（障害1・2級は20歳未満）。夫・父母・祖父母は55歳以上。「兄弟姉妹」は含まれない。国民年金（遺族基礎年金）は「配偶者・子」のみ。","f":"17_厚生年金保険法17-遺族厚生年金（支給要件、受給権者、遺族厚生年金の額）","pg":11},{"r":"法62条","t":"中高齢寡婦加算","b":"◯1 遺族厚生年金 （第58条第1項第4号（ 長期要件 ）に該当することにより支給されるものであって、その 額の計算の基礎となる被保険者期間の月数が 240未満 であるものを 除く。）の 受給権者 である 妻で あってその 権利を取得した当時 40歳以上65歳未満 であったもの又は 40歳 に達した当時 当該被保険 者若しくは被保険者であった者の 子で国民年金法第37条の2第1項に規定する要件に該当するもの（当該 被保険者又は被保険者であった者の死亡後に同法第39条第3項第2号から第8号までのいずれかに該当したこ とがあるものを除く。）と 生計を同じく していたものが 65歳未満 であるときは、第60条第1項第1 号の遺族厚生年金の額 に同法第38条に規定する 遺族基礎年金 の額に 4分の3 を乗じて得た額（その額 に50円未満 の端数が生じたときは、これを 切り捨て 、50円以上100円未満 の端数が生じたとき は、これを 100円に切り上げる ものとする。）を 加算する。 中高齢の寡婦加算 R03-01A 中高齢の寡婦加算 は、遺族厚生年金の受給権者である 妻が、次の いずれか の要件を満たす場合に 加 算される。（法62条1項） 中高齢の寡婦加算（妻の要件） 1. R06-08B R04-10C 受給権取得当時 、子がなく 遺族基礎年金の受給権を有しない 場合には、その当時 40 歳以上65歳未満 であること。 2. 受給権取得当時 、子があり 遺族基礎年金の受給権を有している 場合には、妻が 40歳に達した 当時、 子と 生計を同じくしている こと。 R07-06E R03-01A ただし、妻が、 長期要件による遺族厚生年金 の支給を受けるときは、その計算の基礎と なる被保険者期間 （夫）の月数 が240か月以上 （中高齢の特例によるときは、その月）であるときに限り、 加 算が行われる。（法62条1項かっこ書）","s":"夫の死亡当時40歳以上65歳未満で子のない妻、または子があっても遺族基礎年金を失権した妻に、中高齢寡婦加算が加算されます（長期要件の場合は被保険者期間240月以上が必要）。","e":"45歳の妻が夫を亡くし、子がいない場合、遺族基礎年金はもらえませんが、遺族厚生年金に中高齢寡婦加算が上乗せされます。65歳になると経過的寡婦加算に切り替わります。","p":"要件：「40歳以上65歳未満の妻」「子なし又は遺族基礎年金失権後」。長期要件の場合「240月以上」が必要。加算額は遺族基礎年金の4分の3。65歳到達で終了→経過的寡婦加算へ。","f":"17_厚生年金保険法17-遺族厚生年金（支給要件、受給権者、遺族厚生年金の額）","pg":46},{"r":"法64条","t":"遺族厚生年金と労基法の遺族補償との調整","b":"遺族厚生年金 は、当該 被保険者又は被保険者であった者の死亡 について 労働基準法 第79条の規定によ る遺族補償 の支給が行われるべきものであるときは、 死亡の日 から 6年間 、その 支給を停止 す る。 遺族補償による支給停止 遺族厚生年金 は、当該被保険者または被保険者であった者の死亡について 労働基準法 の規定による 遺族補償 の支給が行われるべきものであるときは、 死亡の日から6年間 、その 支給が停止 される。（法64条）","s":"被保険者等の死亡について労働基準法の遺族補償が行われるべきときは、死亡の日から6年間、遺族厚生年金の支給が停止されます。","e":"業務上の事故で従業員が亡くなり、会社が労基法の遺族補償を行う場合、遺族厚生年金は6年間支給停止されます。","p":"停止期間は「6年間」（死亡の日から）。障害厚生年金の場合（法54条）と同じ期間。「支給停止」であって「失権」ではない。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":2},{"r":"法66条","t":"子に対する遺族厚生年金の支給停止","b":"◯1 子に対する遺族厚生年金 は、 配偶者が遺族厚生年金の受給権を有する 期間、その 支給を停止 する。 ただし、配偶者に対する遺族厚生年金が第65条の2本文（ 夫に対する支給停止 ）、第66条第2項本文（ 配偶者 に対する支給停止 ）又は第67条（ 所在不明による支給停止 ）の規定によりその支給を停止されている間は、 この限りでない 。 子に対する支給停止 R05-05B R05-05D R03-10C 子に対する遺族厚生年金 は、配偶者が遺族厚生年金の受給権を有する 期間、そ の支給が停止 される。（法66条1項） ただし、次の場合において、 配偶者の遺族厚生年金の支給が停止されている間 は、子に遺族厚生年金が支給 される。（法66条1項ただし書） 子に遺族厚生年金が支給される場合 1. 受給権者である 夫（遺族基礎年金の受給権を有しない者に限る ）が、 60歳未満であるため 、夫の遺族厚生 年金の支給が停止 されている場合（ 下記「夫、父母または祖父母に対する支給停止」参照 ） 2. 子のみが遺族基礎年金の受給権を有する ため、 配偶者の遺族厚生年金の支給が停止 されている場合（ 下記 「配偶者に対する支給停止」参照 ） 3. 所在不明 による支給停止の規定により、 配偶者の遺族厚生年金の支給が停止 されている場合（ 下記「所在 不明による支給停止」参照 ）","s":"子に対する遺族厚生年金は、配偶者が遺族厚生年金の受給権を有する期間は支給停止されます。","e":"夫が亡くなり、妻と子の両方が遺族厚生年金の受給権を持つ場合、妻に支給され、子の分は支給停止されます。妻の受給権が消滅すれば子に支給されます。","p":"配偶者優先の原則。ただし、配偶者に対する遺族厚生年金が支給停止されている場合は子に支給される。遺族基礎年金と組み合わせて理解する。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":5},{"r":"法65条の2","t":"夫・父母・祖父母に対する支給停止","b":"夫、父母又は祖父母に対する遺族厚生年金 は、受給権者が 60歳に達するまで の期間、その 支給を停止 する。ただし、 夫に対する 遺族厚生年金 については、当該 被保険者又は被保険者であった者の死亡 につ いて、 夫が国民年金法 による 遺族基礎年金の受給権を有する ときは、 この限りでない 。 夫、父母または祖父母に対する支給停止 前妻の子と後妻が別居しているときに夫が死亡したときは 、子に遺 族基礎年金と遺族厚生年金の受給権 が、妻に遺族厚生年金の受給権 が 発生します 。 この場合 、 子の遺族基礎年金 は、生計を同じくする母がいるため 、支給停 止されます 。 子の遺族厚生年金 と後妻の遺族厚生年金 は、通常であれば 、 「配偶者に優先支給 」されるところですが 、妻の遺族厚生年金 は、子が遺族基礎年金の受給権を有する間は 、支給停止されま す。 配偶者が遺族基礎年金の受給権を有しない場合であって 、子が当該 遺族基礎年金の受給権を有するときは 、その間 、配偶者に対する遺族 厚生年金は 、支給を停止します 。 国R04-04D 夫、父母または祖父母 に対する遺族厚生年金 は、受給権者が 60歳に達するまで の期間、その 支給 が停止 される。（法65条の2）","s":"夫、父母又は祖父母に対する遺族厚生年金は、受給権者が60歳に達するまでの期間、支給停止されます。ただし、夫については遺族基礎年金を受給できる間は支給停止されません。","e":"55歳の夫が妻を亡くして遺族厚生年金の受給権を得ても、60歳になるまでは支給停止されます。ただし、子がいて遺族基礎年金を受けられる間は60歳前でも支給されます。","p":"夫・父母・祖父母は「60歳まで支給停止」。夫の特例として遺族基礎年金受給中は停止解除。受給権の発生自体は55歳で行われる（受給権あり＋支給停止）。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":11},{"r":"法67条","t":"所在不明による支給停止（配偶者又は子）","b":"◯1 配偶者又は子に対する遺族厚生年金 は、その 配偶者又は子 の所在が1年以上明らかでない ときは、 遺族厚生年金 の受給権 を有する 子又は配偶者 の申請 によって、その 所在が明らかでなくなった 時に さかのぼって 、その 支給を停止 する。 ◯2 配偶者又は子 は、 いつでも 、前項の規定による 支給の停止 の解除を申請 することができる。","s":"配偶者又は子に対する遺族厚生年金は、その者の所在が1年以上明らかでないときは、他の受給権者の申請により支給停止されます。","e":"遺族厚生年金を受けている妻の所在が1年以上不明の場合、子が申請すれば妻の年金は停止され、子に支給されるようになります。","p":"「1年以上」所在不明が要件。「申請」による（職権ではない）。停止された受給権者はいつでも支給停止の解除を申請可能。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":17},{"r":"法68条","t":"所在不明による支給停止（配偶者以外）","b":"◯1 配偶者以外の者に対する遺族厚生年金 の受給権者 が2人以上 である場合において、受給権者のうち 1人以 上の者 の所在が1年以上明らかでない ときは、その者に対する遺族厚生年金は、 他の受給権者 の申請 によって、その 所在が明らかでなくなった 時に さかのぼって 、その 支給を停止 する。 ◯2 前項の規定によって 遺族厚生年金の支給を停止された者 は、 いつでも 、その 支給の停止 の解除を 申請 することができる。 所在不明による支給停止","s":"配偶者以外の受給権者が2人以上いる場合に、1人以上の所在が1年以上不明のときは、他の受給権者の申請により支給停止されます。","e":"父と母が遺族厚生年金を受給しており、父の所在が1年以上不明の場合、母が申請すれば父の分は停止され、母の年金額が変わります。","p":"受給権者が「2人以上」いる場合の規定。配偶者以外（子、父母、孫、祖父母）が対象。配偶者の場合は法67条が適用される。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":17},{"r":"法63条","t":"遺族厚生年金の失権","b":"◯1 遺族厚生年金の受給権 は、受給権者 が次の各号のいずれかに該当するに至ったときは、 消滅する。 1. 死亡したとき。 2. 婚姻 （届出をしていないが 、事実上婚姻関係と同様の事情にある場合を含む 。）をしたとき。 3. 直系血族及び直系姻族以外の者の養子 （届出をしていないが 、事実上養子縁組関係と同様の事情に ある者を含む 。）となったとき。 4. 離縁 によって、死亡した被保険者又は被保険者であった者との 親族関係が終了 したとき。 共通の失権事由 遺族厚生年金においてすべての受給権者に共通する失権事由 は、次の通りである。（法63条1項） 共通の失権事由 1. 死亡したとき。 2. R03-10E 婚姻（届出をしていないが 、事実上婚姻関係と同様の事情にある場合を含む ）をしたとき。 3. R03-05ｴ 直系血族及び直系姻族以外の者の養子 （届出をしていないが 、事実上養子縁組関係と同様の事情 にある者を含む ）となったとき。 4. 離縁によって、死亡した被保険者または被保険者であった者との 親族関係が終了 したとき。 「事実婚 」の場合であっても 、受給権は消滅します 。","s":"遺族厚生年金の受給権は、死亡、婚姻、直系血族・直系姻族以外の者の養子になった場合、離縁により死亡した被保険者との親族関係が終了した場合などに消滅します。","e":"遺族厚生年金を受けている妻が再婚すると受給権は消滅します。事実婚（内縁関係）の場合も同様です。","p":"失権事由：死亡、婚姻（事実婚含む）、直系血族・直系姻族以外の養子、離縁、子・孫の18歳年度末到達（障害なし）。「婚姻」には事実婚も含む。30歳未満の子のない妻は5年の有期年金。","f":"18_厚生年金保険法18-遺族厚生年金（支給停止、失権）","pg":20},{"r":"附則29条","t":"脱退一時金","b":"◯1 当分の間 、被保険者期間 が6月以上 である 日本国籍を有しない者 （国民年金の被保険者でな いものに 限る。）であって、第42条第2号に該当しないもの（ 老齢厚生年金の受給資格期間を満たさない 者）その他これに準ずるものとして政令で定めるものは、 脱退一時金 の支給を 請求 することができる。 ただし、その者が次の各号のいずれかに該当するときは、この限りでない。 1. 日本国内に住所を有する とき。 2. 障害厚生年金 その他政令で定める保険給付の 受給権を有したことがある とき。 3. 最後に国民年金の被保険者の資格を喪失した日 （同日において日本国内に住所を有していた者にあって は、同日後初めて、 日本国内に住所を有しなくなった日 ）から起算して 2年 を経過している と き。 脱退一時金の支給要件 R07-06A R07-06B 厚生年金保険の被保険者期間 が「6か月以上 」である 日本国籍を有しない者 （国民年金の 被保険者でないものに限る）は、次の要件を満たしているときは、 脱退一時金 の支給を 請求することができ る。（附則29条1項） 脱退一時金の支給要件（すべて） 1. 老齢厚生年金の受給資格期間を満たしていない こと。 2. 日本国内に住所を有していない こと。 3. R02-09E 障害厚生年金 その他政令で定める保険給付の 受給権を有したことがない こと。 4. R03-09C 最後に国民年金の被保険者の資格を喪失した日 （同日において 日本国内に住所を有していた者 にあっては、 同日後初めて 、日本国内に住所を有しなくなった日 ）から起算して 2年を経過していない こ と。","s":"日本国籍を有しない者で、被保険者期間が6月以上あり、日本国内に住所を有しないなどの要件を満たす者は、脱退一時金を請求できます。","e":"日本で3年間働いた外国人労働者が帰国する場合、厚生年金の脱退一時金を請求して、払った保険料の一部を取り戻すことができます。","p":"要件：「日本国籍を有しない」「被保険者期間6月以上」「日本国内に住所を有しない」「年金受給権なし」。請求期限は「日本を出国後2年以内」。被保険者期間に応じた額が支給される（上限60月→段階的に引上げ）。","f":"19_厚生年金保険法19-脱退一時金及び脱退手当金等","pg":2},{"r":"法2条の3","t":"財政の均衡","b":"厚生年金保険事業の財政 は、 長期的に その均衡が保たれた ものでなければならず、 著しくその均衡を 失する と見込まれる場合には、 速やかに 所要の措置 が講ぜられなければならない。","s":"厚生年金保険事業の財政は、長期的にその均衡が保たれなければならず、著しく均衡を失すると見込まれる場合には、速やかに所要の措置を講じなければなりません。","e":"少子高齢化で年金財政が悪化してきた場合、保険料率の引上げや給付水準の調整などの対策を速やかに講じる必要があります。","p":"「長期的」な均衡が求められる。「著しく」均衡を失する場合に「速やかに」措置を講じる。法2条の2（年金額の改定）と併せて出題されやすい。","f":"20_厚生年金保険法20-年金額の改定等","pg":2},{"r":"法2条の4","t":"財政の現況及び見通し","b":"◯1 政府は、少なくとも 5年 ごとに、 保険料 及び 国庫負担の額 並びに 厚生年金保険法 による 保険給付に要する費用の額 その他の 厚生年金保険事業の財政 に係る 収支 についてその 現況 及び 財政均衡期間 における 見通し （以下「 財政の現況及び見通し 」という。）を 作成しなければな らない。 ◯2 前項の 財政均衡期間 は、財政の現況及び見通し が作成される年以降 おおむね 100年間 とする。 ◯3 政府は、第1項の規定により 財政の現況及び見通し を作成したときは、 遅滞なく 、これを 公 表しなければならない。 財政の均衡 厚生年金保険事業の財政 は、長期的にその均衡が保たれた ものでなければならず、 著しくその均衡を失する と見込まれる 場合には、 速やかに 所要の措置が講ぜられなければならない。 （法2条の3） 財政の現況及び見通し R05-08C 政府は、少なくとも 5年ごと に、保険料 及び国庫負担の額 並びに 厚生年金保険法による保険給付に 要する費用の額 その他の 厚生年金保険事業の財政 に係る 収支について 財政の現況及び見通し を作成しなければ ならない。（法2条の4第1項） 財政均衡期間 は、財政の現況及び見通し が作成される年以降 おおむね100年間 とされている。（法2条の4第 2項） 政府は、財政の現況及び見通し を作成したときは、 遅滞なく 、これを 公表しなければならない。（法2条の4 第3項）","s":"政府は、少なくとも5年ごとに、保険料・国庫負担・保険給付に要する費用等の財政の現況及び見通しを作成し、公表しなければなりません（財政検証）。","e":"2019年に行われた財政検証では、今後の人口推計や経済前提をもとに、将来の年金財政の見通しが示されました。5年後にまた検証が行われます。","p":"「少なくとも5年ごと」に実施。いわゆる「財政検証」の根拠規定。国民年金にも同様の規定あり。「公表」義務がある。マクロ経済スライドの発動判断にも関連。","f":"20_厚生年金保険法20-年金額の改定等","pg":2},{"r":"法34条","t":"マクロ経済スライド","b":"◯1 政府は、第2条の4第1項（財政の現況及び見通しの作成）の規定により 財政の現況及び見通し を作成す るに当たり、 厚生年金保険事業の財政 が、 財政均衡期間 の終了時に保険給付の支給に支障が生じないよ うにするために必要な 積立金 （年金特別会計の厚生年金勘定の積立金及び第79条の2に規定する実施機 関積立金をいう。）を政府等が 保有しつつ当該 財政均衡期間 にわたってその 均衡を保つことができない と見込まれる場合には、 保険給付の額 を調整する ものとし、政令で、保険給付の額を調整する期間（以下 「調整期間 」という。）の 開始年度を定める ものとする。 ◯2 財政の現況及び見通し において、前項の 調整を行う必要がなくなった と認められるときは、政令 で、調整期間 の終了年度を定める ものとする。 ◯3 政府は、 調整期間 において 財政の現況及び見通し を作成するときは、 調整期間 の終了 年度の見通し についても 作成し、併せて、これを 公表しなければならない。 調整期間（マクロ経済スライド）","s":"財政検証の結果、財政均衡期間の終了時に積立金が給付費の1年分を下回ると見込まれる場合、給付水準の調整（マクロ経済スライド）を行います。","e":"物価が2%上がっても、マクロ経済スライドにより年金額の上昇は1.5%程度に抑えられることがあります。少子高齢化に対応するための調整の仕組みです。","p":"調整期間中は「調整率」により年金額の伸びが抑制される。積立金の水準は「給付費1年分」が基準。「名目下限措置」により名目額は下がらない（キャリーオーバーの仕組みあり）。","f":"20_厚生年金保険法20-年金額の改定等","pg":5},{"r":"法2条の2","t":"年金額の改定","b":"厚生年金保険法 による年金たる保険給付の額 は、国民の生活水準 、賃金 その他の諸事情に 著しい 変動が生じた場合には、変動後の諸事情に応ずるため、 速やかに 改定の措置 が講ぜられなければならな い。 年金額の改定 厚生年金保険法による年金たる保険給付の額 は、国民の生活水準 、賃金その他の諸事情に 著しい変動が生じ た場合には、変動後の諸事情に応ずるため、 速やかに 改定の措置 が講ぜられなければならない。（法2条の2）","s":"厚生年金保険法による年金額は、国民の生活水準、賃金その他の諸事情に著しい変動が生じた場合には、速やかに改定の措置が講じられなければなりません。","e":"物価や賃金が大きく変動した場合には、それに応じて年金額も速やかに見直されます。","p":"「著しい変動」が要件。「速やかに」改定。物価スライドや賃金スライドの根拠規定。法2条の3（財政の均衡）、法2条の4（財政検証）とセットで出題される。","f":"20_厚生年金保険法20-年金額の改定等","pg":10},{"r":"法36条","t":"年金の支給期間・支払期月","b":"◯1 年金の支給 は、年金を 支給すべき事由 が生じた 月の翌月 から始め、 権利が消滅した月 で終るも のとする。 ◯2 年金は、その 支給を停止すべき事由 が生じたときは、その事由が生じた 月の翌月 からその 事由が 消滅した月 までの間は、 支給しない 。 支給期間 R07-01A 年金の支給 は、年金を 支給すべき事由が生じた月の 「翌月」から 始め、権利が 消滅した 「月」で終 わる。（法36条1項） 年金は、その 支給を停止すべき事由が生じた ときは、その 事由が生じた月の 「翌月」からその 事由が消滅し た「月」までの間は、 支給が停止 される。（法36条2項） 障害の認定日が 月の初日 である場合でも、障害認定日の属する月の 翌月から、年金が支給される。（昭和28 年7月16日保険発158号の2） 支給すべき事由が生じた月の 「翌月」から消滅した 「月」までで す。","s":"年金の支給は、支給事由が生じた月の翌月から始め、権利が消滅した月で終わります。年金は偶数月（2月・4月・6月・8月・10月・12月）にそれぞれの前月までの分が支払われます。","e":"4月に受給権が発生した場合、5月分から支給開始です。年金は6月に4月・5月分、8月に6月・7月分…というように偶数月に2か月分ずつ支払われます。","p":"支給開始は「翌月」から。支給終了は「消滅月」まで。支払期月は偶数月の6回。国民年金と同じ。前払い（2月に12月・1月分）ではなく後払い。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":2},{"r":"法36条の2","t":"端数処理","b":"◯1 第36条第3項（ 支払期月 ）の規定による 支払額 に1円未満 の端数が生じたときは、これを 切り捨 てる ものとする。 ◯2 毎年 3月から翌年2月 までの間において前項の規定により 切り捨てた金額の合計額 （1円未満の端数 が生じたときは、これを切り捨てた額）については、これを当該 2月の支払期月 の年金額に 加算する もの とする。 2月期の支払の年金の加算 「必ず偶数月に支払われる 」わけではありません 。","s":"各支払期月の支払額に1円未満の端数が生じたときは切り捨て、毎年3月から翌年2月までの間で切り捨てた端数の合計額（1円未満切捨て）は、翌年2月の支払期月の年金額に加算します。","e":"毎月の支払いで数銭の端数を切り捨てた場合、1年分の端数をまとめて2月支払い分に上乗せして精算します。","p":"各支払期月は「1円未満切捨て」。端数合計の加算は「2月期」の支払い。「100円未満四捨五入」は年金額の計算時の端数処理（裁定時）であり、支払時の端数処理と区別する。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":4},{"r":"法59条の2","t":"船舶の沈没等の場合の遺族厚生年金","b":"船舶 が沈没 し、転覆し、滅失し、若しくは 行方不明 となった際 現にその船舶に乗っていた被 保険者 若しくは被保険者であった者 若しくは船舶に乗っていてその船舶の航行中に 行方不明となった被保険者 若しくは被保険者であった者 の生死が3月間 わからない 場合又はこれらの者の死亡が 3月以内 に明ら かとなり、かつ、その 死亡の時期がわからない 場合には、遺族厚生年金の支給に関する規定の適用について は、その 船舶が沈没し、転覆し、滅失し、若しくは行方不明となった日 又はその者が 行方不明となっ た日 に、その者は、 死亡したものと 推定 する。 航空機 が墜落 し、滅失し、若しくは 行方不 明となった際 現にその航空機に乗っていた被保険者若しくは被保険者であった者 若しくは航空機に乗って いてその航空機の航行中に 行方不明となった被保険者若しくは被保険者であった者 の生死が3月間 わから ない場合又はこれらの者の 死亡が3月以内 に明らか となり、かつ、その 死亡の時期がわからない 場合に も、同様とする。 死亡の推定 R05-05C 船舶または航空機 の転覆、墜落等 の事故が生じた場合において、その 生死が3か月間不明である 場 合または 3か月以内に死亡が判明したが死亡の時期がわからない 場合は、 死亡を支給事由とする給付の支給 に関 する規定の適用については、それぞれ当該 事故等の発生日に死亡 したものと 推定される。（法59条の2）","s":"船舶の沈没・転覆等により行方不明となった被保険者等について、行方不明となった日に死亡したものと推定して遺族厚生年金を支給します。","e":"船が沈没して乗組員が行方不明になった場合、3か月待つことなく、行方不明になった日に死亡したものとみなして遺族厚生年金が支給されます。","p":"死亡の「推定」（反証可能）ではなく、条文上は推定。航空機の場合も類似規定あり。民法の失踪宣告（1年・7年）を待たない特例。3か月の待機は不要。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":5},{"r":"法38条の2","t":"受給権者の申出による支給停止","b":"◯1 年金たる保険給付 （厚生年金保険法の他の規定又は他の法令の規定によりその 全額につき 支給を停 止されている年金たる保険給付を 除く。）は、その 受給権者 の申出 により、その 全額 の支給を停止 する。ただし、厚生年金保険法の他の規定又は他の法令の規定によりその額の 一部 につき 支給を停止さ れているときは、 停止されていない部分の額 の支給を停止する。 ◯2 前項ただし書のその額の 一部 につき 支給を停止 されている 年金たる保険給付 について、厚生年金保 険法の他の規定又は他の法令の規定による 支給停止が解除 されたときは、前項本文の 年金たる保険給付 の全額 の支給を停止する。 ◯3 第1項の 申出 は、 いつでも 、将来に向かって 撤回することができる。 受給権者の申出による支給停止 R06-10ｳ 年金たる給付 は、原則として、その 受給権者の申出 により、その 全額の支給が停止 される。（法38 条の2第1項） R06-10ｳ R02-01B ただし、厚生年金保険法の他の規定または他の法令の規定によりその額の 一部につき支給 を停止されている ときは、 停止されていない部分の額 の支給が停止 される。（法38条の2第1項ただし書） その額の 一部につき 支給を停止されている年金たる保険給付 について、 受給権者の申出による支給停止 が行 われた場合には、 停止されていない部分の額 が支給停止 されるが、この一部の 支給停止が解除された ときは、 年金たる保険給付の全額が支給停止 される。（法38条の2第2項） 受給権者による年金たる保険給付の支給停止の 申出は、いつでも 、将来に向かって撤回する ことができる。 （法38条の2第3項） 支給停止及び支給停止の申出の撤回は、 支給事由が同一の年金 （例えば老齢基礎年金と老齢厚生年金）であ っても、 それぞれの年金について申し出る こととなる 。（平成19年3月29日庁保険発0329009号） 「厚生年金保険法の他の規定 」には、例えば在職老齢年金の規定に よる支給停止などがあります 。","s":"年金の受給権者は、いつでも自分の申出により年金の全額の支給停止を申し出ることができます。全額支給停止中の年金は対象外です。","e":"複数の年金の受給権がある方が、一方を選択するために他方を自分から支給停止にすることができます。","p":"「いつでも」申出可能。「全額」の支給停止のみ（一部停止は不可）。既に全額停止中の年金は対象外。申出の撤回も可能。受給権の放棄とは異なる。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":8},{"r":"法41条","t":"受給権の保護・公課の禁止","b":"◯1 保険給付を受ける権利 は、 譲り渡し 、担保 に供し、又は 差し押える ことができない 。た だし、 老齢厚生年金 を受ける権利を 国税滞納処分 （その例による処分を含む。）により 差し押え る場合は、 この限りでない 。 支給停止及び支給停止の申出の撤回は 、その申出を行った日の属す る月の 「翌月」からとなります 。 支給停止の申出は 、その「全額」について行わなければなりませ ん。「全部または一部 」ではありません 。 老齢基礎年金と老齢厚生年金のように同一の支給事由によるもので あっても 、「片方だけの申出 」をすることができます 。","s":"保険給付を受ける権利は、譲渡・担保提供・差押えが禁止されます。ただし老齢厚生年金は国税滞納処分による差押えが可能です。また、租税その他の公課は課されません（老齢厚生年金は課税対象）。","e":"障害厚生年金や遺族厚生年金には税金がかかりませんが、老齢厚生年金は雑所得として所得税の対象になります。","p":"老齢厚生年金のみ「国税滞納処分による差押え可能」＋「課税対象」。障害・遺族は差押え禁止＋非課税。年金担保融資（独立行政法人福祉医療機構）は例外的に担保可能だったが制度廃止。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":9},{"r":"法40条の2","t":"不正利得の徴収","b":"偽りその他 不正の手段 により保険給付を受けた者があるときは、 実施機関 は、受給額 に相当する金額 の全部又は一部 をその者から 徴収する ことができる。 不正利得の徴収 R07-08C 偽りその他不正の手段 により 保険給付を受けた者 があるときは、 実施機関 は、受給額に相当する金 額の全部または一部 をその者から 徴収することができる。（法40条の2）","s":"偽りその他不正の手段により保険給付を受けた者があるときは、実施機関は、受給額に相当する金額の全部又は一部をその者から徴収することができます。","e":"障害の程度を偽って障害厚生年金を不正に受給した場合、受給した金額の返還を求められます。","p":"「全部又は一部」を徴収「できる」（裁量規定）。事業主等が虚偽の届出をした場合、事業主からも連帯して徴収可能。不正受給の防止規定。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":40},{"r":"法73条","t":"故意による給付制限","b":"被保険者又は被保険者であった者が、 故意 に、障害又はその 直接の原因 となった 事故を生ぜしめ たときは、当該 障害を支給事由とする 障害厚生年金 又は 障害手当金 は、支給しない 。","s":"被保険者等が故意に障害又はその直接の原因となった事故を生じさせたときは、障害厚生年金・障害手当金は支給されません。故意に死亡又はその原因事故を生じさせたときは遺族厚生年金は支給されません。","e":"自ら意図的にケガをして障害の状態になった場合、障害厚生年金は支給されません。","p":"「故意」の場合は「全部不支給」。「重大な過失」は法73条の2で規定（一部不支給）。「故意」と「重大な過失」で制限の程度が異なる点が重要。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":42},{"r":"法76条","t":"遺族厚生年金の絶対的不支給","b":"◯1 遺族厚生年金 は、被保険者又は被保険者であった者 を故意 に死亡させた者には、 支給しない 。 被保険者又は被保険者であった者の 死亡前 に、その者の死亡によって遺族厚生年金の受給権者となるべ き者を 故意 に死亡させた者についても、同様とする。 ◯2 遺族厚生年金 の受給権は、受給権者が 他の受給権者 を故意 に死亡させたときは、 消 滅する。 絶対的給付制限 厚生年金保険法における 絶対的給付制限 には次のものがある。（法73条、法76条） 制限事由 絶対的給付制限 故意 に、障害を生ぜしめた者があるとき 故意に 障害の 直接の原因となった事故を生ぜしめた 者があ るとき 当該障害を支給事由とする 障害厚生年金 または障害手当金 の全部不支給 被保険者または被保険者であった者 を故意に死亡 させた 者 があるとき 当該死亡における 遺族厚生年金 の全部不 支給 被保険者または被保険者であった者の死亡前 に、その者の 死亡によって遺族厚生年金の受給権者となるべき者を 故意に 死亡させた 者があるとき 当該死亡における 遺族厚生年金 の全部不 支給 遺族厚生年金の受給権者 が他の受給権者 を故意に 死亡させ たとき 遺族厚生年金 の受給権の消滅","s":"被保険者等を故意に死亡させた者には遺族厚生年金は支給されません。また、死亡前に死亡によって遺族厚生年金を受けることができる先順位又は同順位の者を故意に死亡させた者も同様です。","e":"夫を殺害した妻には遺族厚生年金は絶対に支給されません。また、先順位の遺族を殺害して自分が受給しようとした者にも支給されません。","p":"「絶対的不支給」（一切支給されない）。死亡させた者だけでなく、先順位・同順位の者を死亡させた者も対象。未遂の場合は含まれない。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":42},{"r":"法73条の2","t":"重大な過失等による給付制限","b":"被保険者又は被保険者であった者 が、自己の 故意の犯罪行為 若しくは 重大な過失 により、又は 正当な理由 がなくて 療養に関する指示に従わない ことにより、 障害若しくは 死亡若しくはこれらの 原因となった 事故を生ぜしめ、若しくはその 障害の程度を増進 させ、又はその 回復を妨げた ときは、保険給付 の全部又は一部 を行なわない ことができる。","s":"被保険者等が、故意の犯罪行為・重大な過失により障害等を生じさせた場合、又は正当な理由なく療養の指示に従わないことにより障害等を生じさせた場合、給付の全部又は一部が制限されます。","e":"飲酒運転（重大な過失）で事故を起こして障害を負った場合、障害厚生年金の全部又は一部が支給されないことがあります。","p":"「故意の犯罪行為」「重大な過失」「療養に関する指示違反」が事由。制限は「全部又は一部」（裁量あり）。法73条の「故意」（全部不支給）とは程度が異なる。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":46},{"r":"法77条","t":"支給停止（受給権者の義務違反等）","b":"年金たる保険給付 は、次の各号のいずれかに該当する場合には、その額の 全部又は一部 につき、その 支給を停止 することができる。 1. 受給権者 が、正当な理由がなくて 、第96条第1項（ 受給権者に関する調査 ）の規定による 命令 に従 わず、又は同項の規定による当該 職員の質問 に応じなかった とき。 2. 障害等級 に該当する程度の 障害の状態 にあることにより、 年金たる保険給付の受給権を有し 、又は第44 条第1項（老齢厚生年金の加給年金額）の規定によりその者について 加算が行われている子 が、正当な理 由がなくて 、第97条第1項（ 受診命令 ）の規定による 命令 に従わず、又は同項の規定による 診断 を拒んだとき。 3. 前号に規定する者が、故意若しくは重大な過失により、又は 正当な理由がなくて 療養に関する 指示 に従わないことにより、その 障害の回復を妨げた とき。 相対的給付制限 厚生年金保険法における 相対的給付制限 には次のものがある。（法73条の2） 制限事由 相対的給付制限 R07-08B 被保険者または被保険者であった者 が、自己の 故 意の犯罪行為 若しくは 重大な過失 により、または 正当な理由 がなくて 療養に関する指示に従わない ことにより、 障害若し くは死亡若しくはこれらの 原因となった 事故を生ぜしめ、若 しくはその 障害の程度を増進 させ、またはその 回復を妨げた とき 保険給付 の全部または一部の不支給","s":"受給権者が正当な理由なく届出をしない場合や書類を提出しない場合、又は受給権者が正当な理由なく指定日に診断を受けない場合、年金の全部又は一部の支給を停止できます。","e":"障害厚生年金の受給者が正当な理由なく診断書の提出を拒否した場合、年金の支給が停止されることがあります。","p":"支給停止の事由は「届出・書類提出の不履行」「診断受診の拒否」。「正当な理由がなく」が要件。支給停止は「できる」（裁量規定）。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":46},{"r":"法74条","t":"障害の程度増進の場合の給付制限","b":"障害厚生年金 の受給権者 が、 故意 若しくは 重大な過失 により、又は 正当な理由がなくて 療 養に関する指示に従わない ことにより、その障害の 程度を増進 させ、又はその 回復を妨げた とき は、第52条第1項（ 職権による障害厚生年金の額の改定 ）の規定による 改定を行わず 、又はその者の障 害の程度が現に該当する 障害等級以下の障害等級 に該当するものとして、同項の規定による 改定を行 うことが できる 。 障害厚生年金の受給権者に対する制限（改定の制限） 障害厚生年金の受給権者 が、故意若しくは重大な過失 により、または正当な理由がなくて 療養に関する指示 に従わない ことにより、その障害の 程度を増進 させ、またはその 回復を妨げた ときは、法52条第1項（職権に よる障害厚生年金の額の改定）の規定による 増額改定を行わず 、またはその者の障害の程度が現に該当する障 害等級以下の障害等級に該当するものとして、 減額改定を行う ことが できる 。（法74条） 自殺の場合 、「これをもって直ちに故意に保険事故を発生せしめた ものとして給付制限を行う 」わけではありません 。","s":"障害厚生年金の受給権者が、故意・重大な過失又は療養の指示に従わないことにより障害の程度を増進させた場合、改定を行わず、又は年金額を減額できます。","e":"障害厚生年金3級の受給者が、医師の治療指示に従わず障害が悪化して2級になった場合、2級への改定が行われないことがあります。","p":"「程度の増進」に対する制限。改定を行わない又は減額できる。法52条（額の改定）との関連。「故意」「重大な過失」「療養指示違反」が事由。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":49},{"r":"法75条","t":"保険料滞納期間の給付制限","b":"保険料を徴収する権利が時効によって消滅したとき は、当該保険料に係る被保険者であった期間に基づく 保 険給付 は、 行わない 。ただし、当該被保険者であった期間に係る被保険者の資格の取得について第27条 （事業主の届出）の規定による 届出 若しくは第31条第1項の規定による 確認の請求 又は第28条の2 第1項（同条第2項及び第3項において準用する場合を含む。）の規定による 訂正の請求 があった 後に、 保険料を徴収する権利が時効によって消滅したもの であるときは、 この限りでない 。 保険料徴収権の時効による給付制限 保険料を徴収する権利 は、2年を経過したとき時効により消滅するが、この場合、 時効により消滅 した保険料 を納付すべきであった被保険者期間に基づく 保険給付は行われない 。（法75条） 減額改定は 「できる 」規定です 。 「改定」の制限であり 、「支給停止 」ではありません 。 ただし、事業主からの被保険者資格の 届出または被保険者本人からの資格の 確認の請求があった 「後」に保 険料を徴収する権利が時効によって消滅した 場合には、保険給付の 制限は行われない 。（法75条ただし書）","s":"保険料を徴収する権利が時効消滅した場合、その期間に基づく保険給付は行いません。ただし、被保険者の責めに帰さない事由による場合は除きます。","e":"事業主が保険料を滞納し、時効（2年）で消滅した期間については、その期間を年金額の計算に含めないことがあります。ただし、被保険者（従業員）が悪くない場合は別です。","p":"「被保険者の責めに帰することができない事由」がある場合は保険給付が行われる。事業主の滞納は「被保険者の責めに帰さない」場合に該当しうる。時効は「2年」。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":51},{"r":"法78条","t":"支払の一時差止め","b":"◯1 受給権者 が、 正当な理由 がなくて、第98条第3項の規定による 届出 をせず、又は書類その他の 物件を提出しない ときは、 保険給付の支払 を一時差し止める ことができる。 ◯2 第2号厚生年金被保険者期間、第3号厚生年金被保険者期間又は第4号厚生年金被保険者期間に基づく保 険給付については、前項の規定は、適用しない。 一時差止め R07-08D 受給権者 が、正当な理由がなくて、 届出をせず 、または 書類その他の物件を提出しない ときは、保 険給付の支払を 一時差し止める ことができる。（法78条1項） ただし、 第2号厚生年金被保険者期間 、第3号厚生年金被保険者期間 または 第4号厚生年金被保険者期間 に基 づく保険給付については、 一時差止めは行われな い。（法78条2項） R07-08D 差し止めされた場合 、「差止事由が消滅した 」ときは差 止め分の支給を受けることができます 。 「一時差止め 」であって 、「支給停止 」ではありません 。","s":"受給権者が正当な理由なく届出をしない又は書類を提出しないときは、保険給付の支払を一時差し止めることができます。","e":"現況届を提出しない受給者に対して、年金の支払いを一時的に止めることができます。提出すれば支払いが再開されます。","p":"「一時差止め」は一時的な支払停止。「支給停止」とは異なり、届出等を行えば遡って支払われる。法77条の「支給停止」とは性質が異なる。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":53},{"r":"法40条","t":"第三者行為による損害賠償との調整","b":"◯1 政府及び実施機関 （厚生労働大臣を除く。）は、 事故が第三者の行為 によって生じた場合において、 保 険給付をしたとき は、その 給付の価額の限度 で、受給権者 が第三者 に対して有する 損害賠償の請求権 を取得 する。 ◯2 前項の場合において、 受給権者 が、当該 第三者 から同一の事由 について 損害賠償を受けた ときは、 政府及び実施機関 （厚生労働大臣を除く。）は、その 価額の限度 で、 保険給付をしない ことができ る。 損害賠償との調整 R07-04E 政府及び実施機関 （厚生労働大臣を除く）は、 事故が第三者の行為 によって生じた場合において、 保険給付をした ときは、その 給付の価額の限 度で、受給権者 が第三者 に対して有する 損害賠償の請求権 を取得 する。（法40条1項） 差止事由が消滅したときは 、差し止められた分の支給が行われま す。","s":"第三者の行為によって保険事故が生じた場合、政府等は給付の価額の限度で受給権者が第三者に対して有する損害賠償請求権を取得します（求償権）。逆に先に損害賠償を受けた場合はその価額の限度で給付を行わないことができます。","e":"交通事故で障害を負い、障害厚生年金が支給された場合、政府は加害者に対して支給した年金額の範囲内で損害賠償を請求できます。","p":"「求償」と「控除」の2つの調整方法。第三者行為災害の場合の二重填補の防止。損害賠償と保険給付の調整は頻出テーマ。","f":"21_厚生年金保険法21-給付通則等（支給期間、端数処理、未支給年金、内払・充当、併給調整、給付制限等）","pg":54},{"r":"法78条の2","t":"合意分割（離婚時の年金分割）","b":"◯1 第1号改定者 又は 第2号改定者 は、離婚等 をした場合であって、次の各号のいずれかに該当す るときは、 実施機関 に対し、当該 離婚等 について 対象期間 に係る 被保険者期間 の標準報酬 の改定又は決定 を請求することができる。ただし、当該 離婚等 をしたときから 5年 を経過したときその他 の厚生労働省令で定める場合に該当するときは、この 限りでない。 1. 当事者が 標準報酬 の改定又は決定 の請求をすること及び 請求すべき 按分割合 について合意し ているとき。 2. 次項の規定により 家庭裁判所 が請求すべき 按分割合 を定めた とき。 ◯2 前項の規定による 標準報酬 の改定又は決定の請求 （以下「 標準報酬改定請求 」という。）につ いて、同項第1号の当事者の 合意のための 協議が調わない とき、又は 協議をすることができない ときは、 当事 者の一方の申立て により、 家庭裁判所 は、当該 対象期間 における保険料納付に対する当事者の 寄与の程度 その他 一切の事情を考慮 して、請求すべき 按分割合を定める ことができる。 標準報酬改定請求の要件","s":"離婚等をした場合、当事者の合意又は裁判所の決定により、婚姻期間中の厚生年金の標準報酬を分割することができます。","e":"夫婦が離婚する際、婚姻期間中の夫の厚生年金記録を最大50%まで妻に分割できます。これにより妻の将来の年金額が増えます。","p":"分割の要件：「離婚等」＋「合意又は裁判所の決定」。按分割合の範囲は「第2号改定者の持分超～2分の1以下」。請求期限は「離婚等の日の翌日から2年以内」。","f":"22_厚生年金保険法22-離婚分割（合意分割）","pg":13},{"r":"法78条の3","t":"按分割合の範囲","b":"◯1 請求すべき 按分割合 は、当事者それぞれの 対象期間標準報酬総額 の合計額 に対する 第2号改 定者 の対象期間標準報酬総額 の割合を 超え 2分の1 以下の範囲（以下「按分割合の範囲」とい う。）内で定められなければならない。 按分割合 「按分割合 」とは、 対象期間 における 当事者双方の対象期間標準報酬総額の合計額に対する分割後の第2号改 定者の持分の割合 をいう。（法78条の2第1項かっこ書） 改正前においては、例えば、夫（第1号改定者）に①私学共済期間 （第4号厚生年金期間）と②国家公務員期間（第2号厚生年金期間） があり、妻（第2号改定者）に③民間企業での厚生年金期間（第1号 厚生年金期間）があるようなケースでは、①については①で分割、② については②で分割、③については③で分割と それぞれの対象期間ご とに改定請求 をします 。この場合は 、一部の年金制度のみの改定請求 も可能でした 。 改正後は 、「一つの期間に係る被保険者期間のみを有する者 」とさ れるため 、一部の年金制度のみの改定請求は不可能となりました 。","s":"合意分割の按分割合は、第2号改定者（分割を受ける側）の対象期間標準報酬総額の割合を超え、2分の1以下の範囲で定めます。","e":"婚姻期間中の夫の標準報酬総額が8,000万円、妻の標準報酬総額が2,000万円の場合、按分割合は20%超～50%以下の範囲で決めます。","p":"按分割合の下限は「第2号改定者の持分割合を超え」、上限は「2分の1以下」。つまり現状より不利にならず、最大50%まで。","f":"22_厚生年金保険法22-離婚分割（合意分割）","pg":20},{"r":"法78条の4","t":"情報提供の請求","b":"◯1 当事者 又はその一方 は、 実施機関 に対し、 標準報酬改定請求 を行うために 必要な情報 であって 次項に規定するものの 提供を請求する ことができる。ただし、当該 請求が標準報酬改定請求後 に行われ た場合又は第78条の2第1項ただし書（ 離婚等をしたときから5年を経過したとき 等）に該当する場合その他 厚生労働省令で定める場合においては、 この限りでない 。 ◯2 前項の 情報は、 対象期間標準報酬総額 、按分割合 の範囲、これらの 算定の基礎となる期間 その 他厚生労働省令で定めるものとし、同項の 請求があった日 において 対象期間の末日が到来していない ときは、 同項の 請求があった日 を対象期間の末日 とみなして算定したものとする。 当事者等への情報の提供など 当事者またはその一方 は、実施機関 に対し、標準報酬改定請求を行うために 必要な情報 （対象期間標準報酬 総額、按分割合の範囲 など）の 提供を請求 することができる。（法78条の4第1項） ただし、次の場合には、当該情報の提供を 請求することはできない 。（法78条の4第1項ただし書、則78条の 7） 実施機関へ情報の提供の請求をすることができない場合 1. R07-02C 情報の請求 が標準報酬改定請求後 に行われた（＝すでに分割の請求が行われている）場合 2. 2026改正 離婚等をした ときから 5年を経過 した場合 3. 原則として、情報の提供の請求により 情報の提供を受けた日 の翌日 から起算して 3か月を経過していない 場合","s":"当事者又はその一方は、実施機関に対し、標準報酬改定請求のために必要な情報の提供を請求することができます。","e":"離婚を考えている妻が、年金分割した場合にどのくらい年金が増えるか知りたい場合、年金事務所で情報提供を請求できます。相手の同意は不要です。","p":"情報提供は「一方」からでも請求可能（相手の同意不要）。提供される情報は対象期間標準報酬総額等。50歳以上の場合は見込額も提供される。","f":"22_厚生年金保険法22-離婚分割（合意分割）","pg":24},{"r":"法78条の6","t":"標準報酬の改定・決定","b":"◯1 実施機関 は、標準報酬改定請求 があった場合において、 第1号改定者 が標準報酬月額 を有する 対象期間に係る被保険者期間の 各月ごと に、当事者の 標準報酬月額 をそれぞれ次の各号に定める額に 改 定し、又は決定する ことができる。 1. 第1号改定者 改定前の標準報酬月額 に1から 改定割合 を控除して得た率を乗じて得た額 2. 第2号改定者 改定前の標準報酬月額 （標準報酬月額を有しない月にあっては、零）に、 第1号改定者の改定前の標準 報酬月額 に改定割合 を乗じて得た額を 加えて 得た額 標準報酬の改定または決定（標準報酬の分割） 合意分割の請求 があった場合には、 対象期間に係る被保険者期間 の各月ごと に、次の算式により標準報酬月 額及び標準賞与額が改定または決定される。（法78条の6第1項・2項） 第1号改定者の標準報酬月額（標準賞与額） （改定前の標準報酬月額 （標準賞与額 ））×（ 1-改定割合 ） 第2号改定者の標準報酬月額（標準賞与額） （改定前の標準報酬月額 （標準賞与額 ）＋（（ 第1号改定者の改定前の標準報酬月額 （標準賞与額 ））×（ 改 定割合 ）","s":"標準報酬改定請求があった場合、実施機関は対象期間の各月ごとに、当事者の標準報酬月額・標準賞与額を按分割合に基づいて改定又は決定します。","e":"年金分割の請求が認められると、婚姻期間中の各月について、夫の標準報酬が減額され、妻の標準報酬が増額されます。","p":"改定は「各月ごと」に行われる。第1号改定者（分割する側）の標準報酬が減り、第2号改定者（分割される側）の標準報酬が増える。被保険者期間自体は変わらない。","f":"22_厚生年金保険法22-離婚分割（合意分割）","pg":26},{"r":"法78条の10","t":"合意分割後の老齢厚生年金の額","b":"◯1 老齢厚生年金の受給権者 について、第78条の6第1項及び第2項（ 合意分割 ）の規定により 標準報酬の改 定又は決定 が行われたときは、第43条第1項の規定にかかわらず、 対象期間 に係る 被保険者期間 の最後の月 以前における被保険者期間 （対象期間の末日後に当該老齢厚生年金を支給すべき事由が生じた場合その他 の政令で定める場合にあっては、政令で定める期間）及び 改定又は決定後の標準報酬 を老齢厚生年金の 額の計算の基礎とする ものとし、当該 標準報酬改定請求のあった日 の属する 月の翌月 から、年金の額を 改定する。 老齢厚生年金の額の改定 R07-02E 老齢厚生年金の受給権者 について、 合意分割 の規定により 標準報酬の改定または決定 が行われたと きは、 対象期間に係る被保険者期間の最後の月以前における被保険者期間 及び改定または決定後の標準報酬 を 老齢厚生年金の額の計算の基礎とする ものとし、当該 標準報酬改定請求のあった日の属する月の 「翌月」か ら、年金の額は改定 される。（法78条の10第1項）","s":"合意分割により標準報酬の改定・決定が行われた場合、老齢厚生年金の額は改定後の標準報酬に基づいて再計算されます。","e":"離婚して年金分割を受けた妻は、改定後の標準報酬で計算された老齢厚生年金を受給できます。分割した夫の年金額は減額されます。","p":"分割による年金額の再計算。第1号改定者は減額、第2号改定者は増額。離婚分割は被保険者期間を分割するのではなく標準報酬を分割する点が重要。","f":"22_厚生年金保険法22-離婚分割（合意分割）","pg":42},{"r":"法78条の13","t":"3号分割の基本理念","b":"被扶養配偶者 に対する 年金たる保険給付 に関しては、 被扶養配偶者 を有する 被保険者 が負担した 保険料 について、当該 被扶養配偶者 が共同して負担した ものであるという 基本的認識 の下に、厚生年金 保険法第3章の3の定めるところによる。 基本的認識 「合意分割」… 対象期間 （平成19年4月1日前の婚姻期間も含まれ る） 「3号分割」… 特定期間 （平成20年4月1日以後の婚姻期間から）","s":"被扶養配偶者（第3号被保険者）に対する年金給付については、被扶養配偶者を有する被保険者が負担した保険料を、被扶養配偶者が共同して負担したものと認められます。","e":"専業主婦の妻は直接保険料を払っていませんが、夫の保険料を「共同して負担した」とみなされるため、離婚時に年金分割を受ける正当な根拠があります。","p":"3号分割の理念規定。「共同して負担したものであるという基本的認識の下」がキーフレーズ。合意分割との違いの根拠となる規定。","f":"23_厚生年金保険法23-離婚分割（3号分割）","pg":5},{"r":"法78条の14","t":"3号分割の請求","b":"◯1 特定被保険者 が被保険者であった期間中 に被扶養配偶者 を有する場合において、当該 特定被 保険者 の被扶養配偶者 は、当該 特定被保険者 と離婚又は婚姻の取消し をしたときその他これに準 ずるものとして厚生労働省令で定めるときは、 実施機関 に対し、 特定期間 に係る 被保険者期間 （次 項及び第3項の規定により既に標準報酬が改定され、及び決定された被保険者期間を除く。以下同じ。）の 標 準報酬 （特定被保険者及び被扶養配偶者の標準報酬をいう。以下同じ。）の 改定及び決定 を請求 するこ とができる。ただし、当該請求をした日において当該 特定被保険者 が障害厚生年金 （当該特定期間 の全部又は一部をその額の計算の基礎とするものに限る。）の 受給権者 であるときその他の厚生労働省令で定 めるときは、 この限りでない 。 3号分割の請求 特定被保険者 が被保険者であった期間中 に被扶養配偶者を有する 場合において、当該特定被保険者の 被扶養 配偶者 は、当該特定被保険者と 離婚または婚姻の取消しをしたとき その他これに準ずるものとして厚生労働省 令で定めるときは、 実施機関 に対し、 特定期間に係る被保険者期間 の標準報酬の改定及び決定を請求 すること ができる。（法78条の14第1項）","s":"特定被保険者の被扶養配偶者は、離婚等をした場合に、実施機関に対して標準報酬の改定・決定を請求できます。3号分割は当然に2分の1で分割されます。","e":"サラリーマンの夫と専業主婦の妻が離婚した場合、妻は夫の同意なしに、2008年4月以降の婚姻期間について標準報酬を2分の1に分割する請求ができます。","p":"3号分割は「相手の合意不要」で「当然に2分の1」。対象は2008年4月1日以降の第3号被保険者期間。合意分割と3号分割の違い（合意要否、対象期間、按分割合）が超頻出。","f":"23_厚生年金保険法23-離婚分割（3号分割）","pg":6},{"r":"法78条の18","t":"3号分割後の老齢厚生年金の額","b":"◯1 老齢厚生年金の受給権者 について、第78条の14第2項及び第3項（ 3号分割 ）の規定により 標準報酬の 改定又は決定 が行われたときは、第43条第1項の規定にかかわらず、 改定又は決定後の標準報酬 を老齢 厚生年金の額の計算の基礎とする ものとし、第78条の14第1項の 請求のあった日 の属する 月の翌月 か ら、年金の額を 改定する。 老齢厚生年金の額の改定 取扱いについては 、離婚時みなし被保険者期間と同様 です。","s":"3号分割により標準報酬の改定・決定が行われた場合、老齢厚生年金の額は改定後の標準報酬に基づいて再計算されます。","e":"3号分割を受けた元専業主婦は、分割後の標準報酬に基づいて計算された老齢厚生年金を受給できるようになります。","p":"合意分割後の再計算（法78条の10）と同様の仕組み。3号分割の場合は当然に2分の1で分割されるため、按分割合の取り決めは不要。","f":"23_厚生年金保険法23-離婚分割（3号分割）","pg":19},{"r":"法79条の2","t":"積立金の運用の目的","b":"積立金 （年金特別会計 の厚生年金勘定の積立金 （以下「 特別会計積立金 」という。）及び 実施機 関（厚生労働大臣を除く。）の 積立金 のうち厚生年金保険事業（ 基礎年金拠出金 の納付を 含む。）に係 る部分に相当する部分として政令で定める部分（以下「 実施機関積立金 」という。）をいう。以下同 じ。）の 運用は、積立金 が厚生年金保険の被保険者から徴収された 保険料の一部 であり、かつ、 将来の 保険給付 の貴重な財源 となるものであることに特に留意し、専ら 厚生年金保険の被保険者 の利益の ために、 長期的な観点 から、 安全かつ効率的 に行うことにより、 将来にわたって 、厚生年金保 険事業 の運営の安定 に資することを 目的として行うものとする。","s":"積立金の運用は、専ら厚生年金保険の被保険者の利益のために、長期的な観点から安全かつ効率的に行うことが目的です。","e":"厚生年金の積立金約200兆円は、被保険者の将来の年金給付のために、株式や債券などで運用されています。短期的な利益ではなく長期的な安全性を重視します。","p":"「専ら被保険者の利益」「長期的な観点」「安全かつ効率的」がキーワード。GPIFによる運用の法的根拠。国民年金も同様の規定あり。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":2},{"r":"法79条の3","t":"積立金の運用方法","b":"◯1 特別会計積立金の運用 は、 厚生労働大臣 が、前条の目的に沿った運用に基づく 納付金 の納付を 目的として、 年金積立金管理運用独立行政法人 に対し、 特別会計積立金 を寄託 することにより行う ものとする。 ◯2 厚生労働大臣 は、前項の規定にかかわらず、同項の規定に基づく 寄託 をするまでの間 、財政 融資資金 に特別会計積立金 を預託 することができる。 運用の目的","s":"特別会計積立金の運用は、厚生労働大臣が年金積立金管理運用独立行政法人（GPIF）に対し寄託して行います。","e":"厚生年金の積立金は、厚生労働大臣からGPIFに預けられ、GPIFが株式・債券等で運用します。運用益は年金給付の財源になります。","p":"運用主体は「GPIF（年金積立金管理運用独立行政法人）」。厚生労働大臣が「寄託」する。GPIFは納付金を国に納付する。運用の基本方針は厚生労働大臣が定める。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":2},{"r":"法79条","t":"福祉事業","b":"◯1 政府等 は、厚生年金保険事業 の円滑な実施 を図るため、 厚生年金保険 に関し、次に掲げる事業を行うこ とができる 。 1. 教育及び広報 を行うこと。 2. 被保険者 、受給権者その他の関係者 （以下「 被保険者等 」という。）に対し、 相談その他の援助 を 行うこと。 3. 被保険者等 に対し、 被保険者等 が行う 手続に関する情報 その他の 被保険者等 の利便の向上 に 資する 情報を提供 すること。 ◯2 政府等 は、厚生年金保険事業 の実施に必要な事務（ 基礎年金拠出金 の負担及び納付に伴う事務を 含 む。）を円滑に処理し、 被保険者等 の利便の向上に資するため、 電子情報処理組織 の運用を行う ものと する。 ◯3 政府は、第1項各号に掲げる事業及び前項に規定する 運用の全部又は一部 を日本年金機構 （以 下「機構」という。）に行わせることが できる 。 厚生年金事業の円滑な実施を図るための措置","s":"政府等は、厚生年金保険事業の円滑な実施を図るため、教育及び広報、相談その他の援助等の事業を行うことができます。","e":"年金についての広報活動やパンフレットの作成、年金相談の実施などが福祉事業として行われています。","p":"福祉事業は「できる」規定（任意）。「教育及び広報」「相談その他の援助」が内容。以前は福祉施設（年金福祉事業団等）も行っていたが現在は行われていない。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":8},{"r":"法90条","t":"不服申立て（審査請求）","b":"◯1 厚生労働大臣 による 被保険者 の資格 、標準報酬 又は 保険給付 に関する処分に不服がある 者は、 社会保険審査官 に対して 審査請求 をし、 その決定に不服がある 者は、 社会保険審査会 に対し て再審査請求 をすることができる。ただし、第28条の4第1項又は第2項（年金記録の訂正請求）の規定によ る決定については、この限りでない。 ◯3 第1項の 審査請求 をした日から 2月以内 に決定がない ときは、 審査請求人 は、社会保険審査官 が審 査請求 を棄却 したものとみなす ことができる。 ◯4 第1項及び第2項の 審査請求 並びに第1項の 再審査請求 は、 時効の完成猶予及び更新 に関しては、 裁判上の請求 とみなす 。 ◯5 被保険者 の資格又は標準報酬 に関する 処分が確定した ときは、その処分についての不服を当該処分 に基づく 保険給付 に関する処分についての 不服の理由とすることができない 。 審査請求 2022改正 従来規定があった 年金担保貸付制度 は、令和4年3月31日 をもって新規の申込み受付を終了しました。","s":"厚生労働大臣による被保険者の資格、標準報酬又は保険給付に関する処分に不服がある者は、社会保険審査官に審査請求をし、その決定に不服があるときは社会保険審査会に再審査請求ができます。","e":"障害厚生年金の不支給決定に納得できない場合、まず社会保険審査官に審査請求し、その結果にも不服があれば社会保険審査会に再審査請求できます。","p":"二審制：社会保険審査官→社会保険審査会。対象は「資格」「標準報酬」「保険給付」に関する処分。保険料の処分は法91条で別規定。審査請求の期間は処分があったことを知った日の翌日から3か月以内。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":9},{"r":"法91条","t":"保険料等の処分に対する不服申立て","b":"◯1 厚生労働大臣 による 保険料 その他厚生年金保険法の規定による 徴収金の賦課若しくは徴収の処 分又は 滞納処分 に不服がある 者は、 社会保険審査会 に対して 審査請求 をすることができる。 保険料等の賦課若しく徴収の処分または滞納処分に関する不服申立て 厚生労働大臣 による 保険料 その他厚生年金保険法の規定による 徴収金 の賦課若しくは 徴収の処分または 滞納 処分に不服がある者は、 社会保険審査会 に対して 審査請求 をすることができる。（法91条1項） 第1号厚生年金被保険者以外の被保険者に係る不服申立て 第1号厚生年金被保険者以外の者 に係る被保険者の 資格または 保険給付 に関する処分、 保険料 その他厚生年金 保険法の規定による徴収金の賦課または徴収の処分または日本私立学校振興・共済事業団による督促若しくは 保険料については 、「社会保険審査会 」に対して審査請求を行いま す。「社会保険審査官 」ではありません 。","s":"厚生労働大臣による保険料等の徴収金の賦課・徴収又は滞納処分に不服がある者は、社会保険審査会に対して審査請求ができます（一審制）。","e":"保険料の額が間違っていると思う場合、直接社会保険審査会に審査請求できます。資格や給付と違い、社会保険審査官を経由する必要はありません。","p":"保険料等の処分は「一審制」で社会保険審査会に直接請求。資格・標準報酬・保険給付の処分は「二審制」（審査官→審査会）。この違いが頻出。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":14},{"r":"法91条の3","t":"審査請求前置主義","b":"厚生労働大臣による被保険者の 資格 、標準報酬 又は 保険給付 に関する処分の 取消しの訴え は、当該処分についての 審査請求 に対する 社会保険審査官 の決定 を経た後でなければ、 提起す ることができない 。 訴訟との関係","s":"厚生労働大臣による資格、標準報酬又は保険給付に関する処分の取消しの訴えは、社会保険審査官の決定を経た後でなければ提起できません。","e":"障害厚生年金の不支給処分に不服がある場合、いきなり裁判所に訴えることはできず、まず社会保険審査官の決定を経る必要があります。","p":"「審査請求前置主義」。裁判を起こす前に審査請求が必要。ただし、審査請求から2か月以内に決定がないとき等は、決定を経なくても訴訟提起可能。再審査請求は経なくてもよい。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":15},{"r":"法92条","t":"時効","b":"◯1 保険料 その他厚生年金保険法の規定による 徴収金 を徴収 し、又はその 還付 を受ける権利 は、これらを行使することができる時から 2年 を経過したとき、 保険給付 を受ける権利 は、その支給 すべき事由が生じた日から 5年 を経過したとき、当該権利に基づき 支払期月ごとに支払うものとされる 保険給付 の支給を受ける権利 は、当該日の属する月の翌月以後に到来する当該保険給付の支給に係る第36 条第3項本文に規定する支払期月の翌月の初日から 5年 を経過したとき、 保険給付 の返還を受ける権利 は、これを行使することができる時から 5年 を経過したときは、 時効によって 、消滅する 。 ◯2 保険料 その他厚生年金保険法の規定による 徴収金 を徴収 し、若しくはその 還付 を受ける 権利又は保険給付 の返還 を受ける権利 の時効については、その 援用を要せず 、又、その 利益を放 棄することができない ものとする。 ◯3 年金たる保険給付を受ける権利 の時効は、当該 年金たる保険給付 がその 全額 につき 支給を停止 され ている間は、 進行しない 。 ◯4 保険料 その他厚生年金保険法の規定による 徴収金 の納入の告知 又は 督促 は、時効の更新の効力 を有する 。 時効","s":"保険料等の徴収権・還付請求権は2年、保険給付を受ける権利は5年で時効消滅します。時効の援用は不要で、利益の放棄もできません。","e":"5年前の未請求の老齢厚生年金がある場合、5年分までは遡って請求できますが、それ以前の分は時効により受け取れません。","p":"徴収権・還付請求権は「2年」、給付を受ける権利は「5年」。「援用不要」「利益の放棄不可」（絶対的消滅時効）。国民年金・健康保険も同様。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":16},{"r":"法96条","t":"受給権者に対する調査","b":"◯1 実施機関 は、必要があると認めるときは、 年金たる保険給付の受給権者 に対して、その者の 身分 関係 、障害の状態 その他受給権の 消滅 、年金額の 改定 若しくは支給の 停止 に係る事項に 関する書類その他の 物件の提出 を命じ、又は当該職員をしてこれらの事項に関し受給権者に 質問させることが できる。 受給権者に関する調査など 実施機関 は、必要があると認めるときは、 年金たる保険給付の受給権者 に対して、その者の 身分関係 、障害 の状態 その他 受給権の消滅 、年金額の改定 若しくは 支給の停止 に係る事項に関する書類その他の 物件の提出 を 命じ、または当該職員をしてこれらの事項に関し受給権者に 質問させることができる。（法96条1項） 質問を行なう当該職員 は、その身分を示す 証票を携帯 し、かつ、関係者の請求があるときは、これを 提示し なければならない。（法96条2項） R07-10ｲ 実施機関 は、必要があると認めるときは、障害等級に該当する程度の 障害の状態にある ことによ り、年金たる保険給付の受給権 を有し、または法44条1項（老齢厚生年金の加給年金額）の規定によりその者 について加算が行われている 子に対して、その指定する 医師の診断 を受けるべきことを 命じ、または当該職員 をしてこれらの者の 障害の状態 を診断させることができる。 （法97条1項） 「無料で証明を行うことができる 」です。「無料で証明を行わなけ ればならない 」ではありません 。","s":"実施機関は、必要があると認めるときは、年金受給権者に対して身分関係、障害の状態等に関する書類の提出や診断を受けるよう命じることができます。","e":"障害厚生年金の受給者に対して、障害の状態を確認するための診断書の提出を求めることがあります。","p":"調査の対象は「受給権者」。「書類の提出」「診断受診」を命じることができる。正当な理由なく拒否すると支給停止の対象となる（法77条）。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":26},{"r":"則28条","t":"書類の保存","b":"事業主 は、その 厚生年金保険に関する書類 を、その 完結の日 から 2年間 、保存しなければならない。 書類の保存 R07-04B 事業主 は、その厚生年金保険に関する 書類を、その 完結の日から2年間 、保存しなければならな い。（則28条） 事業主 は、被保険者、被保険者であった者またはこれらの者の遺族から書類について 証明を求められた とき は、速やかに、 正確な証明をしなければならない 。（則27条）","s":"事業主は、厚生年金保険に関する書類を、その完結の日から2年間保存しなければなりません。","e":"被保険者の資格取得届の控えや報酬月額変更届の控えなどは、書類が完結した日から2年間保存する義務があります。","p":"保存期間は「2年間」。起算点は「完結の日」から。健康保険も同様に2年間。労働基準法の賃金台帳等は5年間（当分の間3年間）保存なので混同注意。","f":"24_厚生年金保険法24-積立金の運用等、不服申立て等","pg":30},{"r":"法58条","t":"遺族厚生年金の支給要件","b":"","s":"遺族厚生年金は、短期要件（被保険者の死亡等）又は長期要件（老齢厚生年金の受給権者等の死亡）に該当する場合に、遺族に支給されます。","e":"在職中に亡くなった場合（短期要件）、又は老齢厚生年金の受給資格期間を満たした人が亡くなった場合（長期要件）に、遺族に遺族厚生年金が支給されます。","p":"短期要件：①被保険者の死亡、②被保険者期間中の傷病で初診日から5年以内の死亡、③障害等級1・2級の障害厚生年金受給権者の死亡。長期要件：④老齢厚生年金の受給権者又は受給資格期間を満たした者の死亡。短期要件は保険料納付要件あり。","f":"","pg":0},{"r":"法60条","t":"遺族厚生年金の額","b":"","s":"遺族厚生年金の額は、死亡した者の老齢厚生年金の額の計算の例により計算した額の4分の3に相当する額です。","e":"夫の老齢厚生年金が年額200万円と計算される場合、遺族厚生年金は200万円×3/4＝150万円が基本額となります。","p":"額は「報酬比例部分の4分の3」。短期要件の場合、被保険者期間が300月未満のときは300月とみなして計算。長期要件の場合は実期間で計算。65歳以上の配偶者には経過的寡婦加算がある場合あり。","f":"","pg":0},{"r":"法61条","t":"遺族厚生年金と老齢厚生年金の併給調整","b":"","s":"65歳以上で遺族厚生年金と老齢厚生年金の受給権がある場合、老齢厚生年金が優先支給され、遺族厚生年金は老齢厚生年金との差額のみ支給されます。","e":"65歳の妻が自分の老齢厚生年金80万円と夫の遺族厚生年金150万円の権利がある場合、老齢厚生年金80万円が全額支給され、遺族厚生年金は差額の70万円が支給されます。","p":"2007年4月以降の仕組み。まず老齢厚生年金を全額支給し、遺族厚生年金は差額のみ支給。「遺族厚生年金の額と老齢厚生年金の額の差額」が遺族厚生年金として支給される。","f":"","pg":0},{"r":"法42条","t":"老齢厚生年金の支給要件","b":"","s":"老齢厚生年金は、被保険者期間を有する者が65歳に達したとき、老齢基礎年金の受給資格期間を満たしている場合に支給されます。","e":"厚生年金に1か月でも加入したことがあり、老齢基礎年金の受給資格期間（10年）を満たしていれば、65歳から老齢厚生年金が支給されます。","p":"要件：「被保険者期間を有する」＋「65歳に達した」＋「老齢基礎年金の受給資格期間を満たす」。被保険者期間は「1か月以上」でよい（特別支給は1年以上）。受給資格期間は10年。","f":"","pg":0},{"r":"法46条の在職老齢年金","t":"在職老齢年金","b":"","s":"被保険者である老齢厚生年金の受給権者について、総報酬月額相当額と基本月額の合計が支給停止調整額（50万円）を超える場合、年金の一部が支給停止されます。","e":"月給40万円＋年金月額15万円＝55万円の場合、50万円を超える5万円の半分（2.5万円）が支給停止されます。","p":"支給停止調整額は「50万円」（令和6年度）。計算式：停止額＝（総報酬月額相当額＋基本月額－50万円）×1/2。加給年金額は全額支給停止の場合のみ停止。65歳未満も65歳以上も同じ基準に統一された。","f":"","pg":0},{"r":"附則7条の4","t":"特別支給の老齢厚生年金の繰上げ","b":"","s":"特別支給の老齢厚生年金の受給開始年齢に達する前に、繰上げ支給を請求することができます。ただし減額されます。","e":"特別支給の老齢厚生年金の支給開始年齢が63歳の方が、60歳から繰上げ請求すると、減額された年金を60歳から受け取れます。","p":"繰上げ減額率は「月0.4%」（1962年4月2日以後生まれ）。繰上げは老齢基礎年金と同時に行う。繰上げ後は事後重症の障害年金が請求不可になるなどのデメリットあり。","f":"","pg":0},{"r":"附則9条の2","t":"定額部分と報酬比例部分","b":"","s":"特別支給の老齢厚生年金は、報酬比例部分と定額部分で構成されます。生年月日に応じて支給開始年齢が段階的に引き上げられています。","e":"昭和36年4月1日以前生まれの男性は65歳前から報酬比例部分のみの特別支給の老齢厚生年金を受給できますが、定額部分は段階的になくなりました。","p":"定額部分の支給開始年齢は段階的引上げにより、男性は1949年4月2日以後生まれは65歳から（定額部分なし）。報酬比例部分も段階的引上げ中。男女で5年のズレ。","f":"","pg":0},{"r":"法附則11条の6","t":"障害者・長期加入者の特例","b":"","s":"特別支給の老齢厚生年金の受給権者が、障害者（障害3級以上）であるか、被保険者期間が44年以上の長期加入者である場合、報酬比例部分に加え定額部分・加給年金額も支給されます。","e":"被保険者期間44年以上の方が60歳で退職した場合、通常は報酬比例部分のみですが、長期加入者の特例により定額部分と加給年金額も支給されます。","p":"特例の要件：「被保険者でないこと」＋「障害3級以上」or「被保険者期間44年（528月）以上」。在職中（被保険者中）は特例が適用されない。「44年」の数字が頻出。","f":"","pg":0},{"r":"法附則13条の4","t":"繰下げ支給の申出","b":"","s":"本来の老齢厚生年金は、66歳以降に繰下げの申出をすることで、増額された年金を受給できます。最大75歳まで繰下げ可能です。","e":"65歳で受給権を取得し、70歳で繰下げの申出をすると、5年分（0.7%×60月＝42%）増額された年金が支給されます。","p":"増額率は「月0.7%」、最大「84%増額」（75歳まで）。加給年金額は繰下げ待機中も増額計算の基礎に含まれない。在職老齢年金で支給停止される部分も増額対象外。老齢基礎年金と別々に繰下げ可能。","f":"","pg":0},{"r":"法3条","t":"実施機関","b":"","s":"厚生年金保険の業務を行う実施機関として、厚生労働大臣のほか、国家公務員共済組合連合会、地方公務員共済組合等、日本私立学校振興・共済事業団が規定されています。","e":"民間企業の厚生年金は厚生労働大臣（実務は日本年金機構）が担当し、公務員や私学教職員の厚生年金はそれぞれの共済組合等が担当します。","p":"実施機関は被保険者の種別に対応：第1号→厚生労働大臣、第2号→国共済連合会、第3号→地共済の組合等、第4号→私学共済。2015年の被用者年金一元化で共済も厚生年金に統合。","f":"","pg":0},{"r":"法6条の3","t":"任意適用事業所","b":"","s":"強制適用事業所でない事業所でも、従業員の2分の1以上の同意を得て、事業主が厚生労働大臣の認可を受ければ、適用事業所となることができます。","e":"従業員3人の個人経営の飲食店でも、2人以上の同意を得て申請すれば、厚生年金の適用事業所になれます。","p":"要件：「従業員の2分の1以上の同意」＋「事業主の申請」＋「厚生労働大臣の認可」。取消し（脱退）には「4分の3以上の同意」が必要。加入より脱退のハードルが高い。","f":"","pg":0},{"r":"法21条","t":"定時決定","b":"","s":"毎年7月1日現在の被保険者について、4月・5月・6月に受けた報酬の平均額により標準報酬月額を決定し、その年の9月から翌年8月まで適用します。","e":"4月25万円、5月28万円、6月26万円の給与をもらった場合、平均26.3万円を等級表に当てはめて標準報酬月額が決定され、9月から適用されます。","p":"決定時期は「7月1日」、算定基礎月は「4月・5月・6月」、適用期間は「9月～翌年8月」。6月1日～7月1日の間に資格取得した者は対象外。報酬支払基礎日数17日未満の月は除く。","f":"","pg":0},{"r":"法23条","t":"随時改定","b":"","s":"報酬に著しい変動があり、固定的賃金の変動から3か月間の平均と現在の標準報酬月額に2等級以上の差がある場合、4か月目から標準報酬月額が改定されます。","e":"基本給が大幅に上がり、3か月間の平均報酬が現在の標準報酬月額より2等級以上高くなった場合、4か月目から新しい標準報酬月額に改定されます。","p":"要件：「固定的賃金の変動」＋「継続した3月間」＋「2等級以上の差」＋「3月とも報酬支払基礎日数17日以上」。改定は「4か月目」から。随時改定と定時決定の違いが頻出。","f":"","pg":0},{"r":"法23条の2","t":"育児休業等終了時改定","b":"","s":"育児休業等終了後に職場復帰し、報酬が下がった場合、申出により標準報酬月額を改定できます。随時改定の2等級以上の差は不要です。","e":"育休から復帰して短時間勤務にした結果、給料が下がった場合、随時改定の要件を満たさなくても標準報酬月額を改定できます。","p":"要件は「育児休業等終了日の翌日の月以後3月間の平均」で改定。2等級以上の差は不要（1等級でもOK）。「申出」が必要。3歳未満の子の養育が要件。産前産後休業終了時改定も同様の仕組み。","f":"","pg":0},{"r":"法23条の3","t":"産前産後休業終了時改定","b":"","s":"産前産後休業終了後に報酬が下がった場合、申出により標準報酬月額を改定できます。育児休業等終了時改定と同様の仕組みです。","e":"産休から復帰して短時間勤務にした場合、随時改定の要件を満たさなくても標準報酬月額の改定が可能です。","p":"産前産後休業終了時改定は育児休業等終了時改定と並列の規定。2等級以上の差は不要。「申出」が必要。産前産後休業終了日の翌日から起算して2月を経過した日の属する月の翌月から改定。","f":"","pg":0},{"r":"法22条","t":"資格取得時決定","b":"","s":"被保険者の資格を取得した際に、報酬月額に基づいて標準報酬月額が決定されます。この決定はその年の8月まで（6月1日以後の取得は翌年の8月まで）適用されます。","e":"4月1日に入社した場合、入社時の給与をもとに標準報酬月額が決定され、8月まで適用されます。7月1日入社の場合は翌年8月まで適用されます。","p":"適用期間：1月～5月取得→その年の8月まで、6月～12月取得→翌年の8月まで。次の定時決定まで適用される仕組み。見込み報酬で決定する。","f":"","pg":0},{"r":"法24条","t":"報酬月額の算定特例","b":"","s":"通常の方法で報酬月額を算定しがたい場合は、都道府県の報酬に比準して厚生労働大臣が算定した額を報酬月額とします。","e":"歩合給のみで月ごとの報酬が大きく変動する場合など、通常の方法では報酬月額を適切に算定できない場合に、厚生労働大臣が特例的に算定します。","p":"「算定し難いとき」の特例。「都道府県の報酬に比準」して算定。実務では滅多に使われないが、試験では出題されることがある。","f":"","pg":0},{"r":"法58条の短期要件・長期要件","t":"短期要件と長期要件の区別","b":"","s":"遺族厚生年金の支給事由は短期要件と長期要件に分かれ、計算方法や加算の要件が異なります。短期要件は300月みなしがあり、長期要件は実期間で計算します。","e":"在職中の死亡（短期要件）の場合、被保険者期間が300月未満でも300月として計算するため、年金額が高くなることがあります。一方、退職後に老齢年金受給中の死亡（長期要件）は実期間で計算します。","p":"短期要件：300月みなし計算あり、中高齢寡婦加算に240月要件なし。長期要件：実期間で計算、中高齢寡婦加算に240月以上の被保険者期間が必要。短期・長期の両方に該当する場合は短期要件が優先（別段の申出がない限り）。","f":"","pg":0}],"社会保険一般常識":[{"r":"社労士法1条","t":"社会保険労務士の目的","b":"","s":"社会保険労務士は、労働・社会保険に関する法令の円滑な実施を通じて、適切な労務管理の確立と、個人の尊厳が保持された適正な労働環境の形成に寄与することを使命としています。","e":"企業の労務管理をサポートし、従業員の社会保険手続きや就業規則の作成・届出を行うことで、会社と従業員の双方にとって良い労働環境づくりに貢献します。","p":"目的の3つの柱：「法令の円滑な実施」「適切な労務管理の確立」「個人の尊厳が保持された適正な労働環境の形成」。「国民生活の向上」ではない点に注意。","f":"","pg":0},{"r":"社労士法1条の2","t":"社会保険労務士の職責","b":"","s":"社会保険労務士は、常に品位を保持し、業務に関する法令・実務に精通して、公正な立場で誠実に業務を行わなければなりません。","e":"社労士が顧問先の会社から「残業代を払わなくて済む方法を教えて」と頼まれても、違法な方法を教えることはできません。公正な立場で法令に基づいたアドバイスをする義務があります。","p":"キーワードは「品位の保持」「法令及び実務に精通」「公正な立場」「誠実」。弁護士法の「社会正義の実現」とは異なる表現。","f":"","pg":0},{"r":"社労士法2条の2","t":"社会保険労務士の補佐人制度","b":"","s":"社会保険労務士は、労務管理や社会保険に関する事項について、裁判所において補佐人として出頭し、陳述することができます。","e":"労働事件の裁判で、弁護士と一緒に社労士が補佐人として法廷に出頭し、社会保険や労務管理の専門知識に基づいて意見を述べることができます。","p":"補佐人制度は「裁判所」における出頭・陳述。弁護士と「共に」出頭する（単独では代理できない）。社労士の陳述は当事者本人の陳述とみなされる。","f":"","pg":0},{"r":"社労士法3条","t":"資格","b":"","s":"社会保険労務士試験に合格し、労働社会保険諸法令に関する事務に通算2年以上従事した者、又は厚生労働大臣がこれと同等以上の経験を有すると認めた者が社労士となる資格を有します。","e":"社労士試験に合格しても、すぐには社労士になれません。企業の人事部で2年以上社会保険の手続き業務を行うなど、実務経験が必要です。","p":"資格要件：「試験合格」＋「2年以上の実務経験（又は事務指定講習の修了）」。実務経験は「通算して2年以上」であり連続でなくてもよい。","f":"","pg":0},{"r":"社労士法5条","t":"欠格事由","b":"","s":"未成年者、破産者で復権を得ない者、懲戒処分を受けた者（一定期間内）、禁錮以上の刑に処せられた者（一定期間内）などは、社労士となる資格を有しません。","e":"社労士試験に合格しても、禁錮以上の刑に処せられて3年を経過していない場合は、社労士として登録できません。","p":"欠格事由：未成年者、破産者で復権を得ない者、懲戒処分後の一定期間内の者、禁錮以上の刑（執行終了等から3年未経過）。「成年被後見人」「被保佐人」は含まれない（2019年改正で削除）。","f":"","pg":0},{"r":"社労士法15条","t":"不正行為の指示等の禁止","b":"","s":"社会保険労務士は、不正に保険給付を受けること、不正に保険料の賦課・徴収を免れること、その他の不正行為について指示・相談に応じてはなりません。","e":"「架空の離職票を作って失業給付を受けたい」という相談に応じることは、社労士法で明確に禁止されています。","p":"禁止される行為：不正受給の指示、保険料免脱の指示、その他不正行為への関与。違反すると懲戒処分の対象。社労士でない者（いわゆるニセ社労士）にも適用される規定がある。","f":"","pg":0},{"r":"社労士法17条","t":"帳簿の備付け及び保存","b":"","s":"社会保険労務士又は社労士法人は、申請書等を作成した場合、その基礎となった事項を記録した帳簿を備え、関係書類とともに保存しなければなりません。","e":"社労士が顧問先の社会保険関係の届出書を作成した場合、その根拠となった賃金台帳のコピーなどを帳簿と一緒に保存しておく必要があります。","p":"帳簿の保存義務。保存期間は「その関閉後2年間」。申請書等は「厚生労働省令で定めるもの」に限る。","f":"","pg":0},{"r":"社労士法22条","t":"業務を行い得ない事件","b":"","s":"社会保険労務士は、公務員として職務上取り扱った事件や仲裁人として取り扱った事件については、業務を行ってはなりません。","e":"元年金事務所の職員だった社労士が、在職中に担当した特定の年金相談案件について、退職後に社労士として業務を行うことはできません。","p":"「公務員として職務上取り扱った事件」と「仲裁人として取り扱った事件」が対象。利益相反の防止規定。社労士法人の場合は社員の1人が制限を受ける場合、法人全体で制限。","f":"","pg":0},{"r":"社労士法24条","t":"報告及び検査","b":"","s":"厚生労働大臣は、開業社労士又は社労士法人の業務の適正な運営を確保するため、報告を求め、又は事務所に立入検査を行うことができます。","e":"厚生労働大臣が社労士事務所に対して「帳簿や書類を見せてください」と検査に来ることがあります。これは業務の適正さを確認するためです。","p":"監督権限は「厚生労働大臣」に帰属。対象は「開業社労士」と「社労士法人」。勤務社労士は対象外。立入検査の権限あり。","f":"","pg":0},{"r":"社労士法25条","t":"懲戒処分","b":"","s":"社会保険労務士に対する懲戒処分は、戒告、1年以内の業務停止、失格処分の3種類です。","e":"社労士が不正行為を行った場合、軽い順に「戒告」（注意）、「業務停止」（最長1年間業務禁止）、「失格処分」（社労士資格の剥奪）の処分を受けます。","p":"3種類：「戒告」「1年以内の業務停止」「失格処分」。処分権者は「厚生労働大臣」。失格処分を受けると3年間は社労士になれない。弁護士の懲戒（戒告・業務停止・退会命令・除名）との違い。","f":"","pg":0},{"r":"社労士法25条の10","t":"社会保険労務士法人の登記","b":"","s":"社会保険労務士法人は、政令で定めるところにより、登記をしなければなりません。","e":"社労士が法人を設立する場合、法務局で登記を行う必要があります。","p":"社労士法人は「登記」が設立要件。弁護士法人等と同様の仕組み。","f":"","pg":0},{"r":"社労士法25条の11","t":"社会保険労務士法人の設立手続","b":"","s":"社会保険労務士法人を設立するには、社員になろうとする社会保険労務士が定款を定めなければなりません。","e":"3人の社労士が共同で法人を設立する場合、まず3人で定款を作成します。社員は社労士でなければなりません。","p":"社労士法人の社員は「社会保険労務士」でなければならない。設立には「定款」の作成が必要。社員は1人でも設立可能（1人法人OK）。","f":"","pg":0},{"r":"社労士法25条の9","t":"社会保険労務士法人の業務範囲","b":"","s":"社会保険労務士法人は、紛争解決手続代理業務を除く1号業務、2号業務及び3号業務を行うことができます。紛争解決手続代理業務は特定社労士である社員がいる場合に限り可能です。","e":"社労士法人は、社会保険の届出代行（1号業務）、就業規則の作成（2号業務）、コンサルティング（3号業務）を行えます。あっせん代理は特定社労士がいる場合に限られます。","p":"1号業務（手続代行）、2号業務（帳簿書類作成）、3号業務（コンサルティング）の区別。紛争解決手続代理業務は「特定社員」がいる事務所に限定。","f":"","pg":0},{"r":"社労士法25条の9の2","t":"補佐人業務を行う社労士法人","b":"","s":"社会保険労務士法人は、補佐人制度により社労士が処理できる事務を、法人として行うことができます。","e":"社労士法人として、労働事件の裁判に補佐人として社員を派遣し、法廷で専門的な陳述を行うことができます。","p":"社労士法人でも補佐人業務が可能。法25条の9の業務に加えて行える追加業務。","f":"","pg":0},{"r":"社労士法25条の16","t":"社員の常駐","b":"","s":"社会保険労務士法人の事務所には、その事務所の所在地の都道府県に設立されている社会保険労務士会の会員である社員を常駐させなければなりません。","e":"東京に事務所がある社労士法人は、東京都社会保険労務士会の会員である社員を常に勤務させる必要があります。","p":"「都道府県」ごとの社労士会の会員であることが必要。「常駐」が要件。複数事務所の場合、各事務所にそれぞれ常駐社員が必要。","f":"","pg":0},{"r":"社労士法25条の18","t":"社員の競業禁止","b":"","s":"社会保険労務士法人の社員は、自己又は第三者のために法人の業務範囲に属する業務を行ったり、他の社労士法人の社員になってはなりません。ただし、他の社員全員の承認がある場合は可能です。","e":"社労士法人Aの社員が、個人で別のクライアントの社会保険手続きを行うことは、他の社員全員の承認がない限り禁止されています。","p":"競業禁止の規定。例外は「他の社員全員の承認」。合名会社の社員の競業禁止と同様の趣旨。","f":"","pg":0},{"r":"社労士法25条の22","t":"社会保険労務士法人の解散事由","b":"","s":"社会保険労務士法人は、定款に定める理由の発生、総社員の同意、合併、破産手続開始の決定、解散命令、社員の欠亡によって解散します。","e":"社労士法人の社員が全員退社して社員がいなくなった場合（社員の欠亡）、法人は解散します。","p":"解散事由：定款の定め、総社員の同意、合併、破産、解散命令、社員の欠亡。「社員が1人になった」だけでは解散しない（1人法人OK）。「欠亡」＝社員が0人。","f":"","pg":0},{"r":"社労士法25条の26","t":"社会保険労務士会","b":"","s":"社会保険労務士は、厚生労働大臣の認可を受けて、都道府県の区域ごとに1個の社会保険労務士会を設立しなければなりません。","e":"東京には東京都社会保険労務士会が1つだけあり、東京で開業する社労士は全員この会に入会する必要があります。","p":"「都道府県ごとに1個」の強制設立。設立には「厚生労働大臣の認可」が必要。開業社労士は必ず入会（強制入会）。社労士会は法人。","f":"","pg":0},{"r":"社労士法25条の34","t":"全国社会保険労務士会連合会","b":"","s":"全国の社会保険労務士会は、厚生労働大臣の認可を受けて、会則を定めて連合会を設立しなければなりません。連合会は社会保険労務士の品位保持や資質向上のための指導・連絡を行います。","e":"全国社会保険労務士会連合会は、社労士試験の実施事務や社労士の登録事務など、全国的な業務を一括して行う団体です。","p":"設立には「厚生労働大臣の認可」。連合会は社労士会の「会員」の品位保持、資質向上の指導・連絡を行う。社労士の登録事務は連合会が行う。","f":"","pg":0},{"r":"国保法2条","t":"国民健康保険の目的","b":"","s":"国民健康保険は、被保険者の疾病、負傷、出産又は死亡に関して必要な保険給付を行うものです。","e":"自営業者やフリーランスの方が病気やケガをした場合、国民健康保険から医療費の7割が給付されます。出産の場合は出産育児一時金が支給されます。","p":"保険事故は「疾病・負傷・出産・死亡」の4つ。健康保険と異なり「傷病手当金」や「出産手当金」は任意給付。国保には「老齢」は含まれない。","f":"","pg":0},{"r":"国保法83条","t":"国民健康保険団体連合会の設立","b":"","s":"都道府県・市町村又は組合は、共同してその目的を達成するため、国民健康保険団体連合会を設立することができます。","e":"各都道府県に1つずつ国民健康保険団体連合会（国保連）があり、レセプトの審査や保険者間の調整などを行っています。","p":"設立は「任意」（「できる」規定）。都道府県・市町村・組合が共同で設立。介護保険の審査支払業務も国保連が行っている。","f":"","pg":0},{"r":"国保法84条","t":"国民健康保険団体連合会の認可","b":"","s":"連合会を設立しようとするときは、都道府県知事の認可を受けなければなりません。","e":"ある都道府県内の市町村が共同で国保連を設立する場合、その都道府県の知事の認可が必要です。","p":"認可権者は「都道府県知事」（厚生労働大臣ではない）。設立だけでなく規約変更等にも認可が必要。","f":"","pg":0},{"r":"国保法85条の2","t":"連合会の業務（公正・中立性）","b":"","s":"連合会は、診療報酬請求書の審査における公正性・中立性の確保を通じた保健医療の向上及び福祉の増進、診療報酬請求書情報等の分析等の業務を行います。","e":"国保連は、医療機関から提出されたレセプト（診療報酬請求書）が適正かどうかを公正な立場で審査し、過剰な医療費の請求がないかチェックしています。","p":"「公正性及び中立性の確保」が強調される。レセプト審査だけでなく情報分析等も業務に含まれる。","f":"","pg":0},{"r":"国保法9条","t":"届出義務","b":"","s":"世帯主は、その世帯に属する被保険者の資格の取得・喪失に関する事項等を市町村に届け出なければなりません。","e":"会社を退職して国民健康保険に加入する場合、世帯主が市区町村役場に届け出ます。届出義務者は加入する本人ではなく「世帯主」です。","p":"届出義務者は「世帯主」（被保険者本人ではない）。届出先は「市町村」。世帯主自身が被保険者でなくても届出義務を負う（擬制世帯主）。","f":"","pg":0},{"r":"国保法82条の2","t":"都道府県国民健康保険運営方針","b":"","s":"都道府県は、国民健康保険の安定的な財政運営と市町村の国保事業の広域的・効率的な運営の推進を図るため、国民健康保険運営方針を定めます。","e":"都道府県が「今後5年間の保険料率の統一に向けた方針」などを定め、市町村の国保運営を広域的に調整します。","p":"2018年度から都道府県が国保の財政運営の責任主体に。運営方針は都道府県が策定。市町村との役割分担（都道府県＝財政運営、市町村＝資格管理・保険料徴収等）が重要。","f":"","pg":0},{"r":"国保法73条の2","t":"出産育児一時金に係る費用の負担","b":"","s":"出産育児一時金の支給に要する費用について規定しています。健康保険法の政令で定める金額を基準とします。","e":"国民健康保険でも出産育児一時金が支給されます。金額は健康保険と同じく原則50万円です。","p":"出産育児一時金の金額は健康保険法の政令で定める金額が基準。条例・規約で上乗せ可能。産科医療補償制度の掛金を含む。","f":"","pg":0},{"r":"国保法75条の2","t":"都道府県の財政調整","b":"","s":"都道府県は、保険給付の実施等の円滑かつ確実な実施を図り、市町村の財政状況等に応じた財政の調整を行うため、都道府県繰入金を交付します。","e":"財政基盤の弱い市町村に対して、都道府県が財政調整交付金を交付し、市町村間の財政力の格差を是正します。","p":"都道府県が「財政の調整」を行う。2018年改革で都道府県が財政運営の責任主体に。都道府県繰入金の仕組み。","f":"","pg":0},{"r":"国保法75条の7","t":"国民健康保険事業費納付金","b":"","s":"都道府県は、国民健康保険保険給付費等交付金の交付に要する費用等を賄うため、市町村から国民健康保険事業費納付金を徴収します。","e":"各市町村は、都道府県に対して事業費納付金を納め、都道府県はそれをもとに各市町村に保険給付費等交付金を交付する仕組みです。","p":"2018年改革の核心部分。市町村→都道府県に「納付金」を納付、都道府県→市町村に「交付金」を交付するサイクル。","f":"","pg":0},{"r":"国保法76条","t":"保険料","b":"","s":"市町村は、国民健康保険事業費納付金の納付に要する費用等に充てるため、世帯主から保険料を徴収しなければなりません。ただし、保険料に代えて保険税として徴収できます。","e":"市町村は、国民健康保険に加入する世帯の世帯主から、所得や世帯人数に応じた保険料（又は保険税）を徴収します。","p":"徴収対象者は「世帯主」。保険料と保険税の選択制。保険税の場合は地方税法が適用され、時効が5年（保険料は2年）となるなどの違いがある。","f":"","pg":0},{"r":"国保法63条の2","t":"資格証明書交付世帯の給付制限","b":"","s":"保険料を滞納して資格証明書の交付を受けている世帯主等で、保険給付の全部又は一部の支払を一時差し止められている場合、さらに滞納保険料を差し引くことができます。","e":"保険料を長期滞納して資格証明書で受診している方は、医療費がいったん全額自己負担となり、さらに滞納分が差し引かれることがあります。","p":"資格証明書＝被保険者証の返還後に交付。全額自己負担→後から申請で給付を受けるが、滞納保険料と相殺される。段階的な制裁措置の流れを理解する。","f":"","pg":0},{"r":"国保法103条","t":"審査請求前置","b":"","s":"市町村等の処分の取消しの訴えは、審査請求に対する裁決を経た後でなければ提起することができません。","e":"国保の保険料の賦課処分に不服がある場合、いきなり裁判所に訴えるのではなく、まず審査請求（都道府県の国保審査会等）を行う必要があります。","p":"審査請求前置主義。裁判の前に審査請求が必要。国保審査会が審査請求を処理。処分の日の翌日から3か月以内に審査請求。","f":"","pg":0},{"r":"国保法110条","t":"時効","b":"","s":"保険料等の徴収権・還付請求権及び保険給付を受ける権利は、行使できる時から2年で時効消滅します。","e":"国民健康保険の高額療養費の請求を忘れていた場合、2年以内であれば遡って請求できますが、2年を過ぎると時効で消滅します。","p":"徴収権・還付権・給付を受ける権利いずれも「2年」。厚生年金（給付5年・徴収2年）や健康保険（給付2年・徴収2年）との比較が出る。保険税の場合は地方税法の5年が適用。","f":"","pg":0},{"r":"高齢者医療確保法32条","t":"前期高齢者交付金・納付金","b":"","s":"社会保険診療報酬支払基金は、各保険者から前期高齢者納付金を徴収し、前期高齢者が多い保険者に前期高齢者交付金を交付する仕組みを運営します。","e":"国民健康保険は高齢者が多いため医療費がかさみますが、前期高齢者交付金を受け取ることで、保険者間の負担が調整されます。","p":"前期高齢者（65歳～74歳）の医療費の保険者間調整。支払基金が調整の事務を行う。前期高齢者の偏在による保険者間の負担の不均衡を調整する仕組み。","f":"","pg":0},{"r":"高齢者医療確保法36条","t":"前期高齢者納付金","b":"","s":"支払基金は、前期高齢者交付金の交付業務等に要する費用に充てるため、年度ごとに保険者から前期高齢者納付金を徴収します。","e":"健康保険組合などの保険者は、毎年、前期高齢者の医療費調整のための納付金を支払基金に納めます。","p":"徴収は「年度ごと」。納付義務者は「保険者」。支払基金が徴収・交付の事務を行う。概算納付金と確定納付金の仕組み。","f":"","pg":0},{"r":"高齢者医療確保法8条","t":"医療費適正化計画","b":"","s":"厚生労働大臣は、国民の高齢期における適切な医療の確保の観点から、医療費適正化を総合的かつ計画的に推進するため、医療費適正化に関する計画を定めます。","e":"国が「今後6年間で特定健診の受診率を70%にする」などの目標を定め、医療費の適正化を計画的に推進します。","p":"計画期間は「6年」。全国医療費適正化計画（厚生労働大臣）と都道府県医療費適正化計画（都道府県）の2層構造。特定健診・特定保健指導の実施目標が含まれる。","f":"","pg":0},{"r":"高齢者医療確保法18条","t":"特定健康診査等基本指針","b":"","s":"厚生労働大臣は、特定健康診査及び特定保健指導の適切かつ有効な実施を図るための基本的な指針を定めます。","e":"メタボ健診（特定健康診査）の実施方法や保健指導のやり方などの基本方針を、厚生労働大臣が定めます。","p":"指針を定めるのは「厚生労働大臣」。特定健康診査と特定保健指導の実施に関する基本指針。医療費適正化計画との連携。","f":"","pg":0},{"r":"高齢者医療確保法19条","t":"特定健康診査等実施計画","b":"","s":"保険者は、特定健康診査等基本指針に即して、特定健康診査等実施計画を定めるものとします。国民健康保険の場合は市町村が定めます。","e":"健康保険組合が「来年度の特定健診の受診率目標は80%」などと具体的な実施計画を策定します。","p":"実施計画を定めるのは「保険者」（国保の場合は市町村）。基本指針に「即して」定める。計画期間は基本指針で定められる。","f":"","pg":0},{"r":"高齢者医療確保法20条","t":"特定健康診査の実施","b":"","s":"保険者は、特定健康診査等実施計画に基づき、40歳以上の加入者に対し特定健康診査を行います。","e":"40歳以上の健康保険加入者は、毎年メタボ健診（特定健康診査）を受けることができます。保険者に実施義務があります。","p":"対象は「40歳以上」の加入者。保険者に実施義務。他の健診で代替可能（「相当する健康診査を受けた場合は除く」）。被扶養者も対象（40歳以上）。","f":"","pg":0},{"r":"高齢者医療確保法47条","t":"後期高齢者医療の目的","b":"","s":"後期高齢者医療は、高齢者の疾病、負傷又は死亡に関して必要な給付を行うものです。","e":"75歳以上の高齢者が病院にかかった場合、後期高齢者医療制度から医療費の給付が行われます。自己負担は原則1割です。","p":"保険事故は「疾病・負傷・死亡」の3つ（「出産」は含まれない）。健康保険・国保との違い。後期高齢者医療制度は2008年4月に創設。","f":"","pg":0},{"r":"高齢者医療確保法48条","t":"後期高齢者医療広域連合","b":"","s":"市町村は、後期高齢者医療の事務を処理するため、都道府県の区域ごとに全ての市町村が加入する広域連合を設けなければなりません。","e":"東京都内の全市区町村が東京都後期高齢者医療広域連合に加入し、後期高齢者医療の運営を行います。","p":"「全ての市町村が加入」する広域連合（強制加入）。「都道府県の区域ごと」に設置。保険料の徴収は市町村が行う。広域連合が保険者。","f":"","pg":0},{"r":"高齢者医療確保法50条","t":"後期高齢者医療の被保険者","b":"","s":"後期高齢者医療広域連合の区域内に住所を有する75歳以上の者、又は65歳以上75歳未満の一定の障害の状態にある者で広域連合の認定を受けた者が被保険者となります。","e":"75歳の誕生日を迎えると、自動的に後期高齢者医療制度の被保険者になります。65歳以上で重い障害がある場合は、申請により加入できます。","p":"被保険者：①75歳以上の者（当然加入）、②65歳以上75歳未満で一定の障害の状態にある者（広域連合の認定が必要）。生活保護受給者は適用除外。②は「認定」であり「届出」ではない。","f":"","pg":0},{"r":"高齢者医療確保法118条","t":"後期高齢者支援金","b":"","s":"社会保険診療報酬支払基金は、後期高齢者医療に要する費用に充てるため、年度ごとに保険者から後期高齢者支援金を徴収します。","e":"現役世代が加入する健康保険組合などから、後期高齢者医療制度を支えるための支援金が毎年徴収されます。これが後期高齢者医療の財源の約4割を占めます。","p":"支援金は「保険者」から徴収。支払基金が徴収事務を行う。後期高齢者医療の財源構成：公費約5割、支援金約4割、保険料約1割。","f":"","pg":0},{"r":"高齢者医療確保法160条","t":"時効","b":"","s":"保険料等の徴収権・還付請求権及び後期高齢者医療給付を受ける権利は、行使できる時から2年で時効消滅します。","e":"後期高齢者医療の高額療養費の請求を2年間行わなかった場合、時効により請求権が消滅します。","p":"徴収権・還付権・給付を受ける権利いずれも「2年」。国保と同じ。厚生年金の給付の時効（5年）との違いに注意。","f":"","pg":0},{"r":"介護保険法10条","t":"介護保険の資格取得","b":"","s":"市町村が行う介護保険の被保険者は、一定の事由に該当した日から資格を取得します。市町村の区域内に住所を有する医療保険加入者（40歳到達）、65歳到達などが資格取得事由です。","e":"40歳になった会社員は、誕生日の前日に第2号被保険者の資格を取得します。65歳になると第1号被保険者に切り替わります。","p":"第1号被保険者：65歳以上の者（住所地の市町村）。第2号被保険者：40歳以上65歳未満の医療保険加入者。「住所を有するに至った日」「40歳に達した日（誕生日の前日）」「65歳に達した日」等が取得日。","f":"","pg":0},{"r":"介護保険法11条","t":"介護保険の資格喪失","b":"","s":"市町村が行う介護保険の被保険者は、市町村の区域内に住所を有しなくなった日の翌日に資格を喪失します。ただし、住所を有しなくなった日に他の市町村に住所を有するに至ったときは同日に喪失します。","e":"A市からB市に引っ越した場合、A市の被保険者資格はB市に住所を有するに至った日に喪失し、同日にB市の被保険者資格を取得します。","p":"喪失は原則「翌日」。例外的に「同日」喪失（他市町村に転入した場合）。死亡の場合は翌日。医療保険加入者でなくなった場合は「翌日」喪失（第2号被保険者の場合）。","f":"","pg":0},{"r":"介護保険法12条","t":"届出義務","b":"","s":"第1号被保険者は、資格の取得・喪失に関する事項等を市町村に届け出なければなりません。ただし、65歳到達による資格取得の届出は不要です。","e":"転入により新たに介護保険の第1号被保険者になった場合は届出が必要ですが、65歳の誕生日を迎えて第1号被保険者になる場合は届出不要です。","p":"届出義務者は「第1号被保険者」本人。第2号被保険者には届出義務なし（医療保険者を通じて把握）。65歳到達は届出不要（市町村が住基情報で把握）。","f":"","pg":0},{"r":"介護保険法27条","t":"要介護認定の処理期間","b":"","s":"要介護認定の申請に対する処分は、申請のあった日から30日以内にしなければなりません。ただし、調査に日時を要する場合は延期し、その理由と処理見込期間を通知します。","e":"介護が必要になった方が市役所に要介護認定を申請すると、原則30日以内に「要介護1」などの認定結果が通知されます。","p":"処理期間は「30日以内」。延期する場合は「理由」と「処理見込期間」の通知が必要。認定の有効期間は原則12か月（新規6か月）。","f":"","pg":0},{"r":"介護保険法40条","t":"介護給付の種類","b":"","s":"介護給付は、居宅介護サービス費、施設介護サービス費、高額介護サービス費など多岐にわたる保険給付で構成されます。","e":"要介護3の方がデイサービスを利用すると居宅介護サービス費が、特別養護老人ホームに入所すると施設介護サービス費が支給されます。","p":"介護給付は「要介護者」が対象。居宅サービス、地域密着型サービス、施設サービスなど多数の給付がある。「要介護1～5」の認定が必要。予防給付（要支援者向け）とは区別する。","f":"","pg":0},{"r":"介護保険法52条","t":"予防給付の種類","b":"","s":"予防給付は、介護予防サービス費、地域密着型介護予防サービス費、高額介護予防サービス費などの保険給付で構成されます。","e":"要支援2の方が介護予防通所リハビリテーションを利用すると、介護予防サービス費が支給されます。","p":"予防給付は「要支援者」（要支援1・2）が対象。介護予防サービス、地域密着型介護予防サービスなどが含まれる。施設サービスは予防給付に含まれない（要介護者のみ）。","f":"","pg":0}]};
const S=["労働基準法","労働安全衛生法","労災保険法","雇用保険法","労働保険徴収法","労働一般常識","健康保険法","国民年金法","厚生年金保険法","社会保険一般常識"];
let cur=null,allE=false,curFilter='all';
// localStorage for bookmarks & progress
function getStore(){try{return JSON.parse(localStorage.getItem('sharoushi_data')||'{}');}catch(e){return {};}}
function setStore(d){localStorage.setItem('sharoushi_data',JSON.stringify(d));}
function key(subj,ref){return subj+'::'+ref;}
function isBookmarked(subj,ref){const d=getStore();return !!(d[key(subj,ref)]&&d[key(subj,ref)].bm);}
function isLearned(subj,ref){const d=getStore();return !!(d[key(subj,ref)]&&d[key(subj,ref)].ln);}
function toggleBookmark(subj,ref,el){const d=getStore();const k=key(subj,ref);if(!d[k])d[k]={};d[k].bm=!d[k].bm;setStore(d);el.classList.toggle('on',d[k].bm);el.closest('.ai').classList.toggle('bookmarked',d[k].bm);}
function toggleLearned(subj,ref,el){const d=getStore();const k=key(subj,ref);if(!d[k])d[k]={};d[k].ln=!d[k].ln;setStore(d);el.classList.toggle('on',d[k].ln);el.closest('.ai').classList.toggle('learned',d[k].ln);updateSubjectGrid();}
function countLearned(subj){const d=getStore();let c=0;(D[subj]||[]).forEach(a=>{const k=key(subj,a.r);if(d[k]&&d[k].ln)c++;});return c;}
function resetProgress(){setStore({});navTo('progress');}

function init(){buildGrid();document.getElementById('gs').addEventListener('input',onGS);document.getElementById('ss').addEventListener('input',onSS);}
function buildGrid(){const g=document.getElementById('sgrid');g.innerHTML='';S.forEach(s=>{const c=(D[s]||[]).length;const ln=countLearned(s);const pct=c?Math.round(ln/c*100):0;const b=document.createElement('div');b.className='sb';b.innerHTML=s+'<span class="cnt">'+c+'条文</span><div class="prog"><div class="prog-bar" style="width:'+pct+'%"></div></div><span class="prog-txt">'+ln+'/'+c+' ('+pct+'%)</span>';b.onclick=()=>showSubject(s);g.appendChild(b);});}
function updateSubjectGrid(){buildGrid();}
function navTo(view){const app=document.querySelector('.app');app.dataset.view=view;cur=null;document.querySelectorAll('.hd-nav button').forEach(b=>b.classList.remove('hn-act'));const idx={top:0,bookmarks:1,progress:2}[view];if(idx!==undefined)document.querySelectorAll('.hd-nav button')[idx].classList.add('hn-act');if(view==='bookmarks')renderBookmarks();if(view==='progress')renderProgress();if(view==='top')updateSubjectGrid();}
function showSubject(n){cur=n;curFilter='all';document.querySelector('.app').dataset.view='subject';document.getElementById('stitle').textContent=n;document.getElementById('ss').value='';allE=false;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('factive'));document.querySelector('.filter-btn').classList.add('factive');render(D[n]||[]);}
function setFilter(f){curFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('factive'));event.target.classList.add('factive');applyFilter();}
function applyFilter(){if(!cur)return;let arts=D[cur]||[];const q=document.getElementById('ss').value.trim().toLowerCase();if(q.length>=2)arts=arts.filter(a=>(a.r+a.t+a.s+a.e+a.p+(a.b||'')).toLowerCase().includes(q));if(curFilter==='bookmarked')arts=arts.filter(a=>isBookmarked(cur,a.r));else if(curFilter==='learned')arts=arts.filter(a=>isLearned(cur,a.r));else if(curFilter==='unlearned')arts=arts.filter(a=>!isLearned(cur,a.r));render(arts);}
function render(arts){const l=document.getElementById('alist');const subj=cur;document.getElementById('sstats').textContent=arts.length+'件の条文';l.innerHTML='';arts.forEach(a=>{const li=document.createElement('li');const bm=isBookmarked(subj,a.r);const ln=isLearned(subj,a.r);li.className='ai'+(bm?' bookmarked':'')+(ln?' learned':'');li.innerHTML='<div class="ah" onclick="tog(this)"><span class="ar">'+e(a.r)+'</span><span class="at">'+e(a.t)+'</span><span class="a-icons"><span class="a-bm'+(bm?' on':'')+'" onclick="event.stopPropagation();toggleBookmark(\''+e(subj)+'\',\''+e(a.r)+'\',this)" title="ブックマーク">★</span><span class="a-ck'+(ln?' on':'')+'" onclick="event.stopPropagation();toggleLearned(\''+e(subj)+'\',\''+e(a.r)+'\',this)" title="学習済み">✓</span></span><span class="ag">▼</span></div><div class="ab">'+sc('やさしい日本語','s',a.s)+sc('身近な具体例','e',a.e)+sc('試験ポイント','p',a.p)+(a.b?sc('原文（テキストから抽出）','o',a.b):'')+(a.f?'<div class="si">📖 '+e(a.f)+(a.pg?' p.'+a.pg:'')+'</div>':'')+'</div>';l.appendChild(li);});}
function renderBookmarks(){const d=getStore();let hits=[];S.forEach(s=>(D[s]||[]).forEach(a=>{if(d[key(s,a.r)]&&d[key(s,a.r)].bm)hits.push({...a,subj:s});}));const el=document.getElementById('bmList');const empty=document.getElementById('bmEmpty');if(!hits.length){el.innerHTML='';empty.style.display='block';return;}empty.style.display='none';el.innerHTML='';hits.forEach(a=>{const li=document.createElement('li');const ln=isLearned(a.subj,a.r);li.className='ai bookmarked'+(ln?' learned':'');li.innerHTML='<div class="ah" onclick="tog(this)"><span class="ar">'+e(a.r)+'</span><span class="at">'+e(a.subj+' — '+a.t)+'</span><span class="a-icons"><span class="a-bm on" onclick="event.stopPropagation();toggleBookmark(\''+e(a.subj)+'\',\''+e(a.r)+'\',this)" title="ブックマーク">★</span><span class="a-ck'+(ln?' on':'')+'" onclick="event.stopPropagation();toggleLearned(\''+e(a.subj)+'\',\''+e(a.r)+'\',this)" title="学習済み">✓</span></span><span class="ag">▼</span></div><div class="ab">'+sc('やさしい日本語','s',a.s)+sc('身近な具体例','e',a.e)+sc('試験ポイント','p',a.p)+(a.b?sc('原文','o',a.b):'')+(a.f?'<div class="si">📖 '+e(a.f)+(a.pg?' p.'+a.pg:'')+'</div>':'')+'</div>';el.appendChild(li);});}
function renderProgress(){let totalAll=0,learnedAll=0;const sp=document.getElementById('subjProg');sp.innerHTML='';S.forEach(s=>{const total=(D[s]||[]).length;const ln=countLearned(s);totalAll+=total;learnedAll+=ln;const pct=total?Math.round(ln/total*100):0;sp.innerHTML+='<div class="sp-row"><span class="sp-name">'+s+'</span><div class="sp-bar"><div class="sp-bar-fill" style="width:'+pct+'%"></div></div><span class="sp-txt">'+ln+'/'+total+'</span></div>';});const pctAll=totalAll?Math.round(learnedAll/totalAll*100):0;document.getElementById('progBar').style.width=pctAll+'%';document.getElementById('progPct').textContent=pctAll+'%';document.getElementById('progDetail').textContent=learnedAll+' / '+totalAll+' 条文';}
function sc(l,c,t){if(!t)return'';return'<div class="sc sc-'+c+'"><div class="sl">'+l+'</div><div class="st2">'+e(t)+'</div></div>';}
function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function tog(h){h.parentElement.classList.toggle('op');}
function toggleAll(){allE=!allE;document.querySelectorAll('.ai').forEach(i=>i.classList.toggle('op',allE));document.querySelector('.eb').textContent=allE?'すべて閉じる':'すべて開く';}
function onGS(ev){const q=ev.target.value.trim().toLowerCase();const r=document.getElementById('sr');if(q.length<2){r.innerHTML='';return;}let h=[];S.forEach(s=>(D[s]||[]).forEach(a=>{if((a.r+a.t+a.s+a.e+a.p+(a.b||'')).toLowerCase().includes(q))h.push({...a,subj:s});}));if(!h.length){r.innerHTML='<p class="st">\u300C'+e(q)+'\u300D\u306B\u8A72\u5F53\u3059\u308B\u6761\u6587\u306F\u3042\u308A\u307E\u305B\u3093</p>';return;}let html='<p class="st">'+h.length+'\u4EF6\u30D2\u30C3\u30C8</p><ul class="al">';h.slice(0,50).forEach(a=>{html+='<li class="ai"><div class="ah" onclick="tog(this)"><span class="ar">'+e(a.r)+'</span><span class="at">'+e(a.subj+' \u2014 '+a.t)+'</span><span class="ag">\u25BC</span></div><div class="ab">'+sc('\u3084\u3055\u3057\u3044\u65E5\u672C\u8A9E','s',a.s)+sc('\u8EAB\u8FD1\u306A\u5177\u4F53\u4F8B','e',a.e)+sc('\u8A66\u9A13\u30DD\u30A4\u30F3\u30C8','p',a.p)+(a.b?sc('\u539F\u6587','o',a.b):'')+(a.f?'<div class="si">\uD83D\uDCD6 '+e(a.f)+(a.pg?' p.'+a.pg:'')+'</div>':'')+'</div></li>';});if(h.length>50)html+='<p class="st">\u4ED6'+(h.length-50)+'\u4EF6\u2026</p>';html+='</ul>';r.innerHTML=html;}
function onSS(ev){applyFilter();}
init();
</script>
</body>
</html>
