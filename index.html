要があります。寡婦年金の方が総額で多くなることが一般的です。","p":"「選択」制であり併給不可。寡婦年金は60歳から65歳まで、死亡一時金は一括支給なので、総受給額を比較して選択する。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":44},{"r":"法69条","t":"故意による障害の給付制限","b":"故意 に障害又はその 直接の原因 となった 事故を生じさせた者の当該 障害については、これを支給 事由とする 障害基礎年金 は、支給しない 。","s":"自分から故意に障害又はその直接の原因となる事故を起こした者には、障害基礎年金は支給しません。","e":"わざと自分の手を傷つけて障害を負った場合、障害基礎年金は支給されません。","p":"「故意」の場合は「支給しない」（絶対的不支給）。「重大な過失」の場合は法70条で「全部又は一部の支給停止」にとどまる点と比較。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":28},{"r":"法70条","t":"重大な過失等による給付制限","b":"故意の犯罪行為 若しくは 重大な過失 により、又は 正当な理由 がなくて 療養に関する指示に従わ ない ことにより、 障害若しくはその 原因となった 事故を生じさせ、又は 障害の程度を増進 させた者の当該 障害については、これを支給事由とする給付は、その 全部又は一部 を行わない ことができる。自己の 故意の犯罪行為 若しくは 重大な過失 により、又は 正当な理由 がなくて 療養に関する指示に従わな いことにより、 死亡又はその 原因となった 事故を生じさせた者の 死亡についても、 同様とする。","s":"故意の犯罪行為・重大な過失により障害やその原因となる事故を起こした場合、又は正当な理由なく療養の指示に従わなかった場合、障害基礎年金の全部又は一部が支給停止されることがあります。","e":"飲酒運転（故意の犯罪行為）で事故を起こして障害を負った場合、障害基礎年金の全部又は一部が支給停止になることがあります。","p":"「故意の犯罪行為」「重大な過失」「療養指示違反」が要件。効果は「全部又は一部の支給停止」（法69条の絶対的不支給とは異なる）。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":31},{"r":"法71条","t":"故意による死亡の給付制限","b":"◯1 遺族基礎年金 、寡婦年金 又は 死亡一時金 は、被保険者又は被保険者であった者 を故 意に死亡させた者には、 支給しない 。被保険者又は被保険者であった者の 死亡前 に、その者の死亡に よって遺族基礎年金又は死亡一時金の受給権者となるべき者を 故意 に死亡させた者についても、同様と する。 ◯2 遺族基礎年金 の受給権は、受給権者が 他の受給権者 を故意 に死亡させたときは、 消 滅する。 絶対的給付制限 国民年金法における 絶対的給付制限 には次のものがある。（法69条、法71条） 制限事由 絶対的給付制限 R05-03A 故意に 障害を生じさせた者があるとき R05-03A 故意に障害の 直接の原因 となった事故を生じさせ た者があるとき 当該障害を 支給事由 とする 障害基礎年金 の全部不支給 被保険者または被保険者であった者 を故意に死亡させた 者 があるとき 当該死亡における 遺族基礎年金 、寡婦年 金または 死亡一時金 の全部不支給 被保険者または被保険者であった者の死亡前 に、その者の 死亡によって遺族基礎年金または死亡一時金の受給権者とな るべき者を 故意に 死亡させた 者があるとき 当該死亡における 遺族基礎年金 または 死 亡一時金 の全部不支給 遺族基礎年金 の受給権者 が他の受給権者 を故意に 死亡させ たとき 遺族基礎年金 の受給権の消滅","s":"被保険者等を故意に死亡させた者には、遺族基礎年金・寡婦年金・死亡一時金は支給しません。故意の犯罪行為や重大な過失で死亡させた者についても同様に支給しないことがあります。","e":"保険金目的で夫を殺害した妻には、遺族基礎年金も寡婦年金も死亡一時金も支給されません。","p":"「故意に死亡させた者」には絶対的に不支給。「故意の犯罪行為又は重大な過失で死亡させた者」も不支給。遺族の範囲から除外される。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":28},{"r":"法72条","t":"受給権者の届出義務違反等による支給停止","b":"年金給付 は、次の各号のいずれかに該当する場合においては、その額の 全部又は一部 につき、その 支 給を停止 することができる。 1. 受給権者 が、正当な理由 がなくて 、第107条第1項（ 受給権者に関する調査 ）の規定による 命令 に 従わず 、又は同項の規定による当該 職員の質問 に応じなかった とき。 2. 障害基礎年金の受給権者 又は第107条第2項に規定する 障害基礎年金の加算の対象となっている子 又は 遺族基礎年金の受給権者若しくは加算の対象となっている子 が、正当な理由がなくて 、同項の規定による 命令 に従わず 、又は同項の規定による当該 職員の診断 を拒んだ とき。 相対的給付制限","s":"受給権者が正当な理由なく受診命令に従わない場合や、障害の状態に関する届出をしない場合等は、年金給付の全部又は一部が支給停止されることがあります。","e":"障害基礎年金の受給者が「障害の状態を確認したいので受診してください」という指示を正当な理由なく無視し続けると、年金が止められることがあります。","p":"「支給を停止することができる」（裁量的停止）。法73条の「一時差止め」とは異なる。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":31},{"r":"法73条","t":"年金給付の一時差止め","b":"受給権者 が、正当な理由 がなくて、第105条第3項の規定による 届出 をせず、又は書類その他の 物件 を提出しない ときは、 年金給付の支払 を一時差し止める ことができる。 なお、提出された診断書等の内容などから、 過去に違法薬剤の使用 歴がある 場合であっても 、対象障害または対象障害の原因となった事 故と違法薬剤の使用との間に 直接の起因性が医学的に認められない と きや、 故意の犯罪行為または重大な過失による障害ではないと確認さ れた場合は、国民年金法70条、厚生年金保険法73条の2等の規定に基 づく給付制限の対象にはなりません 。","s":"受給権者が正当な理由なく届出をしなかったり、書類を提出しなかったりするときは、年金給付の支払を一時差し止めることができます。","e":"現況届（生存確認）を期限までに提出しない受給者に対して、年金の支払いを一時的に止めることができます。届出を行えば支払いが再開されます。","p":"「一時差止め」は支給停止とは異なり、届出等をすれば支払いが再開される。法72条の支給停止との違いを区別すること。","f":"21_国民年金法21-給付通則など（内払・充当、併給調整、給付制限等）","pg":34},{"r":"法74条","t":"福祉事業","b":"◯1 政府は、国民年金事業 の円滑な実施 を図るため、 国民年金 に関し、次に掲げる事業を行うことが でき る。 1. 教育及び広報 を行うこと。 2. 被保険者 、受給権者その他の関係者 （以下「 被保険者等 」という。）に対し、 相談その他の援助 を 行うこと。 3. 被保険者等 に対し、 被保険者等 が行う 手続に関する情報 その他の 被保険者等 の利便の向上 に 資する 情報を提供 すること。 ◯2 政府は、国民年金事業 の実施に必要な事務を円滑に処理し、 被保険者等 の利便の向上 に資するた め、 電子情報処理組織 の運用を行う ものとする。 ◯3 政府は、第1項各号に掲げる事業及び前項に規定する 運用の全部又は一部 を日本年金機構 に行 わせる ことが できる 。 国民年金事業の円滑な実施を図るための措置","s":"政府は、国民年金事業の円滑な実施を図るため、教育・広報、相談・情報提供、被保険者等の利便向上のための事業を行うことができます。","e":"年金相談会の開催やねんきんネットの運営は、この福祉事業の一環です。","p":"「できる」規定（義務ではない）。具体的には教育・広報、相談・情報提供、被保険者の利便向上の3つ。","f":"22_国民年金法22-給付通則など（積立金の運用、国民年金事業の運営改善）","pg":5},{"r":"法75条","t":"積立金の運用の基本方針","b":"積立金の運用 は、積立金 が国民年金の 被保険者から徴収 された 保険料の一部 であり、かつ、 将来の給 付の貴重な財源 となるものであることに特に留意し、専ら 国民年金の被保険者 の利益のために、 長期的な観点 から、 安全かつ効率的 に行うことにより、 将来にわたって 、国民年金事業 の運 営の安定 に資することを 目的として行うものとする。","s":"積立金の運用は、被保険者から徴収された保険料の一部であり将来の給付の貴重な財源であることに留意し、専ら被保険者の利益のために、長期的な観点から安全かつ効率的に行わなければなりません。","e":"年金積立金は、国内外の株式や債券に分散投資されていますが、それは投機目的ではなく、将来の年金給付のための安全で効率的な運用が求められます。","p":"「専ら被保険者の利益のために」「長期的な観点から」「安全かつ効率的に」の3つのキーワード。GPIF（年金積立金管理運用独立行政法人）が実際に運用を行う。","f":"22_国民年金法22-給付通則など（積立金の運用、国民年金事業の運営改善）","pg":2},{"r":"法76条","t":"積立金の運用方法","b":"◯1 積立金の運用 は、 厚生労働大臣 が、前条の目的に沿った運用に基づく 納付金 の納付を目的とし て、 年金積立金管理運用独立行政法人 に対し、 積立金 を寄託 することにより行うものとする。 ◯2 厚生労働大臣 は、前項の規定にかかわらず、同項の規定に基づく 寄託 をするまでの間 、財政 融資資金 に積立金 を預託 することができる。 運用の目的","s":"積立金の運用は、厚生労働大臣が年金積立金管理運用独立行政法人（GPIF）に積立金を寄託して行います。","e":"厚生労働大臣がGPIFに積立金を預け、GPIFが株式や債券で運用し、その運用益を国に納付するという流れです。","p":"運用主体はGPIF（年金積立金管理運用独立行政法人）。厚生労働大臣が「寄託」する形式。GPIFの運用実績は年金財政に大きく影響する。","f":"22_国民年金法22-給付通則など（積立金の運用、国民年金事業の運営改善）","pg":2},{"r":"法85条","t":"国庫負担","b":"◯1 国庫は、 毎年度 、国民年金事業 に要する費用（ 事務の執行 に要する費用を 除く。）に充てるため、 次に掲げる額を 負担する。 基礎年金給付費の負担","s":"国庫は毎年度、国民年金事業に要する費用（事務費を除く）に充てるため、基礎年金給付費の一定割合等を負担します。基礎年金の国庫負担割合は2分の1です。","e":"老齢基礎年金の給付費が10兆円かかる場合、そのうち5兆円は国庫（税金）で負担し、残り5兆円を保険料等で賄います。","p":"基礎年金の国庫負担割合は「2分の1」が超頻出。「事務の執行に要する費用を除く」もポイント。20歳前傷病の障害基礎年金は「特別国庫負担」が加わる。","f":"06_国民年金法6-国庫負担、基礎年金拠出金","pg":1},{"r":"法86条","t":"市町村への費用交付","b":"政府は、 市町村 （特別区を含む。以下同じ。）に対し、 市町村長 が国民年金法又は国民年金法に 基づく政令の規定によって行う 事務の処理 に必要な費用を 交付する。 事務費の負担 国庫は、毎年度 、予算の範囲内 で、国民年金事業 の事務の執行に要する費用を負担する 。（法85条2項） 政府は、市町村 に対し、市町村長が国民年金法または国民年金法に基づく政令の規定によって行う 事務の処 理に必要な費用を交付する 。（法86条） 「2分の1 を負担する 」わけではありません 。 「市町村 」に対して費用を交付します 。「都道府県及び市町村 」で はありません 。","s":"政府は、市町村長が国民年金法に基づいて行う事務の処理に必要な費用を市町村に交付します。","e":"市区町村の窓口で行う国民年金の届出受付業務にかかる費用は、政府から市町村に交付されます。","p":"「市町村（特別区を含む）」に費用を交付。市町村は法定受託事務として国民年金事務の一部を処理する。","f":"06_国民年金法6-国庫負担、基礎年金拠出金","pg":9},{"r":"法87条","t":"保険料の徴収・額","b":"◯1 政府 は、国民年金事業 に要する 費用に充てるため、 保険料 を徴収する。 ◯2 保険料 は、被保険者期間の計算の基礎となる 各月 につき、 徴収する ものとする。","s":"政府は国民年金事業の費用に充てるため保険料を徴収します。保険料は被保険者期間の各月につき徴収され、月額17,000円に保険料改定率を乗じた額です。","e":"令和6年度の国民年金保険料は月額16,980円です。この額は「17,000円×保険料改定率」で計算されます。","p":"基本額「17,000円」に「保険料改定率」を乗じる。保険料改定率は毎年変動。保険料は「各月」につき徴収（月単位）。第2号・第3号被保険者は個別に保険料を納めない。","f":"07_国民年金法7-保険料、付加保険料","pg":1},{"r":"法87条の2","t":"付加保険料","b":"◯3 付加保険料を納付する者となったもの は、 いつでも 、厚生労働大臣 に申し出 て、その 申出を した日の属する月の前月 以後の各月に係る 保険料 （既に納付されたもの 及び第93条第1項の規定によ り前納されたもの （国民年金基金の加入員となった日の属する月以後の各月 に係るものを 除く。）を 除 く。）につき 付加保険料を納付する者でなくなる ことができる。 ◯4 第1項の規定により保険料を納付する者となったものが、 国民年金基金の加入員 となったときは、 その 加入員となった日 に、前項の 申出 をしたものと みなす 。 付加保険料の納付辞退 「産前産後期間 」については保険料は免除されますが 、保険料納付 済期間とされ 、付加保険料は納付することができます 。 産前産後期間中の保険料免除者は 、付加保険料を納付することがで きます 。","s":"第1号被保険者は付加保険料（月額400円）を納付する申出ができます。付加保険料の納付者は、いつでも申し出てその納付をやめることができます。やめた場合、申出日の属する月の前月以後の保険料が通常の保険料に戻ります。","e":"Aさんが付加保険料を10年間納め、やめたい場合はいつでも申出可能です。4月10日にやめる申出をすると、3月分から付加保険料は不要になります。","p":"付加保険料は「月額400円」。辞退の申出は「いつでも」可能。辞退の効果は「申出月の前月以後」。国民年金基金の加入員は付加保険料を納付できない。","f":"07_国民年金法7-保険料、付加保険料","pg":13},{"r":"法88条","t":"保険料の納付義務","b":"◯1 被保険者 は、保険料 を納付しなければならない。 ◯2 世帯主 は、その 世帯に属する 被保険者 の保険料 を連帯 して納付する義務 を負う。 ◯3 配偶者 の一方は、被保険者たる 他方の保険料 を連帯 して納付する義務 を負う。 保険料の納付義務 被保険者 は、保険料を納付 しなければならない。（法88条1項） R04-10E 世帯主 は、その 世帯に属する 被保険者 の保険料 を連帯して納付する義務 を負う。（法88条2項）","s":"被保険者は保険料を納付する義務があります。また、世帯主は世帯に属する被保険者の保険料を連帯して納付する義務があり、配偶者の一方も他方の保険料を連帯して納付する義務があります。","e":"20歳の大学生（第1号被保険者）の保険料は、本人だけでなく世帯主である父親にも連帯納付義務があります。また、自営業の夫と妻は互いの保険料に連帯納付義務があります。","p":"連帯納付義務者は「世帯主」と「配偶者」の2者。本人以外にも督促・滞納処分が可能になる。「連帯して」なので全額について義務を負う。","f":"08_国民年金法8-保険料の納付等","pg":2},{"r":"法89条","t":"法定免除","b":"◯1 被保険者 （産前産後期間中の保険料免除 並びに 保険料4分の3免除 、保険料半額免除 及び 保険料4分の1免除 の規定の適用を受ける被保険者を 除く。）が次の各号のいずれかに該当するに至った ときは、その 該当するに至った日の属する月 の前月 からこれに 該当しなくなる日の属する 月までの 期間に係る 保険料 は、 既に納付されたもの を除き、 納付することを要しない 。 1. 障害基礎年金 又は厚生年金保険法 に基づく 障害を支給事由 とする年金たる給付 その他の 障害を支 給事由とする給付 であって政令で定めるものの受給権者（最後に同法第47条第2項に規定する障害等級 に該当する程度の障害の状態（以下この号において「障害状態」という。）に該当しなくなった日から起 算して障害状態に該当することなく 3年を経過 した 障害基礎年金 の受給権者 （現に 障害状態に 該当しない者 に限る。）その他の政令で定める者を除く。）であるとき。 2. 生活保護法 による 生活扶助 その他の援助であって厚生労働省令で定めるものを受けるとき。 3. 前2号に掲げるもののほか、厚生労働省令で定める 施設に入所 しているとき。 ◯2 前項の規定により 納付することを要しないもの とされた 保険料 について、 被保険者又は被保険者であっ た者から当該保険料に係る期間の各月につき、 保険料 を納付する旨の申出 があったときは、当該 申出 のあった期間 に係る 保険料 に限り、同項の規定は 適用しない 。 法定免除の対象者 第1号被保険者 が、次のいずれかに該当するときは、原則として、保険料の 納付義務が免除 される（ 法定免 除）。法定免除事由に該当する者は、 法律上当然 に保険料納付が免除される ことになる。（法89条1項） 法定免除の対象者 1. R02-10ｲ 障害基礎年金 または 厚生年金保険法 に基づく 障害を支給事由とする年金たる給付 その他の 障害を 支給事由とする給付 であって政令で定めるものの 受給権者 であるとき。 2. R02-10ｵ 生活保護法 による 生活扶助 その他の援助であって厚生労働省令で定めるもの（ハンセン病問題の 解決の促進に関する法律による援護）を受けるとき。（則74条） 3. 厚生労働省令で定める 施設に入所 しているとき。","s":"第1号被保険者が、(1)障害基礎年金又は被用者年金の障害年金の受給権者であるとき、(2)生活保護の生活扶助を受けるとき、(3)国立ハンセン病療養所等に入所しているとき、保険料は全額免除されます（法定免除）。届出が必要ですが、届出がなくても免除の効果は発生します。","e":"障害基礎年金2級を受けている第1号被保険者は、届出をすれば保険料が全額免除されます。この免除期間も年金額に2分の1反映されます。","p":"法定免除の3つの事由を正確に。「届出」は必要だが、届出がなくても免除の効果は発生する。免除期間は老齢基礎年金額に「2分の1」反映。産前産後免除・申請免除との違いに注意。","f":"09_国民年金法9-保険料の免除","pg":4},{"r":"法91条","t":"保険料の納付期限","b":"毎月の保険料 は、 翌月末日 までに 納付しなければならない。 納付期限","s":"毎月の保険料は、翌月末日までに納付しなければなりません。","e":"4月分の国民年金保険料の納付期限は5月31日です。","p":"「翌月末日」が超頻出。厚生年金保険も同じ（翌月末日）。健康保険も同じ。末日が土日祝日の場合は翌営業日。","f":"08_国民年金法8-保険料の納付等","pg":14},{"r":"法92条","t":"保険料の通知","b":"◯1 厚生労働大臣 は、 毎年度 、被保険者 に対し、各年度の各月に係る 保険料 について、 保険料の 額、納期限 その他厚生労働省令で定める事項を 通知する ものとする。 保険料の通知 厚生労働大臣 は、毎年度 、被保険者 に対し、各年度の各月に係る 保険料 について、 保険料の額 、納期限 その 他厚生労働省令で定める事項を 通知する 。（法92条1項） 通知は 「厚生労働大臣 」が行います 。「市町村長 」ではありませ ん。","s":"厚生労働大臣は毎年度、被保険者に対し、各年度の各月に係る保険料の額・納期限等を通知します。","e":"毎年4月頃に届く「国民年金保険料納付書」がこの通知に当たります。1年分の納付書がまとめて届きます。","p":"「毎年度」通知する。通知がなくても納付義務自体は発生する。","f":"08_国民年金法8-保険料の納付等","pg":15},{"r":"法92条の2","t":"口座振替納付","b":"厚生労働大臣 は、被保険者 から、 口座振替納付を希望 する旨の 申出 があった場合には、その 納付 が確実 と認められ、かつ、その 申出を承認 することが 保険料の徴収上有利 と認められるときに限り、そ の申出を承認 することができる。 口座振替による納付 R05-01C 厚生労働大臣 は、被保険者から、 口座振替納付を希望する旨の申出があった 場合には、 その納付が 確実と認められ 、かつ、 その申出を承認することが保険料の徴収上有利と認められる ときに限り、その 申出を 承認することができる。（法92条の2） 被保険者は、保険料を納付しようとするときは、厚生労働大臣が交 付する納付書を添付することが原則ですが、「口座振替による納付」 も認められています。（令6条の13） すべての法律における 「口座振替による納付 」は、申出を 「承認」 と表現しています 。「許可」や「認可」ではないため 、選択対策をし てください 。 「その納付が確実と認められ 、かつ、その申出を承認することが保 険料の徴収上有利と認められるときに限り 」です。「その納付が確実 と認められるときに限り 」ではありません 。","s":"厚生労働大臣は、被保険者から口座振替納付の申出があった場合、納付が確実で保険料の徴収上有利と認められるときは、その申出を承認することができます。","e":"国民年金保険料を銀行口座から自動引き落としで納めたい場合、口座振替の申出をして承認されれば利用できます。口座振替の早割（当月末引落し）で50円割引になります。","p":"「申出」＋「承認」が必要。「納付が確実」かつ「徴収上有利」であることが承認の要件。口座振替による前納割引もある。","f":"08_国民年金法8-保険料の納付等","pg":16},{"r":"法92条の2の2","t":"クレジットカード納付","b":"◯1 被保険 者は、 厚生労働大臣 に対し、 被保険者 の保険料 を立て替えて納付 する事務を 適正かつ確 実に実施する ことができると認められる者であって、政令で定める要件に該当する者として 厚生労働大臣 が指 定するもの（以下「 指定代理納付者 」という。）から付与される番号、記号その他の符号を通知するこ とにより、当該 指定代理納付者 をして当該 被保険者 の保険料 を立て替えて納付 させることを希望す る旨の 申出 をすることができる。 ◯2 厚生労働大臣 は、前項の 申出を受けたときは、その 納付が確実 と認められ、かつ、その 申出を承 認することが 保険料の徴収上有利 と認められるときに限り、その 申出を承認 することができる。 指定代理納付者による納付 被保険者 は、厚生労働大臣 に対し、被保険者の保険料を立て替えて納付する 事務を適正かつ確実に実施 する ことができると認められる者であって、政令で定める要件に該当する者として厚生労働大臣が指定するもの （「指定代理納付者 」）から付与される番号、記号その他の符号を通知することにより、当該 指定代理納付者 をして当該被保険者の 保険料を立て替えて納付させることを希望する 旨の申出をすることができる。（法92条 の2の2第1項）","s":"被保険者は、保険料を立て替えて納付する事務を適正に行える者（クレジットカード会社等）を指定して、保険料のクレジットカード納付を利用することができます。","e":"クレジットカードで国民年金保険料を毎月自動的に納付する「クレジットカード納付」の制度です。","p":"指定納付者（クレジットカード会社等）による立替納付の仕組み。厚生労働大臣の承認が必要。","f":"08_国民年金法8-保険料の納付等","pg":17},{"r":"法92条の3","t":"納付受託者","b":"◯1 次に掲げる者（以下「 納付受託者 」という。）は、 被保険者 （第1号に掲げる者にあっては、 国 民年金基金の加入員 に限る。）の 委託を受けて 、保険料の 納付に関する事務 を行うことができる。 1. 国民年金基金 又は 国民年金基金連合会 2. 納付事務 を適正かつ確実に実施する ことができると認められ、かつ、政令で定める要件に該当する者と して 厚生労働大臣 が指定するもの","s":"コンビニエンスストアなどの納付受託者は、被保険者の委託を受けて保険料の納付事務を行うことができます。","e":"コンビニで国民年金保険料を支払えるのは、コンビニが「納付受託者」として認められているからです。","p":"納付受託者にはコンビニや金融機関が含まれる。「委託を受けて」納付事務を行う。","f":"08_国民年金法8-保険料の納付等","pg":19},{"r":"法92条の4","t":"納付受託者への交付と納付効果","b":"◯1 被保険者 が前条第1項の 委託に基づき保険料 を同項各号に掲げる者で納付事務を行うもの（以下「 納 付受託者 」という。）に 交付したときは、 納付受託者 は、政府に対して当該保険料の 納付の責めに任 ずるものとする。 保険料の納付委託","s":"被保険者が納付受託者に保険料を交付したときは、納付受託者がその保険料を受領した日に保険料の納付があったものとみなされます。","e":"4月30日にコンビニで保険料を支払った場合、コンビニが受領した4月30日に納付されたものとして扱われます。翌日に政府の口座に入金されても、納付日は4月30日です。","p":"納付効果は「受領した日」に発生。政府への実際の納付は後日でも、被保険者は納付受託者に交付した時点で納付義務を果たしたことになる。","f":"08_国民年金法8-保険料の納付等","pg":19},{"r":"法93条","t":"保険料の前納","b":"◯1 被保険者 は、将来の一定期間 の保険料 を前納 することができる。 ◯3 第1項の規定により 前納された 保険料 について 保険料納付済期間 又は保険料4分の3免除期間 、保険料半 額免除期間 若しくは 保険料4分の1免除期間 を計算する場合においては、 前納に係る期間の各月が経過した 際に、それぞれ その月 の保険料が納付 されたものと みなす 。 保険料の前納 R07-04E R06-09C 被保険者 は、将来の一定期間の保険料 を前納する ことができる。（法93条1項） 国民年金保険料納付受託記録簿の保存は 、「3年間 」です。「5年 間」ではありません 。 「付加保険料 」も前納することができます 。 「一部免除期間に係る納付すべき保険料 」についても 、前納するこ とができます 。「前納に関する規定は適用されない 」のではありませ ん。","s":"被保険者は、将来の一定期間の保険料をまとめて前払い（前納）することができます。前納すると割引があります。前納した保険料は、各月が到来したときにそれぞれの月の保険料が納付されたものとみなされます。","e":"1年分や2年分の保険料を一括で前納すると、数千円から1万円以上の割引が受けられます。","p":"前納は「任意」。前納された保険料は「各月が到来した際に納付されたとみなす」（前納期間中に死亡しても残余は還付）。割引額は政令で定める。","f":"08_国民年金法8-保険料の納付等","pg":21},{"r":"法94条の2","t":"基礎年金拠出金","b":"◯1 厚生年金保険 の実施者たる政府 は、毎年度 、基礎年金の給付に要する費用 に充てるため、 基礎年 金拠出金 を負担する。 ◯2 実施機関たる共済組合等 は、毎年度 、基礎年金の給付に要する費用 に充てるため、 基礎年金拠出 金を納付する。 ◯3 財政の現況及び見通し が作成されるときは、 厚生労働大臣 は、厚生年金保険 の実施者たる政府 が負担し、又は 実施機関たる共済組合等 が納付すべき 基礎年金拠出金 について、その 将来にわたる 予想額 を算定するものとする。","s":"厚生年金保険の実施者である政府及び共済組合等は、毎年度、基礎年金の給付に要する費用に充てるため、基礎年金拠出金を負担します。","e":"基礎年金は全被保険者に共通の制度なので、厚生年金の保険者も共済組合も、それぞれの被保険者数に応じて基礎年金の費用を分担（拠出）します。","p":"基礎年金は「全国民共通の基礎的給付」であり、その費用は各制度が「拠出金」として分担する仕組み。拠出金の負担者は「政府（厚年）」と「共済組合等」。","f":"06_国民年金法6-国庫負担、基礎年金拠出金","pg":11},{"r":"法94条の3","t":"基礎年金拠出金の額の算定","b":"◯1 基礎年金拠出金の額 は、 保険料・拠出金算定対象額 に当該年度における 被保険者の総数 に対す る当該年度における当該 政府 及び 実施機関 に係る 被保険者 （厚生年金保険 の実施者たる政府 に あっては、 第1号厚生年金被保険者 である 第2号被保険者 及びその 被扶養配偶者 である 第3号被保険 者とし、 実施機関たる共済組合等 にあっては、当該実施機関たる共済組合等に係る被保険者（ 国家公 務員共済組合連合会 にあっては当該連合会を組織する共済組合に係る 第2号厚生年金被保険者 である 第2号 被保険者 及びその 被扶養配偶者 である 第3号被保険者 とし、 地方公務員共済組合連合会 にあっては当該 連合会を組織する共済組合に係る 第3号厚生年金被保険者 である 第2号被保険者 及びその 被扶養配偶者 で ある 第3号被保険者 とし、 日本私立学校振興 ・共済事業団 にあっては 第4号厚生年金被保険者 である 第 2号被保険者 及びその 被扶養配偶者 である 第3号被保険者 とする。以下同じ。）とする。）の 総数の 比率 に相当するものとして毎年度 政令で定める ところにより算定した率を乗じて得た額とする。 基礎年金拠出金の額","s":"基礎年金拠出金の額は、保険料・拠出金算定対象額に、被保険者の総数に対する各制度の被保険者数の比率を乗じて算定します。","e":"基礎年金給付費が20兆円で、全被保険者6,700万人のうち厚生年金被保険者が4,500万人なら、厚生年金側は約67%を拠出します。","p":"「被保険者数の比率（按分）」で拠出金額を算定。頭割りの仕組み。各制度の被保険者数に応じた負担。","f":"06_国民年金法6-国庫負担、基礎年金拠出金","pg":13},{"r":"法94条の6","t":"第2号・第3号被保険者の保険料","b":"第87条第1項及び第2項（保険料の徴収）並びに第88条第1項（保険料の納付義務）の規定にかかわらず、 第2号被保険者 としての 被保険者期間 及び 第3号被保険者 としての 被保険者期間 については、 政府 は、保険料を徴収せず 、被保険者 は、 保険料を納付することを要しない 。 産前産後期間中の保険料の免除 の届出は、出産の予定日の6か月前 から行うことができます 。産前産後期間終了日以後に限られるわけで はありません 。","s":"第2号被保険者としての被保険者期間及び第3号被保険者としての被保険者期間については、国民年金の保険料の徴収及び納付義務の規定は適用されません。","e":"サラリーマン（第2号被保険者）は厚生年金保険料を払えば国民年金保険料を別途払う必要はありません。専業主婦（第3号被保険者）も個別に保険料を納める必要はありません。","p":"第2号は「厚生年金保険料の中に含まれている」扱い。第3号は「個別に保険料を納めない」。基礎年金拠出金の仕組みで手当てされている。","f":"08_国民年金法8-保険料の納付等","pg":12},{"r":"法96条","t":"督促","b":"◯1 保険料 その他国民年金法の規定による 徴収金 を滞納する者 があるときは、 厚生労働大臣 は、期限を 指定して、これを 督促 することができる。 ◯2 前項の規定によって 督促をしようとするときは、 厚生労働大臣 は、納付義務者 に対して、 督促 状を発する。 ◯3 前項の 督促状により指定する期限 は、督促状を発する日 から起算して 10日以上を経過した日 でな ければならない。 督促 R06-10E 保険料 その他国民年金法の規定による 徴収金を滞納する者 があるときは、 厚生労働大臣 は、期限を 指定して、 これを 督促することができる 。（法96条1項）","s":"保険料等を滞納する者がいるときは、厚生労働大臣は期限を指定して督促することができます。督促状で指定する期限は、督促状を発する日から起算して10日以上経過した日でなければなりません。","e":"保険料を滞納している人に「○月○日までに納付してください」という督促状が届きます。この期限は督促状発行日から10日以上先でなければなりません。","p":"国民年金は「督促することができる」（任意的督促）。厚生年金は「督促しなければならない」（義務的督促）との違いが超頻出。督促状の期限は「10日以上」。","f":"10_国民年金法10-保険料の追納、滞納に対する措置","pg":15},{"r":"法97条","t":"延滞金","b":"◯1 第96条第1項の規定によって 督促をした ときは、 厚生労働大臣 は、徴収金額 に、 納期限の翌日 から 徴収金完納又は財産差押の日の前日 までの 期間の日数 に応じ、 年14.6パーセント （当該 督促が 保険料 に係るものであるときは、当該 納期限の翌日 から 3月を経過する日 までの期間については、 年7. 3パーセント ）の割合を乗じて計算した 延滞金 を徴収する。ただし、 徴収金額 が500円未満 である とき、又は滞納につきやむを得ない事情があると認められるときは、この限りでない。 ◯3 延滞金 を計算するに当り、 徴収金額 に500円未満 の端数があるときは、その 端数は、 切り捨て る。 ◯4 督促状に指定した期限 までに 徴収金 を完納 したとき、又は第1項から第3項の規定によって計算し た金額が 50円未満 であるときは、 延滞金は 、徴収しない 。 ◯5 延滞金の金額 に50円未満 の端数があるときは、その 端数は、 切り捨てる 。 延滞金の徴収 厚生労働大臣 は、保険料等 の納付を 督促したときは、 延滞金 を徴収する。（法97条1項） 延滞金が徴収されない場合 1-5-9（徴収法）や1-7-15（健康保険法）と比較しながら学習をし ます。","s":"督促をしたときは、厚生労働大臣は徴収金額に対し、納期限の翌日から徴収金完納又は財産差押えの日の前日までの期間の日数に応じて延滞金を徴収します。延滞金の割合は年14.6%（最初の3か月は年7.3%）です。","e":"保険料を滞納して督促を受けた後もなお納付しない場合、滞納日数に応じた延滞金が加算されます。","p":"延滞金の割合は「年14.6%」（最初3か月は「年7.3%」）。起算日は「納期限の翌日」、終了日は「完納又は差押えの日の前日」。督促が前提。","f":"10_国民年金法10-保険料の追納、滞納に対する措置","pg":20},{"r":"法98条","t":"先取特権の順位","b":"保険料その他国民年金法の規定による 徴収金 の先取特権の順位 は、 国税 及び 地方税 に次ぐもの と する。 先取特権 保険料その他国民年金法の規定による 徴収金の先取特権の順位 は、国税及び地方税に次ぐ ものとする。（法9 8条） 「国税及び地方税と同順位 」ではありません 。","s":"保険料その他国民年金法の規定による徴収金の先取特権の順位は、国税及び地方税に次ぐものとされています。","e":"滞納者の財産を差し押さえる場合、まず国税・地方税が優先的に回収され、その次に国民年金保険料が回収されます。一般の債権よりは優先されます。","p":"先取特権の順位は「国税・地方税に次ぐ」。国民年金だけでなく、厚生年金・健康保険・労働保険もすべて同じ順位。","f":"10_国民年金法10-保険料の追納、滞納に対する措置","pg":24},{"r":"法101条","t":"不服申立て（審査請求・再審査請求）","b":"◯1 被保険者 の資格 に関する処分、 給付 に関する処分（ 共済組合等が行った障害基礎年金に係る障 害の程度の診査に関する処分を除く 。）又は 保険料 その他国民年金法の規定による 徴収金 に関する 処分に不服がある者は、 社会保険審査官 に対して 審査請求 をし、 その決定に不服がある 者は、 社会保 険審査会 に対して 再審査請求 をすることができる。ただし、第14条の4第1項又は第2項（年金記録の訂正 請求）の規定による決定については、この限りでない。 ◯2 審査請求 をした日から 2月以内 に決定がない ときは、 審査請求人 は、社会保険審査官 が審査請求 を 棄却 したものとみなす ことができる。 ◯3 第1項の 審査請求及び再審査請求 は、 時効の完成猶予及び更新 に関しては、 裁判上の請求 とみ なす。 ◯4 被保険者 の資格 に関する 処分が確定した ときは、その処分についての不服を当該処分に基づく 給 付に関する処分の 不服の理由とすることができない 。 審査請求 R03-06A 次の処分に不服がある者は、 社会保険審査官 に対して 審査請求 をすることができる。（法101条1 項） 審査請求 1. 被保険者 の資格に関する処分 2. 給付に関する処分（ 共済組合等が行った障害基礎年金に係る障害の程度の診査に関する処分を除く ） 3. 保険料 その他国民年金法の規定による 徴収金 に関する処分 審査請求 は、これらの処分があったことを知った日の翌日から起算して 3か月 を経過したときは、することが できない。ただし、正当な事由によりこの期間内に審査請求をすることができなかったことを疎明したとき は、この限りでない。（社審法4条1項） 被保険者 の資格に関する処分に対する審査請求は、原処分があった日の翌日から起算して 2年を経過 するとき は、することができない 。（社審法4条2項） 審査請求 は、文書または口頭 ですることができる。（社審法5条1項） R03-06A 共済組合等が行った障害基礎年金に係る障害の程度の診査に関する処分に不服がある者 は、当該共 済組合等に係る共済各法（国家公務員共済組合法、地方公務員等共済組合法及び私立学校教職員共済法をい う）の定めるところにより、 当該共済各法に定める審査機関 に審査請求 をすることができる。（法101条6項）","s":"被保険者の資格・給付・保険料等に関する処分に不服がある者は、社会保険審査官に審査請求ができます。その決定に不服がある場合は、社会保険審査会に再審査請求ができます。","e":"障害基礎年金の請求が却下された場合、まず社会保険審査官に審査請求し、それでも不服なら社会保険審査会に再審査請求ができます。","p":"「二審制」（審査請求→再審査請求）。審査官への審査請求は処分があったことを知った日の翌日から3か月以内。再審査請求は決定書の謄本が送付された日の翌日から2か月以内。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":2},{"r":"法101条の2","t":"審査請求と訴訟の関係","b":"第101条第1項に規定する処分（被保険者の 資格 に関する処分 又は 給付 に関する処分 （共済組合等 が行った障害基礎年金に係る障害の程度の診査に関する処分を除く。）に限る。）の 取消しの訴え は、当該処 分についての 審査請求 に対する 社会保険審査官 の決定 を経た後でなければ、 提起することがで きない 。 「2か月以内 」であって 、「30日以内 」ではありません 。 「社会保険審査会 」であって 、「社会保険審査官 」ではありませ ん。","s":"資格に関する処分又は給付に関する処分の取消しの訴えは、審査請求に対する社会保険審査官の決定を経た後でなければ提起できません（審査請求前置主義）。","e":"障害基礎年金の不支給決定に不服がある場合、いきなり裁判所に訴えることはできず、まず社会保険審査官への審査請求を経る必要があります。","p":"「審査請求前置」が原則。ただし、審査請求後3か月経過しても決定がない場合は訴訟提起可能。保険料に関する処分は審査請求前置の対象外。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":6},{"r":"法102条","t":"時効","b":"◯1 年金給付 を受ける権利 は、その 支給すべき事由が生じた日 から 5年 を経過したとき、当該権利 に基づき 支払期月ごとに支払うものとされる年金給付 の支給を受ける権利 は、当該日の属する月の翌月 以後に到来する当該年金給付の支給に係る第18条第3項本文に規定する 支払期月の翌月の初日 から 5年 を 経過したときは、 時効によって 、消滅する 。 ◯2 前項に規定する 年金給付を受ける権利の時効 は、当該 年金給付 がその 全額 につき 支給を停止 されて いる間は、 進行しない 。 ◯4 保険料 その他国民年金法の規定による 徴収金 を徴収 し、又はその 還付 を受ける権利 及び 死亡一時金 を受ける権利は、これらを 行使することができる時 から 2年 を経過したときは、 時効によ って消滅する 。 ◯5 保険料 その他国民年金法の規定による 徴収金 についての第96条第1項の規定による 督促 は、時 効の更新の効力を有する 。 時効 R07-05A R07-06A 2020改正 年金給付 を受ける権利 は、その 支給すべき事由 が生じた日から 5年を経過した ときは、 時効によって 、消滅する 。（法102条1項） R07-06A R02-07D 2020改正 年金給付を受ける権利に基づき 支払期月ごとに支払うものとされる年金給付の 支給を受ける権利 は、当該日の属する月の翌月以後に到来する当該年金給付の支給に係る 支払期月の翌月の初 日から5年を経過したときは、 時効によって 、消滅する 。（法102条1項） 死亡一時金を受ける権利 は、これらを 行使することができる時 から2年を経過したときは、 時効によって消滅 する。（法102条4項） 「年金給付 」を受ける権利ですから 、「死亡一時金 」の時効は5年 ではありません 。","s":"年金給付を受ける権利は支給事由が生じた日から5年、一時金は2年で消滅時効にかかります。保険料等の徴収金を徴収する権利も2年で時効消滅します。","e":"老齢基礎年金の裁定請求をせずに5年が経過すると、5年より前の分は時効で受け取れなくなります。死亡一時金は死亡から2年以内に請求しないと時効になります。","p":"年金給付は「5年」、一時金は「2年」、保険料徴収権は「2年」が頻出。年金の支払期月ごとの支払いを受ける権利は「5年」。時効は「援用を要しない」（自動消滅）。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":8},{"r":"法105条","t":"届出等","b":"◯4 被保険者 が死亡したときは、 戸籍法 の規定による 死亡の届出義務者 は、その旨を 市町村 長に届け出 なければならない。ただし、厚生労働省令で定める被保険者の死亡について、同法の規定によ る死亡の届出をした場合（厚生労働省令で定める場合に限る。）は、この限りでない。 第1号被保険者の届出","s":"被保険者が死亡したときは、戸籍法による死亡届出義務者がその旨を市町村長に届け出なければなりません。","e":"国民年金の被保険者が亡くなった場合、遺族は市区町村に死亡届を提出する必要があります。","p":"「戸籍法の死亡届出義務者」が届出義務者。厚生労働省令で定める被保険者は除かれる。","f":"04_国民年金法4-被保険者期間の計算、届出（被保険者の届出）","pg":9},{"r":"法106条","t":"被保険者に対する調査","b":"◯1 厚生労働大臣 は、必要があると認めるときは、 被保険者 の資格 又は 保険料 に関する処分 に関し、 被保険者 に対し、 出産予定日に関する書類 、被保険者若しくは被保険者の配偶者若しくは世帯 主若しくはこれらの者であった者の 資産 若しくは 収入の状況 に関する書類その他の 物件の提出 を命 じ、又は当該職員をして被保険者に 質問させることができる。 被保険者に関する調査 2022改正 厚生労働大臣 は、必要があると認めるときは、 被保険者の資格または保険料 に関する処分に関し、 被保険者に対し、 出産予定日に関する書類 、被保険者若しくは被保険者の配偶者若しくは世帯主若しくはこれ らの者であった者の 資産若しくは収入の状況に関する書類 その他の 物件の提出 を命じ、または当該職員をして 被保険者に 質問させることができる。（法106条1項）","s":"厚生労働大臣は必要に応じて、被保険者の資格や保険料に関する処分について、被保険者に対し書類の提出や届出を命じたり、受診を命じたりすることができます。","e":"産前産後の保険料免除を申請した人に対して、出産予定日に関する書類の提出を求めることができます。","p":"「出産予定日に関する書類」の提出命令が含まれる。産前産後免除制度との関連。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":17},{"r":"法107条","t":"受給権者に対する調査","b":"◯1 厚生労働大臣 は、必要があると認めるときは、 受給権者 に対して、その者の 身分関係 、 障害の状態 その他 受給権の 消滅、年金額の改定 若しくは 支給の停止 に係る事項に関する書類その他の 物 件を提出 すべきことを命じ、又は当該職員をしてこれらの事項に関し受給権者に 質問させることができる。 ◯2 厚生労働大臣 は、必要があると認めるときは、 障害基礎年金 の受給権者 若しくは 障害等 級に該当する 障害の状態 にあることによりその額が加算されている 子又は障害等級に該当する 障害の状態 にあることにより 遺族基礎年金 の受給権を有し、若しくは 遺族基礎年金 が支給さ れ、若しくはその額が加算されている 子に対して、その指定する 医師 若しくは 歯科医師 の診 断を受けるべきことを 命じ、又は当該職員をしてこれらの者の 障害の状態 を診断させることができ る。 受給権者等に関する調査","s":"厚生労働大臣は必要に応じて、受給権者に対し身分関係・障害の状態等について書類の提出や届出を命じたり、受診を命じたりすることができます。","e":"障害基礎年金の受給者に対して、障害の状態を確認するために診断書の提出を求めたり、医師の診察を受けるよう命じたりできます。","p":"障害基礎年金の受給者に対する「障害の状態」の確認が代表例。正当な理由なく拒否すると法72条の支給停止の対象に。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":18},{"r":"法108条の3","t":"調査研究","b":"◯1 厚生労働大臣 は、第1条の目的を達成するため、 被保険者 若しくは 被保険者であった者 又は受給権者 に 係る 保険料の納付 に関する 実態その他の厚生労働省令で定める事項に関し必要な 統計調査 を行うも のとする。 ◯2 厚生労働大臣 は、前項に規定する 統計調査 に関し必要があると認めるときは、 官公署 に対し、必要 な情報の提供 を求めることができる。 統計調査 R07-08ｴ R02-08ｴ 厚生労働大臣 は、法1条の目的を達成するため、 被保険者 若しくは 被保険者であった者 ま たは受給権者 に係る 保険料の納付 に関する実態 その他の厚生労働省令で定める事項に関し 必要な統計調査を行 うものとする。（法108条の3第1項） R02-08ｴ 厚生労働大臣 は、統計調査 に関し必要があると認めるときは、 官公署 に対し、 必要な情報の提供を 求める ことができる。（法108条の3第2項）","s":"厚生労働大臣は、国民年金制度の目的達成のため、保険料の納付実態等について調査研究を行い、その結果を公表するものとされています。","e":"保険料の納付率や未納者の実態調査を行い、その結果を公表することで制度改善に活用します。","p":"調査対象は「保険料の納付に関する実態その他の厚生労働省令で定める事項」。結果の「公表」が義務。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":19},{"r":"法109条","t":"被保険者を構成員とする団体への届出等","b":"◯1 同種の事業又は業務 に従事する 被保険者 を構成員とする 団体その他 被保険者 を構成員とするこれに 類する 団体で政令で定めるものは、当該 構成員である被保険者 の委託を受けて、当該被保険者に係る第12条 第1項（ 第1号被保険者の届出 ）の届出をすることができる。 ◯2 前項に規定する団体（以下「 国民年金事務組合 」という。）は、同項に規定する 委託を受けようと するときは、 厚生労働大臣の認可 を受けなければならない。 国民年金事務組合 R06-03E 同種の事業または業務 に従事する 被保険者 を構成員とする 団体その他被保険者を構成員とするこれ に類する 団体で政令で定めるもの（ 国民年金事務組合 ）は、当該 構成員である被保険者の委託 を受けて、 第1号 被保険者の届出 をすることができる。（法109条1項） 国民年金事務組合 は、委託を受けようとするときは、 厚生労働大臣の認可 を受けなければならない。（法10 9条2項） R03-07C 国民年金事務組合の認可基準 は、次の通りである。（昭和47年6月19日庁保発21号） 青果業や個人タクシーなどの業界において 、国民年金事務組合は存 在します 。学生納付特例事務法人などと趣旨は同様です。（1-8-9参 照）","s":"被保険者を構成員とする団体で政令で定めるものは、構成員である被保険者の届出に関する事項等を厚生労働大臣に届け出なければなりません。","e":"商工会や農業協同組合などの団体が、その構成員の国民年金に関する届出事務を取りまとめて行います。","p":"対象となる団体は「政令で定めるもの」。団体経由での届出の仕組み。","f":"24_国民年金法24-不服申立て、罰則等（時効、罰則）","pg":20},{"r":"法109条の3","t":"保険料の納付委託","b":"◯1 同種の事業又は業務に従事する被保険者 を構成員 とする 団体その他これに類する 団体で政令で定めるも のであって、 厚生労働大臣 がこれらの 団体からの 申請 に基づき、次項の 業務を適正かつ確実に行う ことができると認められるものとして指定するもの（以下「 保険料納付確認団体 」という。）は、同項 の業務を行うことができる。 ◯2 保険料納付確認団体 は、当該 団体の構成員 その他これに類する者である 被保険者 からの 委託 に より、当該 被保険者 に係る 保険料が納期限までに納付されていない事実 （「 保険料滞納事実 」とい う。）の 有無について 確認し、その結果を当該 被保険者 に通知する業務を行うものとする。 保険料納付確認団体 同種の事業または業務に従事する被保険者を構成員とする団体 その他これに類する団体で政令で定めるもの であって、 厚生労働大臣 がこれらの 団体からの申請 に基づき、業務を適正かつ確実に行うことができると認め られるものとして指定するものを「 保険料納付確認団体 」という。（法109条の3第1項） 「保険料納付確認団体 」は、当該 団体の構成員 その他これに類する者である 被保険者 からの 委託により、当 該被保険者 に係る 保険料滞納事実の有無について確認 し、その 結果を当該被保険者に通知する 業務を行う。 （法109条の3第2項）","s":"被保険者を構成員とする団体等で厚生労働大臣の承認を受けたものは、構成員の委託を受けて保険料の納付事務を行うことができます。","e":"農業協同組合が組合員の国民年金保険料の納付を取りまとめて行うことができます。","p":"「厚生労働大臣の承認」が必要。構成員の「委託」に基づく。","f":"22_国民年金法22-給付通則など（積立金の運用、国民年金事業の運営改善）","pg":8},{"r":"法109条の4","t":"日本年金機構への事務委任","b":"◯1 所定の 厚生労働大臣 の権限に係る事務 は、 機構 に行わせる ものとする。ただし、この権限の一 部は、 厚生労働大臣 が自ら行うことを妨げない 。 日本年金機構への厚生労働大臣の権限に係る事務の委任 2022改正 次の厚生労働大臣の権限に係る事務 は、日本年金機構 に行わせる ものとする。ただし、この権限の 一部（下記のうち、 7.、10.、11.）は、厚生労働大臣が自ら行うことを妨げない。（法109条の4第1項） 日本年金機構に行わせる厚生労働大臣の権限に係る事務（主なもの） 1. 第2号被保険者の収入による 生計維持の認定 及び任意加入被保険者 の資格取得・口座振替納付に係る申出 の受理（1号） 2. 第1号被保険者 からの届出についての市町村長からの 報告の 受理及び第3号被保険者 からの 届出の 受理（3 号） 3. 被扶養配偶者でなくなった ことの届出の 受理（3号の2） 4. R04-04E 国民年金原簿の訂正 の請求の 受理（4号） 5. 保険料の 申請免除 に係る申請の 受理及び処分並びに処分の取消の申請の 受理及び処分の取消し （16号） 6. R02-08ｱ 口座振替による保険料納付 の申出の 受理及び承認（17号） 7. R02-07A 保険料納付受託者 に対する 報告徴収 及び立入検査 （あらかじめ、厚生労働大臣の認可を受けな ければならない （法109条の8第1項））（21号） 8. 2024改正 国税徴収の例によるものとされる 国税徴収法 の規定による 質問、検査及び提示または 提出の要 求、物件の留置き 並びに 捜索（24号） 9. 国税滞納処分の例 による 処分及び市町村に対する 処分の請求 （25号） 10. R02-08ｲ 被保険者に関する調査 に伴う物件の 提出命令 及び質問（28号） 11. R02-08ｳ 受給権者に関する調査 に伴う物件の 提出命令 及び質問並びに 受診命令 及び診断（29号） 年度によりかなり細かな出題もありますが、すべてを把握すること はできない以上、捨て問にする論点と考えられます。 年金相談をする人は通常年金事務所に足を運びます。そこで国民年 金に任意加入をすると年金額が増額することを知った場合、その場で 手続を行うことができると大変便利です（上記 1.）。 また、保険料支払が厳しい人が相談した場合に、申請免除をその場 で受け付けてくれると同様に便利です（上記 5.）。","s":"厚生労働大臣の権限に係る事務の一部は、日本年金機構に行わせるものとされています。ただし、厚生労働大臣が自ら行うことも可能です。","e":"保険料の徴収事務、裁定請求の受付、年金相談などの実務は日本年金機構（年金事務所）が行っています。","p":"機構に「行わせるものとする」（義務的委任）。ただし「厚生労働大臣が自ら行うことを妨げない」。機構は「保険者」ではなく事務を代行する機関。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":17},{"r":"法109条の5","t":"厚生労働大臣自らが行う滞納処分等","b":"◯1 厚生労働大臣 は、自らがその権限を行うこととした場合における 滞納処分等 その他の処分に係る納 付義務者が滞納処分等その他の 処分の執行を免れる目的 でその 財産について 隠ぺい している おそれ があ ることその他の政令で定める事情があるため保険料その他この法律の規定による 徴収金の効果的な徴収を行う 上で必要があると認めるときは、 財務大臣 に、当該納付義務者に関する情報その他必要な 情報を提供す るとともに、当該納付義務者に係る 滞納処分等 その他の処分の権限の 全部又は一部 を委任 すること ができる。 財務大臣への権限の委任 厚生労働大臣 は、自らがその権限を行うこととした場合における滞納処分等その他の処分に係る 納付義務者 が滞納処分等その他の処分の執行を免れる 目的でその 財産について隠ぺいしているおそれがある ことその他の 政令で定める事情があるため保険料その他この法律の規定による徴収金の効果的な徴収を行う上で 必要がある と認める ときは、財務大臣 に、当該納付義務者に関する情報その他必要な 情報を提供 するとともに、当該納付 義務者に係る 滞納処分等その他の処分の権限の全部または一部を委任することができる 。（法109条の5第1 項） 財務大臣 は、委任された権限等を 国税庁長官 に委任する。（法109条の5第5項） 国税庁長官 は、委任された権限の 全部または一部 を納付義務者の居住地を管轄する 国税局長 に委任すること ができる。（法109条の5第6項） 国税局長 は、委任された権限の 全部または一部 を納付義務者の居住地を管轄する 税務署長 に委任することが できる。（法109条の5第7項） 悪質な滞納者 については 、「財務大臣 」への権限の委任が認められ ています 。財務大臣は 、直轄の国税庁・国税局・税務署にその処分を 行わせます 。","s":"厚生労働大臣は、滞納処分等の執行を免れる目的で財産を隠ぺいしているおそれがある場合などは、自ら滞納処分等を行うことができます。","e":"悪質な滞納者が財産を隠して差押えを逃れようとしている場合、厚生労働大臣が直接滞納処分を行うことができます。","p":"「財産の隠ぺいのおそれ」がある場合に厚生労働大臣が自ら行う。通常は機構が行うが、悪質なケースでは大臣自ら対応。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":22},{"r":"法109条の6","t":"機構が行う滞納処分等","b":"◯1 機構は、滞納処分等を行う 場合には、 あらかじめ 、厚生労働大臣 の認可 を受けるとともに、 滞 納処分等実施規程 に従い、 徴収職員 に行わせなければならない。 ◯3 機構は 、滞納処分等をした ときは、 速やかに 、その結果を 厚生労働大臣 に報告しなければならな い。","s":"日本年金機構が滞納処分等を行う場合は、あらかじめ厚生労働大臣の認可を受け、滞納処分等実施規程に従い、徴収職員に行わせなければなりません。","e":"年金機構が保険料滞納者の財産を差し押さえる場合、事前に厚生労働大臣の認可を得て、規程に従って徴収職員が実施します。","p":"「あらかじめ厚生労働大臣の認可」が必要。「滞納処分等実施規程」に従う。「徴収職員」に行わせる。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":20},{"r":"法109条の7","t":"滞納処分等実施規程","b":"◯1 機構は、滞納処分等実施規程 を定め、 厚生労働大臣 の認可 を受けなければならない。これを変 更しようとするときも、同様とする。 日本年金機構が行う滞納処分等 日本年金機構 は、滞納処分等を行う 場合には、 あらかじめ 、厚生労働大臣 の認可を受けるとともに、 滞納処 分等実施規程 に従い、 徴収職員 に行わせなければならない。（法109条の6第1項） 徴収職員 は、滞納処分等に係る法令に関する知識並びに実務に必要な知識及び能力を有する日本年金機構の 職員のうちから、 厚生労働大臣 の認可を受けて、 日本年金機構 の理事長 が任命する。（法109条の6第2項） 日本年金機構 は、滞納処分等 をしたときは、 速やかに 、その 結果を厚生労働大臣 に報告しなければならな い。（法109条の6第3項） 日本年金機構 は、滞納処分等実施規程 を定め、 厚生労働大臣 の認可を受けなければならない。これを変更し ようとするときも、同様である。（法109条の7第1項） 国民年金に係る権限は 「厚生労働大臣 」にあります 。かつては 、そ の事務は 社会保険庁 が担ってきましたが 、社会保険庁は 「全国健康保 険協会 」と「日本年金機構 」へと発展的に解消されました 。","s":"日本年金機構は滞納処分等実施規程を定め、厚生労働大臣の認可を受けなければなりません。変更する場合も同様です。","e":"機構がどのような手順で滞納処分を行うかを定めた規程を作成し、厚生労働大臣の認可を得ます。手順を変更する場合も再度認可が必要です。","p":"規程の「策定」と「変更」の両方に厚生労働大臣の認可が必要。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":20},{"r":"法109条の9","t":"権限の委任","b":"◯1 国民年金法 に規定する 厚生労働大臣 の権限（第109条の5第1項及び第2項並びに第10章に規定する 厚生労働大臣の権限を除く。）は、 地方厚生局長 に委任することができる。 ◯2 前項の規定により 地方厚生局長 に委任された権限は、 地方厚生支局長 に委任することができ る。 地方厚生局長等への権限の委任 悪質滞納者の定義は重要な論点です。必ず暗記しておいてくださ い。（1-7-11参照）（1-9-1参照）","s":"国民年金法に規定する厚生労働大臣の権限（一部を除く）は、地方厚生局長に委任することができ、さらに地方厚生支局長に再委任することができます。","e":"年金の裁定や届出の受理などの権限は、東京の厚生労働省から各地方厚生局に委任され、実際にはその管轄で処理されます。","p":"「地方厚生局長」への委任と、さらに「地方厚生支局長」への再委任が可能。ただし滞納処分関連の権限は除外。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":24},{"r":"法115条","t":"国民年金基金の目的","b":"国民年金基金 （以下「 基金」という。）は、 第1条の目的を達成する ため、 加入員 の老齢 に関して 必要な給付 を行なう ものとする。","s":"国民年金基金は、法1条の目的を達成するため、加入員の老齢に関して必要な給付を行います。第1号被保険者の上乗せ年金を提供する制度です。","e":"自営業者（第1号被保険者）は厚生年金がないため、国民年金基金に加入することで老齢基礎年金に上乗せの年金を確保できます。","p":"給付は「加入員の老齢に関する給付」のみ。障害や遺族の給付はない（死亡時の一時金はある）。第1号被保険者の老後の所得保障を補完する制度。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":2},{"r":"法115条の2","t":"国民年金基金の種類","b":"基金は、 地域型国民年金基金 （以下「 地域型基金 」という。）及び 職能型国民年金基金 （以下 「職能型基金 」という。）とする。 法116条、平成16年附則19条4項、平成26年附則14条3項 ◯1 地域型基金 は、第1号被保険者 （法定免除 、全額免除 、学生納付特例 又は納付猶予 の規定により保 険料を納付することを要しないものとされている者、 一部免除 の規定によりその一部の額につき保険料を納付 することを要しないものとされている者及び 農業者年金の被保険者 を除く。以下同じ。）であって、 基 金の地区内 に住所を有する 者をもって 組織する。 ◯2 職能型基金 は、 第1号被保険者 であって、 基金の地区内 において 同種の事業又は業務に従事す る者をもって 組織する。 基金の種類など","s":"国民年金基金は、地域型国民年金基金と職能型国民年金基金の2種類があります。","e":"「東京都国民年金基金」のような都道府県単位の基金が地域型、「歯科医師国民年金基金」のような職種別の基金が職能型です。","p":"地域型は「都道府県ごと」に1つ。職能型は「同種の事業又は業務」に従事する者で組織。現在は全国国民年金基金に統合されている。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":7},{"r":"法127条","t":"国民年金基金への加入","b":"◯1 第1号被保険者 は、その者が 住所を有する 地区に係る 地域型基金 又はその 従事する事業若しく は業務 に係る 職能型基金 に申し出て 、その 加入員 となることができる。ただし、 他の基金の加入員 であ るときは、 この限りでない 。 加入員の資格取得 第1号被保険者 は、その者が 住所を有する地区に係る 地域型基金 またはその 従事する事業若しくは業務に係る 職能型基金 に申し出て 、その 加入員 となることができる。（法127条1項）","s":"第1号被保険者は、住所地の地域型基金又は従事する事業・業務の職能型基金に申し出て加入員となることができます。ただし、両方に同時に加入することはできません。","e":"東京都在住の自営業者は「全国国民年金基金」（地域型）に加入するか、自分の職種に対応する職能型基金に加入するか選べますが、両方には入れません。","p":"加入は「第1号被保険者」のみ（第2号・第3号は不可）。地域型と職能型の「同時加入は不可」。加入は任意だが脱退は制限あり。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":23},{"r":"法128条","t":"国民年金基金の給付","b":"◯1 基金は、 加入員 又は 加入員であった者 に対し、 年金 の支給を行ない 、あわせて 加入 員又は 加入員であった者 の死亡 に関し、 一時金 の支給を行なう ものとする。 ◯2 基金は、 加入員 及び 加入員であった者 の福祉を増進 するため、 必要な施設 をするこ とができる 。 国民年金基金の目的 R03-01E 国民年金基金 は、法1条の目的を達成する ため、 加入員 の「老齢」に関して 必要な給付 を行う。 （法115条）","s":"国民年金基金は、加入員又は加入員であった者に対して年金の支給を行い、あわせて死亡に関する一時金の支給を行います。","e":"国民年金基金に20年加入したAさんは、65歳から基金の年金を受け取れます。加入中に亡くなった場合は遺族に一時金が支給されます。","p":"給付は「年金」と「死亡一時金」の2種類。年金は加入員の老齢に関するもの。障害に関する給付はない。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":2},{"r":"法134条","t":"国民年金基金の掛金","b":"◯1 基金は、基金が支給する 年金及び一時金 に関する事業に要する 費用に充てる ため、 掛金 を徴収 する。 ◯2 掛金 は、 年金の額の計算の基礎 となる 各月 につき、 徴収する ものとする。 費用の負担 国民年金基金 は、国民年金基金が支給する年金及び一時金に関する事業に要する費用に充てるため、 掛金を 徴収する。（法134条1項） 掛金は、年金の額の 計算の基礎となる各月 につき、 徴収される。（法134条2項） 国民年金基金への掛金の納付 は、国民年金の 保険料納付済期間である期間に限られており 、国民年金の保険 料を納付しない期間があるときは、その期間分については給付の対象とされず 、国民年金基金に納付した掛金 は、加入員の請求に基づき還付される。（法130条2項・法134条2項） 掛金の額 は、原則として、 1か月 につき 68,000円 を超えてはならない。（基金令34条） 国民年金基金の加入員となった後 で、保険料の免除を受けていた全期間 （直近の10年以内分 ）について 追納 したときなどの場合は、保険料が免除されていたため国民年金基金に加入できなかった期間に相当する期間（ 6 0か月 を限度とする）の掛金の上限は、 特例によって、 1か月 につき 102,000円 とすることができる。（基金令 35条1項）","s":"国民年金基金は、年金・一時金の事業に要する費用に充てるため、掛金を徴収します。掛金は加入員が負担し、口数制で選択できます。","e":"国民年金基金の掛金は月額6万8,000円が上限で、口数に応じた掛金を毎月納めます。掛金は全額が社会保険料控除の対象になります。","p":"掛金の上限は「月額68,000円」（iDeCoと合算）。掛金は「加入員が負担」。事業主負担はない。全額が社会保険料控除の対象。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":32},{"r":"法135条","t":"国民年金基金の解散","b":"◯1 基金は、次に掲げる理由により 解散する。 1. 代議員 の定数 の4分の3以上 の多数による 代議員会の議決 2. 基金の 事業の継続の不能 3. 厚生労働大臣 による 解散の命令 ◯2 基金は、前項 第1号 又は第2号 に掲げる理由により 解散しよう とするときは、 厚生労働大臣の認可 を受けなければならない。 解散 国民年金基金 は、次に掲げる理由により 解散する。（法135条1項） 国民年金基金の解散 1. 代議員の 定数の4分の3以上の多数 による 代議員会の議決 2. 国民年金基金の事業の 継続の不能 3. 厚生労働大臣による 解散の命令 国民年金 基金が上記1.及び2.により解散したときは 、理事が清算人 となります 。ただし 、代議員会において他人を選任したときは 、この 限りではありません 。（法137条1項）","s":"国民年金基金は、(1)代議員の定数の4分の3以上の議決、(2)事業の継続不能、(3)厚生労働大臣の解散命令のいずれかにより解散します。","e":"加入員が激減して事業を続けられなくなった基金は、厚生労働大臣の認可を受けて解散することになります。","p":"解散の議決要件は「代議員の定数の4分の3以上」。厚生年金基金の解散（代議員の4分の3以上）と同じ。解散時の残余財産は連合会に交付。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":15},{"r":"法137条の3","t":"国民年金基金の合併","b":"◯1 基金は、 厚生労働大臣の認可 を受けて、 他の基金 と吸収合併 （基金が他の基金とする合併であ って、合併により消滅する基金の権利義務の全部を合併後存続する基金に承継させるものをいう。以下同 じ。）をすることができる。ただし、 地域型基金 と職能型基金 との吸収合併 については、その 地 区が全国である地域型基金 が第137条の3の2に規定する 吸収合併存続基金 となる場合を除き、これを することができない 。","s":"国民年金基金は、厚生労働大臣の認可を受けて、他の基金と吸収合併をすることができます。","e":"加入員が少なくなった基金が、より大きな基金に吸収合併されるケースがあります。","p":"合併には「厚生労働大臣の認可」が必要。吸収合併のみで新設合併はない。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":18},{"r":"法137条の3の2","t":"吸収合併契約","b":"基金が吸収合併 をする場合には、 吸収合併契約 において、吸収合併後存続する基金（以下「 吸収合 併存続基金 」という。）及び吸収合併により消滅する基金（以下「 吸収合併消滅基金 」という。）の 名称及び主たる事務所の所在地その他厚生労働省令で定める事項を定めなければならない。","s":"国民年金基金が吸収合併をする場合は、吸収合併契約を締結し、存続基金と消滅基金を定める必要があります。","e":"A基金がB基金を吸収合併する場合、A基金（存続基金）とB基金（消滅基金）の間で吸収合併契約を結びます。","p":"「吸収合併存続基金」と「吸収合併消滅基金」の概念。契約内容は法定。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":18},{"r":"法137条の3の3","t":"合併の議決要件","b":"基金は、 吸収合併契約 について代議員会において 代議員 の定数 の3分の2以上 の多数により 議 決しなければならない。","s":"吸収合併契約は、代議員会において代議員の定数の3分の2以上の多数により議決しなければなりません。","e":"合併の議決には代議員の3分の2以上の賛成が必要です。過半数では足りません。","p":"合併の議決要件は「3分の2以上」。解散の議決要件「4分の3以上」よりは緩い。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":18},{"r":"法137条の3の6","t":"合併の効力発生","b":"吸収合併存続基金 は、第137条の3第1項の 認可を受けた日 に、吸収合併消滅基金の 権利義務 を承 継する。 合併 国民年金基金 は、厚生労働大臣の認可 を受けて、 他の国民年金基金 と吸収合併 をすることができる。（法13 7条の3第1項）","s":"吸収合併存続基金は、厚生労働大臣の認可を受けた日に、消滅基金の権利義務を承継します。","e":"合併の認可を受けた日にB基金（消滅基金）の加入員・年金受給者に対する権利義務がすべてA基金（存続基金）に移ります。","p":"効力発生日は「認可を受けた日」。権利義務の「包括承継」。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":18},{"r":"法137条の3の7","t":"国民年金基金の分割","b":"◯1 基金は、 職能型基金 が、その事業に関して有する権利義務であって次項に規定する 吸収分割承継 基金 となる 地域型基金 の地区に係るものを当該 地域型基金 に承継させる場合に 限り、厚生労働 大臣の認可 を受けて、 吸収分割 （基金がその事業に関して有する権利義務の全部又は一部を分割後他の基 金に承継させることをいう。以下同じ。）をすることができる。","s":"職能型基金は、その事業に関する権利義務の一部を地域型基金に承継させる吸収分割をすることができます。厚生労働大臣の認可が必要です。","e":"全国規模の職能型基金が、特定の地域の加入員に関する権利義務をその地域の地域型基金に移転させることができます。","p":"分割は「職能型基金→地域型基金」の方向のみ。厚生労働大臣の認可が必要。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":22},{"r":"法137条の3の9","t":"分割の議決要件","b":"基金は、吸収分割契約 について代議員会において 代議員 の定数 の3分の2以上 の多数により 議決し なければならない。","s":"吸収分割契約は、代議員会において代議員の定数の3分の2以上の多数により議決しなければなりません。","e":"基金の分割を行うには、合併と同じく代議員の3分の2以上の賛成が必要です。","p":"分割の議決要件も合併と同じ「3分の2以上」。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":22},{"r":"法137条の3の12","t":"分割の効力発生","b":"◯1 吸収分割承継基金 は、 吸収分割契約 の定めに従い、第137条の3の7第1項の 認可を受けた 日に、吸収分割基金 の権利義務を承継 する。 分割 国民年金基金 は、職能型基金 が、その事業に関して有する権利義務であって 吸収分割承継基金となる地域型 基金の地区に係るものを当該地域型基金に承継させる 場合に 限り、厚生労働大臣の認可 を受けて、 吸収分割 を することができる。（法137条の3の7第1項） 国民年金基金 は、吸収分割契約 について代議員会において 代議員 の定数の3分の2以上の多数 により 議決しな ければならない。（法137条の3の9） 吸収分割承継基金 は、吸収分割契約 の定めに従い、 厚生労働大臣の認可を受けた日 に、吸収分割基金の 権利 義務を承継 する。（法137条の3の12） 吸収分割 をするときには 、吸収分割基金と吸収分割承継基金との間 で吸収分割契約 を締結します 。（法137条の3の7第2項）","s":"吸収分割承継基金は、分割契約の定めに従い、厚生労働大臣の認可を受けた日に、分割基金の権利義務を承継します。","e":"分割の認可を受けた日に、職能型基金の一部の権利義務が地域型基金に移転します。","p":"効力発生日は「認可を受けた日」。合併の効力発生と同じ仕組み。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":22},{"r":"法137条の4","t":"国民年金基金連合会の設立","b":"基金は、第137条の17第1項に規定する 中途脱退者 及び 解散基金加入員 に係る 年金及び一時金の 支給を共同して行う ため、 国民年金基金連合会 （以下「 連合会 」という。）を 設立することができ る。 設立 国民年金基金 は、中途脱退者 及び解散基金加入員 に係る年金及び一時金の支給を 共同して行う ため、 国民年 金基金 連合会 を設立する ことができる。（法137条の4） 国民年金基金連合会を設立 するには、その会員となろうとする 2以上の基金が発起人 とならなければならな い。（法137条の5） 発起人 は、規約を作成し、創立総会の日時及び場所とともに公告して、 創立総会 を開かなければならず、 公 告は、会日の 2週間前 までにしなければならない。（法137条の6第1項・2項） 創立総会 の議事は、その会日までに発起人に対し設立の同意を申し出た基金の 理事長の半数以上が出席 し て、その 出席者の3分の2以上で決する 。（法137条の6第5項） 発起人 は、創立総会の終了後 遅滞なく 、規約その他必要な事項を記載した書面を 厚生労働大臣に提出 して、 設立の認可 を受けなければならない。（法137条の7第1項） R03-04ｱ 「中途脱退者 」とは、国民年金基金の加入員の資格を喪失した者（当該加入員の資格を喪失した日 において当該国民年金基金が支給する年金の受給権を有する者を除く）であって、 当該国民年金基金の加入員 期間が 15年に満たないもの をいう 。（法137条の17第1項、基金令45条1項） 加入期間が 「通算して15年に満たない 」です。例えば、通算して14 年である場合には、中途脱退者として「国民年金基金連合会」が、通 算して15年である場合には、中途脱退者とはされないため、「各基 金」が年金及び一時金の支給を行います。 通算して15年未満→中途脱退者に該当→国民年金基金連合会が 支給 通算して15年以上→中途脱退者ではない→基金が支給","s":"国民年金基金は、中途脱退者及び解散基金加入員に係る年金・一時金の支給を共同で行うため、国民年金基金連合会を設立できます。","e":"基金を途中で脱退した人の年金は、脱退した基金ではなく国民年金基金連合会がまとめて支給を引き受けます。","p":"連合会の目的は「中途脱退者」と「解散基金加入員」への給付。連合会は1つだけ設立。全基金が加入。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":39},{"r":"法137条の17","t":"中途脱退者に係る年金の交付","b":"◯1 連合会の会員である基金 は、 中途脱退者 の当該基金の加入員期間に係る 年金の現価に相当する額 （以下「 現価相当額 」という。）の 交付を当該 連合会に申し出る ことができる。 ◯2 連合会 は、前項の規定により 現価相当額 の交付の申出 があったときは、これを 拒絶 してはなら ない。 ◯4 連合会 は、第1項の交付の申出に係る 現価相当額の交付 を受けたときは、当該 交付金 を原資とし て、当該 中途脱退者 に係る 年金又は一時金を支給する ものとする。 連合会の業務 国民年金基金連合会 は、次に掲げる 事業を行う ことができる。（法137条の15第1項） 国民年金基金連合会の業務 1. R06-03C 国民年金基金が支給する年金及び一時金につき一定額が確保されるよう、国民年金基金の拠出 金などを原資として、 国民年金基金の積立金の額を付加する事業 （厚生労働大臣の認可を受けなければなら ない） 2. 法128条5項の規定による 委託を受けて国民年金基金の業務の一部を行う事業 3. 国民年金基金への 助言または指導を行う事業 その他の基金の行う 事業の健全な発展を図るものとして政令 で定める事業 4. 国民年金基金制度についての 啓発活動及び広報活動を行う事業","s":"連合会の会員である基金は、中途脱退者について、その加入員期間に係る年金の現価相当額を連合会に交付しなければなりません。","e":"A基金を脱退した人について、A基金はその人の年金支払いに必要な原資（現価相当額）を連合会に渡します。以後の年金支払いは連合会が行います。","p":"「現価相当額」を交付。中途脱退者の年金原資が基金から連合会に移転する仕組み。","f":"23_国民年金法23-国民年金基金及び国民年金基金連合会","pg":41},{"r":"法142条の2","t":"基金に関する権限の委任","b":"◯1 第10章（国民年金基金及び国民年金基金連合会）に規定する 厚生労働大臣 の権限のうち 国民年 金基金 に係るものは、その 一部を地方厚生局長 に委任することができる。 ◯2 前項の規定により 地方厚生局長 に委任された権限は、 地方厚生支局長 に委任することができ る。 国民年金基金に係る権限の委任 督促を受けた納付義務者が保険料等の納付を年金事務所において行 うことを希望する旨の申出があった場合など一定の場合、日本年金機 構に保険料等の収納を行わせることができます。（令11条の13）","s":"国民年金基金に係る厚生労働大臣の権限の一部は、地方厚生局長に委任することができ、さらに地方厚生支局長に再委任できます。","e":"基金の認可や監督に関する権限が地方厚生局で処理されることがあります。","p":"法109条の9（一般的な権限委任）とは別に、基金に関する権限について特別に委任規定を設けている。","f":"01_国民年金法1-総則（目的、権限の委任、用語）","pg":26},{"r":"令11条の4","t":"基礎年金拠出金の概算額","b":"◯1 各実施機関たる共済組合等 は、毎年度 、当該年度における 保険料・拠出金算定対象額の見込額 に当該年度における当該 実施機関たる共済組合等 に係る 拠出金按分率の見込値 （以下「 概算拠出金按 分率 」という。）を乗じて得た額の基礎年金拠出金（「 概算基礎年金拠出金 」という。）を、 国民年 金の管掌者たる政府 に納付しなければならない。 基礎年金拠出金","s":"各実施機関たる共済組合等は、毎年度、保険料・拠出金算定対象額の見込額に拠出金按分率の見込値を乗じた概算額を負担します。年度終了後に精算が行われます。","e":"共済組合は年度初めに概算で拠出金を納付し、年度終了後に実際の被保険者数等に基づいて精算します。過不足があれば調整されます。","p":"「概算納付→精算」の仕組み。労働保険の概算・確定保険料の仕組みと類似。","f":"06_国民年金法6-国庫負担、基礎年金拠出金","pg":11},{"r":"附則5条","t":"任意加入被保険者","b":"◯1 次の各号のいずれかに該当する者（ 第2号被保険者及び第3号被保険者を除く 。）は、第7条第1項の規 定にかかわらず、 厚生労働大臣 に申し出て 、被保険者 となることができる。 1. 日本国内 に住所を有する 20歳以上60歳未満 の者であって、 厚生年金保険法に基づく老齢給 付等を受けることができる もの（国民年金法の適用を除外すべき特別の理由がある者として厚生労働省 令で定める者を除く。） 2. 日本国内 に住所を有する 60歳以上65歳未満 の者（国民年金法の適用を除外すべき特別の理由 がある者として厚生労働省令で定める者を除く。） 3. 日本国籍 を有する者その他政令で定める者であって、 日本国内に住所を有しない 20歳以上6 5歳未満 のもの ◯2 前項第1号又は第2号に該当する者が同項の規定による申出を行おうとする場合には、 口座振替納 付を希望する旨の 申出又は 口座振替納付 によらない 正当な事由がある 場合として厚生労働省令で定め る場合に該当する旨の 申出を厚生労働大臣 に対してしなければならない。 任意加入被保険者","s":"60歳以上65歳未満の者や海外在住の日本人など、一定の要件に該当する者は、厚生労働大臣に申し出て任意加入被保険者となることができます。任意加入は申出のあった日に資格を取得します。","e":"60歳の時点で老齢基礎年金の受給資格を満たしていない人や、満額に達していない人は、65歳まで任意加入して保険料を納め、年金額を増やすことができます。","p":"任意加入の対象は(1)60歳以上65歳未満の国内居住者、(2)海外在住の20歳以上65歳未満の日本国籍者、(3)65歳以上70歳未満の特例任意加入者。資格取得は「申出日」。","f":"02_国民年金法2-被保険者（強制加入被保険者、任意加入被保険者）","pg":26},{"r":"附則7条の3","t":"第3号被保険者の届出の特例","b":"◯1 第3号被保険者に該当しなかった者が第3号被保険者となった ことに関する第12条第5項から第8項まで の規定による 届出又は第3号被保険者の配偶者が厚生年金保険の被保険者の資格を喪失した後引き続き厚生年 金保険の被保険者となった ことに関する第105条第1項の規定による 届出が行われた日の属する 月前 の当 該届出に係る 第3号被保険者 としての 被保険者期間 （当該 届出が行われた日の属する月の前々月 までの 2年間 のうちにあるものを 除く。）は、第5条第1項の規定にかかわらず、 保険料納付済期間 に算入し ない 。 届出が遅れた場合①（原則） R04-06B 第3号被保険者に該当することになったにもかかわらず届出が行なわれず 、後日、届出を行なわれ た場合 は、当該 届出を行った日の属する月の前々月までの2年間 のうちにあるものについてのみ 、保険料納付済 期間として算入される。（附則7条の3第1項）","s":"第3号被保険者に該当したにもかかわらず届出が遅れた場合の特例措置が設けられています。届出遅延期間は保険料未納期間とされますが、届出により保険料納付済期間に算入されます。","e":"サラリーマンの妻が第3号被保険者になったのに届出を忘れていた場合、後から届出をすれば、届出が遅れた期間も保険料納付済期間として救済されます。","p":"届出遅延の救済規定。「やむを得ない事由」がある場合は厚生労働大臣の承認を受けて特例的に算入。2年以上前の期間の扱いに注意。","f":"05_国民年金法5-届出（第3号の特例、受給権者の届出）、基礎年金番号通知書等（通知書、原簿）","pg":2},{"r":"附則7条の4","t":"第2号被保険者の届出の適用除外","b":"第2号被保険者 については、第12条（ 届出）及び第105条（ 届出等 ）の規定を 適用しない 。 第2号被保険者の届出 第2号被保険者 には、国民年金法の 届出の規定は適用されない 。（附則7条の4） 第2号被保険者を使用する事業主 は、経由に係る 事務の一部 を当該事業主が設立する 健康保険組合 に委託する ことができる。（法12条8項） 例えば、就職により第2号被保険者になると「種別変更」になりま すが、被保険者本人による届出は不要です。この場合、第2号被保険 者の「事業主」が各種届出を行います。 第2号被保険者を使用する事業主は 、事務の 「一部」を健康保険組 合に委託することができます 。「全部または一部 」ではありません 。","s":"第2号被保険者については、国民年金法の届出（法12条）及び届出等（法105条）の規定は適用されません。厚生年金保険法の届出で代替されるからです。","e":"会社員（第2号被保険者）は国民年金の届出をする必要がありません。会社が厚生年金保険の届出をすれば、国民年金の手続きも自動的に処理されます。","p":"第2号被保険者は「国民年金法の届出義務なし」。厚生年金保険法の届出で対応されるため。第3号被保険者は届出義務あり（法12条5項以下）。","f":"04_国民年金法4-被保険者期間の計算、届出（被保険者の届出）","pg":16},{"r":"附則9条の3","t":"振替加算","b":"◯1 第1号被保険者 としての 被保険者期間 に係る 保険料納付済期間 、保険料免除期間 及び旧陸 軍共済組合令に基づく 旧陸軍共済組合 その他政令で定める共済組合の組合員であった期間であって政令 で定める期間を 合算した期間が 10年以上 である者が 65歳に達したときは、その者に 老齢年金 を支給す る。ただし、当該 保険料納付済期間 と当該 保険料免除期間 とを合算した期間が 1年以上 であり、かつ、 老 齢基礎年金の受給資格期間を満たしていない 場合に限る。","s":"第1号被保険者としての被保険者期間に係る保険料納付済期間等と旧共済組合等の期間を合算して、老齢基礎年金に振替加算が行われる場合があります。","e":"昭和41年4月1日以前生まれの妻で、夫の老齢厚生年金に加給年金が付いていた場合、妻が65歳になると加給年金の代わりに妻自身の老齢基礎年金に振替加算が付きます。","p":"振替加算の対象は「大正15年4月2日から昭和41年4月2日生まれ」の者。配偶者の加給年金の打切りと連動。生年月日が若くなるほど額が少なくなる。","f":"14_国民年金法14-老齢基礎年金（繰上げ、繰下げ、失権）","pg":42},{"r":"附則9条の3の2","t":"脱退一時金","b":"◯1 当分の間 、保険料納付済期間等の月数 （請求の日の前日 において 請求の日の属する月の前月 ま での 第1号被保険者 としての被保険者期間に係る 保険料納付済期間 の月数、 保険料4分の1免除期間の 月数の4分の3 に相当する月数、 保険料半額免除期間の月数の2分の1 に相当する月数及び 保険料4分 の3免除期間の月数の4分の1 に相当する月数を 合算した月数 をいう。第3項において同じ。）が 6月以 上である 日本国籍を有しない者 （被保険者でない者 に限る。）であって、第26条ただし書に該当 するもの（ 老齢基礎年金の受給資格期間を満たしていない者 ）その他これに準ずるものとして政令で定めるも のは、 脱退一時金 の支給を請求 することができる。ただし、その者が次の各号のいずれかに該当すると きは、この限りでない。 1. 日本国内に住所を有する とき。 2. 障害基礎年金 その他政令で定める給付の 受給権を有したことがある とき。 3. 最後に被保険者の資格を喪失した日 （同日において日本国内に住所を有していた者にあっては、同日後 初めて、日本国内に住所を有しなくなった日）から起算して 2年を経過 しているとき。 脱退一時金","s":"短期間在日した外国人など、保険料納付済期間等が6月以上ある者が、日本を出国した場合に脱退一時金を請求できます。ただし、年金の受給権を有している場合は請求できません。","e":"日本で3年間働いた外国人が帰国する際、納めた保険料の一部を脱退一時金として受け取ることができます。","p":"請求期限は「出国後2年以内」。支給額は「保険料納付済期間等の月数」に応じた額。最大60月分（5年分）。脱退一時金を受けると、その期間は被保険者期間から除外される。","f":"18_国民年金法18-第1号被保険者の独自給付","pg":48}],"厚生年金保険法":[{"r":"法1条","t":"目的","b":"厚生年金保険法 は、労働者 の老齢 、障害 又は 死亡 について 保険給付 を行い、 労働者 及びその 遺族の生活の安定 と福祉の向上 に寄与することを 目的とする。 目的 厚生年金保険法 は、労働者 の老齢、障害または死亡 について 保険給付 を行い、 労働者 及びその 遺族の生活の 安定と福祉の向上に寄与する ことを 目的とする。（法1条） 国民年金制度 は、日本国憲法第25条第2項 に規定する理念に基き、 老齢、障害または 死亡によって国民生活の安定がそこなわれることを 国民の共同連帯 によって防止し、もって 健全な国民生活の維持 及び向 上に寄与することを 目的とします（国民年金法1条）。（1-8-1参 照） 国民年金法の法1条とのひっかけが出題されています 。","s":"厚生年金保険法は、会社員などの労働者が老齢・障害・死亡した場合に保険給付を行い、労働者とその遺族の生活を安定させ、福祉の向上を図ることを目的としています。","e":"会社で長年働いてきたAさんが65歳で退職した場合、老齢厚生年金が支給されます。また、在職中に障害を負った場合は障害厚生年金、亡くなった場合は遺族に遺族厚生年金が支給されます。","p":"目的は「労働者の老齢・障害・死亡」の3つ。国民年金が「国民生活の安定」を目的とするのに対し、厚生年金は「労働者及びその遺族の生活の安定と福祉の向上」が目的。「傷病」は含まれない点に注意。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":2},{"r":"法2条","t":"管掌","b":"厚生年金保険 は、 政府 が、管掌する。 管掌 厚生年金保険 の保険者 は、政府である。（法2条） 政府が管掌しているのであって 、「実施機関 」や「日本年金機構 」 が管掌しているのではありません 。 厚生年金保険の保険者は 「政府」であり 、「実施機関 」ではありま せん。","s":"厚生年金保険は政府が管掌します（運営の責任者は政府）。つまり、厚生年金保険の保険者は政府です。","e":"厚生年金の保険料を集めたり、年金を支給したりする大元の責任者は国（政府）です。実務は日本年金機構が行いますが、保険者はあくまで政府です。","p":"保険者は「政府」であり、「実施機関」や「日本年金機構」ではない。実施機関は実務を行うが、管掌しているのは政府。健康保険の保険者との違いに注意。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":3},{"r":"法100条の6","t":"機構による滞納処分等の実施","b":"◯1 機構は、滞納処分等を行う 場合には、 あらかじめ 、厚生労働大臣 の認可 を受けるとともに、 滞 納処分等実施規程 に従い、 徴収職員 に行わせなければならない。 ◯3 機構は、滞納処分等をした ときは、 速やかに 、その結果を 厚生労働大臣 に報告しなければならな い。","s":"日本年金機構が滞納処分等を行う場合には、あらかじめ厚生労働大臣の認可を受け、滞納処分等実施規程に従い、徴収職員に行わせなければなりません。","e":"保険料を滞納している会社に対して、年金機構が財産の差押えなどの滞納処分を行う場合、事前に厚生労働大臣の認可が必要です。勝手に差押えはできません。","p":"機構が滞納処分を行うには「あらかじめ」厚生労働大臣の「認可」が必要。「届出」や「承認」ではなく「認可」である点がポイント。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":7},{"r":"法100条の7","t":"滞納処分等実施規程","b":"◯1 機構は、滞納処分等実施規程 を定め、 厚生労働大臣 の認可 を受けなければならない。これを変 更しようとするときも、同様とする。 日本年金機構が行う滞納処分等 R02-03ｴ 日本年金機構 は、滞納処分等を行う 場合には、 あらかじめ 、厚生労働大臣の認可を受ける ととも に、滞納処分等実施規程 に従い、 徴収職員 に行わせなければならない。（法100条の6第1項） 日本年金機構 は、滞納処分等 をしたときは、 速やかに 、その 結果を厚生労働大臣 に報告しなければならな い。（法100条の6第3項） 日本年金機構 は、滞納処分等実施規程 を定め、 厚生労働大臣の認可 を受けなければならない。これを変更し ようとするときも、同様とする。（法100条の7第1項） 滞納処分等実施規程 には、差押えを行う時期、差押えに係る財産の選定方法その他の滞納処分等の公正かつ 確実な実施を確保するため に必要なものとして厚生労働省令で定める事項を記載しなければならない。（法10 0条の7第2項） R06-02E 徴収職員は、滞納処分等に係る法令に関する知識並びに 実務に必要な知識及び能力を有する機構の職員のうちから、「厚生労 働大臣の認可」を受けて、「日本年金機構の理事長」が任命します。 （法100条の6第2項）","s":"日本年金機構は、滞納処分等実施規程を定め、厚生労働大臣の認可を受けなければなりません。変更する場合も同様に認可が必要です。","e":"年金機構が「保険料の滞納処分はこういう手順で行います」というルールブックを作る場合、厚生労働大臣のOKが必要です。ルールを変える場合もまた認可が必要です。","p":"滞納処分等実施規程の制定・変更には「厚生労働大臣の認可」が必要。「届出」ではない点に注意。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":7},{"r":"法100条の5","t":"厚生労働大臣の直接徴収権","b":"◯1 厚生労働大臣 は、 滞納処分等 その他の処分に係る納付義務者が滞納処分等その他の 処分の執行を免 れる目的 でその 財産について 隠ぺい しているおそれがあることその他の政令で定める事情があるため保 険料その他厚生年金保険法の規定による 徴収金の効果的な徴収を行う 上で必要があると認めるときは、 財 務大臣 に、当該納付義務者に関する情報その他必要な 情報を提供する とともに、当該納付義務者に係る 滞納処分等 その他の処分の権限の 全部又は一部 を委任 することができる。 財務大臣への権限の委任","s":"滞納処分の対象者が財産を隠している恐れがある場合など、厚生労働大臣は自ら滞納処分等の処分を行うことができます。この場合、機構には行わせません。","e":"ある会社が保険料を滞納し、差押えを逃れるために財産を隠しているおそれがある場合、厚生労働大臣が直接乗り出して滞納処分を行うことができます。","p":"厚生労働大臣の「直接の権限」として行使できるケース。財産の隠ぺいのおそれがある場合が該当。機構の権限とは別の厚生労働大臣固有の権限。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":9},{"r":"法100条の9","t":"権限の委任","b":"◯1 厚生年金保険法 に規定する 厚生労働大臣 の権限（第100条の5第1項及び第2項に規定する厚生労働 大臣の権限を除く。）は、 地方厚生局長 に委任することができる。 ◯2 前項の規定により 地方厚生局長 に委任された権限は、 地方厚生支局長 に委任することができ る。 地方厚生局長等への権限の委任","s":"厚生年金保険法に規定する厚生労働大臣の権限は、地方厚生局長に委任することができます。ただし、法100条の5に規定する権限（直接徴収権）は除かれます。","e":"全国の厚生年金に関する事務を厚生労働大臣一人で処理するのは不可能なので、各地方の厚生局長に権限を委任して処理させます。ただし、財産隠ぺいへの直接対応などは委任できません。","p":"委任先は「地方厚生局長」。法100条の5の権限（直接徴収権）は委任の対象外。さらに地方厚生支局長への再委任も可能。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":12},{"r":"法6条","t":"適用事業所","b":"◯1 次の各号のいずれかに該当する 事業所若しくは事務所 （以下単に「 事業所 」という。）又は 船舶を適用 事業所 とする。 1. 適用業種 である事業の事業所であって、 常時5人以上 の従業員を使用する もの 2. 前号に掲げるもののほか、 国、地方公共団体 又は 法人 の事業所 であって、 常時従業員 を使用する もの 3. 船員法第1条に規定する船員として船舶所有者に使用される者が乗り組む 船舶 ◯2 前項第3号に規定する 船舶の船舶所有者 は、適用事業所の 事業主 とみなす。 強制適用事業所 R07-08A 「適用事業所 」とは、次のいずれかに該当する事業所をいう。（法6条1項） 強制適用事業所 1. 適用業種 である事業の事業所であって、 常時5人以上の従業員を使用する もの 2. R04-10A 国、地方公共団体 または 法人の事業所であって、 常時従業員を使用する もの 3. 船舶","s":"厚生年金保険が適用される事業所には、法律上当然に適用される「強制適用事業所」があります。適用業種で常時5人以上の従業員がいる個人事業所、法人の事業所、船舶などが該当します。","e":"株式会社なら従業員が1人でも強制適用です。一方、個人経営の飲食店は適用業種ではないため、何人従業員がいても強制適用にはなりません（任意適用は可能）。","p":"法人は業種・人数を問わず強制適用。個人事業所は「適用業種＋常時5人以上」で強制適用。非適用業種（飲食・サービス業・農林水産業等）の個人事業所は任意適用。健康保険と同じ仕組み。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":16},{"r":"法7条","t":"適用事業所の擬制","b":"第6条第1項第1号又は第2号の 適用事業所 が、それぞれ当該各号に 該当しなくなった ときは、その 事業 所について同条第3項（任意適用）の 認可があった ものと みなす 。 擬制 R04-07D 「船舶以外 」の強制適用の事業所 が、強制適用の事業所でなくなった 場合は、そのまま 任意適用事 業所の認可があった ものと みなされる 。（法7条）","s":"強制適用事業所が、適用要件を満たさなくなった場合（従業員が減った等）でも、自動的に任意適用の認可があったものとみなされ、引き続き適用事業所として扱われます。","e":"常時5人以上いた個人の適用事業所で、従業員が4人に減っても、すぐに適用から外れるわけではありません。任意適用事業所として引き続き適用されます。","p":"強制適用→要件喪失→「任意適用の認可があったものとみなす」という流れ。適用が途切れないようにする仕組み。取消しの手続きを踏まないと脱退できない。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":24},{"r":"法8条の2","t":"一括適用事業所","b":"◯1 2以上の適用事業所 （船舶 を除く。）の 事業主が同一 である場合には、当該事業主は、 厚生労働 大臣 の承認 を受けて、当該 2以上の事業所 を一の適用事業所 とすることができる。 ◯2 前項の 承認 があったときは、当該 2以上の適用事業所 は、 適用事業所でなくなった ものと みな す。","s":"2以上の適用事業所の事業主が同一である場合、厚生労働大臣の承認を受けて、それらを一つの適用事業所として取り扱うことができます（船舶を除く）。","e":"同じ会社がA支店とB支店を持っている場合、厚生労働大臣の承認を受ければ、2つの支店を1つの適用事業所として届出等をまとめることができます。","p":"要件は「事業主が同一」「厚生労働大臣の承認」。船舶は除外される。健康保険にも同様の規定あり。「認可」ではなく「承認」である点に注意。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":27},{"r":"法8条の3","t":"船舶の一括適用","b":"2以上の 船舶 の船舶所有者が同一 である場合には、当該 2以上の船舶 は、一の適用事業所 とする。この 場合において、当該 2以上の船舶 は、 適用事業所でない ものと みなす 。 一括適用の承認 取消しに 「同意しなかった者 」も資格を喪失します 。","s":"2以上の船舶の船舶所有者が同一である場合、当然に一つの適用事業所とされます。承認は不要です。","e":"同じ船会社が3隻の船を持っている場合、特に手続き不要で3隻まとめて1つの適用事業所として扱われます。","p":"船舶の場合は「当然に」一括適用。陸上の事業所のように「承認」は不要。また、適用事業所でない船舶も含めて一括される。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":27},{"r":"則13条","t":"新規適用事業所の届出","b":"◯1 法第6条第1項の規定により 初めて適用事業所 （第1号厚生年金被保険者に係るものに限る 。以下同 じ。） となった事業所の事業主 （船舶所有者を除く。）は、当該 事実があった日 から 5日以内 に、所定の 事項を記載した 届書を機構 に提出しなければならない。 ◯3 法6条1項の規定により 初めて適用事業所となった 船舶 の船舶所有者 は、当該 事実があった日 から 10日以内 に、所定の事項を記載した 届書を機構 に提出しなければならない。 新規適用届 初めて適用事業所 （第1号厚生年金被保険者に係るものに限る ）となった事業所の事業主 （船舶所有者を除 く）は、当該事実があった日から 5日以内 に、所定の事項を記載した「 新規適用届 」を日本年金機構 に提出しな ければならない。（則13条1項）","s":"初めて適用事業所となった事業所の事業主は、5日以内に新規適用届を機構に届け出なければなりません。","e":"新しく会社を設立して従業員を雇った場合、設立から5日以内に「新規適用届」を年金事務所（機構）に提出する必要があります。","p":"届出期限は「5日以内」。届出先は「機構」（日本年金機構）。船舶所有者は除く。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":30},{"r":"則23条","t":"事業所関係変更届","b":"◯1 事業主 （船舶所有者 を除く。）は、その 氏名若しくは 名称若しくは 住所、事業所の名称 若しくは 所 在地、第13条第1項第3号に掲げる事項又は同項第4号に掲げる事項（法人番号等）に 変更があった ときは、 5日以内 に、次の各号に掲げる事項を記載した届書を、 機構 に提出しなければならない。 1. 事業所の 名称及び所在地 2. 変更前 の事項及び 変更後 の事項並びに 変更の年月日 ◯4 船舶所有者 は、その 氏名、住所、第13条第3項第5号に掲げる事項又は同項第6号に掲げる事項に 変 更があった ときは、 速やかに 、次の各号に掲げる事項を記載した届書を 機構 に提出しなければなら ない。 1. 船舶所有者の 住所 2. 変更前 の事項及び 変更後 の事項並びに 変更年月日 事業主の氏名などの変更の届出 事業主 （船舶所有者を除く）は、その 氏名若しくは 名称若しくは 住所、事業所の名称 若しくは 所在地 、法人 番号など に変更があった ときは、 5日以内 に、次に掲げる事項を記載した「 適用事業所所在地 ・名称変更届 」を 日本年金機構 に提出しなければならない。（則23条1項） 事業主の氏名などの変更の届出 1. 事業所 の名称及び所在地 2. 変更前の事項及び変更後の事項 並びに 変更の年月日 R05-02A 船舶所有者 は、その 氏名、住所、法人番号 などに 変更があった ときは、 速やかに 、次の各号に掲げ る事項を記載した届書を 日本年金 機構に提出しなければならない。（則23条4項）","s":"事業主は、事業主の氏名・名称・住所、事業所の名称・所在地などに変更があったときは、届け出なければなりません。","e":"会社が本社を移転した場合や、社名を変更した場合は、変更届を届け出る必要があります。","p":"届出事項は氏名・名称・住所・事業所の名称・所在地など。変更届の届出期限にも注意。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":33},{"r":"則13条の2","t":"適用事業所全喪届","b":"◯1 適用事業所の事業主 （船舶所有者を除く。）は、 廃止 、休止 その他の事情により 適用事業所 に該当しなくなった ときは、当該事実があった日から 5日以内 に、次に掲げる事項を記載した届書を 機構 に提出しなければならない。ただし、第14条の規定により申請をするときは、この限りでない。 1. 事業主 の氏名又は名称及び住所 2. 事業所 の名称及び所在地 3. 該当しなくなった 年月日 及びその 事由 適用事業所に該当しなくなった場合の届出 R02-02D 適用事業所の事業主 （船舶所有者を除く）は、 廃止、休止その他の事情により 適用事業所に該当し なくなったとき は、任意適用取消の申請をする場合を除き、当該 事実があった日 から5日以内 に、次に掲げる事 項を記載した「 適用事業所全喪届 」を日本年金機構 に提出しなければならない。なお、適用事業所に該当しな くなったことを証する書類を添えなければならない。（則13条の2第1項・2項） 適用事業所に該当しなくなった場合の届出 1. 事業主 の氏名または 名称及び住所 2. 事業所 の名称及び所在地 3. 該当しなくなった 年月日 及びその 事由 「5日以内 」です。「10日以内 」ではありません 。","s":"適用事業所の事業主は、廃止・休止等により適用事業所に該当しなくなったときは、5日以内に全喪届を届け出なければなりません。","e":"会社を解散して全従業員が退職した場合、5日以内に「適用事業所全喪届」を届け出ます。","p":"届出期限は「5日以内」。「廃止・休止その他の事情」による場合。届出先は機構。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":36},{"r":"則14条の3","t":"特定適用事業所の届出","b":"◯1 公的年金制度の財政基盤及び最低保障機能の強化等のための国民年金法等の一部を改正する法律（以下 「年金機能強化法」という。）附則第17条第12項の規定により初めて同項に規定する特定適用事業所（以下 「特定適用事業所 」という。） となった適用事業所の事業主 （事業主が法人であるときは、本店又は主 たる事業所の事業主）は、当該事実があった日から 5日以内 に、所定の事項を記載した届書を 機構 に 提出しなければならない。 特定適用事業所の該当の届出 初めて特定適用事業所となった適用事業所の事業主 （事業主が法人であるときは、本店または主たる事業所 の事業主）は、当該事実があった日から 5日以内 に、所定の事項を記載した届書を 日本年金機構 に提出しなけれ ばならない。（則14条の3第1項）","s":"短時間労働者への適用拡大に関連して、特定適用事業所に該当する場合の届出について規定しています。","e":"従業員数が一定以上の企業（特定適用事業所）では、パートタイマーなども厚生年金の被保険者となりますが、その該当届や不該当届の手続きが必要です。","p":"年金機能強化法による適用拡大に関する規定。特定適用事業所の要件（従業員数基準）と届出の手続きが試験でも問われる。","f":"01_厚生年金保険法1-総則（目的、権限の委任、適用事業所）","pg":38},{"r":"法9条","t":"当然被保険者","b":"適用事業所 に使用される 70歳未満 の者は、 厚生年金保険 の被保険者 とする。 一般の被保険者（当然被保険者） 「当然被保険者 」とは、適用事業所に 使用される70歳未満の者 であり、 その者の厚生年金保険加入の意思の 有無を問わず 、当然に被保険者 となるものをいう。（法9条） 船員法に規定する 「船員」として船舶に乗り組む者 も70歳未満で あれば 被保険者 となります 。","s":"適用事業所に使用される70歳未満の者は、当然に厚生年金保険の被保険者となります。本人の意思や届出に関係なく、要件を満たせば自動的に被保険者です。","e":"25歳のBさんが株式会社に正社員として入社した日から、届出の有無にかかわらず、自動的に厚生年金の被保険者になります。","p":"要件は「適用事業所に使用される」＋「70歳未満」。国籍は問わない。「65歳未満」ではなく「70歳未満」である点がひっかけ。パート等の短時間労働者の適用基準も重要。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":3},{"r":"法12条","t":"適用除外","b":"次の各号のいずれかに該当する者は、第9条（当然被保険者）及び第10条第1項（任意単独被保険者）の規 定にかかわらず、 厚生年金保険 の被保険者としない 。 1. 臨時 に使用される者 （船舶所有者に使用される 船員 を除く。）であって、次に掲げるもの。 ただし、イ.に掲げる者にあっては 1月を超え 、ロ.に掲げる者にあっては 定めた期間を超え 、引 き続き使用されるに至った場合を 除く。 イ. 日々雇い入れられる 者 ロ. 2月以内の期間を定めて使用される 者であって、当該 定めた期間 を超えて使用されることが 見込 まれな いもの 2. 所在地が一定しない事業所 に使用される 者 3. 季節的業務 に使用される者 （船舶所有者に使用される 船員 を除く。）。ただし、 継続して4 月を超えて 使用される べき場合は、 この限りでない 。 4. 臨時的事業 の事業所に使用される 者。ただし、 継続して6月を超えて 使用される べき場合は、 この限りでない 。 適用除外 適用事業所に使用される者は、原則として、被保険者となるが、次に掲げる 適用除外 に該当する者は、 被保 険者とされない 。（法12条） 適用除外者 例外的な取扱い 1.ｰイ R05-03C R05-03E 臨時に使用される者で、日々雇い入れ られる者 （船舶所有者に使用される船員を除く） 1か月を超えた場合 1.ｰロ 2023改正 R04-10B 臨時に使用される者で、2 か月以内 の期間を定めて使用される者であって、 当該定めた期間を超えて 使用されることが見込まれないもの （船舶所有者に使用される船 員を除く） 定めた 期間を超えた場合 2. 季節的業務に使用される者 （船舶所有者に使用される船員を除く） 当初から継続して4 か月を超える場合 3. 臨時的事業の事業所に使用される者 当初から継続して6 か月を超える場合 4. 事業所で所在地が一定しないものに使用される者 ―","s":"臨時に使用される者や短期間の季節的業務に使用される者など、一定の要件に該当する者は、厚生年金保険の被保険者としません。","e":"2か月以内の期間を定めて雇用される臨時のアルバイトは、原則として厚生年金の被保険者にはなりません。ただし、所定の期間を超えて引き続き使用される場合は被保険者となります。","p":"適用除外者：日々雇い入れられる者（1月超で被保険者）、2月以内の期間雇用者（所定期間超で被保険者）、季節的業務（4月超で被保険者）、臨時的事業（6月超で被保険者）、所在地一定しない事業所。健康保険と同じ基準。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":5},{"r":"法13条","t":"資格取得の時期","b":"◯1 当然被保険者 は、適用事業所 に使用されるに至った日 若しくはその 使用される事業所 が適用事業 所となった日 又は第12条の 適用除外の規定に該当しなくなった日 に、被保険者の資格 を取得 す る。 当然被保険者の資格取得 R07-01B 当然被保険者 は、適用事業所 に使用されるに至った日 若しくはその使用される 事業所 が適用事業所 となった日 または法12条の 適用除外の規定に該当しなくなった日 に、被保険者 の資格を取得 する。（法13条1 項）","s":"当然被保険者は、適用事業所に使用されるに至った日、事業所が適用事業所となった日、または適用除外に該当しなくなった日に資格を取得します。","e":"4月1日に入社した場合、4月1日に被保険者資格を取得します。適用除外だった臨時雇用者が2か月を超えて勤務を続けた場合、超えた日に資格取得します。","p":"資格取得は「日」単位。「使用されるに至った日」であり「届出の日」ではない。届出が遅れても取得日は変わらない。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":12},{"r":"則15条","t":"資格取得届","b":"◯1 当然被保険者 （船員被保険者を除く。） の資格の取得の届出 は、当該 事実があった日 から 5日以内 に、厚生年金保険 被保険者資格取得届・70歳以上被用者該当届 を機構に提出することによって行うもの とする。 被保険者資格取得届 R05-02E R02-02C 当然被保険者 （船員被保険者を除く） の資格の取得の届出 は、当該 事実があった日 から5 日以内 に、「 厚生年金保険被保険者資格取得届 ・70歳以上被用者該当 届」を日本年金機構に提出 することによ って行う。（則15条1項） 2020改正 日本年金機構に提出する 「厚生年金保険被保険者資格取得届 ・70歳以上被用者該当届 （所定の様 式によるものに限る）」は、 所轄労働基準監督署長または所轄公共職業安定所長を経由 して提出することがで きる。（則15条2項） 被用者年金一元化が行われた平成27年10月当時、70歳未満の共済 組合の組合員等であった者は、厚生年金保険の被保険者の資格を取得 しました。","s":"当然被保険者の資格取得の届出は、事実があった日から5日以内に届け出なければなりません。","e":"4月1日に新入社員が入社した場合、事業主は4月5日までに資格取得届を届け出る必要があります。","p":"届出期限は「5日以内」。届出義務者は「事業主」。届出先は「機構」。船員被保険者は除く。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":13},{"r":"法14条","t":"資格喪失の時期","b":"当然被保険者 は、次の各号のいずれかに該当するに至った 日の翌日 （その事実があった日に更に第13 条に該当するに至ったとき、又は第5号に該当するに至ったときは、 その日 ）に、被保険者の 資格を喪 失する。 1. 死亡したとき。 2. その事業所又は船舶 に使用されなくなった とき。 3. 任意適用事業所 の適用取消しの認可 があったときなど。 4. 適用除外 の規定に 該当する に至ったとき。 5. 70歳 に達したとき。 当然被保険者の資格喪失","s":"当然被保険者は、死亡した日の翌日、退職した日の翌日、70歳に達した日などに資格を喪失します。ただし、同日に再取得する場合は当日喪失の場合もあります。","e":"3月31日に退職した場合、4月1日に資格を喪失します。70歳の誕生日の前日に70歳に達するため、誕生日の前日に資格を喪失します。","p":"資格喪失は原則「翌日」喪失。例外的に「当日」喪失するケース（同日再取得、70歳到達）に注意。70歳到達日＝誕生日の前日。退職日と喪失日のズレが頻出。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":15},{"r":"則22条","t":"資格喪失届","b":"◯1 当然被保険者 （船員被保険者を除く。） の資格喪失の届出 は、当該 事実があった日 から 5日以内 に、厚生年金保険 被保険者資格喪失届・70歳以上被用者不該当届 を機構 に提出することによって行 うものとする。 被保険者資格喪失届 R03-02C 当然被保険者 （船員被保険者を除く） の資格喪失の届出 は、当該 事実があった日 から5日以内 に、 「厚生年金保険被保険者資格喪失届 ・70歳以上被用者不該当届 」を日本年金機構に提出 することによって行 う。（則22条1項） 2020改正 日本年金機構に提出する 「厚生年金保険被保険者資格喪失届・70歳以上被用者不該当届（所定の様 式によるものに限る）は、所轄 公共職業安定所長 を経由して提出することができる。（則22条2項） 70歳に達したときは 、「その日 」に資格を喪失します 。「翌日」 ではありません 。 当然被保険者の資格喪失の届出は 、「5日以内 」です。「10日以 内」ではありません 。","s":"当然被保険者の資格喪失の届出は、事実があった日から5日以内に届け出なければなりません。","e":"従業員が3月31日に退職した場合、事業主は4月5日までに資格喪失届を届け出る必要があります。","p":"届出期限は「5日以内」。届出義務者は「事業主」。届出先は「機構」。70歳以上被用者該当届との関連にも注意。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":17},{"r":"則15条の2","t":"70歳以上被用者該当届","b":"◯1 70歳以上被用者 の要件該当の 届出は、当該 事実があった日 から 5日以内 に、厚生年金保険 被保険 者資格取得届・70歳以上被用者該当届 を機構に提出することによって行うものとする。ただし、70歳以上 の使用される者の要件に該当するに至った日の前日において適用事業所に使用されていた被保険者が、 引 き続き当該適用事業所に使用される ことにより70歳以上の使用される者の要件に該当するに至ったとき （当該者の標準報酬月額に相当する額が70歳以上の使用される者の要件に該当するに至った日の 前日にお ける標準報酬月額と同額 である場合に限る。）は、 この限りでない 。 当然被保険者は 、70歳未満までですが 、「在職老齢年金制度 」は7 0歳以上の使用される者 に対しても適用されるため 、「70歳以上被用 者」という概念が生まれました 。","s":"70歳以上の者が被用者に該当した場合の届出は、事実があった日から5日以内に届け出なければなりません。","e":"70歳以上の方が適用事業所で働き始めた場合、保険料は発生しませんが、在職老齢年金の調整のため「70歳以上被用者該当届」を届け出ます。","p":"70歳以上被用者は被保険者ではないが、在職老齢年金の仕組みの対象。届出期限は「5日以内」。保険料負担はないが届出は必要。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":21},{"r":"則22条の2","t":"70歳以上被用者不該当届","b":"◯1 70歳以上の使用される者 （船員たる70歳以上の使用される者を除く。）がその要件に該当しなく なった日の届出は、当該事実があった日から 5日以内 に、厚生年金保険 被保険者資格喪失届・70歳以 上被用者不該当届 を機構に提出することによって行うものとする。 70歳以上の使用される者の不該当の届出","s":"70歳以上の使用される者が要件に該当しなくなった場合の届出は、事実があった日から5日以内に届け出ます。","e":"70歳以上で働いていた方が退職した場合、事業主は5日以内に不該当届を届け出ます。","p":"届出期限は「5日以内」。該当届と不該当届のペアで覚える。届出義務者は事業主。","f":"02_厚生年金保険法2-被保険者等（当然被保険者、70歳以上被用者）","pg":24},{"r":"法10条","t":"任意単独被保険者","b":"◯1 適用事業所以外の事業所 に使用される 70歳未満 の者は、 厚生労働大臣 の認可 を受けて、 厚生年金保険 の被保険者 となることができる。 ◯2 前項の 認可を受けるには、その 事業所 の事業主の同意 を得なければならない。","s":"適用事業所以外の事業所に使用される70歳未満の者は、事業主の同意を得て、厚生労働大臣の認可を受けることで、被保険者となることができます。","e":"個人経営の美容室（非適用業種で5人未満）で働く従業員が、自分から厚生年金に入りたいと思った場合、事業主の同意と厚生労働大臣の認可があれば被保険者になれます。","p":"要件は「事業主の同意」＋「厚生労働大臣の認可」。任意適用事業所の認可（事業所全体）と異なり、個人単位の加入。保険料は事業主と折半。","f":"03_厚生年金保険法3-被保険者等（任意単独被保険者、高齢任意加入被保険者）","pg":2},{"r":"法11条","t":"任意単独被保険者の資格喪失","b":"前条の規定による 被保険者 は、厚生労働大臣 の認可 を受けて、 被保険者 の資格を喪失 することが できる。 平成24年附則17条の3 当分の間 、適用事業所以外の事業所に使用される 特定4分の3未満短時間労働者 については、第10条第 1項の規定にかかわらず、 厚生年金保険の被保険者としない 。 任意単独被保険者 R02-09C 適用事業所以外の事業所に使用される70歳未満の者 は、次のいずれの要件をも満たす場合には、 任 意単独被保険者 となることができる。（法10条） 任意単独被保険者 1. 厚生労働大臣の認可 を受けること 2. 任意単独被保険者 となることにつき 事業主の同意 を得ること","s":"任意単独被保険者は、厚生労働大臣の認可を受けて資格を喪失することができます。当分の間、適用事業所以外の事業所に使用される被保険者は事業主の同意がなくなった場合も喪失します。","e":"任意単独被保険者として加入していたCさんが脱退したい場合、厚生労働大臣の認可が必要です。また、事業主が同意を撤回した場合も資格を喪失します。","p":"喪失にも「厚生労働大臣の認可」が必要。「届出」では喪失しない。事業主の同意撤回による喪失は「当分の間」の経過措置。","f":"03_厚生年金保険法3-被保険者等（任意単独被保険者、高齢任意加入被保険者）","pg":2},{"r":"附則4条の5","t":"適用事業所以外の70歳以上被用者","b":"◯1 適用事業所以外の事業所 に使用される 70歳以上の者 であって、 老齢厚生年金 、国民年金法による 老齢基礎年金 その他の 老齢又は退職を支給事由とする年金たる給付 であって政令で定める給付の 受給権 を有しない もの（適用除外に該当する者を除く。）は、 厚生労働大臣 の認可 を受けて、 被保険者となる ことができる。 ◯ 当該 認可を受けるには、その事業所の 事業主の同意 を得なければならない。 ◯ 適用事業所以外の事業所に使用される高齢任意加入被保険者 は、厚生労働大臣 の認可 を受けて、被 保険者の 資格を喪失 することができる。 平成24年附則17条の3 当分の間 、適用事業所以外の事業所に使用される 特定4分の3未満短時間労働者 については、厚生年金 保険の 被保険者としない 。 適用事業所以外の事業所に使用される高齢任意加入被保険者","s":"適用事業所以外の事業所に使用される70歳以上の者で、老齢給付の受給権を有する者は、事業主の同意を得て、厚生労働大臣に申し出ることで、70歳以上被用者として在職老齢年金の仕組みの適用を受けます。","e":"非適用事業所で働く72歳の方が老齢厚生年金を受給している場合、申出により在職老齢年金の調整を受けることになります。","p":"適用事業所以外の70歳以上の場合は「申出」が必要。適用事業所の場合は当然に適用される点と区別する。","f":"03_厚生年金保険法3-被保険者等（任意単独被保険者、高齢任意加入被保険者）","pg":14},{"r":"附則4条の3","t":"適用事業所の70歳以上被用者","b":"◯1 適用事業所 に使用される 70歳以上の者 であって、 老齢厚生年金 、国民年金法による 老齢基礎年金 その他の 老齢又は退職を支給事由とする年金たる給付 であって政令で定める給付の 受給権を有しない も の（適用除外に該当する者を除く。）は、 実施機関 に申し出 て、被保険者となる ことができる。 ◯4 適用事業所に使用される高齢任意加入被保険者 は、いつでも 、実施機関 に申し出 て、被保険者の 資格を喪失 することができる。 適用事業所に使用される高齢任意加入被保険者 R06-03B 適用事業所に使用される70歳以上の者 は、次のいずれの要件を満たす場合に、 被保険者となる こと ができる。（附則4条の3第1項） 適用事業所に使用される高齢任意加入被保険者 1. 老齢厚生年金 、国民年金法による 老齢基礎年金 その他の 老齢または退職を支給事由とする年金たる給付 で あって政令で定める給付の 受給権を有しない こと 2. 実施機関に申し出る こと 3. 適用除外のいずれにも該当しないこと 2024改正 高齢任意加入被保険者の資格の取得の申出 は、次の事項を記載した申出書を 日本年金機構 に提出する ことによって行う。（則5条の2第1項）","s":"適用事業所に使用される70歳以上の者で、老齢給付の受給権を有する者は、当然に70歳以上被用者として在職老齢年金の仕組みが適用されます。","e":"70歳を超えても会社で働き続けるDさんが老齢厚生年金を受給中の場合、給与に応じて年金が調整（支給停止）されることがあります。","p":"適用事業所の場合は「当然に」適用。申出や届出は不要（事業主の届出は必要）。被保険者ではないが、在職老齢年金の対象となる点が重要。","f":"03_厚生年金保険法3-被保険者等（任意単独被保険者、高齢任意加入被保険者）","pg":20},{"r":"法18条","t":"資格の確認","b":"◯1 被保険者 の資格の取得及び喪失 は、 厚生労働大臣 の確認 によって、その 効力を生ずる 。ただ し、第10条第1項（ 任意単独被保険者の資格の取得 ）の規定による被保険者の資格の取得及び第14条第3号 （任意適用事業所の適用取消しの認可 及び任意単独被保険者の資格の喪失の認可 ）に該当したことによる被保 険者の 資格の喪失 は、この限りでない 。 ◯2 前項の 確認は、 事業主による届出 若しくは 被保険者又は被保険者であった者 からの 請求 によ り、又は 職権 で行うものとする。","s":"被保険者の資格の取得・喪失は、厚生労働大臣の確認によって効力を生じます。ただし、任意単独被保険者の資格取得と喪失は認可によるので確認は不要です。","e":"4月1日に入社しても、厚生労働大臣の確認が行われて初めて資格取得の効力が生じます。ただし確認の効力は取得日に遡ります。","p":"「確認」は効力発生要件だが、効力は「確認の日」ではなく「取得日・喪失日」に遡及する。任意単独被保険者は「認可」で効力発生するため確認不要。届出＝確認ではない。","f":"04_厚生年金保険法4-被保険者等（資格の得喪の確認、期間計算）","pg":2},{"r":"法31条","t":"確認の請求","b":"◯1 被保険者又は被保険者であった者 は、 いつでも 、第18条第1項の規定による 確認を請求 するこ とができる。 確認 被保険者の資格の取得及び喪失 は、厚生労働大臣の確認 によって、その 効力を生ずる。（法18条1項） 確認の方法 は次の通りである。（法18条2項） 確認 1. 事業主 からの 届出 2. 被保険者または被保険者であった者 からの 請求 3. 厚生労働大臣 の職権","s":"被保険者または被保険者であった者は、いつでも厚生労働大臣に対して資格の確認を請求することができます。","e":"「自分が厚生年金の被保険者になっていないのではないか」と疑問に思ったら、いつでも年金事務所を通じて確認の請求ができます。","p":"請求できるのは「被保険者又は被保険者であった者」。「いつでも」請求可能（期間制限なし）。事業主には請求権がない点に注意。","f":"04_厚生年金保険法4-被保険者等（資格の得喪の確認、期間計算）","pg":2},{"r":"法18条の2","t":"二以上の種別の被保険者の資格取得","b":"◯1 第2号厚生年金被保険者 、第3号厚生年金被保険者 又は 第4号厚生年金被保険者 は、第13 条の規定にかかわらず、 同時に 、第1号厚生年金被保険者 の資格を取得しない 。 ◯2 第1号厚生年金被保険者 が同時に 第2号厚生年金被保険者 、第3号厚生年金被保険者 又は第4号厚生 年金被保険者 の資格を有するに至ったときは、 その日 に、当該 第1号厚生年金被保険者 の資格を喪失 する。 異なる被保険者の種別に係る資格の得喪 第2号厚生年金被保険者 、第3号厚生年金被保険者 または 第4号厚生年金被保険者 は、同時に 、第1号厚生年金 被保険者の資格を取得しない 。（法18条の2第1項） R03-07D 第1号厚生年金被保険者 が同時に 第2号厚生年金被保険者 、第3号厚生年金被保険者 または 第4号厚 生年金被保険者 の資格を有する に至ったときは、 その日 に、当該 第1号厚生年金被保険者 の資格を喪失 する。 （法18条の2第2項） 「官民人事交流制度」により、国が民間企業の従業員を常勤の正規 職員として有期的に雇用したり、逆に、民間企業が国家公務員を従業 員として有期的に雇用したりすることがあります。（人事院HP） 例えば、前者（民間から国へ）の場合、身分は国の正規職員とな り、給与も国が支給し、国家公務員の諸制度が適用されます。 この場合 、第1号厚生年金被保険者と第2号厚生年金被保険者の資 格を同時に取得するのではなく 、第1号厚生年金被保険者の資格は喪 失し、第2号厚生年金被保険者の資格を取得することになります 。 同時に資格を取得することはないため 、「2以上事業所勤務届 」の 提出も必要ありません 。","s":"第2号～第4号厚生年金被保険者は、同時に第1号厚生年金被保険者の資格を取得することはありません（種別の被保険者資格の同時取得の制限）。","e":"公務員として共済組合に加入している人（第2号～第4号）が、副業で民間企業でも働く場合、種別ごとの被保険者資格の取扱いに注意が必要です。","p":"第1号～第4号の種別の区分（第1号：民間、第2号：国共済、第3号：地共済、第4号：私学共済）。二以上の種別の被保険者になる場合の取扱いが出題される。","f":"04_厚生年金保険法4-被保険者等（資格の得喪の確認、期間計算）","pg":7},{"r":"法19条","t":"被保険者期間の計算","b":"◯1 被保険者期間を計算する 場合には、 月によるものとし、被保険者の 資格を取得した月 からその 資格を喪失した月の前月 までをこれに 算入する。 ◯2 被保険者 の資格を取得した月 にその資格を喪失した ときは、その月を 1箇月 として被保険者期間に 算入する。ただし、その月に 更に被保険者又は国民年金の被保険者（国民年金法第7条第1項第2号に規定する 第2号被保険者 を除く。）の 資格を取得した ときは、 この限りでない 。 ◯3 被保険者の 資格を喪失 した後、 更にその資格を取得した 者については、 前後の被保険者期間 を合算 する。 ◯4 前3項の規定は、 被保険者 の種別ごと に適用する。 被保険者期間の計算（原則）","s":"被保険者期間は月単位で計算し、資格取得月から資格喪失月の前月までを算入します。同じ月に取得・喪失した場合は1か月として算入します。","e":"4月1日に入社、翌年3月31日に退職（4月1日喪失）した場合、4月から3月までの12か月が被保険者期間です。4月15日入社、4月28日退職（4月29日喪失）の場合は1か月として算入。","p":"「取得月」は算入、「喪失月」は不算入（前月まで）。同月得喪は1か月算入。月末退職→翌月1日喪失→その前月（退職月）まで算入。月途中退職→退職日翌日喪失→前月まで算入。","f":"04_厚生年金保険法4-被保険者等（資格の得喪の確認、期間計算）","pg":8},{"r":"法27条","t":"届出義務","b":"適用事業所の事業主 又は第10条第2項（ 任意単独被保険者 ）の同意をした事業主 （第100条第1項及び第4 項、第102条第2項並びに第103条を除き、以下単に「 事業主 」という。）は、 被保険者 （被保険者であった7 0歳以上の者であって当該適用事業所に使用されるものとして厚生労働省令で定める要件に該当するもの（以 下「70歳以上の使用される者 」という。）を 含む。）の 資格の取得及び喪失 （70歳以上の使用される者 にあっては、厚生労働省令で定める要件に該当するに至った日及び当該要件に該当しなくなった日）並びに 報酬月額 及び 賞与額 に関する事項を 厚生労働大臣 に届け出 なければならない。","s":"適用事業所の事業主は、資格の取得・喪失や報酬月額の届出など、厚生年金保険に関する届出を行う義務があります。","e":"従業員の入退社、給与変更、賞与支払いなどがあった場合、事業主が届出を行います。従業員本人ではなく事業主に届出義務があります。","p":"届出義務者は「事業主」。被保険者本人ではない。任意単独被保険者の同意をした事業主も含む。届出を怠ると罰則あり。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":2},{"r":"法98条","t":"事業主の届出","b":"◯1 事業主 は、第27条に規定する事項を除くほか、厚生労働省令の定める事項を 厚生労働大臣 に届け 出なければならない。 事業主の届出 事業主 は、被保険者 （70歳以上の使用される者を含む）の 資格の取得及び喪失 （70歳以上の使用される者に あっては、厚生労働省令で定める要件に該当するに至った日及び当該要件に該当しなくなった日）並びに 報酬 月額及び賞与額に関する事項 を厚生労働大臣 に届け出 なければならない。（法27条） 事業主 は、法27条に規定する事項を除くほか、厚生労働省令の定める事項を 厚生労働大臣 に届け出 なければ ならない。（法98条1項）","s":"事業主は、資格関係以外にも、厚生労働省令で定める事項を厚生労働大臣に届け出なければなりません。届出の受理は機構が行います。","e":"被保険者の氏名変更、住所変更、事業所の各種変更などについて、事業主は届出義務を負います。","p":"法27条の届出と法98条の届出の違い。法98条は法27条に規定する事項「以外」の届出事項をカバー。届出先の「厚生労働大臣」は実際には機構経由。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":2},{"r":"則81条","t":"基礎年金番号通知書","b":"◯1 厚生労働大臣 は、初めて被保険者の資格を取得した者 （既に基礎年金番号通知書の交付を受けた者を除 く。）については、 基礎年金番号通知書 を作成して被保険者 に交付しなければならない。 ◯2 前項の場合において、 基礎年金番号通知書 を交付しようとするときは、 厚生労働大臣 は、当該被保険者 を使用する 事業主 を通じて 交付することができる。 基礎年金番号通知書の交付 2022改正 厚生労働大臣 は、初めて被保険者の資格を取得した 者（既に基礎年金番号通知書の交付を受けた者 を除く）については、 基礎年金番号通知書 を作成して被保険者に交付 しなければならない。（則81条1項） 2022改正 基礎年金番号通知書 を交付しようとするときは、 厚生労働大臣 は、当該被保険者を使用する 事業主 を通じて 交付することができる。（則81条2項） 2022改正 事業主 は、基礎年金番号通知書の送付を受けた ときは、 速やかに 、これを 被保険者に交付 しなけれ ばならない。（則17条） 基礎年金番号通知書等の提出 2022改正 かつて被保険者 であったことがある者 は、当然被保険者（第1号厚生年金被保険者に限る）の 資格 を取得 したとき（70歳以上の使用される者にあっては、70歳以上の使用される者の要件に該当するに至ったと きとし、 事業主に個人番号を提供している場合を除く ）は、直ちに、 基礎年金番号通知書 その他の基礎年金番 号を明らかにすることができる書類を「 事業主 」に提出しなければならない。（則3条1項） 基礎年金番号通知書の送付を受けた事業主は 、「速やかに 」被保険 者に交付します 。「5日以内 」ではありません 。","s":"厚生労働大臣は、初めて被保険者資格を取得した者（既に基礎年金番号通知書の交付を受けた者を除く）に基礎年金番号通知書を作成して交付します。","e":"20歳になり国民年金に加入済みの方が就職した場合、既に基礎年金番号があるので新たな通知書は交付されません。初めて年金制度に加入する外国人労働者などに交付されます。","p":"基礎年金番号は年金制度共通の番号。「既に交付を受けた者を除く」がポイント。交付するのは厚生労働大臣（実務は機構）。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":25},{"r":"法28条","t":"厚生年金保険原簿","b":"実施機関 は、被保険者 に関する 原簿 を備え、これに 被保険者 の氏名、資格の取得及び喪失 の 年月日、 標準報酬 （標準報酬月額及び標準賞与額をいう。）、 基礎年金番号 その他主務省令で定め る事項を 記録しなければならない。 厚生年金保険原簿 R06-03E 実施機関 は、被保険者に関する 原簿を備え、これに 被保険者 の氏名、資格の取得及び喪失の年月 日、標準報酬 、基礎年金番号 その他主務省令で定める事項を 記録しなければならない。（法28条） 基礎年金番号通知書は 「事業主 」に提出します 。「厚生労働大臣 」 などに提出するのではありません 。 厚生年金保険原簿の記載事項（則89条） 1. 被保険者の 氏名 2. 資格の 取得及び喪失の年月日 3. 標準報酬 4. 被保険者の 基礎年金番号 5. 被保険者の 生年月日 及び住所 6. 被保険者の 種別及び基金の加入員であるかないかの区別 7. 事業所の 名称及び船舶所有者の 氏名（船舶所有者が法人であるときは、名称） 8. 被保険者が基金の加入員であるときは、当該 基金の名称 9. 賞与（第1号厚生年金被保険者に係るものに限る）の支払年月日 10. 保険給付 （厚生労働大臣が支給するものに限る）に関する事項 実施機関たる厚生労働大臣 は、厚生年金保険原簿 に離婚時みなし被保険者期間 を有する者の氏名、 離婚時み なし被保険者期間 、離婚時みなし被保険者期間に係る 標準報酬 その他主務省令で定める事項（離婚時みなし被 保険者期間を有する者の基礎年金番号、生年月日及び保険給付（厚生労働大臣が支給するものに限る）に関す る事項）を 記録しなければならない。（法78条の7、則78条の10） 実施機関たる厚生労働大臣 は、厚生年金保険原簿 に被扶養配偶者みなし被保険者期間 を有する者の氏名、 被 扶養配偶者みなし被保険者期間 、被扶養配偶者みなし被保険者期間に係る 標準報酬 その他主務省令で定める事 項（被扶養配偶者みなし被保険者期間を有する者の基礎年金番号、生年月日及び保険給付（厚生労働大臣が支 給するものに限る）に関する事項）を 記録しなければならない。（法78条の15、則78条の18）","s":"実施機関は、被保険者に関する原簿を備え、氏名、資格の取得・喪失の年月日、標準報酬、保険料納付状況等を記録しなければなりません。","e":"年金事務所には、すべての厚生年金被保険者の記録が保管されています。給与額の変遷や加入期間などが全て記録されています。","p":"原簿の記録事項（氏名、資格の取得・喪失年月日、標準報酬、保険料納付状況等）。「ねんきん定期便」はこの原簿の情報に基づいて作成される。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":26},{"r":"法28条の2","t":"厚生年金保険原簿の訂正請求","b":"◯1 第1号厚生年金被保険者 であり、又はあった者は、 厚生年金保険原簿 に記録された自己に係る 特 定厚生年金保険原簿記録 （第1号厚生年金被保険者の資格の取得及び喪失の年月日、標準報酬その他厚生労 働省令で定める事項の内容をいう。以下この項において同じ。）が 事実でない 、又は 厚生年金保険原簿 に自己 に係る 特定厚生年金保険原簿記録 が記録されていない と思料する ときは、 厚生労働大臣 に対し、 厚生年 金保険原簿 の訂正の請求 をすることができる。 訂正請求 R03-06A 第1号厚生年金被保険者であり 、またはあった者 は、厚生年金保険原簿 に記録された自己に係る 特 定厚生年金保険原簿記録 が事実でない 、または厚生年金保険原簿に自己に係る特定厚生年金保険原簿記録が 記 録されていない と思料するときは、 厚生労働大臣 に対し、 厚生年金保険原簿 の訂正の請求 をすることができ る。（法28条の2第1項）","s":"第1号厚生年金被保険者であった者は、厚生年金保険原簿の記録が事実と異なると思料するときは、厚生労働大臣に訂正の請求ができます。","e":"年金記録を確認したら、過去の勤務先での加入記録が抜けていた場合、厚生労働大臣に対して記録の訂正を請求できます。","p":"訂正請求できるのは「第1号厚生年金被保険者であり、又はあった者」。特定厚生年金保険原簿記録が対象。いわゆる「年金記録問題」に対応する規定。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":28},{"r":"法31条の2","t":"年金個人情報の提供","b":"実施機関 は、厚生年金保険制度 に対する 国民の理解を増進 させ、及びその 信頼を向上 させる ため、 被保険者 に対し、当該 被保険者 の保険料納付の実績 及び 将来の給付に関する必要な情報 を分かりやすい形で 通知するものとする。 被保険者に対する情報の提供（ねんきん定期便）","s":"実施機関は、厚生年金保険制度に対する国民の理解と信頼を高めるため、被保険者に保険料納付実績や年金見込額などの情報を通知します。","e":"毎年届く「ねんきん定期便」は、この規定に基づいて被保険者に送付されるもので、これまでの保険料納付実績や将来の年金見込額が記載されています。","p":"「ねんきん定期便」の法的根拠。提供される情報は保険料納付実績と年金見込額等。目的は「国民の理解の増進」と「信頼の向上」。","f":"05_厚生年金保険法5-届出など（届出、基礎年金番号通知書）","pg":33},{"r":"法25条","t":"現物給与の価額","b":"報酬又は賞与の全部又は一部 が、通貨以外のもので支払われる 場合においては、その 価額は、その 地方 の時価 によって、 厚生労働大臣 が定める 。 現物給与 R02-05A 報酬または賞与の全部または一部 が、「 通貨以外 のもので支払われる 」場合においては、その 価額 は、その地方の時価によって 、厚生労働大臣が定める 。（法25条）","s":"報酬や賞与の全部または一部が通貨以外（現物）で支払われる場合、その価額はその地方の時価によって厚生労働大臣が定めます。","e":"会社が従業員に社宅を提供したり、食事を支給したりする場合、その現物の価値を金額に換算して報酬に含めます。換算額は厚生労働大臣が定めた基準によります。","p":"現物給与の評価は「その地方の時価」により「厚生労働大臣」が定める。都道府県ごとに定められた「現物給与の価額」が使われる。労働協約で定めがある場合はそれによる。","f":"06_厚生年金保険法6-標準報酬","pg":4},{"r":"法20条","t":"標準報酬月額","b":"◯1 標準報酬月額 は、被保険者 の報酬月額 に基づき、次の 等級区分 （第20条第2項の規定により 等 級区分の改定 が行われたときは、 改定後の等級区分 ）によって定める。 等級区分 R06-07A 2021改正 厚生年金保険法 の「標準報酬月額 」は、 第1級 （88,000円 ）から 第32級 （650,000 円）までの 32等級に区分されている。（法20条1項、令和2年政令246号1条） 当該規定は、 70歳以上の使用される者 に係る標準報酬月額に相当する額について 準用される。（法46条2 項） 健康保険の標準報酬月額 は、第1級 （58,000円 ）から第50級 （1, 390,000円 ）までの50等級に区分されています 。 厚生年金保険は 長期給付 の制度 、健康保険は 短期給付 の制度です 。 そのため、健康保険の標準報酬月額は、その時々の報酬額にできる だけ即した金額とするため、厚生年金保険よりも標準報酬月額の範囲 が広く設定されています。 「70歳以上の使用される者 」も当然被保険者と同一の等級区分 （第1級88,000円から第32級650,000円 ）となります 。","s":"標準報酬月額は、被保険者の報酬月額に基づき、等級区分により決定されます。第1級（88,000円）から第32級（650,000円）まであります。","e":"月給25万円の人は、標準報酬月額の等級表に当てはめて、該当する等級（例：260,000円）の標準報酬月額が適用されます。保険料はこの額をもとに計算されます。","p":"等級は第1級（88,000円）～第32級（650,000円）の32等級。健康保険は50等級（上限139万円）と異なる。下限・上限の金額が頻出。毎年9月に等級区分の改定が行われることがある。","f":"06_厚生年金保険法6-標準報酬","pg":5},{"r":"法26条","t":"養育期間の従前標準報酬月額のみなし措置","b":"◯1 3歳に満たない子 を養育し、又は 養育していた被保険者又は被保険者であった者 が、主務省令で定 めるところにより 実施機関 に申出（被保険者にあっては、その使用される事業所の 事業主を経由 し て行うものとする。）をしたときは、当該 子を養育することとなった日 （厚生労働省令で定める事実が 生じた日にあっては、その日）の 属する月 から次の各号のいずれかに該当するに 至った日の翌日の属 する月の前月 までの 各月のうち、その 標準報酬月額 が当該 子を養育することとなった日 の属する 月の前 月（当該月において 被保険者でない 場合にあっては、 当該月前 1年以内 における 被保険者であった月の うち直近の月 。以下この条において「 基準月 」という。）の 標準報酬月額 （この項の規定により当該子 以外の子に係る基準月の標準報酬月額が標準報酬月額とみなされている場合にあっては、当該みなされた基準 月の標準報酬月額。以下この項において「 従前標準報酬月額 」という。） を下回る月 （当該 申出が行わ れた日の属する月前の月 にあっては、当該申出が行われた日の属する月の前月までの 2年間 のうちにある ものに 限る。）については、 従前標準報酬月額 を当該 下回る月 の第43条第1項（ 老齢厚生年金の年金 額）に規定する 平均標準報酬額 の計算の基礎となる 標準報酬月額 とみなす。 1. 当該 子が3歳 に達した とき。 2. 第14条各号（ 資格喪失の時期 ）のいずれかに該当するに至ったとき。 3. 当該子以外の子についてこの条の規定の適用を受ける場合における 当該子以外の子を養育する こと となったときその他これに準ずる事実として厚生労働省令で定めるものが生じたとき。 4. 当該 子が死亡した ときその他当該被保険者が当該 子を養育しないこととなった とき。 5. 当該被保険者に係る第81条の2第1項（ 育児休業期間中の保険料の免除 ）の規定の適用を受ける 育児 休業等を開始 したとき。 6. 当該被保険者に係る第81条の2の2第1項（ 産前産後期間中の保険料免除 ）の規定の適用を受ける 産前 産後休業を開始 したとき。 養育特例の要件","s":"3歳未満の子を養育する被保険者の標準報酬月額が下がった場合、申出により、従前の高い標準報酬月額で年金額が計算されます（みなし措置）。","e":"育児のため短時間勤務にして給料が下がっても、子が3歳になるまでの期間は、以前の高い給料で計算した年金額が保障されます。将来の年金が減らないようにする制度です。","p":"対象は「3歳に満たない子」を養育する場合。「申出」が必要（自動適用ではない）。保険料は実際の低い標準報酬月額で計算されるが、年金額は従前の高い額で計算。育休中だけでなく短時間勤務でも適用。","f":"06_厚生年金保険法6-標準報酬","pg":13},{"r":"法24条の4","t":"標準賞与額","b":"◯1 実施機関 は、被保険者 が賞与を受けた月 において、その月に当該被保険者が受けた 賞与額 に基づ き、これに 1,000円未満 の端数を生じたときはこれを 切り捨て て、その月における 標準賞与額 を決定する。この場合において、当該 標準賞与額 が150万円 （第20条第2項の規定による標準報酬 月額の等級区分の改定が行われたときは、政令で定める額。以下同じ。）を 超える ときは、これを 150万 円とする。 標準賞与額の決定","s":"実施機関は、被保険者が賞与を受けた月に、その賞与額の1,000円未満を切り捨てた額を標準賞与額として決定します。上限は1月あたり150万円です。","e":"ボーナスが523,800円支給された場合、1,000円未満を切り捨てて523,000円が標準賞与額になります。年3回ボーナスが出ても、各月150万円が上限です。","p":"端数処理は「1,000円未満切捨て」。上限は「150万円」（月額）。健康保険の標準賞与額の上限は「年度累計573万円」と異なるので混同注意。同月に2回以上賞与がある場合は合算。","f":"06_厚生年金保険法6-標準報酬","pg":33},{"r":"法80条","t":"国庫負担","b":"◯1 国庫は、毎年度 、厚生年金保険 の実施者 たる 政府 が負担する 基礎年金拠出金 の額の 2分の 1に相当する額を 負担する。 基礎年金拠出金の負担","s":"国庫は、毎年度、政府が負担する基礎年金拠出金の額の2分の1に相当する額を負担します。","e":"厚生年金から国民年金（基礎年金）に拠出する金額のうち、半分は国が税金で負担しています。","p":"国庫負担は「基礎年金拠出金の2分の1」。厚生年金の給付自体への国庫負担はない（基礎年金部分のみ）。以前は3分の1だったが2分の1に引上げ。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":2},{"r":"法81条","t":"保険料の徴収","b":"◯1 政府及び実施機関 （厚生労働大臣を除く 。）は、 厚生年金保険事業 に要する費用（ 基礎年金拠出 金を含む。）に充てるため、 保険料 を徴収する。 ◯2 保険料 は、被保険者期間の計算の基礎 となる 各月 につき、 徴収する ものとする。 ◯3 保険料額 は、 標準報酬月額 及び 標準賞与額 にそれぞれ 保険料率 を乗じて得た額とする。 保険料の徴収","s":"政府及び実施機関は、厚生年金保険事業に要する費用に充てるため、保険料を徴収します。保険料率は1000分の183です。","e":"会社員の給与から天引きされる厚生年金保険料は、標準報酬月額の18.3%（労使折半で各9.15%）です。","p":"保険料率は「1000分の183」（18.3%）で固定。2017年9月以降変更なし。労使折半。基礎年金拠出金も保険料から賄われる。坑内員・船員は異なる料率だった時期があるが現在は統一。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":6},{"r":"法82条","t":"保険料の負担と納付","b":"◯1 被保険者 及び被保険者 を使用する 事業主 は、それぞれ 保険料 の半額を負担 する。 ◯2 事業主 は、その使用する 被保険者 及び自己の負担する保険料 を納付する義務 を負う。 ◯4 第2号厚生年金被保険者 及び第2号厚生年金被保険者 を使用する 事業主 は、政令で定めるところに より、それぞれ 保険料 の半額を負担 する。 ◯5 第3号厚生年金被保険者 及び第3号厚生年金被保険者 を使用する 事業主 は、政令で定めるところに より、それぞれ 保険料 の半額を負担 する。 保険料の負担及び納付義務","s":"被保険者と事業主がそれぞれ保険料の半額を負担します。事業主は被保険者と自己の負担する保険料を合わせて納付する義務があります。","e":"月給30万円の社員の保険料は月額約5.5万円（18.3%）。そのうち約2.75万円を社員が、約2.75万円を会社が負担し、会社がまとめて納付します。","p":"「折半負担」が原則。事業主に「納付義務」がある。任意単独被保険者の保険料は全額本人負担ではなく事業主と折半。高齢任意加入被保険者は事業主の同意がなければ全額自己負担。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":10},{"r":"法81条の2","t":"育児休業期間中の保険料免除","b":"◯1 育児休業等 をしている 被保険者 （第81条の2の2（ 産前産後期間中の保険料の免除 ）の規定の適用を受 けている被保険者を 除く。第3項において同じ。）が使用される事業所の 事業主 が、主務省令で定めると ころにより 実施機関 に申出 をしたときは、第81条第2項の規定にかかわらず、次の各号に掲げる場合の 区分に応じ、当該各号に定める月の当該被保険者に係る 保険料 （その 育児休業等の期間 が1月 以下である 者については、 標準報酬月額 に係る保険料に 限る。）の 徴収は行わない 。 1. その育児休業等を 開始した日の属する月 とその育児休業等が 終了する日の翌日が属する月 とが異なる 場 合…その育児休業等を 開始した日の属する月 からその育児休業等が 終了する日の翌日が属する月の前月 ま での月 2. その育児休業等を 開始した日の属する月 とその育児休業等が 終了する日の翌日が属する月 とが同一であ り、かつ、当該月における育児休業等の日数として厚生労働省令で定めるところにより計算した日数が 14日以上 である場合… 当該月 育児休業期間中の保険料免除","s":"育児休業等をしている被保険者が使用される事業所の事業主が申出をしたときは、育児休業等の期間中、被保険者・事業主双方の保険料が免除されます。","e":"育児休業を取得しているEさんの保険料は、会社が届け出ることで、本人負担分も会社負担分も免除されます。免除期間も被保険者期間として年金額に反映されます。","p":"免除は「事業主の申出」が必要。被保険者本人と事業主双方の保険料が免除。免除期間中も被保険者期間に算入され、保険料を納めたものとして年金額に反映。産前産後休業中の免除とは別規定。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":15},{"r":"法81条の2の2","t":"産前産後休業期間中の保険料免除","b":"◯1 産前産後休業 をしている 被保険者 が使用される事業所の 事業主 が、主務省令で定めるところにより 実施機関 に申出 をしたときは、第81条第2項の規定にかかわらず、当該 被保険者に係る保険料 であって その 産前産後休業を開始した日の属する月 からその 産前産後休業が終了する日の翌日が属する月の前 月までの期間に係るものの 徴収は行わない 。 産前産後休業期間中の保険料免除 R06-07E 産前産後休業をしている被保険者 が使用される事業所の 事業主 （第2号厚生年金被保険者 または 第3 号厚生年金被保険者 に係る保険料については、 当該被保険者 ）が、主務省令で定めるところにより 実施機関に 申出をしたときは、当該被保険者に係る保険料であってその 産前産後休業を開始した日の属する月 からその 産 前産後休業が終了する日の翌日が属する月の前月 までの期間に係るものの 徴収は行われ ない。（法81条の2の2 第1項・2項）","s":"産前産後休業をしている被保険者が使用される事業所の事業主が申出をしたときは、産前産後休業期間中の保険料が免除されます。","e":"出産予定日の6週間前から出産後8週間までの産休中、事業主が届け出れば、保険料が免除されます。","p":"育児休業中の免除とは別の規定。「事業主の申出」が必要。産前産後休業開始月から終了日の翌日の属する月の前月まで免除。被保険者期間に算入。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":22},{"r":"法83条","t":"保険料の納期限","b":"◯1 毎月の保険料 は、 翌月末日 までに、 納付しなければならない。 保険料の納期限","s":"毎月の保険料は翌月末日までに納付しなければなりません。","e":"4月分の厚生年金保険料は、5月31日までに納付する必要があります。","p":"納期限は「翌月末日」。健康保険と同じ。「当月末日」ではなく「翌月末日」。月末退職の場合、最後の月の保険料も翌月末日までに納付。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":24},{"r":"法83条の2","t":"口座振替による納付","b":"厚生労働大臣 は、納付義務者 から、預金又は貯金の払出しとその払い出した 金銭による保険料の納付 をその預金口座又は貯金口座のある 金融機関に委託して行うことを希望 する旨の 申出 があった場合に は、その 納付が確実 と認められ、かつ、その 申出を承認 することが 保険料の徴収上有利 と認められると きに限り、その 申出を承認 することができる。 口座振替による納付 厚生労働大臣 は、納付義務者 から、預金または貯金の払出しとその払い出した金銭による保険料の納付をそ の預金口座または貯金口座のある 金融機関に委託して行うことを希望する 旨の申出があった場合には、その 納 付が確実 と認められ、 かつ、その申出を承認することが 保険料の徴収上有利 と認められるときに限り、その 申 出を承認することができる。（法83条の2）","s":"厚生労働大臣は、納付義務者からの委託により、預金口座からの口座振替で保険料を納付する方法を認めることができます。","e":"事業主が毎月の保険料を銀行口座からの自動引き落としで納付する場合のことです。","p":"口座振替は「委託」に基づく任意の納付方法。「命令」ではなく「委託」。金融機関に委託して行う。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":26},{"r":"法84条","t":"保険料の源泉控除","b":"◯1 事業主 は、被保険者 に対して 通貨 をもって 報酬を支払う 場合においては、 被保険者 の負担すべき 前月 の標準報酬月額 に係る保険料（被保険者が その事業所又は船舶に使用されなくなった 場合において は、 前月 及び その月 の標準報酬月額 に係る 保険料 ）を 報酬 から控除する ことができる。 ◯2 事業主 は、被保険者 に対して 通貨 をもって 賞与を支払う 場合においては、 被保険者 の負担すべき 標 準賞与額 に係る 保険料 に相当する額を当該 賞与 から控除する ことができる。 ◯3 事業主 は、前2項の規定によって 保険料を控除 したときは、 保険料の控除に関する計算書を作成 し、その 控除額 を被保険者 に通知 しなければならない。 保険料の源泉徴収","s":"事業主は、被保険者に通貨で報酬を支払う際に、被保険者負担分の前月の保険料を控除（天引き）することができます。","e":"5月の給与から天引きされるのは4月分の保険料です。月末退職の場合、最後の給与から2か月分（前月分と当月分）控除されることがあります。","p":"控除できるのは「前月」の保険料。「当月」の保険料ではない。通貨で報酬を支払う場合に限る。賞与からの控除も可能。被保険者の負担分のみ控除可能。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":29},{"r":"法85条","t":"保険料の繰上徴収","b":"保険料 は、次の各号に掲げる場合におい ては、 納期前 であっても、 すべて徴収する ことができる。 1. 納付義務者 が、次のいずれかに該当する場合 ア. 国税、地方税 その他の 公課の滞納 によって、 滞納処分 を受ける とき。 イ. 強制執行 を受ける とき。 ウ. 破産手続開始の決定 を受けた とき。 エ. 企業担保権の実行手続の開始 があった とき。 オ. 競売の開始 があった とき。 2. 法人たる納付義務者 が、 解散 をした場合 3. 被保険者の使用される事業所 が、 廃止 された場合 4. 被保険者の使用される 船舶について 船舶所有者の変更 があった場合、又は当該 船舶が滅失 し、 沈没 し、若しくは 全く運航に堪えなくなる に至った場合 保険料の繰上徴収","s":"一定の場合（国税滞納処分を受ける場合、強制執行を受ける場合、破産手続開始の決定を受けた場合など）には、納期前であっても保険料を全て徴収することができます。","e":"会社が倒産して破産手続が開始された場合、まだ納期が来ていない保険料であっても、すぐに全額徴収できます。","p":"繰上徴収の事由（国税滞納処分、強制執行、破産手続開始決定、事業廃止、認可取消し等）が出題される。「できる」規定であり義務ではない。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":31},{"r":"法86条","t":"督促","b":"◯1 保険料 その他厚生年金保険法の規定による 徴収金 を滞納 する者があるときは、 厚生労働大臣 は、期 限を指定して、これを 督促 しなければならない。ただし、第85条（ 保険料の繰上徴収 ）の規定により保 険料を徴収するときは、 この限りでない 。 ◯2 前項の規定によって 督促をしようとするときは、 厚生労働大臣 は、納付義務者 に対して、 督促状 を 発する。 ◯3 前項の規定による 督促状 は、納付義務者 が、 健康保険法 第180条の規定によって 督促 を受ける 者であるときは、同法同条の規定による 督促状 に併記 して、発することができる。 ◯4 第2項の 督促状により指定する期限 は、督促状を発する日 から起算して 10日以上を経過した日 でな ければならない。ただし、第85条各号（保険料の繰上徴収）のいずれかに該当する場合は、この限りでな い。 督促 滞納する者 があるとき は、厚生労働大臣 は、期限を指定して、これを 督促しなければならない 。ただし、法8 5条（ 保険料の繰上徴収 ）の規定により保険料を徴収するときは、 この限りでない 。（法86条1項） 督促をしようとするとき は、厚生労働大臣は、 納付義務者 に対して、「 督促状 」を発する。（法86条2項） 督促状 は、納付義務者 が、健康保険法180条の規定によって督促を受ける者 であるときは、 督促状に併記 し て、発することができる。（法86条3項）","s":"保険料等を滞納する者があるときは、厚生労働大臣は期限を指定して督促しなければなりません。ただし、繰上徴収の場合は督促不要です。","e":"5月末日が納期限の保険料を払わない会社に対して、「6月20日までに払ってください」と督促状が送られます。","p":"督促は「しなければならない」（義務）。指定期限は「督促状を発する日から起算して10日以上」。繰上徴収の場合は督促なしに滞納処分可能。督促→延滞金→滞納処分の流れ。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":35},{"r":"法87条","t":"延滞金","b":"◯1 第86条第2項の規定によって 督促をした ときは、 厚生労働大臣 は、保険料額 に、 納期限の翌日 から 保険料完納又は財産差押の日の前日 までの 期間の日数 に応じ、 年14.6パーセント （当該 納期限の翌 日から 3月を経過する日 までの期間については、 年7.3パーセント ）の割合を乗じて計算した 延滞 金を徴収する。ただし、次の各号のいずれかに該当する場合又は滞納につきやむを得ない事情があると認 められる場合は、この限りでない。 1. 保険料額 が1,000円未満 であるとき。 2. 納期を繰り上げて徴収 するとき。 3. 納付義務者の住所若しくは居所が国内にないため、又はその住所及び居所がともに明らかでないため、 公示送達 の方法によって督促した とき。 ◯3 延滞金 を計算するにあたり、 保険料額 に1,000円未満 の端数があるときは、その 端数は、 切り捨 てる 。 ◯4 督促状に指定した期限 までに 保険料 を完納 したとき、又は前3項の規定によって計算した金額が 100円未満 であるときは、 延滞金は 、徴収しない 。 ◯5 延滞金の金額 に100円未満 の端数があるときは、その 端数は、 切り捨てる 。 延滞金の徴収 R06-02B 厚生労働大臣 は、保険料 その他厚生年金保険法の規定による 徴収金 の納付を 督促をしたときは、 延 滞金を徴収する。（法87条1項）","s":"督促をしたときは、保険料額に対し、納期限の翌日から完納または財産差押えの前日までの日数に応じた延滞金が課されます。","e":"保険料を3か月滞納した場合、滞納した日数に応じて延滞金が加算されます。延滞金の利率は年14.6%（最初の3か月は年7.3%の特例あり）です。","p":"延滞金の利率（年14.6%、ただし最初の3月は軽減）。起算日は「納期限の翌日」、終了日は「完納又は財産差押の前日」。1,000円未満は切捨て。保険料額が1,000円未満のときは延滞金なし。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":38},{"r":"法88条","t":"先取特権の順位","b":"保険料 その他厚生年金保険法の規定による 徴収金 の先取特権の順位 は、 国税 及び 地方税 に次ぐも のとする。","s":"保険料その他の徴収金の先取特権の順位は、国税および地方税に次ぐものとされます。","e":"会社が倒産した場合、保険料の回収は国税・地方税の次に優先されます。一般の債権者よりは優先して回収できます。","p":"先取特権の順位は「国税及び地方税に次ぐ」。つまり国税・地方税＞保険料＞一般債権。健康保険、労働保険も同じ順位。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":44},{"r":"法89条","t":"徴収金の徴収方法","b":"保険料 その他厚生年金保険法の規定による 徴収金 は、厚生年金保険法に別段の規定があるものを除き、 国税徴収の例 により 徴収する。 先取特権の順位","s":"保険料その他の徴収金は、厚生年金保険法に別段の規定があるものを除き、国税徴収の例により徴収します。","e":"保険料の滞納処分（財産の差押え等）は、税金の滞納処分と同じ方法で行われます。","p":"「国税徴収の例」による徴収。つまり国税と同じ強制力を持つ。健康保険、国民年金も同様の規定がある。","f":"07_厚生年金保険法7-費用の負担（国庫負担、保険料、滞納に対する措置）","pg":44},{"r":"法32条","t":"保険給付の種類","b":"厚生年金保険法による 保険給付 は、次のとおりとし、 政府 及び 実施機関 （厚生労働大臣を除 く。）が行う。 1. 老齢 厚生年金 2. 障害 厚生年金 及び 障害手当金 3. 遺族 厚生年金 保険給付の種類 厚生年金保険における保険給付 は次の通りである。（法32条） 保険給付の種類 1. 老齢厚生 年金 2. 障害厚生 年金及び障害手当金 3. 遺族厚生 年金 これ以外にも 、脱退手当金 、脱退一時金 、特例老齢年金 及び特例遺 族年金 が「附則」により規定されています 。","s":"厚生年金保険法による保険給付は、老齢厚生年金、障害厚生年金・障害手当金、遺族厚生年金の3種類（4給付）です。政府及び実施機関が行います。","e":"長年働いて65歳になったら老齢厚生年金、仕事中にケガをして障害が残ったら障害厚生年金、被保険者が亡くなったら遺族に遺族厚生年金が支給されます。","p":"給付は3種類4給付（老齢厚生年金、障害厚生年金、障害手当金、遺族厚生年金）。障害手当金は一時金。国民年金の給付との対比が重要（国民年金には寡婦年金・死亡一時金がある）。","f":"08_厚生年金保険法8-本来の老齢厚生年金（支給要件、失権、年金額・改定）","pg":2},{"r":"法33条","t":"裁定","b":"保険給付 を受ける 権利は、その権利を有する者（以下「 受給権者 」という。）の 請求 に基づい て、 実施機関 が裁定する。 裁定 保険給付を受ける権利 は、受給権者の請求 に基づいて、 実施機関 が裁定する。（法33条）","s":"保険給付を受ける権利は、受給権者の請求に基づいて、実施機関が裁定します。裁定がないと年金は支給されません。","e":"65歳になっても、自分から年金の請求（裁定請求）をしないと年金は支払われません。自動的に振り込まれるわけではありません。","p":"裁定は「受給権者の請求」が必要。実施機関が行う。「請求主義」が原則。国民年金も同様。裁定は受給権の「確認行為」であり、受給権自体は要件充足時に発生。","f":"08_厚生年金保険法8-本来の老齢厚生年金（支給要件、失権、年金額・改定）","pg":4},{"r":"法45条","t":"老齢厚生年金の失権","b":"老齢厚生年金の受給権 は、受給権者 が死亡 したときは、 消滅する。 失権 本来の老齢厚生年金 は、受給権者が 死亡したときにのみ消滅 する。（法45条）","s":"老齢厚生年金の受給権は、受給権者が死亡したときにのみ消滅します。他の理由では消滅しません。","e":"老齢厚生年金は、一度もらえるようになったら、死亡するまでずっと受給権が続きます。障害が治っても、再婚しても、受給権は消滅しません。","p":"失権事由は「死亡」のみ。障害厚生年金や遺族厚生年金には複数の失権事由があるのと対比される。本来の老齢厚生年金は一度受給権が発生すると死ぬまで消滅しない。","f":"08_厚生年金保険法8-本来の老齢厚生年金（支給要件、失権、年金額・改定）","pg":12},{"r":"法43条","t":"老齢厚生年金の額","b":"◯1 老齢厚生年金の額 は、被保険者であった全期間 の平均標準報酬額 （被保険者期間の計算の基礎とな る各月の 標準報酬月額 と標準賞与額 に、 再評価率 を乗じて得た額の総額を、当該 被保険者期間の月数 で 除して得た額をいう。）の 1,000分の5.481 に相当する額に 被保険者期間の月数 を乗じて得た額とする。 給付水準の推移 給付乗率 は元々 1,000分の10 であった。当時のモデルケースでは、 加入期間は32年 であり、この加入期間を もとに年金制度は設計されてきた。これは 平均給与の32％相当額を支給する ことを意味している。 ところが、年金制度が熟成しはじめ、 加入期間は32年から40年に近づく ことになった（これは 平均給与の4 0％相当額を支給する ことを意味する）。 R06-06C そのため、 給付乗率を 20年かけて引下げ 、生年月日が 昭和21年4月2日以後生まれの者 からは「 1, 000分の7.5 」とすることになった。 その後、平成12年改正により、 給付水準の5%適正化 が行われたため、 給付乗率 は「1,000分の7.125 （7. 5×0.95 ）」となった。 また、 平成15年4月 からは 総報酬制が導入 されたため、被保険者期間を平成15年3月までの期間と平成15年4 月からの期間とに 分けて計算する こととなり、給付乗率も標準賞与を考慮して、 総報酬制導入後の給付乗率 は、「（ 1,000分の5.481 （7.125÷1.3 ）」へと変更となった。","s":"老齢厚生年金の額は、被保険者であった全期間の平均標準報酬額に一定の乗率と被保険者期間の月数を乗じて計算します。","e":"40年間会社員として働き、平均標準報酬額が40万円だった場合、40万円×5.481/1000×480月＝約105万円が年金額（報酬比例部分）になります。","p":"計算式：平均標準報酬額×5.481/1000×被保険者期間月数。再評価率による賃金スライドが含まれる。被保険者期間全体で計算する（総報酬制導入前後で計算方法が異なる経過措置あり）。","f":"08_厚生年金保険法8-本来の老齢厚生年金（支給要件、失権、年金額・改定）","pg":13},{"r":"法44条","t":"加給年金額","b":"◯1 老齢厚生年金 （その年金額の計算の基礎となる 被保険者期間の月数 が240以上 であるものに 限 る。）の額は、 受給権者 がその 権利を取得した当時 （その 権利を取得した当時 、当該老齢厚生年金 の額の計算の基礎となる 被保険者期間の月数 が240未満 であったときは、第43条第2項（ 在職定時改定 ） 又は第43条第3項（ 退職時改定 ）の規定により当該 月数が240以上 となるに至った当時）その者によって 生計を維持 していたその者の 65歳未満の配偶者 又は 子（18歳 に達する日以後の最初の3月 31日までの間にある 子及び 20歳未満 で障害等級の 1級若しくは2級 に該当する障害の状態にある 子 に限る。）があるときは、第43条の規定にかかわらず、同条に定める額に 加給年金額 を加算した額 とす る。 支給要件","s":"老齢厚生年金の受給権者で被保険者期間が240月以上の者に、生計を維持する65歳未満の配偶者や18歳年度末までの子がいる場合、加給年金額が加算されます。","e":"被保険者期間20年以上のFさん（65歳）に、60歳の配偶者と15歳の子がいる場合、老齢厚生年金に加給年金額が上乗せされます。配偶者が65歳になると加算は終了します。","p":"要件は「被保険者期間240月以上」＋「権利取得当時に生計維持関係のある配偶者・子」。配偶者の加給年金は配偶者が65歳に達すると停止（振替加算へ）。「240月」は中高齢の特例あり。","f":"09_厚生年金保険法9-本来の老齢厚生年金（加給年金額）","pg":2},{"r":"法46条","t":"加給年金額の支給停止","b":"◯6 第44条第1項の規定により 加給年金額が加算された老齢厚生年金 については、同項の規定によりその者 について 加算が行われている 配偶者 が、 老齢厚生年金 （その年金額の計算の基礎となる被保険者期 間の月数が 240以上 であるものに 限る。）、 障害厚生年金 、国民年金法 による 障害基礎年金 そ の他の年金たる給付のうち、 老齢若しくは退職又は障害 を支給事由 とする給付であって政令で定めるも のの支給を受けることができるときは、 その間 、当該 配偶者 について加算する額に相当する部分の 支給 を停止 する。 配偶者加給年金額の支給停止 2022改正 加給年金額の対象となっている配偶 者が、次に掲げる 老齢若しくは退職または障害を支給事由とす る給付 であって政令で定めるもの（ 2.及び3.については 、その全額につき支給を停止されているものを除く ） の支給を受けることができるときは、 その間 、加給年金額のうち当該配偶者について加算する額に相当する部 分の支給が停止 される。（法46条6項、令3条の7） 配偶者加給年金額の支給停止 1. R04-09 E老齢厚生年金 （その年金額の計算の基礎となる被保険者期間の月数が 240以上 （中高齢の短縮 特例に該当するときは、その月数）であるものに 限る） 2. R03-08D 障害厚生年金 （1級〜3級 ） 3. 国民年金法による 障害基礎年金 など 配偶者に係る加給年金額は 、「配偶者が65歳に達したとき 」に加 算されなくなりますが 、「大正15年4月1日以前生まれの配偶者 」の 場合には 、年齢制限が設けられていないため 、65歳以上であっても 加給年金額の加算の対象となります 。","s":"加給年金額が加算された老齢厚生年金について、配偶者が老齢厚生年金（被保険者期間240月以上）、障害厚生年金、障害基礎年金を受けられるときは、加給年金額の加算が停止されます。","e":"妻が自分自身の老齢厚生年金（240月以上）を受けられるようになった場合、夫の加給年金額は支給停止されます。","p":"配偶者が「被保険者期間240月以上の老齢厚生年金」「障害厚生年金」「障害基礎年金」を受けられるときに停止。実際に受給しているかではなく「受けることができるとき」がポイント。全額停止の年金でも該当する。","f":"09_厚生年金保険法9-本来の老齢厚生年金（加給年金額）","pg":31},{"r":"法44条の3","t":"繰下げ支給","b":"◯1 老齢厚生年金の受給権を有する者 であってその 受給権を取得した日 から起算して 1年を経過した日 （以下「 1年を経過した日 」という。） 前に当該 老齢厚生年金を請求していなかった ものは、 実施機 関に当該 老齢厚生年金 の支給繰下げ の申出 をすることができる。ただし、その者が当該 老齢厚生年金 の受給権を取得した ときに、 他の年金たる給付 （他の年金たる保険給付 又は国民年金法 による 年金たる 給付（老齢基礎年金 及び 付加年金 並びに 障害基礎年金 を除く。）をいう。以下同じ。）の 受給 権者であったとき、又は当該老齢厚生年金の 受給権を取得した日 から 1年を経過した日 までの間 において 他の年金たる給付 の受給権者 となったときは、 この限りでない 。 支給繰下げの要件","s":"老齢厚生年金の受給権者は、受給権取得日から1年を経過した日前に請求していない場合、繰下げの申出をすることで年金額を増額して受給できます。","e":"65歳で受給権を取得したGさんが70歳まで年金を受け取らずに繰下げの申出をすると、5年分の増額（0.7%×60月＝42%増額）された年金を受け取れます。","p":"増額率は「月0.7%」。最大75歳まで繰下げ可能（最大84%増額）。繰下げ申出は「受給権取得日から1年経過後」。加給年金額は増額の対象外。在職老齢年金で支給停止される部分は増額計算の基礎に含まれない。","f":"11_厚生年金保険法11-本来の老齢厚生年金（繰下げ、繰上げ）","pg":9},{"r":"附則7条の3","t":"特別支給の老齢厚生年金","b":"◯1 当分の間 、次の各号に掲げる者であって、 被保険者期間 を有し、かつ、 60歳以上65歳未満 で あるもの（ 国民年金 の任意加入被保険者でない ものに 限る。）は、 65歳に達する前 に、実施機関 に 当該各号に掲げる者の区分に応じ当該者の被保険者の種別に係る被保険者期間に基づく 老齢厚生年金 の支給繰 上げの請求 をすることができる。ただし、その者が、その 請求 があった日の 前日において、 老齢基 礎年金 の受給資格期間を満たしていない ときは、 この限りでない 。 1. 男子又は女子（第2号厚生年金被保険者 であり、若しくは 第2号厚生年金被保険者期間 を有する 者、第3 号厚生年金被保険者 であり、若しくは 第3号厚生年金被保険者期間を有する 者又は 第4号厚生年金被保険 者であり、若しくは 第4号厚生年金被保険者期間を有する 者に限る。）であって 昭和36年4月2日以 後に生まれた者 （第3号及び第4号に掲げる者を除く。） 2. 女子（第1号厚生年金被保険者 であり、又は 第1号厚生年金被保険者期間を有する 者に限る。）であっ て昭和41年4月2日以後 に生まれた者 （次号及び第4号に掲げる者を除く。） 3. 坑内員たる被保険者 であった期間と 船員たる被保険者 であった期間とを合算した期間が 15 年以上 である者であって、 昭和41年4月2日以後 に生まれたもの （次号に掲げる者を除く。） 4. 特定警察職員等 である者で 昭和42年4月2日以後 に生まれたもの 繰上げの要件","s":"当分の間、被保険者期間を有し60歳以上65歳未満の者で、一定の要件を満たす場合に特別支給の老齢厚生年金が支給されます（経過措置）。","e":"1961年4月1日以前生まれの男性で、厚生年金の被保険者期間が1年以上あり、老齢基礎年金の受給資格を満たしている方は、65歳前から特別支給の老齢厚生年金を受給できます。","p":"「当分の間」の経過措置。生年月日により支給開始年齢が異なる（段階的に引上げ）。男性と女性で5年のズレがある。被保険者期間「1年以上」が必要（本来の老齢厚生年金は1月以上）。国民年金の任意加入被保険者でないことが要件。","f":"11_厚生年金保険法11-本来の老齢厚生年金（繰下げ、繰上げ）","pg":28},{"r":"法47条","t":"障害厚生年金の支給要件","b":"◯1 障害厚生年金 は、疾病にかかり、又は 負傷し、その 疾病又は負傷及びこれらに 起因する疾病（以下「 傷 病」という。）につき 初めて医師又は歯科医
